称为仙,不知仙可自言曾与佛是一否?</p>\n<p>答曰：皆言是一。昔元始天尊为未生天地先有之灵，以始有之义，而强立名曰元始。化生天地，而化生人，乃分神化现十方无量世界，则佛亦从一分化现也。无疑。又佛言：“从无始来，天地劫</p>\n<p>初，而化生为佛也。”亦无疑。则仙佛原为一人故也！迦叶颂释迦云：“观我天尊师，处世杂秽污。”此颂详《佛藏·处胎经》。则仙佛皆称天尊也。《玉皇本行集经》云：“帝初为光严妙乐国王，弃位修行三千二百劫，始证金仙。号曰清净自然觉王如来。教诸菩萨渐入虚无妙道。如是修行，又经亿劫，始证玉帝。”是此帝也，诸佛之师，众圣之王。此见皆称如来也。予按：近见西汉以前中国无佛之名。昔秦始皇二十七年癸未，有西方沙门室利房等一十八人，赍佛经来自西域。敕令囚禁。后遣室利房等并经，俱还归竺国。故汉前，中国皆未分佛之名。东汉之初，佛法始入。光武之子明帝时，佛法始入中国，始有佛称。北汉之后，北汉者，在古赵地，其主刘渊，在晋朝正统之末年。今言此者，正言仙宗人，不分别佛。钟离真人正阳真人。《灵宝毕法》云“智士炼之金佛现”，言炼心而见性，金来归性，则金佛现。此仙自言为佛也。吕纯阳真人云“行禅唱咏胭粉词”，言即色即是空，当体便是也。又云：“不问神仙与佛，共同觉照。”白玉蟾真人《入室歌》云：“观音菩萨正定心，释迦如来大圆觉。亦名九转大还丹，谓之长生不死药。”此仙自言参禅见性为修道也。其刘海蟾真人云：“真个佛法便是道，一个孩儿两个抱。”张紫阳真人云：“佛珠还与我珠同，我性即归佛性海。”此仙自言仙即佛也。仙佛同一性也，而自何尝分？</p>\n<p>予今据实言之：东土称曰仙，得成此道，而继其后者亦曰仙。西方称曰佛，来授此土人，得成道者亦曰佛。如世法中称父母者，呼爹妈者，人一而二称之也。末世外道，以有发无发而类分之；不知仙佛性宗，何由以识其共一法耶？虽不知，不足罪也。唯是历劫修来真仙佛种子，真性不昧，而复有真知。</p>\n<p>十二问曰:请问神从何处出？阳神既不同于阴神，所出之法，或亦有异？</p>\n<p>答曰：然。阳神出入于顶门，顶门，即钟离真人所言天门是也。而居于泥丸，为其炼神还虚，在上丹田也。上丹田即是泥丸。故世尊入</p>\n<p>灭时，谓之入泥丸，因名经曰《泥洹经》者亦如是也。此天仙神仙及诸佛世尊，顶放毫光者皆然。阴神亦有能出入于顶门者，而但居于心地中田。为其亦借修佛为言，依⊙而求明心见性，心性不外驰而入寂灭是也。此见仙及佛门，所度四果位之人为然。四果尚有生死，纵能寂定，只是五通阴神而已。究而言之，阴神亦有二出。何也？性证于真空寂灭，一性真纯，命终时，与神从顶门而出，生于天，顶出胁入而生于人，一也。性到真空寂灭，而未灭尽定。未到灭尽定，则心有生灭，多出入。有时六根，引六念而驰，六念者，六根中之六识，为念而外驰于声色等。即从六根出，而亦入于母之六根，以为胎。以眼视女，则性从眼根出；以耳听女，则性从耳根出；以身贪触女，则性从身根出矣。母之六根者，言女之身根生门也。众生之淫心淫事不除，每思行淫，则性入于女之身根。贪爱触情，迷恋触境，不肯舍去，久著根中遂成胎，而不能离。凡众生无定力、慧心、戒行者，虽人为胎而不知。修行人有定力慧心戒行者，偶生一触念，即举戒念以灭之，不犯淫，则不入胎。禅宗人所谓“末后当机”，盖如此。生于畜道，及生人道之下贱，畜道者，生为畜生之类。人道者，生为人之类。下贱者，奴仆及贫穷残疾。边方夷狄等苦多之类，皆曰下贱。何以分畜人二道？凡畜生飞者走者，皆身后行淫。唯人在身前行淫。人有一生喜于身后行淫者，大命终时，此念具在，焉不于身后行淫，而堕入畜道？故佛戒云：“不近沙弥童子者至教也。”人有一生厌恶身后淫事而专行身前淫事者，命终念在，未必不因身前淫事，而堕入人胎。故佛又言：“我最不欲女人入我教中。”为其有败道行之具也。二也。此已上言，阴神所出二端。如此，则神出而证圣者、为凡者、趋恶道者，尽知之矣。予谓有志大修行者，淫事固当首戒，而身后淫事尤当戒！</p>\n<p>十三问曰：佛既同于仙，仙有五等，即天、神、地、人、鬼五者。佛门宗有五目，外道禅、凡夫禅、小乘禅、大乘禅、最上乘禅是也。俱相同否？</p>\n<p>答曰：五目皆同。最上乘禅，佛同天仙。大乘禅，菩萨同神仙。小乘禅，同地仙。凡夫禅，同人仙。外道禅，同鬼仙。</p>\n<p>又问：仙宗下以长生为根基，佛宗下只谈凡夫死亡禅，命终而死，以轮迴现，而能躲脱为当机；以生天生人，为转身出头，谓之沙门四果。一是须弥洹果。能七生天上，能七生人间为证。二是须陀含果。能一生天上，一生人间为证。三是阿罗含果。能只生色界，不来欲界受生为证。四是阿罗汉果。能不死不生为证。至此方成沙门，方是了生死的菩萨。仙宗或不言此？</p>\n<p>答曰：仙宗亦言四果，佛宗亦言长生。然上仙亦不止于长生，而极于还虚。而与仙之名者，亦不皆得长生，其外道鬼仙，亦有死生在。为四果之列者，考仙宗之言四果：有《玉帝本行集经功德品》云：“九品之内，四果仙人，运应数合，下生人中尊贵。”凡下世帝王大臣，皆四果降生。功行高者，生同色界；功行小者，生同欲界；一生天上，一生人间之果。如伏羲、神农、黄帝、帝喾、唐尧、夏禹，皆生欲界，以其行淫而生子也。亦止一生人间，而返天上，升三界之上。如释迦佛，只生色界；为太子，不行淫生子而修行，迳超于三界之外。张紫阳真人，又目而言之：曰投胎，曰夺舍，王重阳真人云：“莫希夺舍学投胎，便向瑶池下手栽。”曰移居，曰旧住。紫阳真人《悟真篇》云：投胎夺舍及移居旧住，名为四果徒。正不免生死，而求不堕轮迴者。昔陈显微云：“遇物对景，当以一息摄之，而不复有相生相灭之机。”此不轮迴，不受生之妙用也！正为此也。扫拂得心中境魔净，躲却轮迴路，令进修有根基。世世生于人中，方有进修根基。从此以往，生平日行十善，虽无修行功行，死后可能生于人中；此善因之本，果得六趣中之人道也。平日行十善，又有修行功行，得初禅念住者，念住，是念住于定。所以执心不行淫欲，以求住念。得念住则得初禅之果矣。命终未终，得初禅，则住定于初禅而不变异，命若终而死，也住定于初禅；命若未终而不死，也住定于初禅。犹然随念，亦住于初禅天；随念者，随禅定正念。即所谓“禅悦为食，法喜充满”。即《华严经》所云“佛子如得初禅，虽未终命，见梵天处所有宫殿，而得受梵世安乐。此上数句，言得初禅受用。得诸禅者，悉亦如</p>\n<p>是”。诸禅者，二禅三禅四禅也，得诸禅受用，皆同于得初禅。是也。得二禅息住者，命终未终皆住二禅天。得三禅脉住者，命终未终皆住三禅天。得四禅灭尽定者，命终未终皆住灭尽定四禅天。即《华严经》所谓随所入定境界根前是也。随所入至处则住。入到二禅，则住于二，而不动退。入到三禅，则住于三。入到四禅，则住于四。此得色界之果也。灭息定，言胎息灭尽，而息真无，谓之胎圆。可出阳神之时也。总此四禅，略似怀胎养神之十月，为生天之上品果也。或有生于欲界六欲天者，淫事虽无，由执身不行淫欲，故无事。而淫念未灭尽，故但欲界虽名天，而多不离于地。若生无色界空处、识处、无所有处、非想非非想等处天者，淫念空灭尽，故谓之四空天。此修因之正果，得六趣中之天道也。或有上隶于天曹，居下界卑职，掌人间村落小境事，如土地、城隍、社令、山主、水主、福地仙官，皆是《楞严经》所谓地行罗刹，此是不除荤食之鬼。游于四天者。亦是佛言三界内之众生者，即此辈俱是也。能五通，而不能六通，皆不知金丹大道之流，不得金液还丹之果，不能修证上仙故也。世人求证此果，而竟不能得者，多矣。不修还丹证仙者，只得下界卑职。然卑职亦不易得，乃修十善，至于万全，而可升仙者，上界始授以卑职，行代天治世之事。十善不全者，虽欲求卑职，亦不能得。吾辈志成仙成佛者，绝不谈此。且其从人而生于人中者，危。今世为人，后世亦生为人，此固不堕恶道横生，皆善果也。危者，此时若不行善，则堕恶道，故危。从人而生于天，有善行多，则生天人。有道行，则生天王及仙官仙士。天而下生于人中者，吉。从天降生人世，如世尊，从兜率陀天降生为人，善行、道行兼全，易修成佛；故曰吉。是何故？原夫在欲界天者，此下详言，自天而后下生于人者。虽淫欲未净尽，亦贪淫欲事；有净行净性者，及生人中时，净性不昧，进修念专，易于证道；及于此生求成仙成佛。如世尊，自兜率陀天来；如弥勒，亦从兜率陀天降神受生；所谓一来生，而不再来生者。故曰吉。又有在色界天者，淫事淫念俱净尽，及下生人中来，亦于此生，永必成</p>\n<p>仙佛。如初祖迦叶，如西六祖弥迦遮，如十九祖鸠摩罗多，皆自梵天来；亦尽此一来不再来，而成道者。故亦吉。若生人中而复转生于人者，善不善相半，半行利己事，半行利人事，以世法为尘劳。淫与净相半，半生子孙，半修梵德戒淫。及至转生于人时，旧念依然相半。旧念者，即上善不善，淫净等。若善与净行长，则升为七生天、七生人之类。如昔轩辕黄帝，久居天上，因议大行，天寿天福满矣时，当议大行，升迁向上。谓天上功行难积，人间功行易积，故下生。下生人间，一世为民，二世为臣，三世为君，乃成上仙。又，王重阳真人与马丹阳真人，连十世为道伴，皆遇正法而未迷；及此世为师徒，则证天仙。如世尊，过去世不即成佛，必历三大阿僧祇劫，积修而后得道。又如三洲护法韦驮天尊，为十九世童真者。又如天台智者云：梁之祜律师，转劫为唐初之律师道宣者。此由人转生于人，功行渐增而升者，故从危中而得吉也。若淫行与不善同长，则日趋于下，易堕于三恶道。同凡夫俗士之苦趣，故无吉而终危。如《华严经》所谓“躭着着五欲，五欲者，食欲、色欲、财欲、名欲、睡欲。此名五爱欲也。又色、声、香、味、触，五者，为五尘欲也。远离诸佛，障碍生天”者是也。人中志高者，求生天，志卑者，求生人。何以知生天生人之异？又何知所以异求也？其妙在于仙道佛法中之一⊙音圈点二字。耳！此一○丹家谓之野战，此一·丹家谓之守城。人能于平常绝淫欲，自少壮至老，昼夜皆不失此○，功德得至寂灭，谓之凡夫涅槃，则能生天。得形如槁木，心似死灭，神识内守，一志不散，定中以出阴神，为清灵之鬼，亦曰鬼仙。命终而死者，即生天为天人。故《华严经》云：如此三昧，能令一切众出地狱故，免畜生故，闭诸难门故，开人天道故。涅槃，由三昧正定而至。涅槃而有生死，谓之凡夫涅槃，尚有六道而求脱轮迴者。涅槃而永断生死，即是佛涅槃，而自无轮迴者。学仙佛者，当知之为趋向。此理，详于《楞伽经》。平常不行⊙之功，而失此功德，及临命终时七日，能如此⊙，即《华严经》所谓“于世界中，死此生彼，心无痴乱，入胎出胎，心</p>\n<p>无痴乱”者，则亦能生人中之洪福。如永禅师，转生身为房琯丞相是也。故《智度论》三藏中论名。云：“欲界众生有三种，以善根上中下故也。上者，六欲天。中者，人中富贵。下者，人中卑贱。”言死后往生，有此三种。又云：“上分因缘，天道果报。中分因缘，人道果报。此生天生人之二者，必须圣师度知，而后有所宗主。”学仙佛二种之末学，若不悟此○者，不遇真师传此○者，且不能生于天、生于人，又安能得成道？此止于鬼仙，及禅师凡夫禅之同者，如是。故《华严经》云：“奇哉！众生愚痴无智，于生死内，受无数身。”不能以不坚固身，求坚固身者，正谓此辈也。有所谓声闻佛者：《华严经》云：“声闻乘随他语解，智慧狭劣。”是因师传道之声而闻道，可自进修，亦可度人进修；知佛道而能成佛道，故亦曰佛；即仙宗中之遇真师，得度正道，而未行道筑基之人也。若肯行亦彻底，有所证。有所谓缘觉佛者：于修行时，缘色便觉空，故曰缘觉；即仙宗百日关中除淫根，以炼精化炁，空却色缘而得纯炁，长生不死之人仙也。葛抱朴所谓“下士得道，长生世间”者。所以大毓禅师云：“学佛之士，勿滞无漏，便为了当。要超出阴阳之外，则佛事方毕。”有谓二乘佛者：心有生灭，以生而趋灭；息有出入，以有而归无；以有无生灭二者循环，故曰二乘。自念住、息住、脉住，而趋至于如来寂灭海；即同仙宗十月关中，玉液还丹，关节相通，抽铅添汞，阴尽纯阳，炼炁至无，而得化神之神仙也。葛抱朴所谓“中士得道，栖集崑崙”者。有所谓最上乘佛者：不涉有为，不落言诠，无名无相，非佛非法，寂然妙明，天地阴阳不能死之生之，寿命无量，过于天地；即同仙宗九年面壁，炼神还虚，以后超出于天地之先，不坏于天地之后之天仙也。五等五目，皆同者如此。</p>\n<p>又问:今说佛言长生不死,从何证据?</p>\n<p>答曰:按《佛藏·因果经》云:“悉达多太子启王父曰:‘我欲出家,为有四愿。一愿不老,二愿恒少壮,三愿无病,四愿恒不死’。”</p>\n<p>此便是世尊求长生不死之志。《法华经》云：佛说是经八千劫，未曾休废说经。已入静室，住于禅定，八万四千劫。此便是世尊得长生不死之验。世尊求长生，住禅定以为道，而求成佛。后生不求不住，而反辟之。今人若许佛言为是，则僧言为非；若许僧言为是，则佛言或非；如是扫佛之言流于世，误杀半阎浮人矣！愚谓：求、住两足，必得长生禅定者；而忘其长生禅定，斯可言不求不住。徒然一凡夫，幻生妄念者，而称不求不住；即如田不耕、种不播，何以博饭？而反曰无用食！如是说者，不堕空亡外道，吾不之许也。后之来者，能于求、住归一，一归于无，则同佛同仙之实悟；若言不求不住于一，不一而无，则同外道之诳语；诸人其必自勘之哉！又曰：“大通智胜佛，寿命五百四十万亿那由他劫。舍利佛作佛，寿命十二小劫。迦叶成佛，寿命十二小劫。须菩提成佛，寿命十二小劫。大迦旃延作佛，寿命十二小劫。大目犍音乾。连成佛，寿命二十四小劫。富楼那成佛，寿命无量阿僧祇劫。怵陈如成佛，寿命六万劫。阿难作佛，寿命无量千万亿阿僧祇劫。罗睺罗作佛，寿命无量千万亿阿僧祇劫。提菩达多成佛，住世二十中劫。威音王如来佛，寿命四十万亿那由他恒河沙劫。药王菩萨成佛，寿命四万二千劫。”《华严经》十一卷云：“一切功德须弥腾云佛，寿命五十亿岁。”又云：虽经劫住，而身不离散，不羸瘦不变异。此同仙家之形神俱妙。又云：海云比丘，于彼佛所，千二百岁，受持普眼法门。《地藏菩萨本愿经》云：“佛言，觉华定自在王如来，寿命四百千万亿阿僧祇劫。”《净业障经》云：“世尊言，无垢光如来佛，寿九十劫。”又《稽古略书》云：“宝掌和尚，西竺中印度人也，于汉献帝建安二十四年来此土后，叩达摩大士悟旨，住世一千七十二年而逝。”又唐太宗时，天竺方僧娑婆寐者来此土，自言有长生术，太宗深信之。如《华严经》所云“得智藏身，于不死界，而得自在”，又云“具足修行，离老死法”，又云“得不老不病，常住命根”者，皆佛法门中长生不死之证。同世尊四愿无二也。后之修佛法者，安能悖佛愿而二之耶？后学，必如此语等证，</p>\n<p>方为得佛法之真。</p>\n<p>又问:何为小劫中劫之年数?</p>\n<p>答曰：按《佛藏·娑婆论》云，中劫有增减算法。减者，从人寿八万岁起，以一百年减一岁，减至十岁，为一减；增者，从人寿十岁起，以一百年增一岁，增至八万岁，为一增；如是十八增减为二十；中劫约一增减十分之九，每一减八万数，一增八万数，二八一十六万数，共一增减。十分之九者，八九、七万二千为一中减；七万二千为一中增；二七、十四万四千为一增减中劫之数。大约如此也。再详言之，百年减一岁，千年减十岁，万年减百岁，十万年减千岁，百万年减万岁；七百二十万年内，除去一千年为一减之实数。一增亦如之。并二七、一千四百四十万年内，除二千年，完一增减中劫之年数。此比人间凡世之年数也。除二千年不算者，以其减劫之内因少十年，增劫内亦少十岁，故也。便是一中劫之年数。小劫未见定论。以八十中劫，成一大劫推之；当是一中劫，亦可折为八十小劫；大约即见其年数也。非不长生者，能超越如是劫数也。然又当知：以劫数计寿命者，数有尽，犹有坏劫在；如声闻缘觉，四禅菩萨二乘等，与神仙、地仙、人仙三等者同；也以劫数计一定者。当知：定之如是相续不已。劫劫如是，超越无穷无坏劫，直超天地阴阳，此世尊佛与最上乘天仙者，同长生之极致者耶！</p>\n<p>十四问曰：阳神出，非必执于身外有身。已承明命。但习闻旧说，犹不能释然。谓本是无身，若谓果无形相可见，不知何以谓之出，请再详以教我？</p>\n<p>答曰：仙佛之种性，即本性之灵光，非有非无，亦无亦有，隐显形相，安可拘一？昔轩辕黄帝以火龙出。施肩吾、钟离正阳、吕纯阳三真人，以上三级红楼出，以七层宝塔出。刘海蟾真人以白气出，化鹤冲天。马丹阳真人，以风雨雷震出。孙不二元君，以香风瑞气出。刘朗然真人，以金蝉出。苏耽真人，以白鹤出。西山十二真人王祖师，以花树出。此有相可见，而非身也。邱长春真人，出</p>\n<p>则通天彻地，见天地山河，如同指掌。又云：“三次撞透天门，日月自别，直下看森罗万象。”南狱山蓝养素先生，以拍掌大笑出。此二者无相可见，而亦非身也。释迦牟尼佛世尊，以白毫光出。故《华严经》五十卷云：“世尊从白毫相中，放大光明，名如来出现。”又《法华经》亦云：世尊放白毫相光，照见东方万八千世界，靡不周遍。下至阿鼻地狱，上至阿迦尼吒天。此是色界天顶之名，即色究竟天是也。胎神十月，化神得定，功行已至此天，故所见亦至此天也。南西北方，如是照见周遍。此所出亦非有身也。有时出而化火龙吐火，有时出而化金刚密迹，执榼音楷。杵而吐火，此有相可见，而亦非自身也。众圣高真仙佛，所出各别，何常拘拘以身外有身为出哉！</p>\n<p>又问:何故有此不同?</p>\n<p>答曰: 得定而见性, 真空矣。于可以出定之时, 偶有此念动而属出机, 未有不随念而显化者。故不同。或无念住至寂灭中, 而顿起一出念以调神者, 有同有不同其久久常定。而常定者, 则变化显现, 皆由一念。千百亿化身亦皆由一念。故念不在化身, 则不必见有身。念在化身, 则不必不见有身。予之此言, 但只为我钟吕王邱李曹诸祖真人门下眷属, 得道成仙者谪言。是谓家里人说家常话, 非为诸旁门凡夫恶少言也。彼虽见之闻之, 亦无所用。后世有缘遇此, 志于天仙, 出我长春邱真人门嫡派受道者, 必须记知, 免当机惊疑也。</p>\n<p>又问:知拘拘以身外有身为出,或者无有不是?</p>\n<p>答曰：得证大定，真空见性，遇出神之景而出，有身也可，无身也可。亦不可强执无身为是。但起念作有身想则有，随其自然空性之念则无。身未到见性地位，不能真空大定，即是未成阳神；唯其望有身为出，被此妄见障碍，与未得称得，未证称证，《楞严经》所谓着阴魔同。不得向上全神；则无神可出，入魔道矣。此正内起之阴魔也，可不速灭之乎！昔山东张先生在圜中，圜音圆，即园墙亭子。禅宗</p>\n<p>人呼为团瓢。马丹阳真人所谓“师恩深重真难报，誓死圜墙炼至真”。是也。见承尘板上落下一人，立于面前，没入于地，复涌出于前，彼不知是外来天魔，昔吉王太和殿下问曰：如何知是天魔？如何不知是天魔？答曰：师传不透彻，故不知。传得透彻，故知。又问：如何传语为彻？冲虚子又答：当十月神胎完足，四禅得灭尽定矣，息绝出入，心绝生灭，六根大寂，何得有知有见而遇外魔？由我出神之念而出，由我现身之念而后有身。若我无念现身，而外有身，即知是魔。若我胎息未完足，而不宜有出，乃妄出而见有身，当知是魔。若不得如此受授，则不得知也。错认做阳神出，为身外身。遂出圜，问邱祖。邱祖曰：“眼里见者不是，切勿着去。”见而久恋，则心着魔。见而不见，急入而依我三昧，凝神在胎，故不着去。初不信，不信邱祖法言，自矜能出神也。又问郝祖，郝祖曰：“邱哥说者便是。”又不信，再不信郝祖之言，可谓愚迷不醒。虽有圣贤，不能提挈之。执信为身外实有是身，已得道矣。竟落空亡而不知悟。由是观之，但信有身，则此有身何不可拘拘认之乎？我故曰：不可着此。由得邱真人，传来秘法也。唯于体性中，念动则出，出亦是念；念静而定，定亦是念。初定七日必一出，凡入定能入得一日，则一日一出。逐时趱据向上。又能入到定二日，则二日一出。及至七日之定，则七日一出。或至二七三七四七，又至七七，及九年一定，则亦一出。或多年多劫，皆从七日为始。即此得定，顿为常定，故名顿法。始终如是，故云无二无余。出则便己用于六通之一矣。对境而勿逐境，邱祖言不可着他者是也。一出便收回于上田，用乳哺之功为至急入常定也。出久不收，又恐迷堕逐境轮转。古人言到此地位，正要脚踏实地。最要时时住定，方是踏住实地。不然，即落空矣。佛亦言“虚空界尽，我此修行，终无有尽”。世言神仙有堕轮迴者，正防此一出之时也。我《直论》谓“防出时之危险”是也。过此而能常住大定，世尊所谓“护念令住久住”是也，则永无迷堕矣！仙家言：“一得永得，形神俱妙。”佛家人言：“一得永得，一证永证。”俱言此出时。佛宗菩萨之有转劫者亦然。如大势至菩萨，</p>\n<p>转劫为二十七祖般若多罗。文殊菩萨，转劫为杜顺和尚。唐贞观时僧。弥勒菩萨转劫为傅大士。梁武帝时人。誌公言达摩大师，二人皆梁帝时。为观世音后身。此誌公赞达摩之言。又文殊转现为唐之寒山子。普贤菩萨转现为拾得。寒山、拾得二人皆唐。金粟如来转为维摩诘。世尊同时人。及传言，定光佛皆转劫有后身者，如是。诸佛菩萨出世，或有分神化现后身以接引，当来后世；或亦在此初出定，一时回向迟误；此案详《佛藏》中久矣。非无此事此理，而世人妄以是非口，流言之者。我今为惧出定者自误迷堕，故以谓出定入定时之宜防危虑险，修士可不慎之哉！若只定而不出，虽是寿同天地之愚夫，愚夫者，不彻悟性灵，不能显现神通变化。亦能超劫运，但不能显神通。故出定者，是显神通之枢机也。守此定，二七出，三七出，久久亦一出，久而又久亦一出，即所谓调神出壳。调神者，令其出入之有度也。若不合于度，则为妄出放逸，而无妙觉灵应。若知合度，调十二时至七日，调一七而二七，至七七，百日千日而三千，不失于久出促出之危险也。乳哺婴儿加持，顿入于大定，一定至于九年而一出，则定同于虚空之无极，是曰圆顿，曰还虚合道。乳哺是仙家之称。加持是佛家之称。神入定喻怀儿于胎；得定力矣而可出，喻出胎之儿力小也。持定念而加至久久，全乳哺儿之大。儿初出时，言神初离形而暂合虚空。加到大定而常久在定，则永可离形，而同虚空之至极矣。定至极久，而出亦可极久。若不能久定，尚近凡夫境界，未入圣流，则不可久出。若以久出而不速入，则必退驰于尘境，而迷为转生。唯当久定得定力深，而可离形去志者，方可久出。此又调神出定时之危险也。自是以后，久出久定也可。久定在内，则已离形去志之久矣。可久出者，虽久出在外，则亦同于离形去志之久，故可久。此时久定，是已出已入后之久定，神通变化愈长向上者也。不比十月胎神之久定，不能出者之有危险在，不能显用其离形也。倏出倏定也可，六通也能，十通也能。十通，即六通内所多能之条目，曰十，详后《合宗语录》中。千变万化，无所不能。如重阳真人，正月四日上升时，到南京浚仪桥边劝</p>\n<p>臧公早修行。又丹州大薛遇于终南共语分明。又刘蒋村与张公治病，药而即愈。又昆明池西在空中舞袖轻飘。此皆是千变万化。此真证天仙佛地之顿法也。所以我说出定之初，即谓入定之始。得定之初，即为出定之初。是出定之初，乃得入定之根基也。从此而入大定，而常久定是也。谓得大定以后，无有不定之时，白玉蟾云：“父母未生以前，信有无穷造化。身心不动以后，复有无极真机。”是也。方能解脱神通。我《直论》所谓“神通境界，毕竟住脚不得”者，谓此也。穷天地之年劫，止同一定，而一出也可。即如世尊佛八万四千劫为一定，而后可穷天地大劫，亦为一定也。正是仙佛以上事，说到此，正仙佛齐肩大事方云了毕。世之人痴迷混日，谓仙非禅定之所修；谓佛不用禅定，而自然顿成佛；皆彼福力之薄，与仙佛无缘者。乌能知仙佛同禅定，到头如此。超天地劫运，如元始天尊，超过天地五劫运，其龙汉初劫。经九万九千九百九十亿万岁。超延康之二劫，经八万八千八百八十亿万岁。超赤明之三劫。经七万七千七百七十亿万岁。超开皇之初劫。经六万六千六百六十亿万岁。及超至上皇之五劫。从劫至劫，从天至天，止是吾身，教导人天。此出《洞玄因缘经》。无天地无世界、无仙无佛、无形无神、无知无见。本性如此，已是虚空粉碎，无无亦无矣。又何必以见有身为言？阳神本不专贵于有身，但借显阳神初出，能有身之为验耳。神且要还于虚无，即有身而还于无身，方是还虚合道之至妙至妙处。何必拘拘以有身为幸，拘于中成之果，而非悟性之极耶？</p>\n<p>十五问曰：前之炼精化炁，故曰从无入有。中之炼炁化神，故曰从有入无。前此皆有工夫，后此皆无工夫。既无矣，神出矣。本自然无为之道，又言九年面壁，炼神还虚。何故于此说一炼字？抑亦可以无为言炼乎？</p>\n<p>答曰：然。自一七定，至二七三七定，至九年定，及佛言加持，即此时炼义也。菩萨修上八地已证佛，即世尊所谓初成正觉，乃又龙宫入定七日，观菩提树王入定七日，至二七三七，于乳汁林入定七日，四十九日不食。乳汁林者，亦取喻乳哺之义。所以八地，加持至</p>\n<p>九地十地，再加持至十一地等正觉，皆如此。《华严经》所云“虽证寂灭勤修习，如修如空不动地。佛劝令从寂灭起，广修种种诸智业。”是也。大修行，得生灭灭已，而寂灭成佛。从此初得寂灭，而至永远寂灭，全无不动之地。佛故明明嘱人，必要从此初得寂灭道起，勤加修习而趋进。即同仙家得道，出了阳神后，犹加炼为乳哺之工，以趋追还虚无之极处。前此有为之炼，以十月习定为炼。仙家转神入定，行大周天，佛家修习入四禅定，皆自有而入无。因其意在渐入，故曰有为、曰习、曰炼。昏沉多，外驰散乱多，而内定少，则用炼炁化神法，以补其神。神满不思睡，神定不思驰，则昏沉散乱少而渐无，内定多而至得真定。无炁与息，则息无出入，谓之息住。神在定则性无生灭，谓禅性无生。此由习定而得渐法所致，故谓之渐。此仙佛如来，正修行之渐。非若五祖弘忍门下首座神秀辈，讲经说法，生天生人，兼行世法之渐者可比也。彼七生天，七生人间是渐。一生天上，一生人间是渐。及止能修十善者，皆是渐也。得定而专一在定，《坐忘论》云：“不依一法，而心常定。”则谓之顿法；以其无世法缘念之间断。在家者，念父母妻子等六亲五伦之缘者，谓之世法。出家者，念法眷，念大众之缘而大起尘劳者，谓之世法。着于此念则间断道法，无此念，而决然从此得至虚无寂灭之极处，方是真顿法。张紫阳所谓“顿超无漏作真人”是也。真人者，高真上圣也。仙修而为真，上证玉清境洞真天位者，曰真人。后此九年之炼，后此者，以出神时之后而言。皆顿法中之定，故曰常定，曰大定，常在大定。大定者，即生灭灭已也。常在大定，即寂灭为乐矣，无不寂灭是也。则纯是一性炯然，自一日至七日，二七三七，三年九载，纯纯全全，顿然在定。《华严经》亦云：“恒住涅槃如虚空。”又云：心常正定，灭除觉观，而以一切智觉观，从此不动，入无色定。如此而炼，谓之还虚。有为之炼，全无着处。若执炼，是有为义者，则堕凡夫知见；岂天仙宗还虚时之所可语耶？凡一切诸有为法，皆凡夫初修时事。即张真人所谓始于有作之说。修至虚无，方是得仙。又从仙之虚无，还至虚无之极处，方是天仙。</p>\n<p>故世尊云：“虚空界尽，即仙家虚无之极处。我此修行，终无有尽。”佛之修行，亦至虚空尽处，而犹不以为尽。故我曰：无有不定之时。而《圆觉经》云：如来圆觉，圆觉者，觉道圆满，即仙家言虚无寂灭之极处。本无修习及修习者。修习定观觉道，犹是有为。故西来肇师云：“有为虽伪，弃之则佛道难成。”故初修时，必以所修之法而修习之，以成正觉。及修习者，言心与息也。息有出入，修习至无出入。心有生灭，修习至无生灭而寂灭，谓之成正觉。从此初寂灭成觉，修习加持，常住正觉，而圆满无可复加，故无用修习之法，无修习之处。如是，则我真虚无矣，真寂灭矣。初得到虚无寂灭者，何故不言真得？犹是所谓能造其域，而不能久也。故仙佛皆云：一日定，七日定，二七三七，四七五七，七七也。及加至九年以后，不可以年劫限，是造其域而能久，乃为真虚无，真寂灭也。我至天地先矣，即虚无之极至。安可以炼字致思议？言人不可以一炼字生疑，而误加有为之功也。</p>\n<p>十六问曰：炼炁化神，古今皆言十月怀胎，不知果决定以十月能完胎出神否，请再详之？</p>\n<p>答曰：十月者，以世怀胎之例，大概言之也。凡人之子在母胎，以无息而至呼吸成，必由十月之久，无十月之胎者，则炁不为完足。而成人而后生。化神之炁，大周天之用，自有呼吸而返至无息之初，言修仙佛者，皆要将此呼吸之息，返而修之。至于如父母初媾成胎，未成呼吸无息时，斯亦谓之父母未生前也。亦必由十月而后能无息尽定。一变一化之道，自然之理如是。故仙真度人，即此十月而发明之也。世人不知历多少岁，而不得仙，无不疑惧。真人直指十月，必成神通之理，令人知易趋而进，易修而成也。或有不必满十月，只九月八月七月，而能出神者；人有七月胎而生者，八月胎者，九月胎者，故胎神者亦有。生人亦有。然或有满十月而不出，过十一二月、十三四月、数年、数十年，而后出神者，生人亦然。轩辕黄帝，在胎二十四月而生；帝尧、夏禹、汉武帝，皆在胎中十四月而生；玉帝在胎一年而生；老子，在胎八十一年而生；佛堂弟阿难，在胎六年而生；玄帝祖师，在胎十四月而生；叶法善，十五月生；张</p>\n<p>氲真人，十八月生；朱橘真人，十五月生；林灵素，二十四月而生；重阳王真人，二十四月生；刘长生真人，十三月生。甚至胎元大定愈久，而未能出者也有，此又未知出神之景及出神法。如南岳蓝养素先生者，故如此。此皆李曹二真人，相嘱之法言也。</p>\n<p>又问:何故有不满十月而出?</p>\n<p>答曰：神炁精明，志念勇猛。昼夜勤功在定，定定相续，无一瞬一息而不在定。《元始天尊说先天道德经》云：“妙定其恍惚杳冥之中。”刘长生真人云：“意不外游，自有禅定也。”自然得无息无瞬之不有间断，而大定可易得。得大定之日，便是胎完之日。神胎既就，毕竟景现而出，自然之理也。所以，神既定至于父母未生前，不可又强留在胎，为不神通之愚夫。借曰生人之胎，孰能留而不生？古人所谓“果生枝上终期熟，子在胎中岂有殊？”是也。</p>\n<p>又问:何故有满十月不出?</p>\n<p>答曰：神昏炁滞，志念不猛。一定之间，或昏沉不遣而任其不定；昏沉是神炁倦弱而熟睡。若凡夫，到神倦弱时，则必睡，而不能勉强以遣。若修定者，即以定可遣而不遣，任其不定，则耽迟火候，而定力微矣。必念念入定，以遣之可也。或散乱外驰而任其不定；散乱，是心驰于六尘。心既外驰在尘，受尘迷惑。所以驰于外，则不定于内。不定，则是无火候矣。无定功，何以得神全胎圆？故亦不能十月而脱胎。则定不相续，不常定，则不能入大定。尹清和真人云：“一时一刻，无功无行，是谓虚费者。”所以《九转琼丹论》云：“又恐歇气多时，即滞神丹变化。”如是十月，焉能得定？虽一年、年半、二年、或至多年，亦未可量也。《会真集》云：“不悟冥冥入定禅，神离炁散，子母难圆。阴阳失媾昧玄玄，九载三年，不见壶天。”昔世尊在雪山修定六年，昼夜长坐，方得成道。《普曜经》云：“太子苦行精进，行四禅，行数出入息六年。结跏趺坐，亦无覆盖，不避风雨，不起经行，大小便利，亦不屈伸。坐不倾侧，亦不倚卧，四季端坐。虽有众难，未曾举手障蔽。树下鹊粪污身，亦不弃去。诸根不乱，心不恐怖。”是也。</p>\n<p>又《金刚力士经》云：佛言“若于佛事，有不足者，不入涅槃；佛事周讫，乃入涅槃。”之说，便是。佛事者，在欲界之人，修离欲事。在色界之人，修四禅定事。在无色界之人，修四空禅定事。色界四禅定成者，可入小涅槃。无色界四空定成者，则入大涅槃。四禅四空俱成，谓之佛事足，佛事周讫也。若人只知十月为期，不识胎之完否，胎完，即是得定。得定由于入定，不入则不得。未遇仙传，则不识。不可于未定而妄认为定。不宜出而妄出，出无阳神。为其未得定足，不成阳神之故。如是只名走丹，前功尽废矣。</p>\n<p>又问:前功如何得尽废?</p>\n<p>答曰：既妄出，而不急急专心于入，未得大定，便以少定为足。既逐日逐月只如是，更有何日能神定胎圆？只在尸解地位，小果尸解，只神妙而形未能妙，只胜于死者而已。不得形神俱妙。此世尊所以云：“是有余涅槃。”言其趋涅槃而实不能得尽涅槃，故曰：非无余涅槃者也。修士最宜慎之！</p>\n<p>又问:如何知得是未成阳神,出无阳神?</p>\n<p>答曰：神定胎圆，自有当出之景。不见此景，即是神不宜出。故邱祖真人云：“功之未足，则道之不全。”《楞严经》云：“不恒其所觉，云何获圆通？”所以十月为大概之言，不可拘也。</p>\n<p>又问:如何得不废前功?</p>\n<p>答曰：不执于期月，惟定定相续，亦定定增长，息息归无。故邱祖真人以辊石逆上高山为喻者，示必谨其难也。盖言一日十二时，似山有十二分高，定得一时，如上得一分高；定得七八时，清和云：邱真人熬到七八个时，至九十时后，有两个时辰当不过。如上得七八分高；到此步步难挣，毕竟逐时逐分，挣上山顶，已到尽处，方有大休歇，大自在；邱真人所喻教门下者，如是。十二时一周完已。故稚子禅宗人亦云：“一句合头话，万劫系骡橛。”是也。此得十二时，全无昏睡，即所谓“我能使得十二时者”是也。日日如是，则胎就。神出景到，阳神</p>\n<p>见景而出，安得废功？景未到必废功，故曰：切不可出也。既在高山顶上，顿然独立三年，而往真趋大定；无不定，而亦不知有定无定；无骡无橛，而寂灭为乐，大事方了。</p>\n<p>又问曰:既要入定,何故又要出定?</p>\n<p>答曰：不入不神通；不能成神通也。不出不神通；不能显用神通也。出而不入，失神通。已成之神通，出而不速入，则初定而易动，悖却十步百步之说。著于尘染，虽已成神通，而亦可失。于是神通必须调出调入。及至九年一定之后，劫劫如是，始为纵横天地之能事也。</p>\n<p>太一又问：阳神之定如此，阴神之定同否？</p>\n<p>答曰：入定之法略同，而定中之得失大异。阴阳二修之初修初证不同故也。何由异也？是异在昏迷，而不在散乱。以散乱，则不在定也。不在定，则不可分别定中景象。然阳神在定中或有少许昏沉，在初入定时，循环之机，所必有者。则迷歇大周天之火候；斯时六种震动自现，眼有金光，耳后有风生，鼻有气搐，脑后有鹫鸣，身有踊动，丹田有火珠驰，是为六种。阳炁自来即丹田中之金丹大药也。阳神自觉，能自离昏沉，而自觉也。所以不致久昏久迷而能孤明独照。此五句，是万古圣真未泄之机。阴神之定者，其元精元炁不足完，则不知其动机而修补之。或一有知动者，又不知其当补之时，不能足炁，不能不死。故定亦不成阳神，只名阴神之定。所以阳炁无从得，六种不震动，妙觉不灵应。入定之久，定中或有夙念之根尘未净，迷而不觉；如鱼在水中则忘水，逐境不返；即人在境中则忘境，迷堕于境矣。此身在此，而灵性已驰入别胎壳去矣。《玉皇胎息经》云：“神去形离谓之死。”六祖惠能亦云：“性在身心存，性去身心坏。”昔《楞严经》所云穷空不尽空理者，为不回心钝罗汉。若从无想诸外道，入穷空不归，迷漏无闻，便入轮转。正言定中之失而有异者，如此。今略举定中之失者一端，而例知其余。《华严经》有云“如哥罗逻进入胎藏时，于一念间识，则托生。”是也。世人又传一禅师留记云：“昔日无为子，今朝</p>\n<p>却姓陈。”在定之僧为前身，随洪福之念，生陈太守为后身是也。到得后身数尽，或有能回定于前生者，无为子是也。或有不能回定而在异类者，云光和尚堕牛胎中，而直受之不能辞，是也。云光好食牛肉，有高僧劝之勿食，莫趋此轮迴之境也。云光答：“我食而不食。”高僧曰：“你可做而不做。”光不信。光死为牛，耕于田。耕不了力不堪，犁不能脱，汗不止，喘不休。高僧去视之，呼曰：“云光，云光。”牛则立而仰视。高僧曰：“你当初食牛时，我曾阻你。你答食而不食，言但口食而心不贪食。我说你可做而不做，可是身做而心不做否？”光跪而泣诉曰：“恨不听师言，今始知身既做此，不得不做矣。”此皆大可防之危险也！夫阴神学者，得定而能自出者，固有人矣。其不能自出者，皆是。所以禅人在定，每用护法侍者。于此定久，则必击响声，以出之；如声闻之义，不及阳神者，初出时，能调出调入，必能自出也。盖防此识念托生之危者。纯阳真人亦尝言之：“免颠危，要人叫。”免颠危有二义，一者是初习定时，遇饥渴索饮食时，令不起烦恼。二者是迷定而溺于昏沉，若用声以出之之意。阳神原无迷者，古圣真教人谨密如此。习定者，可不警醒之哉！</p>\n<p>又问:定法如何是同处?</p>\n<p>答曰：最上一乘仙佛，阳神始初以○为宗，凡语中遇一○，则直呼作圈。遇一·，则直呼作点字。遇一⊙，则直呼作圈点二字。方可便于记念，与前第十问同。与后《合宗》语注亦同。行住坐卧之间，行住坐，则初关中关皆有之。唯卧，是初关百日内有之，中关十月以后全无。今此乃顺口统言者，切不可拘执。不离这个⊙。其行也不离一·，佛谓之游戏三昧。其住也不离一·，佛谓之禅定三昧。《华严经》云：正定中受用为三昧。有此⊙，则化阳炁。即炼精化炁时之火候。无此⊙，则化阳神而还虚，即炼炁化神时之火候，及神还虚无之极者，皆是也。证无余涅槃矣。彼阴神及四果人，棒喝佛指，直指单传者，亦以此⊙为宗。行住坐卧不离这个。离了这个，则心外驰，而不在于定。仙家不能入定中化神，佛家不能入于禅定中见性而成佛者也。行不离○，住不离·，亦自有</p>\n<p>⊙至无⊙，此言其大略似同处。第仙佛正法，禅定之行住⊙，本乎自然。道君言“一切诸法皆空寂相”，佛言“随顺寂灭境界”是也。祖师禅及四果所宗之行住⊙，实由强制。但看高峰禅师所说，忍饥寿昌金粟，三峰三和尚等所说，吞声忍气，及气急杀人之语，可见，此阴神、此阳神，似同而实有不同之妙。学仙佛者，不可执此便谓全同大用。止乎如此，则轻视仙佛等之和尚凡夫禅矣。当悟！所以有六种震动，阳炁自来，阳神自觉之妙，而后可谓之胎神、见性、真定。</p>\n<p>十七问曰:仙佛既同一道一修,而又有食荤食素之异,得无毕竟有戒无戒之不同乎?</p>\n<p>答曰：斋戒俱同，而更严密。天德清净纯素，人不斋戒清净，不合天之德矣，安能证居帝圣仙真之位乎？子盍观之《道藏》内，有《太上洞玄灵宝业报因缘经》云，人造善业，则有善报。造恶业，则有恶报。太上道君言：“始自发心，终于极果。念念不舍，持戒不犯，上下有异。”有三洞众戒，三戒五戒，六戒七戒，八戒九戒，初真十戒。十二可从戒，十四持身戒，二十四戒，二十七戒，三十六戒。正一七十二戒。升玄内教百二十九戒。洞玄上品四十戒，中品六十戒，下品八十戒，共一百八十戒也。上清三百观身戒。洞神七百二十戒。玄都律文天尊十戒，千二百威仪戒。金纽太清阴阳戒。《太上虚皇四十九章经》之《斋戒章》云，天尊曰：此元始天尊所说之经也。“斋戒者，道之根本，法之津梁。子欲学道，清斋奉戒。念念正真，邪妄自泯。一切众生，捨清净域，耽嗜荤膻，而以触法；譬之饿鬼啖食死尸，火烧饥肠，无有饱满。又如蝇虫，争夺臭腐，妄为膻香，而以触法。五官溷浊，六腑不净，尸魄欣昌，乐于死地。子当割嗜欲根，入清净境。无作诸苦，无造诸恶。无生诸见，无起诸邪。子观戒文，同世法律，欲有所犯，惧金木刑。子于戒文，精意奉持，凛然在前，如对所畏。秉心正严，灭一切想，谛听不二，可会正真，是吾弟子。”又《苦乐先后章》，天尊曰：“学道之士，断诸爱欲，却绝肥鲜，长斋清肠，研味至道，是为苦中求乐。</p>\n<p>能知其苦，不见其苦。吾道苦而后乐，众生乐而后苦。今吾告子，当明慎之！”又《不杀章》，天尊曰：“子欲学吾道，慎勿怀杀想。一切诸众生，贪生恐惧死。我命即他命，慎勿轻于彼。口腹乐甘肥，杀戮充啖食。能怀恻隐心，想念彼惊怖。故当不忍啖，以证慈悲行。”又《清净章》，天尊曰：“学道之士，以清净为本。长斋眇思，啸歌太无。睹诸邪道，如睹仇雠。远诸爱欲，如避臭秽。除苦恼根，断情爱缘。溟溟浊海，自得净戒。如白莲花，生淤音喻。泥中，亭亭出水，不受污染。五脏清夷，三田革素，太玄真人自与子邻。”子者，天尊指妙人而言，前“子等行真”，皆同。又《洗心章》，天尊曰：“六根不净，当洗其心。心不受垢，自无诸秽。”《元始洞真报恩成道经》，元始天尊言：“孝道慈悲，好生恶杀。食肉饮酒，非孝道也。”《灵宝出家因缘经》道言：“勤修行业，长斋奉戒。精研上道，转神入妙。念念增进，永不退堕，克得道真。”《太上洞真智慧上品大诫》云：“修斋求道，皆当一心。请奉十诫。”又云：“长斋奉诫，自得度世。”《洞真智慧大戒经》天尊言：“不杀不淫不盗，减酒节行，调和气性。”又云：“人不持戒，则智慧不通。”《洞玄灵宝因缘经》云：“此十戒者，自三清以下，乃至十方上圣真仙，莫不皆由持此戒也。”又云：“众生饮酒食肉，致生病恼，弥益罪根。吾不饮不食，抱道自然，变化无方，长生不死。”《虚皇天尊十戒文》云：“不得杀害含生，以充滋味。不得淫邪败真，不得饮酒食肉。”《元始天尊说九真妙戒》云：“不杀不淫，不瞋不二，奉戒专一。”《太上十二品法轮劝戒经》元始天尊言：“欲受戒时，先须清净。受真戒者，不得屠杀，不得邪淫，纵恣瞋怒，不得饮酒食肉，使戒根牢固如玄都山，戒相端严如玉京殿，戒德光明如琉璃珠。”《太极真人二十四门戒经》云：“戒约烦恼，隔绝魔心。努力勤修，早求解脱。”《老君二十七戒》云：“戒勿费用精神，戒勿食含血之物，戒勿忘道，戒勿杀生，戒勿为诸恶。”《老君五戒文》曰：“戒者，防其失也。”又《化胡经十二戒》云：“戒饮酒，戒食</p>\n<p>肉，戒淫，戒妄语，戒恚怒。”《洞玄灵宝千真科戒》云：“出家不交世俗，不作有为功德；静思入定，降伏外魔，名为净戒。”《玉匮明真科戒》云：“弃色断情，长斋持戒。”《灵宝元阳妙经》云：“有持清净法戒者，则得真道。”《太微彻视经》云：“学道修真，念念持斋。心心不退，归心于寂，直至道场。”又云：“学道者，不勤行业，不修斋戒，难达至真。”《玉皇本行集经》云：“奉戒持斋，冥心大道。”《七百二十门要戒律诀文经》云：此戒文经名也。“长生神仙，要在清斋，志学之士，急务修斋。斋真斋心，守戒为主。主以制心，悉当清斋，以戒情欲。一切众生，智愚不同；一识既动，无端竞兴。外来曰动，内住曰寂。来不惊寂，去不劳动。动而不劳，不离寂也。寂而不惊，不疑动也。寂照明彻，故无惊疑。无惊疑者，常乐常住。住无所住，为而无为，为道之最。”又曰：“变化无穷，由悟守一。守一须资，唯戒为急。持之不亏，邪不得入。自然混合，与道同真。由戒入道，故谓之门。普劝行人，悉令持戒。究竟归根，同成正道。识悟既明，终持一戒。”一戒者，唯戒于心，不起他念也。《胎息伏阴经》云：“若不持戒行，未入胎息，岂得合神？”《太微灵书》、《紫文仙忌真记上经》云：“人虽有仙相，复有败仙相者；十条犯而败之，亦不得仙矣。一曰淫。魂液外漏，精光枯竭，神焦魄散。二曰酒。魂忘本室，魄游怨宅。七曰勿食肉。食则神不守真，魄生邪勃。九曰勿杀生。以罪求仙，仙甚难也。”《太上灵宝大乘妙法莲华真经》。昔世尊，得仙授《妙法莲华经》而成佛。故后亦说《妙法莲华经》云：佛告菩萨，天人四众，吾四方求法时，有仙人言有大乘，名《妙法莲华经》。我即随仙，精勤给侍，令无所乏。令我具足大波罗密，成等正觉。又曰：昔者仙人授佛妙法，如来因之遂致成佛是也。后人讲此经者，谓仙即阿私陀也。其七伤品有：一之伤，带真行伤，淫色丧神。魂液泄漏，精光枯乾。气散魄零，骨空形振。与凡尘结因，玉府同符。岂复得仙？二之伤，外形在道，皮好念真，而心抱阴贼，凶恶内臻。三官所记，标为恶门。三之伤，</p>\n<p>饮酒洞醉，损气丧灵。七之伤，啖食六畜之肉，杀害足口之美，彘气充于脏腑，真炁扰于灵门。徒有玄名帝简，亦不免于不死。元始天尊曰：“为学之本，当以七伤为急。不犯七伤之禁，将坐待灵降，白日升宸。”如外勤好学，内不遣于七伤者，此将望成而反败，期生而反亡，故上学有七伤也。又云：“学道者，要在行合冥科，然后始涉大道之境。若自不能，徒劳于风尘，无益生命之修短。”其诸经之言斋言戒者，有如此。又，太极左仙公云：仙公是天官职位之称。“学道不修斋戒，亦徒劳山林矣。”戒者，戒诸恶行。若不持戒，道无由得。葛仙翁云：“学道修仙，先修戒行。”叶法善，从太极紫微左仙卿，下降在胎，十五月而生出胎，天然不茹荤。吕纯阳真人《律诗》云：“斋戒兴工成九转，定应入口鬼神惊。”又云：“斋戒饵之千日后，等闲轻举上云梯。”又《敲爻歌》云：“斋戒等候一阳生，便进周天参同理。”刘海蟾真人云：“但知恬淡无思虑，斋戒宁心节言语。”重阳王真人云：“寂然刀圭，根本斋戒换西东。时中十二常觉照，内调神炁玉炉功。”又云：“酒饮清光滑辣，肉餐软美香甜。世人迷误总无厌，个个临头路险。独我悟来口远，唯予省后心嫌。十分戒行愈精严，没分酆都赴点。”又云：“受寂寥餐素。”又云：“性乱因醪误，精枯缘色垢。”又云：“化道王三已弃家，豕羊滋味久相趖音渣。”又云：“大凡学道，不得杀盗。饮酒食肉，破戒犯愿。”张静虚天师《心说》云：“斋戒，以神明其德。”邱长春真人语云：“去声色，以清净为娱。屏滋味，以恬淡为德。”马丹阳真人语云：“优游恬淡养真人，不须酒肉与荤辛。酒为乱性之浆，肉为断命之物，直须不吃为上。”又云：“分明说与出家人，戒断腥膻厌五辛。”又云：“腥膻未戒，断了慈悲。”又云：“腥膻戒尽常餐素，挂体唯麻布。待百朝锁钥重开，效吾师内顾。”又云：“全戒腥膻及戒辛。”又云：“斋食不可美之又美，更何须异馔多般，但一味而已。”又云：“奉劝同流听仔细，断荤戒酒全容易。”又云：“垢面蓬头摧壮锐，粗衣淡饭远轻肥。”又云：“我在俗</p>\n<p>时，秤肉斗酒不厌。而今已戒十数年矣。他如食肉饮酒的，亦可做得神仙，只是较迟了些。若人心不怀道，嗜酒贪膻，徒恣口腹，罪报难逃，终为下鬼。”盘山王栖云真人语云：“酒肉吃了便可飞昇，也休吃。”白玉蟾真人云：“辟谷断荤。”萧紫虚云：“闭关绝俗及腥膻。”陆师云：“大戒三百，以杜未兆之欲。”萨真人云：“道法于身不等闲，思量戒行彻心寒。十年铁树开花易，一入酆都出世难。”李云卿真人云：“上真高仙，必须精持戒行。来问道者，皆赠以绝欲断荤四字。”是众仙翁之言斋言戒者又如此。未尝不言斋戒也者！所以，我祖师北七真皆斋戒，即于现在世而速成道。我所以独言，斋戒之同于佛宗者；亦以北七真此证有在也。后之人学道之志不笃，修行之念未真，故不以斋戒而浴德。又且无由见藏教经录之为诫，故不知斋戒为首务。倘有夙缘，继起于邱真人之门，而欲修天仙者，不可不遵天律，自斋戒始。</p>\n<p>又问:佛宗戒杀戒荤之说云何?</p>\n<p>答曰：《梵网戒经》云佛言：若自杀教人杀，乃至一切有命者不得故杀，是菩萨应起常住慈悲心，方便救护一切众生。而反恣心杀生者，是菩萨波罗夷罪。波罗夷者，此云极恶。谓杀生者为极恶之人，永弃绝于佛法之外，不得称为佛子菩萨也。此是十重戒之一。又云：一切肉不得食，夫食肉者，断大慈悲佛性种子。是故一切菩萨，不得食一切众生肉。食肉得无量罪。故食者，犯轻垢罪。轻垢者，此东土云，玷污净行为垢。较前十重则轻。此乃四十八条轻戒之一耳。《楞严经》云：其心不杀，则不随其生死相续。杀心不除，尘不可出。如不断杀，必落神道。当知是食肉人，皆大罗刹鬼。又云：不蹋生草。云：何取众生血肉充食。《楞伽经》云大慧白佛言：愿说食不食肉功德罪恶，令众生慈心相向。各于住地，清净明了。疾得究竟，无上菩提。佛告大慧：有无量因缘，不应食肉。我今略说，一切众生，从来展转因缘，常为六亲。以亲想故，不应食肉。令修行者，慈心不生，故不</p>\n<p>应食肉。以杀生者，见形起识深味著，故不应食肉。彼食肉者，诸天所弃，故不应食肉。令口气臭，凡食膻，则口吐膻气。食腥味，则口吐腥气。故不得证清净地。故不应食肉。空闲林中虎狼闻香，故不应食肉。闻香者，闻腥膻之气也。人本不腥膻，若食腥膻之肉，则人身始有腥膻之气。虎疑为腥膻之物而食之。世传言，虎食人，见人足而泣，始知为腥膻之误也。凡食，作食子肉想，不应食肉。听食肉者，无有是处。此言上乘大乘，二乘四果，凡夫俱戒食肉。若许修行食肉，则败修行功德。故于五目禅类，皆无是处。我说一切悉断，如来应供等正觉，尚无所食。到等觉地位，则斋素饮食，尚且全然不食。况食鱼肉！视一切众生，犹如一子，是故不令食子肉。由此三经观之，捷见身心切害，则知不可不戒杀诸生，戒食诸肉。而仙佛之贵于必戒者，大约皆同于此。</p>\n<p>十八问曰：仙教中，有以点化成银，服食升仙为言者，佛教中，不言此，必此为仙佛之所以异乎？</p>\n<p>答曰：不异。然不异亦有所证，由佛所言点化服食之说，在《华严经》久矣。经之七十八卷云“有药汁名词宅迦，人或得之，以其一两变千两，铜悉成真金”者，此点化之言也。又云“有药名大莲华，其有服者，住寿一劫。”又云“人服延龄药，长得充健，不老不瘦”者，此服食之言也。《华严》至大至尊之经，所说不可不信。此佛教化菩萨修佛之法，乃有点化服食之说。若对未除贪欲之凡夫，则不言也。故后世凡夫小乘，终不解悟此理。仙之言者，合言之，曰点化服食；分言之，点化言外事，服食言内丹。抱朴子云“不得金丹不得仙”也。但服食草药杂类，而不知还年要术，终无久生之理。若以外事为，便可服食升仙，则许旌阳真君，首言服食飞昇者，不必言“脐内元炁结成丹，谷神不死因胎息”于《石函记》中。不必言“元精药母于可惜”。许歌中，不必言“男子修成不漏精，女子修成不漏经”，女子之经，为生人之始信，亦为自修成仙佛之信。故女修者，曰斩赤龙，为返经成炁，与男修返精成炁者，同一理。此既皆言内丹之理，则外事服食不足飞昇也可知。张果真人云：</p>\n<p>“世上铅汞，只有变化五金之功，无能延生命之理。”海蟾之徒马自然真人云：“九转灵丹非五金，若无神授恐难寻。”元阳子云：“未见饮食之人，得终天命；皆见少亡，被所惑而自误也。”所以但称为点银之仙术，则知非为身心性命升仙之道也。许真君《药母论》云：丹道者，非人间五金八石、朱砂水银之所为也。先天故为元始精。又荆山丈人，解悟炼石之道，无他妙也。在委羽山，能炼石成水，以石水服之，不能飞行虚空也。炼石虽妙，固小术耳。《了明篇》云：“身中尽有延年药，可笑愚人向外寻。”若必以外事言服食，今亦举其似者，一言之。比如升打之灵药，皆金石类之所成也。有服之以治愈梅疮，予以灵药治杨梅疮，七日愈。十日、半月、一月，而得除根愈者。治愈结毒者，杨梅疮，服轻粉而发毒者。治愈痔漏者，痔漏九年不愈，脓水不止者，名曰漏。凡九窍有大疮者，皆曰痔。治愈膈噎者，食膈止于口而喉不咽，或咽过于喉而即返吐出者。我邱真人门下法眷有奇药。每服五厘或七八厘，甚极者不过一分末为一服，止用三服或四服五服，即全愈。皆有痊效，使病不促寿算，而身可复生而久安。病痊则宜速止。多服则害大。此以上一段皆言金石灵药之所用。唐宋多君妄信方士之诡言，方士者，游行十方之士也。有此二等：一者是弃家学道修仙。诚心苦志，岩栖穴处，戒行精严，遍访仙师而游十方，不与世人交游，不为世法染缚，此仙佛真修之种子也。二者是邪道光棍。原无自修之志，又无教人之能，或为衣食所逼，或犯律罪而逃，奔走十方以资身口之需，以施拐骗之局。遂使世之愚人，贪财者，受其炼银点化之害；贪色者，受其採取女鼎之害；望长生不死，常享富者，受其服食之害。以金丹外药可服食，服之不已而求长生；九霄君下降谓刘泓曰：世人谓至药服饵，望长生不死；不知金丹诸石药，有大毒在中，服之者，从羲轩以来，万不存一，未有不死者。中火毒而身裂，而促算速斃又可鉴也。《丹论诀旨》云：若大丹用石药杂气，即有大毒，不堪服食。能不食者为妙。强服致枉夭者，百即百矣。谁能免一不夭？受毒者宜用解药，须宜泻。吃防已葵菜甘草汤渐出之。元阳真人《大丹篇》云：服丹，火毒发，速以甘草煎浓汁，日夜渐呷之，即解火毒。故《本草》有</p>\n<p>云：服金石药多而中毒者，以麦门冬汤解之。所用麦门冬去心六两，人参四两，甘草二两，灸。三味共末蜜丸，梧子大，日再服二钱，米饮空心下。又云：凡丹石药服过多，致食不下者，以茑粟壳和竹沥煮粥，日食之而安。《丹经》云：有人服丹砂、乳石、硫磺、紫粉等毒发者，急服保仙丸，可救性命。又云：四蒙未全不可服。如误服者，觉毒发不安，急服伏龙肝汁、甘草汤、生绿豆汁，遂可不死。又方云：如服金石药，中毒发疮者，以白矾末一茶匙，将冷酒调下，三服愈。《还丹众仙论》云：解丹毒方，有名驭丹散者。用麦门冬、天门冬各去心，净四两，熟地黄五钱，甘草一两，人参三两，白茯苓二两，紫苑二两半，去芦头，地榆三两半，大赭一两半，海藻一两半，山枝子四两半，共末。每服二钱，米饮空心下。即以诸天真仙圣，俱有解服丹毒之方药，及医家俱有解服金石毒之方药，而备观之，则丹药不可轻易妄服食求仙，又当知也。虽服之者，有仅可救病延年之功效，犹且难遇；况于升仙脱胎，神通变化，通天彻地之能，绝然无有；服之何益哉？钟离真人云：“访仙求友学烧丹，精选朱砂炼大还。将谓外丹化内药，原来金石不相关。”又云：“内里明时是至真，外边入者即非亲。若教异物堪轻举，细酒羊羔亦上升。”吕纯阳真人云：“可惜九江张尚书，服药失明神气枯。不信还真本无质，反饵金石何太愚？”《太清修丹秘诀》云：“天地原炉却在身，阴阳不测谓之神。元炁飞霜飞九转，还丹本是太和精。”皆言服外物，为理之必无也。《妙解录》云：今时好事者，大修炉火，为金丹服食。往往为药所误，医救莫及。所为无非自戕之捷径。《丹论诀旨》云：切不可信八石、四黄而误用之。盖本非长生之药。若硫磺有软铜铁之功，矾石有杀虎豹之能，岂堪服食而不为毒害哉？又有用曾青、雌黄、雄黄，杀水银令死以为成丹，亦非服食之理。此世人互相谬传者，非圣真之良药。是也。</p>\n<p>又问:既言仙佛有服食之说,是若谓为有;又云服外物为理之必无,是若决言为无;似两其说之不同。何也?</p>\n<p>答曰:非不同。因问二事之故,则述其皆言。因古之有病者,</p>\n<p>则用治；无病者不用治；故古仙不用者更多，而用之者少也。故详辨之曰：无能升仙，只可治病。然仙佛言有服食，如治老病与大疮毒之异症，只求救死而延其年于暂，非为冲升变化，神通超劫之计。服食之而后内炼金液还丹。如张天师之自修，与茅真君度二弟及佛说延寿一劫者。观之可知其半。愚人，遂弃其所实用之内，而唯说服外者；自愚之而又愚他人故也。且仙是本性，以见性而成仙。出而显神通，亦性之灵运而神者也。外物只可助形体而除病救死，不能见性神通。此理人所易晓。后学闻此，可不如是而究之乎？</p>\n<p>今又指其内丹书之言服食者，究之曰：“饮刀圭，窥天巧。”又曰：“一粒金丹吞入腹，始知我命不由天。”又曰：“朝服一刀圭，暮即生羽翼。”又云：“只吞一粒金丹药，飞入青霄更不回。”王重阳真人云：“修持如会识金丹，只要真灵本性在。”马丹阳真人云：“烹丹鼎，下丹结，中丹热，大丹凉。不须炼白更烧黄。自然玉性，万般霞彩射人光。”邱长春真人云：“修炼事，地轴锁天关。出有入无三尺剑，长生不死一丸丹。”究此众仙真之言，而内丹服食益明矣。若谓欲究何以有外丹之说，且又言外丹点化成银之术之有无，与真假者，然此事也非世人可能，此事亦非世间有。此法传，乃神仙所以助修道之资，而为然者。唯遇仙传道者，即得仙兼传术。《太清金液神丹经》云：“此事皆秘其文，非有求仙之志者，固不授也”。所以皆谓之仙机。若不遇仙，无仙道者，必不得传仙术。魏伯阳云：“遇非人不得妄传。”非人者，行与理违。若可得传，则人莫不传于子孙。况无志修仙道，而徒狂乱妄想，苟求富贵者，上苍安肯以此仙术传之耶？青霞真人云：“神仙铅汞神水华池之道，自轩辕以来，不上文墨，只仙传秘诀，心授灵符。”又云：“以圣传圣，以贤传贤。不遇真人，终无妙理。”杨行真人云：“若教个个识黄芽，世间那得有贫人？”抱朴子云：“丹药若使凡人知，天下神仙成群矣。”况志于拐骗愚人财宝之贼，将何德以当天授？又安能知能得仙术乎？当知，尘世凡夫俗子，炼丹不成，便可自醒自戒矣。今之轻于言炼</p>\n<p>银者，尽属拐骗之贼。假托此术以拐骗人之财宝，骗人之饮食。但名方士，方士以游行四方，而不定居者。拐骗此方，逃避于他方，而失主追捕之不能获。凡一方士必有一资身之法；或有一医方而能治奇病，或有一银方而造假银以欺世。故皆为方士之所以名。非实有知，能可言也。《道门十规》曰：自秦汉以来，方士竞出。若文成五利之以金石草木，徒杀身取祸而无所成。故世称方术。此见于史鉴，为儒门学者共见。而士仕者反映此，而贪服食点化于金石草木，不肯内修，是诚何心哉？</p>\n<p>又问曰:方士既非实有知能,每闻其入门时,亦能成银可用者,又是以何巧伪而为能乎?</p>\n<p>答曰:全是假银,但可欺诳愚人而已。或是伪造假物,非银而略似银形,每欺人曰:此银也。而使用害众。又或伪造假物称曰丹药,私地垫入真银于内,名曰垫手。遍世间皆以此等寻访外护,出本银烧炼,皆提拐银罐而逃。故方士类中有谚云:作方士提罐,一人每有三个死。凡提银得手快活死;逃出了门走个死;追获了打个死。然垫手是方士拐子总法。又有以银制成灰如末药,便诈称为我已炼成之丹药,点入铜汁中,大火销去铜而银末复体为银。愚夫俗子未能识破,谁敢不信?此二垫法也。又有以银制如铜样,诈为出山生铜,寄卖于店中,或巧立为异名,令买者得之。彼以不相干之药诈点之,铜亦复体为银。浅见寡闻之初学,谁敢致疑而识诈?此三垫法也。入门有成,以取信于人者,类皆如是而已,无真能也。但取信于人,而人信之,由贪炼者之必遭其拐骗也。其不贪炼者,任方士有多诈能而进身无地。能明真丹经之理者,则方士无投诈之隙而诈炼无所施矣。再举所以为教者言之:此下一段皆言方士教人之法。或教人以草药制水银假死,丹经云:诸般草木皆非道。配真银为用,《玉清内书》云:“用凡水银为丹者,妄人也。”又云:“若用水银为金丹,即不是真丹。”以水银之质松浮,不配不坚硬故也。或教人制红铜假白,谓之红铜皆去血,配真银为用。以红铜之质,虽能假白如银,而不能纯白,不配则不能</p>\n<p>去耀眼之黄色故也。此物虽可像银，待用后煎倾，点硝点铅则假质犹然败坏，而复折去名曰掩暂。为其只能掩人暂时之目。乃丧人心，灭天理者为之。如是假法，曰养砂。不盗母者，曰养砂。盗母者，曰青金，曰白金，曰青天硫，曰黄天硫，曰死硫，曰死雄，曰死砒，曰死硇等三千六百余门。故《海客论》亦曾指伪。言所云秋石，本河车、黄芽一类。及诳曰：尿精圣无知，乃铅汞精髓。妄曰青盐。更以万般草木药物，或言出于河北，或言产于三吴，或言仙草在岭南，或言真药在西蜀，或言鸡子铅出鄱阳湖。盖鄱阳湖中有所谓大矾山、小矾山，妄呼矾字为鸡，而山荒绝无物产者。又有指称蜈蚣山出此铅。然此山在大矾，隔水三五里许，又名蛇山，长故也。乃水中有一白沙土洲而已，非山也。高不俞一丈、二三丈者，耕种之地，民众之居，绝无铅穴。乃方士妄言以欺远方不见者，与轻信者。或言真汞在辰州府，辰州，在楚洞庭湖之西南，有大山出朱砂。以砂之藏石隙者，入火升出水银。方士乃指此世间之凡水银，妄真称为真水银。若可以凡称真水银，岂又有名不真者乎？可问方士，以何物名凡水银？则欺人之说难行矣。尽是欺言，皆无实理。只谓延挨岁月，久骗衣食。今年等药至，明日药未齐。愚贪者不知，尽被骗害而已。此上皆《海客论》之说。又，太古真人《还丹至诀》云：“大丹受水火气足以成。若以杂石药参杂，意希化宝，举浩劫而不成。况百年短景，而妄想成耶？”昔施无疾真人，责马存曰：“子家金玉堆积，尚不知足。有奸伪者诳汝曰，得药为黄金以为饮器，则神仙可得。此诳者之欺言，非通人之至论。”唯吾辈修仙修佛，以修德立行为基者，则不为不用也。抱朴子云：“既览金丹之道，则不欲复观小小方书。”《大还心鉴》云：“物非其类，丹必不灵。心非合道，虽成必祸。”</p>\n<p>又问曰:世人求丹法炼银者尽多,果向何求而得有真?</p>\n<p>又答曰：全无真法，不必学炼。张氲真人，答唐明皇曰：“点化烹炼，天命之靳。草木金石，腐肠之物。不可学也。”唯当苦志学道修仙，则财与命可兼得矣。刘朗然曰：“尽求点化要肥家，忘却形枯改岁华。”可授道</p>\n<p>者即可授术。道得在心，则术亦可得在心也。道，可以了生死，而不复生复死，轮迴永绝。道，可以寿齐天地，而超过天地之先后。掌握乾坤造化，而常极乐。道，可以撮土石成银，呵气化金，举念得珍宝，不必苦心劳力以求，而自得者。道，可于自己性分中求之必得；而非若外事妄求之而不得，终为虚幻者比。抑何疑惮而不求道哉？且我今言不必求炼银者，亦有故。有一等贫穷人，心甚滥恶，谋学假银欺人，以供自给。或幸得一假方，诈称游访外护，拐骗财宝。是拐骗之心，皆起于家贫居穷之先，方外游行。俗人不识尊经圣语、仙书戒律，人人皆是如此之类。拐骗回家，戴方巾、穿色服、造华屋、买腴田、娶娇妻、广爱妾，用此不自招为恣欲，反诳人曰：善能採补。养家丁，称相公。逞富于人前，何当以丧人心、悖天理，自愧自罪哉？抑何尝以苍苍有三官九府，风刀掠考；九幽六洞，狱治轮沉；报应为惧哉？《道藏·仙王教诫经》云：“生入邪道，自制一法，败黩道要，以求利用。赃满罪积，生身被考。死入地狱，永无出期。”而犹以其诈法，出入仕门，愚弄其士大夫之愚贪者；而士大夫深以为德而不疑不惧。亦可笑、可惜之甚也！士大夫见其炼得似成，而不知其不可成。诚有感其教炼替炼之德，此可笑也。及其提拐逃走，乃不悔其愚贪，不悔失防守。讼告有干无干之人，逼勒追赔，计亦迟且拙矣。此又可笑也。富不能强得。且有富者：石崇且灭家，梁冀且覆族也。故《海客论》为彼惜之。方士者，谁不借言诳众曰：某官某人，我为之炼成服食；某官某人，我为之炼成点化；固为惑人自荐计。由是士大夫之贪愚益彰，圣人凡人，学烧丹者甚多。何故只说士大夫是愚贪？盖古之士大夫，学丹亦多有成。皆弃凡世事，而诚心苦志以修行悟道，故得遇真仙来度。所以古云：“若是贪财并惜宝，千万神仙不肯来。”如许旌阳之能弃旌阳县令者。吴猛真人之能弃西安县令。如彭抗之能弃尚书左丞相者。如尹喜真人以东宫宾师，迁函谷关令而弃者。张天师道陵，以巴郡江州令而弃者。李老君以柱下史官而弃者。黄帝之弃帝位者。王子乔以太子而弃帝位者。如刘宽之弃司徒太尉</p>\n<p>者。晋之刘道成弃陈州刺史者。齐之张三山弃大司空者。如是数仙真者，皆弃位苦身心而学道，故得丹而成道，由于仙传。若后世之士大夫，居官而不弃官，恋家而不舍家，只愿永得富贵，坐得神仙。无古人志行，神仙望望且去之，安肯显身而度之哉？不过只有方士之遇，假法之闻而已。益彰者，方士相传获利，必有无限方士，巧诈谋进此身，以展提计，则其受害将亦不止于一矣。不尤可恨耶？此贫穷恶棍，骗人利己之流，皆如此。又有一等富人，家赀饶足，初信方士诡言，遂欲烧炼，求为大富。尽遭提手骗法，提罐骗穷，以至壁立无措。要知学烧丹者，未有不破家赤骨而穷者。亦以所闻假法，转为访护拐骗之谋；此由自陷于不得已，而亦谋为提骗。如久嫖之客，便甘心为乌龟之类是也。举世皆假，绝无丹法，绝无人知丹理，更向何处求真？虽苦求之，亦不可得。我故曰：世人不必求学。元阳子《还丹歌》云：“君看前后炼丹者，误杀千人与万人。”又应悟玄子《还丹至药篇》云：“余好红炉经三十载，一事无成，而后知八石原无人圣功；五金只是凡常物。”盖学不究玄机，理无妙悟。</p>\n<p>又问曰:方士中也有知言内丹,不言外事炼银者,抑真知有内无外乎?</p>\n<p>又答曰：总为愚弄世人之言也。此亦有二种人。一者是一心贪淫恣欲，用女人为鼎，以採战为道，无志于谋他事。《诚业本行经》云：“乐淫色者，由先业六畜根未断也。”二者是本意谋外为骗局，其所以又言无外者，为其人被外事拐骗之多，有不再信之意。故暂言无外，以投其机，入身以会议如餂其疑。既入身则又渐渐言有外，托言唯某处某人独成，点化致大富，而买官致大贵。此法唯我能之，我代为之者也。此所言无外是计也，非彼真言无外也。亦非真有、非真能、非真代之也。光棍之口，反覆无常。普天之下，皆是如此。当其言有内时，亦必言用阴阳採取。以阴为身外之女人，以阳为自己男身，男媾女为採取，补我得长生之说。此何故为是言也？盖自为取淫欲之乐，好淫欲之人，专学淫欲之事。家贫不能得淫欲之具，故为是採补</p>\n<p>之说，以谌恣已之乐。堕其计者，可谓至愚之人。故先诱其淫乐，动其愚心，为畜生聚麀之状而不自羞。纵是显宦名儒，甘心入其局中。自称能事，不顾外人之耻笑，为淫欲迷惑之而已矣。久之则又兼进外事，而亦复遭其拐骗，乃知初言无外为诈，非真知言无外也。后学者，不为此二种人所惑，而能信向真正清净自然仙道，则亦屡世积修，心地光明，仙阶有证者，而后能之。所以王重阳真人与马丹阳真人，十世同修，皆遇正道而不信邪说。此世师徒同证，是当为后世之鉴者乎！</p>\n<p>又问曰:今我欲言无外事,何故古仙皆作丹书详言精妙之理?既有丹书,必有可为之事,请详言之,决后世疑。</p>\n<p>又答曰：古有此理，而今无此事。仙有此事，而凡世无可得此事之人。若只信有丹书为必有事，殊不知真书少而假书多。假书者，棍徒捏为拐骗，具以欺世而取证如许行为神农之言。真书者，古仙之作。其意：一则为得仙传者之印证；二则为凡夫妄为者之解惑。夫欲解妄为之惑，谓凡夫偏于贪利，无不妄为。造假为真，以欺骗人，贪为掩暂。暂时掩人之目而求必用。又名染暂，言染造暂时为银色也。既得假银小利，恨不炼大丹而取大富。岂知仙诀大丹，上天重禁秘藏，不为世间凡夫用，更不为灭德者用。彼贪之不已而误信者，是不见其有真丹书之正法，未解其惑而然。若有见真书之理，必当自思：我之所为皆不如是；所闻者又无从得如是；既不如是，即不如是理之可成。是今无此事也明矣，而妄求之心亦当已矣。好将求外欺人骗人之心，洗刷忏悔净尽，戒恶改过。从善修心，勤求身心性命正道，修个可得仙道之根基，便有可得外丹仙术之因。欲求正果必修正因。可不勉哉？欲求仙术成银，而不积德修正道，是犹戏台上，优人自称汉祖唐宗，终日说入关中、取凤城，口妄说而终不可有得也，何以异？</p>\n<p>夫可为得仙传之印证者，以何书为真？如太上之《黄芽歌》、之</p>\n<p>《金碧古文龙虎上经》。元君之《玉清内书》。金华玉女之《说丹经》。鬼谷子之《九转金液大还丹歌术中经》。广成子之《浮黎鼻祖》。许旌阳真君之《石匣记》，之《神楼赋》。谌母元君授许旌阳之《铜符铁券》。吴猛真人之《直指灵文》、此即《铜符铁券》之注，合书于每章之下。之《大还丹歌》。葛仙翁名玄字孝先。之《採金歌二篇》、之《神符经》。九霄真君之《大丹歌》、之《妙解录》。钟离正阳真人之《破迷歌》。吕纯阳真人之《认真歌》。程昭之《析理真诀》。张紫阳真人之《金火歌》、之《金丹四百字》、之《大丹歌》。李灵阳之《玄灵备览》。严君平之《铅汞歌》。王果斋之《金丹铅汞歌》。萨真人之《太上指迷血论》、之《铅汞歌》。范文正公之《渔庄录》。虚静真人张天师之《管见歌》。高象先之《金丹歌》。张三丰之《铅汞歌》。白玉蟾真人之《金华冲碧丹经秘旨》、之《地元真金歌》、歌乃真书正理。及后世棍徒，借曰仙翁之名，假托为做法，注于下，其注不可信。之《三元枢要》、之《金碧宝鉴》。尹文始真人之《大丹歌》。李真人之《龙虎还丹诀》。李光元之《海客论》。彭晓真人之《明镜匣》、之《识一歌》。百玄子之《金丹真一论》。淳和子林太古之《龙虎还丹诀》。雷一阳之《黄白破愚》、之《黄白鉴形》。歌论是原本真书。另有做手一本，是后光棍假作，切不可信。王敬所之《金丹捷要》。洪武时人，雷一阳之师。张元德之《丹论诀旨心鉴》。刘太初之《金丹辨惑》。仙家四书，有四种，此一种也。陈自得之《外丹敲爻歌》、嘉靖时，福建人也。之《黄白直指》、之《金谷歌》、之《竹泉词》。玉田氏之《金大灵篇》。慕阳子之《慕阳真诀》、此为徽人，方姓。止能祖述丹经、作诗歌，不悖于理，而亦不知内事者。《铅汞歌》等书。仙术之同，有得于神仙下降而传者；有自悟虚理，而不能烧炼，唯效法作书，以表所悟者。为真理之可取证者，略举如此。而我伍子，不获己于无言，耻举世之为人惑，亦作神丹理论九章，痛为之辩。皆试验事理，与许旌阳《神楼赋》、《铜符铁券》，及葛翁《採金歌》，皆合符节。老师所言仙丹者，与世不</p>\n<p>同。一转成母，二转成丹，三转点化，渐至九转，而浮黎神炁，似有似无者。可服食延年，而亦不能倚着，误内修。已抄出于世，诫世之愚。仙丹天禁至重，唯传苦行学仙者，今古皆不令凡夫知。此言点化服食，正谓辟世之妄为者。予以空言辟之；彼曰汝不知此理，曾似我知。焉肯改过？予以知真，辟世后之妄假，无非欲明得此理，或可自悟自戒。以答张李曹三真人之付嘱。他如《秋日中天》，成化时人所作。如《梦觉新书》，序文甚是正理，篇目散乱不真。如《金丹法藏》，如《百法问》，如《洞天秘典》，如《火莲经》，如《观花记》，如《黄白承志录》等书，醇疵真伪相杂，不由仙传，而不同仙术。作于夸能之臆见，而陷人以疑论，固不足证矣。又如《度世真机》，如《我度法度》，如《琴火重光》，如假《渔庄做手》，如假《黄白鉴形做手》，如假《地元真诀做手》，此三书，皆论真丹之理。万历末年，乃有三种假法做手，是当时提罐光棍所伪造者，切不可信。如《三十六照》，如《六十四匮法》，如《七十二家炉火》等书，犹假甚之，不可取证者。并我所未及见者，姑不枚举。是所必不可见者。见之，则害人心术。吾又论之：仙师之传道，必择心专念笃，能修道者，故有直授财物，助弟子得以供日用，而遗世绝俗以密修。虎皮座张真人，助李虚庵真人以行道之资是也。而又授以已成之丹药，兼授炼银之仙术。故秘授成银仙术、得以潜炼助道者，陈正懿谓侯楷曰：“苟非栖隐山林，未易有得也。”言居俗者必不得也。亦甚多人。于中亦有未得授成银仙术，贫乏不堪潜修，必用外护者。如伍达灵之得张仲二友；如张紫阳之得马陆二公；如王冲然之得富韩公；李长源之得筠阳亲旧。又有说焉，当其初修仙道于世间，则亦必用世间之财，为日费之计。如钟离真人云：“真炁未完，一日三餐要食。大药未就，一年四季要衣。”即《佛藏·宝积经》所云“以生死财而求甘露不死仙财”是也。今而资之外护者，室中三四人，如王重阳真人用李灵阳和玉蟾护法，而二人皆得道；如张紫阳真人，用白龙道人刘守益护法，而师徒二人皆得道。日给用银不过五六分，七八分，每一人大约用二分；三人者则六分；四人者则八</p>\n<p>分。岁不过三十金。二年工，则二其三十；三年工，则三其三十。若造静室关房，则所费不能预算，多寡唯量力。世间每有信向仙道，能出此等些微之财为护者尽多，及愿为如此等护者亦尽多。要知护仙佛者，即得仙佛。凡用护者必先见得此人，德行可证仙佛，志念可证仙佛，则用其护，共修同证。如佛所言“施者受者，同成佛道”。若无可证仙佛之德志者，不可用其护。所谓“不使人间作业钱”，避天罚之无成，岂容一概混用哉？古仙所谓“财不难兮侣却难”者，又云“择侣择财求福地”者，是也。彭真一云：“投名山，绝常交，结仙友，隐密潜修，昼夜无怠，方可希望。”</p>\n<p>又问曰:修仙道者,果炼银为好乎?果不炼银为好乎?</p>\n<p>答曰：昔龙眉子云：“欲为跨鹤之游，必藉腰缠之助。”炼固方便美事，但炼银不密，即为招祸之媒。或至丧身失命而反误道。或至遗弃所戒而不能护道，虽炼之亦无益。此不奉仙师炼丹之戒者而然也。不炼银者，未有不依外护。依护者，则宜不甚远于世人之居，而便给饮食。太远则给护者厌烦，太近则又恐世事干扰，略近而僻静方妙。炼银者，自有护，必入深山穷谷居之。抱朴子曰：入山道者，当悬镜，则魅不敢近人。凡仙来及山神来，镜中犹是人形。若鸟兽邪魅，镜中即现鸟兽本相，不敢近人矣。魅去则必脚行，是魅必无踵。若有踵者，则山神也。古仙所谓“起来旋点黄金用，不使人间作业钱。”是也。一切皆取之自办，遗世可矣。甚省交接应酬闲是非，得以专心悟道而速证果。古仙依此修行者，其证果更大。若不炼银及不用外护者，又有居山二法：一法者，三四师徒道友，各办银三十两为自身一人之费，三年亦足用。不必妄疑而多求，则各具而各足，何难之有？且居孤寂之山，不能多藏蓄。欲为弭盗之法，弭贼是止盗贼不生窥看之心，使无可窥者。莫善于以银溶入铜铅中，只见铜铅之废形，而不见银形，则祸不生。凡取用为买办，则煎销些微，若似从布施来者。及一切衣食等物，皆不令多余。或每人以三十金，为入攒米堂之资，有密修者，虽待食</p>\n<p>于堂，亦必要静室，离堂半里、一里许。有送供之规则在。则亦足。二法者，三四同志，再多用二三人之力，耕以取食，凿以取饮。苦修行之，正仙佛之所当然者。后学若以此法自修，亦可矣。亦不必炼诲盗之银也。切以此嘱！昔曹还阳真人嘱予曰：“炼银真是仙术，天福所关。只许汝一见，不许汝妄意，常常为之。恐迷于射利，甚丧厥志。且古言‘不受苦中苦，难为人上人’，三洞圣真，无不由苦行精修者，子其勉之！”予敬守斯诫言，而亦宣言以诫后人。后人其亦奉诫自勉之！</p>\n<p>十九问曰：彼教不信长生，而任其有死者，必有后生。凡人之生于世间，生有身矣，则必有死。及其死矣，性灵无所依泊，则必又生。抑何所为，不生于天，而生于人畜？愿语与后学知之。</p>\n<p>答曰：生畜之因最多。不善而贪瞋痴淫，皆畜因也。世尊教人，戒淫为第一事，即其故也。故有序云：“观其源始，不离色心。生灭轮迴，斯为苦本。圣人超悟，息驾反源。拔出三界，然后为道。”是也。予言止此。今详说之，人若能修众善，能断淫事淫念。即悟《楞严经》所谓执身不行淫而断淫事，执心不思淫而断淫念。所谓命根断者，乃能不受后有，而生于天。其已生在天者，动一淫念即堕下界。况在人中淫念，不转生乎？故有虽修众善，不能断淫，必受后有之身。</p>\n<p>又问:若受后有,有得人身,有得畜身,分受之时,抑何可以转其畜机,而生为人乎?</p>\n<p>答曰：亦由自作而自受者。《佛藏·辩意经》云：“贞洁不犯外色男女，护戒奉斋精进。”言外色男女者，是世淫人，以男女二色为淫具。意女色行淫在于身前，男色行淫在于身后。故世尊《戒经》云“不近沙弥”，禁男色也。又云“最不喜母人入我教中”，禁女色也。人以素贪身前行淫者，同于人媾；兼有善因，必投入身前淫受之胎而为人。专念身后行淫者，同于畜交；兼无善因，必入身后淫受之胎而为畜。</p>\n<p>人若不信，但观古云“要知后世因，今生作者是”之说即是。世世皆有一等痴人，最贪身后淫事者，即所谓一条尾，千定万定者矣。入二教修者，可不急戒身后之淫哉？凡人心中有此见一起，即畜机动也。当机者，能戒之，则见此不淫。见而不见，而归心于戒定，而后远离畜机。世尊云“当珍重波罗提木义是汝大师若我无异”，言持戒也。禅宗皆言“转位回机”，即此。即《业报差别经》云：“具修十善，得生欲界天。若修有漏十善，以定相应，兼修禅定者。生色界天。若修远离身口，以定相因，生无色界天。”远离身口者，即淫机身心俱断之义。《正法念处经》云：“持戒不杀盗淫，此三善得生天。”如是既生于天，且不受生于人，况其畜乎？六祖惠能云：“除淫即是净性因。”诚至诚也！唯禁戒精专，不犯身后之淫，始可灭却畜机而为人也。谈禅说道者，专为身后之乐，其心于知法犯法而望不畜者，必不得矣；因根固结于心故也。至心口不一，禅道尽成诳语矣。我问世人倘见此言，亦肯惧戒之否？</p>\n<p>又问: 每见宗门人, 言了生死不入轮迴畜道, 又却扫仙佛之道为不足学; 彼自有法, 愈于仙佛。果然乎? 不然乎? 愿说欲闻。</p>\n<p>答曰：了生死者，生死已无，了不生不死之谓也。凡人既生有身，必难得无死；既死无身，必难得不生；此常理之必然，亦常人之不能不然者。欲了生死，必保得此身不死；灵性常在此身中，更无何性往彼受生；此生死自然了矣。若不能保身而至必死，则性离此坏身，急寻依泊，必复生为彼身；岂可以今之死，而冒称为了生死乎？唯仙佛能不死、而不生；唯仙佛之道，是不死不生之道也。以其使神气住定不相离身，有寂尽灭尽定之功，然后能保身不死，而得不生，为真了生死也。此仙佛所说之法，教人远离恶道苦趣之说也。末世邪人外道不知寂尽灭尽定；不唯不知，而不能求知。且又扫去禅定而不用，叛却仙佛正法。极言禅定至灭尽之非，指为烦难，不如己捷。彼既不能灭尽定，如何了得自己生死？反用诳语欺</p>\n<p>哄世人,害得遍世间人,皆不知以仙佛正道了生死,甚可痛恨也!</p>\n<p>又问:彼此此死为了生死,与不了生死者,其差别何以为异?</p>\n<p>答曰: 即是一个不了生死。唯真了生死者, 此身既不死, 其定性灵光独超劫运, 不随坏劫而坏, 安有六道轮迴? 故六祖云“性在身心存”是也。即《大涅槃经》云“入菩萨正性离生”是也。不离生死者, 平日只行世法中邪恶事而不改, 身死时, 性只如前行邪恶事亦不改。然世法事, 原皆背却天道的, 俱是六道中所为之事, 为六道种子。如性偏好贪暴者, 则同狼性之贪暴, 死后化入狼类; 如性偏好悭、好狠毒者, 则同犬性之悭狠, 死后必化入犬类; 如性偏好淫者, 则同猪性之淫, 死后化入豕猪之类。王磐山真人亦曾说此四类。如性好毒害, 则同蛇虎之毒害, 死后入蛇虎之类。不分未死已死, 此念不离, 必因此念入畜道矣。只说还是在人生时, 一般不知。已死无了人身, 入畜身, 既不知入畜身, 不求脱离, 便成了个坚固畜身矣。只有畜生的受用, 万般苦楚, 无能脱离。此所以修身心者, 贵于不死而不生后世也。禅宗亦有高僧求投人胎者, 为此。凡人死后, 灵性所在之处即曰生。又有一等, 其性贪食无厌足, 如饿者不舍一口与他人吃, 此必生于饿鬼道。由生时死时, 皆无厌足之心故也。又一等十恶重大者, 入地狱必矣。如阳世牢狱, 禁之待发落之义也。此皆不了生死者, 如是。有志者, 岂可误陷于不了耶? 故古云:“了即业障本来空, 未了应须还宿债。”有人身者, 其思之。</p>\n<h6>李羲人 七问</h6>\n<p>崇祯丙子年秋中朔，伍冲虚子在金陵，将远行。李羲人，初为应天府学庠友。己巳初夏，参博山无异和尚，禅机锋最称自悟。至庚午季秋望七日，拜入予宗。为扣性命双修之旨，竟游楚浙七年。如新于兹，始还金陵之家。乃有七问焉。</p>\n<p>问之一曰：昨观《直论》此冲虚子壬戌年所著，《天仙正理直论》一书</p>\n<p>行于世。所云炼精化炁,如何知得是化了炁?</p>\n<p>伍子答曰：精化炁者，是初关时设，为次第之名目也。只为精由炁化，则以炁之发动时，不令化精，而复全真炁；是即元精还元炁而言化炁。元炁即汜形之元精，不顺去化有形，故曰精化炁也。若谓后天之有形质者，而可妄指为精，则有形质者，以形质为碍，不能化炁。身中虚灵之处，亦无安顿处，亦无通达处。凡借精化炁之言，指人以执信者，乃房术邪说之人，莫不执以诳世，以舞弄后人。不知所谓销矿成金矣，而金不复为矿。烧木成炭矣，而炭不复为木，亦不复地气而长旺。此喻观之，可无疑矣。于发动时而还静，还于本地，用周天火薰蒸之。薰蒸得理，则炁归本地而更长旺。薰蒸不得理，则不能如是。今日发动时化炁补得一分，明日发动时化炁又补得一分，动而至于不动，补而至于不用补，补至十分，而元炁具足。具足时，便化炁了矣。不复有精，而亦不复为世法用，大药生矣。谓之“华池莲花开”；谓之“赤水得玄珠”；亦谓之“地涌金莲”；亦谓之“天女献花”；亦谓之“龙女献珠”。万般喻名，但要悟得此理，而后不失之浩瀚无稽，茫然称博。</p>\n<p>问之二曰:精以炁化,而精炁本一,固以化言,则易知。炼炁化神者,炁神原二,而亦以化言,是何故?</p>\n<p>答曰：炁神二，以其有炁有神现在，故二名之。及至心息相依，一向清净随顺，至于寂灭，得息无出入，心不生灭，大定而常定矣。夫息无出入，是无炁矣。而息住脉住，其神寂为性，独有真觉真照。先若无此元炁助神，则神不能常觉常照。炁不合神，则神亦不能常觉常照。即神之能常觉照由于炁。炁神归一，而为神通，非炁化神乎？</p>\n<p>问之三曰:如何名为小周天,大周天?</p>\n<p>答曰:有异用,而后有异名。曰:请详其所以异?曰:小周天者,坎离交媾之火候,以双修性命者。所用者小,故称小。所谓“十</p>\n<p>二时，意所到，皆可为。”一日内，不知其几周天矣。究其妙，正饥时吃饭，困时打眠。始觉名如，末觉名来，时之理也。凡觉照，则小用周天。不觉照，则不用。用之妙，有升降、有不升降。钟离语纯阳翁云：“可升之时，不可降。”若是者，所以为小也。大周天者，乾坤交，阴阳混一之火候，法轮迟缓，绵延昏默，终日间如醉醺，如浴起，而暖气融融。禅宗人自喻为山前水牯牛，略似也。所以张紫阳真人云：“此大周天一场，大有危险，不可以平日火候例视之也。”究其妙，我师还阳真人云“此候，无颠倒、无进退、无升降”，则其大，便可推知。即白玉蟾真人所云“无去无来无进退，不增不减不抽添”之谓也。其始也，以一时为一周天，以一日为一周天，以一月为一周天。其既也，至于十月，而不知其亦为一周天。其大如何？以其用大，故称大。夫即以候之缓而周者，曰大，自然妙合于缓，而不得不缓。候之速而周者，曰小，自然妙合于速，而不得不速。然又当知小周天，本无天以周，而且建立为有，谓之从无入有也。大周天，始周有为，而渐入无为，无火候境界，谓之从有入无也。若所谓心能依息，则万法归一。心息大定而涅槃，而一又归于无。此周天之异用，为大小异名也，如此。</p>\n<p>问之四曰：《直论》谓炼精化炁在下丹田，炼炁化神在中丹田，下迁中，是一迁，而三迁之说，又如何？</p>\n<p>答曰：按三迁之说，于钟离答纯阳论还丹云：“还者，往而有所归。丹者，丹田也。丹田有三，炁在中丹，神在上丹，精在下丹。自下田迁至中田，中田迁至上田，上田迁出天门，是为三迁功成。既自下而上，不复更有还矣。”吾见钟离此语矣，闻吾师之说同。夫炼精化炁在下田，至化炁到绝无有精，而惟含藏真炁，炁尚在杳杳冥冥之间，採之而至似有似无之妙，此可迁中田而化神者。中田曰离南，所以文殊菩萨往南游行者，即此。“龙女变男子，往南方无垢世界”者，即此。《华严经》云善财童子五十三参，皆往南行者，亦即</p>\n<p>此。善财童子，即仙家婴儿之喻。予尝闻仙师还阳真人云炼精在下田。虽曰反覆循环于三田，而此真性，常若不离于下田；即世尊不离菩提树下，而上升须弥，升天宫之秘旨也。化神入定在中田，而始之冲和塞乎两间，归之无极，常若浑然旷中、下而为一。所以世尊“于欲色天二界中间，化七宝坊，如大千世界，说甚深佛法，令法久住。”久住者，大定也，即其事也。其所以然者，精泺本地在下田，故二者专归于下。泺在下，而神本地在中，故虽化神在中，常浑合，若充塞、若虚空，其中下而为一。此又古仙之不肯轻言，凡夫之无所授者。今敢直语之，为后圣谪。</p>\n<p>问之五曰:仙家不用定,今或可不必言?</p>\n<p>答曰：王重阳真人云：“呼吸相应，脉住气停，静而生定。大定之中，先天一炁，自虚无中而来。”又云：“定中知动，方是造化。”邱长春真人云：“息有一毫之不定，命非己有。”马丹阳真人云：“定息探真铅。”又云：“定里见丹成。”又云：“工夫常不间，定息号灵胎。”太上云：“转神入定，以成至真。”《斗姥心经》云：“知守本来真身，更能精修大定，乃至形神俱妙。”元始天尊云：“息依神定，性定命住。”张紫阳真人云：“性定可以炼丹，不定而阳不生。阳生之后，不定而丹不结。”《中和集》云：“九载三年常一定，便是神仙。”诸说重宣如此，而世人犹有不及信，不肯承当，亦不知天上未有不入定之仙也。</p>\n<p>问之六曰:古禅师,有数十年入定而不出者,可同否?</p>\n<p>答曰：同者也有，不同者也有。同者，同于能绝淫欲，持梵行清净，则阳精不漏，精根如童子，得漏尽通者。此六通之果，古谓之不生死阿罗汉，唯圣僧、神通僧有之，是则同。不同者，为精漏未尽，精根未能如童子，则无漏尽通，不过谓之五通鬼耳。虽能入定，全是阴界阴神，双眼皆合，不及漏尽通者之双眼开也。唯十二时中无昏沉，方能使得十二时。眼合者，敌不过十二时，即无真定。有在</p>\n<p>定迷而转生于人世者，或迷而转入于横生者，性已堕去，而空壳在斯，亦何足取为定哉？此不同之谓也。顽空入定、无慧照者，皆如此。学者不可不察而明辨之！</p>\n<p>问之七曰:形神俱妙,赤血化白血,及拔宅飞昇者,皆还虚后事。今言初定初出时,何故言俱妙,似欠是处?</p>\n<p>答曰：不欠。是到得大定而出定，即得不死不坏之形，不生不灭之神。神能超越天地，而形亦随之超越天地，何不可言俱妙？即此一得永得，直到还虚后，亦即是这个俱妙。故说初生人时是这个人，乳哺大也只是这个人。如八地成佛，是这个佛，再加持至九地、十地、十一地等觉，也只是这个佛。何尝有异？如此，则知俱妙矣。又谓赤血化为白血者，此非所以语神仙、天仙也，乃人仙不老者，及尸解之类者耳。何以辨之？人仙者，精全而元炁固，依呼吸之为用。有呼吸在，则有气血行，由静多而动少，气为踵息，血化白亦宜也。但能延年益寿，而差异乎常人者。若曰神仙天仙，其炁化神矣，不化气血。息也住，脉也住。即二禅之息住，三禅之脉住，似之。更有何物可流行，而为白血乎？所以古人云：“血化膏，息定无气，则亦无血。只有肉中膏脂在，故曰血化膏。肠化筋。”食则肠充之而空，不食则肠不空而实为筋。此二者，自化神胎成以后，至出神炼神还虚，皆如此。诚理言也！古天仙又云：“说尽万般差别法，总与天仙事不同。”然此一会说也，皆本予之直论而重明之者，但未闻究问元精，我且嘱之曰：元精有真，不可以凡拟；真中有信，不可以律拘；为上天之秘机。愿再致思焉，可矣。</p>"}, {"id": "xf_lx2", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "二、散问答类", "content": "<h3>二、散问答类</h3>\n<p>长沙王朱星垣 二问 长沙郡王，吉王太和之堂弟，号星垣，未登仙派。</p>\n<p>一问曰:精满不思欲,炁满不思食,神满不思睡。必如何得满,</p>\n<p>亦必如何知得是满,请示教?</p>\n<p>伍冲虚子答曰：得满则有知，而满则由于补。如补精之法，谓之筑基。凡人之精，已为淫媾耗损，无修仙之基，为不满之物。大修行者，补精时，必遇精生于先天之真时，即用火以薰蒸，薰蒸即补也。补到化炁，而在内未发生之本炁，亦并得薰蒸之炁补。即此炁纯，无精可生，便知实满。百日内事也。精自满，窍自闭，大药一到，淫根自缩，同于童子。从欲不可得，何用思欲？世所称返老还童者是也。而阴藏如马蝗之说，乃为世尊三十二相之一。此欲界执身不行淫者之功。若精窍不自闭，淫根不缩如童子，不如世尊之阴藏如马蝗，则不得谓之精满。淫根既断，即得长生小果。若能躲避三灾，亦可如吕纯阳祖所谓寿同天地者。亦可如佛说，寿命几千万亿劫，几阿僧祇劫者。从此以上出欲界，而升仙界。心在入定化神，不至思欲。《楞严经》所谓“淫机身心俱断，断性亦无”。是也。又何思欲之有？然先补精，有神炁配合时，固已补得神炁俱旺。及所化之真炁，超脱过关时，前之炁归元海为坎实者，渐渐以坎实点离虚。虚得实而皆实，即有所谓“禅悦为食，法喜充满。”实则不饥，何用思食？《太上胎息气经》云：“呼吸如法，咽之不饥。”《尸子至德经》亦云：“吸气以养其和，孰能饥之？”是也。然十月胎圆者，固皆不食。初一月即能减食，三月而谷自辟除，四月以后绝火食。当知此后真不食，故曰：炁满不思食。世尊亦云：“如来应供等正觉，尚无所食。”此而犹食，犹是有生死的凡夫，无定力也，不可得谓之炁满也。如《楞严经》所云“食地中百谷，足不离地”，必使身心二途，不服不食，我说是人真解脱者。若不食，则已渐入于仙。仙则神满。神满者，纯阳无阴也。古仙谓“分阴未尽则不仙”。如有一分阴在，即有一分昏沉睡魔。十二时中，灵光不自觉照，神亦如何得满？则不可谓之以神补神，则不可得谓之神满。观太上云：“转神入定，以成至真。道如不备，仙亦不成。”我故曰：必使神住定，炁</p>\n<p>亦随之而住定。神炁俱定，从一日之一日起，即能不睡。昼夜常觉，惺惺不昧。十二时中，无一时不入定，亦无一时不在定。如是，十月之间，方得神满不睡。既无睡，又何思？到此心无生灭，息无出入，已成阳神。仙佛到此，皆出阳神，便出色界，到无色界矣。不存知见，而全归于无为，炼神还虚合道之义。当知此，又神满以后，九年面壁事也。</p>\n<p>又问:可是别有精炁神,补此精炁神否?</p>\n<p>答曰：非也。真正金丹大道，非待外求。只是自身中，现在精炁神，当发生长养向外时，还于身中，合而为一，归根复命。自然发生长养于内，自然充满，亦强名曰补、曰满，实非补、非满也。说到神满时，精炁尽化于神矣。神定于见性，妙觉同于虚空，出无色界矣。何满之足言？</p>\n<p>二问曰：闻古人云：仙养神胎，炼炁化神，而出阳神。佛修禅定为悟道，道成则出定。昨者，言仙全是入定出定，莫是以胎息转为入定之名。抑以佛法，可拟之仙法否？</p>\n<p>答曰：皆非也。《道藏》经中，有《太上妙通转神入定经》云：“转神入定以成至真。”昔张天师云：“神一出便收来，神返身中炁自回。如此朝朝并暮暮，自然赤子结灵胎。”即此经义也。有《太上斗姥本命延生心经》云：“修炼九还七返大丹者，持此顿悟玄关。灵光现前，了证太玄三一之道。知守本来真身，更能精修大定，乃至形神俱妙，与道合真。”有《太上胎息气经》云：“安静则神定，神定则气和，而元炁自至。”有《太上智慧本愿大戒上经》云：“当制念以定志，静身以安神。”有《元始天尊得道了身经》云：“息依神定，性定命住。性命双全，形神俱妙。”有《太上九要心印妙经》云：“神定则炁定，炁定则精定。”又云：“意定神全水源清”。又云：“饮食太饱，息炁难定。”又云：“息依神定，神凝炁结。”又云：“性定命住为养火”。《文昌经》云：“万炁齐知，得入定门。”又云：“修真妙行，初定通炁。大</p>\n<p>定全真，妙行通灵。”经之所垂训者，皆如是可定。又，钟离真人云：“三关不固，神炁不定，岂不走失元阳？”又，王重阳祖云：“圣胎既凝，养以文火。安神定息，任其自然。”又，张紫阳云：“恍惚杳冥，定之象也。惟定可以炼丹，不定而阳不生。阳生之后，不定而丹不结。”又，陈致虚云：“炼己日久，六根大定。”又，马丹阳真人云：“神不外游，精炁自定。”又云：“安心定念止，湛然不动，名为真心。”又云：“工夫常不间，定息号灵胎。”又，司马承祯《坐忘论》云：“但心不著物，又得不动，此是真定正基。”又《中和集》云：“造道原来本不难，工夫只在定中间。会向时中存一定，便知日午打三更。药物只于无里採，大丹全在定中燒。”曰：“无念之静定纯熟，可致无生。”曰：“九载三年常一定，便是神仙。”又，陈泥丸云：“以端坐习定为採取。凝然静定，念中无念，工夫纯粹，打成一片。”又《还真集》云：“湛然不动者，谓之定。定中觉灵者，谓之慧。”又，白玉蟾云：“以虚无之境界，为静定之工夫。”此诸仙翁之所言定也。未有性不定，而可谓之成道者。予今以二家言异旨同者，而重宣之：仙家言胎息，言如胎中之息；息之在胎，呼吸不及于外，而若不呼吸者；渐入于定也。此息定，而性随之定，炁神皆为一神；神既一而全，而大定得矣。《楞严经》亦云：“既游道胎，亲奉觉胤。”又云：“形成出胎，亲为佛子。”所以云：出阳神，即是出定。邱真人云：“息有一毫之不定，命非己有。”为此言也！佛家言入定，以初禅念住者，心不外驰，而不着欲境也；二禅息住者，如胎中之无息，正父母未生前也；三禅脉住者，呼吸绝而气息定，惟内炁之息定，而后身外之气脉不动，手无六脉，大死一回之验也；四禅灭尽定者，胎息久久绝无，一得永得，大定而能常大定，胎完神就之说也。胎完足，自然要出阳神；定极，自然要出定；本一也，不可异。识得了，原来只是这个。</p>\n<h6>伍守虚 二问</h6>\n<p>一问曰:昔同于曹门问魔事,曹老师云:“凡遇魔来,有心中偶起</p>\n<p>一念，为内魔。或身外有见有闻，皆为外魔，即天魔、邪魔等。速用焚身三昧火，为降魔之法。”我今忘却，请为我再言之？</p>\n<p>冲虚子曰：三昧者，佛言正定中之受用也。所谓燃臂燃身者，即如是。此正邱祖法门所言之定法也。而仙言薰蒸四大，与焚身三昧何殊？火气盛，则魔不能容；如世尊出火降毒龙，降六邪师，降野牛，及入三昧火中，而降毒龙。又云“火化以后，收取舍利”者皆是。而真我藏于火中，则不见有魔矣。</p>\n<p>二问曰：古云“得之者早修，莫待老来铅汞少”。《太上灵宝大乘妙法莲华真经》云：“精多则魂魄强，炁少则性情弱。”又云：“人有久视之命，而嗜欲灭其寿。若能导引尽理，则长生罔极。”每见至铅汞少者，不知彼修如何？</p>\n<p>答曰：一者亦有师传仙机，採药炼精，内补筑基之法在。二者亦有服食草木凡药，外补之法在。单用其一固可，兼用其二速效尤神。故《黄庭经》云：“百二十岁犹可还。”钟离《灵宝毕法》云：“晚年奉道，而炁不足，十年之损，止用一年工补之。”此言补于筑基也。然有补之易者，亦有补之难者。修行者，因炁以长炁。而炁太衰者，则长甚难。灵根凋于中，长之迟缓，故补之亦难。易补者，谓阳炁虽衰，尚有生生之机，所谓“一年补十年，精神可复盛。”而成童体。若难补，则有阳痿之类者，阳炁阳精将绝，无可补之隙，则必用敲竹鼓琴以唤招。《悟真篇》云：“敲竹唤龟吞玉芝，鼓琴招凤饮刀圭。”后人皆以此为衰老所修者言之，予曰近似。但精既竭，而无顺以生人之具，即是无逆而生仙佛之本。有顺则有逆，谓见色便见心者，此也。谓“众生即佛”者，此也。无顺则无逆，乃所以补之难也。邪淫之人，借此机会诱人曰，必用女鼎採补。不思女人身中无精，何採何补？与仙道以自精补自精者，大相违悖。世世愚人，无由得闻正道，故轻信棍言，陷入淫坑。以速死之事，诳称不死之道，而不反思。终日逐年，眼见得，愈採女而愈败精。愈习久战，而愈不能久战。取胜保身，穷极岁月，徒劳而无益。何似得一至简至易</p>\n<p>之药饵为补哉？故仙家有至玄妙至神效之仙方，非採补而同于採补者。若以世法用之，固能战胜。以道法用之，即能补精，全治少壮已来之病，大助衰老及身之阳，可不珍重求一方耶？然所以无顺生者，是何故？或以房劳之故；淫媾多者，精竭而筋弱，不能至老而自痿。或以採战所胜；习採战者，昼夜淫媾无度，意谓有补，而实受其伤。精尽耗竭，而筋亦早软，不能至老。或受地气湿故；坐卧住地卑湿，则湿最软筋，而瘫痪皆由于此。或受浴水湿故；凡人未知学道之先，行在世间事，其淫媾之后，不宜入水。遇冷水，则永为阴症，此人人所已知者。遇热水之浴，最受湿而伤筋，故筋亦软。此人所不知防者，故多犯。至筋软者，软则不能复劲。至筋缩者，缩则不能复伸。皆绝生理之由也。所以生理绝者。则必曰：其续得生理者，而后能长其生。长生者，必要精充实，即是元精足。元精足，即是元炁足。得生理者，则有精可以补精炁。故曰能长生。思惟曹老师昔云：“精不足者，补之以炁，精不足，即是精枯竭。採不足之精，而归根，行小周天火候，薰蒸日久，则所归之精，得炁助而生精，而精自能足矣。形不足者，补之以味。”形不足，即是形痿缩，或专心于敲竹鼓琴，而招唤者，其动虽有常而稍迟缓。或兼用外药草木之五味而补之，则效速。故以五味补而求形足，生精而补精也。遂乃授予一妙药仙方，炁味俱全，兼补虽易而能起死回生，易为採取助成大道，谓之助道金丹。此亦盖世无二之方也。凡衰老若无此药以回生，则必不能速还丹而成金液矣。昔抱朴子云：“先服草木以救亏缺，后服金丹以定无穷。”即此说也。不忍私之一己，用以公之同志。令在世者，得以补衰种子；令超世者，得以助道还丹。</p>\n<p>又问:请示方之名,药之味,制之法,治之症,施为有用之言,普救无边之众。可乎?</p>\n<p>答曰：陈希夷华山西岳名。碑记之方，勒方于石碑，亦永传之意也。名曰老奴苍龙丸。老返为童之义也。老人衰痿者，能起之阳。缩者能伸之。中年虚弱者，能补之。皆可复胜于少壮者万倍。凡世人之精冷及男根冷者，服此一月，即能种子。歌曰：“此药甚灵验，添精神髓堂。去冷除</p>\n<p>风疾，扶经更起阳。老成宜修合，秘密莫传扬。服之保元气，延寿永安康。”传此方者，谓陈总兵得之于安土官宣慰司，具百金贽而得者。其声价之高，则效验果亦甚异。广木香五钱，治浮渗尿脬中遗尿渗漏者，因元气耗竭之故也。小便秘。此药味温苦而气降，制则用生姜佐者则效速。晒而为末及成丸后，皆只日晒，忌见火烘伤性。治又破结气于中下焦，逐积年冷气。灯心二钱，通利窍，通小便之窍，使精尿皆可通。利小便，治癃闭成淋者。用从草中新剥出者佳。制则难成末，须以粳米粉，作浆浆之，晒干为末。入水洗分澄去沉粉，取灯心浮者，晒干。配数难制而耗拆多，须多制，方可足配数。破故纸又名胡奴巴。一两，大温涩能治脱，治脱精之症。故得元阳坚固，骨髓充实。治劳伤，房劳之所伤者。除囊湿而缩小便，暖丹田，腰痛、膝冷、肾寒与阳痿。酒浸去皮，用麻油拌炒熟，去麻，瓦焙熟更好。忌羊肉、云台菜。核桃肉一两，治房劳伤，止腰疼。甘平无毒，去皮，另研拌。破故纸为一处，以此引破故纸入肾。牡蛎粉一两，用左边顾而大者佳。煅微红，採用中间，如粉之处。四边坚硬者不用。入肾血分药也。同熟地黄用最益精。止尿管遗，遗精、遗尿俱治。止鬼交精遗。梦遗也，又治老痰。车前子一两，端阳时採，去净外衣，择实子。童便浸，炒干，勿伤火。入膀胱通尿管，淋漓涩痛，不走精气，益精强阴，止尿血，利水道，令人有子。此种子之要药也。马兰花一两，酒浸晒干用。药店中不知辨认此药。按《本草》云，味辛平，无毒，生于泽畔，形同泽兰，气臭，花紫似菊，北人呼为紫菊。若无此则用泽兰，原是同种，而同治法。生泽中者名泽兰，生山中者名山兰，三种原是一也。能破宿血，养新血，止吐血。又治鼻衄及血痢。萆薢一两，茎有刺根，白实者良。切片、酒浸、晒干。忌食羊肉。补肾益精，缩小便，治阴痿失溺，强骨节。又治痹，除风寒湿、止腰背冷痛、筋骨掣痛，明目。韭子一两，归心益阳，止茎管白浊遗精。同桑螵蛸用，止漏精补中，止梦遗小便数，治下元虚冷，小便不禁。凡世人之遗精，由淫想无穷，房劳太甚。病发为筋痿，为白淫随溺而下者，并治。木通一两，利小便，泄湿热，泻小肠之火。又治丙丁之</p>\n<p>火，诸经湿热，皆使由小便泄去。肾虚者，亦慎少用。山茱萸肉一两，酒蒸，去核，用净肉。性微温，补肾兴阳、长阴茎，益髓固精、节小便、止滑精，阴虚者极当用之。暖腰膝，明目，逐湿痹，治耳鸣，除风邪强力。桑螵蛸一两，气平，二三月无桑叶时，收之则易寻，晒干，炙熟。用生者，则泄大肠，亦风药中专用者。治虚损肾衰，益精、强阴、补中、除疝、止精泄、愈白浊、通淋闭、利小便。又禁小便自遗、身衰精自出。房劳致小便利者，加而用之。川中来者，大于大拇指。全蝎净身一两，去足尾及内土俱净，炒褐色，方妙。治疝气。又治风痰、中风口眼歪斜、掉眩、搐掣、耳聋。母丁香一两，壮阳。又温暖腰膝，杀甘蜚，坚齿。紫稍花一两，《本草》无此种名。昔秦州刘子，指池水中蒲草，心上有花，示予：此花甚能兴阳起痿，为天下第一灵物，乃做鞋三棱蒲之花也。似柳花及似菖蒲花者更长大些。如大拇指大，三五寸长，无心无梗，如蜡烛梗在如烛之下。江北一斤只卖银一分，每两一文钱，近于所出也。金陵曾见每两卖银一分。用羊脂酥拌炒为妙。予问：此味何功？答曰：人犯房事后，水湿伤筋，故筋软筋缩。以此治之有神效。肉苁蓉二两，酒洗，剥出身外浮甲，劈除心内竹丝样膜筋。酥炙，忌铁器勿犯，微温无毒。治绝阳不兴、泄精、尿血、遗沥，补房劳，坚强筋骨，能除茎中寒热痛、膀胱邪气。暖腰膝，长力。远志二两，温去心，用皮，以热甘草汤浸一宿，晒干用之。不去心者，令人闷。忌食猪肉、生葱、冷水。肾中气分药也。益精壮阳，益肾气。强志倍力。菟丝子二两，气平，水洗，去砂，次以酒浸，蒸，捣烂作薄饼，晒干，为末。益气强力。补髓添精、止梦泄、强阴、坚骨。治茎中寒精自出、尿血、溺有余沥。蛇床子二两，平，揉去皮壳，取仁，微炒去毒，即不辣。有壳则辣。治阴囊湿痒，炒为末，撒上即干而不痒。曾用此单一味，屡验。坚举尿茎，令人有子。种子必用之要药。白茯苓二两，味平，而气降。去粗皮中纯白无赤筋者，方好。有赤筋，最损目。研末，入细布袋，用水揉洗，取白粉，用滤去赤筋，令净。凡补药中，以人乳汁拌，蒸晒九次更妙。入膀胱、肾，助阳，利窍，通便，不走精气，长阴、益气、除湿。又养神、祛痰。仙灵牌二两，</p>\n<p>又名淫羊藿。羊食之多淫，故名。凡生长之处，不闻水声者良。五月採用茎叶。叶似小豆而圆薄。茎细亦坚。雷公云：叶四畔有花刺，用镊刀镊去。净细而切，以羊脂拌炒，每斤用羊脂四两，炒脂尽为度。绝阳不能兴者，即能兴。补肾虚，得酒助，良。治劳气病，冷风，老人昏耋健忘者。巴戟天二两，微温，选用肉厚连珠，中间紫色者佳。击破者肉虽紫，又有微白糁如粉色者真。酒浸一宿，晒干用。止梦遗，精滑，补虚损劳伤阴痿，健骨、强筋、益精，肾之血分药也。八角茴香二两，性热，盐酒拌湿炒用。主肾劳、疝气，治膀胱冷气起诸痿。当归全二两，气温，去芦苗，酒浸蒸。全用者治血不足。湿痹不举，腰痛。又治中风挛蜷，客血壅塞，客气虚冷。沉香七钱，微温，咀而韧柔，削而自卷，名黄蜡，沉者妙。必烧试，有油多者真，市店中每以烂船板，假充者多。得此真香入丸，只宜风吹干，忌用火烘，恐伤药性，无功。助阳益精。又治冷风，肢体风湿，骨节麻痹。又云：火盛阴虚者，不宜。干漆二两，予谓此不必多，五钱也可，再多不过一两也足。用生漆桶近盖上自干者，状如蜂巢，孔孔相属者为佳。辛温有毒，炒去烟捻指成末，为度。炒热用者无毒。生者损人肠胃。畏鸡子，忌盐油。续筋骨，故筋缩筋软者用之。杀虫，服此初坐者，不生虱。补中，治湿痹。除心气血痛，去症，通女人月水。熟地黄五两，曾用过六两。微寒，酒浸烂，石臼捣如泥。先以蜜和，稀匀后入众药则易匀。培滋肾水，增气力，填骨髓，益真阴，补元气。大黑蜘蛛七个，曹老师云：此物阴寒，有大毒。旧传云有此一味。我闻李老师述张老祖云：旧传有此不敢妄删。但服之恐生头瘟，及各疮疽。曾经过数人，多现症腹背。旧本存之。去此方无弊。治疝偏痛，肾子个上个下。大人、小儿，皆受湿成此疾。愚谓此味，伤其七生，不必用。若肾子无个上个下之症，更不必用。曾不用亦妙。共廿七味，制完为末，共有四十两四钱。二斤半之数。用生蜜四十两与药等，将蜜炼至滴水成珠，只三十两为率，每斤必要炼十二两。和药时，加清水十两，凑足四十两，每炼蜜十二两，必要凑四两水足成一斤。则为丸，易晒亦易干。和药捣千杵，丸如梧桐子大。将有四斤半丸。每服温酒</p>\n<p>下三十丸，空心或早或临卧，每日一服。七日见效。太虚弱极而阳久绝者，五十丸更妙。服半月即如少壮。或连服半月、一月，又隔三月、五月，再服一月、半月亦可。或在蒲团上催工之时，连服不间更妙。予说此方之妙无穷。何以见得？盖药非劫性，又非偶用而暂效者，乃平常逐日所服，能养元神、补元炁、元精。坚其骨，补其血与髓，则颈项腰脊坚硬如铁柱。利于坐。坚其筋、益其精，则易生旺而易採补。无凡情欲事者，亦可用，并无有害。有凡情欲事者，亦可用，其功胜膏散涂贴者万倍。胜用女鼎假称採补，无益有损者，如天壤之隔；空劳岁月者，如水炭之异。实乃顺用之，足以助生人之道；逆用之，足以助生仙佛之道；利益无量大哉！服食丹药之一端也。其能返老还童也，有如此。予谓：倘中年、少年有服此者，或疑其略热；外加小甘草三四钱，黄柏三二钱，少滋肾阴亦可。</p>\n<p>又问:昔有以饮食滋味补者,与此草木药味补者,大较何如?</p>\n<p>答曰：不戒荤食者，或以膏脂厚味为补，或以腥辣助阳之物为补，汝我亦所共闻。第恐妨天曹之禁戒，曰斋戒者，道之津梁。而亦难于具办，非贫家之所能。虽用者而效亦缓，不如药食之为美。药贱时，只消用银一两，可成丸一料。药贵时二两三两银可成一料。大约四斤半。二三老可足一年服用。堪为助道之因者，安可不为之。吾戒荤辈，遵抱朴子之言，只重以药食为世教也。</p>\n<p>又问:方近于房术计,莫亦不宜于正耶?</p>\n<p>答曰：似房术而不为房术用，亦何妨？但生生之理同，不过以顺生为逆生，总成就一个逆，则成圣而已耳。慨观希夷留此方在世，已七百余年而未尝遍为世用。今而附梓流通，以出世遍于天下，极于未来劫在世出世者，皆得用。普度宁有涯哉！所谓不能以百日而返炁者，以此药之能返者，兼用之，少谓一助其速耳！有道之士，珍之！若财力不及用此，则有机先生药之工，以精补精，以炁补炁，在前语矣。后来圣真亦详而自量之。</p>\n<p>顾与弢 六问 与弢,名昭,应天府</p>\n<p>学庠生。滔音滔。</p>\n<p>一问曰:如何是摄情归性?</p>\n<p>伍子答曰：性为人心，虚灵至静，尘念俱无之时，便是先天。真阳之炁，由至静而微动，谓之鸿蒙一判。有可为媾精之具，性真便亦觉其有可为媾精之具，则此发觉便名曰情。俗谓之神情。复此神觉，还为性真，当摄此炁同归，故曰摄情归性。其实即採取配合之说。是以《参同契》云：“金来归性初，乃得称还丹。”金即真阳，亦即所谓情也。古云“二五媾精，妙合而凝”者，正同此说。凡言情者，兼神炁。如儒家言气质之性，性附于气质而动为情，则亦从摄于性，而复性也。</p>\n<p>二问曰:昭与弢名闻元精有清浊老嫩之辨,正不知用老为是?</p>\n<p>抑用嫩为是?</p>\n<p>答曰：至清，而合于无过不及之时，是也。《易》云“初九潜龙勿用”，喻元精微动而炁嫩，则其发生变化不旺，故云“勿用”。“九二见龙利见”，喻元精壮盛而炁充，故云“利见”。如郑思远真人所云“月圆玉蕊生”是也。即其勿用于初，而利见于二；便知用炁足之二，不用炁不足之初；而天机判矣！我《直论》所谓“嫩之炁微不结丹”者，以此之过于嫩，而炁不足补其炁，精不足补其精之谓也。又谓“老之炁散不结丹”者，以极老而太过，言即亢龙之有悔也。亦如“月缺金花卸”，及“金逢望远不堪尝”之说也。但看过嫩过老之皆不宜，则其中自有可用者，在《直论》所谓“非觉而动”者言也，“实动而觉”者言也。“觉而不觉”者，言辨初阳嫩之过也。“复觉真玄”者，言见龙利见之时也。若到此当机，又怕迟慢，失其正炁。所以邱祖门下徐复阳真人云“披衣又恐起来迟”，亦言防其炁散也。此便是採药时之危险也。凡用工时，于此炁足之元精，只要不着欲念</p>\n<p>的,便是先天纯清;着欲念计较者,则浊矣。念念在道,自然真清。</p>\n<p>又问曰:炼成大药亦有清浊老嫩辨否?</p>\n<p>答曰：初正则末持，源清则流清。惟清真之精炁，和合神炼，而始生大药。则大药之清真，即由元精之清真而成者。初不清真，则炼药不成，安有大药？此不必辨，而辨在中矣。</p>\n<p>三问曰:凝神入炁穴,不知还有呼吸升降否?若有升降呼吸,不知又如何凝入?</p>\n<p>答曰：许旌阳老祖云“太阳移在月明中”，又云“金乌飞入姮娥户”，即此义也。升降者，是採取烹炼之要旨。凝入者，是归根复命之密机。但升降而行也，神炁合一，神在炁中；不升降而住也，神炁合一，神在炁中；不说是“凝神入炁穴”，也不得。</p>\n<p>又问曰:昨闻教言,妙于升降者,由颠倒用之,始得其妙。此尚茫然不解,愿再详其说?</p>\n<p>答曰：当升则专升而不降，谓进阳火者是也。进足，则颠倒之以为降。当降则专降而不升，谓退阴符者是也。惟是升之专，则採取方有得；专于降，则烹炼方有成。非若世人只知以一呼一吸，便为升降者比也。所以纯阳祖翁谓“大关节在颠倒”者，正言此也。若不识此，虽採取，而不得所以为採取；虽烹炼，而不得所以为烹炼。万万不能成丹也！</p>\n<p>四问曰：先生于冲和之理，其中答作用之问，以夫妇昼同行、夜同住为言，固可臆知。第不知彻首彻尾皆如是乎？抑有时如是、有时不如是乎？愿详其说。</p>\n<p>答曰：夫妇为一神一炁之喻，同行同住为心息相依随息之说。初关有神炁，则有小周天，故可以如是言。中关炼炁化神，有炁有神，而至于无炁有神，由大周天而然。可以如是言其似，而实有不如是之妙。在末后上关无炁，则无火候行住，无昼夜周天，唯炼神还虚，顿然见性地位，则不可以夫妇言者，非二物也。一神且归于</p>\n<p>无,何况二乎?其冲和之炁,本属有于初关更真切。</p>\n<p>又问曰:小周天如何以子午十二时为言?</p>\n<p>答曰：一天之周，原有十二位。按斗柄所旋转之度，周一日之时；故借喻言十二时，用九六之理数也。世尊所谓“见明星而悟道”者，此也。世人或闻推移斗柄运周天之说，遂以心运气，行十二位，此亦可笑也。何以故？为其心已逐气外驰，则神不定、失真炁，而炁不凝聚，丹已走矣。必不能证圣者！禅宗人拘拘然，只谓“北斗里藏身”，又谓“北斗望南看”之说，落此局中矣。</p>\n<p>又问曰:必如何得不如此?</p>\n<p>答曰：斗柄外移，而天心不离当处。六时进火，六时退符，而天心亦不以进退而离当处。离此，则非我祖钟离仙翁“凝神入炁穴”之理也。</p>\n<p>五问曰:先生语胎息之初,谓从无入有而实无;于不息之中,而或暂有;有无兼用。愿详其说。</p>\n<p>答曰：依文悟之，自见其妙。再观之北七真之孙不二元君，马丹阳真人之妻。夫妇同拜王重阳真人门下。姓孙名不二，号清净散人，生三子矣。随夫成道，与邱长春、刘长生、谭长真、郝太古、王玉阳七人同师，称北七真。有词云：“有中无，无中有。有些儿做有，无中里面搜取。无内藏真，有里却如无。无有双亡，还同太虚。”明此，则知亦过半矣。</p>\n<p>又问曰: 日日精思, 犹不得其有无景象, 真“聪慧过颜闵”不能者?</p>\n<p>答曰：任你有精思，有问辨，不过劳心之幻役耳！未若实行工夫所悟之得真实也。所以孔先师云“思而不学则殆”之病，与“学而不思则罔”者等也。君再思中用学，即得其妙。</p>\n<p>逾日又问曰:有无二字终难投窾,必详言而后可?</p>\n<p>答曰:无者无息,有者有息。即如在胞中,成胎之所以息。初结胎本无息,渐有息,而十月成,生而离母,则我心中无息,息在鼻</p>\n<p>矣。今要在身中无息处，而作为有息，故谓之从无入有。既入有，则有息；若愚人，便强执着有息之相，便堕有相虚妄，是病非真息也。故云：实无。息相还证不息之胎息。此二乘菩萨厌生灭而趋涅槃寂灭之时，不能顿已于生灭出入；故于不息中，而或暂焉少有微息。此有无兼用，亦未完胎神，未得大定之初机为然。若非有无兼用之渐法，必不能至离相寂灭；便堕强制外道，则非仙佛正宗无息无相寂灭为乐之本者。知此而行，方可得无有双忘，还同太虚。</p>\n<p>六问曰:六候进退,但闻其理。请详如何用于实悟时?</p>\n<p>答曰：理明事，事行理也。本非进退，乃借虚喻以说明此一端之理耳。若必执进退二字，而勉强言之。盖古以子至巳，六时为阳。子丑寅卯辰巳六时也。阳合乾，故用乾爻乾策。乾爻用九，而四揲之，为三十六；故阳火亦用九，同于四揲。子丑寅以次，皆用四揲之三十六。乾策，总六爻之四揲，二百一十有六；故阳总六时，亦二百一十有六。以午至亥，六时为阴，午未申酉戌亥六时也。阴合坤，故用坤爻坤策。坤爻用六，而四揲之，为二十四；故阴火亦用六，同于四揲。午未申以次，皆用四揲之二十四。坤策，总六爻之四揲，百四十有四；故阴总六时，亦百四十有四。合之得三百六十，而完一周天度数之义。但其中犹有卯酉二时，不用九六四揲，则不满三百六十之数。前言三百六十者，亦只大略言其火符之粗迹耳。我承圣师所授，曰阳火，曰阴符。谓定而静者，属阴以不行火，而阴若符合火之候也，故为阴符。《阴符经注》，骊山老姥授李筌者，曰阴者，暗也；符者，合也。即此义。如是，则行而动者，即属阳而为阳火矣。凡一切十二时中，分分明明，行九六有数之火，皆当曰阳火。一切时，阴阴暗暗，不行火，而暗合火者，皆曰阴符。行动者似进；定静者似退；若究及精微密悟，必如此悟之，为得真实玄妙。</p>\n<p>又问:有言夜半子时行阳火,日中午时行阴符。似说只子午二时行者,不知如此亦似此理否?亦可成个甚么否?</p>\n<p>答曰：甚非也，绝无所成！但有犯说拘于天时，即是邪妄诳语。为我命由天，非我命在我不由天者。只因自己无传，不知所以然之理，扭捏造为此言，以欺世耳。或却病家，亦借其说而言之，非仙道中和自然之理也。仙家火子之后六时，皆用阳火乾爻；午之后六时，皆用阴火坤爻；乃身心中虚比。活用子午十二时，何等直捷自然！非止子午二时之太少，何等适宜？若用天时子午二时以行火，则我身中药生时，全不相遇，故不用天时也。</p>\n<p>又问:得传所以然者,何法何义?</p>\n<p>答曰：总是要遇阳炁自生时，取回以补阳炁，令满足耳。故将呼吸者，以收还阳炁，归于炁根，以薰蒸补助。若无呼吸，不能调和。若无薰蒸，不能补助。及至呼吸薰蒸，周天一周，则阳炁得补，复纯静矣。于此，若再加呼吸薰蒸，是不宜于静中强加功。必俟静而自动，又得阳炁发动之机，为可补阳炁者。总是要补，必求再生再补之理，要得真传也。</p>\n<p>又问:火候不宜断而不续,卯酉二时,不行火候,莫似断否?</p>\n<p>答曰:非也。神炁相抱而不离,焉得断?</p>\n<p>又问: 探封是子时前, 是子时内?</p>\n<p>答曰:前也。子起则名烹炼。</p>\n<p>又问: 探法与封法, 如何分别而行?</p>\n<p>答曰：当採时则用採法。当封时则用封法。当沐浴则用沐浴法。每次用周天，皆不异。《心印经》云：“三品一理。”《大涅槃经》佛言：“达一切境，不离一法。”达摩祖亦言：“六候别神功。”是也。</p>"}, {"id": "xf_lx3", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "三、评古类", "content": "<h3>三、评古类</h3>\n<p>评古引语 十三问</p>\n<p>引语曰:古今来学道,必仙道大明,从仙师降授而得者,而后可</p>\n<p>以说仙话、垂仙教。不然，妄言之，罪莫大焉！若不明宗旨，唯蹈袭古人几句糟粒旧说，惑世坑人者，元太虚、阳葆真之作《直议真诠》，尹蓬头之作《万神圭旨》等书是也。他如卢丹亭之作《广胎息经》，最邪妄、最淫恶，诈托旌阳为说，僭渎帝经为名，罪深无间地狱。不必言之，而可易知其为邪。唯是似是而非者，最害人之深。不知道者，信其为道；余则见其非道，每欲为众辟其邪说而未及。兹因周友携至，命之评阅。余因得以所欲言，数彼之妄。令后贤不堕其坑阱，是所愿也！</p>\n<p>一问曰：紫阳、玉蟾二真人皆言“凝神入炁穴”，《直议真诠》云“神至灵妙”，如何凝聚得他？此一句，是《直议》之说，甚错处。盖息念而返神于心，此一句，是张紫阳自释凝神二字之说。葆真引来，释入炁穴之义，犹觉差些。则炁亦返于身，渐渐沉入炁穴去，此二句，皆阳葆真《直议》之说，亦差。二说不同，请问如何即是？</p>\n<p>伍子答曰：彼言神返于心，则神归本位矣。炁亦返于身也，只言归得本位。不似张白二真人所说，神入炁穴是神炁有交媾在此，正有修为处。非神返炁返，各归而不合一，便谓可证道者。此《直议》之错认心与炁穴，大悖道也。况张白二真之言，出于钟离祖化神前之言，安可妄议之欤？</p>\n<p>二问曰：葆真子议无炁穴，谓元阳真炁散于四肢百骸，又为视听言动，岂有区区藏一穴之理。此议如何？</p>\n<p>伍子答曰：人当受天命而生时，则元炁是本根，原自有著落处，故发明之曰炁穴。及在四肢百骸，视听言动时，炁之绪余为用者也；犹为本根仍在炁穴内。虽有不为身外之用时，亦有本根仍在炁穴内。且人不能一日无元炁，即自有所在。有穴无穴，虽不可见，何必议有穴无穴哉？不过炼精化炁时，以下丹田为主。炼炁化神时，以中丹田为主。皆由三田反覆，有行所当行、住所当住。化炁时，固在下丹田，而炁穴又岂在下丹田之外而别议之耶？元精藏于</p>\n<p>肾，不发动时，即是元炁；而可谓炁穴远于下丹田乎？强议无炁穴，自己落空亡，则归根无所归，复命无所复。后学毋为所惑也！</p>\n<p>三问曰：元太虚议云“凝神入炁穴”，只是收视返听，回光内照而已。葆真子议云，非是执著所在，而用意观照之，不过虚静以返神于内。其师徒二说孰是？</p>\n<p>伍子答曰：元太虚所议八字，乃阴神家活计，非仙理也。葆真子所议，乃空亡之妄语，无果证者。殊不知，钟离仙翁所言“凝神入炁穴”者，正世尊所言“心目所在”之谓也。彼借回光内照四字为训，但可训凝神，不能训入炁穴。要知仙真所谓回光内照者，异于是！当炼精化炁之时，即回照精炁；当炼炁化神之时，即回照炁存神；当炼神还虚之时，即回照虚。固不可著不相关之处用照，亦不可著内用照，皆落空之境耳！去仙机颇远。所以佛说：“七处征心，皆无有是。”独俞玉吾所言“回光内照，呼吸太和”，是炼精化炁时之内照，以其有呼吸太和四字而知之。至炼炁化神，非呼吸之可言，所以钟离正为炼精化炁而发。元葆二说，不足以语此。</p>\n<p>四问曰:李清庵云:“毕竟如何是道,须向二六时中校勘。”不与诸缘作对的,是个甚么?</p>\n<p>伍子答曰：此禅家套语耳！不知仙真上圣、诸佛世尊之所谓道者，无形、无情、无名，至虚极之妙也。其所谓道生一，一而生二。今言缘、言对，当知缘一也；对缘者我，又一也；则二非道矣。此之缘，即尘也。对缘者，即根也。亦是有人相、我相之二者。不与缘对者，去缘而尚有我在，著校勘亦有我在。此世尊所谓我相未除，皆为虚幻耳。我为道中之一物，一为道中之一数。一在，故未至虚极之妙，安可指一谓之道？一在，即神在也。佛宗中，所谓万法归一，一毕竟要归无。化神时，此心著不得缘境。一著缘境，即堕六道。虽化炁时，对缘而心著之则不化炁。何莫非不对缘而遽称为道？唯如斯而已哉！殊不知炼神还虚，还之无极而至极，方为与道合真，齐肩于仙佛者</p>\n<p>也。今古尚无，又岂可以二六为言耶？</p>\n<p>五问曰：《坐忘论》云：“勿于定中急急求慧，求慧急则伤定，伤定则无慧。”此说是否？</p>\n<p>伍子答曰：此言非也。何以知其非？盖人之性体，灵照是慧；动而发用，从耳曰聪，从目曰明，逐于外不定于内，则失慧矣。张紫阳真人谓之走丹，即此。不用聪明于耳目，而回光复其本体，则名慧、名定；是名慧于定，不名慧于不定。定此慧，即名定。不定此慧，则不名定。彼云定中求慧，则视为二矣。果定于先者何物？而反言求慧于定中，不知已定者便是慧，何待于求？此所以非我天仙顿法道理，一性而二称者，同语也。观定慧，是一不是二之言，亦相应，能已知此矣。</p>\n<p>六问曰：金丹必言鼎器，如何即是？</p>\n<p>伍子答曰：“先把乾坤为鼎器”，此乃仙家起首之定论。</p>\n<p>又问曰:李清庵乃云:“身心为鼎器”。又云:“乾心也,坤身也。”是否?</p>\n<p>伍子答曰：乾非心也，乃《易》所谓“乾为首，坤为腹”者，是也。行得三田反复之工者，方能真知炉鼎之妙。</p>\n<p>又问曰:然则清庵云乾坤身之说,非欤?</p>\n<p>答曰：彼亦误也。古云乾坤身者，是取将坎位中心实者，点化离宫腹内阴之理。言坎肾中阳，抽出而成坤。心离中虚，填实成纯阳之乾。乃百日关中，炼金丹时之造化，及十月成神之所证也。彼清庵遂混一言之，不发明所用之理，不分辨所用之时，则非也。若必求鼎器于身心，唯百日炼金丹，其烹炼之工，用下丹田为鼎器，可以坤身言，不可以乾心言。心离虚，尚未得坎阳填实成乾也。盖乾为首，乃有妙用在乾，而归根在坤，非言心穴也。十月炼神丹，用中丹田为鼎器，可以心言，不可以乾言，亦不属于坤身，而其妙用归根，皆在心，非身也。则知清庵之说，与张紫阳真人所言乾坤共为鼎器</p>\n<p>者不相合。此秘密天机，学者须要得个真知实授来，始能用真鼎器、真皈依而后可成道。不然万炼千修，毫无所益。</p>\n<p>又问：鼎器之说，更多有言脐者；言非脐者；言脐下一寸三分者；言外肾上之毛际者；言心肾两间，折中之当脐上者。诸说，亦有可用否？</p>\n<p>伍子大笑曰：皆非也。此巧言惑众者，无根之可归，无命之可复也。金丹大道，因有丹之名，曰丹田，就是生长金丹之田也，非针病灸艾，何用点穴为也？</p>\n<p>又问:今言金丹、神丹,何所分别而二名之?</p>\n<p>答曰: 肾中真阳之炁, 名水中金; 炼肾中精而化金炁, 故曰金丹。炼炁化神, 故曰神丹。</p>\n<p>七问曰：昔紫阳真人云：“元性非他物也，亦炁凝而灵耳！”请详其旨？</p>\n<p>伍子答曰:但看天地,亦炁凝而灵,而人之小天地者,即如是。此张真人发万古之所未发,令人真知性命之宗。</p>\n<p>又问:如何是炁凝而灵?</p>\n<p>答曰：人从父母二炁初合，只为一炁耳！此炁渐化成微形，中即有一点灵光，如萤光朗耀，渐微动为呼吸之状，呼吸成，形体全，而神明具也，以生。由是而观，非炁凝而后灵乎？且谓仙道炁凝而灵之妙者，原夫精化炁者，精由炁化，使炁不化精，而复补全其炁；炁以化神，而仙道成，则纯是一神，而不见有炁；非炁凝而灵如何？唯此一灵，以动而用，则曰元神；在静时，则曰元性是也。</p>\n<p>又问:如何补?</p>\n<p>答曰：古云：“以精补精，以炁补炁”。凡人当至虚极之时，元精元炁将发生，而为世法用，此正元精元炁生长之微机也。我则不以世法用，而还归之于原，则元精元炁得外来生长之机而生长之矣。正所谓“金丹内药自外来”者，于此。生而採取之时，即补之时也。</p>\n<p>运小周天火候，烹炼薰蒸之工，即补之工也。得此时此工，则机相乘而相投也。不得此时此工，则后天呼吸之气，无可施之理，亦无有益之用，先天精炁亦不得其所补以生长也；则炁不凝而不灵，何以脱凡而证圣哉？</p>\n<p>八问曰：昔一人究玄关一窍，李清庵云：“于二六时中，行住坐卧，著工夫向内求之，语默视听，是个甚么。”此言是否？</p>\n<p>答曰:大修行人顿法门头,于语默视听一无所著,谓之透得境界过。著了即系缚于尘妄,奚可生心向语默视听,求外驰耶?</p>\n<p>又问曰:如何为是?</p>\n<p>答曰：我仙祖李虚庵云：“一阳初动即玄关。”又《金丹四百字》亦云“药物生玄窍”是也。古人又言“非有定处，只是至玄至妙之机关”，则不止于一阳动而为言，亦不离一阳动而为言。总此大道虽多，事事法法，皆不无此玄妙机关。且如药生有时有处，是一玄妙机关。火候调息，进则进而不退，退则退而无进，行当行之道，住当住之所，是一玄妙机关。有鼎炉之在玄妙中者，则鼎中之烹炼，炉中之採取者是也。如炼炁化神，十月养胎，人不知前以炼炁之有为沐浴，即此玄妙机关。后乃纯神之无为沐浴，亦此玄妙机关。神有将出之景，亦有所出之法，如何是炼神，如何是还虚，超过虚无于寂灭至极，皆玄妙机关也。故紫阳仙翁又云：“一孔玄关窍，乾坤共合成。”又言此一窍玄关，即玄牝之门。冬至药生，火候沐浴，结胎脱胎，俱在于此，则一窍之旨尽之矣。志仙机者识之！然此至玄妙之机关，由真心实悟而得。若徒口说而不心悟，亦安有此玄妙哉？学者尤当勉之！</p>\n<p>九问曰：古人云：“心息相依，久成胜定。神炁相合，久致长生。”二者可能得否？</p>\n<p>伍子答曰：胜定长生，皆有先天之炁为心息之所依，为神炁之所合，非止言此出入息之气也。以出入息，是后天幻化之物，有成</p>\n<p>坏故。</p>\n<p>又问曰:有云“随息之法,与息俱出,与息俱入,随之不已,一息自住。”此言亦似心息相依,久成胜定之说,岂亦非欤?</p>\n<p>答曰：天仙家真息之妙，自有升降，而至于无升降，不可以言出入。有出入者，即凡夫，非仙圣上上乘顿法也。所以云：“凡人之息以喉，有出入息者。真人之息以踵。”无出入息者。徒播弄呼吸出入者，谓之守尸鬼子。无先天炁者，则无漏尽通，不能长生而必死者，故名曰：守尸鬼子。学者当精求所以为先天炁者，而后可言依言合。</p>\n<p>十问曰：“息息归根，金丹之母。”陈虚白此言如何？</p>\n<p>答曰：根者，元炁所居之地，烹炼金丹之所，大药所生之处，即所谓炁穴，亦曰产药之西南本乡。炼成金丹，则曰根基。是化神入定之所住基。凡炼丹时，採药于此，运用周天火候于此，则息息不可不归于此。息息能归于此，则三家相见，金丹可成，生出一粒黍珠，而为服食之宝。以其金丹之所由以生，故曰母。此百日关中之理也。所言息息归根，便有主张。归者，即神凝炁穴之理。</p>\n<p>十一问曰:何谓真人呼吸处?</p>\n<p>答曰：人之呼吸似天地，故呼亦出于天根，乾辟是也。吸亦出于地根，坤翕是也。旋乾转坤，是真人呼吸至妙之机，非脐肾中央口鼻诸处。范德昭所云“内炁不出，外气不入，非闭气也”，正知呼吸之妙者。人若不知呼吸之妙处，则不能炼鼎中之丹，去仙道远矣。最宜究竟。</p>\n<p>十二问曰:有云“修炼必至于胎息,而后炁归元海,方是纯神十月之工。”此言是否?</p>\n<p>答曰:非也。元海者,元炁之海,下丹田便是。凡十月之工,炁不归于下丹田矣。其炼炁与息皆至于无而为神,在中田矣;故非可以炁归元海言。</p>\n<p>又问:如何是炁归元海?</p>\n<p>答曰：元精元炁，生于元海。每将顺去，而为后天交感之精。真人依法採取，归于元海。烹之炼之，渐长渐盛，成服食金丹。故仙圣云“炁归元海寿无穷”者是也。此百日炼精化炁时事，非十月化神为言也。余故曰：未甚说透。</p>\n<p>十三问曰：阳葆真子《直议》云：“三宫升降，乃其自升降，非人升降。即犯著禅宗人所谓被十二时使者之理。周天运用，乃其自运用，非人运用。”此议是否？</p>\n<p>答曰：全是邪说，误人太甚！岂不闻古圣云“神运河车无了期”乎？钟离真人亦云：“丹田直至泥丸顶，自在河车几百遭。”刘朗然真人亦云：“华池神水频吞咽，紫府元君直上奔。常使炁冲关节透，自然精满谷神存。”者。所以古来高真上圣，教人升降要似自然。运用亦合自然。非言不用人力，而自然升降运用也。凡夫不行道者，升降由经络管系，非三田也。运用由五脏而循环，非周天也。唯能三田反覆者，方能三宫升降。得仙师秘授火符者，方能周天运用。所以邱祖长春真人云：“运行周回，自有径路，不得中炁斡旋，则不转。”学者当以此言质之。</p>"}, {"id": "xf_lx4", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "四、杂语答类", "content": "<h3>四、杂语答类</h3>\n<h6>杂语论 三问</h6>\n<p>一、或问曰：道人争高曰仙大，谓老子度释迦成佛，僧人争高曰佛大，谓仙必参佛而后成真，果有是欤非欤？</p>\n<p>答曰：无征而妄争者两俱非；有征而曲为强辨妄争者亦非；亦有两是可证而不可掩处。自释迦出世时，老子曾过函谷关，此时亦度关令矣。关令姓尹名喜，闻道而著《文始真经》行于世，西行可证者。西渡流沙，但未闻老子自言曾度佛否，佛亦未自言曾受老子度否，后</p>\n<p>人故不见犹龙之叹。邱长春真人，于元始祖四年壬午冬十月，西渡流沙河，止于雪山之阳。从元始祖皇帝征西域时所请也。亦未闻其自言，曾度何佛，曾参何佛。吾人皆当置之不必言，此无征者。又有俗僧，称佛先生而度老子，诳世人宗佛而勿宗仙。若此不过只为争衣食计也。我考之佛生于周昭王二十四年甲寅者。老子于商阳甲时入玄女胎，至武丁二十四年庚辰岁二月十五生者。自武丁起，一君。历祖庚、二。祖甲、三。廪辛、四。庚丁、五。武乙、六。太丁、七。帝乙、八。纣王、九。九君一百八十年；又历周武王、成王、康王、昭王四君，九十四年；共商周十三君，二百七十四年。是老子出世已先于释迦之岁年，非后于佛者。即令为佛之师也无不可。反妄称后于佛而受教，岂可乎？此有证而曲为强辨妄争者也。佛之言曰：“昔者仙人授佛妙法，如来因之遂致成佛。”后乃指其名曰阿私陀仙，乃西方五通之仙也。事在《法华经》，此仙度佛之有证而不掩者。昔阿般提国有仙，于大迦旃延名那罗尼依频陀山、阿私陀仙，得四禅五神通矣；后归佛修梵行，为佛大弟子。又，商那和修尊者，乃雪山飞行仙人也，见阿难坐于中流水面，跏趺入灭，飞空而至，阿难付于正法眼藏，而为三祖。又，弥遮迦尊者，中印度人也，为八万大仙之首，昔生于梵天，遇阿私陀仙，授法已经六劫，投五祖提多迦，得正法眼藏而为六祖。事皆在《传灯录》及《五灯会元》。五灯者，宋真宗景德间，吴僧道原作《传灯录》，翰林学士杨亿裁正而叙之一也。宋仁宗天圣中，驸马都尉李遵勖作《广灯录》，仁宗御制叙之二也。此俗人所作亦不足凭。宋徽宗建中靖国元年，佛国白禅师作《续灯录》，徽宗作叙三也。宋孝宗淳熙十年，净慈明翁明禅师，作《联灯会要淡斋》，李泳叙之四也。宋宁宗嘉泰中雷庵受禅师作《普灯录》，陆游叙之五也。宋李隐林大川禅师，以五灯浩博，学者难究，乃採辑作《五灯会元》。金大定时，另有《继灯录》。元顺帝至元间，云壑端禅师又作《心灯录》，皆详录前事者。此三仙参佛而成道之有证者，亦皆西方事与东土无干。我所云俱有是者，征此</p>\n<p>也。非若此而妄争则非矣。</p>\n<p>又问:东土有此事否?</p>\n<p>答曰：道光禅师，陕府鸡足山下人也。初为僧，号紫贤。先参修岩，问道眼因缘，金鸡未鸣时，如何没这音响之句；又参如环，问如何是超佛越祖，闻糊饼圆陀陀地之句；遂能宗说兼通，机锋敏捷，诸方无能过者。参悟到极处识破，无证果而生死不可了。乃自叹曰：画饼不可充饥。悟得个皆这边事，不过说禅谈道而已，于佛祖超劫寿命慧命全无干涉。乃参张紫阳真人门下石得之，姓石、名泰、字得之，号杏林，以地名为号者。闻仙道而成真证佛。又曰：投胎夺舍是执空之徒，伏虎降龙得还丹之妙。又曰：我教法门，只知悟性为宗；世尊所云先除淫根之妙义，金丹之道得药为上；然必明心见性为主，方为最上。若以精竭淫身悟性即成佛，万无是理。佛已说其落魔道。若不炼性而徒求金丹大药，终是渗漏无成。又曰：大丹未现前，大药未明透，一毫渗漏，抛身入身。圆明照了，兼修金丹，道成十极，号曰真人。此东土佛参仙之有证者，未闻仙参佛。</p>\n<p>二、李羲人癸酉端阳节遇问曰：今有一人自北都来南，自言顶门开矣。众验之果然。人能如此，可谓工夫久者，不知何工能得到此？我且走欲询之。</p>\n<p>伍子答曰：顶开有真假，自称为顶门开，假也无疑。</p>\n<p>又问曰:手验之则顶门边前后直长,一路皆动,如是而可谓假,吾不信也。</p>\n<p>答曰：君焉能识得破？信得假。君将谓顶门何故以开？盖为神出而开也。阳神阴神俱已到得真空大定，可以出定之时，则迸破顶门而出。阳神有六通，阴神亦有五通。若无神通；顶门不软；便是弄假。君可曾知他有神通否？</p>\n<p>李曰:未曾问,尚不知有无。</p>\n<p>伍曰：不必问。凡有神通者，千万世之先后，知见过去未来者，谓之宿命通。千万里之内外，有天眼通者，能见其形；有天耳通者，能闻其声。皆能见、能闻、能知；况百千步之间，不能用神境通而知见乎？当君去求见时，彼不先知所见之人，又不先知所见之意，则是无神境通、他心通矣。既无神通，顶门焉有开理？</p>\n<p>又问曰:顶门既非真开,何由得有这动?既有这动,何又言得假开?即此尊见与我见,便觉有一是一非,而不能两可者在也。</p>\n<p>又答曰：唯有这动，愈知彼是假弄法矣。世人不知顶门之真开者，不动，手按之则软。不按之，则不见与凡夫异。何以故？由神气大定，息也住，脉也住，神也住，而后能开顶出神，是顶门开于卤。音信。卤门也。但透其旧软窍之骨而不动，言神透骨而出，如火透水而出，勿由孔窍也。为无息脉之动。故若有息脉之动，则通身之脉皆同动；故小儿顶动正与息脉同动者。此理征之，勘破彼动之假也。</p>\n<p>又问曰:虽云彼动是假,恐亦难能得此动也。</p>\n<p>答曰：易能易知。只能瞬目之间而已。世有一等假行气者，自脑后逆上至顶，转前而下则顶之前后直长一路有动；是因暂时行气而动，非若小儿随呼吸脉动而动者。汝若不信，观察他不行气时不动，便识破他未开而假说。何故我又说他是假行气，为其平时本不行气，欲哄人观顶门之动，乃暂时行气以动之；不对人用哄，则不行气；是也。世间又有一等人，全不行气，乃务为诳人之捷法，叫人以手印试其顶，将眼睛双双上下连视之，一上下则一动，两上下则两动，不上下视则不动。动也只是浮皮，与骨开窍软，无相干涉。如此诡计，虽有盛德大志学者，不过初学见浅，焉能辨彼之奸邪？而遂轻信之。惜哉！惜哉！</p>\n<p>问曰:若如此容易假为得,吾人辈皆能顷刻能之乎?</p>\n<p>答曰:如今诸人便可上下视一试之;上下视皆动,不上下视皆不动,诸人亦是有工夫开顶么?</p>\n<p>又问曰:彼何为假此事?</p>\n<p>答曰:为人学道,须要把万种机心、恶心、妄心、欺心,一切割断,便断尽轮迴种子,做个了生死、证圣果的人始得。若堕在方外游说之党,无往而不为诳骗人之局也。识之慎之。</p>\n<h3>三、一 $ \\underset{\\cdot}{友} $问曰：尝闻 $ \\underset{\\cdot}{炁} $化精，今闻精化炁，何谓也？</h3>\n<p>答曰：人之有生以来，身中一点元炁是性命之宗。及至十六岁乃元炁自能化精之时，身体壮盛，能行淫媾则化精者正此。元炁化一分精则损一分炁，逐日淫媾太甚，精竭而元炁亦竭矣。至人炼金丹服食长生，必要元炁全足如十六岁时，然后得长生；精炁不足则不得长生。故已竭者，必要补之。补之之机，因其化精之炁机有动，方可补得。不然，不得元炁增长。凡炁机一动，趋事淫媾者则为精，乃世法中炁化精之所尝闻；不为淫媾而收回炁穴，外用周天火候薰蒸四大，则发动之炁因薰蒸而长旺，乃仙道中之精化炁也。所以元炁复足者，由于留得元精，不至耗失而得；即其由精而后炁足，非精化炁而何？</p>"}, {"id": "xf_lx5", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "五、本行纪类", "content": "<h3>五、本行纪类</h3>\n<h6>万苦修仙歌</h6>\n<h5>冲虚伍子有仙阶，</h5>\n<p>万历元年住母胎。癸酉改元，神宗皇帝年号。母王氏孺人，自嘉靖壬子年六月初一日生，至崇祯庚辰年十一月二十日酉时，无疾而坐化尸解，所谓白日为真尸解，乃升天及生天之类。</p>\n<p>父由贡举齐青教，父健斋翁，嘉靖时，中江西榜贡举，壬戌科中会元，为权贵所夺。乃就齐地青州府学教授，虽甚贫窘而甚甘清廉，乃善人。而君子修仙佛者，必生于仁贤父母之家，方</p>\n<p>是因果不昧。古云：“一人得道，九祖升天。”当知有圣父母而后可生圣子。</p>\n<p>却从文庙毓吾来。文庙是文宣师孔圣人庙。</p>\n<p>母梦庙前榴树果，</p>\n<p>颗颗如丹又如火。</p>\n<p>吞之一颗化生人，</p>\n<p>十月将过遂生我。</p>\n<p>又梦环胎九凤多，</p>\n<p>仙兆重来瑞若何。</p>\n<p>二年正旦朝将午，</p>\n<p>翻身下降入婆娑。</p>\n<p>半载随官临浙浒，浙西绍兴府粮储盐法别驾衙内也。</p>\n<p>伯阳仙里绍兴府。伯阳魏真人也，生于上虞县绍兴府之所治。</p>\n<p>五龄父别牧滇南，滇音颠。云南有滇池。时为云南维摩州牧。</p>\n<p>所怙文章黄盖土。以官卒也。</p>\n<p>十龄奋志明经学，</p>\n<p>得遇重阳祖七篇。先天章一，后天章二，坤宫章三，乾宫章四，玄宫章五，黄房章六，地雷章七是也。</p>\n<p>十三岁初生异志，家有立斋叔翁，中明经科贡举，而志于学道。此时见立斋叔之书，谓学道证仙，亦即生学道之异志。</p>\n<p>念念寻真求出世。马自然云：“此身不向今生度，更向何生度此身？”见此怎不生长生之想？</p>\n<p>十六许可批其文，</p>\n<p>不向桥门争二试。</p>\n<p>廿龄名利便休心，时岳翁之地，有连主仙祠堂，乃范登云真人兄弟三人仙</p>\n<p>祠也。显灵无二。吾以名利成败问之，签曰：何必分胡越，藩篱剖即家。脱身烦恼障，飞雪衬烟霞。此亦指予之有根缘也。</p>\n<p>儒衣敝履幡然弃。</p>\n<p>家中颇亦有红陈，</p>\n<p>无奈三年水荒至。每自三月至六月，雨多而水涨。民无平土之居，农无西成之望。</p>\n<p>不敢荒年受福多，</p>\n<p>也食蓼根十数次。蓼根者，无种无苗。万历戊子己丑年间，江西岁大饥，偶生此物于河泮沙洲，如簪脚大，三四寸长，或微红，或白，可末为饼食。土人寻食疗饥，予亦求邻家老，食数次。意谓减禄求增福也。后岁不饥则不生。</p>\n<p>涉水传餐救饥人，时有滔天之水，贫者绝食。每日跣涉送饭，救人饥饿，力为苦行。</p>\n<p>足指生疮痛及身。</p>\n<p>衣遭跌湿朝三换，</p>\n<p>饭竟加粱日倍蒸。</p>\n<p>仓中空谷皆人货，</p>\n<p>券上售钱有几诚。口称水荒，心存骗局。</p>\n<p>此情有若婴孩拙，</p>\n<p>便是修仙性地仁。以谷借出而不收入，似无知之婴孩，利人而损己矣。究此施仁积德，亦真赤子之心也。</p>\n<p>二旬五月得逢师，生年初至二十岁。</p>\n<p>还阳曹姓戚之儿。姓曹号还阳，邱真人派下，法名常化，生于南昌武阳之精渡处，祖、父皆富。闻庐江县李虚庵真人有道行，治装往，谓得天仙之道。前此别有一人，亦号曹还阳，住镇江府，注丹经谈外事邪术者，与此不同。后学不可误以为此，而妄信其言外者。</p>\n<p>南昌同县武阳地，</p>\n<p>三里邻居遇个迟。</p>\n<p>一论天仙最上理，</p>\n<p>请到家中时扣之。</p>\n<p>谓我先人世有善，</p>\n<p>谓我前生佛授衣。初生于青州府之官衙才数月，有术者曰：此禅僧之转生也。</p>\n<p>前生修佛犹昨日，</p>\n<p>转世夜眠恰如一。</p>\n<p>今生今日得逢仙，</p>\n<p>醒后昨心还不失。王夐真人云：“自修证五六劫及证此身，念念修心，倏已一世，形骸虽改，此心不忘。”</p>\n<p>持到中秋八月时，</p>\n<p>卖田护师同入室。家有父宦囊余，荒年为贫饥者，散尽去而不回。及至自有所为，必有卖田之势。</p>\n<p>师之兄曰公子家，</p>\n<p>势焰偏高怎及他？</p>\n<p>骗得道闻又取宝，此亦慎择弟子之一端，所谓师寻弟子难者是也。</p>\n<p>乌能悔辅度人差。</p>\n<p>且做生涯还本利，</p>\n<p>我自为之更甚些。</p>\n<p>弟兄同到宁州宿，</p>\n<p>信个山人解梳木。</p>\n<p>山人骗去半本钱，</p>\n<p>到家折尽愁思哭。</p>\n<p>语予折去百数金，</p>\n<p>愿把外丹酬你欲。烧炼点化成金银之术，世谓之炼外丹。当此时，师只肯</p>\n<p>受外丹，不肯授内丹。此见仙师重内甚于重外。</p>\n<p>我求超世证仙真，</p>\n<p>何欲丹金堆过屋？大修行人，家且宜必舍，绝其俗念，岂可恋外丹而生一心传乎？予轻外，由于重内，故不受。</p>\n<p>予唯不好师固传，师云：汝惟不好炼丹，是不贪富贵势力，德已不亏，志已特异，故可传外。且仙度人传内未有不传外者。资外以修内，汝且受之。但无妄为妄传则可矣。</p>\n<p>但记在心著在目。壬子春，遂与师同炼于豫章城西，西山之后溪水涯次。铅砂凡体入池煎，</p>\n<p>黑尽白见成金木。虽曰二体，即古所谓“一物含五彩，亦作仙人禄”者是也。其中金木水火土之五行俱全。青龙、白虎、玄武、籴雀之四象俱备，而后成其为白。予师所谓：一转成母者，即此是真母。昔旌阳《铜符铁券注》，乃吴猛《直指灵文》所言：每黑一斤可得白二两，则三十六斤得七十二亦验。</p>\n<p>面上片片红桃花，</p>\n<p>心中颗颗碎金粟。此即名白金，名乾金、兑金、庚金、水中金、火中金，若鸡子。铅汞名真铅真汞，为天上之至宝，神仙之秘机。</p>\n<p>真铅真汞是此真，除此炼成得真之外，余皆世间之凡物。</p>\n<p>物白物黄皆此物。此得水火既济，交并金木之神气者，为神丹之根基。是白而又是黄，非黄而又非白，内外皆若黄白二色，故仙家称黄白。世人无由能闻，亦无由能见，故亦不知黄白是何物，名黄白是何故。</p>\n<p>鼎鼎薰蒸化天禄。炼即此，烹亦即此；养以此，而乳哺亦以此。有此，则丹可还，故曰金液还丹。无此，则丹不可还，必无成丹点化服食之理。纵烧炼百年空废家业，所谓“朱砂未白头先白，水银未死人先死。”势所必至，可不慎之？</p>\n<p>超之脱之即丹铅，超者，离黑而超出白。脱者，离白而超出神来，所以谓之神丹。若非得此铅中丹之神物，必无成道之理。</p>\n<p>暗进明进如酒曲。暗进者，暗进神水、暗进神火，属烹炼之工也。明进者，明进神水、明进神火，属火超脱之工也。暗进者在固密之中，明进者显然在外。所以此妙绝与世法不同，与世谈者异。若不能如此，则非丹道，不成。不成，学丹者当安分已矣。</p>\n<p>壬子春来一试焉，</p>\n<p>般般已验符亲嘱。师授已多年，尚未经手一为之，亦乏资财之故。及见《渔庄》所云，大丹只从四两起手，何不一试为之？况思而不学，终是危殆不安，是以不得不试验而为真用实理。</p>\n<p>虽堪点得住世金，三转灵光大现，即能点化。</p>\n<p>怎敢妄为满天福。</p>\n<p>未惜食田屡卖之，</p>\n<p>依师远出相随逐。试在壬子，授法在癸巳。虽传其法而不肯为其事。故甲午又卖田，随师参究仙道。若非如此坚心，恐亦不得闻道。</p>\n<p>宁州旅邸投徐家，</p>\n<p>粗饭常朝难食足。初离家之膏粱甚难饱，食其粗粝。</p>\n<p>渴时苦菜药般汤，</p>\n<p>夜后柴房虎伴宿。</p>\n<p>孔方用尽囊且空，</p>\n<p>疮毒生多眉又蹙。</p>\n<p>孤身安饱不暇图，</p>\n<p>修仙决志无疑卜。信之真，学之笃，心无疑二。</p>\n<p>也不为时尝政事，不求功名，专于事隐。</p>\n<p>也不帅师抒火计。火药之法，有攻战守之全能，实护国安边之长技。幼时只图分茅祚土，故学之。见钟离弃侯爵而成仙，亦且弃置于无用之地。</p>\n<p>七书八尺若为仇，七书者，兵家之武经七书也。八尺者，观世音菩萨所遗少林寺之神枪，有劈打之法，又名夹枪棍，皆用武之具。修仙佛者戒杀心，正要戒所以杀事。</p>\n<p>百史五经不再识。识，记也。五经子史，文士博学之具，为治世之需。既治身心则不治世，故不必再记。</p>\n<p>璇玑倒杖尽休哉，璇玑者，斗柄运转，以明星象周天之占候。倒杖者，地理法扦点穴法所宜，即球檐天心十道葬坟墓之仙机。修行择地异于此，故亦不用此。</p>\n<p>禽遁握奇俱已矣。禽遁者，演禽之数，及遁甲八门之法，兵家卜吉凶、决胜负必要之机。握奇者，安营寨排兵布阵时，在中军帐独持至一之枢机，所谓运筹帷幄之中而决胜也。</p>\n<p>时值周基日有余，</p>\n<p>五月廿二奏天衢。遇师一年之后，无一日一时不问道，此而知心识志，方行表奏天庭，及紫微中宫，请天命而决可传与否。许传则传，不许则止。仙道禁戒至重，不得私授于人也。</p>\n<p>投词符节合同了，投词者，誓之词也。重阳真人之门人马与孙等皆焚誓状之类，是也。世之后学，皆投词于师，此则投词于上帝而请帝命付符节。符节者，即《洞神经》云：升天券以青素带，身临升之日，五岳不见此券，则拘人不得升；水神不见此券，则留人不令升；地官不见此券，则不得升度；天官不见此券，则闭天门不令升进。得券则前入紫府见大道君，然后一切诸神不敢拘制。此天仙度弟子之所有事者。</p>\n<p>刺血灵官王证之。抱朴子云：至秘重者，莫过长生之方，故必歃血盟誓乃传。欲修长生而不谦勤亲师，至要宁可得乎？求心不</p>\n<p>尽，令师告之不多，秘何及得？浮浅之示，岂足成不死之功？若此之人，亦终不得教之。</p>\n<p>在我耳边说两句，</p>\n<p>聊通一丝修仙路。</p>\n<p>不是等闲人可闻，</p>\n<p>修仙便要应仙度。古神仙身事歌云：“天人须选天人学，上天不擢下愚人。”</p>\n<p>从今隐处辟邪市，辟邪是乡间地名，市则有街道贸易。</p>\n<p>朝食忙趋日问师。予隔师家五里许，每日早饭毕，即趋侍师而问道。</p>\n<p>一年间有三百日，</p>\n<p>半月参将百二时。</p>\n<p>十五年间勤侍教，</p>\n<p>万千句里切寻思。</p>\n<p>眼见师餐饮两顿，</p>\n<p>心忘我受腹重饥。每日问道见师餐两饭矣，我尚未及一餐。亦愿效发愤忘食者，故如此。</p>\n<p>整整忍饥不想食，</p>\n<p>渐渐肠疼不识医。饿日久，则伤而肠疼，亦不识为饿伤而求医。</p>\n<p>问到黄昏方返舍，</p>\n<p>或明或暗到家迟。月上早则明，月上迟则暗，随着差马火把而行。</p>\n<p>家中饭办炊三次，</p>\n<p>倚门人望不归儿。</p>\n<p>如此朝朝并暮暮，</p>\n<p>祷苍唯愿道闻之。</p>\n<p>每逢朔望进黄表，每月朔日、望日，表奏上帝，以祈恩赐，全道果。有天仙三催师度。</p>\n<p>一坛清醮奏青词。闻道之后，己亥年春，建醮，谢天地及历代传道之圣师。</p>\n<p>又斩无常三十夜，</p>\n<p>勤心进道有天知。斩无常者，保全一年不死之法，有符诀咒以斩断之。</p>\n<p>仙机佛法都问过，</p>\n<p>誓今决要天仙做。徐灵府云：“学道全真在此生，迷徒待死更何生？今生不了无生理，纵复生知何处生？”</p>\n<p>生平诸病欲将无，凡童稚时所得哮喘风湿等，皆愈而欲无。昔丹阳真人在终南西游华亭，偶宿窑崆，中土津火毒，吐血发喘。道友曰：当食生葱、酽醋可解其毒。予谓道家有病，他人莫能医，自治足矣。修炼身中至宝，厥疾自瘳。又词云：“欲要解四假违和，炼身中金玉。”</p>\n<p>些小句言便称贺。试道行即有验，凡得一句一言秘妙，无不跃喜称贺，幸有前缘。</p>\n<p>万般职分总休心，效所谓全抛世事。</p>\n<p>一念机缘全炼我。我者，即自己妄想私心。炼有我之心至于无我，便入无生之际，寂灭为乐。</p>\n<p>道若不明仙不成，</p>\n<p>枉作世间人一个。誓志此生必要明道成仙。若不如此，则前世似实修而人生于今；既得人今，何不以之而修仙，不亦枉然乎？</p>\n<p>曾求妻下耳金环，</p>\n<p>并下银钗凑护财。化气将完，护者要财用甚急，不得不委曲，求为应用。</p>\n<p>网巾圈子割还尽，圈子及钮扣用废殆尽。</p>\n<p>护得师工大药来。</p>\n<p>师家少食我推食，</p>\n<p>师家少衣我解衣。</p>\n<p>孀慈罪我倾家计，废家业之资多，不免渐渐萧索。</p>\n<p>荆布愁予远案眉。举案齐眉，凡世夫妇之大愿。修行者，未成时，离家以修之；已成后，无家之念虑，荆布焉得不愁予远。</p>\n<p>家众贬讥图个甚？世人图富贵，图饱暖，必图成家计。今反废家业，抑何所图而然。</p>\n<p>乡人谈笑愿何为？抱朴子曰：“予忝大臣之子孙，弃当世之荣华者，必欲登名山合神药规长生也。”俗人莫不谓予为狂惑之疾。然不废人间之务，何得修如此之志？王重阳真人，一乡皆说为害风，谓其轻弃家业，为狂惑害风。真人亦自呼王害风而不辞。</p>\n<p>几遭骂辱凭干唾，有恶侄每持刀杀人、降人，有骂辱至，闻而不闻，则闻魔自消；正炼己法也。</p>\n<p>便逢欺打未还捶。曾有二人将欲痛殴，以不还而消之。</p>\n<p>说来不尽千千苦，</p>\n<p>学道如吾未见谁。</p>\n<p>师言汝志我已知，</p>\n<p>苦心学道是仙机。</p>\n<p>十年三受天仙嘱，</p>\n<p>速我将伊毕度之。一日老师谓予曰：汝于仙阶已有分者，从十年以来，曾三次有天真命我速速全与你道，我今亦知汝矣，当度与汝也。</p>\n<p>此道先须辨真伪，真者，成仙之真机，元精所生之时真，採取配合之时真。</p>\n<p>伪者，凡一切后天有形之精，皆不可成仙者，是伪必要先辨。</p>\n<p>真者长生阳神贵。长生不死是真元精所修，后阳神现像，神通变化，皆用初辨得其真。</p>\n<p>炼精化气气化神，</p>\n<p>神还虚矣名极位。</p>\n<p>精生本是元精生，</p>\n<p>不是凡精后五行。</p>\n<p>淫精淫事凡精者，</p>\n<p>浊秽焉能证洞清？</p>\n<p>只为浊形不化气，</p>\n<p>无形之气始飞昇。</p>\n<p>元精一返补还满，</p>\n<p>证个初基自有灵。此即炼精化气，筑基有成功者。</p>\n<p>精满无生超欲界，精满不思欲，故曰无生。既无淫欲之具，如世尊之所谓阴藏，则超出欲界之外矣。</p>\n<p>心灵方出尘凡世。</p>\n<p>五龙捧圣到南方，</p>\n<p>入定还神功可大。南方者，离宫心象也。即离宫修定、炼气还神之说。</p>\n<p>未到还神必欲还，还神者，即转神入定也。未还则驰于外而不定，未有不定之仙佛，必要还于定。</p>\n<p>气停脉住不庸餐。气停,则气满而不思食;脉住,则气灭尽定而不用食。庸即用意。</p>\n<p>只为北堂孀秉节，</p>\n<p>可无孝德了其间。</p>\n<p>忆母年将九十足，</p>\n<p>金陵孤子归宁速。</p>\n<p>成道世尊两视亲，</p>\n<p>岂我潜修违所欲？母有啮指之呼，不敢违所欲，奉天教诫而全孝道也。</p>\n<p>蓬头垢面已多年，昔白玉蟾彻夜坐，晨亦不沐，昼亦不炊。或客来有问，以牙疼为辞。无酒亦醉，睡醒亦昏。</p>\n<p>蒲团兀坐不成眠。天来子云：“学道先须学打坐，若还空坐亦徒然，画饼充饥终受饿。”</p>\n<p>一任顿超无量劫，</p>\n<p>不须犹说未生前。定到超劫，则证到未生前矣。无可再说，再说未生即是</p>\n<p>有生，落二义者。</p>\n<p>天先地先先有我，先有我即先天地之元神，所以超劫运者，不随天地同坏。不生有我是真我。真我，则不生有我之念，是大寂性体。在天地及大劫运度之上，故不随以坏。若有我，则犹是天地之有后者，为天地之所生，焉不为天地之所灭；若无我，又同天地之无，天地坏我即坏，皆非真我；惟我而不我，是为真我！</p>\n<p>我到地天无无无，无无亦无，是至极之极。即经所谓玄之又玄，妙之又妙。方许天仙是这个。这个者，是真我；无无亦无。我既无无亦无，视天地无无亦无矣。视大劫运度无无亦无矣。天地虽随劫坏，犹若无无亦无之天地，何系于我？故不随坏，而常存于无无亦无！故曰这个方是这个真我。</p>"}, {"id": "xf_lx6", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "六、杂咏类", "content": "<h3>六、杂咏类</h3>\n<h6>道咏斋杂咏</h6>\n<p>和吉王太和诗五首</p>\n<h6>其一</h6>\n<p>道凭一字作根基，道在无极，且无形无数，乃生有形有数之一太极也。一而生二，阴阳也。二而生三，精炁神也。三而生万，变化无穷。</p>\n<p>运化从心妙转移。炼精化炁，以心主宰乎其化。炼炁化神，亦心证成其化。此有心之运化转移，固不外于心。及炼神还虚，得虚灵独耀，非执着幻妄为虚空者，实无心之妙用也，亦不外于心。正三界唯心之说也。</p>\n<p>金自水乡还白液，白金生于黑铅水中。亦喻肾水中，生真阳之白炁。乾金</p>\n<p>兑金者，是也。</p>\n<p>木由丙穴返青  $ \\underset{\\cdot}{璨} $ 。丙穴，南方火地也。言汞木之青者，由丙火生出，乃迴返于丙内，是汞出朱砂内之义。亦喻外驰之神，复凝返于内也。</p>\n<p>丹凝神炁栖玄谷，玄谷者，即炁穴。神驭炁凝于玄谷，炁凝神亦凝，二者凝而成丹。故曰：丹凝。即凝神归炁穴之说。</p>\n<p>星拱罡台照碧溪。碧溪者，即神水华池也。罡者，北斗第七破军星之称，遁法中所谓指者吉。台星者，罡前之三台星也。同罡旋十二位，即斗柄运周天之说。拱罡台，是神行，即炁行也。照碧溪，是神住，即炁住也。</p>\n<p>待到无垠块圠境，垠(音寅)，言无涯无际也。块(音秧)圠(音扎)，言鸿蒙混沌也。即证虚无境界时，同佛生灭灭已也。</p>\n<p>黄庭独坐伴夷希。夷希者，不见不闻也。黄庭者，中宫也。独坐者，绝对待也。伴夷希者，即佛寂灭为宗也。</p>\n<h5>其 二</h5>\n<p>旌阳曾为斩蛟来，晋时许旌阳真君，斩蛟精至长沙府。</p>\n<p>一剑功神径自迴。斩蛟已，迴于南昌。</p>\n<p>千二百年吾复至，旌阳迥后，于今又千二百余年矣，吾复至此，虽非为江上蛟精，却为斩肾水中蛟精而来也。</p>\n<p>几微一窍炁重开。一窍者，玄关一窍也。炁重开者，先天一炁，生生不已，开而复开也。採药有时，时至神知，亦予所谓觉而不觉，复觉真玄之说也。</p>\n<p>丹凝玉鼎风生耳，三宝合炼于鼎中，真阳与真性，凝结而成丹。玉鼎者，古人金炉玉鼎者喻炁穴。丹既凝，谓之大药玄珠。採之将至，先有风生于耳后；风声至，则大药亦至。</p>\n<p>火伏金炉息注胎。下三字，申明上四字。息注胎者，安神定息，谓之怀胎还神。时时息定，则成胎。胎成则息自住，不出不入，</p>\n<p>神息常住，而顿至灭尽定矣。</p>\n<p>此道久将无用处，总言十月，还神定性，从有入无，而实证无生；以无为寂灭，为大用者。</p>\n<p>求生舍我更寻谁？此句，有二说双关。一说，是汝今求长生之道于我，既得闻正法仙道，更不舍我所说，而别寻邪说，乃由汝之真性笃，故能如是也。一说，是求道悟道，而求生证道，必由我自己所为；笃信坚心，凡精密工夫，他人一毫力着不得。</p>\n<h6>其三</h6>\n<p>元精何故号先天？</p>\n<p>非象非形未判乾。无形象未分天地时，即先天。申明上句，名先天之故。</p>\n<p>太极静纯如有动，太极者，虚之极、静之笃，即静纯。如者，此未为必然之词，凡若有动，当知。《清净经》“动者，静之基。”</p>\n<p>仙机灵窍在无前。灵窍者，炁穴生机之灵。无前者，无天之前，即先天。</p>\n<p>吕祖云：虚无里面固元精。</p>\n<p>梦回妙觉还须觉，妙觉者，玄妙灵觉。梦回者，马丹阳祖云：自然成真觉，梦里教知。是也。</p>\n<p>识到真玄便是玄。真玄者，静笃真动，机真觉灵真便是玄之真，我亦曰三真。</p>\n<p>说与后来修道者，</p>\n<p>斯言不悟枉谈仙。斯言者，为第四句而言也。</p>\n<h6>其 四</h6>\n<p>阳炁生来尘梦醒，答药生之句。</p>\n<p>摄情合性归金鼎。答採药之问。</p>\n<p>运符三百足周天，昔陈泥丸亦云：“但守火爻三百刻，产成一颗夜明珠。”天一周乃三百六十，何故三百便言足周天？以卯酉沐浴无</p>\n<p>父也。</p>\n<p>伏炁四时归静定。四正之时也。</p>\n<p>七日天心阳复来，筑基成、金丹已，即是阳精复还足阳炁，採以七日之功而大药生，曰阳复来也。</p>\n<p>五龙捧上昆仑顶。五龙者，飞升冲举之法也。知得此法，方能离地而上天。昆仑在上田，捧上三关而至昆仑，复落黄庭。</p>\n<p>黄庭十月产灵童，</p>\n<p>驾鹤凌霄任游骋。出阳神之后，任骑鹤游于龙霄汉，世称天之最上者曰龙霄汉。</p>\n<h6>其五</h6>\n<p>言铅言汞总言非，言非者之言非非，真言神炁也。言铅汞之言神炁之巧喻耳。</p>\n<p>日月齐轮御气飞。以神驭炁，二者同行同住，故曰齐轮。御气飞者，依于呼吸则能齐飞，不依呼吸则齐飞无据矣。</p>\n<p>子并后升天上去，</p>\n<p>午同前降地中回。子之六阳，神炁并从后升，曰上升。午之六阴，神炁并从前降，曰回于地。</p>\n<p>历辰十二皆留伏，十二辰者，用周天十二位也。留伏者，是喻神驭炁之妙用。</p>\n<p>灌顶三双默转移。三双者，每关双窍三关，则三双。灌顶必由之路。</p>\n<p>古圣强名为火药，身中非火药，借名火药以为喻，故曰强名。</p>\n<p>不离神炁自相随。神随于炁，炁随于神，故曰相随。即心息相依之说也。</p>\n<p>和吉王韵答所问，以上五首，皆万历癸丑稿。今人多是口称形空，口说修行，其实心不悟，弗识牟尼圣果。牟尼者，是宝珠，佛自修所证之妙果，与仙家一粒黍珠无异，人人所自有者，所当修者，世人乃不知为圣果所成而不知所求，但说了心哄套话。大修行人依仙佛正法以修法，了则心亦了，无法</p>\n<p>则无心。今人自不知心，又不知了。如见人来问，眼识之，心不了；闻人来问，耳识之，心不了；应对人之问，舌识之，心不了。念想将了心二字作好语以答人问，意识之心不了，自将不了心之局，遍教人学之，何似教人吞砒救饥，怀水救寒！如是而自谓已了心，真乎否乎？必如仙佛所教，离欲心实无为，了心于欲界矣。如所教禅定，而禅心无想，禅性无生，为了心于色界矣。如达摩面壁九年一定，如佛四万劫一定、八万四千劫一定，全寂灭，出无色界，斯谓之真了矣。</p>\n<p>，道名不一，得何道也？《华严》二十三参云说何地狱道，何畜生道，何阎罗王世间道，何天世间道，何人世间道。《经》言如此。愚按：淫欲者，入畜生之道也，必持戒绝淫妬，身心俱绝，可谓之得免畜生之道。修十善全，得生人世间之道；修十善多，得生天世间之道；修四禅灭尽定而寂灭，得不死阿罗汉菩萨之道；行佛所行，住佛所初觉而圆满正觉，得佛之道。因予门有禅友不知修何得何而证何，故详举《经》言及道少助真传见而已。今之时，师只修无修无证，既扫去修证，又何可言得道？若云不修而自得，乞食贫子人人皆得者，不由于修，则遍世间人皆自得，不必奔驰参学，其不用之修是妄，其自反供招，不足取信于天下，故其说得者是妄赞诳人者。名流者，张大名、扬于远方者之流，古人谓名无翼而长飞，由愚痴下辈得作一日之衣食，遂造为得道之赞扬，哄得遍世间人奔驰参学，流言不已。</p>\n<p>误杀阎浮后除人。此后若再不实参实悟，无真修之下鬼。</p>\n<p>醍醐未见芽穿膝，世尊醍醐灌顶，同仙家真液上升之喻，而今人未见得共灌。世尊芦芽穿膝之喻，同仙家脱凡捧圣之喻，而今人未见得其穿。既不同世尊之法，安能成世尊之佛？若欲成世尊之佛，必当修世尊之法。我又为吾诸友劝之勉之。</p>\n<p>鹊巢何由雪满眸。世尊有鹊巢灌顶之喻，言顶上有如鹊声之喷喷，即鹫岭之义也。世尊眼前有天花乱坠，故曰雪满眸。按：此二景有鹊巢为其出欲界之景，而后有天花为其出色界之景，今时人不知所以得鹊巢之景，何由得天花坠而雪满眸，欲修佛者抑何独不信佛此语？</p>\n<p>我欲一针通其眼，学佛此案，指与有眼者看。</p>\n<p>果谁同证果谁谋？深叹后学愚痴，惑于断见外道，谁能起信？我欲语而求同于我佛之证，而亦求闻我佛之言为谋，吾见亦罕矣！</p>\n<p>答陶先生见赠和韵 陶以诗来赠，云不向词坛学赋诗之句，故和之。</p>\n<p>道隐幽斋怕觉迟，来诗言睡起迟为颂，大非也，此但可与世法中人安富贵者言，我轻安乐者不受也。道法中初筑基习定采药炼丹，便能睡少而觉速，彼亦不见古言“披衣犹恐起来迟”之句也。</p>\n<p>正逢天女献花枝。天女者，离女之喻。献花者，药生之喻。药生必用觉照之，所以怕迟。</p>\n<p>知斯子夜金还候，子夜言活子时之意，即药生之候，故言金还候。金者，肾水中金也。还者，去而返还，即《参同契》言金来归性初也。</p>\n<p>便是庚方月出期。庚方月出，庚为西方，每月朔初三日初出于西方，言月之晦而暗，喻入静。而阴暗至次月三日，阴静极，暗而复光，喻人身中之炁静而复动，动之炁微如月一线之光微，金还之候即月出之期，下句重上句故，便是转其次耳。</p>\n<p>看过乾坤旋石磨，古云“一孔玄关窍，乾坤共合成。”此言旋乾坤之妙用，若已看见过，则一切世间事置了无用矣。</p>\n<p>任他尘世隔籓篱。只旋乾坤之不暇，如旋石磨之不已，任世人之学诗且置之籓篱之外，所谓远离世间法，妄尽即虚无也。</p>\n<p>虚空且尽何用语，乾坤尽处总是虚空，证到虚空又何用着语言为哉？</p>\n<p>怪煞狂言不学诗。陶以不学诗为讥意，以学诗为功，我以能诗为旧习妄念而灭尽之，以不诗除气而无舌耕，根之漏故，怪煞陶言为狂也。</p>\n<p>和陶先生卜隐韵卜居在涧洞未得,先以八行寄来,故出之。</p>\n<p>洞古经年之所归，</p>\n<p>几多岑寂剩斜晖。空洞无人居之景。</p>\n<p>可跌石冷吉祥座，世尊跏趺坐磐石之上，有天人刈吉草以为座，今已久无人座，故名冷。</p>\n<p>解语花含微笑机。花，恒河前之物，世称能解语，能含笑也。世尊因天女献花，拈之示众，惟迦叶一人微笑悟道，今者久无人拈，故曰含。</p>\n<p>欲讯人何离境去，以世情为言，是问前人何故离此生境去而不居。以道情为言，是诘言人是主人翁，境是一切有心有相有为皆是。问此心虽离境而不系缚于境，或者妄境能离，所以别有常住常乐处耶。</p>\n<p>待拈锡好傍空飞。以世情言，昔 $ \\underset{\\cdot}{誌} $公飞锡杖至潜山下居。以道情言，锡喻息也，飞锡傍空即心息相依而不着心息之相，斯为真息。</p>\n<p>不堪忽有栖禅者，不堪者，无奈也。忽有禅者，先正于洞栖也。</p>\n<p>先我陶君一展衣。昔誌公到潛山，展袈裟一覆之地为居舍，故亦曰展衣而住矣。</p>\n<h5>见达摩遗像</h5>\n<p>忆君当日叩鹦关，世僧传言达摩来东，至关前有鹦鹉言曰“西来的，教我一个脱笼计”，以此故称鹦关。达摩曰“东土之鸟亦能言，吾何以能化人？”返西而问师，得所答之法，复至关，鹦鹉</p>\n<p>复问，答曰：“合着眼，闭着口，伸着足，便是脱笼计。”如所说，关人谓已死，开笼视之，急飞去。又一说，言航海而来，凡三年而至广州。此僧人两相矛盾之说也，故两存之焉。</p>\n<p>不识空教对上谈。上者，梁武帝也。达摩初至金陵，武帝问：“如何是圣谛第一义？”答曰：“廓然无圣。”又问：“对联者谁？”答曰：“不识。”帝不悟“不识”二字之机，遂别去，向少林，故曰今空以不识对帝言也。</p>\n<p>石臼井泉何用记，世传山东古齐国之北有长芦监运司，其地有达摩修道之具，相传达摩炼丹筑基于此处，直至于今，犹有石臼及炼丹井、炼丹灶，留记在焉，僧人不信，我故强之曰何用此。</p>\n<p>灵心道炁枉言丹。灵心者，绝待灵心观为空假中三观之一空观也。道炁者，达摩作《显宗论》言阿罗阿波罗禅定之息法也，由于闻师菩萨提多罗言出息不涉万仪，入息不居阴界，当转如是经百千万亿卷之句，遂作此论。及《胎息经》极言丹旨，又作《金丹直指》近于仙家之言，而僧人谛言扫除一空，犹贬之曰：九年面壁自知非，不若抽身只履归。如此，我故曰枉言丹。对祖商量惜之也。</p>\n<p>折芦浮渡西来水，折芦渡江是达摩以工法渡过彼岸之义，愚人不知，误为折芦。之事即世尊芦芽穿膝之喻，亦同仙家五龙捧圣之喻是也。西来水，即西江水之喻，同仙家肾水中得西方真一炁之喻也。</p>\n<p>面壁长参少室山。面壁在少林寺之事，达摩在寺面壁而禅坐九年，人谓之壁观。自此之后，仙家皆同。此理禅人反贬斥之，正所谓夷子学于墨子而不从其教，终为斯人之自不幸也。</p>\n<p>怒视六花飞洒后，怒视者，若为怒目而视之喻也。六花者，天花乱坠之说，得定而出定时之景，此后则出阳神。</p>\n<p>岂劳只履悮人间。岂劳者，不必劳也。当汉明帝时，佛法初入中国，小小</p>\n<p>下果沙门来传之不真，化之不正，故楚王以帝之弟而学佛，聚众谋反伏诛，世累轻之，虽神光善说，犹不能证不生死阿罗汉，不免阎君之手，惟达摩得佛衣钵，是以取信，亦惟神光能自及知非，得真傅矣。愚谓达师便显神通，犹懼复东尘外道不能救，何示死而示葬熊耳山，示只履而归，不知狂僧又斥为尸解小果，误人间至于今，皆弃而不知学。我故曰岂劳。我以所遇即达摩所学，即达摩所修证，即达师略举其事，颂之以为后佛入师教，实修实证之考耳。</p>\n<p>过古峰洞 在楚浏阳县东三十里小谿也，其上即天涯塞居民避乱之所。</p>\n<p>石宝玲珑号古峰，洞名古峰，洞门前山建小寺，亦名古峰。</p>\n<p>虚中曾是有仙踪。世传有仙往来于此，深夜无人，每有声闻于外。</p>\n<p>灵泉暗自供丹灶，洞深无极，人可进七层，石宝泉出，成五七尺小河。通其流，跨流成泉，旁有石台，台前有天然丹灶七具，具径尺，此其中景也。所喻者灵泉为坎水，真一之精也，即丹家之药物，言药时时之有生，似供丹灶之炼。洞有灵泉，人有真水。</p>\n<p>翼鼠时来鼓巽风。翼鼠即蝙蝠，其大于鼠，黑者白者阵出阵入，每有数千来若风声，此景也喻丹之真息，息曰巽风，调息以炼神炁，故曰鼓巽风。</p>\n<p>唐士旧分题句景，唐人分景题句在石。</p>\n<p>明候新效补天功。明万历末，县令增修余景。</p>\n<p>吴侬自适将东渡，吴者，古吴西言南昌也。侬者，谓我也。将东渡海而登三岛也。</p>\n<p>不信人间即蓬岛。不知此间即三岛。</p>\n<p>过道吾山古刹 在浏阳县北三十里</p>\n<p>道吾境颇幽，有落脉落穴，后前可容三殿，左右各可容三，左右二水合于前，左右有山，右略高，中门流二水之合下为瀑布三五丈，洞约数百尺，之下有龙井，孙真人所针病龙潜居于此，九霄长老一徒，化龙于此殿，左有坑田二里许，万历初，有常住南垣和尚打虎于此。</p>\n<p>逸老强登游。逸老者是三教逸民也。本无游观，但为卜居入定化神，不得不一及此境。</p>\n<p>草织山腰路，路有石甃，瓦中为跨，左右则弱草交织。</p>\n<p>桥连洞口流。洞口之左，另有一流两相合跨，故桥连此洞口。</p>\n<p>石龙浮涧面，瀑下流五里许，洞中有石龙长丈余，大如斗，水流急则一首四足一尾活动如生，水深尺余，龙背尺三五寸，故见如此妙。</p>\n<p>仙座列峰头。山头殿有箭许有白虎山，其上有仙座对奕，游人掷石碁子山下，次日在坪中如故。</p>\n<p>不见高僧定，宋时道吾山有宗智禅师，后有九霄长老，虽有大名，不过死此而生于彼者，逃畜道而生于人道而已，故不能长定如迦叶七百年古锥，不能如世尊八万四千劫一定方起，所以今不可见者，因只在须陀洹下品之果耳。</p>\n<p>空间旧证修。世传宗智能参禅，今乃不见，则知无禅定修证者，亦可惜可惜。</p>\n<h6>道隐斋禅关即事</h6>\n<p>擎柝呼鱼食，</p>\n<p>推轩放鹤归。即敲竹鼓琴唤龟招凤之义。</p>\n<p>静中看飞跃，</p>\n<p>天地亦微微。</p>\n<h5>记曹老师西山炼神处圆示</h5>\n<p>林踈亭腐草，入定之境也。</p>\n<p>山断路连桥。独木小桥小防人渡。</p>\n<p>中有空王定，最无大用。</p>\n<p>年深不识秋。超劫忘年。</p>\n<h5>葵叶扇</h5>\n<p>似月不随缺，古之譬如望夜中秋月。</p>\n<p>生风不由穴。念动则风生。</p>\n<p>纺世则趋炎，</p>\n<p>此君宁去热。懒障晋尘污。</p>\n<p>晋元规尘污，人每用扇障面，而此则不为人障面。</p>\n<p>羞押郑歌歇。清净复中鼓巽风，安能与淫声作催拍安赋通天常本来面目，</p>\n<p>只在此亦非洁不屑，非徒然是执不屑称自洁者此。</p>\n<h5>蒲草扇</h5>\n<p>曾谓风行草偃，</p>\n<p>于今草舞风生。</p>\n<p>造化原于感应，</p>\n<p>天机之道皆然。逆用之则有所生。</p>\n<p>千秋岁词寿六旬寿海福山二图，甘先生乃浏阳县学秀才，通藏教，其画法以寿字为海者，内套福字为山，中包寿字为海，别世法常见也，故首句五，亦超出常见以为言也。</p>\n<h6>寿先五</h6>\n<p>福乐添筹盈屋，海屋添筹破题意之言，海筹也，正是得妙之句。</p>\n<p>龟息住鹤胎足。此二者皆有寿之物，抱朴子云千岁龟鹤，故皆以称寿者。</p>\n<p>七桃献寿三瑞，西王母以七桃献汉武帝以祝寿，乃言此桃三千年开花，三千年结果，此言献者，为一万八千年，极称以颂寿之高也，按此于大明洪武皇帝初宝藏中有桃核半边长六寸，濶五寸，内刻武帝庚子年号，我太祖皇帝命学士宗濂作《蟠桃赋》勒于内，则其大可知。</p>\n<p>八仙会逢六。八仙庆寿，世俗说也，一句一会，六旬则六会也。</p>\n<p>驻童颜齐唱道生来金粟，西土古有金粟如来佛，佛也所寿持斋素，事佛故以此。</p>\n<p>虚中清于竹坚白精于玉。此颂寿者之有德。</p>\n<p>阐宗风，每讲经说法，欲以谈空标名者。</p>\n<p>宣化育。道岸之立道标。</p>\n<p>天厨供天禄，修禅定，以禅悦为食，谓之天厨送供。</p>\n<p>看寿元</p>\n<p>百千万亿从今祝。</p>\n<p>又</p>\n<p>福先称寿，花甲周时候，福字套寿字在中心为主，故此颂寿意多前词以福在中心为主，故颂福多。</p>\n<p>彩衣斑兰芽秀。上句言其子，下句言其孙，亦能读时文作举子业。</p>\n<p>具庆书香旧衣钵，犹胜在二十四考中书右。颂秀才垂老，于经岁，考科考之多。</p>\n<p>物外圣贤流，向物外参究佛法，实作秀才在圣贤之流。</p>\n<p>图中逍遥,只适天真超万有。</p>\n<p>须弥是古锥，古锥塔也，佛弟子迦叶一祖端坐禅定如塔耸时，人颂为七百年</p>\n<p>老古锥须弥高于颂寿。</p>\n<p>恒河非面皱。经云三岁见恒河与六十见恒河全不变异，六十面皱于童年，是有变异，今颂寿者即不变之恒河，非有变异之面皱也。</p>\n<p>乐寿延击虚空和，衡山笑。击虚空者，是打破虚空成粉碎也，衡山笑者，</p>\n<p>蓝养素得大定正觉而不能出定，刘海蟾提以</p>\n<p>出机，遂拍手大笑而出，故南岳诸人皆称为长</p>\n<p>笑仙。喻寿者，得念佛正觉而乐寿也。</p>\n<p>赠禅人号 五言绝句</p>\n<p>五蕴空华藏，五蕴是色、受、想、行、识，触法也。此正经中只举眼言而例也，僧流总不知声亦有受想行识，香亦有受想行识，味亦有受想行识，触法皆有五蕴而皆空。华者是我心所依，习定习空之法界是也。</p>\n<p>孤灯贯顶门。即是满月当空，灵兔独耀之义。</p>\n<p>西来些子意，达摩西方而来，惟直指心法，此句直是总说，僧全不知，遂错认不用功夫，便自称为心法，便落空亡外道无记空矣，佛教初机、熟机上上机，有持念护念，方得见性成佛入顿教矣。</p>\n<p>悟得是真人。悟此是真禅人。</p>\n<p>赠邻馆友人入关避世</p>\n<p>违范于今月五圆，</p>\n<p>忽闻入室竟求仙。</p>\n<p>传经帐后情归性，书馆后入绛帐之设，借言入关房参禅，其实避损友也。情归性，即摄情之说，金来归性初之义，赞词也。</p>\n<p>炼鼎炉中汞摄铅。以神驭精炁乃为日月工夫。</p>\n<p>依君正切春中树，渭比春天树之相。</p>\n<p>隔我遥沾海外天。言关空入三岛，隔我于海外之天。</p>\n<p>愿视蓬山峰下药，</p>\n<p>得来住世乐千年。</p>\n<h6>闲坐禅关习定</h6>\n<p>避尘不为世缘忙,不挂万缘则心可定。</p>\n<p>一窍中藏极乐邦。得禅定为极乐。心不在定，则着世缘妄想烦恼。</p>\n<p>渐汲涧泉烹佛性，</p>\n<p>旋烧神火炼金刚。</p>\n<p>刹竿倒却门前幻，</p>\n<p>宝炬长燃殿上光。</p>\n<p>眼藏本来浑正法，即世尊正法眼藏之说。</p>\n<p>孤高身已在西方。</p>\n<h5>赞胡僧画像</h5>\n<p>绣髯胡僧一法无，万法归一，一归无，得无佛无法之果。</p>\n<p>蒲团蹲踞自如如。</p>\n<p>天花悟后忘文字，言天花乱坠之后，成佛正觉，忘语言文字，无得无说，如文殊所谓真不二法门。</p>\n<p>饲口缘空释橞珠。橞音患也。橞珠，木橞子所造数珠也。饲口者，牛口四噍也。佛弟子桥梵钵提之口虽不食时，亦虚噍如牛口之饲而不止，佛与之数珠，令常念佛，以除口业之病，画中以珠置远地，若无用，故云然。</p>\n<p>生死了然言句外，</p>\n<p>禅那迎彻月轮孤。禅者，静也。那者，梵语，即此言息也。至静，之息摄，至静之心而寂灭大定，故曰彻日月孤。</p>\n<p>堪夸味净莲生舌，世尊言：时一八哥鸟念佛，死葬之后，墓上生莲花，开墓视莲根生了鸟舌。</p>\n<p>龙虎同归一钵盂。降龙伏虎，俱入一钵，全首皆说所画景，故画即无言之</p>\n<p>诗，诗即有声之画。</p>\n<p>登天崖寨绝顶 在古峰洞上之山顶，古人避乱之所，故以寨称。垒石为城，结茅为舍，暂可耕食凿饮□□，古地约五里而已，予卜静居，故登之，似可且止。</p>\n<p>天崖绝寨步云行，</p>\n<p>石磴巉岩远寨城。</p>\n<p>烟雾锁腰征旺气，山腰间，时有烟雾横锁之如画图。</p>\n<p>震霆显迹护山灵。世传顶首为啸天龙，有穴□□前有五狮，右有五星，外有贵峰尖耸及文笔左右皆有金星贯耳后所，末有五节金星，大贵福地也，曾有一人盗葬，迅雷击墓，揭棺而弃之，天地灵应相护如此，虎穴更甚近。</p>\n<p>正期池上群仙宴，顶有大池，亦积水养鱼，亦可吸饮，堪喻瑶池。</p>\n<p>了却人间一局情。欲赴仙宴，宴必先世。</p>\n<p>潇洒达观尘世外，</p>\n<p>空中时觉有鸡鸣。世言淮南王拔宅飞升，空中鸡犬皆鸣，登此绝项，亦若将闻空中之鸡犬声者。</p>\n<p>寿门下法眷罗秀才，母九旬，罗乃长沙府浏阳县学秀才，名廷纶，法派名太玄，亦贤良有志慕道者。</p>\n<p>沙星焕彩寿来徵，沙星在彩星之旁一小星是也，明则生人，有高寿者，其度之下应，长沙府地，故用此祝此方之寿。</p>\n<p>九十萱华傲菊明。九月生。</p>\n<p>鹤櫃足呼苏氏养，楚有苏聪真人，成道后事母，室中置一櫃封箱严密，凡母所欲食者，向招呼即至，母舅开櫃视之，一鹤飞去，此耽以神通为养者。</p>\n<p>杏林傍视董仙成。董奉仙人以医济世，每医一人病愈，令种一杏，遂成杏林。罗之父，明医也，每制药而母傍视之，故借以为喻。</p>\n<p>群英会庆夸风苑，群英言儒林之众，会而庆寿，如闻风苑之聚会，有众仙也。</p>\n<p>令子葆真近木乡。木乡，礼部官也。天下文士贡举属之，颂其子也。</p>\n<p>好却吴侬微一祝，子木吴地人，幸逢祝会。</p>\n<p>愿言王母是同庚。末句始收祝寿意。</p>\n<p>寿文人四句 魏国公徐，号六岳，讳□□，最善诗文，当今朝班道德文章之元首，圣贤辅弼之名流，更精大小楷草笔法，时人求者甚多，或有不暇时则令其人取别稿来看，故人来取予此稿也。以国公自叙其景，立言独异之体当如此。</p>\n<p>待漏墀东晓带星，墀东者，朝班之东，最上第一位也。</p>\n<p>侧观南极远增明。东立则南极在左侧，南极增明，则人寿之本意。</p>\n<p>暗回四度辉文字，以星明于周天之四度，暗带人寿之四句文字是暗带人号也。</p>\n<p>会际三元焕大城。因上元之寿，以三元暗颂文人。</p>\n<p>草莽定徵人寿考，将可证草莽中定有寿之人，作疑词也。</p>\n<p>江阜会是客豪英。言始知近江边，有吴人当寿期。</p>\n<p>书之物色求考德，如武丁图像求传说也。</p>\n<p>咸谓当时叶子生。末句始归寿意于真人。</p>\n<p>道隐斋中勉门生学 道隐伍子书斋设教之地，故有此作。</p>\n<p>人生飞去不同群，</p>\n<p>正谓天分理自真。理者，天理也，即天命之性。</p>\n<p>十五未之先学性，文宣师十五而志于学。</p>\n<p>寻常虚度此青春。</p>\n<p>不信经书皆师范，</p>\n<p>安得襟裾迈等伦。不以经史为学，则不知道理本分之事，似乎无知之马牛</p>\n<p>而襟裾，安能以襟裾而胜于众人乎？</p>\n<p>举目试看当世士，</p>\n<p>螭头立者是何人。朝廷殿前阶斜砌大石，皆刻为螭龙之状。</p>\n<p>(部分佚失)</p>\n<p>财齐封足贪，</p>\n<p>渭隐真奇特，</p>\n<p>奔走红尘心，</p>\n<p>一一皆成惑。舟之安静，乐于车驰马骤之动，劳则奔走者皆惑。</p>\n<h5>后 跋</h5>\n<p>《仙佛合宗语录》始成，有姑苏弟子吴澄川问：斯录亦当付之欹劂否？冲虚子曰：不可。斯录也，备龙门秘法天机，续邱祖龙门仙派之录也。若是有力慕道者，则将此以度同志之人；若是无力养道者，则藉此以遇护道之侣；不比《直论》人人可见也。须百日功成者，方可付之。否则或三代有德向善，兼能助师养道，或力不足，能代募助师亦可付之。古云“法财两济”，此之谓也！</p>\n<p>金仙证论 柳华阳</p>\n<p>慧命经 柳华阳</p>\n<p>柳华阳禅师</p>\n<p>撰并注</p>\n<p>金仙证论</p>"}, {"id": "jx_xu1", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "序一", "content": "<h4>序一</h4>\n<p>大道本来无言，以言诠者，易涉迹象；故冥悟甚希而谬言日出。不得真传，岂不入于歧路哉？况古人之巧喻异名，每索解而不得，不特难窥大道之阃奥，且因喻而执名，反失其性命之真源。观于此而怀存经度人之念者，安得不浅说而直论之乎？惟华阳禅师，幼而好学，夙禀灵根，积数十年，心无他用，苦志不懈，得合洪、冲虚二真人之奥旨，著为是书。剥尽皮毛，独留骨髓，将古之异名扫除涤尽，直说小周天，重论下手工夫，发前圣之未发，启后人之未启。使苦志之好道者，且得升堂入室而后超登彼岸，复还无极。岂不快哉！是书虽出自一人之著述，真乃后世师教之规则也。读之者，无不谓之仙佛之舟梯、修真之简径。美乎幸矣！闻之者，亦无不为之了然彻悟，豁然贯通，信乎至矣！余自幼慕道，力搜群书而莫能入悟，时至庚戌春，幸遇禅师，片言相投，示此书与余，余开卷读之，心目通明，不觉手舞足蹈，涣然冰释。其中条理次序，犹如亲口相传。而论小周天之工法，不杂一字，意则实贯串诸经之骨髓。然老师犹不自以为是，恐后人疑惑，不能彻解，又广引先正之秘文，以为凭证。由是独显一真之实，直辟旁门之非，谓之仙佛之功臣，谁曰不然？且也前五条概然出自直说，后数条亦非出于荒诞。风火经，原集诸圣次第用功之正文，以为注脚。总说，直泄天机，使人下手调药，採取工夫不失迟早之误，则炉鼎、火候，一以发明。图论下手之窍妙，而採取薰炼即在其中。顾命之说，示人性命不可须臾离也。赋歌论，即显己所得之意，而大小周天即存乎其内。用尽婆心，平空泄漏，惟欲志士同成道果。是书不独有益于当时，并大裨于后学。有缘遇之，犹如云开见日，潭月双辉，岂不欣然叹赏乎？余自愧管窥之才，喜悦同志，愿普证公用，因而为序。</p>\n<p>时乾隆庚戌春，洪都后学无霞道人高双景序</p>\n<h2>一 民</h2>"}, {"id": "jx_xu2", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "序二", "content": "<h4>序 二</h4>\n<p>盖道不得其真传，由来久矣。自世尊开化愚智而同度，性命而异指，性阐迷开而渐修，命附灵利而证果，至于西天二十八祖，及东土六代慧灯，心口授受，莫不以性道慧命之兼修。由六祖之后，性法单扬，慧命掩秘，悟之者私附密语独修，超越祖位，故为教外别传。今之为学，不得慧命之嫡旨，阐扬性法，则性亦不得其真。是为识性之障雾，而差讹错认，或以灵觉为真性，或以正念为真性，逐妄迷真，失却如来之旨。盲修瞎炼，身根不能坚固而成金刚之体，长自下漏，故有转劫迷失之误。何况念坐乎？惟华阳禅师慈悲，另通消息。得师所授之真旨，会同元释，吐露慧命之真传，泄漏明星之真性。拔救迷妄，开通智慧，使见之者，立今劫而成佛，免堕他生再修。何等切近！何等简易！愚迷不明双修之理，分别教相智慧。参悟性命之原，融会其法，不分彼此。在释有缘遇真道，得性命之真旨，修成性命，即道是佛也。在道有缘遇真僧，得性命之真旨，修成性命，即僧是仙也。释道原本为一法，大则同，小则异。清净自然觉王如来菩萨，即玉帝所自称也。大仙、七仙、众仙、金仙，亦是世尊所自称也。一道坦坦，有何此何彼之分别乎？余慕觉真宗，涉步山川，叩求丛林知识者，实不少矣。究其所然，无非提公案、参话头、打七坐禅之谈。数十年来都成虚涉，并无慧命之师。忘食失寐，念念不休，感念苍天，辛亥岁幸遇禅师。禅师见余志心苦切，便以开示心肝，决其疑妄，欲指而又未露。余虑为此道之尊重，诸佛之所禁秘，非师之不慈悲。诚心焚香立誓，恳求至切，方才决破根由。一言之下，顿悟全旨。原来成佛作祖之道，即在动静顺逆之间，岂有难哉？盖禅师三十余年，觅道之苦志，今舍慈悲，备著此书。古佛不露的，今始露；祖师不传的，今始传。将慧命寿命、佛性真性和盘托出，愿人人成正觉，超越佛地；不使后世烦劳他人之父母，现今成就；其功岂小哉？</p>\n<p>乾隆辛亥岁重阳月，灵台庵僧妙悟序</p>"}, {"id": "jx_1", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "序炼丹 第一", "content": "<h5>序炼丹 第一 尽言小周天</h5>\n<p>华阳曰：欲修大道者，理无别诀，无非神炁而已。神乃心中之元神，炁即肾中之元炁。炼精之时，则炁原在乎精中，精炁本是一物。所以曹祖师云：“大道简易，只神炁二者而已。”凡学道之士，能识神炁之道，即是阴阳性命之道也。故曰：无别诀，神炁而已矣。先须穷其造化，究其清浊，造化者，乃吾身之生机。人由此机而生形，仙佛由此机而成道，学者能先穷此造化之机，则有下手处矣。清者，是无天地人我之象，浑浑沦沦，恍如太虚，斯时一派先天。机之未发，虚而待之，静极自动，是为清也。浊者，因有存想思虑，见闻知觉而后机动，即为浊也。岂可不究哉！则精生方可探摄；精生者，元炁之动是谓精生。探者，探其炁之妙处。必须以我之正念，敛收微细之神，诚志专意，探入其炁之动所，招摄已生之精，归于本穴，用火烹炼。次察其呼吸，明其节序，呼吸者，巽风也。其用则有次序转变之法，非可一概论也。如精生之时，则当用摄精之呼吸；如药生之时，则当用採药之呼吸；药既归炉，则用封固之呼吸；如起火之时，则用起火之呼吸；沐浴之时，则用沐浴之呼吸。金丹始终全仗呼吸，故曰节序。则神凝方自恋吸；神既凝入炁穴，则神自然恋炁。神炁相合，则炁自然恋神矣。然后可施可受，而精可化。施者，后天气也，而为母气。受者，先天炁也，而为子炁。子炁既受母气，则精自化炁矣。倘不明母气之真消息，则子炁散于外境，其精焉得化而为炁乎？余见世人亦知阳生，而炼精不住，金丹不成者，皆因不知其自然而然，以混探混炼之过也。凡世之学道者，知阳生固多矣，而所以化精成金丹者何少也？由不知其风火之法，药产有时，封固有炉，周天有度；混探混炼耳！且观古书之所作喻名炉鼎、道路，则人被炉鼎、道路之所惑；古书所喻炉鼎者，是炼精炼炁之所。方士借此为言，曰女鼎、曰烧炼；初学未得真传，信而惑矣。纵有真志，岂不误哉！而道路者，即採取升降任督之脉络也。俞玉吾云：“任督二脉，呼吸往来之黄道也。”任脉者，起于中极之下，以上至毛际，循还腹里，上关元至咽喉也。督脉者，起于下极之</p>\n<p>腧，并绕脊里，上风府，入脑顶。二脉通，则百脉俱通矣。採取此而运，周天由此而转，能识此炉鼎道路，则金丹无不成矣！喻名铅汞、药物，则人又被铅汞、药物之所误。古人修丹以神炁比喻铅汞，以真精比喻药物，使人易悟。愚夫闻之言铅汞，便以凡铅凡汞烧炼为药物。妄图点化服食，求富贵长生，反到丧身破家，愚之甚也！故假道愈显，而真道愈晦，世因喻而惑人诳人者众也！群书喻名虽多，究其根源之所在，无出乎心肾之神炁而已。妄人见喻，借喻为言而诳人曰：“药之先天炁，不在自身，在女鼎。”初学浅见，不能分别真伪，信方士迷弄；不识金丹真诀，不明大道根源，岂不更惑乎！由此观之，智者得师而明，愚者被师而误，皆因不悟群书简易之妙，而竟失于正理矣。智人能识真假，除妄归正，参悟大道，访寻明师，以求印证秘密之真诀。愚夫不然，喜旁门之小法，暗图为人之师，纵有仙书真诀，而曰：“吾不用看经，真诀在吾心内。”惑众乱真。后学以为至言，皆因心地不明，少读群书；未有不失正理者也！故予正欲详而直论。夫仙道者，原乎先天之神炁。神乃元神，炁即元炁。何以谓之先天？当虚极恍惚之时，是也。既知恍惚，是谁恍惚？此即先天之神也。恍惚之时，不觉忽然真机自动，阳物勃然而举，此即先天之炁也。若此时即能下手修炼，何患不仙也？炼精者，则炁在乎其中。精由炁化，炁由精满。炼精者，即是炼炁。故曰：炁在其中矣。炼形者，则神在乎其内。炼形即是炼精。古云：“形化而后炁生，神凝而后水融。”神炁合一；故神在其内矣。炼时必明其火，用火必兼其风，火者神也。精生之时，必以神而驭精，则精归源。既知归矣，又当久久以呼吸薰蒸，则精方能化为炁。存乎其诚，入乎其窍，合乎自然。凝神之时，外除耳目，内绝思虑，专志一心，凝入炁穴。又要合自然之动静，不可强制纵放。若能如此依时而炼，则药物自然生矣。依时者，是阳动之时，依时而炼。凡有动时，遂即炼之。既炼已，则药物自然生矣。药生竟游其熟路者有之，若不起火归炉，难免走失之患也。熟路者，即阳关也，乃昔日精炁所游之路；古人有走泄者，皆由此也。起火者，是药物归炉之工法；药生若不採归炉，则药物顺熟路而泄矣。然药物既归</p>\n<p>炉，又当速火，逼行其周天。古云“火逼金行颠倒转”者，即此也。行是阴符阳火之法，若不行周天之火，则炁不聚，丹不结矣。倘不明其火候之精微，虽有药而药亦不能成丹。火候是一总名，其中有次第节序，而各有其候。如精生有调药之候；药产有採取之候；归炉有封固之候；起火有运行之候；沐浴有停息之候；火足有止火之候；此乃小周天之秘机。如若不尽精微，虽有药不得火之法度，则焉能成丹也？可不历历以明之哉！不知囊盦之消息，囊盦者，即往来之呼吸，古人喻之曰“巽风”。升降由此风而运；不得此风，则辐轴不如法。凡小周天始终全凭囊盦之风，以为金丹之权柄。不明升降之法度，升降是运行周天之法，既行周天，则有度数。往往学道之人，不知升降度数，所以丹不结矣。不识沐浴之候，沐浴者，乃卯酉生杀之位也；故停息为沐浴之候也。不晓归根之所，归根者，乃还炁穴归其本位之所。如此空炼，何得成其道也？兀坐顽空，不明大道要诀，虽修无益矣。大凡临机之时，必须畅明其神，勇猛其志，此机时者，即採取薰炼之时也。切忌昏迷散乱！欲修丹者，当自精进勇猛，非他人所能助者也。立定天心之主宰，天心，名曰中黄，居于天之正中，一名天罡，一名斗杓，在天为天心，在人为真意。中宫若失真意，犹如臣失君主矣。徘徊辐辏之运转，辐辏者，即徘徊往来之意。犹如车轴使爪之运转一般。太上云：“三十辐共一毂。”内鼓囊盦之消息，外依斗柄之循环，囊盦即呼吸也。周天火候凭囊盦之息，以定周天之度数。朝元子云：“劝君穷取周天数，莫使蹉跎复卦催。”斗柄循环，即活泼运转之机耳！如此神炁相依而行，相依而住，则周天之造化，无不合宜矣！凡行火之时，炁依神而行，神依炁而住。火候当行，则神炁亦当行；火候当住，则神炁亦当住；火候当止，则神炁亦当止而止。如此而炼，则金丹无不成矣！</p>\n<h6>时</h6>\n<p>乾隆庚戌春，传庐柳华阳，序于皖城之洁王古庙中。</p>"}, {"id": "jx_2", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "正道浅说 第二", "content": "<h5>正道浅说 第二 尽言小周天。</h5>\n<p>华阳曰：仙道炼元精为丹，凡炼丹下手之仙机，即炼肾中之元精。精</p>\n<p>满则炁自发生，复炼此发生之炁，收回补其真炁。补到炁足，生机不动，是谓丹也；则人之根窍无漏精之路，便成人仙矣。服食，则出神显化。世间无不喜而愿求者。服食者，是得前小周天，如法修炼，以採大药，运过三关，故曰：服食。炼炁化神，出神显化，世间无不喜矣。奈何天机秘密，学者未必穷其根源，故多在中途而废矣！天机者，即吾身中之生机。古人云“阳炁生”，今人曰“活子时”。真仙上圣秘之深密，不书于竹帛；学者无所觅处，空自磨炼。岂不在中途而废？所以予今浅说，使学者概而证之。夫精为万物之美，即养身立命之至宝。万物最美曰精；人有其精则生，人无其精则死；所以精者，即性命之根源。《阴符经注》云：“精是炁之母，神是炁之子。”古云：“留得阳精，神仙现成。”岂不宝乎！如精已败者，以精补精，保而还初，所谓得生之由。中年年迈之人，因精已耗散，故必用补精之法助之。钟离真人云：“晚年修持，先论救护。”未败者，即以此而超脱，养胎化神，则亦易为、易修、易成之果也。未败者是童真，本有阳精足炁，免得补精筑基之工。从此下手採大药，不过七日；静工十月之期，即可以出神，为神仙乐事；故此易为、易修、易成是也。若以神顺此精，由自然之造化，则人道全；世人每遇精生，不知修炼，顺此造化，男女交合，即为生人之道，由炁顺化。若以神逆此精，修自然之造化，则仙道成；真人知此精生之造化，以神留精，逆归炁穴，用火锻炼，精化为炁，脱胎神化，仙佛从此而得；由精逆化也。故精者，乃是入死入生之关锁。精乃凡圣根由，故名关锁。精耗必死，保而炼之即生，此理之至也。其名虽然称之曰精，其里本自无形，因静中动，而言之曰元精矣！此精当未动之先，里本虚无，有何精可名？因入静极，阳炁从静而发动，故名之曰元精矣。当其未动之前，浑然空寂，视之不见，听之无声，亦非精也，亦非物也，无可名而名，故名之曰“先天”，《易》曰“无极”是也。此正鸿蒙未判之时，元门名曰“先天”，释氏名曰“威音”，《易》曰“无极”，总属虚无；是无炁之谓也。斯时则神寂机息，万物归根，此正谓之虚极静笃。此正上文鸿蒙是也。浑然一团，不见天地人我之相，如万物逢冬归根，阳炁潜藏，故曰机息。然则</p>\n<p>机虽息，而生炁之机，即在息机之中矣。静中恍惚，偶有融会之妙意，此言炁机将萌未动之时也。便可名而有其名，故名之曰“道”，《易》曰“太极”是也。此正上文炁机将萌是也。因此机一萌，曰元炁也。炁既以萌，而又旋动，曰元精矣。元炁元精，分而言之，其机则是一也。修仙作佛之造化，即从此而入手。若夫尘念兼起，必化淫精，顺阳关而出。凡修丹者，即在此时用工，则神炁自然相投，合而为一。若炼己未熟，逢此炁机，淫念顿起，真炁必化后天有形之精，顺阳关而泄矣。修士正当此时，正念为主，以神驭炁，起呼吸之气，留恋元精，可谓还原之道矣。既以神驭炁，必加呼吸之气，收回元精，其精自然逆回于炁根矣。真精既得还原，取其神炁混合，两不相离；使其二物熔化，合而为一也。元精不能自熔，在元神熔之。绵绵若存，使性情相洽，神炁合而为一者也。如《易》所谓“天地氤氲，万物化生”。天地之炁不交，万物无所生焉。金丹之道不交，真种何所觅乎？《崇正篇》云：“两般灵物天然合，些子神机这里来。”然后先天真一之炁，仍旧从窍中发出，窍即丹田炁穴也，所以混然子云“火从脐下发”，即此。而为金丹之主宰。主宰者，依此炁为主也。所以古云：未有不交媾而可能成造化者也。此即尹真人之旨。造化者，即採取运周天之造化。先若无交媾之法，何得有药产之机发现也？交媾即调药之法。澹漪真人云：“人身中只是一个元炁，只要回光返照，将此炁收敛，沉到极处；久之，其中自有造化。”夫既知此炁之生机，即可以行火补炁而炼丹，生机者，即药产之时也。古人云“药产神知”，即此也。行火，行周天阴符阳火之法。即升降往来，复还丹田之所。真炁得此动炁之所补，故谓之炼丹也。故有辨时採取周天之候；辨时者，即言药之老嫩。古人常表药老炁散，不能结丹。药嫩炁力微，亦不结丹。然则何时不老不嫩？上阳子云：“若人採先天炁之时，以暖炁为之信。”又，伍子云：“如浴之方起，而暖炁融融。”然此不辨，辨在其中矣。周天法者，是言子午卯酉之法。子午为进退，卯酉为沐浴，然子午亦有沐浴。古云“时至神知”，正言此药产之先天炁者，是也。药产神有所知，即上文暖信之谓也。若不知採取，则当面错</p>\n<p>过矣。修士宜当此时，须用凝神合炁之法，以敛聚微细之元神入于炁中。收付于本宫，则是为我所有之妙药矣。本宫即丹田也。药炁既承受以归炉，炉即丹田也。须当徘徊于子午，午属于顶，子属于腹。运动身中之璇玑，又必须假呼吸之气而吹嘘之，方得乾坤于元关，合而为一循环之沟管矣。璇玑者，即黄赤之消息。天道日月之循环，由黄赤而行。丹道神炁之循环，依任督而运。七悟祖师云：“採取以升降，从督脉上升泥丸，从任脉降下丹田者。”盖真阳之炁，不能自循环于乾坤；须假呼吸之气，吹动元关橐龠之消息；逼逐真阳，通任督达乾坤，合元关而为天地；吾身造化之一大总窍矣。紫阳云：“一孔元关窍，乾坤共合成。”是也。故神炁承呼吸之能，才得相依同行而不外游矣。神行则炁行，神住则炁住，而为相依矣。且神炁又当承呼吸之能，方得随脉胳，而不外游矣。然呼吸皆神炁之权柄也。且炁之行住，又怕有太过不及之弊，故必依周天之限法。夫周天法者，周天三百六十五度有零，故以法数而限定之也。言十二时如一日一周也。故冲虚云：“子行三十六，积得阳爻一百八十数；午行二十四，合得阴爻一百二十数；阳爻自子至巳为阳，阴爻自午至亥为阴。阳爻用九，积数一百八十；阴爻用六，积数一百二十，共成三百数。外兼卯酉之法，中途行沐浴；完成周天”。卯在六阳之中，酉在六阴之中。凡行沐浴之法，必在中途而薰蒸。周天原有三百六十有零，前行三百，未满造化之积数；此行沐浴无数之火，合成全机。所以古云：“炁有行住起止多少之限法”。行住起止四法，即达摩云“四候有妙用”。又云“一时用六候”，则採封之法兼于其内。行者行于黄赤，住于生杀。起于虚，止于危，是为一周天也。白玉蟾云“起于虚危穴，以虚危宿在坎宫子位也”。学者不可不察也！夫既得周天之妙用，积累动炁，动炁即丹田之生机。时来时炼，补完真炁，凡丹田有动之炁，即要炼之，以完一周天。如若不炼一周天，则本根之炁不得满足，而亦不能成大药。冲虚子云：“又不可一周完而不歇，虽无大害，亦迟其动机，为无益也。”则精窍不漏，便可谓之长生矣。李真人云：“阳关一闭，个个长生。”如有精窍漏者，则未及证不死之果。有精</p>\n<p>漏，则是有死之凡夫。无精漏，则是不死之真人。世亦有一等不漏精之躯，未经火法，久之亦漏，非真人薰蒸不漏。又有老者弱者而阴缩者，自无精矣，是精已枯竭，休误认为修证。必加精修，以元精尽返成真炁，无精则阳不举，内里有真实丹成也。则亦无其窍，无精，则阳关之窍自闭矣。而外形亦无萌动之机，窍闭，则阳不举，方是丹成。若有微萌之意，未证有成，必加火以薰炼。则是名为大药成矣。便可作大周天之工法也。以上尽言小周天。</p>"}, {"id": "jx_3", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "炼己直论 第三", "content": "<h5>炼己直论 第三</h5>\n<p>华阳曰：昔日吕祖云“七返还丹，在人先须炼己待时”。己即我心中之念耳。若欲成还丹者，必须炼己为先，己若不纯，焉得精还为炁，炁还神也？盖七乃火之成数，先以火入水中，谓之返也。后以炁升火位，谓之还也。待者候也，若欲有心待之，则属于拘滞，而真阳反不生；若欲无心而待之，则落于顽空，错过真机；此则有无两失矣。然则若何为哉？且有还于无，而无内灵似于有。故《离骚》《远游》篇云：“毋滑而魂兮，彼将自然。一炁孔神兮，于中夜存。虚以待之兮，无为之先。
