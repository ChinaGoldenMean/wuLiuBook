：最初炼己，不过初入其门，仍要还虚，方入阃奥。敢请还虚之理，何谓也？</p>\n<p>伍子曰：儒家有执中之心法，仙家有还虚之修持，皆一致也！盖中即虚空之性体，执中即还虚之功用也。惟仙佛种子，始能还虚尽性，以纯于精一之至诣。若夫人心，则戾其虚空之性体，冲冲不安，流浪生死，无有出期。故欲修仙道者，先须成载道之器；欲成载道之器，必须先尽还虚之功。虚也者，鸿蒙未判之前，无极之初也。斯时也，无天也；无地也；无山也；无川也；亦无人我与昆虫草木也；万象空空，杳无朕兆，此即本来之性体也。还虚也者，复归无极之初，以完夫本来之性体也。</p>\n<p>问曰:然则何所修持,始尽还虚之功也?</p>\n<p>答曰：还虚之功，惟在对境无心而已。于是，见天地，无天地之形也；见山川，无山川之迹也；见人我，无人我之相也；见昆虫草木，无昆虫草木之影也；万象空空，一念不起；六根大定，不染一尘；此即本来之性体完全处也。如是还虚，则过去心不可得，现在心不可得，未来心不可得，顿证最上一乘，又何必修炼己之渐法也哉？佛宗云：“无相光中常自在”。又云：“一念不生全体现，六根才动被云遮。”合此宗也。</p>"}, {"id": "xf_dd2", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "真意 第二", "content": "<h5>真意 第二</h5>\n<p>问曰：《直论》中所谓返观内照，凝神入于炁穴。敢求详示返观内照之</p>\n<p>旨？</p>\n<p>答曰：返观内照，即真意之妙用也。盖元神不动为体，真意感通为用，元神真意本一物也；言元神可也，言真意亦可也。故真意即虚中之正觉，所谓相知之微意，是也。返观内照者，返回其驰外之真意，以观照于内也；炼精之时，真意观照于炼精之百日；炼炁之时，真意观照于炼炁之十月；炼神之时，真意观照于炼神之三年。此返观内照之大旨也！</p>\n<p>问曰：凝神入炁穴之大旨，又何谓也？</p>\n<p>答曰：炼精之时，有行住起止之工。行则採取如是○，即运息以合神炁之真意也；住则封沐如是·，即停息以伏神炁之真意也。起则採封之后，真意运息，合神炁于十二时中，自子时而起火也。止则象闰余之后，真意停息，合神炁于本根，还虚而止火也。可见行住起止，悉皆元神凝合于炁中，不谓之凝神入炁穴不可也！犹未已也！当大药服食之后，务宜定觉于黄庭穴之虚境。虽周三千六百时之天，未尝一瞬息离于结胎之所。不谓之凝神入炁穴不可也！然真意有动静兼用之工，有专静不动之工，尤不可不知也！</p>\n<p>问曰:何为动静兼用之工?</p>\n<p>答曰：初关炼精，真意採炼属动，封沐属静。三年乳哺，真意出收属动，归宫还虚属静。此动静兼用之工也。</p>\n<p>问曰:何谓专静不动之工?</p>\n<p>答曰：中关炼炁化神，惟真意定觉于黄庭穴之虚境，为结胎之主；但任由二炁自然之有无，而不着意于二炁之有无。可见十月常静，未尝移意毫发许也，此专静不动之工也！更进而论之，三年乳哺，已造还虚之极，虽真意一出一收，而实不着意于出收，则是出亦静，收亦静，谓之专静不动，亦可也。</p>\n<p>问曰：动静适宜，自合妙机。倘失真意，其弊云何？</p>\n<p>答曰：炼精之时，若失真意，则无以招摄二炁合神归定于玄根，以妙积元阳之用；炼炁之时，若失真意，则无以保护二炁归定于胎中，以证纯阳之果；炼神之时，若失真意，则无以迁神归定于泥丸，复戒慎出入于天门，以施乳哺之工。故予向有一颂云：</p>\n<p>运筹三百足周天，伏炁四时归静定。</p>\n<p>七日天心阳来复，五龙捧上崑崙顶。</p>\n<p>黄庭十月足灵童，顶门出入三年整。</p>\n<p>屈指从前那六工，般般真意为纲领。</p>\n<p>九年打破太虚空，跨鹤乘鸾任游骋。</p>\n<p>此予总颂阳关三叠，咸不离夫真意。真意之用大矣哉！然须知真意不涉较量，一涉较量，即非真意矣。佛宗云：“拟议即乖，较量即错。”合此宗也。</p>"}, {"id": "xf_dd3", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "水源清浊真丹幻丹 第三", "content": "<h5>水源清浊真丹幻丹 第三</h5>\n<p>问曰：《直论》中有不知先后清浊之辨，不可以採取真炁。何谓也？</p>\n<p>答曰：先后清浊，即水源之辨。真丹、幻丹之所由别也！</p>\n<p>问曰：既云丹均是阳精所成，何有真幻之别也？</p>\n<p>答曰：水源既有清浊之殊，则成丹不无真幻之别。若筑基昧此，则违真从幻，往往有之矣。今为尔详辨之，凡有念虑存想，知见睹闻，皆属后天，所谓浊源也。阳精从此浊源中生，因而採封炼止，纵合玄妙天机，终成幻丹，以其水源不清也！若夫无念无虑，不识不知，虚极静笃时，即属先天，所谓清源也。阳精从此清源中生，于焉採封炼止，兼合玄妙天机，遂成真丹，以其水源不浊也！凡阳精从清源中生，即须採而炼之；倘阳精从浊源中生，弃之不可採也。诚能最初还虚，则採炼阳精，悉就真丹，自无幻丹之谬矣！古云“炼药先须学炼心”，诚有鉴于水源之宜清也。佛宗云：“心浊不清，障菩提种。”合此宗也。</p>"}, {"id": "xf_dd4", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "火足候·止火景·採大药候天机 第四", "content": "<h5>火足候、止火景、採大药候天机 第四</h5>\n<p>问曰：《直论》中所谓三百周天，犹有分余象闰数。一候玄妙机，同于三百候。义旨云何？</p>\n<p>答曰：此言火足之候也。所谓三百周天者，三百妙周之限数也。欲人知火足之候，在得玄妙机之周天，满三百候之限数也。凡行小周天之火，有</p>\n<p>善于行火者焉，有不善于行火者焉。善于行火者，水源清真，採封如法，炼止合度，心不散乱，意不昏沉，以至三百息数，混合神炁，贯串始终；此一周天，乃得玄妙机之周天也。不善于行火者，或水源凡浊，或採封违法，炼止失度，因昏沉散乱，以至三百息数，断而复连，神炁不均，时离时合；此一周天，乃失玄妙机之周天也。除失玄妙机之周天不计外，独计得玄妙机之周天，要满三百候之限数，方为火足之候，止火之候，此积于内者也！犹有龟缩不举之景，并阳光二现之景，皆为火足之候、止火之候，此形于外者也！故佛有“倒却门前刹竿着”之句，又有“成就如来，马阴藏相”之句，皆为龟缩不举之明证也！又有“宝胜如来，放光动地”之句，亦为阳光发现之明证也！</p>\n<p>问曰：阳光发现之时，从何处而现？</p>\n<p>答曰：两眉间号曰明堂，阳光发现之处也。阳光发现之时，恍如掣电，虚室生白，是也。当炼精之时，即有阳光一现之景。斯时也，火候未全，淫根未缩，一遇阳生，即当採炼，运一周天。以至採炼多番，周而复周，静而复静，务期圆满三百妙周之限数而后已。限数既满，惟宜入定以培养其真阳，静听阳光之二现，可也。</p>\n<p>答曰：由是于静定之中，忽见眉间又掣电光，虚室生白，此阳光二现也。正是止火之景、止火之候也；是时，三百妙周之限数，恰恰圆满；龟缩不举之外景，次第呈验矣。此外外三事，次第而到者也。</p>\n<p>问曰：阳光二现如何？</p>\n<p>问曰：三事既次第而到，彼又谬自行火，何也？</p>\n<p>答曰：此时动炁，虽不妄驰于肾窍，而生机却内动于炁根。故炁机发动，或一动二动。亦所有事，彼昏不知，觉其二动，以为可採，辄行採炼者有之，是以有倾危之害也！</p>\n<p>问曰：欲免倾危，须究其显验所以然之理，祈老师更为历历言之。</p>\n<p>答曰：筑基已成，精尽成炁，恰好限数圆满；限数既满，则火之已足，足征矣！摄此动炁，凝成丹药，方得淫根如龟之缩；既已龟缩，则药之已成，又足征矣！阳关已闭，无窍可通，方得淫根绝无举动；既绝不动，无精可炼，则火之当止，又足征矣！所积阳炁，尽伏炁根，方得阳光二现；光既二现，则阳</p>\n<p>炁之可定于炁根，又足征矣！故阳光二现，纵有动机，亦去其火，更宜入定，以培养其真阳，静听阳光之三现可也。由是于静定之中，忽见眉间又掣电光，虚室生白，此阳光三现也。真阳团聚，大药纯乾，方得阳光三现。光既三现，则炁根之内，已有大药可採，又足征矣！要之！止火当自阳光二现为始，至三现为终。故二现三现，皆名止火之景、止火之候。独是阳光三现，方兼名採大药之景，採大药之候也。</p>\n<p>问曰：行火至于阳光四现，遂至倾危，何也？</p>\n<p>答曰：此由不依止法，妄自行火之过也。不知阳光三现，大药可採。若行火至于四现，则大药之可定者，必随火之不定者，而溢出于外，化为后天有形之精矣。可不戒哉？佛宗云：“如来善护宝珠，自然放光有节。”合此宗也。</p>"}, {"id": "xf_dd5", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "七日採大药天机 第五", "content": "<h5>七日採大药天机 第五</h5>\n<p>太和作礼曲膝问曰：《直论》中所谓“七日口授天机，採其大药”，未审大药何以必须採于七日也？</p>\n<p>答曰：阳光三现之时，纯阳真炁已凝聚于鼎中，但隐而不出耳。必用七日採工，始见鼎中火珠成象，只内动内生，不复外驰。故名真铅内药，又名金液还丹，又名金丹大药。异名虽多，只一真阳，即七日来复之义也！</p>\n<p>问曰：探大药天机，求老师垂慈详训？</p>\n<p>答曰：以初採言之，其呼吸之火，自能內运；任火自运，绝不着意于火，亦不驰意于火，方合玄妙机之火也。此时用火，尤当入定，而专用眸光之功，时以日间用双眸之光，专视中田；夜间用双眸之光，守留不怠；如是以採之，大药自生。《阴符经》所谓“机在目”者，此也。</p>\n<p>问曰：天机已明，但採之所以得生之理，尚求教益？</p>\n<p>答曰：採之而所以得生之理，有四说焉：盖以交媾而后生，勾引而后生，静定而后生，息定而后生也。</p>\n<p>问曰：何谓交媾而后生？</p>\n<p>答曰：心中元神，属无形之火。肾中元炁，属无形之水。心中无形之火</p>\n<p>神，因眸光专视，而得凝于上，则肾中无形之水炁，自然薰蒸上腾，与元神交媾，而无上下之间隔矣。无形之水火，既已交媾于上，则久积纯阳之炁，自然团成大药，如火珠之形，发露于下矣。如天地氤氲，万物化生者然。盖无形能生有形，自然之理也。古云：“玄黄若也无交媾，怎得阳从坎下飞？”即此义也。</p>\n<p>问曰:何谓勾引而后生?</p>\n<p>答曰：双眸之光，乃神中真意之所寄。眸光之所至，真意至焉。真意属土，土乃中宫之黄婆，黄婆即勾引之媒妁也。黄婆勾引于上，则大药自相随而出现于下矣。古云“中宫胎息号黄婆”，即此义也。</p>\n<p>问曰:何谓静定而后生?</p>\n<p>答曰：元神因眸光专视，归凝上之本位而得定机，则元炁亦归凝于下之本位而得定机。神炁俱得定机，由是元炁成形，因定而生动，只动于内、生于内矣。古云“探真铅于不动之中”，又云“不定而阳不生”，即此义也。</p>\n<p>问曰:何谓息定而后生?</p>\n<p>答曰：此是后天自运之火，亦得定机也。先天元神元炁，因眸光专视，而得定机于上下之本位；则后天自运之火，亦因神炁之定机而有所归依，自然伏定于炁根，而无上下之运行矣。真息一定，大药自生；真息不定，大药必不生也。古云“定息採真铅”，即此义也。</p>\n<p>此四说者，皆以眸光为招摄，故其生意乃尔也。昔邱祖相传一偈云：</p>\n<p>金丹大药不难求，日视中田夜守留。</p>\n<p>水火自交无上下，一团生意在双眸。</p>\n<p>旨哉！此偈也。须知大药生时，六根先自震动，丹田火炽，两肾汤煎，眼吐金光，耳后风生，脑后鹫鸣，身涌鼻搐之类，皆得药之景也。大率採药至于三四日间，真息将定未定之时，得药六景，即次第而现。若採药至于五六日间，则真息一定，而大药已生矣。故七日之期，亦大概之言耳。佛宗云“天女献花”，又云“龙女献珠”，合此宗也。</p>"}, {"id": "xf_dd6", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "大药过关服食天机 第六", "content": "<h5>大药过关服食天机 第六</h5>\n<p>太和歃血盟天，作礼四拜，长跪问曰：《直论》中所谓大药过关，有五龙捧圣之秘机。未审是何取义，个中玄妙，恭望大慈，俯垂详剖？</p>\n<p>答曰：前辈先师欲明过关秘旨，故借玄帝舍身得道之事，以喻言之。所以喻言者：以五乃土数，真意属土；龙乃元神；元神为真意之体，真意为元神之用，体用原不相离，故云五龙。圣即大药之喻。用真意引大药过关，故云：五龙捧圣也。其间有过关服食之助功，向已详言于三次口传之内矣，兹不复赘！盖以童真与夫漏精一度之人，则过关服食之助功，自当应用。若漏精多度，则此助功，不复可用，即当行过关服食之正功矣。正功天机示汝，汝当珍重。今且以大药初生言之，因其多经积累，始得形如火珠。此先天纯阳之炁，能生后天真息之火。火药同根而生，故言药不言火，而火即在其中矣。大药发生，不附外体；只内动于炁穴。须知炁穴之下，尾闾界地，有四道歧路：上通心位，前通阳关，后通尾闾，下通谷道。尾闾三窍髓实，呼吸不通。谷道一窍，虚而且通，乃气液皆通之熟路。又气液皆通，乃平日所有之旧事。故《直论》注中，有“熟路旧事”四字，即指此言也。尾闾谷道，一实一虚，故名下鹊桥。尾闾关上夹脊三窍，至玉枕三窍，与夫鼻上印堂，皆髓实填塞，呼吸不通。鼻下二窍，虚而且通，乃呼吸往来之径路。印堂鼻窍，一实一虚，故名上鹊桥。关窍既明，则防危虑险之功，尤不可不知也！盖大药将生之时，先有六根震动之景。六根既已震动，即当六根不漏，以遂其生机。大药既生之后，六根即当迁入中田以化阴神，务先逆运河车而超脱之。尤当六根不漏，以襄其转轴。故下用木座，抵住谷道，所以使身根不漏也；上用木夹牢封鼻窍，所以使鼻根不漏也；含两眼之光，勿令外视，所以使眼根不漏也；凝两耳之韵，勿令外听，所以使耳根不漏也；唇齿相合，舌抵上腭，所以使舌根不漏也；一念不生，六尘不染，所以使意根不漏也；既能六根不漏，可谓防备之至密矣！犹未已也。方大药之生于炁穴也，流动活泼，自能飞昇而上腾于心位；心位不贮，自转向下由界地而前触夫阳关；阳关已闭，自转动由界地而冲夫尾闾；尾闾不通，必自转动，由尾闾而下奔走谷道；谷道易开，大药泄出，前</p>\n<p>工废矣。此下鹊桥之危险也！即邱、曹二真人走丹之处。预用木座，状如馒首，覆棉取软，坐抵谷道，其势上耸，不使大药下奔。既为外固之有具矣，又有内固之法焉。大药冲尾闾不透，自转动而有下奔谷道之势；才见其下奔，即微微轻撮谷道以禁之；斯为内固之至严矣！内外如此固严，自能保全大药，不至下奔于谷道，只附尾闾，遇阻而不动矣。斯时也，若用真意导引则失唱随之机，纵导引频频，终难过关，故有善引之正功焉！才见其遇阻不动，即一意不生，凝神不动；动而后引，不可引而使动也！忽又自动冲关，即随其动机，而有两相知之微意，轻轻引上，自然度过尾闾，而至夹脊关矣。关前三窍髓阻不通，大药遇阻不动。惟是一意不生，凝神不动，以待其动；忽又自动冲关，即随其动机而有两相知之微意，轻轻引上，自然度过夹脊而至玉枕关矣。关前三窍髓阻不通，大药遇阻不动，惟是一意不生，凝神不动，以待其动；忽又自动冲关，即随其动机而有两相知之微意，轻轻引上，自然度过玉枕，直贯顶门。向前引下，至于印堂。印堂髓阻不通，自转动而妄行于鼻下便道之虚窍矣。若非木夹为之关锁，几何而不沦于泄也？泄则前工废矣。此上鹊桥之大危险也！故木夹之用，不可不预为防也。预防有具，则大药不致下驰于鼻窍，只附于印堂，遇阻而不动矣。惟是一意不生，凝神不动，以待其动；忽又自动冲关，即随其动机而有两相知之微意，轻轻引下，自然度过印堂，降下十二重楼，犹如服食，而入于中丹田神室之中。点化阴神，为乾坤交媾。盖通中下二田合而为一者也。此过关服食之正功也！昔邱祖偈云：</p>\n<p>金丹冲上斡天罡，何患阻桥又阻关？</p>\n<p>一意不生神不动，六根不漏引循环。</p>\n<p>旨哉！此偈也。盖夫天罡居天之正中，一名中黄星，一名天心，一名斗杓，在天为天心，在人为真意。大药凭真意之转旋而升降，犹天轮藉天心之斡运而循环。皆一理也。须知初用木座抵住谷道，其势已上耸，不使大药下奔，故亦有不下奔谷道者，即不必行轻撮谷道之事，惟用过关之正功而已。然过关正功，其行住之机，惟在顺其自然为要也！佛宗云：“未有常行而不住，亦未有常住而不行。”合此宗也。</p>"}, {"id": "xf_dd7", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "守中 第七", "content": "<h5>守中 第七</h5>\n<p>问曰：《直论》中谓：欲将此炁炼而化神，必将此炁合神为炼。何谓必将此炁合神为炼也？</p>\n<p>答曰：既採得金丹大药，逆运河车，入于神室之中矣。倘其神光失照，则大药失其配偶而旋倾。故必以元神为大药之归依，以大药为元神之点化，相与寂照不离，则阳炁自能勤勤发生，与真息相运于神室，而元神得其培养以相炼也。</p>\n<p>问曰:何谓将此炁炼而化神也?</p>\n<p>答曰：大药得火炁，相运于神室。既能点化神中之阴，阴神赖以降伏，而念虑不起；又能培补神中之阳，阳神愈益阳明而昏睡全无；不谓之炼炁化神不可也！</p>\n<p>又问曰：《直论》注中，既言伏气于丹田炁穴中而结胎，其后正文，又言大药转归黄庭结胎之所。盖炁穴属下田，黄庭属中田，何以言结胎之所，有二田之别也？</p>\n<p>答曰：初行大周天之火，元神虽居于中田，却连合下田二炁以为妙用。必元神寂照于中下二田，相与浑融，化成一虚空之大境，使二炁助神结胎，故二田皆是落处。若拘守于一田，则神有滞碍，而失大圆镜之智用矣。乌乎可！</p>\n<p>问曰：《直论》中所谓守中之理，敢请详训？</p>\n<p>答曰：中也者，非中间之谓中，乃虚空之谓中也。守也者，非拘守之谓守，乃致虚之谓守也。守中也者，不着意于二田，亦不纵意于二田，即所谓元神寂照二田，成一虚境是也。故能葆中之体者，一念不生，寂然不动；直守到食脉两绝，昏睡全无，亦须臾不离于寂也。能尽中之用者，灵光不昧，迥脱尘根；直守到二炁俱无，念无生灭，亦须臾不离于照也。从来体用不分，寂照同用，所以全十月养胎之要务者，盖如此。</p>\n<p>问曰：《直论》中言胎，又言胎息，又言真胎息，请一一言之？</p>\n<p>答曰：十月之关，有元神之寂照，以为二炁之主持，故云胎。有二炁之运行，以为元神之助养，故云胎息。忘二炁运行助养之迹，而胎神终归大定，故云真胎息也。</p>\n<p>问曰：大周天火候，请详言之？</p>\n<p>答曰：自服食大药之后，三关九窍阻塞之处，尽已开通。须知此后二炁勤生，自能运转于已通之正路，服食于二田之虚境，以培养夫元神。故其一升一降，循环不已，亦自然而然者也。可见此时之火，是自不用意引之火。火既不用意引，又岂可着意于火，而滞碍夫元神之大定也哉！惟是不见有火相，方合不有不无之文火，为大周天之火候也。然非元神寂照于二田之虚境，又安得二炁之勤勤发生，运养不绝，有如斯也？</p>\n<p>问曰：十月关中，历月自有景验，愿闻其详？</p>\n<p>答曰：初入定时，守定三月，则二炁之动机甚微，但微动于脐轮之虚境而已。若守至四五月间，则二炁因元神之寂照，以至服食已尽，而皆归定灭。元神因元炁之培育，以致阳明不昧，而得证真空。二炁俱定，食性已绝，独存一寂照之元神，以为胎仙之主矣。更守至六七月间，不但心不生灭，亦且昏睡全无。更守至八九月间，则寂照已久，百脉俱住。更守至十月，则候足纯阳，神归大定。于是定能生慧，自有六通之验。六通者，漏尽通、天眼通、天耳通、宿命通、他心通、神境通也。前炼精时，已有漏尽一通，至此方有后五通之验。盖天眼通，则能见天上之事。天耳通，则能闻天上之言。宿命通，则能晓前世之因。他心通，则能知未来之事。惟神境一通，乃识神用事，若不能保扶心君，即为识神所转却。自喜其能修能证，而欢喜魔已入于心矣。由是喜言人间之祸福，喜言未来之事机，祸不旋踵而至矣。惟是慧而不用，则能转识成智，始得证胎圆之果也。古云：“三万刻中无间断，行行坐坐转分明”。正所以发明十月养胎，只在绵密寂照之功而已。全也。</p>\n<p>问曰：《直论》注中谓，卯酉子午之位是沐浴之位，故初关活子时有沐浴之用。何以中关十月，亦有沐浴之用，并防危虑险之机，乞师详示？</p>\n<p>答曰：五行在世道中各有所论生死之理，如长生、沐浴、冠带、临官、帝旺、衰、病、死、墓、绝、胎、养十二者之十二位是也。火长生在寅，沐浴在卯，</p>\n<p>死在酉。水土长生在申，沐浴在酉，死在卯。金长生在巳，沐浴在午，死在子。木长生在亥，沐浴在子，死在午。故卯酉子午之位，是沐浴之位，亦是死而不动之位也。当知：洗心涤虑，为沐浴之首务；二炁不动为沐浴之正功；又当知真炁薰蒸，亦是沐浴之义也。防危虑险者，防其不洗心涤虑也。若不洗心涤虑，则难得真炁薰蒸以臻二炁不动之效。故沐浴之义之用，亦只在绵密寂照之功而已。前《直论》注中，有欲知沐浴之义，可自查语录，以考其全机者，此也。所谓“一年沐浴防危险”者，亦此也！</p>\n<p>问曰：慧而不用，始证胎圆。胎圆确证，尚冀详明？</p>\n<p>答曰：数月以前二炁俱无，食脉两绝，已有明征矣。是以无论在十月关内、十月关外，但有一毫昏沉之意，余阴尚在；有一毫散乱之念，神未纯阳；必须守到昏沉尽绝，散乱俱无之时，方为纯阳果满之胎神，而已入于神仙之域矣。佛宗云：“初禅念住，二禅息住，三禅脉住，四禅灭尽定。”合此宗也。</p>"}, {"id": "xf_dd8", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "出神景·出神收神法 第八", "content": "<h5>出神景、出神收神法 第八</h5>\n<p>问曰：《直论》中，所谓神已纯全，胎已满足，必不可久留于胎。再用迁法，自中下而迁于上丹田，以加三年乳哺之法。伏望指示？</p>\n<p>答曰：上丹田亦名泥丸宫，阳神归伏之本宫也。归伏本宫，阳神未壮健，如婴儿幼小，必凭乳哺，故有乳哺之名。倘拘神于上丹田之小境，则失还丹之义旨，大悖乳哺之法矣。其法兼存养之全体、出收之大用，而言者也。盖存养之功，不着意于上田，亦不纵意于上田；惟一阳神寂照于上田，相与浑融，化成一虚空之大境；斯为存养之全体，乃为乳哺之首务也。存养功纯，自有出神之景焉。出神景现，神可出矣。当出而不出，则不超不脱，难入圣阶。故出神之景，在所当知也！当其存养功纯，忽于定中，见空中六出纷纷，即出神之景也。斯时也，即当调神出壳；一出天门，而旋即收焉。出则以太虚为超脱之境，收则以上田为存养之所。须知出收之时少，而存养之时居多；又出宜暂而不宜久，宜近而不宜远。始则出一步而旋收焉，或出多步而旋收焉；久之或出一里而旋收焉，或出多里而旋收焉；乃至百里千里，皆以渐次而至，不可躐等而至也。所以然者，以婴儿幼小，迷失难归；或有天魔来试，乱</p>\n<p>我心君；故须出入谨慎，方能全虚空之全体于往来之中，以完夫乳哺之大用也！古云：“道高一尺，魔高一丈。”不但天魔来试道行；抑且识神变现使然；总要保扶心君为上也！若乃仙佛种子，最初还虚功纯，则灵台湛寂，不染一尘。本无一物，魔自何来？此又度越等夷者矣。故修士当以最初还虚为急务也！若夫乳哺谨慎，能还虚于三年，则阳神始得老成。自可达地通天，入金石而无碍矣！佛宗云：“始成正觉，如来出现。”又云：“神成出胎，亲为佛子。”合此宗也。</p>"}, {"id": "xf_dd9", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "末后还虚 第九", "content": "<h5>末后还虚 第九</h5>\n<p>问曰：《直论》中有上关炼神，九年面壁之名末后还虚。未审炼神义旨，求师详示？</p>\n<p>答曰：炼神也者，无神可凝之谓也。缘守中乳哺时，尚有寂照之神。此后神不自神，复归无极，体证虚空。虽历亿劫，只以完其恒性，岂特九年面壁而已哉！九年云者，不过欲使初证神仙者，知还虚为证天仙之先务也！故于九年之中，不见有大道之可修也，亦不见有仙佛之可证也。于焉心与俱化，法与俱忘，寂之无所寂也，照之无所照也，又何神之可云乎？故强名以立法，名为末后还虚云尔。佛宗云：“欲证虚空体，示等虚空法。证得虚空时，无是无非法。”合此宗也。</p>"}, {"id": "xf_lx_xu", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "天仙论语六类·本序", "content": "<h2>天仙论语六类</h2>\n<h5>本序</h5>\n<p>冲虚子自序曰：古来高真上圣，仙佛初修，师徒授受之际，莫不有所以为明道之语，道以语明于当时，又录之以垂诏后世，善哉，语录之心广矣大矣，而世之教颦录语者遂多矣，而语之殊类，叛道者更多矣，夫何谓之多类，有所谓真实语者，有所谓倚语者，有所谓妄语者，倚语妄语乃十戒中之二欤。彼下愚外道，不知生之由而死之故，竟失长生超劫之本，而悖证道了性之宗，指邪说旁门，邪说者，用女人为鼎，採阴之说也。旁门者，用按摩导引，却病之工也。为玄机妙道，此以假为真之妄语也，录之乃所以欺世，彼初学浅见，略闻三宝而知宝之有三元，三宝者，精炁神也，张真人云炼精者炼元精，炼炁者炼元炁，炼神者炼元神是为宝之三元。未论五仙而不辨仙之有五等，五等者，天仙、神仙、地仙、人仙、鬼仙，五者是也。或言其炼精炼炁之无序，不能知炼精于初关之百日，炼炁于中关之十月，不知初关则不知精还补炁，不知中关则不得炁化补神。务为高远之大言，强不知以为知而为妄诞自偕之言，公然欺世。或巧于谈妙误玄之无稽流入虚空之幻说，此以少为多之绮语也，略闻一句粗浅之言，便巧设百千万句断空诳语。录之乃所以感人，斯二者害人之深又何贵语炼之行于世哉？予自初冠时便有志于天仙大道并诸佛密旨得遇几里之曹还阳老师并一仙佛洞泄真宗，所闻者真实语也，及后遇诸贤以为答者亦真实语也，夫出世之道，非真实不足以证仙佛；垂世之道，非真实不</p>\n<p>足以辟绮妄。绮妄盛则障道，世岂有仙佛种子而可执绮妄为道哉？乃不知所以为道而何由以证佛证仙耶？尽见愚夫以却病採战者为仙道，以投胎转劫者为佛法，投胎转劫是死于此生于彼，乃凡夫沙门果，是须陀洹之事，非佛法也，只求不落轮回六道者耳。误人丧身失命，此等人不教人学不死不生阿罗汉果，只教人学死，若又不明此一线，则误丧失于六道轮回也必矣。良可痛哉！惟是悯世之心不能泯灭，思为普救普度，乃干冒天谴，以予素所答述足以发明予《天仙正理直论》一书，兼明佛法正宗亲旨者，集录为编，继之直论之末，为一大注脚。字字句句皆从三清九霄三十六洞天玄文秘典中流出，以及西方佛说经文直旨合语一道，从彼世人之强名曰仙者，我则名语曰天仙论语，从彼世人之强名曰佛者，我则名语曰西方东土禅髓。西方是释迦佛所修公案所说经旨。东土者，是达摩来东以后，诸祖诸禅师所说修行正法，即宗门祖师禅，故皆名禅髓。予于北七真丘祖长春真人派下录此语也，当与南宗张紫阳真人《悟真篇》及《玉清金笥秘文》之书并行不悖，咸引人于当道，以推广度人之志于百千万亿劫而流行天地之中，令人知有正法，得有正证，正足以报仙佛度我之洪恩。后来圣真见此，若予面谈，能自策励精勤，则天仙诸佛世尊，便从此证矣，可不勉哉！</p>\n<h6>时在</h6>\n<p>崇祯辛巳年秋日，冲虚伍子书于南都灯市道隐斋中。</p>"}, {"id": "xf_lx1", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "一、授受类", "content": "<h3>一、授受类</h3>\n<p>吉王朱太和 十问 法名太和，号云水，在宗人府玉牒名派常淳，睿皇帝重孙。</p>\n<p>一问曰：蒙指我以真药物，犹未明辨所以为药物之真？尝闻上古圣真及师仙所言，只是口说真药物，犹不知自身中辨何为真？何为不真？故不免疑而再问之。</p>\n<p>伍冲虚答曰：真药物，即真精也。精何故言真？以修仙道可用者，名曰真。不可用者，不名真。彼后天交媾之精，即不真。交媾淫精，已有</p>\n<p>重浊形质，不能变化复返为无形质之元炁而化神。既不能化炁化神，便是不可用者，故不真。庄子《南华经》云：“既已为物矣，欲复归其根，不亦难乎？”陈真人云：“贪瞋爱欲不能离，安得此身延寿考？”抱朴子云：“有一等专守交媾之术，以规神仙，而不作金丹大药，亦愚之甚也！”先天元精乃谓之真精。未有天形之先，只是元炁。如未有人形之先，亦是此元炁。然生天、生人、生仙、生佛，皆是此炁。故云：至静未动曰元炁，静而时动曰元精。元精实即元炁，非二也，而强名为精，乃修仙成道之根基，始是修仙可用之真精。第世人，人人能说真精，世人见仙只言真精，遂亦藉口乱说知真精以诳人。况彼不遇真仙亲传，何由知得精之真者？不过执后天交媾之精，冒认指为真精者也。凡斥称世人，以其迷恋世法之人，非真苦修志学者。仙何肯传大道？假令闻道，亦无用处。及至诳人，皆指媾精为真精也。或有暗与道合，偶似一遇其真者有之，终不知其所以然之妙理也。顾与弢庠友在道隐斋中问曰：所以然之理？愿得再详之。冲虚子答曰：静动生灭之有循环，人人之必然者。且循环不穷，焉不一遇？由学不得真传，虽遇先天发见而竟失却；亦不知辨真与不真而用；皆由不知所以然也。何为所以然？盖人自有淫媾之后以来，精耗而因以耗元炁。炁曰元是元头始初之炁，无形者。耗而少矣，必补而足，方可长生不死。必用无形一样元炁补之，才方相受。若有形之淫精，则自炁变落下一层，故不相受、不相补。既身形与精形相隔，有形与无形不相受，此理之所以然也。不知者：盖精生有真时要知，而不知则精中真炁不足，即补炁亦不得足，不能成仙；当採取配合，亦有真时当知，若不知，则精炁不能真足者，即补精亦不得足而化炁，亦不成仙。能知此所以足者以补，则身中元炁自能长旺、圆满，可伏胎入定、出神入仙。故古圣云：“杳杳冥冥，其中有精，其精甚真。”得所以然之真，方能成仙而了道，此正所谓道之原也。必先知此所以然者，而后能求，求而能得。若世人浮慕而闻其粗浅套语，安能知？彼人有从有念而为精者，即交媾精之类也；与弢问：此有念？答曰：有念者，有淫媾之妄念也。因淫念而生之精，即同交媾精。因淫事而生之精，亦即交媾之败精。精已败者，炁已耗矣。更何以得长生？故《华严经》中，佛言：初禅念住。《楞严经》中，佛言：汝以淫身求佛妙</p>\n<p>果，轮转三途，必不能出。如来涅槃何路修证？陈虚白云：“大道教人先止念，念头不住亦徒然。”是仙佛皆同除此一念也！有从无念而为精者，即先天元精也。与弢问：无念？答曰：无念者，无淫媾之妄念。虚极静笃，乃未有天之先，未有念之先，在杳冥中之精，为先天元精。世人每有无念而遇，未得师度仙机，竟弃而不用。或知元精之虚名，而不知当用之真时实用，故不免当面错过。于斯二者，亦有炼之，而亦竟无成功，是何故？二者，是言有念、无念之淫精、真精也。淫精炼之无成，固宜矣。而有略知真精，炼之亦无成功。不知此是何故？盖由不知辨所以妙理，则亦不能辨所以妙用。真精由鸿蒙杳冥判来，其妙有可长旺，得身中之精炁者；犹有不能长旺中之精炁者。若人不知当採时之妙理，即不知用当採时之妙工也。不过只是遇得世间凡夫，传得世间凡夫法耳！凡夫法皆是邪淫事。或有被人讥贬耻笑，不敢说邪，转为口说清净，而身心所行，实不清净。口说真精，竟是杜撰，空亡幻说，皆为欺人之谋，诡取衣食。学者遂执而信行，希望成仙，亦大误矣！与弢曰：或亦有执实行清净者否？答曰：虽有实行清净，终不得遇仙传药生之真时，採取烹炼之真时，不能得丹成仙证道。修至炁尽老死，依旧是一凡夫，死亡而已。绝无不死而长生者，总因与仙家辨真时不同，我故曰凡夫法。子已从凡夫学炼药矣，按其不成，便见其药之犹不真也。当知有异于彼，而为真药者在也。子者，对吉王殿下言也。不成者，是由不知药生之真时，不知採药之真时，故不得真药，不能补足身中未发动之元炁。炁补足，即是丹成。炁补之不能足，则是丹不成、仙不成。只是凡夫之妄为，非仙传之真药也。既见不成，怎不求真传，寻真药之妙理、妙用者乎？夫无念而得，为真精者固是矣。人而无念，则心真虚静矣。至于静笃鸿蒙时，似有动而忽有动机，正是真元精之先天也。此人人之本有，可遇而可得者。虽有知真精，而不得元神灵觉如是；如是精虽真，而亦不得为真精用。或有闻师言真精，而知真精之名。但因初学浅见，时至而犹不知。不能以元神配合宰运、採取、烹炼，亦至当面错过，如何能得真精用？如此，亦是知之不真，信受奉行之不笃耳！《玉清上妙功德经》云：不善修持而失法本，不能长生。天来子《白虎歌》云：“月无庚气金无水，纵有真铅</p>\n<p>枉用心。”此上天所秘之妙，实在如是！天所秘，是秘之不传无德，以传有德也。人与天相隔甚远，人德合天，则与天为一矣，故传与以如是。德之不修以合天，则不能得传也。如是者，是以元神辨药生之时为配合，得知此，则得长生不死、入定出定、神通无极。此上天之所以当秘也。《灵宝度人经》云：“水火二用，非圣不传。”举世间人，所不得知之妙，实在如是！天仙以如是秘法，得证仙于天。惟天仙之所知所行者，而世间人何以知？人能修德合天，即是天人，则可得知如是。不修德以求合天，即是凡夫下鬼，终于不得知如是者而已。欲学道修仙者，先当自勉，修合天德。海誓山盟而不敢轻泄者，实在如是！世有善根圣真，专心修德，精进学道。上仙高真，固肯传以道矣，犹且令设盟誓，如海样之深，如山样之大。忏悔其以前之或有错者，禁戒其日后之不为非，不缓怠于自修，不妄传于无德。其不轻泄药生、採药生真时者如是。《度人经》云：“长生久视之法，上天其禁至重。”得此真，即天仙矣，即同世尊佛矣。得此元精真，则精炁能化炁而成漏尽通，出阳神而超浩浩劫运。惟此真者，方是天仙之道；同佛道。不得此真，则谈禅说道，皆为幻妄虚言矣。若不得知此药生、採药之真时，则不成漏尽通，不出阳神超劫运，只成一个空谈妄语而已。子今得此于明言，精始真矣！药始真矣！言吉王如今得明白说此药生真时，始知仙道所用之真精、真药，始可成漏尽通、出阳神等事。始知不同于昔所学之世法，所言世法中之浊精而已者。一试修之，起首便能合道。古云：“起头不遇作家，到底翻成骨董。”若传得真，便行得合道，起头修也合道，到证果极处也合道。古云“九转工夫总一般”是也。悟一步则行一步，行一步则入一步，入一步则得一步，则知不传之妙，得果之灵，证道之速。既悟药生及採药之真时，则时真即是药真、精真，便行此採真精药之工。既行採工，令精随神凝入炁穴，周天烹炼薰蒸，久而炼精之工足矣。化炁足而得大药，成漏尽通，长生不死之初果。始知天仙所不轻传，有如是之妙；得长生之果，有如此灵验。总之，百日而得长生，十月而入定胎成，出阳神而神通无极。证道如此速！所以古云“成就只一二年”，不似淫邪旁门，穷年採战，至于老病苦死，而追悔不及者比。非彼世人所得知，所及证也，而世人之误信邪师诳惑者，可</p>\n<p>胜惜哉！世人不修仙德而妄求仙道，又不知果有真仙道之正理在，而求之，安得知而安及证？更被邪师以仙书真道之言，巧释彼邪说，诈以欺之。世世人人尽信其诳而不能疑，绝无能改过者，可惜被害而迷失仙道，且丧失本自有之现在性命也已。</p>\n<h6>二问曰:古云“水源清浊要分别”,敢求指示如何分别?</h6>\n<p>答曰：水喻真精，清即先天，浊属后天。源者精炁之所由以生者也。此仙圣示人，分别至切要之语，奈何世人妄解圣言、罔诬后学？仙圣之言垂世，必世人得受仙度者，而后悟解始真。若凡夫，但闻凡夫之教。甚至不受凡教，而徒然看妄人之妄注，而亦为妄猜妄解圣言，自称能悟得悟，不顾欺诳害人，而以迷指迷，遍古今也。若不向源字上用辨，只于清浊字劳心，谓后天中以无形之精为清，以有形之精为浊，元精，只是无形元炁，不可以形辨。可形辨者，后天。既为后天，又为后天之神所宰，虽未见形，亦已耗散，不得复元。若精不合淫念淫事，必不至于有形。及至有形，则中之真炁，已为淫事耗尽矣。以形辨是邪门外道所言，而仙道必不以如此为辨。呜呼！此地狱中种子之说也。凡言有形无形者，必是以淫媾为辨，淫败炁耗。古圣言炁尽则死，故为地狱中种子也。仙圣因元炁之生人，故教人炼住元炁，令人长生不死。殊不知先天元精，由静极而自动，炁至足而源至清，即谓真药物矣。静而动是天地循环自然之机，仙道亦如之；不是人心念妄所动者，故曰自动。《元始天尊说得道了身经》云：不识动静真机，不达真常全真妙理，如何得道成真？此问水源清浊辨法，与上章问中事同、理同、而问异，故两答之，各有详略，亦互为发明。而元神灵觉即能和合，是谓以觉合觉，随而探取，随而烹炼，不作世缘念想。用工一刻，即长一刻之黄芽，而金丹可就，仙道可冀。元精元炁有觉，而元神亦有同觉，即得时至神知之妙。以两所觉而配合，故云“以觉合觉”。如一夫一妇，始终不相离也。许旌阳云：“内交真炁存呼吸。”俞玉吾云：真机妙处在杳冥之内。冬至之时，必先闭塞其兑，澄心守默，使金与汞同归于炉中，如日月合璧，则神凝炁聚，金液乃结。倘忘其缄默，任重楼浩浩而出，则自取伤败也。本注云：用工者，即探取配合，烹炼之工也。一刻者，即一小周</p>\n<p>天火候也。黄芽者，即神炁内炼所成之真炁也。纯阳仙翁问曰：“何为黄芽？”钟离真人云：“真龙真虎是也，龙乃阳龙，出在离宫真水之内。虎乃阴虎，出在坎宫真火之中。”本注云：金丹者，金液还丹也，即元神炼元精所成之灵炁。又曰黄芽，曰大药。所以服食者，服之而结胎养神。神定而全，即是仙成。金丹成时，是命住。神得定，是性住。故曰金丹就，仙可冀，言必成仙也。若念想尘缘，拟议习染，而后精因之以生，则纯是后天思虑之神所致。此源浊者之不可用，以其真炁不足，不产黄芽，而有生必有死之决然者也！世人口称学道，而妄想凡情爱欲者多矣。情欲有动，则精必生。此精之生，不以静而内生，唯于身外偶生，故静笃之真炁不足而源浊，不可用以内修者。故广成子云：“毋摇汝精。”精摇则少而渐竭，无以还丹。故陈真人云“精少则还丹不成”是也。若此者，皆因尘缘习染，淫欲未断，皆凡夫事。犹在欲界最下处，与有生死凡夫同类，故与凡夫同必死者。或有水虽自静而动，而源亦清矣，其元神灵觉，虽觉而不能真觉。依然堕于尘缘习染，转为后天思虑之神所摄，则不复为清真，而妄用其採取烹炼，亦无成圣果之理。南岳魏夫人云：若抱淫欲之心，行上真之道者，清宫落名生籍，被考于三官也。宗道者贵无邪，栖真者贵恬愉。白玉蟾云：学仙非为难，出尘离欲为甚难。王玉阳真人云：“随情流转，定落空亡。更道难成、功难就，业难当。”于此辨得“源”字真，“药”斯真矣！水源即是药源，清真是药清真。源浊不清真，是药浊不清真。长生仙道，必分别源字为要。</p>\n<p>又问:水之清浊,何关神之清浊?</p>\n<p>答曰：静定之中，神炁如一，皆静也。如是，静亦神炁一，动亦神炁一。古云“时至神知”，即神炁同动是也。学者不知：神清是不著妄念，随水源皆清，是圣种；神浊，是水源著妄而浊，即皆浊，是凡夫轮迴种；故仙圣教人辨此为至急。《灵宝大乘妙法莲华真经》云：“性者，静也。炁者，动也。动静一如，非至人安能措心于此？”广成子云：“静则静于神意，动则动于神机。”动而外驰逐妄，则为二；动而不妄驰，犹然合一。非真清之同而何？元神一驰，炁亦驰；元神一染，精炁亦耗。非浊之同而何？</p>\n<p>动而为二者，神固有不知摄炁归根者，为二也。或有不遇，本根之对境散漫，驰于六尘之别境，亦为二也。俞玉吾云：“金火要同炉，在人一念返还耳。”此清同合一者，皆如是仙道之当然。反是，则根尘相触，而不能返还。此浊同合一者，亦如是。即《元始天尊得道了身经》云：“意定神全水源清，意动神行水源浊”之说也。陈虚白云：“心动，则神不入炁。身动，则炁不入神。”故我邱祖真人，亦有“心地下工，全抛世事”之旨在也。《楞严经》亦云“尘既不缘，根无所偶。反流全一，六用不行。”是也。此四条，皆结证上文神炁静动合一、不合一之旨。仙佛同然者，而禅宗人又言，动念即乖者，亦是此意。按邱祖教人心地上用工，即照而寂，寂而照之意，明心见性也。禅心无想，禅性无生，正与世事大相反者，法尚应舍而世事必抛也。抛至无生，便是性地。按《楞严》所言：尘者，是外来六尘之事与物也；缘者，相依著之意；根者，眼耳鼻舌身意六根也；偶者，根与尘相对也。言心不著于外尘，则不使眼根用见，与外色尘对偶；不使耳根用闻，与外声尘对偶之类。反流者，逆流之水。故洞山和尚言“洞水逆流”，即仙家返还真一之水意。真一之流得返，则命根断，性独明灵，六根之用皆不行，则心地之工成，而得证此。</p>\n<h6>又问曰:辨清何为?</h6>\n<p>答曰：清炁者，天之本体。欲为天仙，必以清炁，同于天之本体而后能与天合德。所以纯阳仙翁云：“炼药方可升仙。”谭长真仙翁《水云集》云：“今生若要登云路，不合虚无不能仙。”此言得同天之清炁，即可必证天仙。若有一毫形不能妙，则同于重浊之地体，而止合于地德，止证得地仙而已矣！地仙不能离于地，故名地仙。所以纯阳仙翁云：“炼形止于住世。”可得百千万亿岁寿，不能升于天者。有志于修天仙者，不得不辨之，寻向上去。</p>\n<p>三问曰:古云:炼精者,炼元精。非交感之精。未审元精未及炼者,亦成形似交感之精否?抑止于元精,而不至似交感之精否?请详之。</p>\n<p>答曰：精一也，有元精、淫精之异名者，是由主宰之者而致有异也。岂自异哉！然元精在身中，静笃时，无形之精也，即元炁，即先天。广成子答黄帝云：“至道之精，杳杳冥冥。”是也。虽能生诸后天有形，不得神宰，亦止于先天无形，而不自为后天生有形。虽久而不探不炼，亦只成先天之散炁而已。世人皆言：成有形之精，谓探之迟者及不探者，皆老而成形。此言大非也！彼是妄谈房术淫媾之精，必至如是，而不可以语仙道元精也。毕竟仙道不同于世说。有神宰为交感之用，而后变化成后天，非自成后天也。当其隐于寂静之中，静极而自动，曰生精；是天地人自然循环之生理，当如是也。故修丹者，由静极而生之精，名曰精，而实非精，故曰元精。未妄动而炁本自足，炁足则能成丹，转运而胎神出神也。所谓以精补精，因精以淫耗，而炁为之不足。仙圣教人，以身中发出之元精，不令再耗，返还而补未发动之炁，令足。所以补者，补之令足也。精炁足，如十六岁童子，即是长生不死根本。若不能补足炁，而炁不得补足，终非长生不死之仙道。《玉清上妙功德经》云：“不善修持，而失法本，不能长生。”《大还心鉴》云：“至阳生，不修行益生，何得长生乎？”然炼丹必不用交感之精者，是何故？以其或偶触目、触耳而生，或念妄而生，触目者，是眼根偶见淫色。触耳者，是耳根偶闻淫声。念妄者，是心中偶起淫念。皆所以生淫精者。生不由静，而炁不足。炁不足者，原非丹本，即不能成丹，以长生不死。彼又以将见精为幸，不知及将见精，其势即为后天之败精而已。昔广成子答黄帝曰：“毋摇尔精，乃可长生。”陈泥丸云：“树根已朽叶徒青，气海波翻死如箭。”焉得有已败之形枯炁尽者，而能复返为先天，入于无形之炁乎？故仙道与邪门之所以异，必不用淫精也！王重阳真人云：“回首处便要识希夷，煅炼须将情灭尽，修行紧与世相违。”故紫阳真人云：“幻丹者由未静心田，遽探一阳。阳非真阳，神非元神。以欲念而交会阳生，此幻丹所以有；直探之升至脐，又无安顿处；后天的一败精，荡然而去；先天又无主；此非长生之丹，乃促命之法。”此深示人：以后天有形者，必有</p>\n<p>坏也。《黄庭经注》云：“学仙之人，一交接，则倾一年之药势。二交接，则倾二年之药势。”已往之药，都亡于身，所以真仙常慎于此。伍子又申明前注：既学仙，则精炁常聚而多，倘一交媾，把所聚精炁亦倾多；说倾一年之药势，大约言也，我谓更多倾者也有。精炁甚难成药，万幸得成药，岂忍媾倾？最宜慎保精也！张翁所言先天主者，是先天所由生之根本意也。后天精不耗散，则先天精亦不耗散。后天盛，则所生先天亦盛。淫媾用精竭者，则先天之精炁无由所生，而有阳绝之病。故云：先天无所主。张紫阳自家又云：“大药不离精炁神。”要识药材，又精炁神之所产也，非便用精炁神也。总之，知炼元精，必先要知个精生有时，知其真生时，及当採之真时者，则得元精而炼。若不知真生时、採时者，而元精犹不能得，何以虚浮用炼？予有一诗，子其悟之。</p>\n<p>诗曰：</p>\n<h6>元精何故号先天？</h6>\n<p>非象非形未判乾。乾者，天也。言未分判天地之时，无形无象，惟虚无之炁耳。判为天时，则有形有象。元精是未有天以先之名号。故云：未有象，未有形。</p>\n<p>太极静纯如有动，</p>\n<p>仙机灵窍在无前。太极者，虚极静笃之极至。总包含阴阳静动，每静笃时而自动。故曰：静纯有动。如者，动无拘定之时，如或速或缓，活动而生之意。然曰如有动者，初动之机，未判天之时，喻天之生先天精似有不有，即当用我似有不有之妙用。若动而成动则判天，动极则所生，皆后天矣；非仙佛之所用。必其仙机有动之灵窍：虽然如动，犹是在天无形之前；必不可至天有形象之后；取元炁也。</p>\n<h6>梦回妙觉还须觉，</h6>\n<p>识到真玄便是玄。妙觉者，知如动之妙也。觉在外境，世人每妄猜而言之。觉在内境，惟天仙知之行之，唯由天仙传之故也。</p>\n<p>世人不知，而由无传，此仙道所以与世之凡夫异也。修仙者，必要知内之妙觉始得；故我显言之曰：还须觉。真玄者，再申前言妙觉如动也。</p>\n<p>说与后来修道者，</p>\n<p>斯言不悟枉谈仙。此诗将仙机泄尽，指示后学圣真、仙佛天人，必当于此参悟而真修。不然，无下手处，虽欲空谈，无下口处。</p>\n<p>四问曰:如何是药生採取？如何是运火炼丹？如何是得丹服食？如何是成仙了道？</p>\n<p>答曰：</p>\n<p>阳炁生来尘梦醒，阳炁生，是真阳之精炁生而为药物也。吕仙翁所谓“一阳初动”便是。尘梦者，是百日关中欲界凡夫初修时，未绝尘，未绝睡魔，而有尘有梦者也。尘，即六尘中之色尘、声尘是也。大修行，凡有尘，即当如佛言“背尘”。有梦即当醒觉。梦与醒，原来循环无端者也。梦亦静里将动之一机，所以夏云峰亦云：“自然时节，梦里也教知。”梦醒者，喻有妙觉在。此句，答药生之说者。</p>\n<p>摄情合性归金鼎。以神驭炁，凝神归入于炁穴也。白玉蟾云：“以端坐习定为採取。”此句，答採取之问者。</p>\n<p>运符三百足周天，符者，周天之火符也。周天，本三百六十五度四分度之一；此言三百则足者，内有卯酉二时沐浴，用无数之候也。陈泥丸亦云：“但守火爻三百刻，产成一颗夜明珠。”是也。</p>\n<p>伏气四时归静定。伏气者，如古人所言“长生须伏气”也。四时者，四正之时，又顺四季之时。故《参同契》云“顺时须谨节”是也。静定者，是火候至微妙处。此一句，答运火炼丹之问。</p>\n<p>七日天心阳复来，百日关，初下工时，只有微小阳炁来复。及百日之工用足，则筑基已成金丹。乃採之于七日之间，则阳炁满足之大药，随採而至，此正阳炁来复也。若于此阳不来复，</p>\n<p>即是药不真，不合当採之时。火不真，不合周天之当行当住。此句，答运火之问。</p>\n<p>五龙捧上崑崙頂。既炼成丹得大药，則用五龙之仙机，捧过三关上顶，转降而服食之也。此答得丹服食也。</p>\n<p>黄庭十月产灵童，服丹后，而服二炁于黄庭，养胎十月而成神。</p>\n<p>驾鹤龙霄任游骋。神全而产阳神之灵童，出壳超凡，驾鹤上升，玉京金阙，无不可游之处。正是通天彻地，知古今，知来者之能事成矣。</p>\n<p>五问曰：世人学道，各立一门户。有言必调息者，执呼吸而不已，障于道而无所成；此是不知从有入无者。有言不必调息者，纵呼吸而不顾，背于道而无所事。此是不知从无入有者，一无所修，则与凡夫原来不别。上文执者，与佛说“事障与法缚”者同。下文纵者，与佛祖所说“无记空”同。我屡习为，不唯无功，而且有大害。始知彼凡夫外道，偏执断见常见，拟议作知见者耳。未审必当如何是天仙大道之调息？</p>\n<p>答曰：调息之义难言也。难言者，难以一言而尽彻始彻终也。凡对初机之言，必由于粗而浅，以渐进悟。既悟粗浅，明了而后可言精深。真修实悟学者，未有不悟浅入深，悟粗入妙者。汝自悟来，而后可言。</p>\n<p>曰：参悟到不知旨处，故详问之。</p>\n<p>答曰：调息者，初机小周天火候之用，本具有进火退符、沐浴温养之义也。一呼一吸故为息，仙家，谓之太极之○也。佛并诸祖，谓之圆相之○也。不呼不吸亦为息。仙真谓之太极中无极之·也，佛并诸祖禅，谓之圆相中之·也，所以有水牯牛之喻。当呼吸之息，心与息不相依，则不调；是神不能驭炁也，神炁不曾配合而相离矣，间隔不调。唯交并则调。《黄庭经注》云：“出为呼气，人为吸气，呼吸之间，心当存之。”又佛言“随顺”，是随息而顺其自然之妙也。皆言心息要相依。若相依而强制执著呼吸，而不随顺自然，则亦不调。心息依矣，荡然漫行，而不由真息之道，则不调，心息相依时，行则同行，住则同住，行所当行之路，住所当住之处，</p>\n<p>无不是相依，方可曰调真息。道者，即黄赤二道也，神炁同行必由之道。若能由此道，探取而能得炁，烹炼而能成丹，胎息而能冲和大定。不能由此，则不能得炁成丹而定神也。古仙所谓“行之不精”是也。门人问丹阳真人：“弟子行道数年，道眼不明是何故？”真人曰：“行之不精。”能由真息之道矣，行之太速，则近荡而不调；行贵速而忌太速，恐太速之似浮而不就息道。若浮而不就路者，则神炁皆似散漫而不凝聚，心息虽依而不成相依之功。行之缓，则滞有相之呼吸气，而必成大病。缓则神炁滞而不行，或欲行而不见有神炁之行，或欲行必资于呼吸有相之气。然呼吸全不宜执著者，呼吸之气一著，便起邪火而为疾病。古所谓“非炼呼吸之气”是也，亦不调。《华严经》云：“为践如来所行之道，不迟不速，审谛经行。”是也。</p>\n<h6>又问曰:必如何而后可言调?</h6>\n<p>答曰：速而不荡，缓而不滞，纯阳真人云：“绕电奔云飞日月，驱龙走虎出乾坤。”自然能由真息之道者是。俞玉吾云：“火候之进退，不可毫发差殊，然后九转之间，可保无咎。”不见其有，谓之勿助。真息似有而不有，若见为有息，则助长邪见。不见其无，谓之勿忘。真息本无而似不无，若起见无息，则不成真息。非有非无，非见非不见。见有、见无，皆是偏见；即是断见、常见。皆有害于真息，故皆非。合乎自然，同乎大道。见有见无，固是邪见执著偏著；不见有无，亦是用意执著，而不免有偏执之为害；何以成丹而得大药？必合乎自然者，而后可同大道。此有一呼一吸者，不得不如是也。若不如是，则火候差失，不合天机，必不成丹而证道。</p>\n<h6>又问曰:不呼不吸之息如何?</h6>\n<p>答曰：更有自然之妙在焉，马丹阳真人曰：“调息者，不得著于口鼻。”调是作用，息是自然定息。非强闭气也。刘海蟾云：“莫将闭气为真炁，数息按图俱未是。”是也。闭极，则失于急而不调。闭气，是外道邪术之强制。闭必至于极也，而非自然真息之能无极；故不调。禅家云：“转得身，吐得气，亦似此意。而后可称为禅那拄杖子”。禅者，静也；那者，息</p>\n<p>也；言静定之息也。拄杖子亦言息也。人手执拄杖，相依而行路，喻人修佛，心必依息，而后能离尘离境，解脱而见性。欲大修行，心不依息而禅定，则止于外道凡夫口头禅而已。非纵气也；海蟾云：“专气致柔神久留，往来真息自悠悠。”言不可纵放如凡夫。上句强闭，即前所问执呼吸者。此句纵气，即前所问纵呼吸者。纵，则失于无知而不调。既纵放，不照管，则念不在息，便似不知有息，而息何得调？禅家故云：“未到水穷山尽处，且将作伴过时光。”亦似此意。而后可能摄心寂灭。</p>\n<p>又问曰:如何是此大用?</p>\n<p>答曰：古云：“自有天然真火候，不须柴炭及吹嘘。”《生天得道经》云：“心目内观真炁，所以清净光明。杳杳冥冥，昏昏默默；正达无为，安静六根；净照八识，空其五蕴；证妙三元，得道成真，自然修度。”佛经所言佛理，皆与此同。如此，便是自然定静。定静不已，百尺竿头，犹进一步，至于久而安。佛言“轻安”是也。安者，和也。佛曰“法喜”，曰“禅悦”。和而能冲，冲而无极，冲和之理，得矣。冲和理者，即《入药镜》所云“先天炁，后天气，得之者，常似醉”也。《灵光集》云：“颠倒循环似醉人。”《翠虚篇》云：“骨肉融和都不知。”王重阳真人云：“寻自在，觅逍遥，渐渐归禅定。”皆同此义者。即《华严经》所云“以定伏心，究竟无余”者，《梵网戒经》亦云：“如如一谛，而行于无生空。一切佛圣贤，皆同无生空。”无生至空，是寂灭至极处；正所谓穷空又能穷尽空理，即无余涅槃。亦同于仙之和而冲，冲而无极者。然真息在内，本有息之实相，而若空空无息。非果无息，而实有也。既曰真息，则与凡息不同。言真息在内，则有真息之实相。实相者，似空空而无息，始可入定到真无息真空地位。若不能空空而逼塞，不似无息而浩浩然，乃是凡息，而非真息也。故《中和集》云：“守似有，却如无。”深言真息在内之妙用也。盖真息者，是入涅槃寂灭必由之路也；凡息者，是堕凡夫不脱生死轮迴之事也；学者当知之。此节文义，皆言初习入定时之旨。不息则无相，无相则实不见有也，而亦若不见无也。上文言初习定，虽欲无息，乃习为无而未得无，故曰实有。及今不息之</p>\n<p>久而得定于无，全无凡息之相。既无息相，则直入无息为大定，而证圣证性地。若起一见有见无之见，则不可；起见则非定旨；故总不见有无。如此，方为得真定，而后可以还虚。所以空而不空，不空而空，而犹不见空。不见空不空，方是空而真空。即王重阳真人所云“虚空返照虚空景，照出真空空不空。”即世尊之“空不空，如来藏”者，皆是。当不空之时，而只知乎不空者，此堕常见矣；故不空而又若空，正是照而常寂也。当空之时，而顽然乎空者，此堕断见矣；故空而又若不空，正是寂而常照也。佛宗乃有“分明不受燃灯记，自有灵光耀古今”之说；故云：空不空，是真如来藏。予云：毕竟在寂照双修，寂照双亡而已矣。凡仙佛二宗，言空言寂、言有言无，皆言心息相依之定者。言心性，则有息在其中；言息，则心在其中；若非心非性，则不能定息；非息，则不得性定、心定；学者不可执文。偏悟便堕空亡，而无证果。能悟之者，仙佛合宗之旨见矣。悟得真空实性者，方能调此真息。息不能调，终难大定。本是以心主宰而定息，息不调不定，即是心性不定，何以至于合道？傅大士云：“六年雪岭为何因？大定调和炁与神。一百刻中都一息，方知大道显三乘。”人能即此息而离此息，斯可入灭尽定矣。即息而离息，是万法归一，一归无之说同旨。灭尽者，心无生灭，息无出入，得真大定也。咦！警醒后学仙佛圣真之辞也。灭尽定，而后能出定，未入到灭尽定而妄出，仙宗谓之走丹，佛宗谓之入魔。皆非所谓出定，而亦无神通可显，正有退堕之危险，宜防虑者。神通境界，向上正有还虚合道之旨在。灭尽生灭出入之定，是所当出。出而神能通达无障碍，不为六尘所障碍而不通。此真神通，方能上天入地，六通十通，百千万亿，无所不通；此证还虚合道之至极处。</p>\n<p>六问曰：药火之说纷纷，不知所以信受。一云：神是火，炁是药，以神驭炁，即以火炼药。此言神、言炁二也。一云：火即是药，药即是火。此言火药不分，神炁一也。一云：採时谓之药，炼时谓之火。意若神炁皆可言药，皆可言火。三说，何不同耶？</p>\n<p>答曰:同。</p>\n<p>又问:言句似异,而理旨何同?</p>\n<p>答曰：皆以神驭炁也。採时炁回神中，神炁合一而同升降，得药矣；则谓之药也可，即得汞之物，而名真铅者是也。凡言真铅、言真汞、言真息，皆仙道中合二者之全而言真。是二者不合一，不可言真，只是凡息凡铅凡汞而已。炼时神归炁穴，神炁混融，而同行同住，有火矣；则谓之火也可，即得铅之物，而名真汞者是也。真铅者，即身中所採取归根之精炁也。真汞者，即心中配合精炁，而为採取烹炼主之神也。盖言汞中有铅，则曰真汞。铅中有汞，则曰真铅。如是妙义，世所不知。故邱真人云：“白日同行，晚来同眠同卧。”正言神炁不相离之说。总是二物交并归一矣！李玉谿云：“以神驭炁为採药，以炁合符为行火。”皆言神炁合一，同行同住之说。谓药谓火，谓一谓二，何所不可？《灵宝度人经》元始天尊云：“令此神炁，妙合太空。空体自然，不属阴阳，自无生死。升入无形。克证道位，方名得道。”我有一诗，子其悟之。</p>\n<p>诗曰：</p>\n<p>言火言药总皆非，非火药，而强喻名火药者，乃圣真示人神炁之妙用而发明之者也。二者，本宜合一，故圣真每并一而言之。</p>\n<p>日月齐轮御炁飞。凡日喻神，月喻炁，日月有同度而行之时，神炁有相随而行，相依而住之理。然神本无，在有知时而似有。炁本有，在无相时即似无。有无不同者不相合，必因呼吸之气而合之，故仙圣皆喻以火炼药。非此必不能使神炁合，亦不能行能住如法也。邱真人云：“运行周迴，自有迳路，不得中炁斡旋，则不转。”故我曰御炁飞。</p>\n<p>子并后升天上去，</p>\n<p>午同前降地中回。纯阳真君曰：“子后午前定息坐，夹脊双关崑崙过。”即此。所言子时神炁相并从后升上，午时神炁同行于前，降下而循环。</p>\n<p>历辰十二皆留伏，十二者，身中之时也。皆者，言神炁当火候升降而行之时，行则皆行。当火候留伏而住之时，住则皆住。</p>\n<p>灌顶者，取元精真一之水逆回升上，而灌注于顶也。此即採药之说。佛宗诸菩萨修行，每一处说法谈经，必先以水灌顶，皆同此妙喻。奈何僧总不知不究，使佛教为虚设矣？盖由不除淫，扫去欲界，离欲梵行，虽见其说，竟置之无用之地故也。三双者，尾闾、玉枕、夹脊三关及脊骨两旁皆一窍，谓之黄赤二道，三关皆有双窍，故曰三双。默转移者，神炁从三关双窍中，默转循环也。</p>\n<p>古圣强名为火药，</p>\n<p>不离神炁自相随。即是“凝神入炁穴”一句，了却仙佛大修行事。</p>\n<p>七问曰:请问古喻,如猫捕鼠之义?</p>\n<p>答曰：以性摄情，以神召炁之喻，为然也。彼猫捕鼠时，四足踞地，寂然存不动之势，此心专意诚，即吕仙翁所谓“斋戒等候一阳生”之旨。两眼熟视，凝然俟擒鼠之专，谨防当面错过之义。故《阴符经》云“机在目”，即《楞严经》云：佛示阿难所云，“若不知心目所在，则不能降伏尘劳。”又云“长生久视”，佛所云“正法眼藏”，皆此义也。皆言“机在目”之义。此文，正合仙佛之所同者。究此所云寂然不动者以待通，可不似知白守黑，知雄守雌于百日关中者乎？此仙家之语，谓知金之白者，出于水之黑者之中，则待黑中发生白时，而採白也。雄是阳，即肾水中之元精炁。雌是阴，喻肾水也。下句，重言上句之义。可不似昼夜静思，以除六贼者乎？此佛世尊自修之案，在雪山六年，昼夜静思，以除六贼。六贼者，是眼耳鼻舌身意六根中所妄起，色声香味触法之六贼也。静思者，寂静而守正定正念，于二六时不间断。若生一欲念，则大为心害，堕欲界下矣。急持正念除之。究此之熟视无二则知，用志不分，凝神于十月关中者乎？此仙家之语，谓炼炁化神之中关者。亦可知佛说偃坐静室，恒作是念者乎？此佛家《圆觉经》语也，可知仙佛二家之说，皆与猫捕鼠同喻。故以猫喻主人，以鼠喻真阳药物。但捕鼠喻採药，乃初关有为之事耳。过此，则必忘猫忘鼠，非採非捕，而后可称了道。我今又为子</p>\n<p>原其始，当知鼠来有候，即药生有机。若不能辨真阳生机，将何能当其真机？则谓之如猫守空窟。若有知阳生真机，而不知当採时真机，不能得归根复命，徒然枯坐顽空，则亦谓之如猫守空窟，虽有身心自然生机，总成一个当面错过。此所以又当防为痴猫也。</p>\n<p>八问曰:何谓冲和?</p>\n<p>答曰：冲和者，言不息之息中妙义也。《咏玄集》云：冲和者，乃其二炁混同最玄之理也。充塞天地，薰蒸一身，天地并一身之间，全是氤氲充满，无空隙处。若有空隙不足，不名冲和。钟离真人云：“运周天，则火起焚身。”焚身之义，即充塞薰蒸义。不为呼吸之所障，亦不为升降之所围。有呼吸则无冲和；若吸升呼降之不已，不能与冲和迭为循环，亦囿于升降，障冲和；必离囿离障，方行得宜冲和之妙处。沐浴固曰当然，守中亦称密法。当百日关中，小周天之用者，曰沐浴。当十月关中，大周天之用者，曰守中。守中者，不偏著有，堕常法；不徒然著空，堕断法；似有若无，合乎中道之必然者而自然，故曰守中。正言所以冲和之妙用。后来之圣真仙佛，得师降授之后，方能印证解悟于此。刘长生真人云：“冲和炁养神。”世人不知调息之谓何，我则曰：调其息之和而可冲也。王重阳真人云：“能全呼吸定喘息，实非难。会养炁神调冲和，应甚易。”又云：“神炁冲和成大药。”世人不知于此当防危虑险之谓何，我则曰：防其不和而不可冲之危险也。不和，则堕于强制之旁门邪法，非不空而空之旨，焉能得冲？唯和故可冲，不和故不能冲。此二句重申明，总上文四句之义。採药以是，炼药以是，野战以是，此即仙机佛法之行所当行者。守城以是。此即仙机佛法之住所当住者。结胎以是，养胎亦以是也。此言百日而十月，小大周天火候之中，当不外于冲和也。昔刘长生真人云“冲和结坎离”，言百日关也。又云“冲和炁养神”，言十月关也。</p>\n<p>又问曰:是何景象为冲和?</p>\n<p>答曰: 不偏不倚, 偏倚是拘执著有相而非中。无过不及, 勿用意太急而过, 勿用意太缓而不及。不疾不徐, 不疾速而忽为浮荡, 不徐缓而失为</p>\n<p>停滞。非无非有。不纵放为无而实似有，不强执住有而实似无，即是空而不空，不空而空。除此八病，方和而可冲。有此，则不能冲。</p>\n<p>又问曰:是何作用以冲和?</p>\n<p>答曰：夫妻并肩，心息相依也。阴阳合一，二五之精，妙合而凝也。昼则同行，不前不后，心随息动也。前则堕于旁门之导引，后则不足为宰运，皆非和合之实义，此处最有危险之必当防虑者，故佛亦言“随顺”。夜则同住，不逼不离。息随心止也。逼则太过于冲，而不和。离则不及于冲，而不和。不和，即是此之危险。如斯了悟，便是冲和作用真三昧。若着前后逼离，皆差于冲和。冲和者，禅定之妙义。三昧者，《华严经》云：正定中真受用。</p>\n<h6>九问曰:何处当防危虑险?</h6>\n<p>答曰：自始至终，事事皆有危险，且略言之。除不敢轻泄者，遵天律重禁而不言。但以粗迹之可言者，而略言之。如药生有时，不知其生之真时而当面错过，此危险也。採药有候，失其当採之候而不得其真精真炁，此危险也。仙道之药生有真时，与世俗人造言诳人者不同。时若不真，虽曰採药，而无药可得。所自虚称为得者非真药，不能成丹，空劳而无益。生之真时，及至当採之真候，于此急採，而后可得真精真炁。火候之行周天，泛然于黄赤二道之外，茫然不见其循由，此危险也。火之行于子后午前，有黄赤二道，乃周天火子后逆运之所必由者。若泛然于道外而行，渺渺茫茫，不见循道而由行，此火必不就炉鼎而炼丹者。甚是危险之当防处！进火，不至于进之所当止之地，亦不至进之所当添者之分数；退火，不知退所当抽减者之程限，不合于多寡之仙机，此危险也。当止者，《黄庭经注》云：“出入呼吸，俱入丹田。”程限者：非不及而火小，不能成长旺之功而变化；非太过而火大，火轮不能转运而烈焰无所制。陈泥丸云：“採取有法，运用有度。斤两有则，水火有等。”与夫抽添进退之妙，沐浴交结之奥，无不防危虑险。白真人云：“温养之时，用心不谨，不防其危，不觉汞走铅飞。”火足而不知止火者，有伤丹之危险。崔真人《入药镜》云：</p>\n<p>“火候足，莫伤丹。”钟离云：“丹熟不须行火候，更行火候必伤丹。”张紫阳云：“炼了还须知止足。若也持盈未已心，不免一朝遭殆辱。”得药冲关，而窍不能真通，有药败之危险。此正由前知药生，而不合当採之真候，虽似丹而药力微弱，不能长生者，亦不能冲关。故药必复败，而同凡夫。关窍初通，而不能升三关，聚者而或倏退散，是危险。聚，由神以主之。或不精诚勇猛，以一箭透三关。一怠缓，则火即退散，正当行而不能同行者。三关过矣，而危险在鹊桥。鹊桥，本无路可通，借桥以通行。鹊者，似喻南离心神之朱雀义也。全凭心神领炁，渡过此处，故喻鹊桥。渡之少有不合仙机，则有危险矣。鹊桥渡矣，而危险在服食。归黄庭，步步向竿头，进一步无著脚处，虚空著一脚大有危险者。重阳真人云：“尖竿尖上细搜寻。”炼阳神而微阴未绝，神胎就而魔障百出，大有危险者。神无出景而妄出，固为危险；有出景至，而不能出其当出，亦不能无危险；及乎出定而入定，危险之最甚者；岂能尽言耶？如是诸多危险，俱能究竟，勘尽无余，过得去了，仅仅超脱得一个生死轮迴，实证长生不死；方为有分，与道相应。向后证到虚空，始无危险。所谓“万般有坏，虚空不坏。”是也。</p>\n<h6>十问曰:何为沐浴?何名沐浴?</h6>\n<p>答曰：沐浴者，炼精炼炁之要法，火候之秘机，机之秘，法之要。故不能直言以轻泄，而托喻为沐浴也。沐浴者，本卯酉二位，所寓生死之说也。时当卯酉，乃借以喻之，而详于下文。世尊行神说法之时，亦以沐浴为喻。可见仙佛宜有相合同之要法也！在小周天时，又名曰阴符；乃不行有数之火，而用无数以合于有数者。所以《三皇玉诀》云：“阴者，暗也。符者，合也。究合天地之机，操运长生之体，故曰阴符。”在大周天者，又曰：焚身三昧火。喻意云何？夫五行在世道中，别有所论生死之理，即长生一、沐浴二、冠带三、临官四、帝旺五、衰六、病七、死八、墓九、绝十、胎十一、养十二者，之十二位是也。此属子丑寅等十二支辰位者。其说曰：火生在寅，金生在巳，水土二者生在申，木生在亥。五行干支之阳</p>\n<p>者，即生于此四位。阳之死位，即五行阴干支之生位。阴之死位，即阳之生位。亦似喻彼，彼处死，而我此处生。死于此，而即生于彼处之义。圣真以人生死大事之机在沐浴法，故借以为喻也。生必有死，死处则生。言天地阴阳之与人同，未有生而不死，未有死而不生者也。仙家以炼丹之法比之，谓其所云：火之长生在寅，第二之沐浴在卯位。故借卯位沐浴之名，而称卯时所当用之机，以阴符其火候者也。又云：水之长生在申，第二之沐浴在酉位。故借酉位沐浴之名，而喻酉时所当用之机，亦阴符其火候者也。此正见阴符，即是沐浴。而黄帝、骊山老姥、李筌等阴符之说，皆大明矣。卯酉，在四正之位内，卯在正东，酉在正西，子在正北，午在正南。《入药镜》亦云“四正”。而金木二行，宁无长生沐浴之理在子午乎？如金之长生在巳，则沐浴在午位。木之长生在亥，则沐浴在子位也。故崔真人《入药镜》云“看四正”是也。崔真人泄万古不泄之机于三字。王重阳真人云：“子午冲和连卯酉，春冬秋夏相携。”达摩所云：“一时用六候，二候探摩尼，四候别有妙用。”即此之言，是也。</p>\n<p>又问曰：人皆言卯酉沐浴，不行火候，今乃谓之要法，谓之秘机，得无有火候而与众言相违乎？世人皆执言不行火，是全无火候。由不遇仙传，故不知古云不行火候所以然之理；俱是初学凡夫者之知见。所闻者曰不行，所见者曰不行，及己之对人言亦曰不行，流结妄局。绝无一人直信有法有机；唯伍子，独言法言机。于是彼皆学世法口谈者，竟不知众言或是或非，伍子抑非抑是，莫不以相违而相疑，殊不知真仙之言，已有可考证处。</p>\n<p>答曰：圣真言此四时之火，以不行有数之候者为候也。此隐言也，《参同契》魏伯阳真人曰：“耳目口三宝，闭塞勿令通。离炁内荣卫，坎乃不用聪。兑合不以谈，希言顺鸿蒙。”陈泥丸真人云：“沐浴交结之奥。”陆子野《注悟真篇》云“卯酉不进火，但以真炁薰蒸而为沐浴”者，此俱发明隐言，而已为真泄之说者矣。非全无火候为不行也。我得闻于圣师而知真，圣师者，虎皮座张真人、李虚庵真人、曹还阳真人。三圣自证之真而传真。</p>\n<p>印之仙书而同是。即魏、陈、陆等诸书。实不违于众也，而众自违之。彼众人，依傍仙圣之隐言，而呕吐其愚迷之臆见，遂言卯酉二时之沐浴，为全然不行火候；而妄夸为己之知见，谬造假书，妖言惑世。而世皆后学浅见，安敢置一辩言以为自信而救世哉！我则咏之曰：</p>\n<p>世称沐浴不行火，且道吹嘘寄向谁？</p>\n<p>要将四正融抽补，才得金丹一粒归。</p>\n<p>亦以此语，为未来际劫圣真辩明之也。更精言不行有数之候，为沐浴要法秘机也！后圣能真修实悟者，必当取证于此欤！有谓二八卯酉之月，不行火候而为沐浴者，可显知其非也。且论知非之法安在？以其有重阳真人云：“子午俱无，何须卯酉？”白玉蟾真人云：“无去无来无进退，不增不减不抽添。”钟离真人之言曰：“一年沐浴防危险。”薛紫贤真人亦云：“一年沐浴更防危。”俱可证也！以此证，知十月怀胎皆沐浴为真传；非止执于二八两月为沐浴而妄言之者非也！既说一年皆沐浴，则知二八月在年内者，皆然。有《真元通仙道经》云：“得之大者，冲和而久视。”此亦言非此二时之沐浴要久视也。既皆诫人防危，则必有沐浴之候，而防其不能沐浴。若彼谓不行火者，更有何危可防？我今又诫后圣，甚宜体究仙言。</p>\n<p>又问曰:古人何故言二八月,而岂无因者乎?</p>\n<p>答曰:古言二八月,因属卯酉矣。</p>\n<p>火之沐浴工，卯酉时虚比。</p>\n<p>借谓大周天，欲似其名理。</p>\n<p>勿执其幻称，误人千万纪。</p>\n<p>借言发明沐浴之机，如佛所谓善巧方便而说，岂可强执为实不行火，而败坏将成之大丹哉！更误害千万世信心学者哉！又观紫阳真人云：“火候不用时。”火候之用，小周天有十二时，时完则有间断。行大周天之火，不用时，则无间断。时且不用不间，又岂可以二八两月为间断？又云：“及其沐浴法，卯酉时虚比。”石杏林亦云：“冬至不在子时，沐浴亦非卯酉。”皆言小周天且不用时，而虚比沐浴；而谓大周天，可实用月为</p>\n<p>沐浴乎？我说既云莫向天边寻子午，又岂于历数中寻卯酉耶？若使养胎，而废二八两月之工，则神炁散而背道矣！十月关中，乃大周天养胎息之工，为转神入定也。若不行火，即是不转神、不入定，则炁不化神，何以得成阳神而出身外？抑可使妇人怀孕，而二八两月不怀乎？即妇人，无两月不养胎之理。断言修仙养胎，亦无两月不养胎之说。断然无惑！今此破万古之疑，泄万古之秘。同我《天仙正理直论》之所书“时”者，而发明大用。后之圣真仙佛，遇天人神师授道，嗣我邱祖长春真人嫡派者，必当从斯印证过，而后可谓之真知仙道沐浴。张紫阳云：“地狱不囚传道者，教存经籍度三师。”</p>\n<p>伍太初 六问 法名太初，号见初。第四叔</p>\n<p>父之子也，真阳之亲弟也。</p>\n<h6>一问曰:真修工夫,如何起首?</h6>\n<p>答曰：仙道不过炼阳精，以化炁为首者也。仙家，必先以元精返还于身中，而复归于元炁。佛家，则泛言戒淫欲，以出欲界。俱是除淫之义，起首若不如是，则为落空亡。若有一死，便是万生万死，轮迴不断，六道难离矣。若人能修如是离欲之行，谓之清净梵行；成得离欲之果，谓之清净梵德；为转神入定之真基也。究之佛门，惟浙僧间有谈及除淫离欲者，由天台智顗和尚之遗教，智者之兄名陈鍼，出于张果真人之门，故也。第少壮之人，神炁盛，动静循环之机速。言铅汞不少，故药生亦速。阳炁生，而后採取烹炼，所谓“一阳生是兴工日”，又谓“一阳初动，中宵漏永”是也，乃有药而后行火也。钟离真人云：“难得者，是少年。少年修持，根元完固，易为见功，止于千日，而可大成。又难得中年，中年者，先补之完备，次下手进工，始也返老还童，后乃超凡入圣。”老迈之人，神炁衰，谓之老来铅汞少者。纯阳六十四岁，遇钟离；白玉蟾六十四岁，遇陈泥丸；马自然六十四岁，遇刘海蟾；刘朗然子，亦六十四岁遇师者；刘宽于汉灵帝时，弃司徒太尉而学道，年已七十三，受青谷先生传道而道成。《翠虚篇》云：“老少殊途有易难。”马丹阳云：“有心入道当回首，况流年六九。性命宜乎早救，莫直待身</p>\n<p>枯朽。”动静循环之机迟，则敲竹鼓琴，为唤龟招凤之权法，而后阴极阳回，而为应採之珍。此《悟真篇》之旨也。又云：“不定而药不生。”此《玉清金筍秘文》之旨也。重阳真人曰：“纯阴之下，须是用火锻炼，方得阳炁发生，神明自来。”是也。神明者，即真精元阳之妙觉。龙眉子亦谓“风轮激动产真铅，都因静极还生动”者之说，皆是也。乃有机先一著，而后生药，以行火也。《灵宝毕法》钟离云：“晚年修持，先论救护，次论补益，自小成积功至中成，中积至返老还童，炼形住世。”是也。此起首玄妙天机，而世人不得知者，有如此。今举世但言衰老者不可修，盖不闻此理也。重阳真人云：“若还悟此，目下便回头。蓬莱路，彩云端，有分相随入。”我则曰：有此一口气在，皆可为之。凡有一口呼吸之气，皆由元炁之所化生。一口气在，即元炁之犹有在，是长生之根本在也，故可为修仙之事。马丹阳云：“气不断，神可固，先把马猿用工擒住，自然得性命停住。”盖亦观之《黄庭经》云：“百二十岁犹可还。”我祖师重阳真人云：“便如百岁未为迟，只在心中换过时。”陈泥丸云：“若欲延年救老残，断除淫欲弃旁门。”亦云：“古人八十尚还丹，泥丸云：‘果欲留形永住世，除非运火炼神丹’。老子自言头尚白。”老子者，李老君也。即太清大赤天太上老君，分神化现，下降于世。盖由元始天尊，初开辟为成劫，而至劫坏。次开为成劫，分神化生大道君，及劫坏，已历四劫。次开为第五成劫，而初又分神化生老君，以主太清。因其已历至五劫，而称老故也。头亦示以白故也，及老君分神降于李下，亦示人以头白，其曰头尚白；自言修之迟者。指人虽老者，犹可修成，惟要精进以求成也。马丹阳赞勉人云“六旬有九，才方修补”，众人言晚了时光，马讽道：“未暮。”又答：“人云八旬有四，因甚发心修，勿言老休寿相，气不断，亦可修持。速澄心为尚。”白玉蟾云：“今已九旬来地，尚且是童颜。”此皆言：虽老犹可修也。葛仙翁云：“吾今六十，忧赴三途。”王重阳真人自叙云：“五十二年光阴急，活到七十有几日？前头路险是轮迴，一失人身万劫休，如何能得此中修？”刘朗然曰：“莫待老之将至，宁知身后何如？”丹阳云：“寻思最紧是修持，急急修持</p>\n<p>尚嫌迟。这性命于身紧，一息不来身为土粪。愿省悟疾速修持，固气精，神仙准。”衰老者，又安可以老自诿，而不决志速修之哉？少壮者见斯，毋谓老既可修，而纵心自怠，以至于老。钟离云：“过了一年无一年，过了一日少一日。”丹阳云：“七十光阴能几日？大都二万五千日。过了一日无一日，看看身似西山日。”又云：“寿数休言百岁，从今古，人生七十难得。”张紫阳云：“莫教烛被风吹灭，六道轮迴难怨天。”有缘遇此，当知为万古仙真，催人早修之特旨也！</p>\n<p>二问曰:甚时候,是初用工之时?</p>\n<p>答曰：凡人之炁与神，皆日主动，而夜主静。由天道以日而生动生阳于静后，至夜则环为静也。人受天生，亦顺受其日动夜静者。动作休息，是人所以顺天者。求修行之静，莫不以唯夜为然也。俞玉吾云：“修炼力久，更无梦觉之异，虽当寝寐，神亦不昧。精生之时，不待唤醒，亦自觉悟。”夏云峰云：“自然时节，梦里也教知。”静而复动，则用工也。此纯阳祖所谓“动则施工，静则眠”之训也。我于万历壬寅春，初试百日关于家，而炼精以化炁。首一月调习，次一月精进，时至神知，运一周天，斡音豁旋斗柄，默悟世尊所谓“见明星而悟道”之说，契我妙用。古仙所谓“北斗望南看”，禅师所谓“北斗里藏身”之说，皆同。自是以来，一夕行过三五周天，至七八周天，又至十余周天，则工将彻夜，而无间歇矣。精尽化炁矣，火候斯足矣，遂得止火之景而止之。马丹阳云所谓“当下手暗修完，功行不许人知。”约两月之余，总三月之季，而成大药。古言百日筑基者，信哉！重阳真人云：“睡则擒猿捉马，醒来复採琼芝。每依时，这工夫百日，只许心知。”昔曹还阳老师，下工时，年方三十，神清炁盈，夜静工勤，无世缘之累。不五十日而火足，採其大药，五日而得。此行工之精，而得大药之易者。眼有金光，鼻有气搐，耳后有风生，脑后有鹫鸣。鹫为水鸟，即白鹭也。脑后虚空中，若有鹭鸟之声，乱噪不住，则大药将至之先兆也。故世尊示人曰“鹫岭”，又曰“鹊巢灌顶”是也。身有踊动，丹田有火珠驰骤，上冲下突。如是，</p>\n<p>六种见验已，六种者，六根有所证果之验也。俞玉吾作《参同契注》，亦有六种应验之说，同此。《华严经》世尊亦有六种震动之说，同义。则火珠有自然投关之妙。火珠者，元精、元炁，炼成金丹大药，如火珠也。投关者，欲自冲过三关。顾与弢问：如何得自欲冲关？答曰：昔曹老师云“马行熟路”。陈泥丸云：“其次膀胱如火燃，内中两肾如汤煎，时乎跳动冲心源。”皆言得金丹大药之景也。始知天仙金丹大道，独异于世，而同于佛。吾师独早成之于身，是为知修能修仙道之伟丈夫者欤！是亦起首得真时，还阳精阳炁化阳神而出者欤！若所证不得阳精、阳炁、阳神，便堕在外道阴神之类者，是不知起首之“真时”者。后来吾门学者，可不以起首“时”而切切早究之哉？末后句，勉之戒之也。</p>\n<p>三问曰：止火之候，何为至要？</p>\n<p>答曰：药熟丹成，则必止火。顾与弢问曰：止火者，是止而不行乎？是止而复行，行而复止乎？伍子答曰：炼丹之法，以火炼药，用小周天火也。药已熟，丹已成，则不用火而止，是止小周天之火。弃却有为之工，行採大药之工，则药渐见，不生向外。既不生向外驰，何必强用火？故必止火。若得大药，则行大周天无候无为之火，以炼炁化神。盖小与大，有与无，不同工者，故必要先止此火，而全然不用。丹药未成熟，则火无止景。有火足之候见，即丹成之候见也，于是，当止而止之，得其宜矣。丹未成，无止景，不当止火，又宜精进，火必炼至于成丹而后止。若已丹熟，而不知景，止火，纵经多劫而温火养丹，守住阳精阳炁于丹田，能暂得长生不死。葛仙翁云：“固形保神，莫大于精。”毕竟未脱凡胎凡质，犹有死生在，非证圣也。药物真，火候真，炼法真，而得成大药者，固是出世之圣真也。何又不知止火？盖由学者前生之积修功行浅，今生之志愿，止于求长生不死，欲长于短寿，长享富贵安乐而已。故仙师，亦止以长生与之，遂其志耳。故精炁住于丹田者，必不死。即陈希夷所谓“留得阳精，决定长生”之说也。凡夫精之泄者，皆由丹田中元炁所发而化。即此仙凡而观，则丹田乃可守可泄之地，亦可生可死之基。若留精守于此，久之而复泄之，同于凡夫之常见，犹不脱</p>\n<p>凡夫之死生。故暂守之者，必求化神。所有超脱服食、转神入定、出神之事，皆在止火之后。是止火，为超凡入圣关头第一玄机也！安得不为至要？夫火既止，当採金丹大药于混沌七日。前百日关中，固言採药，乃初阳之微炁，採之易者，只用片晌之候，一瞬息之工而可得药。故达摩云“二候採牟尼”，言此也。及烹炼薰蒸，补得元炁已足，则阳盛而可见形。然炁何以有形？非形质也，乃有似火热之形也。故古云丹田火炽，曰两肾汤煎，曰火珠是也。唯有此形，而后能出神，变化有形，为身外身。此是无中生有，採之而后生者；故採之难，必用採工于七日，方有得。不如是，则不得。除一日二日三日之前，日少而不能得丹之外，于四日五日、六日七日之间，其中或有一日，见丹田火炽，两肾汤煎，火炽者，内景也。汤煎者，外景也。风呼耳后。呼者，似风之声也。鹫噪京山。玉枕关上，名玉京山，即脑后之处，仙家有雀声啧啧之喻，言其似有也。佛家有鹫岭之喻，亦言其似有鹫鸣，非实有鹫鸟所鸣之岭。斯时也，眼底金光，眼光圆满如金光，阳炁复还，圆满之征也。仙家有《金光咒》，佛家有《金光明经》，皆此。田中大药，一粒至矣。丹田中有火珠之说，即所谓“一粒刀圭”，即所谓“一粒复一粒，从微而至著”者。正世尊所谓“火化以后，收取舍利”者，此也。火化后，同仙家小周天之后也。收舍利者，同仙家採大药，得玄珠之喻。有名曰“水里玄珠”。黄帝以罔象得玄珠。罔象，如言无相，即是以无为之工，无相之火，以求玄珠意。有因以青龙姹女採取而来，故略言之曰“龙女献珠”。得此者，获无漏果，证无量寿。初证长生，后超劫运，皆由得此而成正果。岂可忽之，而不知究之哉！所以《直论》直示人曰“止火景”。</p>\n<p>四问曰：世人不知止火法者最多，其后所证，何如？仙圣不言止火者，亦多。虽见仙书遗言，亦不知此为要。间或见有言者，亦不知其泄秘之要。既不知仙机，不能证仙果，我不知彼，还可证甚果？</p>\n<p>答曰:只可长生不死,为欲界初成之果,人仙是也。能守一日,则为一日不死之人仙。阳精盛满,是长生之本根,由其归于丹田,而后可</p>\n<p>得满。满而守于此中，则不亏而得长生。暂守暂得，久守久得。故纯阳祖云：“世间甲子管不得，壶里乾坤只自由。”百千万亿岁劫不死之人仙，即百千万亿岁劫久守之功也。王果斋云：“一日十二时，时时不绝。一年十二月，月月长存。”《海客论》云：“汝能远离房室，元炁不散，可以长生。”</p>\n<p>又问曰:用如何法守?</p>\n<p>答曰：阳精凝聚，已结丹者，谓之不死之基，守在下田，当不离小周薰蒸之候，而温养之。《胎息经》云：“知神炁可以长生，固守虚无，以养神炁。”又云：“若欲长生，神炁相住。”《太上九要心印经》云：“存其神，而守其炁。”又象伏龟，故名神龟；龟含水中，有炁曰神炁，人之根蒂俱在此处。不复泄漏，则真炁常住，所以不死。有真炁足，则无可死之理。钟离祖云：“真水真火合一，炼成大药，永镇丹田，浩劫不死，寿齐天地。”《胎息经》云：“炁入身来，谓之生。”天真皇人云：“炁不散，则命不亡。命不亡，则形不灭也。”仙经云：“还精胎息，延寿无极。”重阳祖云：“惜真炁在丹田，其人不死。”若不久守以镇下田，其真炁，犹可散于欲境，而基亦可坏。萧紫虚云：“为报近来修道者，炼精不住亦徒然。”是必要知火所当止而止之，止了之后，方可採大药而超脱向上。斯时，即得六通之一，为漏尽通也。漏尽通者，阳精无漏，成神通也，为六通之根本。男根如童子矣，即《华严经》所谓“具丈夫形，成就如来，马阴藏相。”是也。即老者返为童之说。精有泄窍者，修成无泄窍。精已枯竭者，修成满足。大人之身根，如童子之小根。昔世尊修如来时，成三十二相。其一曰阴藏如马蝗。马蝗能缩短，肾茎缩短似之。故以为喻，即此说也。此与真仙修证同。若假称佛宗，而为外道者，不能有此。不知止火者则不能别用採工以求大药而超脱，何以得成真了道哉？知止者採而得药力足以通关，实由得清源之水炼到火足，而知止候不差之力也。此五句，是言修之真、证之实者，成仙必矣。若药不应，採而不来，即邱祖真人所云“火少，则金精不飞”之故也。修士，不知火有止候之景，亦不知无景之不当止，乃妄止之而致火少，则真炁未满足，大药未成，虽採而无药可来。此正教诫学者，要</p>\n<p>知当止之景也。或得药来，而力不足以通关，是知水源之初，未知调药不及于当採之时，而炁微之病；虽得药来，犹是炁微力弱，不能冲关而成大道。药生时，採之太早，则不真而生炁微，正谓初九勿用，若误用微炁，决无大成之功。以此久守于丹田，亦可为长生人仙。如炁足者，亦如“留得阳精，决定长生”者之小效。此即次于炁足者，愈于凡夫之不妄泄者。所有八百岁如钱铿者，此款，何举钱铿为证？由其从来只见称其寿，不见称其神通者，盖以採补小术，小效而已。不知先天自然之足炁，乃不得先天足炁之功。可以延年，止于八百，不可逃生死以超劫运。即此之类，故足以证此。有七百年老古锥，如佛弟子迦叶者，老古锥，是言其端坐，卓然如宝塔。昔世尊言其不能不生死如阿罗汉。若如阿罗汉无生死，则向上可超劫运。不能无生死，终有生死不能免，故只见当时称其七百年。有一千七百十二岁，如宝台和尚者，一云宝掌和尚，亦西土人来东者，遇达摩于东度之。皆是此类。但仅能至年劫，多求其寿齐天地；而更能超劫运，唯知止火得药，而通关服食，入定出神者能之。故《灵宝度人经》道言：“道寿无极，天寿有穷，人寿无定。真与道通，寿则无数。”所谓长生久视，寿历无极。吕祖真人云：“一点元阳，以炼形化炁，使形化炁，超凡躯，入圣品。”以三万六千年为一岁，三万六千岁为一劫，三万六千劫为一浩劫，浩浩之劫，不知岁月之几何，而与天地长久。仙经云：“服丹守一，与天相毕。”所以知止后有大异者，如此。昔钟离祖仙翁云：“丹熟不须行火候，更行火候必伤丹。”张紫阳亦云：“未炼还丹须速炼，炼了还须知止足。若也持盈未已心，不免一朝遭殆辱。”又弥勒云：“饶经八万劫，终是落空亡。”后圣，可不知急于止火之候欤？</p>\n<p>五问曰:何为周天火候?</p>\n<p>答曰:周天者,如日月行天,一昼一夜,行天一周。是也。</p>\n<p>又问:日月火候,以何相如,应喻一周?</p>\n<p>答曰:天体周围三百六十度有余者,而火候,亦三百六十余者,以此为相如也。借以太阳日理言之,初自地之下而上升,转逆上于</p>\n<p>天之上，复下于地之下，所行完过三百六十度矣，谓之一周。许旌阳云：“神运炁化，上则经天，下则纬地。”一日一周，而明日又一周，积三百六十周，而为一年。故炼金丹时之火候，实似之。当神炁并行之初，亦从地之下，逆升于天之上。天上，乾之首也，地下，坤之腹也。古谓之黄河水逆流，一谓之曹溪水逆流，一谓之洞水逆流者。亦复降于地之下，如一周于天之理，故以喻一周于身者。又三百六十周，为一年之日喻。三百六十周，亦为一炼之火候也。此发明小周天，又收结前句。俞玉吾云：“若能回天关，转地轴，上下相应，则一息一周天也。”又云：“上升下降，一起一伏，徘徊于子午。”韩逍遥云：“法轮要转常须转，只在身中人不见。”又云：“法轮转得莫停留，念念不离轮自转。”此言，详于《内指通玄秘诀》者。然言三百六十周之度，兼言三百六十日之一年，即此身中有一年之象，便能还复身中一年所损之炁。故古来圣真，皆以之取喻也。</p>\n<p>又问: 身中造化, 如何有三百六十, 去合天上之周数三百六十?</p>\n<p>答曰：许旌阳真君云“二百一十六，用在阳时”者，言阳时，依阳之策数用九，《易·系辞》云：“乾之策，二百一十有六。坤之策，百四十有四。”子至巳为六阳时，各四九三十六为度也；云“一百四十四，行于阴候”者，言阴时，依阴之策数用六，午至亥为六阴时，各四六二十四为度也；合之得三百六十。正同天度之周数，故取喻亦宜也。</p>\n<p>又问: 古仙皆分小周天、大周天之说, 果何所用而分别大小? 意或非以三百六十周数, 而可分别异名?</p>\n<p>答曰：旌阳之说，即小周天之所用。有三百六十数也。钟离仙祖之云“一年沐浴防危险”者，即大周天之所用也。无三百六十数也。张紫阳之云“只此大周天一场，大有危险者，不可以平日火候例视之。”其言平日火候者，即从前百日关中，所用之小周天也。言不可例视者，正分别小周天之有度数，大周天不限度数之各异用也。小周天用于化炁时，百日关中，炼精化炁也。其中玄妙，有子午十二时之</p>\n<p>阳火阴符，古云：“子巳六阳时进阳火，午亥六阴时退阴符。”及伍子受曹真人密旨：“又若十二时中，时时皆有阳火阴符。凡进则曰进阳火。凡退则曰退阴符。亦以阳用者曰火，阴用者曰符。”重承真人嘱又加嘱而不替。伍子意欲疑问，真人咄曰：“信受著，天命不可违！”卯酉二时之沐浴也。故《华严经》亦云诸佛定能应时转妙法轮是也。皇甫履道云：“十二时中，无令间断。”俞玉吾云：“天道无一息不运，丹道无一息间断。”大周天用于化神时，十月关中，炁化神也。其中玄妙，有不息，亦有无息，从不息而无息者也。许旌阳云：“有火随爻变，无火遂无生。”如是，而言火候之周天，少仿佛其大略者。再合并：以《直论》中之火候经，与《语录》中之众问答，而后始得全火候之粗迹。而玄妙之妙合于天机者，犹在真参实悟。坐据蒲团较勘处，自有真知。而口头语言，终不能以一涂而尽。参悟则实有心得，若徒求知于口耳问闻，恐后用心悟时，又生大疑病。</p>\n<p>六问曰：蒙喻精虽真，而不得为真精用，是何故？此疑，既知精之真，或必能用其精之真。若反不得用者，无乃犹有天机，未得真而使然矣。</p>\n<p>答曰：未调药之故也。药必先调，调其生之时，合于当採之时。调定其机，而后用当採之工。调者，当未採未炼先之工；非若火，为行火时用调者。</p>\n<p>又问曰：从古以来，但言调息为火候，未言调药，而今又何始有此言？</p>\n<p>答曰：此万圣万真至秘之天机也。只为前圣高真，奉持天尊科禁，秘之不敢轻言者。后之圣真成道者，皆必由于得此。世俗之小根，不得此者，即不能成道也。我辈金莲法眷，也从旷劫修来，必因未得此句，则不得真可长生不死之元炁，不能成仙了道。直至今生有幸，得闻老师曹还阳真人云“忙里偷闲调外药，无中生有採先天”之句，是李虚庵真人口授来，天仙金丹之秘诀也。正不敢独善一身，又恐后来人，不知有此一机所必当知者；而为请求，乃至不得。所以末了只得吐露一句消息与后来圣真，好向此句寻个真实入头，</p>\n<p>方有得金丹成道份。若不向此句请求，正无缘于丹道。正所谓“说尽万般差别法，总与金丹事不同。”陈泥丸云：“若非金液还丹诀，不必空自劳精神。”调药者，正所以调金液也。</p>\n<p>又问:如何用调法?</p>\n<p>答曰：药生时用调，调其合于当採之“时”。然邪正两门，皆言药生有时，今世人所已知之时，乃邪说旁门之所谓“时”，非天仙圣道之所谓“时”。好邪淫之人，不信修仙另有真道，迷执淫事为道，故不用调药之时及法。若天仙圣道，必调药之真时，而后合同于天上之事。故最辟邪淫之说，只恐门下法眷误犯，丧失见在性命，怨悔不及。人若不信，便将他自身所已知已行者勘过，不合于仙道百日十月有成之期，空劳岁月。为何无成？再将他前代师家曾已行过者，皆无成而必死。即见邪说虚假；便当知天仙之道，言药有不同，调药更甚异；唯天仙知之调之。应得成天仙者，得闻知调之。凡世人，不得知不能调也。不能调，则精生时之老嫩不齐，则其补精之用，有所不可。白玉蟾云：“药物不精，神丹不灵。”必单单先如法用工调药，调其药生炁足，而可採炼补精，能至满足者为是。药不知调，则不得真足之元炁。不唯药有不生之时，或生有迟促之异。是其採取之假而无验，不证长生不死，便当知非改过。若不改过，便是自投地狱。若药不调其机而乱採，失于迟早之候，而徒採不足之炁，欲补精而不得其补，欲满足而不得满足，便成盲修瞎炼。得其调者，凡药之生，皆如是时，皆可採补，方名真阳，方成真药；生生如是不差别，而后可谓之调。不然，炁不足用，精不能补，则大药不能生也，不可谓之天仙大道。调得真觉，则得真炁。不得真觉，则不得真炁。炁嫩微而急採之，故不足以成丹。必要得旺炁之精，方可用以补精。精到满足，即是炁到满足。精炁到满足，即是大药。有炁之发生，则谓之大药生；能冲三关，而成神仙天仙。不满足者，不发生大药，不能冲过三关。此见调药为至秘要机关。</p>\n<p>又问:若以辨时而调药,世人皆言有老嫩之分别,或是彼已知</p>\n<p>者,今何言其俱不知不能?</p>\n<p>答曰:天仙于药生之時候,辨老嫩為調。凡世邪道,以药生之形质,辨老嫩而不用調。由此不同,所以不知不能。</p>\n<p>又问:何为药生之时用调？何为药生之形质？</p>\n<p>答曰:辨时候者,辨之合于清真先之先天。辨形质者,辨于重浊后之后天。</p>\n<p>又问:何为清真先,重浊后?</p>\n<p>答曰：觉觉，是真觉。调之皆得真觉，全无妄觉，即是清真之先。若以妄念贪淫事而求，至于浊质微露，即是重浊之后。信奉如是辨者，未有不得真精为用者也。按佛与祖言淫事，即尘埃魔境，淫念即妄识。觉而依尘则入魔，而为六道种。觉不依尘，背尘合觉。此六门先入一妙，亦佛法初机时，同于仙道初机者。</p>\n<p>伍太一 十九问 法名太一，官名达行，</p>\n<p>字际可，予之堂侄。</p>\n<p>一问曰：仙道至要闻有三：药物、火候与鼎器。世有药物鼎器失真者，妄用女人为鼎，交媾取精为药，已蒙指为妖人淫心邪说，惑世诬人，不足论矣。陈泥丸云：“身内夫妻实妙哉。”白玉蟾云：“薄福痴人不断淫，尾闾闭却採他阴。元阳摇撼无墙壁，错认黄泥唤作金。”或问房术可致神仙，抑可信乎？抱朴子曰：“此妖妄之言。由好事者，增加润色，致令失实，亦奸人造以欺世，隐藏端绪，以求奉养，以窥世利耳。大抵彼言御女，而不知道，而用之虽一二女，亦足以速死。”又云：“欲守交接之术，以窥神仙，愚之甚也。”《谷神篇》曰：“旁门多技巧，俱不免无常。”《玉皇本行集经》云：“杂法开化，有三万六千种道。杂气普消，吾真道乃行。”今言精虽真，而不得为真精用者，愿闻何旨？</p>\n<p>答曰:不得为真精用之违于妙者,是言欲学清净仙道者,亦有已知未知两端之不能用之故也。一是未闻生有真时,及其精真时</p>\n<p>至，毕竟失于灵觉，而神不配合为之主，而不能留。精虽真者，是人无淫念淫事，而身心亦有虚极静笃景象，此时静极而动之精，甚真。所谓人人本有者。学者不得仙传真中辨真之机，乃不知我身中已有精生之真时，是神无觉知也。神既失于灵觉，则不用主宰乎採取配合之工，以留此真，而还于静，为长旺后动，渐探渐补之机。所以云：不得为真精用者，有此。一是闻知生精真时，亦不实求身中生精真时，此即儒书所谓“思而不学则殆”者。是故不得以神配合採取所宜之时，所以不能得其精之真于当用。不当用，则或过早炁嫩，过迟炁散，而不能结金丹成大药也。精生时，人人皆有自然之真，可辨而用。若世俗愚人，学旁门小术，妄认为仙道者，其痴痴志得意满。不用此真，则真固不得用为真矣。也有谈清净大仙道者，亦信奉经书，以清为真。取其有信之言，但不得仙传，辨至真于清真之法，不能实求身中之清真，是何时为非嫩非老，而用其不嫩不老之真，以行採炼，则真精亦错过而不得用；及至所用者，又非真，必不能补精化炁而成金丹大药；所以不得为真精用者，又有此。予谓无怪乎世人不知，不能得用也。盖仙道乃天上所有而世间绝无，唯仙真所知所用，而世人无由得知用之天机也。纵有虚闻，而不能实用。设或有一人知用，是必前生有苦修之根。今生自少至壮，皆苦志精修不怠，得天仙下降独传，且嘱之恳切者，而后能用。故我今嘱后圣，所以亦由是恳切也。后圣亦宜体究斯言。故彼盲修者，俱已无成。此句总结上言二者。</p>\n<p>又问：古人只言时至神知，然神知之，果又有知真时之妙乎？</p>\n<p>答曰:然。真精生时,神固有知。其机真,于可用不可用之妙,尤所当知。</p>\n<p>又问:真中辨真之秘妙,固不敢轻闻,我今愿闻,抑可得乎?</p>\n<p>答曰：道以勤求而闻，以苦修而得。当知此精生真时之道，非世法中人所可知可有之道，乃遗世苦志，所有进修天仙圣真之道也。实在大罗天、三清、四种民天、三界外内、三十六天尊帝圣真之所共秘，皆不轻泄者。按《道藏·度人上品妙经》云：四种民天以上之三清大罗，在三界之外。自二十八天以下之无色界、色界、欲界，谓之三界内</p>\n<p>也。最下之界，六欲之六天，一曰黄曾天，二曰玉完天，三曰何童天，四曰平育天，五曰文举天，六曰魔夷天，此欲界之六天也。中之色界，有十八天。第七曰越衡天，八曰蒙翳天，九曰和阳天，十曰恭华天，十一曰宗飘天，十二曰皇笳天，十三曰堂曜天，十四曰端靖天，十五曰恭庆天，十六曰极瑶天，十七曰孔升天，十八曰皇崖天，十九曰极风天，二十曰孝芒天，二十一曰浮容天，二十二曰江由天，二十三曰阮乐天，二十四曰昙誓天，此色界之十八天也，并六欲界共二十四天也。此以上之无色界有四天。故第二十五曰霄度天，二十六曰元洞天，二十七曰妙成天，二十八曰禁上天，此无色界之四天也，合三界共二十有八天也。三界之上，则有四种民天，第二十九曰常融天，三十曰腾胜天，三十一曰梵度天，三十二曰贾奕天，此四种民天之四天也。此以上则有三清，起下之太清大赤天也，即洞神。此上名曰上清禹余天也，即洞元。此上曰玉清清微天也，即洞真。故三清，又名三洞。洞者，通也，通达无穷也。此以上则有大罗天，言极高至大，包罗众天，共三十六天也，各有一帝。又《诸天灵书度命妙经》云：大罗天是五亿五万五千五百五十五天之上天也。又按，《佛藏》经言：三十三天皆在三界之内，而以外则无天之名。但佛经由阿难所集记，是凡夫学者之言，《道藏》则由天尊上帝所说者耳！所以天上天下，万古不轻泄之旨，正在于斯。绝与世间凡夫所谈者不同，故不有谁敢轻泄，不有谁敢轻闻。玄科天律禁诫甚重，犯者有风刀之考、三途之苦。天仙有六通，固自知人善恶，而不轻泄。即有仙缘，先得仙传者，亦不敢泄。无真心坚志学道者，固不敢容易轻闻，轻闻每有灾祸切身。功德浅小者，亦不能轻闻。何以验知？昔有勤苦人，幸得轻闻师道，而即易与人以轻闻。遂至有得轻闻者，叶莫徐三人，皆即以痢速死；而轻泄者，亦属血三年；以是而知。有前修、今修者，福缘所系最深重。所以世无金丹之道，生不能长，劫不能超者，皆为无此清真之中，又有辨其至清至真，易修易成之仙机也。陈泥丸云：“修仙唯有金丹门，金丹亦无第二诀。”所以为第一难遇者。顾与弢问曰：至清至真，何以为易修易成之仙机？伍子答曰：若不得至清至真，即是元炁不足，无金丹之本。任人费多岁月採炼，炁皆不足，所谓“犹将水火煮空铛”。原无饭本之米，如何煮得有饭出来，故为难修</p>\n<p>难成。若知得至清至真，则可探得元炁之足者，一採炼即一得，何其易修！每採炼皆得，炁精渐满，而化炁足。百日之内，得至精无可採，炁无可化，何其易成！我固叮嘱学者，必要辨至清真。唯是至清真，真阳之精，生于虚极静笃之时，故曰清矣。唯清固真，既已清真，便是可用之机。若有仙传，能觉知者，当其觉初觉，其炁之未甚足，则不可必其急于用。必要真觉其炁之真有足，则真足之炁，方可补精化炁，而还足本根之炁。然炁精在禀赋，原本至足，只缘爱欲淫妄而耗亏，则有不足，故欲补足。所以必取此根本足处发生者，可为补足之用，以凑补为禀赋静体之至足。非至清至真之有足，何以补得至足？是以不得不觉求炁足者。此足炁，人人本有，欲取为用，人皆自有，不待外求。唯知足者，而后知得足。则以觉神，便主之为配合採归根而留，能得足而成金丹大药。所以于清真，必要辨至清至真之足也。得足炁，则得长生不死而仙矣！知足炁，亦知可必得仙矣，必长生不死，而不复投生矣。世人只浮慕仙名，虚称学道，亦终不知此理。唯自家此精补精，此炁补炁，不必别行异术，何其易修！不过百日之工，採取烹炼，筑基成丹，何其易成！此所以为真仙机也。若传不得于真仙，知不明于正理，行不合于仙机，焉能得真精为用？故我冒犯天谴，而轻语轻录于世，为现在未来圣真说之；能因名言以求法，必得易修易成之实果，克日上升，朝谒三清大罗矣。我又嘱诸后圣，得句之后，必当慎言密悟。我虽出此多言，不过摹写其粗迹，指人以寻究之门；令人人咸入正道，易于修证，不致误归老死；效力于吕祖，所谓度尽众生之意耳！每遇后学入道之浅，信道不笃，学道不专之人，虽能问，为所以辨，我则犹是遵天科诫而应之曰：别有辨法，非敢戏论！更不敢因其瞢然泛问，而遂轻言。此所言者，是修仙一定之理。不敢言者，是真修实悟之机。必后圣能勤苦参究，奉持禁戒，体天行道，有功行不退怠者，奏告上界，而奉天传道可也。故马丹阳云：“天机未敢轻分付，细细看贤悟不悟。遇有艰难不忆家，惩时指汝长生</p>\n<p>路。”薛道光云：“休将大道付人情。”又云：“堪怜自古神仙辈，时故如愚不作言。”禅宗和尚亦云：“宁可将身堕地狱，不将佛法做人情。”钟离真人云：“三清秘密之事，忘言忘象，无问无应，恐子之志不笃而学不专，心不宁而问不切，彼此各为无益。”此而若有轻言，言者闻者，皆有天责。言者，犯漏泄天机之罪。闻者，犯无德无志，不足以载道。凡欲学道，必先持斋戒，精勤参悟，奏告上帝。帝命仙度，而亦有成。如有不奏告，而敢私相授受者，则泄道及窃道之罪，尤速矣。《三元品诫经》云：“或得仙经妙法，妄传非人之罪，传授经法不为宿奏诸天，盟告五帝三官，不合仪典之罪。或妄解经义，不合圣心，并属天官三十六度，风刀之考。”又云：“泄漏神仙秘术，宝藏灵书之罪。或妄造经论，毁谤玄元圣道之罪，并属三元灵曹考之。”前圣有犯，已获禁诫之报者，详传记中久矣。茅君曰：“华侨漏泄天文，妄说虚无，乃令父子被考于水官。”张紫阳真人三传非人，三遭天谴。李虚庵真人轻言于叶、莫、徐三人之非者，遂有大便膈血三年之责，而叶、莫、徐皆以痢死。而可不知天律禁重哉？然而后世，真心悟道者出，吾又恐其不知，无以为辨；有慈悲救世者出，吾又恐其无征，不能见信；故必留此一语，以为纲目，以待后来圣真之愤悱者。</p>\n<p>二问曰：古云：“圣人传药不传火，从来火候少人知。”此二句，薛道光诗也。又方便真人云：“圣人传药不传火，神仙秘易不秘难。”今更闻药有不传之秘，而闻之，果不闻其世人之有此闻，是闻之，信有前因主之也。此言药之不传者，今得闻之。果与世人之所说所闻者不同，而我独得闻，亦是从前累劫，积修有功之因，而得闻也。不然，世之愿学者亦多，而亦皆不闻。而火之不传，又何以言之？此正详问火候不传之秘。</p>\n<p>答曰：火候最要自悟，自悟者，即不敢轻言之意，亦不徒口说耳闻而已，是必专心勤苦实实用功求，必知其候之精妙处，必行之合于精妙之机，必得其精妙真火候之所证果。若不合于如是，则堕落在外道邪法行气之类矣。所以马自然遇张紫阳之后，有自悔辟邪之言曰：“道人拜了千千个，尽是行气并咽唾。摇筋摆骨至三更，使得浑身汗如水。也有生，也有死，也有世人皆如此。”有文学斋长周南余，武学秀才胡茂元，同在道隐斋中，问之曰：行火</p>\n<p>候，亦若行气；降重楼，亦若咽唾；于此二者计，如何辨仙道与邪门之所以异？答曰：仙道，借呼吸有形者为火候，以行先天元炁之无形者；而有形之火，亦同归于无形；方是精妙自然。若邪门单行呼吸，以有形为事，故必致有病。何以为病？升提太迟重，则提为邪火，其病头晕，病目赤肿翳障，病咳嗽痰火，病痈瘡等症。若降下而迟重，则逼沉粗气，贯入肾子为疼痛偏坠病，腹胀等病症。上下两病，皆致人速死，故大异于仙道也！仙道降重楼者，是元炁返还，而降归根，非咽唾也。唾者口之津，有形之物，亦非无形元炁者比。然元炁降归炁穴，则有补炁养神之果。唾津咽至脾肚，而归于浊溺，无证果者；此亦正邪之大异者。悟其顺时合则，时者，子午卯酉之四时，春夏秋冬之四时。日中之四时，有沐浴冲和之候，此则之宜顺而合者。年中之四时，有木火金水之和，法以和而为冲，此亦则之宜顺而合者，故《参同契》云：“四时顺宜，与炁相得。”则者，是法则。非言之所可罄也！言语出于口舌，必不能尽说心之妙悟，以口心本是二故也。亦非言之所能肖也！肖者，相似之义。虽明言之，犹是属于口，而浮于外。终不似心悟，即是实得。夫火，何以不可罄、不可肖也？且言火所当起之候，随药生之候，故然矣。火起之候，名曰子，是合我身中之生机，当活用。以虚比为子者，以周十二时也。若天时夜半之子，非仙家金丹之用，乃旁门邪法所用者。然火子固活用，亦不能自起，必因药生了，则起火採而炼。故云随药生为起候，亦所谓“有药方能造化生”也。故火必因有药，而后可起。余无药时，起火不得。又必以起时称活子，故药生亦因火生之子而皆称为活子，以药生而即火生之故也。于其火药同用之机，有两情相知之微意，果同用不同用欤？果相知不相知欤？未可言其似也。同用者，即以神驭炁也。神行则炁行，神住则炁住，神炁合一，而不相离也。于此必要相知，方是真得不离。若神为徒用，不知有炁，是不能驭炁。若炁为徒用，不知有神为主，是不能随神。如是皆不相知，则悖同用之机，不同用，则金木间隔矣。如炁同神用，炁即可证长生不死之本。神同炁用，神即为神通超劫之主。果同用，则必长生。果不同用，则不脱凡夫死亡轮转。果用而相知，是真同用。不相知，是不真同。相知者，神知炁合一而随之，即凝神归入炁穴。不相知者，神行而不知炁随</p>\n<p>行否，神住不知炁随住否。或炁行，而神反止之为不知。或炁住，而神反驰之为不知。如是，则神炁二者，依旧为二，不成採取烹炼筑基养胎化神之理。文柔之候，用进而升。刚武之候，用退而降。俞玉吾云：“丹法，先以文升，后以武降。”文不过柔，武不过刚。文武法，必当适中，合乎自然。过柔则似不及，过刚则似太过。刚而变柔，柔而变刚。文完则必用武，武完则必用文。当柔不变柔，则伤过矣；当刚不变刚，伤不及矣。皆属勉强，必不可差毫发，循环变化，以完周天。升而不离二炁，降而能顺四时。神当升时，则先天元炁及后天呼吸气，相随以升而不离为採取也，即心息相依。神当降时，则二炁随时之凝，而归于二炁之根，以日中四时，合于年中四时，顺春夏秋冬四时之令，而和其冲融薰沐之妙于烹炼。前此圣真之所已言者，抑曾以是为言乎？而谓胎息，又岂可易言乎？古圣皆巧喻，并不如上文之真语神炁妙用。唯此语中，一字一句，皆发前圣之未言，不似已言者之为喻上加喻，使后学，于小周天且不能明。其大周天为科禁律戒之尤重者，上界仙真，不肯易言；在世圣师，又岂敢轻忽而易言之乎？后学又岂得易闻乎？此固小周天之妙理也。中亦有合大周胎息理者。何为胎息？其肇音赵。始也。也，结胎之息，从无入有，而实若无；于不息中，而或暂有；有无兼用之际也。结胎者，成化神入胎之初也。神驭元炁及呼吸气，归于黄庭之根而为胎。得此住定，谓之胎结。然黄庭中，自从元炁及呼吸气皆发散于外，而为人生日用，直至于今，则此中本无了胎中之息；于此时，而归复幻化作有息，以凝神住炁；故曰：从无入有。若执为实有息，而强制为息相，则堕外道邪说旁门之妄，舞弄后天者矣。真仙道，则入有不见有息，故曰：若无；即所谓有不著有，不空而空也。不息者，入于有息而为胎。虽入有、犹妙似于不息，故曰：不息。此上上天仙圣真，真胎息之妙相也。不同外道旁门之不息，由强制为不息者比。然极致时，亦暂有息，少循其屈伸之理，不至如旁门强制不息者之散漫，故此曰：真胎息。即道一禅师所谓“未有住而不行”者。然有而必无，无而必有，故曰：有无兼用。其既也，末后之时。脱胎之息，从有入无矣，而实无。无息中而静定寂灭，此正所谓无余涅槃者也。从有者，即从入为有息之胎，乃不息之定息为有息，是</p>\n<p>有定息也；非曰有呼吸之息，如凡夫浩浩然者比；即我上文所说，实若无也。由若无而至实无，故曰：入无而实无；则灭尽息，而得大定，谓之灭尽定矣。然无息，而或不能尽无息，犹是有余涅槃；言尚有余息未灭尽。及息无、而至寂灭灭已，至大定、而常在大定；方可阳神出现，而出定，为无余涅槃之实证也。必至如是，为真成阳神，真出定，即《华严经》云“谓如来出现”者是也。夫以不息之功为胎，谓之万法归一矣。有一在，则为目之所易见，心之所易知，亦犹可易言易传者也，即《金刚经》所谓应云何住，佛言应如是住，菩萨但应如所教住者是也。不息为胎者，是以胎中之息为法而求证无息也。昔人问胎息，萧紫虚真人答曰：“能守真一，则息不往来。”谓心归一息而住定。既定于一，往来自无。若有往来，是二非一，谓常见也。唯有一胎息在也，而目必见此，心必知此，所谓万法归一者，归此也；所谓归依法者，归此也；是为真胎息。故《楞严经》佛云：“若不知心目所在，则不能降伏尘劳。”故《金刚经》言“应如是住”，即言住心住息，为道胎觉胤也。即言悟佛知见，入佛知见，习学禅定者之必然者。故如是直言，心必依真息三昧而定住，则不住于六尘而生迷惑，其六根应当住如是正定，而成正觉也。由是佛得住定法而成佛，亦即以住定法垂教于世。菩萨修佛时，《华严经》已云菩萨住佛所住，故于《金刚经》又言菩萨欲要修佛，应当如佛所垂教而住，即能住佛所住，亦能成佛所证。以无息大定而圆胎，则一又归于无矣。此言灭尽定所证。陈泥丸云：“虚心凝神，得神炁俱定，息不往来，谓之大定。”赵真人法语云：“真火本无候，时人休强猜。要知端的意，无去亦无来。”无者，无其先天后天之二炁也。元炁及呼吸气，二者俱得到既无，是炁证大定矣。无其心之生灭、动静之环也。凡夫之心，有生后有灭，动而有静，相为循环不已。修行人，既已得大定，全无生灭动静循环，即性证寂灭矣。无其六脉而性真寂灭尽定也。陈泥丸云：“我昔工夫行一年，六脉已息炁归根。”正言十月关中之实证也。六脉者，两手寸关尺，其六部脉也。脉住，由于息能先住。息虽住，必至灭尽，而后脉住。故《华严经》云二禅息住、三禅脉住、四禅灭尽定者，言息与脉俱灭尽定也。故重阳真人云：“也无减，也无增，不生不灭没升腾。”没升腾者，住而不行，灭尽定后景</p>\n<p>象，即世尊不起于座之义。《金刚经》亦云：“菩萨于法，应无所住，行于布施。”了心必先依法而住，心既往矣，若不捨法而久住法，则法又缚心，同于六尘之缚心，俱为不了之心。如何得常乐我净？故云：必勿住法，而施舍其法。《华严经》亦云：“恒以净念，住无上觉。”净念者，不生不灭之念。即不住尘妄所，不住法之念也。无上觉者，佛觉极上圆满之觉。再无可上，得住于此，则证最上上乘矣，即灵光耀古今之极证也。又云“安住寂静，诸禅定智，入不死道”者，皆是也。安住寂静者，佛言大定而常定于无余涅槃，自然且常乐也。禅定智者，即定中之真觉也。安住禅定正觉，入于不死之道，故能不死。此世尊当时所实证者是如此；后世僧人，竟不知佛证不死，不信佛证不死，扫去禅定而不修，皆甘心死亡，成空亡断见。无之见，目有所妙其见。无之知，心有所妙其知。此证入佛知见，为心目所在之极证。妙见者，不见色、不见空，离所见而若见。妙知者，无思议之所知，离所知而若知。证到于此，无知见，无佛之地，是为真归于无者矣。而谓无、之无知见也不可，何也？嫌于晦昧，非妙觉也；无者，是无有为之法，无有见执之相，即真空也。知见者，是正觉之正知见，非世法及凡夫执相之知见，非外道断空之知见也。当入无之时，用佛法正觉之正知见以入定，而后始能无。若无正知见，则无入者之主宰，则是神不能凝，炁穴不能入，不能圆满胎神而出定，堕在晦昧无知之空亡，不成正觉。晦昧者，黑暗不明之义，喻人之无知。妙觉者，即正觉之精妙处，证入洞虚玄妙之境，于无天地时，觉犹独在，觉道圆满而超劫者是也。觉既圆满，即是妙觉。由始觉本觉而至，非别有所至。所以觉道，必由仙佛正知见，以入以成，故曰无知见也不可。故陈泥丸云：“无心无念神已昏，安能凝聚成胎仙。”而谓无、之不可知见也不可，何也？嫌于不知所以复性真之体也；无者，心之无生灭，以定息至无出入，而俱无也。无生灭，则无妄觉，而有正觉之所至；无出入，则无妄动，而有禅定之真寂静；方是真无。无出入，故有寂定；无生灭，则有觉照；如是者，唯有佛知见者能之。故云：不可说不知见。若世之邪人，诳语自称知仙佛。妄言不可知见，只因不知寂而常照之义，是不住正觉，将何者名为仙、名为佛？盖正觉，原是我性真之体，人人心中本所自有，人必由正觉知</p>\n<p>见，而复见性体。性体即是仙佛；彼皆不知仙佛正理，反要无了正觉知见，便是堕顽空矣；何以复性真之体而成仙佛？所以彼皆不成超劫正果，为大错矣。《内秘真藏经》云：“大乘之道，离一切相，离一切行。觉法空寂，觉无所觉，寂无所寂；无觉而觉，无寂而寂；名无上道。”若此者。总上文以知觉知见，成正果义。皆妙悟深入，密修密证，而可致言者乎？密修证者，至精妙之大用。悟到至精妙之地，故曰妙悟。《道藏》内《妙法莲华真经》云：“不滞有无，永绝生灭，是名真人。”予斯多言，犹是摹写粗迹之教言也。犹非心悟所到之万一也。言语只能少言其似，心悟则能妙合其宜。子勿执此火传，便自以闻为得，以知为得也。传火，则言之必浅。心悟，则入之必深。闻言，若止徒知，不若心悟之深入。唯决烈精勤，以实悟修之。万幸！万幸！</p>\n<p>三问曰：《直论》中所云：当吸机之阖，我则转而至乾，以只升不降。当呼机之闢，我则转而至坤，以只降不升。此旨玄深，实不能测，愿再详之？言行火之机，当在吸之时，顺吸机而至乾，乾为天，为首，位在上，故曰升。不降，非全然不降，以灭阖闢，乃不重于降，而重于升；只见升不见降也。当机在呼，则顺呼机而至坤。坤为地，为腹，位在下，故云降。不升，非全不升，但轻其升若无，而专重于降；只见有降，不见有升也。</p>\n<p>答曰：昔钟离仙翁度纯阳翁时，已言可升之时，不可降。此即吸机之妙用也。我言可降之时，亦不可升。此即呼机之妙用也。谓若一阳初动，阳精生，而喻活子时者是也。元精流布而欲下，元精之根在下田，若将生精，则必欲下行于淫根。我不令往下，而返归于根，非升不可，故必升之，曰採取。故六阳时，从子而后升。六阳者，子丑至巳六时，为阳也。子后者，纯阳祖曰“子后午前定息坐，夹脊双关崑崙过”者是也。皆升以升之。升之，即採取也，阳生随用火之子，亦曰子。此而採取，即子后升。六阳时皆以升，故能令药炁归于乾，即所谓还精补脑是也。即机中之○也。○之时，即无可降之理，则不降也。升而转归于本根之穴矣。归于根，即凝神入炁穴。故六阴时从午前，当降而降。凡採取烹炼，</p>\n<p>过身中午位而降，此旨由张紫阳《金丹四百字序》已露其机。故午，当尊其言而降。皆降以降之。六阴时，皆重于用降。降之，即烹炼也，烹炼必用鼎器，即丹田之炁穴也。即机中之·也。·之时，无可升之理，则不升也。不升者，虽有升降转运，如北斗天罡，犹若不升，取功在降炼故也。门人胡太真问曰：如何六阳皆用升，六阴皆用降？答曰：凡用火，必从子起。子及六阳在先行。因真精要往下，必令还于上，必升方还得。皆升者，取其上转也。至午以后，阳炁已全还矣，只要薰蒸长旺，因在炁根穴内用工，所以既要补填炁穴满足，焉得不归下炁穴？此必然之理也。所以妙于升降者，由颠倒用之，始得其妙。升时有降，而若无降；降时有升，而实若无升；此其所以为妙也！颠倒者，即是用升降之颠倒也。此万古万真不泄之天机在是也！修士可不识之哉！又重阳真人云：“子后看时知日短，午前坐处觉宵长。”此可证也。学者当以此印证之。</p>\n<p>四问曰：《直论》中论鼎器，以为下丹田、中丹田也。今日教言，又闻有乾坤为鼎器之说，虽皆出于古言，不知是一说，是二说？</p>\n<p>答曰：非有二说也，用之时异也。时异者，有用百日工之时，炼精化炁而筑基是也。有用十月工之时，炼炁化神，入定胎成，而出阳神也。今言鼎器是乾坤，是百日炼精化炁时之用。凡採下之炁，必向上至于天顶之上。下之炁者，即肾中真精阳炁也。又为地之炁，本不自升上，故採而升上。邱长春真人云：“地炁本不升，因天炁降下，混合至极，复升引带而上，至于天顶极高之上。”是也。取上之炁，必向下至于地腹之中。上之炁者，即言天之炁，喻心中之神也。萧紫虚真人云：“天上日月地下转，海底婵娟天上飞。乾坤日月本不运，皆由斗柄转其机。”是也。斯有归著于用乾坤也。白玉蟾云：“上至天谷，下至阴端，二景相逢，打成一块。”与此义同。故云：“归根自有归根窍，复命焉无复命关？”是也。此云乾坤，即所谓关窍。虽云捨乾坤而别指鼎器不能也。</p>\n<p>又问曰:何故有向上向下之理?</p>\n<p>答曰：纯阳仙翁云：“坎离颠倒，金木浮沉。”是也。此节详言鼎</p>\n<p>器所用之颠倒，兼发明药物所用之颠倒。盖由在肾之元精属水，肾有坎水之象，元精虽是炁，亦名曰真一之水。本往下流，易用于淫根。精之本体，曰元精。著于用，则曰淫精。每依附淫根为用者，故静则藏于炁穴，动则依于淫根。而五脏皆有精炁，皆由系管而行于脊后二十四椎之间。五脏有管，皆系连于脊椎间之窍，以通行五脏之气。凡淫媾时，一身内外，唯脊腰独用气力，故五脏之气，随通身之气，皆聚于此。皆化成精之形，由此过而泄。故人劳气力于淫事者，皆腰疼。是故仙机要旨，皆必由此逆行上，以返还。欲逆之而回，故必由之以向上。能向上，则离习炁而得真炁矣。习炁者，言淫媾之事也。佛经云：“以海水灌太子顶。”是也。仙机以元精之炁，升至上田，谓之还精补脑，又谓之醍醐灌顶。诸菩萨佛法，亦谓之醍醐灌顶。仙佛起首，同此妙喻。在上之元神发动，皆依念虑为用。本似火而炎上，易出入于眼耳鼻舌，欲逆之而返还，故向下依于精炁，而同返还入于炁穴。既向下炁穴，则离外境，而尽脱四生矣。念虑者，如眼之念虑为用视，耳之念虑用听之类。脱四生者，是眼不住色，而不生色心之魔；耳不住声，而不生声心之魔；鼻不住香，而心不生香魔；舌不住味，而心不生味魔。此言离了外境之色、声、香、味，而心脱四者之识，皆得向下之所证也。即世尊于娑竭陀龙宫说法，此即下丹田之说。又于迦罗龙宫入定，此即仙家中丹田入定之说。经七日不起，是也。</p>\n<p>又问曰:中下二田为鼎器之理如何?</p>\n<p>答曰：下田，即炼精化炁时之说，已详矣。《三十六部尊经》云：“真精在肾，余精自还下丹田。真炁在心，余炁自朝中元。”而《华严经》亦云：“一切诸佛，脐中皆放光明，名菩萨受生自在灯。”张紫阳云：“黄庭为鼎，炁穴为炉，黄庭正在炁穴之上。”王重阳真人云：“脐中丹田，内有黄庭宫。”古云“一点落黄庭”，即此处方真。此上文一节，皆言下田之理毕矣。下文一节，皆言中田之用。而中田，则炼炁化神也。重阳真人《全真集》云：“姹娘嬉，婴子卧。搬上中田，总向明堂过。”又云：“拾得真金坚又刚，放在绛宫封闭了，满宫明耀现霞光。”</p>\n<p>谭长生真人云：“欲觅真空，只在南山尽静中。”《谷神篇》云：“百朝沐浴忙移鼎。”纯阳翁云：“一从提上中宫帐，万里群魔不敢当。”亦有《本行经》世尊云：“若至恒河水南岸，安稳住定如须弥。”又，达摩祖《胎息论》云：“炼胎息者，炼炁定心。”是也。常息炁于心轮，则不著万物。炁若不定，禅亦空也。此一段，明中丹田之说。犹详在李生三迁之问，彼此相为互明者。真修实悟之人，必要先知用中丹田之真处，而后可成阳神。前之炼精以化炁，用上田之乾，下田之坤。即紫阳真人所言“乾坤为鼎器”，如《易》所言“乾为首，坤为腹。”是也。极致其上下二者，而虚其中田。故天皇真人云“以形为炉，首为鼎也。精满于脑，火炼成丹。”白玉蟾亦云：“鼎用乾坤，药须乌兔。”是也。化神时用在中田，马丹阳真人云：“保养下田无漏泄，方迁绛阙炼中丹。”绛阙者，心属火赤也。常若旷中下而为一，如世尊“于欲色天二界中间化七宝坊，于三千大千世界，说甚深佛法，令法久住”。即此时义。而上则其所经行之虚道耳！言上田，亦我神炁所经行过之路道。盖三乘之工，皆有三田反覆之理，以为行所当行者。若用初成时，住于下田；用中成时，住于中田；用大成时，住于上田；此我所谓住所当住者，是也。炼神还虚时，唯虚寂于上田。上丹田者，仙云泥丸，佛云泥洹。又云佛事不周，终不取于泥洹。不用中下二田者，炁已无，而神已虚也。到此地位，已无返还化神化炁之工，则不用返还化炁神之地。是由三田，各有当用之时，故亦各为之说。有缘高士，见闻此说，当识之为定论。</p>\n<p>五问曰:法中有五龙捧圣,前此未闻,果凡耳之不得闻。抑前此圣真,无此法名之可闻乎?愿一明示。</p>\n<p>答曰：有而且多，皆设为工法之喻名耳。古圣仙佛，借喻言以说法者，心切于度人也。法不说，则人不知求、不知用，未来者何以得超凡入圣。欲直说之，天律明科禁重，天机又不敢轻泄，以犯冥考。故以意义近似于道法者，而为喻以言。使后人因名以求实用，即所用而求证圣果。故皆立一喻名也。又或有名虽不同，而工则一。昔世尊佛喻之曰“芦芽穿膝。”王重</p>\n<p>阳真人亦云：“若人收定三宝，搬运寄归何处？先用芦芽穿膝之法运炁，然后七返还丹。”又曰：“芦芽穿膝，上下河车，搬精补脑，水火双行。”此见我仙宗此即同佛法。而后世凡愚，不知为喻，而疑为实有穿膝。岂有所坐磐石之上，真能长芦芽以穿膝乎？达摩祖喻之曰“折芦渡江。”梁武帝建都于金陵，八年十一月朔，祖渡江往少林，其时江边已无芦可折矣。不知佛与祖，皆以芦为喻者。海与江，喻人之爱河、欲海流浪之苦。西江水黄河水逆流，亦是此意。岂有航海之胡僧，海不能以芦渡，而江能以芦渡乎？初达摩在南天竺国，欲东游震旦，谓此东土有大乘气。由是国王以巨舟，实以重宝，与之渡海，凡三周寒暑，而至广州登岸。事详在《传灯录》及《五灯会元》。皆有此妙喻。而浊恶愚夫，执谓世境之言，妄以诳世，似亦可羞也夫！</p>\n<p>又问曰:此五龙捧圣之喻,亦喻出于古人乎?抑今日之新为喻乎?</p>\n<p>答曰：前于佛而有。《玄帝经》云：劫初太古修来，证道于轩辕黄帝五十七年之甲子岁，当其超凡质以养神胎之际，用此法矣。后留法象于武当山，曰舍身崖脱凡胎也，曰五龙捧圣入圣位也。喻此以示后人，度人之心何殷殷也！故修仙之士，得遇真仙传道者得闻，而浊恶世皆凡夫无闻也。《元始天尊说真武妙经》云：净乐国王与善胜夫人，梦吞日光而有娠，怀胎十四个月，于第五劫名开皇、劫初元年，甲辰三月初三日午时，一云甲寅日也，生于王宫。神灵勇猛，不统王位，唯务修行。摄离坎真精，归根复位，得玉清圣祖紫虚元君之传。道成后，于黄帝五十七年甲子九月初九，白日升天。又按净乐国，在奎娄宿之下，海外国也。武当山炼真之所，在翼轸宿之下。又，《启圣录》云：前历八十二化，而后成道，乃太上之第八十二化也。浊恶世无闻者，盖浊恶世人，皆行浊恶之事，无志修真，何以有闻？无缘遇仙，仙不屑与之，愚何以有闻？故终于无闻也。捧圣者，非别有所为，乃仙佛超凡入圣所同用而必用者，即冲透三关之秘法，非凡世所言之比。及世人，遇有此言出后，闻此，皆茫然不知何用。殊不知，即三关秘法。故陈泥丸真人云“最隐无过九曲湾”是也。昔我祖师虎皮座</p>\n<p>张真人，真人，张，其姓；静虚，其法名。宣德壬子年，生于邳州，为邱真人北宗龙门静字仙派也。得道于蜀之碧阳洞，受师仙旨，以广教门，周行四部洲，历西番转北番，还中华。虽有大明嘉靖皇帝遍求请，而不肯出以复命。常以虎皮为座具，故当时十方皆称曰：虎皮张。常幽栖于武当山。坐于武当山之虎耳崖石窍中，不与世人相接，唯显示学人，知当避世。深得此名理，以吐露秘机。其后，口授于庐江县之李虚庵。姓李，号虚庵，法派名真元也。嘉靖乙酉年，生于庐江县城西。初以医济世，乃结庵于城外，延访仙师，自十九岁至五十五，万历己卯也，始得张真人尽传内外金丹、天仙大道，捧圣超凡，功成显圣。虚庵真人，口授于南昌县南，武阳里之曹还阳。还阳为号，常化为法名，曹为姓。嘉靖壬戌年，元旦前三日二十八为生辰。废尽千金家而学道，甘贫清苦为精修，得五龙捧圣，转神入定为怀胎，至天启壬戌六月十二，为出阳神，入新建县西之西山，面壁还虚为大隐。还阳真人来，口授于我及汝父真阳，登仙派，名守虚也，皆得闻此者。凡修仙道者，知此而行，得此而证，则得长生不死，而永无生死，神通无极，是为证圣矣。若不知此，不得此，则必不能脱了生死，不免六道轮迴。此圣凡分路，至秘天机。得与闻者，有熊秀庵，亦名守虚。邓绍元，名守空。二者，新建县之西山仙种也。并曹老师之子，号希还，命名守玄者数人。虚庵得闻此以证道，大显神通，济世救民。一日大旱，无以治农事，诸祈祷者，皆无应，众官民哀求李真人，祷以救民。真人乃以墨涂掌心，向日默言数句。即有黑云蔽日，遂致弥天。不数刻，而大雨如倾，及邻封六邑，皆得有秋。一手举五六千斤之石，如弄丸之轻，竟不知其力之能举多少，其神通最多，此不暇数。仙隐于万历乙卯岁。时县宰，贪酷无度，求见真人，欲求服食点化，真人不屑与之见。遂以违命怀仇，连及姻家被禁，誓必追捕辱之以泄忿。此亦可笑可鄙也！视黄帝肘膝下风者之必得！视刘海蟾即弃宰相者之必得！视吕纯阳即弃德化县令者之必得！如彼挟势位捕师者之必不得！为孰愚哉！与退步而求至行前者何异！有冠冕者，求道之禁戒也！真人，由是托尸解之状，以避之。宰以为真死，遂解其忿。而真人似死入棺者，七日棺即空矣。其形神俱妙，仍居于姻家。其子，名李能培，充生员，竟不丁忧。</p>\n<p>后继宰者，深羡其肉身菩萨，名遂播于十方，神遂炼其还虚。此亦有神通不必显之一案也。所以大修行者，安肯令世人知之？还阳得闻此以成仙，含光太虚，妙觉无极。出阳神，入常定，寂灭于无极。亦仙隐于天启壬戌夏。当此欲藏迹西山之时，已形其五龙之名于笔矣。曹老师将仙去之时，谓其子索纸笔，留记于伍子云：“五龙捧圣万金机，斋戒焚盟已受之。初愿临期能妙用，真真皆此上天梯。”从此始有五龙捧圣之名，在纸笔矣。我亦因之，以笔永其形，我因师之笔形，而再言之。以寿诸梓，则流行于永久矣。吾弟真阳，初见《直论》有五龙之名，责我曰：“古谓仙机必不书于纸笔。五龙秘机，秘而又秘，安敢书于纸笔乎？”予曰：“师已肯形于笔，我何必不肯其所笔乎？虽有五龙虚名，似亦不妨。”代为口授，普开来学。而凡大修，行仙佛最上上乘妙道者，只此是圣凡分路。他如纵说能修有证，非此一法，无以透关而脱凡证圣也。唯其为至要至秘之机，不得不露一句，令后学圣真，有仙道福份者，知所参求，知所信奉。凡有志于仙佛者，俱不得轻忽此言。背此不求者，虽修万劫，终难逃其六道。可不思之为急务耶！</p>\n<p>问曰：玄帝之喻五龙，有法象可证者，人可易信。法象者，即武当之舍身崖，及五龙捧圣等之说，便是有据。今以芦芽穿膝，为佛说五龙之喻，以折芦渡江，为达摩说五龙之喻，但我尚似凡夫之见，同于信心不及。不知何所证据而可令人必信不疑乎？</p>\n<p>答曰：昔王重阳真人云芦芽穿膝、上下河车、搬精补脑、水火双行等语，已先指示，在世流通，亦详《道藏》中久矣。又西竺经目，有所谓《五龙经》，其曰无字经三十二卷，有字经二十卷。岂虚名哉！即三藏来东，五千四十八卷内，三十五部大经之一，观其名，则有义在。若无据而说，则为幻说。无授而言，则为妄言。既非幻妄，后学宁可疑而不知参究之哉！</p>\n<p>答曰：养胎者，炼炁化神之喻，非实有胎也。《太上灵宝大乘妙法莲华真经》云清静之义，天尊言：“专养精神，不为物杂谓之清。反神伏气，安而不动谓之静。”即此也。</p>\n<p>又问:既无胎,何云养?</p>\n<p>又答：似胎之理，故借喻以言其似也。以炼炁之初，本要似胎中之无呼吸者，而又不能无呼吸。习入定，而求至无，不能顿然全定全无。此仙佛圣真，初习禅定，自然必由之渐法也。若胎孕之将产时也，人胎十月满足，将生之时，呼吸全有，故初习定似之。生灭之相尚在，心起一妄念，思想平日旧习，便是有了一生相，又起一念灭妄，便是有一灭相。如安国师读《楞严经》四句偈云：知见立之说，即所以为生灭。凡习定之初，求无相而不能顿无，云尚在者，生灭不能灭已尽之说也。出入之迹犹存。生灭者，心也。出入者，息也。心有生灭，则无以摄息，其息焉能不浩浩然为出入？怀胎者，必存神以摄炁，存炁以留神，乃可得神在胎中。名二乘，亦名曰如来。以有来，故名如来。又谓之如理而来，如理而去。来去，即是出入之义，习定之理。故《华严经》云：“如来大仙道，微妙难可知。”燃灯佛又言：“诸行无常，是生灭法。”皆谓此也。入涅槃而未实证，世尊谓之有余涅槃。由此而渐趋者也，犹称为渐法。即此法此理，而仙圣喻之曰：养胎也。《胎息法》云：“心定则神凝，炁住而胎长矣。”胎之长，由于息之住。无息则不养胎，无胎则不化息。即此是也。其终成也，《胎息论》云：“动念，则泄真炁，故胎息不成，如何得道？”无呼吸而灭尽定矣。若人世男女，始媾之时，只二炁合一而未成胎，浑然无物也，生灭之相灭已。真实用四禅许多定力，而后得生灭灭已，即六祖惠能所谓“禅心无想，禅性无生。”是也。出入之迹寂灭，鼻息无出入之迹，得证灭尽定矣。心为不生不灭之心，身为不生不死之身。此时，神形已俱入妙。六祖惠能亦谓“心是地，性是王，王居心地上。性在身心在，性去身心坏。”是也。从此一得，顿然直与虚空同。张紫阳云：“觉此身如在虚空，常至如此，则禅定也。”故仙圣喻之曰胎成也。世尊佛谓之无余涅槃，无余者，</p>\n<p>无有出入，寂灭之心无息也。而后脱胎出神。出神是定性成而出定，世尊谓之如来出现。所以《楞严经》云：“既游道胎，同仙家怀胎之喻。亲奉觉胤。如胎已成，人相不缺。”喻定成神全，而性妙灵觉。“身心合成，日益增长。”又曰：“形成出胎，亲为佛子。”是也。胎息，养得神全而纯阳，仙家出阳神，称曰神仙。佛言得大定而出定，称之曰佛，即此说之同者。燃灯佛所谓“生灭灭已，寂灭为乐”，正谓此也。过此向上，则为真圆顿门矣，不随天地同坏者。史太素、胡太真问曰：仙家人修到出阳神，佛家人修到出定，似亦圆成了矣。今乃曰过此向上，为真圆顿门。我不知出神出定后，更有向上？我亦不知仙佛为如何圆顿？我闻自佛法入中国至于今，上下千古，人人皆说凡夫发心修行时，便顿然了了为顿门。今言出神出定过了后，方名顿。然则众言皆非欤？答曰：果非也。尤可笑彼凡愚，渐且不知，诳言知顿，竟不知如何为顿？冒认为知顿能顿，以自妄为尊大，实窃据衣食财利之宝。而亦更不肯悟《华严经》所谓如来始成正觉，在寂灭场现庐舍那身，说圆满修多罗，名为顿教之说。今之一切凡夫俗子，皆未到寂灭场，安可妄称我至顿教顿门？此是未得为得，入魔道而不省悟者。又何不解《圆觉经》所云如来境界，渐进至于佛地，名顿教大乘，顿机从此开悟之说。所以不知七地菩萨，上至八地成佛；尚要加持修，上至九地十地十一地等觉，而后觉道始圆满，正为真顿教也。盖初修行时，用功行以至七地，而功行止了矣。八地以上，则无功行，乃不可言修言证。此时若强加功，则是同于退席者之知见。若未到七地，而误不用功行，则是断见空亡，外道之知见。后学若犯此，即堕入此魔坑矣。汝当自详之。能如是说，则同佛说；不如是说，则同魔说；不可顿为仙佛，但可顿入魔界狱矣。夫既喻之曰胎，宜若有似于胎矣。虽曰似胎，而实非胎也。何也？生人之理，胎婴在腹。修仙之理，胎神在心。世人但闻胎之名，而遂谓腹中实有一婴儿出而为身外身者，此又可笑其愚痴之甚也！有志修仙佛者。不可不以此破疑，而自启其迷。</p>\n<p>又问：古人皆言身外有身，伯师今日独言非身外有身，何也？</p>\n<p>答曰:人性至虚至灵,无形无体。无论动出静入,本然皆无形</p>\n<p>体。我今不过以得定之性，出定而为神通，亦只虚空无形体，《洞玄灵宝诸天世界造化经》云：“得道者，与虚空合体，无尽者也。”非拘拘于身外有身形也。若欲显身，令人见之，身外便能了身。一身多身、百身千身、万亿身，皆能变化无穷。初出定之神，现身亦少，乳哺神旺，方可变化百千万亿多身。如此者，是因阳精阳炁，归元还虚所能也。古仙遂即所能然者，为鼓舞人趋向决烈之志，如佛之善巧方便化人，岂拘拘以身外身为言哉！昔《洞灵神鉴书》云：“念动意动，处处出神。念停意停，处处归真。”先我言之者，亦如是。</p>\n<p>七问曰:如何得成阳神?抑何以出?</p>\n<p>答曰：先天元精谓之真阳，得此真阳而炼性通神，入定而出定谓之阳神。不得真阳之精，配合性真以入定得定者，只名阴神。阳神者，显然出现，变化莫测。世人所不能见知者而能见知之，世人所不能为者而能为之，世所无者而能有之，有者而能无之，人人共见。此神通之能，显于阳世者曰阳神。若不能以身形显现于阳世，则人不能为者，亦不能为；世所无者，不能使之有；有者，不能使之无；无阳刚之炁故也。仅仅能先知先见，胜于人而已。亦只能阴阴暗现于世，故曰阴神。全与阳神相反，故不及其神通。所以得成阳神者；由元精真阳也。盖元精是无形质之阳炁，能化补其炁，能助胎养其神；乃成金丹，成仙道，显神通变化之真物，故曰真阳、曰阳神。若炁非真无形，便是阳不真，为阴浊，无虚灵之变化。纵炼神到空，只是阴神。既无阳炁之因，故不成阳神之果。所以王重阳真人门下，孙不二元君云：“偏执性为宗，如何出阳神？十个九个堕顽空，若得命基带了性，命基者，即真阳元精也。白面做烧饼有准。”又长春仙祖门下，徐复阳真人云：“未炼还丹，切莫内观照。恐出阴神，投舍迷真道。”是也。还丹者，机有将动之元精，用还返之法，化炁成丹。丹成，则以之养神入定，内观照之化阳神。内观照者，观照此炁还之丹也。若未得还丹，内无所观照。强欲观照，乃无着落，必堕空亡死境，故曰恐出阴神。阴神者，死而性灵之鬼也。投舍者，此身形炁已死，不能存住此性，故又投胎生身为居舍。</p>\n<p>迷真道者，迷失长生不死之阳神道。若止习枯禅，当下了得，即行内观照之法而万缘不挂。息无出入，息禅定而灭尽定也。心不生灭，心禅定而灭尽定也。故《皇经集注》云：“心生则地狱生，心灭则地狱灭。”到真空境界，方能出得个阴神。必要心息俱到真空，方出得阴神。故长春真人云：“未到真空，虽阴神亦出不得。”可见阴神，亦非容易出的。犹是有生死在，不免轮迴者之小果耳！有死则有生，不能长生则有死。有死生即是轮迴；入地狱、饿鬼、畜生三恶道同是轮迴；虽生于人、生于天，亦是轮迴；故曰不免。所以四果之徒，有生天生人之阶者，以此。天福尽而还堕，《皇经集注》云：“岂知积福生天，福尽犹不免复堕。”故我祖仙虎皮座张真人谓之“谎花儿不结果”者，言不及阳神之实证果也。初李虚庵真人，得山东刘宝珠内观照之法，遂内观照至七七日，即有慧光发现，隔城墙能见人所为，城墙如琉璃，透彻明亮。自谓一心息相依，而得此妙，证此果。及出静室，依旧是凡夫无能见。故张真人云：“谎花儿不结果。”夫阴神出，而亦有慧光发现，洞见百千万里，如在掌中，此亦有天眼通之微意。房舍墙壁不足为隔碍，山河城郭不足为阻拦。我形在此，而慧光亦在此，惺惺灵照，而洞见远视之为妙也；非离此而逐诸境也；不如是，即昏梦中之魔境，而诳语人为阴神者也。于此著之，即入魔道矣。《楞严经》云：若大妄语，即三摩地，不得清净。成爱见魔，失如来种。所谓未得谓得，未证谓证，如穷人妄号帝王。岂知真阴神者耶？又有一等人，似戏似诳言曰：我能出阴神。明明行于街市，而往返焉，而人遂敬信之。阴神之慧光，亦能普照，无所不见，无障不彻。岂但只见街市，而往返行之，街市两旁之房舍，便隔碍不能彻见耶？若果如此，是春梦，非阴神也。若再强夸得此阴神，便是诳语，有心以欺世者，非正人君子之言也。《洞玄灵宝》之所禁，《楞严》四律仪之深戒，学者自慎之！犯在《洞玄》，则得女青律风刀之考。犯在《梵网》，则招酆都山拔舌之愆。若不慎，则此罪有准。彼见人敬信，而益夸其能出阴神，此又可耻其无耻之甚也！若真阴神者，有神通矣。亦止有神境通、神通变化无穷也。宿命通、知自身前世及后世事，及</p>\n<p>见他人过去未来事。他心通、知他人心上阴谋之事。天耳通、遍天之下，人与物之声音言语，俱可远听而知。天眼通，见遍天下人与物，有形无形，可尽一见而知，绝无有障隔者。能六通之五耳。仙佛阳神，皆有六通。此偏于一性灵者，只有五通。世称五通为鬼者，正此类也。世间每有五通鬼，侵淫女人者，盖由少此一通。不能除阳精之漏，不得漏尽通也。阳漏至枯竭则死，而至于为阴鬼，必然之理也。故生死者，皆非仙非佛。《太霄琅书》云：“太极大法师曰：‘五通尚在三界，未为仙也’。”夫仙道，无不无，有不有，能觉有无之间。于其际而无际，乃能超三界。今时自称诳人曰能出阴神者，果能五通欤？不知所少于阳神者，乃漏尽通不与也。阳精无漏，则成漏尽通。此通一成，即得长生不死，为天仙诸真佛世尊之基。若精漏不住，不得此通，则不长生而必死。凡有死，则有生死不断，有轮迴六道相续。世之愚人，不知有死者必有轮迴；尽信诳言欺哄，反求死者；正投入轮迴的门路，不得脱离。妄夸如是为证佛。当其现在生有人身时，愚不知惧，尚不知求不死不轮迴；乃至横生异类，性愈迷惑，愈不知求不死不轮迴。不知释迦真佛，皆得漏尽通，而后能长生不死不轮迴者。虽曰愚不足教，我愿后来人，见此一辨，少有所悟，而知求学不死不轮迴。唯人自信自勉之可也！又，《无上内秘真藏经》云：“法无二念，当知三界之中，有漏众生，无方便慧，终无悟解。”佛教中，言阿私陀仙迦旃延等，得四禅五神通。所少于佛者，即漏尽通。正是淫欲未净，而阳精之漏未除，只成阴神。阴神者，无阳精之所证也。阳精无漏，则无死。有漏则有死，死则为阴鬼。故儒者亦云：“鬼者阴之灵。”《元始九老真经》云：“人不保生，神炁不全，流为下鬼。”是也。其天眼天耳二通，能见能闻天之下，不能见闻色界以上天者，即是无真精之阳炁，不合纯阳之天体，阴性不能达天之阳中故也。《三皇玉诀》云：“阳者天道，故神炁合道乃神仙。”若天仙之道，炼精得阳精，阳精无得，则不长生。因长生无根，即天仙无基。故《经》中已说，精为长生根。真得者，是知药生之时真，知药生之地亦真，知採药之时，炼药之时皆真。唯知如是皆真，故能得真阳精；有一不真则不得。况邪淫门之全不真者，与阴神门不求知真者，何亦痴望修成仙佛耶？炼炁阳炁化，二</p>\n<p>炁炼到真寂定，则真化为神，无了生死。若炁不到化尽，犹是色界之众生。顿悟直证阳神，精尽化炁，炁尽化神，则炁极定，神极通；皆决烈精进，炼精炼炁，方能修到得此证者。乃阴阳二者合一之道者也。阴阳合一者，乃神炁合一以为工。炁寂灭而神静定，亦合一之为证果。入而静，则神同太虚而为性体；入者，入而住于常定也。神已同于太虚，即常静定于太虚。此正性体圆明之实相，无法界可拘，无世界可染，唯得成阳神，已出阳神之后者能如此。非若未成阳神者之必依胎息法，而后能趋太虚。出而显，则通天彻地，而为神通；出者，出神于身外而显神通。凡阳神出壳，则无重浊者，无窒碍者，已完色界禅定之功，超出色界之上矣。此以前，有功用行，而有为之功，已归于无矣。此以后，是已成仙佛之正果，无功用行时，无为而至于无无者也。通天者，上通欲色二界，二十四天之上，即世尊佛出白毫光，上照阿迦尼吒天是也，此即天眼通之所见。其天耳之通，亦能听至于此天。彻地者，可见二十四地狱，及所谓十八地狱、八大地狱等处，皆能见之，而亦能闻彼之所语，即世尊佛出白毫光，下照十八地狱是也。通与彻，言神能至能见能闻，无隔碍也。千变万化，眼见宇宙，上下四方曰宇，即前所言欲色二界天及地狱等处，神境通之所能见也。古往今来曰宙，即过去未来之事，此宿命通之所能见者也。手斡乾坤，斡者，移转之义。天地之形有不便于人者，能损益之。天地之化，有不利于人者，能转移之。如汉栾巴，在朝巽酒一口，化大雨而远救成都之火灾。如唐一行禅师，以袋囊七豕，而在天之北斗藏形。盖由斗姥者，是豕形身也。如邱长春真人，在燕京住天长观，值荧惑火星，犯尾箕宿，属燕京之分野，将灾全城。百官请真人祷之，本夜星退数舍。如大明初，铁冠道人张景和，助太祖皇帝平陈友谅。南风之天，舟后使北风，送舟而逆上蘅黄也。如虎皮座张真人，谓李虚庵曰：“汝传道及于非人，汝大数及尽。但北斗中有本命星君，注生死，我为汝指而敕之，添寿一纪十二年以便精修。”见其星虽形如小豆，能化大如五尺围，涌如浪沸，白毫光灿烂；既而渐复小形。此仙家之演斗法也。如李虚庵真人，在庐江县家中时，苦旱，农不下种，应众请祷，涂墨于掌以蔽日，黑云随手掩日而澍雨，救本县及邻封六邑之灾。此皆斡乾坤之显案也！是为真阳神也。真阳神，即真空性体</p>\n<p>也。王玉阳真人云：“一悟真空总了仙。”故王重阳真人云“灵性分明作大仙”是也。不能见性，则不得真空，见性者，性中原是寂静，绝无生灭的。人能修心到大定，而常在定，便见性体；此正到仙佛地位者。于清风真人云：“不到真空，阳神难出。”谭真人《水云集》云：“今生若要登云路，不合虚无不得仙。”不成阳神；见性真空，即六祖所谓若修不动时，同无情不动，方是成阳神。不到见性真空实地，必不能出阳神也。修到见性，此性出定，即为阳神显神通。若未修到见性成佛，即是未成阳神，故不能出阳神。若性有妄出，乃是外驰之病，无定力也。</p>\n<h6>又问曰:若何知是真空实地出阳神之时?</h6>\n<p>答曰：性合虚空，而不神用，《元始先天道德经》云：“妙法无因，妙境无缘。”又禅宗六祖云：“禅心无想，禅性无生。”一缘不染，一尘不动，绝无出入生灭，《先天道德经》云：“唯无生，然后为长生。”正是真空实地；心性中有念生，染缘与尘者，则不住胎息，故息有出入。凡息有出入者，则是性不住之凡夫，外道而已。若灭却缘与尘，及灭却出入息，复还于胎息，而常住定，方是无出入生灭。如此者，是仙佛禅定必由之理也。真空者，性地无妄，何生其心；真息定得绝无出入；故空为真。若心未全定，而少有生灭；息未全灭，而少有出入；则空不真，而生死亦未了。实地者，非似空而不能空者比；亦非智能空而不能顿然全空者比；乃顿空，而直至无量劫常空，始是真空实地。故重阳真人云：“要见真空，元始虚无是祖宗。”一见天花乱坠，神念涌出顶门，阳神超矣、脱矣。向上炼神还虚，而合道超劫运矣。《无上内秘真藏经》云：“道行绝空，无心无意，无觉无观，是为真道。”又云：“真道寂灭，灭无所灭。”</p>\n<h6>又问曰:古往圣真,皆未言及天花乱坠,何也?</h6>\n<p>答曰：上天所禁秘机，不肯轻言泄道者有之；仙佛正道真机，本上天科律重禁，不肯轻泄于狂者愚者之共闻。及悯世人时，未有不奉天命略露一句。智贤者则能悟而成道。下愚迷惑不悟者，及造一句假言，煽惑善信。上天圣真，又为善信悯，又多语二三句、四五句以救世。而狂愚不悟，不弃邪归正，又造二三句、四五句假言误人。由是真言愈多，而假言亦愈多。即世</p>\n<p>该所谓“一法立，一弊生”之意同也。今悯世人，被误害者众，又露出此一法及五龙法；焉知后之棍恶，又不造一假言，以欺人乎？故以不肯轻泄者，而亦泄之。于世尊、达摩、神光、及重阳真人、邱真人，金口之先宣泄，重详揭示于我之言也。后之学者，宁信此书之语，明者自明，显者自显。若有不能悟明显者，犹待仙授，慎毋听棍恶之诳言，可也。不知而后知之，不暇言者亦有之；根基浅薄之愚夫，不遇仙传者亦有之。昔蓝养素，养胎于南岳，十月功成而不知此，久定不能出。刘海蟾以李玉谿十咏寄之，遂大笑而出。世尊说法至天花乱坠，而亦以此指示人者。二祖神光说法，亦至天花坠，犹惧未脱阎君之手，天花坠，乃圣凡生死之分路。见天花而出定，离了生死，超出凡胎之圣也。见天花而不出定，犹是有生死之凡夫。圣由自手握住生死，凡由阎君手握生死。断臂达摩前，求于此向上事。钟离正阳真人云：“雷震天关鬼神惊，天门开如雷震，言出阳神者。掀翻宇宙飞白雪。”将出阳神而未出先之景。见此而后出，不见此则不出。吕纯阳真人云：“寒云散后留残月，言胎息灭尽定也。腊雪来时向太虚。”言见雪来，则离实有之幻体，而向太虚无。王重阳真人云：“忽然间振动天花偏坠，前面却有个真人。”又云：“空中早仙乐来迎，感天花偏坠。”邱长春真人云：“若到天庭，忽有天花飞，方出阳神，得初地果也。”初得圣果，初证仙佛者，皆如此。学者，当知仙佛同一工夫！同一景象！同一阳神证果！史太素、胡太真问曰：何谓同一工夫？古言佛教离宫修定，仙教水府求玄，何彼言之不同也？答曰：彼言不同者，由于凡夫俗子之口，非圣真得道者言也。我今再详言其所同者，盖仙言“炼精化炁”，又言“留得阳精，决定长生”，即同佛言“戒淫修梵行，以出欲界”者也。仙言“转神入定，伏气胎神”，即佛言“四禅定，息定心定而灭尽，以出色界”者也。仙言“炼神还虚”，即佛言“七地菩萨，修上八地，如来出现，已成佛时，加持至九地十地，更加持上至十一地等觉，以超出无色界之上”者也。工夫之同也如是，亦有如是证果。同入仙门，学仙者，同此即成仙。同入佛门，学佛者，同此即成佛。若一切学人，能见闻此，能信受此，能知悟此，犹可望成仙佛。若不闻此，不信此，不悟此，则是既不知修仙修佛，何以妄想成仙成佛</p>\n<p>耶？世之言当下就了者，是言临死时，逢恶道魔境，离之而能就了；实于大道仙佛，不能就了也。有言当下回机者，是言死于此，而生于彼时，用躲轮迴之机，虽入恶道，能速回其机，而不堕入也。此皆凡夫之所修，亦仙佛初修之前劫七生天上，七生人间者，一生天上，一生人间者之初果根基也。仙佛二宗人亦当知。彼嗲嗲(音交)然强谈为二者，真下愚不移者欤！</p>\n<p>又问曰：世之从事仙佛者，皆分为二宗，各立门户以争高。今独言工夫一，景象一，证果一，然观仙佛之言若不一，如世人浅见寡闻，只知仙言虚无，佛言寂灭。不知仙家《先天道德经》已先言寂灭矣。世人只知仙言性命双修，佛则单言见性，不知不见性者不成仙。惟其不知，是以讹传讹，而若不一。我亦未识其为一，不能不同世人之分，自六祖不传衣钵之后，则性学不真。皆言和尚操转劫之性，全不究竟如来佛超劫之性，以是而分仙佛为二矣。虽佛教五祖之下，犹分神秀为北渐法之教，以惠能为南顿法之宗。一佛氏学而同居中国，且分渐顿二途。况东土西方仙佛，而不至于分乎？世世人人浮慕修行，妄称得悟者，而强为诳语以分之，不分之，则不得以己胜于人也！人人得不自夸而愈分乎？绝不闻合一之言，何以识为一？且人全不见仙藏内典，或有略见佛藏，又无一言能解悟领受，所以终于不识一。虽智者，无不在分不分之疑似间也。即不能不疑今一之说。太一自言曰：我之疑，非疑仙佛不可一而当分，亦非疑可一而亦可分。只见古仙以来，皆言一以救世迷，而僧流皆分以惑众信。古来人何不教正妄分误人者？而直切指其一于仙佛诸经之自言者？又何不具一慈悲救世心，直言其若一者，而示即一，如今之所说？乃直待今说即一，是以未有不疑今古两说。请再详之？</p>\n<p>答曰：道修于有为，以至于无为；仙宗张真人《悟真篇》曰：“始于有作无人见，及至无为众始知。但言无为为要妙，孰知有作是根基。”佛宗中西来僧肇曰：“有为虽伪，弃之则佛道难成。无为虽真，执之则慧性不朗。”东土宗镜禅师云：“有为虽伪，弃之则功行不成。无为虽真，拟之则圣果难证。”此皆仙佛二宗若一之说，人人共见，奈彼欺瞒而不令人共知何？道成于有证，以至于无所证；仙之养胎成神，而犹炼神还虚，虽已得道，不以为得，实若无</p>\n<p>所得，是为真得。若以为有所得，则心被有相有妄系缚，不能解脱得道。故《无上内秘真藏经》云：“真道寂灭，灭无所灭。”佛教《圆觉经》云：“若得如来，寂灭随顺，实无寂灭，及寂灭者。”此亦仙佛若一之说也。仙佛皆然者也！不但仙佛同然，虽沙门之四果，所言“万法归于一，而一归于无”，亦有似于如此。故吕纯阳仙翁云：“不问神仙与佛，共同觉照。”觉者，是佛、是仙。当禅定时，则觉照在禅定；当虚无时、寂灭时，则觉照在虚无、在寂灭；所以仙佛自始至终皆用觉照。觉照者，心中之实悟也；若不觉照，乃是假说修行，而全无实悟，只为口头三昧是也。佛家人见吕翁言仙佛同一觉照，遂诳言曾参黄龙禅师；然我昔常究此，而见为谤仙之恶口。自知仙佛决可两从，亦欲与众谪之，令知为可两从故。按：吕翁以唐德宗贞元十二年四月十四日生。于唐文宗开成二年，丁巳举进士，时四十二岁也。为德化县令，出城游庐山，遇异人自言是钟离权。其话有契，吕遂弃职随之七八年而闻道。后修成道于六十四岁，五月二十日，黄鹤楼前，飞昇虚境，超出天地五行之外，世人皆知不可昧者。若黄龙者，在豫章南昌府，宁州东乡黄龙山寺僧，晦堂和尚，一语言俗僧耳。与黄庭坚居邻，为言语文字友。并其徒号死心者，皆宋季人也。岂有已大定之出阳神而神通，能历过五百余年不死者之吕，反问五百余年后之不能大定出神通，而有死者之僧，以学死耶？况吕翁至今屡屡显圣度人，由已得定出定，不落生死轮迴者而后能之。若黄龙，则死后至于今，独不能显一圣，如世尊之度人，如吕翁之度人。反言能显圣之仙，而参不能显圣之凡僧；虽则毁谤仙真，黄何足荣？吕何足辱？细观黄在未死时，不能神通如吕；已死后，又不能复出现于世如吕；此乃死后入轮迴，胎去久矣故也。弥勒佛所谓“终是落空亡”是也。我今既得二宗合一之妙，见彼二宗学者，皆趋小路，妄分仙佛而争高，自误致死。我示知一，便可不堕死入轮迴之途。纵惹僧狂，日后毁我，亦惟尽我度尽后际仙佛圣真之念耳！我又按：自太上传钟离，钟离传之纯阳、海蟾二人，遂分为南北二宗之首，盖吕传之王重阳，王传之邱、刘、谭、马、郝、王、孙，为北宗七真，及下而王栖云、尹清和、宋披云、徐复阳等法眷诸仙。又，刘海蟾传之张紫阳，张传石，石传薛，薛而陈，陈而白，为南宗之五祖，及下而彭鹤林，彭而萧紫虚等法眷诸仙，皆传仙佛合一之道，所修者合一，所度人者皆同一法，其言之现在诸集诸语录者有</p>\n<p>征。后之真修实悟者，后要依样自悟自修，方有实得，而后可以不失人身。第仙宗详言其始，所以必详始者，是何故？盖以其炼真精之难得也。凡遇真仙，传辨药之真时，则炼之可得。不然，世法中所传之炼，终不能得。凡出言为丹经者，莫不章章句句反复宣明，不过明小成初果之要法。初关百日，用炼精化炁之法，化炁而炁足，如全体童子，便是得长生不死初成之小果。钟离三成之说，谓之小成。不如是，则不得真精，不能成其大道。成大道者，即养胎化神于十月，出阳神，为得中成神仙；九年面壁还虚，成天仙上真大成之大道。人遂疑其止能乎此耳，故亦以小成视之，而不知其后之大，而不可复有加者也。释氏子，乃借仙言为小者而小之，以为贬，并不自知其佛法，亦如是也。佛但略言其始。其为言曰：“若不除淫，修禅定者，如蒸砂石，欲其成饭，经百千劫，只名熟砂。何以故？此非饭本。此《楞严经》文也。饭以米为本，炊之成饭，喻修行必除淫离欲，成金刚宝座。此即仙家之炼精，化成乾元白金之炁。同以此为神之所依。佛故以此为座，坐此以修禅定，证涅槃成佛，而得如来出现；即仙之十月，凝神入炁，禅定寂灭，成仙而出阳神。是如以米炊饭，为仙佛二宗之所同也。若不除淫离欲，妄称修佛，必不成佛。盖淫欲失生身之本根，身心速坏，而性无定位。故无以证涅槃入泥洹者；是即砂石蒸饭，必不成饭。此我佛示人，以决然不可易之词也。然佛言离欲者，小乘也；禅定者，中乘而大乘也；后人扫去离欲禅定，自称当下即佛，异于往昔佛修，直似谤法谤佛。不但如蒸砂作饭，犹甚似无水无火无米，而曰作饭。予诚智者，当思此义。汝以淫身，求佛妙果，纵得妙悟，皆是淫根，轮转三途，必不能出。如来涅槃，何路修证？除淫者，是如来初修行之路。淫身，是凡夫行淫事之身。身既有淫漏，则漏尽通不能成。漏尽通成，则真无漏，精全炁全而长生。漏尽通不成，漏之不止，则精枯炁竭而必死。死必沉溺三恶道中轮转之苦。只因不行如来除淫之路，所以不能成如来涅槃之果。淫性之根不除，渐长淫事，虽有偶知佛性当悟，毕竟淫性多，而间杂妙悟，亦无成也。当知六祖所说淫性即是净性，因除淫即是净性身。后人岂可不除淫，而诳人曰参禅悟道哉？必使淫机，身心俱断，断性亦无。淫机，而曰身心者，言淫</p>\n<p>机于身，断淫事而不交媾；淫机于心，断灭而不妄生淫念；故曰身心俱断。初由勉强断，而后得实证断。勉强断者，是欲界六天。有妻妾可淫事者，而执身不行淫事，戒淫而修梵行。清净成，身之机断矣，身根于是亦断成，自然永不可行淫事。如世尊佛三十二相之马阴藏相。又云‘阴藏如马蝗’，即仙真返老还童子之阴，是为实证身断。证到此不可复行淫时，始可言断，超欲界之顶，而出欲界矣。由此上升入色界。初入时，淫念未灭尽。然大修行人，有大志以超世，何故有念未尽？盖日间惺然有真觉时，本是无念；及至昏沉时，有睡魔，未必无女色魔；定心力微者，或有随此念，而妨害道力，正是念未灭尽之过。能心有定力胜者，执心念归正觉，斩绝魔事魔念，此亦初入定时勉强断念之说也。念念皆断，至于无念可断，此谓之自然真实断者；皆由禅定到念住，而得初禅。如六祖所谓禅心无想，实证淫机心断也；方是自性戒定慧也。从此而大定，而常定灭尽，方是断性亦无也。于佛菩提，斯可希冀？”将身心求断淫机，是修仙佛初发心地之正因。身断念住，是证入仙佛地之正果。若能以此修，便可希望成佛。不如是修而痴痴地言成佛，何异向大海水求火炽、洪炉里求冰坚？不过只为外道邪说之人，依傍佛名，假借门户以诳世耳！恨不向《楞严》看此一句，以醒心回头。明淫欲之非佛本，必除淫宝精，为清净梵行之佛本也。又曰：修禅定者，不除淫根，必入魔道。禅定者，安定其心于禅静。世尊在雪山六年，行四禅九定，以入佛道是也。此言魔道即淫事也。魔王以魔女惑世尊，而未为所惑。淫根已除，故不入魔。世人若为淫色所惑，所以堕入魔道，便不是佛道，要知魔与佛相反者。又曰：“其心不淫，则不随其生死相续。”修行人，或色界未证初禅，念犹不住定，心中忽起一淫念，着贪爱即堕入胎中矣。古人参禅入在定而投胎去者，皆因此也。或欲界人命终而死，此生而有死续者，生气绝而淫念未绝，故见人行淫，而亦生心欲与之行淫，即随此淫念淫事而入其胎矣。此死而有生续者，及转生而淫念又不绝，又至有死相续。当知，如是生死相续不了，由于心淫。心断淫，能见色不淫，以及有色不见，虽死亦不受生于后胎，已证天人矣。生亦不死者，已证不死生阿罗汉果矣。以证佛之八千劫说一会法，八万四千劫入一定，而长生不死也。昔世尊云：“最不欲女人入我教</p>\n<p>中。”虽不淫，坏人道行，亦有坏道之具，正防人之淫心，因彼而生也。亦即生死轮迴之机也。故云：“动念时，即受生时。”是也。又说沙门戒律，皆禁沙弥侍者，绝其淫具也。亦防后人生恶行之因，后人可不亦遵戒之哉！又马丹阳真人戒门人云：“真实修行，不许用少年童稚。只老成四五十岁者，一二人足矣，方是清净境界。”又云：“淫心不除，尘不可出。”淫心者，即六根之意识。心之淫，即根识中之内尘。根中有尘而著之，不知舍去，即是合尘而背觉；故云不可出。而谓作佛氏子，学佛宗者，可不信受佛言除淫根以脱魔道乎？史太素问曰：我亦尝闻佛教人说法，虽闻巧喻，似亦妙高，但不闻如何除淫脱魔道者？答曰：此言人当遵奉佛法，戒除淫以脱魔道。为凡夫及伪学者言，非概言及圣智者。有悟而圣者，自戒必严，净修真梵行为佛种子。若吾人自愿志心修佛所修，行佛所行，岂可违佛至要之戒哉？昔迦旃延先学四禅，已得五通矣。迦旃延，在雪山修行禅观，得四禅五神通，为八百飞仙之首。五通者，天耳通、天眼通、神境通、他心通、宿命通也。后又必学于佛，而修梵行。得漏尽通，为六通。此是知除淫以脱魔道，出欲界断生死者也。梵行清净，则得戒力，便生定力慧力，故五戒先以除淫。无淫则无尘、无魔、无欲界、无生死，故万法必以除淫为首。彼世之滥名修佛，而不求知佛道，因其略于言始，略言者，非佛不言，但言之而简略耳。而遂谤佛，始之不以此为要也。因佛止言除淫之名，未闻除淫之法，故皆谤佛，不以除淫为要。若可不以为要，佛何故屡嘱重宣为至要？即上文《楞严经》反覆重言除淫之义，但不及仙宗炼精化炁之明言。而反扫尽之者，竟不用其为要。众僧流，不说自不知究，自不能用，反言佛不用其法。呜呼！可惜佛道由此一根灭绝，而无果证矣。修六通之行，则得六通，得证佛果。不信受除淫，则无六通之行，无佛果证。故云：“如来涅槃，何路修证？”然仙宗，又略言其终。所以可略终者，非仙不言，乃有一言而总彻矣。故云：“一言半句便通玄。”以其炼神还虚而合道。斯时也，绝无所为，至虚至无，至虚则无相，至无则无法可说，何以多言？无极至极，至无之极也。不可以言言者也，无言之可言。亦不必以言言</p>\n<p>者也。不得已于救度后圣，第曰：“唯见于空，所空既无，无无亦无，湛然常寂。”此四句，是《太上清净经》中语。后世愚夫，不识此一言，已彻矣。与寂灭何异？此皆即同冷灰无火者。亦有《无上内秘真藏经》元始天尊云：“真实寂灭，灭无所灭。”只因其略，而遂谤为不如佛之涅槃寂灭，《内秘真藏经》元始天尊云：“心性寂灭，谓之妙因。意根不动，故名妙果。”并亦不识佛之详言，涅槃寂灭，只是息无出入，心无生灭，《内秘真藏经》元始天尊云：“无生无灭，无因无果，而为真果。”定而已矣。即同仙经，既无亦无，常寂之说也。千言万语，明心见性之旨，总不出仙宗炼己、炼神还虚，后际半句之义。此实二氏之同，言若异而理不异，佛门末法人，强争为异。正所谓矮人担板，只见得一边。奈何事佛氏者，竞争为自大；不知佛之何以成其大？而仙本同其大！皆超劫运，而至未有天地之先。此灵光独耀，不随天地而成坏，同有此为大。事仙家者，贬佛为幻空；不知仙何以异于佛幻而为真空，而佛本同其真空。空以何义为真空，即佛所说“空而不空，不空而空。”是也。盖心性静寂，而有正觉，是为空中而不空也；寂而无正觉，则堕幻空而顽矣，不可也。心性住于定，似乎不空之定相，妙于不拘定相，洞虚太空，不着一所，为不空中而空也；若执相为定，而为法所系缚，不解脱，堕在二乘知见矣，非真空佛果也。故亦不可也。茫茫二宗学者，徒曰学仙，而仙且不知，又焉能知佛？枉称学佛，而佛法不信，又焉能识仙道乎？妄相讥议不当，皆末法学者之愚也。若不高夸自己，贬别他人，如何能争夺得衣食？终于不知二宗之道，皆以如是而了也。乃同理而异词者耳！如是而了者：皆除淫欲以出欲界，皆禅定以出色界，皆证上四空天定，以出无色界，此所同之理也。异词者，即此上文两样之说是也。然而从此究其言之详，亦不为胜愈于略；言之略，亦不为负堕于详者也。负堕二字，出《传灯录》，乃西土佛说，不胜之义。今而后，吾又为佛宗惜，而为仙宗幸，何也？事佛道者迷其始，而执其终。始者，离欲梵行也。徒只口说《梵网经》，而身行世法事；不以为始当精进之法，迷而不悟，一并扫去不用。执终者，似终之四空</p>\n<p>定，而实无因得空定。扫却世尊习四禅而入定者，上五不还天四空天定，而九大定者。不遵世尊得如来出现时而为顿；自以凡夫之流，无修无证而为顿了；任其堕空，而不肯悟，是为执妄惑迷者也。能从此理而回心，实悟于举步起而行以到家，彻上彻下至大休歇，而顿了；斯足为我佛门龙象矣！若只瞋我云，代佛宣言，别其真伪，反诬曰我谤，则佛法终于不得明，害却未来无量数诸佛世尊；则四禅九定正法，终无有一人肯修取证而已矣。弃其命，而猖狂谈性，虽曰秉教普度众生，而实普陷众生者也！为其无可以入首，则无前修之根基。不知耕田博饭吃，终归于死亡之禅。若不耕田以博饭吃，则如彼之画饼，必不充饥。又且有不画饼充饥者，有堕口头禅外道者，以人之必有死为开示。以一口气不来为实悟当机处，安然待其死，是空亡也。此悖佛了生死之说矣。或有肯实悟禅定者，只知四禅五神通，而不能成漏尽六通，以免死亡，皆悖佛之四愿，曰不老，曰不死，曰恒少壮，曰恒无病者。按其滚芥，难于投针。此亦禅宗人之所说者，曰昔佛说须弥顶山上，以芥菜子一粒，投之滚以下山，其山下以一针竖立，使尖向上，芥子投遇针尖，焉能有遇？此事甚难者。喻人生于世，得人身甚难！得回心修行甚难！遇仙佛正法亦甚难！借曰万幸遇沙门四果之初，自求生死之法，似滚芥投针之难。甚言知死此生彼之难遇，则其死此生于彼，到轮迴不能逃者亦多。若能于今除却外来六尘轮迴，除却内起六尘轮迴，于修佛仙正法相应，则于针芥相投处，方可望一遇。而轮迴有能逃、不能逃者矣。能逃者，能知达摩归空十信，又知世尊自择父母之法，则能逃三恶道，而生于人中洪福。不能逃者，不知十信择法，不知一线之下有投奔，必不能逃三恶道而堕入矣。故萧真人云：“今生若不悟修真，未必来生得恁地。”所以弥勒佛谓“饶经八万劫，终是落空亡”者，正为此辈醒也！地不涌金莲，法华不能转。不坐金刚座，不能超劫，所以空亡。事仙道者，泥其始，而以少得为足，未能究其终者，有之。或有初学，少得长生人仙小果，便自志得意满，而不进悟入定神通及出定神通者，则不成神仙。《内秘真藏经》云：“学小乘行，终无得道。”又《玉清道德经》云：“或有不明正性，未全大乘，不发智慧，亦能堕落。”是也。究而未能了其终者，亦有之。此二节，言始终者，是言修神仙</p>\n<p>之始终，非言天仙之更在后者。其或有在十月入定，养胎神之时，频有出入，而不灭尽定；惟修内神通，而不能成神炁至空，则不发智慧，不超生死也。未能成大定时，而频出入不绝，只成妄走，虽欲外显神通，而亦不能，此即所谓不能了其终者。或有未到最上上乘，上上乘，即炼神还虚，与道合真。能住持于此，终处不退念，亦不失此形躯，暂可长生不死，而可久为参请之具。为其入首，少得实地。实地者，言既得长生不死，则非落空亡之类。得实地，便可进修，了末后句子以证最上上乘，则善于佛氏子者矣。求其混处世法中，能以戒行为宝者，则佛氏子实有胜者焉！僧流，虽庸下之流，每有道高明受戒者；道流，每有高明之辈，同于庸下无戒；此便是道者不及僧者处。是何故？盖僧有戒经，颁行于遍世界，专习戒经者，名曰律师；以讲明律义，大众便于闻戒，易于习学。及披戒衣求乞者，俗人不择真伪，曰戒僧也，慨施之，以是借戒者多。至于仙戒，天律明科甚多；有全说之戒经，又诸经之内，皆有戒条戒语，俱在《道藏》内。尽因住持者秘藏，不令世界中学道者得知得见，又无律师传戒。遂使遍世界人，疑为仙真无戒。彼何由以发心受戒？抑从何处得以闻戒？及至求乞者无戒衣可披，俗人亦不以如有戒之僧一样视之而施。故出家者，以易化缘之故，入佛教者多矣。故浙杭有一谚云：和尚化缘，如猫捕鼠，一开口便咬一个；尼姑化缘如狗捕鼠，或偶有咬得一个者；道士化缘如马捕鼠，举一世亦不能咬得一个。以此谚观之，则浙地不学仙，间有出谈仙道者，终不知谈真正仙道也。后之高贤，当知人一类也，其性命精炁神等，仙佛二宗之人，皆同。身一生也，皆由父母二炁所生，不如此者，便是卵生、湿生、化生之众生。心一性也。皆具纯真不昧之体，有至静不动之理。入佛宗者，幸毋废起首脚跟下所行，以自绝于佛道者也！凡言脚下所行，起初必有所行之工也。从一步行起，直行至极处，不可少者。诸佛诸菩萨，未有不依法修行者。古人所谓“若少一法，不成佛法。”是也。亦毋二视其性，而并自绝于仙道者也！人一而性岂二耶？人生来，所具同一性，所修亦同一性，所以超劫运而不随劫坏者，亦同一性，故我有幸得深明此一性也。昔《华严经》云：“护持诸佛法，摄取大仙道。”此世尊，且取仙道而修，众凡岂可不取乎？又云大仙所有施戒</p>\n<p>法，忍辱精进禅智慧。及以方便慈悲，道佛清净行愿音说，此亦不二视仙佛性之道也。遇有仙可学则学，仙即佛也。遇有佛可入则入，佛即仙也。言仙佛本皆难遇，遇而不闻其言，不见其神通，亦不知其为仙佛。言而不言及超世大道，则仙佛之道，尤为难遇。世人有何德何功之大，何修何福之力，而可轻易能得遇仙佛、遇仙佛之道耶？我故重示之曰：在佛宗之人，倘偶遇仙，则学仙即是学佛；何碍于留发留须？在仙宗之人，倘偶遇佛，则学佛即在学仙；亦何嫌其秃头秃嘴？本来了在一性，何必差别分于外相为哉！后学，其能听之否也？唯真修正觉以顿了，而各自努力精进可矣。言仙佛性固同，道固同，则所修者，当有同证。唯精勤修者，则证同。有不同者，是各人勤惰之不同，真修伪说之不同，故所证亦不同，而又分别门户为不同。今重示：正觉者，为禅定中寂而常觉。二宗之小乘，趋大乘上乘，必须皆努力而后能得。不然，必为无知顽空者之所害，二宗俱不得所利益。予故说：不可以有为单说仙，亦不可以无为单说佛。以其皆有有为，皆有无为，不能分而不分也。仙家言有为者，即炼精用小周天，炼炁用大周天是也。言无为者，即炁定神定，还虚合道是也。佛言有为者，即燃灯说法，常转法轮。言无为者，即龙宫天宫，入定静室中，入八万四千劫定是也。又沙门禅师言有为者，即万法归一。言无为者，即一归无。又，西来肇师云：“弃有为，则佛道难成；执无为，则慧性不朗。”当知，皆由戒而得定慧，皆以有为而精进无为也。若不如是，堕空亡矣。昔见《佛藏》，有《正法念处经》云先世三十三天帝释，《佛藏》中言三十三天者，即指欲界六天之第二天，忉利天也，又名净居天。言有三十三人同为此帝释，故云如此。《华严经》云：如来于四天下中，或名释迦牟尼，或名第七仙，或名帝迦。此世尊之自名仙，自名为帝释也。非可指为仙家之人，而妄贬之也。以天福尽，故退生下世。佛释迦出世，为其说法，得不退失。既云帝释，是仙宗天帝。因佛说法而得道，仙道即佛法也；有可稽也。又何分仙佛为二？即又何诳言修仙者不用禅耶？惟大圣智，而后知同悟于极也。亦唯后圣，心自信之，以图自究自悟；慎勿向浊恶愚夫言，徒然致其一笑，所谓“不笑不足为道”也。彼笑而争人我者，何人？从地狱畜生</p>\n<p>二道来者。原无自修自证，而又无见无闻，又且不信见不信闻，必不足以知此。虽然予为忧世有余说焉：即此仙佛正宗修证而观之，试审二教末学，果有谁知一悟于此乎？抑亦有闻而信受于此乎？皆为根浅福薄，见邪所障也。是以仙教末学，不学仙道，以按导却病为多能，以房术探战为乐计，以烹铅炼汞为服食，猖狂行教于世，索谢礼于却病之途，纵淫媾于探战之局，挟骗机于烹炼之场。《元始报恩成道经》元始天尊言：“世人生入邪道，颠狂惑乱，自制一法，败黩道要，以求利用。赃满罪积，生身被考，种种苦恼。死入地狱，遍遭汤炭，永无出期。”正同此类。举世皆然，可有一人不如是乎？不如是者，则真志于真仙者也。有学真仙之志，乃前劫有真修正道之根，不入旁门，不学邪法，不行骗局。务修德恐不及，岂肯丧德？奈何浊世凡夫中，绝无真仙真道，而世何由以学？世间因无仙道，只有探战淫术，故学者只学此，而闻此，被其迷惑。虽至于耗精神，丧性命，不知改过。只闻仙自天降而度人者，邱长春真人云：“了悟仙地出神登仙者，悉是虚空点化，非凡师所度。”内而神炁成真，外而炼汞点化，心口密授而已。不意凡夫棍党，夸能内外，而遂诳人，则世世被其害者，几多人耶？又见佛教末学，不学佛法，予以佛经诸法所开示者，而宣示之。彼若视为刀加彼颈，忿若仇雠。《无上内秘真藏经》云：“闻大乘而生不信，此人从无量劫来，受六畜身，故生我慢，不信三宝。”徒以劝修功德，而自窃庇为遇缘；以化人布施，而自享利为护法；以打人一棒，而得胜机为超宗；陈真人云：“饶他倾河之辨，反为入道之魔。”《内秘真藏经》云：“系业不住，业业相牵，云何解脱？”皆凡夫外道空亡事耳！全与佛法不生不灭而涅槃者不相干涉。而公然骇俗惊僧，不以求真佛法为志愿，不以不求真佛法为愧耻，为释迦三十三祖之罪人，为哄诱善信堕轮迴之魔鬼。《楞严经》佛言：“如不断淫，必落魔道。彼等魔众，自谓成无上道，我灭后多此魔民，广行贪淫为善知识，令诸众生堕爱见坑，失菩提路。”害人宁有已哉！以若所为，争相冒认，曰会佛法；何异说真方卖假药者乎？其不如劝人</p>\n<p>行善之有补于世道也，远矣！噫！有志仙佛者，幸毋陷入此二种外道局中，斯有可向上之望。不然这般种子蟠结心田，何生识得灭却，而真修实性，阳神出而还于虚耶？</p>\n<p>八问曰：乳哺何为？</p>\n<p>答曰：炼神以后之喻也，神炁定而为一神，神炁定，是在胎中养成之阳神也。神出矣；所谓常定者，正当在是也。以大定，而至常常大定，一定而永定，喻之为乳哺。不常定，则失已定者矣。即神仙与菩萨，有退堕之谓也。不定，息则有呼吸如凡夫，则亦可同凡夫之生死。夫乳之养孩，养脏腑而令具足，养形躯而令成人，乳哺之功至大矣！乳哺之用至要矣！盖初定之神易摇，易摇者，或定中，起一调神出念，虽不遇境，但入之迟而出之久则摇；或出遇一境而少着之，则摇。所以云初出定时，必倏出而倏入，正要防危虑险也。必定而久定，而后了其大成。初定者，灭尽出入息，而证一日之灭尽定。久定者，一七、二七、七七，若年若劫，悉俱定中，而灭尽定久也，方是寂灭为乐之实地。此正到天仙、佛、世尊，之圆满觉道也。以炼神还虚之义，名之乳者，即炼之义也。炼而又炼，至合于自然真虚，即取喻乳而又乳，成其全体者也。初出阳神定力小，则神通小。依定久久而为乳哺，则定力大，而得神通亦大。如人初生，只一小孩，乳养长大成人，气力大，才能亦大。倘不常定，只得初定小力，则不能千变万化。则止上乘而非上上，从初定成时，而乳至常定还虚，便是上上乘。如造宝塔，合顶尖完矣。若不常定，虽已在上上之路，亦不能到上上矣。顿而非顿，顿者，即是不二法，绝无生灭往来出入，不似渐之炼了精又炼炁，化了炁又化神；一定直至常定之极处，方谓之顿。若不入为常之大定，至圆觉了义，则非顿也。神而不神，初成神仙，得大定，必乳哺而常定，则神之通十方而普现；分神万变，所谓百千万亿化身也可，此神之所以神也。不神者，不能大显神通也。由初得定而出神，定力微而不可离定。若离定，则与凡夫不入定者等耳。离定略久，则曰有危险之当防虑。以其离定之故，使内失神通，而外亦不能有神通。必常大定，则内常通，而外亦通。我故曰：不常定，则不</p>\n<p>神通。或退滞于小果者，有之。初大定而出阳神后，能常常大定，即佛之加持向上事也，则佛之觉道可圆满，仙之神可还虚，而了却最上上矣。若不常定，则退于出入生灭，所以佛言《大涅槃经》云：“一切法，真如中，为有三乘差别相否？”谓有退住声闻乘者；或有退住独觉乘者；或有证得无上乘者；是也。仙家所言三界有众生者，亦言不常定，则生死或有至于不能绝尽故也。所以寒山、拾得、达摩、傅大士，皆由菩萨而退滞，转劫复生为此身。惟持守前念具在，则此俱不堕，犹是菩萨，尚能修证向佛。若有前念迷者，则堕凡夫逐情爱，而轮迴无出期矣。后之伪学者，妄谈仙道佛法，自夸顿了，不信如此，乃无前修福力之下愚。我劝诸人，宜慎之。则难免于移居夺舍。移居也，夺舍也，及投胎也，旧住也，仙家谓之四果。张真人《悟真篇》，遵大藏，已明标其目于世间。而诸家注，未详其由。盖以旧住者，言住旧房舍，即长生不死人仙之身，能住旧是亦或能常入定，而或亦有不入定，此四者中之最上正果，即不死而不生之阿罗汉果。可趋佛地，为可超小果而向上者；以其守住小果，不再退而下，曰旧住；故于退小果之类不言。惟投胎、夺舍、移居三者，是小果时之所堕；亦向上大修行，宜防虑之危险！移居者，言此身无可居，彼身有可居，乃移神于彼身中而居也。盖有不常定，乃妄出而迷。犹似十月内，有余之涅槃。或偶遇刀兵劫灾坏身，而不可居神；或偶遇火劫灾焚毁坏身，水劫灾漂溺坏身，而不可居神；则移神入他人新死之身未坏者而居。此小果之所不能逃三灾者之所当知。故退下小果者，遇灾劫不能保，身亦如之不能免也。此由世之参方者，传言如此，不必深信。予谓若人之此身老坏，或曾经大危废疾，而不可还丹者，未免不再生后有少壮之身；亦谓之移居，弃旧居而移新居也。亦兼有投胎夺舍之类在其中。又昔张紫阳真人，谓其入室外护之徒刘永年曰：吾去赴瑶池宴，七日不来，焚吾蜕。未及六日，刘以母死，焚张蜕而去。张回则见蜕焚，已无可居而移之。此亦初出定不常定，而危险当防虑之一案也。此亦虽出于作仙传者之言，有无不能辨，亦可备存一端之理也。夺舍者，父母已成胎，性命隐然可备，存则可为神居之舍；勿令他人得而居，而我争先夺而居之，可得富贵之洪福，或得修行之清福。不堕恶道，亦小果有生死者之必至，而得定者之当防退以至者。即佛教中三阴认景，投胎中阴之一机也。投胎者有三，曰：初阴、中阴、后阴也。有死之</p>\n<p>时与胎产之时相遇，则相投入，此不住胎中者；有死之时在先，胎未满足，产期在后，则安身于胎息而俟投入者；有入胎而俟产者，或死于父母媾之先，因见媾而起淫念，投入为胎，随十月满而产；凡人欲认景而投者，亦当知此。然此事在凡夫，则死而投转劫生后身。在果位，则起淫媾之妄念，即乘淫事而投入。如《化书》云，梓潼帝君，前劫飞空，见汉高祖与戚后之媾，遂犯淫事投入胎中，为如意太子，是也。又如世尊在兜率陀天宫，天寿尽，下降自择父母，投入摩耶夫人胎中，为须达多太子是也。此二案也。在奋志精修，必欲即成仙佛者，皆当防此为危险也。若不幸而转一胎，则迟一劫矣。不肯堕下者，敢不认洪福清福，保护来世决定修仙佛耶？然初大定而出神，未可遽离形；若不定而久离之，必有移夺投三者之危。若常定后乃可离形，是神已合天德之虚矣。凡初定能出，而能常定，即永在十月外，而向上还虚极矣。不常定而少有未定，只退似十月内，则果小矣。我故曰：出定之初，即为入定之始；言当常常在大定也。或堕陷于异趣者，有之。异趣者，是六道中之三恶道，为言畜生道、饿鬼道、地狱道也。以及魔道，亦与天道、人道之正趣不同者。堕陷者，念邪之所至也。如六根迷其六识入于六尘然。尘识即异趣之境也。既迷入其境，虽曰不为，不可得也；况贪著者乎？故我邱长春真人，授法已来，皆有斩退无常一法。凡精修百日，十月之间，倘见无常鬼使一到，即用法斩退。不随以去，则正异两趣俱无。故令大修行者，当死而不死。亦谓之：我命在我也。固不宜逐境而定迟。心逐六尘外境，而未即回定，则炁亦随之驰外而不定，俱住六尘异趣矣。故张虚静天师云：“神一出便收来，神返身中炁自回。”此正示人速常定之理。所谓无色界尚有生死者，此也。此言失定者之堕生死，为其不复速定之似凡夫也，非言正定还虚有生死。盖定而虚，愈入玄妙，愈远生死矣。古人云：“到此，正要脚踏实地。”叮咛得定者，最要常在定。乳至还虚，同虚空体矣。出三界之外，死生不能缚，天地不能拘，又皆乳哺之力也。乳哺又岂可忽乎哉？自此以后，即释迦所谓“虚空界尽，我此修行，终无有尽”。无尽之定，正是超劫运之修行。若劫运至，只在定中，故不随劫坏。言定之无已也！定有已，则限于虚空之不尽，即是不超劫运。学者知之。</p>\n<p>九问曰：李虚庵真人，曹还阳真人，相传以来，言句以何为秘要，愿再言之？</p>\n<p>答曰：皆以採先天阳精而炼金丹为秘要也！上天明科之所重禁，不许轻妄漏泄天机，历代仙真，莫不皆以此为秘也。还阳真人每教人，便浅说其道之原，以究竟其先天。人能知道之原，则知天之先，所以化生天地、化生成人、成仙佛者；而后真知返其本，归其根，复其命之有趋向。若世人无真知真闻者，不知所循，如何为法，不知所证，如何为道，妄猜瞎想，欺诳众愚。故真人见古之说喻，遍后世皆执喻而愈迷，由不知所以然之道。乃重宣明示以提醒人，知要而已。我已发明之，而揭于《天仙正理直论》之首矣。虚庵真人，言句甚多，遗于庐江。今且借二真人言初用工者一言之。虚庵仙祖，有截句二章律诗三首。</p>\n<h6>截之一曰：</h6>\n<p>一阳初动漏迟迟，</p>\n<p>正是仙翁採药時。</p>\n<p>速速用工依口诀，</p>\n<p>莫教错过这些儿。</p>\n<p>一阳初动者，阳精之炁于阴极而复动之初也。迟迟者，阳炁渐生渐旺，而至炁足于成丹。凡修士用以还丹，亦当勿急迫，而失之炁嫩也。古人立喻，以朔旦首一月之令，必详审以三日，见庚方之月，为药生採药之候。速速者，言时当採则速採。不速，则望远不堪尝矣。月减光，则阳炁亦渐散，不能长生不死。故嘱之曰：莫错过。真人因这些子是长生不死超劫之本，秘密天机，天上有，地下无，故叮咛之也。</p>\n<h6>截之二曰：</h6>\n<p>一阳初动即玄关，</p>\n<p>不必生疑不必难。</p>\n<p>正好临炉依口诀，</p>\n<p>自然有路达泥丸。</p>\n<p>一阳动者，即玄关之药炁生也。随而由此採炼，即玄关之火炁生也。古人云：“识得玄关，金丹了却。”世人疑之，曰必有秘窍。及闻机关之玄妙，有猜这件也不是，有猜那件也不是，又问这样不是，那样不是，果以何为着落？故真人破其疑曰一阳初动，即是也。又何必疑其难知难行哉？依师仙机口诀，由顺路而逆回为採为炼，即灌顶之路也。泥丸者，顶门乾也。所谓“夹脊双关透顶门，修行径路此为真。”是也。又云“一孔玄关窍，乾坤共合成”者，亦是。又《谷神篇》云：“採得玄关路的端，教君容易炼还丹。”</p>\n<h6>律之一曰：</h6>\n<p>识破乾坤颠倒颠，</p>\n<p>金丹一粒是天仙。</p>\n<p>要寻不必深山里，</p>\n<p>所得无过在眼前。</p>\n<p>忙里偷闲调外药，</p>\n<p>无中生有採先天。</p>\n<p>信來认得生身处，</p>\n<p>下手工夫要口传。</p>\n<p>乾坤颠倒者，坤阴主静在下，乾阳主动在上。下之静者，不能自升；因动者下降和合，而后能同升。即此升降之机，便云颠倒。凡天地二炁升降，皆如是颠倒之，始能生生不已。故炼金液还丹者，其二炁妙合，颠倒升降亦如是，成此金丹一粒，服食以证天仙也。若非金丹，必不是天仙也。不必深山者，内炼神炁之金丹，最要得仙传，而后知之真行之真，不拘在山不在山，皆可为之。若无仙传，徒入深山也无益。故《悟真篇》云：“何必深山守静孤？”非若以金石外物，炼神丹服食者之必入深山福地而后可也。在眼前者，言长生久视之妙，非可泛然无见，则採取在眼前，配合在眼前，烹炼在眼前。少有不见，则炼丹无机矣，且违《阴符经》“机在目”之说，而堕旁门之虚幻。调外药者，药有生时，有当採时，若不先调，则老嫩无分别，皆不成丹。必仙授天机，生如来生之时，採如所採之时，生生採採皆如，即谓之调。无生有者，元炁自无而生药为有，火自无而生内呼吸为有，药火皆自无来，故合先天。採</p>\n<p>炼成丹，亦为生有也。生身处者，即先天炁也。无真仙口传者，则知先天不真，采炼工不真。故必要天上人口传，若世间诳语，虽传亦无用。</p>\n<h5>律之二曰：</h5>\n<p>若无火候道难成，</p>\n<p>说破根源汝信行。</p>\n<p>要夺人间真造化，</p>\n<p>不离天上月亏盈。</p>\n<p>抽添这等分铢两，</p>\n<p>进退如斯合圣经。</p>\n<p>此是上天梯一把，</p>\n<p>凭他扶我上三清。</p>\n<p>此诗专言火候为要者。仙家以药炁为长生之本，以火候为长生之大用。盖元炁充运于一身，凡夫身劳一日，则炁耗一日而身疲，故夜必昏睡，炁不充也。静久复动，而犹渐微。年及老，炁将尽而必死。修仙者，使元炁不微弱，亦不尽。逆回复于命根存住，而且长养至于长生。非火候则炁不能自归于根，不能自存自长。故真人开口便决言嘱人曰：“无火道难成。”根源者，即用火候所以然之理，夺造化所必由，非此则不能夺。用火候又必合月之盈亏，然一月盈亏，即是一日子午。前半月渐盈，象进阳火也。后半月渐亏，象退阴符也。抽添以盈亏而分铢两，进退以盈亏而合圣经常法。始以有呼吸之候，而炼丹服食；后以无呼吸之候，而定神，证天仙；是必以此为上天梯子。</p>\n<h6>律之三曰：</h6>\n<p>偃月之炉在那方，</p>\n<p>峨眉现处是家乡。</p>\n<p>色中无色尘先觉，</p>\n<p>身外生身道更香。</p>\n<p>先取元阳为黍米，</p>\n<p>次薰真炁酝黄梁。</p>\n<h5>其间酿就长生酒，</h5>\n<p>一日翻来醉一场。</p>\n<p>偃月炉，喻心也。峨眉现，即三日庚方，现出一线光之月也。月现之初，喻阳炁生复之初。阳炁生则炉始用，故曰炉是家乡。以元炁又喻为米，薰蒸而酿成玉液，服之一日一醉。醉者，大周天薰然沉酣之喻也。以上五章，皆在南昌授曹还阳而作。</p>\n<p>还阳有截句三章。</p>\n<p>一日：</p>\n<p>一阳每动是其时，</p>\n<p>时时又至我还知。</p>\n<p>自然擒住这些儿。</p>\n<p>谨依师指临炉诀，</p>\n<p>阳炁每动，皆药生之机。是其时者，知为药初生之时。时时又至者，生而又生，生生之不已。生而知，知而配探。当切切慎此时，而不可错失也！正是指出《参同契》中“二分水有余”之秘语也。若非师指，此事难知。谨依师指示，採取烹炼，炁结成丹而住。若不得真仙秘指，则不知真时，不当採而採者，则炁之不足，而或嫩；当採而不採者，则炁之过时，而或散。故曰：当谨依师指，则不难于擒住。这些儿者，即一阳动炁也。</p>\n<p>二日：</p>\n<p>一阳初动本无心，</p>\n<p>有心拨动指南针。</p>\n<p>得个牛眠藏炁穴，</p>\n<p>活墓莲开七朵金。</p>\n<p>无心者，心无生而炁自生，是为真生，而可得以长生。有心者，时至神已有知，而为採取之主。凡有知，即是神与炁遇。遇而不离，则配合矣，故必有心。指南针者，以小针浮于水面，针身在午，针尖在子。卜吉地者，因以定藏风聚炁之穴也。牛眠地藏炁穴，皆喻伏气胎神也。盖牛之性在鼻，鼻则有息存焉；凡安神息者喻之：仙家张果真人有牧牛图，佛家誌公和尚有牧牛图，石</p>\n<p>翚和尚有答马祖牧牛之语，皆同此。活墓者，王重阳真人，掘土穴为墓，自居三年，以养胎乳神，名之曰“活死人墓”也。大修行时，只知有定心，不致有动念，活活的似一个死人，始得。不如是，必不到仙佛地位。后之法眷，不可违悖了此意。莲开七朵金者，纯阳下降，度重阳时，令举目东观海边，见空中现出七朵金莲。纯阳又曰：“岂但七朵？还有万朵金莲。”及道成，至东，乃度邱、刘、谭、马、郝、王、孙七真，而预为报兆也。故门下后人，作《金莲正宗》书以记之。昔世尊地涌金莲，重阳真人虚空涌金莲，唯演说佛法，开立全真正教，至于浩浩无极劫者，自重阳真人始。后来法眷，故皆遵之，而仙佛二宗，始能合一为真修矣。</p>\n<h6>三日：</h6>\n<h5>金丹大药不难求，</h5>\n<h5>日守中天夜守流。</h5>\n<p>一团生意在双眸。</p>\n<p>此章，正言採大药之理。即《直论》所谓“内药採而后生”者也。按学金丹者遍世间，而知得其大药者绝少，到头尽归无有，而不能胎神。上仙每示人曰：“世间绝无其事，天上始有其理。德不合天者难求，志不动天者难求。”深戒人之妄求及不知修德所以为求者。又谓大药不求，则不至也。故曹真人又提醒之曰：“不难求。”所谓不难者，盖守中天，守流而已。天固在上，流固在下。上下之间，皆有守时。守之，则已成之炁，聚而不散，求之即得也；故曰水火自交无上下隔碍，神炁成一片矣，而丹岂不可求哉！有不可详言所守者，即天机至秘所难求者：守之机在双眸！释《阴符经》之教也。目神能运，则彻上彻下，可专觉而常觉不昧也。《语录》中所解，皆昔闻仙佛师论道之说，故重发明为自注之说。非世之他人，揣摩猜度幻注者比。后学见者，须当潜心体究，则思得其半矣。二真人八诗之说，皆重宣火药者耳。夫金丹仙道至难明者，真火真药也！顾与弢问曰：弟子久蒙尊教，近又得正一天师门，授我以玉清仙士符箓，幸悟道之有基。敢再问，世间人人自称知火知药，似觉不难明。按我所闻，命已明者，而觉实难明。愿请再详？</p>\n<p>答曰：难明，在调燮火药之真候。若药候之真，于《直论》、《语录》俱已详言之无余矣。但调真候于火者，则有两端：有呼吸之候一调法也；无呼吸之候又一调法也；若只浑沌一言，不为分别，何由实悟？然有呼吸者，不宜见有，必似于无。无呼吸者，不使强无，强无则反著有。强无著有而不调者，我则斥之曰“逼塞难容”；不强无而顺时令以调者，我则明之曰“如空空无物”是也。此万古圣真之秘机，天廷之所重禁者，所以为难明也。学者，当按此语修德盟天，以寻仙师之度。而二真人不得不反覆为言之详也。我今再详于《语录》，不过当时刺血同盟之语耳！顾与弢问誓盟之说。答曰：自古仙真授受真道，必清净斋醮。如科条具信贽，刺血盟誓于天，奏告于上帝、三台北斗、南辰三官、四圣五帝司命各位下请命，降允而后可传。凡一传人，遍天地间圣神无不告知者。倘有恶类，妄自行财，及以诡诈私相授受，师弟子同受考掠，可不重哉？可不戒哉？故《四极明科略》云：“度命回年之诀，遇真便传。”依盟上金八两，五色之罗各九十尺，金环五双，师弟子对为九十日，告日月。传违科负盟，被左右二官所考。又云：“金方丹方悉盟誓，上金白绢，以誓九天不泄之信。”又云：“不盟而度，师与得者，同被二官所考。”又云：“无信而度，经谓之越天道。无盟而传，经谓之泄天宝。”又《太上科令》云：“传授弟子当苦清斋，而相传授受。不审其人，无斋而传付者，师当死，受者失两目。斋不苦切，师当病，受者失口焉。”《太上三一五炁真经》云：“天仙之真，有龙胎金液九转之丹，长生久视。有四十年一出之约，皆不得背科而妄泄也。无仙籍者，不得闻知也。”若信人，赉信金诚素，试之无退，将法付之。若犹豫猜疑，秘而莫与。凡有愿学正一盟威者，上命所司帝君等授以符策。愿学全真仙道金液还丹者，太上老君，亲遣仙道玉帝紫微，授以符节。所以有符策者，复可升授符策。有符节者，始得秘受火药。此所以难遇难明也。及道成飞昇，验符策，则归原职。验符节，则列仙真。字字句句之理，皆出仙师法旨，故并书此语，以为吾金莲正宗后人之所考证。</p>\n<p>十问曰：钟离祖仙翁谓仙有五等，详《传道集》中。天仙、神仙、地仙、人仙、鬼仙之目，世人固皆知之。第犹未知何所修证之异，而不等也？愿闻之。</p>\n<p>答曰：仙虽五等，而其种则二，二种者何？阴神、阳神之不同也。鬼仙者，阴灵之种类也。人死由阳尽而纯阴，其阴性虽有灵，终是纯阴之鬼也。天、神、地、人四仙者，阳神之种类也。四仙得阳炁之全足，为一根本之所修。由浅深不同，而证有大小之异。初证人仙，进至地仙，又进至神仙，极于天仙。大修行人，大修者，学仙佛正道，谈仙佛正理，持仙佛正戒，行仙佛正行者。能採取肾中真精阳炁，配合心中本性元神，宰运呼吸，而为小周天之火。薰蒸补助，补得元炁充满，如十六岁童子纯阳之体者，所谓二八一斤者便是；铅半斤，汞八两。又云：“上弦八两，下弦半斤。”丈六金身者亦是。二八亦是一丈六。上句，是仙教人所说。此句，是佛教人所说相同者。则亦同天体之纯阳矣，此炼精已化成纯炁者也。既还为纯炁，不复去化生为精。炁足于下田，下田者，乃初在母腹中成胎时，元炁所藏之处，亦生呼吸之根也，故脐与母气相通。出胎时，元炁仍在此，生呼吸之根亦是此，元炁化精由此，精返化炁亦在此。此理之一定不可罔说者，世人妄指人以无炁根之处，误人亦太甚矣。虽不用超脱离下而居中，但能守在下田，即是长生不死之果，百千万亿岁，而名曰人仙。人仙有三种，一者是内炼神炁，得金液还丹而成，为天仙之初工也。二者是金石之药炼神丹服食，得千百岁不死者；又或炼二十四品金石仙丹服食，至五七百岁不死者。三者是灵芝及诸般草木药物制成丹丸服食，少延其身，此则人仙之最下者。人仙者，不离于人者也。不离人者，由未超出人形色之凡身也。有身在凡，尚可淫色，化形为精。唯内炼神炁而更不已，炁纯全不化精，精返化炁守在下田，炁久固，而身亦得其久固。所以成人仙者，不失人身，亦不能离人身。此不过初机小成之果耳。天仙之道，由于三成，即上关、中关、初关之所成。初关乃炼精化炁成者，故为小成果。守之，则永保长年。顾与弢问曰：用何保法？答曰：炁欲动，则使之不动而还静；故化精，使不化而仍为炁；即採取烹炼于下田，归其根，复其命。命长在，而载命之身，亦长在也。若不守真炁，复泄真精，则与常人生死无异。为其不列于人，犹不异于人也。所以云：“神驰则炁散，神外驰于目，</p>\n<p>则内炁亦外散于目而用视。神外驰于耳，则内炁亦散于耳而用听。神外驰于淫，则内炁随而散于淫根而用触。六根之尘，皆能令我炁散。最危险所当防。精竭则人亡。”精由元炁化而为精为髓，以护人身。精有生，则炁根旺。精髓竭，则炁根无，而不能生护人身者已矣，故亡。《道藏·妙法莲华真经》云：“魂劳神散，气竭命终。”亦此意。古云：“留得阳精，决定长生。”陈希夷之言。人仙者已有焉。地仙者，从人仙用工不已，进一阶级者；则精已化炁，探此化炁之丹，更而至于服食之者。淫根除矣，得成如来马阴藏相者，又云淫根断者。出离欲界矣，无气绝之生死，身中气绝而死，是分所当死者。故佛教人谓之分段生死。能仙行于陆地，犹有重浊凡质在，故不能离于地者也。《楞严经》云：食地中百谷，足不离地，不服不食，是真解脱者。亦不能脱免三灾，小三灾者，水、火、刀兵也。人世间偶遇，故小。大三灾者，水、火、风也。天地阳九，六百之劫数灾，故大。自有呼吸在也。何也？水灾之可以塞呼吸之窍也；气以呼吸通而生，水随吸而入塞其窍，不能呼吸，气断而死，故水亦为灾。火灾之可以毁呼吸之具也；身具存，则有喉鼻通呼吸，身具烧毁，则气绝，不能为神之所依。刀兵灾之可以解呼吸之形也；或刀剑斩断其形，或枪戟扎穿为穴而泄气，无以为神之依。能使神炁离而为二，故皆谓之尸解。尸解之说非一，或有气数自绝而死，凡夫也。小灾形神分而尸解者，小果也。有大修行而能超脱凡形，飞昇冲举在天者，真人也。气数尽，及三灾解脱者，尸坏；超脱凡形者，尸不坏。当神离形之时，视其形如生人，此尸解也。足不青，皮不聚者，尸解也。目光不毁，无异生人者，尸解也。白日尸解者，是升仙去，非死亡尸解之例也。若不解尸与神炁二，终能久行于地，此地仙之名不虚也。可地行千百岁，真实不虚。故《太上洞玄灵宝智慧本愿大成上品经》云：“立三百善功，可得长存地仙，居一功不全，则灾从一始，而都失前功矣。”常有其念在于心膂者则是也。善功者，是大修行内炼精炁神之善功。三百者，大概言之。有少壮人，身寿相当，只消三百功，便得地仙者。有年大，精炁神衰弱者，用功宜多于三百，或有宜倍于三百者。我伍子谓：凡</p>\n<p>合当用之功俱要全。不全者：或有魔诱、妄念尘缘而间断其功，则精炁渐散，而神炁前功都失；或有得功自足，止而不复进修，不进则必退，亦致都失前功；及省悟前非而复修，更从新用功，方可再得。念在心膂者，心在前，膂在背，即呼吸升降，“一孔玄关窍，乾坤共合成”者。当从一始，自起之时，念在于此中往来，而得地仙。及其功全，而地仙可得；亦常念念在于此，则长存不死，为陆地之仙，而不失。从斯以进，自一个月而至十个月，行大周天之火，以不息入无息，炼炁化神，炁住矣，神全矣，是名神仙。白玉蟾云：所谓归性根，太始及未生己之从前是也。斯实系地仙向上进修，用十月大周天之火候，炁入定化神，定以趋神仙者也。我以不息而至息自无息，故二炁俱住而呼吸无；神全大觉而无昏睡；此所以无呼吸之神，方可作无形骸之神出定，为神通无碍之神仙。以无呼吸之气，而入水不溺，又名曰水仙。有呼吸，水随气入而溺则尸解，非形神俱妙者。无呼吸者，谓之形妙；神全者，谓之神妙；唯形神俱妙者，方得入水不溺水，故不能溺神。但神仙者，亦不离于神者也；神而知有神，离炁守定一个神，故曰：不离乎神。若神不有其神，则神还虚合道。由中田以证果，后天呼吸之气已无，先天真阳之炁尽化，久守之于中，而不超于上田；即昔之蓝养素胎神十月已成，而不能出者之类也。不能出者，因不知出神之景，景到而不出。亦不知出神之仙机，故不令神出。亦所谓“寿同天地一愚夫”之类也。愚夫者，带重浊之形为碍，不能神通变化，如愚夫。但不死可寿同天地也。于此之火足神全，神炁大定，则出阳神；顾与弢问曰：神炁大定，出阳神者，愿闻所以然？答曰：神初不能定，依二炁以为定。炁定，则神随之得定。炁定则无，神离所依而独立，乃能离宅舍之身，而出定显阳神。故出神必由大定后；若不到大定，神正要依靠，不能离炁，又焉能离身形？故禅宗人，心依息，以息喻拄杖子，乃依之以行者。出神矣，则为神通变化；出神后，则神虚空无碍，故能变化。未出神则身形为碍，不能变化。炼其能变化之神，而还虚合道，则曰天仙。天仙者，体同天之清虚，德同天之空洞无极。重阳仙翁云：“意同天心为天仙。”不局命于西天、东天，西天者，天之西一</p>\n<p>方。东天者，天之东一方。褊小功行所证，局促之意。超越于三十二天，三界上之上，仙家言二十八天为三界。更上有四种民天，共三十二天也。言欲界六天，与佛说同。言色界十八天，与佛说同。而佛多五不还天，在色顶也。无色界四天，与佛说四空天同。佛于色界内顶多五不还天；仙于无色界外，多四种民天。仙名三十二，佛名三十三而止。此二教经文之大同小异也。与天地齐其悠久，不可以年劫计。此世尊所以名为第七仙者，即此也。世尊在七佛中，成佛于贤劫之初，不曰七佛，而曰七仙。见《华严经》。则仙亦同佛，佛亦同仙。超过阴阳天地。虽天地有形坏，这个性灵不坏，则仙佛之至矣！极矣！无以复加者也。此人仙、地仙、神仙、天仙为一阳神之所证也。他如不知真精阳炁，亦不知真周天伏炼者，徒然只借喻○者之为用，凡遇⊙当实读作圈点二字，凡遇单○即读圈字。凡遇单·即读点字。《合宗语录》同此。古仙古佛禅宗皆同此。所修者，一性之阴而已。所谓未炼还丹，而内观照者是也。性虽寂静而不动于妄，当下真空不起念作轮迴种子，不随境入轮迴窠臼，出得阴神。如此，禀形炁尽，只此一死，不来人世再受生死，久为灵鬼。一向沉空滞寂去，便为真寂，禅宗之所极证，谓之得生净土，净土者，喻心静而无染尘妄。不受后有者。后有者，后劫之有身。不轮于六道，不隶于死生之籍，故曰鬼仙。重阳仙翁亦云“不持戒，不杀生，不思善，为鬼仙。”之类。又，昔有灵鬼，自歌曰：“做鬼经今四十秋，无烦无恼也无愁。阎王劝我为人去，只恐为人不到头。”即此类也。又，六祖惠能曰“不思善，不思恶”亦似此。《楞严经》之所谓十种仙之行外道，四禅得五神通者，皆不出此类也。在地者，犹隶于五岳。能飞行近霄者，即同于生天。在天者，亦曰天人。天人者，犹称天上之民人。无道行有生死，及死后生灵之性在天，由于行十善。十善全者、多者，生于欲界上半，第四五六天。十善不全者，生于欲界下半，第一二三天也。虽隶于天曹，不能合天道，以行天道也。天道者，梵行清静。道行精真，能炼精化炁，化神还虚而合道者是也。不行天道，则无六道十通，止为凡民凡人而已。</p>\n<p>即《楞严经》云：彼天上，各各天人，是凡夫业果。不知菩提涅槃正法，但修十善，只得凡夫善业之果，非道行也。天王即是菩提。天王者，是一天之帝王，管辖天人及下世人者。有功德道行，得禅定之神者，由初在下世得禅定，以证天王。在天王又能常禅定，故能满天寿而不堕。如世尊，为兜率天王，称为护明菩萨是也。唯菩萨有大智慧，故得受天王之位。若凡夫之愚，故不证天王也。斯言之，谓也有时下生于人世，言天人无道行，有淫欲，倘淫念一起，即降生于人道。亦不能终天地于溃者。终天地者，有欲界六等之寿，有色界天十八等之寿，无色界有四等之寿。三界二十八等，多少寿数不同。唯天王有禅定，能以满其天寿。满寿则功德渐高，渐升迁至上天，终天地同寿。天地劫坏，则随坏。故曰终天地。即教中之言，生天生人者之天人，由入门之不正真，无阳炁治漏尽，道不足以终天地者也。是其分量之所自限，分量者，是其所修功行，只能于如此。非造化之所限。此即释迦所师之阿私陀佛仙，及所参所见之跋伽仙、阿罗迦仙、迦兰仙者，此三人，皆世尊初出王宫时，所参修生天人果者。世尊知其天福尽，而还可堕落六趣，故弃之而别参。皆参四禅五神通之流，习外道定者。外道种类有三：一者，是行邪淫叛戒律，偏行世法中不善之事，自以为是，而不依正法，不顾生为魔民，死堕无间也。二者，是专行邪法，依傍正门为名，即所谓阴为不善，阳欲掩之之小人，窃取衣食，诳骗财物为志而已也。三者，是正法中人，心愿行正，但着有为初基粗迹，便志得意满，夸能说会，不了心悟性，寂灭真空，亦是依傍上乘为名也。今此三人，只修小因小果，为劫运中之受用而已耳。世尊已自天寿尽而复下生，欲学超劫运者，故亦弃此。命终生天，不足为仙者也。命有终而死而生，则非仙也。又有一等在世之人，不争名利，自知无本，故不争利；无能，故不争名。不事繁华，自知无财，不可为悦。虽有小财，不知施为。不群人世，昧于伦理者不能群；懒于伦理者不能群；逆于伦理者不能群。狂愚者不能同世人；柔懦者不能任世事。隐处深山穷谷而亦自谓之仙，以所居为名，山也、人也，夫人山二字以为仙，乃五等之外仙乎？犹有不能枚举者，而皆</p>\n<p>自谓之仙，即如室罗城之迦昆罗仙，斫迦罗仙，为大幻师，幻师者，乃设虚幻之术，而非仙佛之真修实证。求太阴精和幻药者。西方人虽谓之仙，焉可顺从而以仙混称之，妄谓最上仙亦止乎如此耳！后之学者，幸毋见此不仙而名仙者，遂轻视天仙等焉！得个真知实辩，则亦可为羡慕而进者。否则多歧并列，将以何者为我当行之道乎？辨得仙真，则修行趋向始得真。</p>\n<p>十一问曰:今语仙佛所修,果同一法。未知古来曾如是说否?后世抑有知者否?</p>\n<p>答曰：有。唯仙佛能知仙佛。若非仙佛，则不知不说也。予略举世尊之所自言者，令汝征之。《法华经》云：昔者仙人授佛妙法，如来因之遂致成佛。此佛自言得度于仙者也。又《经》云：“佛闻帝释说法，而悟最上乘妙道。”此佛自言得悟于帝释。帝释者，释教人指为三十三天之天帝，又指谓治世间分判善恶、救拔众生之玉帝也。悟于闻法处，即师宝法宝也。佛自不叛所闻处，存其所闻所名。而末学强分为二教不同，叛仙叛佛矣。《华严经》又云：“如来大仙道，微妙难可知。”此《华严经》三十四卷之颂也。此佛典自称为仙道者也。《华严经》又云：如来十名，或名释迦牟尼；按《大般若经》云：阴根如小童子者，名释迦。注云：即东土名黄门宦官之意。世尊三十二相之阴藏如马蝗，故名释迦亦宜。或名第七仙；世尊于三大劫修行至贤劫，成佛在第七，故自称第七仙。后人赞称第七佛。或名毗卢遮那。又云：或称持众仙，或名大仙师。《梵网戒经》赞云：“般若兼禅，果证大觉仙。”此皆如来佛自名为仙者也！三经之文，人人之所传读讲究，人人之所见知闻知。世尊既说佛是仙，而亦得悟于仙，予安敢谤佛非仙耶？</p>\n<p>又问:佛既自
