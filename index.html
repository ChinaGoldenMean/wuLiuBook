”盖己者，即本来之虚灵。动则为意，静则为性，妙用则为神也。四者未发之前，浑然如太虚，有何名目？因机萌而言，故有異性之喻。金丹神虽有归一，则有双发之旨。凡炼丹时，先则无为，寂然不动，浑然空空荡荡，不见有无之念。待其机之动时，则发意採取；运周天时，又立念主斗杓斡旋二炁橐龠之消息；而神又随真炁循环。先若不炼己还虚，还虚者，是纯乎以静，静乎以化，杳无朕兆，还乎鸿蒙，复乎无极，万象空空。此即本来之性体是也。则临时熟境难忘，时，即药产之时。先若己不纯，採药炼药之际，则有分花之念；神不能主张，炁则散也。神驰炁散，神不宰炁，安有不散也。安能夺得造化之机，夺者，取也。造化者，阳生也。还我神室，此神室即下丹田也。凡神室却有三釜。炼精之造化，即以下丹田为主。故神炁起由此，归藏亦由此，是之谓神室。即祖炁所居之室也。而为金丹发生之本耶！由前活子时，用之得法，</p>\n<p>然后方有炁发生，而为炼丹之本。故古人炼己者，寂淡直捷，纯一不二。不存有无之念，故可以谓纯一。以静而浑，正是鸿蒙无极之时。以虚而灵，十二时中不昧曰灵。常飘飘乎，不著一点形迹。随处随缘而安止；四相俱忘，安然独立自在。不究其所往，是过去心则无了。不求其未至，未来心不萌。不喜其现在。现在心不存。惺惺寂寂，照而寂。寂寂惺惺；寂而照。形体者，不拘不滞。不被身之所劳。虚灵者，不有不无。活活泼泼。不生他疑，明心见性。了彻一心，通天彻地，杲日当空。直入于无为之化境；威音之前，无极之先。此乃智者上根之炼法也。此以上皆言顿法，还虚之炼法者也。若夫中下之流，则未然。未修炼己之人曰中下，非世俗曰中下，盖修道本无中下。当未炼之先，己未炼之先也。每被识神所权，凡思虑有心，总是识神用事也。不觉任造化之机而顺化。世人每遇身中炁机之生时，不知修炼，而行世法，则生人矣。亦有不交媾者，此炁而亦耗散。何故？炁既发动，不得其法，留归本处，焉有不顺化者耶？欲炼精者，不得其精住；炼精是坎离交媾以前之法，名曰：调药。若不知调法，精则不能住矣。欲炼炁者，不得其炁来；炼炁者，是小周天之法。不得炁来，是炼精不住，故此无炁之发生也。古云“不合虚无不得仙”，盖谓此也。能到虚无，方可炼丹。如不到虚无，丹则不成也。故用渐法而炼矣。由浅而深。且谓炼者，断欲离爱、不起邪见、逢大魔而不乱者，曰炼；欲爱是妻子、富贵、师弟等事，断而不留，为炼己有力。邪见者，是眼偶见奇异，或见光，或见光中现神物，或平日所未见者，今始见之，为外魔。于此信之，即为魔之所诱，曰天魔，曰邪魔，曰妖魔。眼不见，或心见者，为阴魔。见而喜悦为好，贪见则著魔矣。心不见，或耳见；耳见者，耳闻魔言，或言福，或言祸，喜闻则著魔矣。见而自不见，闻而自不闻，知而自不知，依于正念，魔与我不相干也。不乱者，水火刀兵、劫杀打骂，凡诸魔来，皆不可妄生惧乱之心也。未遇，苦行勤求、励志久而不退者，曰炼；未得诀者，当立真志而求师。天地之间，富贵以及妻子是有定分。若大道则不然，可以苦志而得；古云：“有志者事竟成”。古来多少不该成道者，而竟成之，非生来有</p>\n<p>分也。虚心利人、不执文字、恭迎而哀恳者，曰炼；世之学道不得其真传者，皆因己之假学问，障于他人之真学问，故不得其道矣。若能虚心恳切，执弟子礼，行弟子之事，岂有不得者乎？眼虽见色，而内不受纳者，曰炼；耳虽闻声，而内不受音者，曰炼；神虽感交，而内不起思者，曰炼；此三者真炼法。见物内醒，而不迷者，曰炼。即六祖所谓“见物心速起”。日用平常如如，而先炼己纯熟；己纯后可炼丹。重阳云：湛然不动，昏昏默默，无丝毫念想，此由炼己纯熟而得。康节云：“思虑未起，鬼神莫知，不由乎我，更由乎谁？”则调药而得其所调，即前炼精之法。辨真时即得其真时，即药产之时，用採药之法。运周天，始终如法升降。周天是往复之机，升降是进退之工，由己纯则无昏沉散乱矣。己有不得其先炼者，则施法之际，被旧习所弄，错乱节序，故不得终其候也。错乱节序者，因己未熟，或知採封，不知运行；或知升，不知降；或知升降，不知沐浴；或知先天炁，不知后天气；或炁行，神不行；或知周天，不知归根沐浴。世之好金丹者云“有不炼己而能成道者”，谬矣。西王母云：“声色不止神不清，思虑不止心不宁。心不宁兮神不灵，神不灵兮道不成。”炼己者在于勤，若不勤，则道遥也。己在时刻勤炼，如若放荡，丹则有走失之患矣。昔日吕祖被正阳翁十试，正念而不疑；吕祖任他魔来不生疑心，独立正念；后六十四岁随正阳翁修道，卒能成道。又，邱祖受百难于重阳，苦志而不懈；邱祖初至重阳会下，重阳谓邱饮稀粥。邱自知福力小，苦行七年，累遭魔难。当过二番死魔，二次飞石打折三根肋骨又险死，扑折三番臂膊。恁般魔难，苦志而不动心，自能决烈精修。费长房静坐，偶视大石坠顶，不惊不动；此得炼己定心之显案也！昔世尊坐于菩提树下，魔王波旬领百万魔众以兵戈恐佛，而不动；以魔女淫事诱佛，而不动坐。坐至坚刚牢固，自言我终不起离于此坐。并书以告同志。</p>"}, {"id": "jx_4", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "小周天药物直论 第四", "content": "<h5>小周天药物直论 第四</h5>\n<p>华阳曰:仙道元精喻药物,药物喻金丹,金丹喻大道,何喻之多</p>\n<p>也？神从炁化，炁从精生，欲望成其道者，先当保其精。精满然后炁生，以此生炁，是名药物。药物炼之不动，便名金丹。服此金丹，出神千百亿化身，天地坏时，这个不坏，故喻名大道矣。《道藏》经曰：“精者妙物，真人长生根。”《黄庭经》云：“留胎止精，可以长生。”圣圣真真，莫不由此元精，以阐明药物也。正阳真人云：“除了铅汞两味药，都是哄弄愚夫。”夫药物既根于元精，而又曰元炁者，何也？静为元炁，动为元精。且此炁从禀受隐藏于炁穴，炁穴即丹田也。及其年壮炁动，人至十五六，丹田炁自动。却有向外拱关变化之机者；炁动自有暖融之信至于阳关，不知修炼因此之融信，则神转变而为情，而亦至于阳关，此炁则化淫精而出。即取此变化之机，回光返照，凝神入炁穴，则炁亦随神还矣；古云：“回光返照，要知去处。”七悟禅师云：“凝神收入于此窍之中，则炁随神往，自然归于此窍矣。”故谓之勒阳关，调外药。及至调到药产神知，药产有二景：时至神知为内景；药炁外驰，外别有景。斯谓之小药，又谓之真种子。行大周天，初採药时，谓之“大药”。此处行小周天，初採药时，谓之“小药”，或谓之“真种子”。古人未言“小药”，及曹伍二真人，始发“小药”之名。后人即可以用药不误药产之真时，因得此名，则易明矣。因其有顺逆之变化者，故曰元精、元炁也。顺为元精，逆为元炁。若不曰元精，则人不知调外药，元精从外摄归炉内，谓之“调外药”。以混探混炼于周天。无药先行火，水火煮空铛。不知，既无其药，且落于空亡，将以何者为小药哉？不知前此调药之工，则无药产之景到。然古人但言调药，而不言调法，法即绵绵不断之旨。七悟云：“一阳初动，凝神入炁穴，息息归根。”不言调所，所即炁之融动处。又不言调时，时即外物动之时也。一调药之虚名，在于耳目之外。未得师者，茫然无所下手；故我今直论之曰：既知调药矣，则元精不外耗。以前尽言调药化精之法，以下皆说小周天之事。而药炁自有来机焉。古云：“神明自来。”此古圣不肯轻言直论，予明而显之曰：未有知机而不採者；未有未调药而先採者；如此或缺焉，是不得药之真故也。未得真传，则不能得此药。且欲得药之真者，惟赖神之静</p>\n<p>虚，炁则生矣。混然子云：“时至炁化，机动籁鸣，火从脐下而发。”冲虚谓之“动而觉”，动者，炁也。觉者，神也。以此不惧不惊，或者乍见此景，而不禁惊讶，则心动而神散，欲望成丹，不亦远矣乎？待盛而后起。阳未融盛，不可急于採取。冲虚谓之“复觉”。此即在后《风火经》见得明白。此时即药炁之辨机，不令其顺而逆之，顺是出炉，逆是归炉。斯谓之“採药”。守阳真人谓之归炉。鼎中既有药炁，此鼎即丹田也。则有周天之火候。周天三百六十五度有零，薰炼金丹亦似此理。起刻漏之息火以烹炼之，刻漏，即是呼吸。炼金丹法，全在呼吸之气以定爻数。古人谓之升降也。升谓之进，降谓之退。然採得此药来，由周天之法如意。斯固谓之“金丹”。丹是炁得火之炼法如意，谓之丹矣。即可以行大周天之法，是採大药之秘机。则小周天之造化，从此毕矣。余愿同志者，休误入于邪师，以淫精之邪药认为真药，则非药也。</p>"}, {"id": "jx_5", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "小周天鼎器直论 第五", "content": "<h5>小周天鼎器直论 第五</h5>\n<p>华阳曰：仙道以神炁二者薰蒸封固，喻之曰炉鼎；如炼外丹者，以铅汞烧炼之炉鼎也。悟之则在一身，迷之则堕入别途，故世因炉鼎之喻而惑者众矣。且有一等妄人，见炉鼎之喻，因诳人曰：“以女人为鼎，以淫媾为药。取男淫精、女淫水败血为服食，补身接命。”殊不知诳人自诳，反堕弃其万劫不可得之人身。此言採战女鼎闺丹之邪术，尽是用女人为炉鼎。信者必丧性命，堕于异类，万劫而不可复者矣！又有愚夫，泥其迹象，专喜烧铅炼汞。世莫不由鼎器者误也。福薄愚夫，不知身中本有真铅真汞，便以凡铅凡汞烧炼为服食。误信方士，反失其人身，皆由炉鼎误也！夫欲明炉鼎者，在夫神炁之机变。神炁升为鼎，起止为炉。古云：“鼎鼎原无鼎。”当其始也，元精初生。精生外驰，以神入精中，则呼吸之气，随神之号令，摄回中宫，混合神炁；中宫即丹田。混合即绵绵息息归根之意。神则为火，而炁为炉。以神炁言者，神在</p>\n<p>炁中，炁则为炉，神则为火也。欲令此炁而藏伏者，惟神之禁止；炁则为药，而神为炉。以炁神言者，炁在神内，神禁止其炁；神在炁外，神则为炉，而炁则为药也。即古人所谓“炁穴为炉”是也。以形言者，指丹田为炉。神炁归藏于此，此即调药之炉也。乃其採药运周天者，当从炁穴坤炉而起火，升乾首以为鼎，降坤腹以为炉。乾在上为鼎，坤在下为炉。即古人所谓“乾坤为鼎器”者是也。以形言者，首腹为炉鼎，即周天之炉鼎也。见神炁之起伏，起是升，伏是降。而鼎器在是矣。有神炁即有炉鼎，无神炁即无炉鼎。然古人将神炁二者借喻鼎器，或以丹田为炉，而以炁穴为鼎者；丹田炁穴一也。或以坤为炉，而以乾为鼎也。坤即腹，乾即首。一鼎器之名目，纷纷引喻，故后人无以认真。余若不推明直论，将何处炼精、即调药也。炼药、即周天也。为结金丹也？此古圣皆不轻露，丹田为调药之炉鼎，古来不肯明露。今予阐明，正合吕祖所谓真炉鼎，真囊龠，知之真者，而后用之真。用之真者，而后证果得其真矣。冲虚子不云乎：“鼎鼎原无鼎。”若不明火药次第之妙用，执著身体摸索而为鼎器者，则妄也；非仙道金丹神炁自然之鼎器也！</p>"}, {"id": "jx_6", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "风火经 第六", "content": "<h5>风火经 第六 尽言小周天。</h5>\n<p>华阳集说《风火经》，风者，乃炼丹之妙法，即升降之消息；古人喻曰巽风，或喻以橐龠，是即往来之呼吸也。火者，炼丹之主，化精化炁之具。风火有同用之机，大丹有修炼之法。古圣不肯全露，或有用言之隐，而人不能彻悟，视之如故事。然言之详者，又违天诫。风火同用之机，乃上天之秘诀，金丹至要之法。凡人德薄，未遇真传，岂知有同用之机哉！前圣高真，科禁秘之，不肯并论轻泄。愚亦不敢臆说，故集诸圣之隐语奥言，而为此说。每句之下逐一解明，以昭后学。见之者，详究此解，印证本文，即知风火同用，次第不离之机也矣！曰：仙佛成道是本性元神。不得元精漏尽，不能了道，还至虚无，而超劫运。本性元神其名虽二，源流则一；佛谓之性，仙</p>\n<p>谓之神。元精漏尽，乃修命之别名，即先天一炁是也。仙修谓之炼精化炁，又谓之炼形；佛修谓之漏尽成，又谓之慧命；不得此道，则不能超劫运。纵然修得灰灰相，无非五通之灵鬼耳！焉能契如来之妙道乎？故如来《大佛方等大集经》云：“修习五通，既修习已，垂得漏尽，而不取证，何以故？愍众生，故舍漏尽通，乃至行于凡夫地中。”又《楞严经》世尊谓阿难云第一漏尽难成，即此也。元精漏尽，不得风火，则不能变化而成道，元精漏尽，虽有生机，不得风火，则不化为炁。混然子云：“人呼吸之气为风，如炉鞲之抽动，风生于管，炉火自炎。久久心息相依，丹田如常温暖。”今之禅僧，不知风火，漏尽无成，常自下流。余有俗堂弟，字道宽，法名源明，久住金山。曰：“禅教原不问此事，似过涵灌，只悟自性，不必究他。”余曰：“既有走漏，则与凡夫淫媾似也。”《首楞严经》云：淫身、淫心、淫根不断，如蒸砂石，欲其成饭，经百千劫，只名熟砂，必落魔道，轮转三途，终不能出。禅教何得不问也？但如来风火之法，佛佛相印。若能自用，则三种淫事一炼自断。世尊云“火化以后，收取舍利”，又云“微风吹动”，则其中自有深旨。非亲传，焉得知之？故曰：修炼全凭风火耳！广成子云：“息者，风也。”白玉蟾云：“火者，神也。”往古圣真，禁而不露。上天所禁秘之，不传于无德，实传于有德。超乎劫运，出乎大宝，岂传于无德者哉！中古圣真，略言其始。而人不究其始，往往搜寻其中，徒劳精力。始者，微阳初动。古圣隐而不露，乃金丹造化之根。人若能明乎其始，何事不成？故虽近代，亦有得道高真，惜学者不知下手，重言其始。人犹不究其始，每每妄自採取而不知搜寻；其实，虽药有不採而至採之景到矣；故学者，不可徒劳无成焉！不知中宫周天之说，或显于周天炼法，而隐于採取中宫；中宫即炼丹之所，天心居焉。人若晓中宫之消息，则丹自成矣。盖中者，非中外之中，即元关消息之中也。此中包罗乾坤，运行日月，真种由此而生，升降由此而运，炉鼎由此而立，橐龠由此而转，药物由此而化，坎离由此而合，斗杓由此而建。是也。世人或知中宫，不知周天，则炁亦暂聚而暂散矣，安得成丹乎？冲虚云：“药已归炉，未即行火，则真炁断而不续，亦不成大药。”或显于採取中宫，而隐于周天炼法；周天即升降也。时至药产，阳炁从地升于天。天者，在人为首，位居上。《阴符注》</p>\n<p>云：“上涌潮元，通灵阳宫。复降下，通于巽坤。”坤者，在人为腹，位居下。混然子云：“从子至巳，流戊土，从督脉进阳火；自午至亥，以己土，从任脉退阴符。”世人或知周天，不知中宫，妄自行火，则与水火之煮空铛何以异乎？冲虚子云“药未归炉，而先行火，药竟外耗，而非为我有”者，其斯之谓矣！或显于火，而秘于风；炼丹全凭风以扇火。风者，息也，曰巽风、曰母气、曰橐龠，皆我之呼吸也。或显于风，而秘于火；炼丹全凭火以炼精。火者，神也，曰汞、曰日、曰乌、曰龙，皆我之真意也。或有言之简，而论之详者，皆宜一一体玩，不可浅视也。使徒执其偏见，取宗于妄人之口，何其诬耶！简者，深言神炁之机。详者，细言神炁同用之理。初学未得真传，非由忽其简而即略其详，是终不得夫丹道之秘矣！况又宗于邪说，致生疑惑，其不至于暗昧者少矣！</p>\n<h6>余曰：</h6>\n<p>觅法寻师问正传，</p>\n<p>若无真诀难成仙。凡求师者，当察其真伪。若言不用风火，即是假道。虽欲成仙，何可得乎？</p>\n<p>谷精火到风吹化，精因火化，火因风灼。世人被此精损志夭命，因无制伏之法。智者，借此精养身助炁，是有风火之功耳！</p>\n<p>髓窍融通气鼓煎。窍者，即肾府也。肾属水，水无火，焉能融通？所以人之精华，多因肾而耗散。智者得风火之功，自能融通矣。鼓者，即所谓巽风也。</p>\n<p>情强性烈意和牵。物即外阳。外因内动，故此举矣。始举始伏，则易伏矣。倘未觉其伏，则阳壮性烈，必须回光返照，绵绵若存，使炁与意和合，虽一时修炼之功，而性情不觉其浑合矣！</p>\n<h5>青阳洞里须调炼，</h5>\n<p>炉内铅飞喜自然。洞即炁穴。凡调药时，务要绵绵，使精化为炁，则内之真铅，自然潮于上元矣。</p>\n<p>抑闻之《玉芝书》曰：“元黄若也无交媾，争得阳从坎下飞？”元者，天也。黄者，地也。即神炁也。神炁不交，安有药之可採？冲虚子曰：“有机先一着，而后生药以行火。”先一着者，乃微阳初动也。药生而行火，所行火者，即行周天之火。朱元育曰：“晦朔之交，即活子时。”活子时者，乃阳动之时也。觅元子曰：“外肾欲举之时，即是身中活子时。”外肾举者，非有念而举，乃自无而生。生而或速或缓，皆由活动之机。然有念而举者，乃是邪法，炼之即成幻丹。浑然问曰：假若睡浓之时，不觉而自举，及偶然觉之，此时下手，亦成幻丹否？华阳云：正睡浓时，自己身心俱已不觉，念从何有乎？尝闻纯阳祖师云：“动则施功静则眠。”又，夏云峰云：“自然时节，梦里也教知。”以此句言之，可以印证矣。俞玉吾曰：“内炼之道，至简至易，惟欲降心火，入于丹田耳！”内炼之道，乃上乘之法，简易之事。但人被邪说所惑，不能信受。故真人破之曰：惟欲降心火，入于丹田也。又曰：“肾属水，心属火，火入水中，则水火交媾。”古人谓心肾非坎离，殊不知心肾乃坎离之体，神炁乃坎离之用。且肾非脊肾之肾，乃内肾也。古云内肾者，即脐下是也。虽在脐下，犹未得其所以然，要必得其神炁相投者。盖其穴正在脐后肾前稍下，前七后三，中间空悬一穴。此正是调药炼精之所，而学者不可不察矣。《六祖坛经》曰：“有情来下种。”有情者，非欲念之情，乃妙道中元机萌动之情。故龙牙禅师云：“人情浓厚道情微，道用人情世岂知？空有人情无道用，人情能得几多时？”元育曰：“要觅先天真种子，须从混沌立根基。”古人言真种不一，或有言神是真种子，或有言炁是真种子；而不言真种子其父母所由生之理；故人被此颠倒之言所惑。《元学正宗》云：“始者，上下相交混而为一。”盖混沌者，乃天地合璧之象，即神炁会合之时。若觅先天真种子，先须明种子之父母。盖神炁比如天地，天地即种子之父母也。神入炁中，则是天入地中之象，即为混沌之时也。真种子原由神炁而生，神炁若不交，安得有真种子乎？则此中之根基，当明矣！正阳祖师曰：“南辰移入北辰位。”南者，离宫，心乃离也，神即藏其中。北者，坎也，炁即藏其中。移入位者，即以神入炁穴。杏林云：“以神归炁内，丹道自然成。”是也。纯阳祖师曰：“我悟长生理，太阳伏太阴。”长生乃我之元</p>\n<p>炁，悟之者则生，迷之者则死。欲学清静正道者，先明道之根源，道无非我身内之阴阳，非是外来物件！许旌阳云：“大丹若不以日月交光、乾坤合体，更假何物为之乎？”盖太阳乃喻心之神，太阴乃喻肾之炁。伏者，以神伏炁之法。能伏住者，即得长生，否则不能得矣。觅元子曰：“始则汞投铅窟。”程先生云：“铅得汞而相亲，无中入有。”铅汞非他物，即我神炁。故吕祖云：“不用铅，不用汞，还丹须得炉中种。”投者，以神投炁，则精炁不下泄，似水银与铅相制不动，然后炉中炁自生矣。吕祖云：“安炉致鼎尽周圆，须得汞去投铅。”若不用汞投铅，则铅炁无所生矣。俞玉吾云：“铅得汞以生形。”旌阳亦云：“铅因汞伏。”海蟾翁曰：“先贤明露丹台旨，几度灵乌宿桂柯。”灵乌喻心中之神，桂柯喻肾中之炁。《元学正宗》云：心乃神之宅，肾乃炁之府，岂无造化乎？古云：心以坎为体，以离为用，故心欲虚而澄。肾以离为体，以坎为用，故丹田欲实而温。离火上腾故损，离火下驻故益。几度者，凡阳生不拘时数，灵乌宿亦不拘时数，时来时宿。紫虚云：“夜半金乌入广寒。”旌阳祖师云：“与君说破我家风，太阳移在月明中。”望江南云：“日精若与月华合，自有真铅出世来。”盖太阳喻神，月明喻炁。移在者，神炁相会也。古云：“要知大道希夷理，太阳移在月明中。”李真人曰：“金丹大要不难知，妙在一阳下手时。”世人学道每被丹经之词文所惑，不知真诀简易之理。自己心内糊涂，反谓古人不明言；及见真师强自争辨。殊不知炼丹者阳生之时，即起手之时。能于此时下手，又何疑惑乎？真阳云：“先天之炁藏炁穴，虽有动时，犹是无形，依附有形而为用，始皇而即始觉。”守阳云：“凝神入此炁穴，而神返身中，炁自回矣。”重阳祖师曰：“纯阴之下，须是用火锻炼，方得阳炁发生，神明自来。”阴即是先天坤地，变为后天之坎。而中年之人药少，故不能採取。真人言：须用火锻炼，然后有药可採。冲虚云：“有机先一着，而后生药以行火。”俞玉吾亦云：“天入地中，以此而产药。”是也。又闻之龙眉子曰：“风轮激动产真铅，都因静极还生动。”此以下皆言风之妙用。上文一节专言火之用法，而呼吸之气，未表其所用之理；故真人恐人只知用火而不知用风，其精则不化矣。栖云先生云：“火不得风，不灼。”抱一子云：“知摇空得风，则鼓吾之橐龠可以生风；知嘘物得水，则胎吾</p>\n<p>之炁可以化精。”产铅者，即药炁所生之时也。还生动者，即药产之时，即採药之候也。《入药镜》曰：“起巽风，运坤火。”巽风者，呼吸之喻也。火者，乃元炁也。元炁不得呼吸，则不能成药，是阳不得阴，则必不聚之故也。必须存心中之阴神，驭肾中刚阳之火，绵绵息息归根，则坤火自运矣。然又恐用火者失于太过与不及，须当文薰武炼。故萧紫虚云：“炽则坤火略埋藏，冷则巽风为吹嘘。”此言可玩矣！《黄庭经》曰：“呼吸元炁以求仙。”呼吸者，后天之气也；元炁者，先天之炁也。先后原有兼凡之法，若不兼用，元炁顺流而出，不能成丹矣。必假呼吸之气，留归以炼之。如冲虚子所谓“以后天呼吸气，留恋神炁”是也。李清庵曰：“得遇真传，便知下手，成功不难。鼓动巽风，扇开炉焰。”此言果得真传，便知用巽风。风者，后天气也。冲虚云：元炁固要逆修，而呼吸之气亦要逆转。盖人呼吸之气，出入本在丹田，何曾有隔碍？但人只知出，而不知入耳！学者凝神之时，炁穴之神，能觉进吸者，则气自鼓自扇、自吹自嘘、自逆转矣。不用而自用之，何劳之有乎？混然子云：神呼气炁归窍内，吹吾身中无孔笛。常觉在此，息不用归根而自归根矣。庄子云“其息深深”，又云“真人之息以踵”，即此也。李道纯曰：“炼精其先，以气摄精。”精生之时，原是下流；若欲归源，必须用气摄之；则无走泄之患矣。然又当知精生之所。冲虚云“用后天之呼吸，寻真人呼吸之处”，即此之谓也夫。无名子曰：“精调炁候。”调者是精生时，以用调法，不然则易走泄矣。古人云：“精炁之为物也，运行则常，退守则灾。四时不运，万物何以生？日月不映，万物何以明？流水不腐，户枢不蠹。”人不测道之根本，乃云“固精为长生”，此言为大谬也！若闭精可以常存，则布囊可以贮水。盖炁候者，是候炁之生时，即所为採取之谓也。冲虚子曰：“调定其机。”机者是精生动机，若不调则炁必泄，而药物不生矣。又曰：“药若不先调，则老嫩无分别。”老嫩是採取之景。若不先调者，则何时而能採取乎？能知调者，自有老嫩之景到。李虚庵曰：“忙里偷闲调外药。”药即吾身之元炁。炁虽藏炁穴，生则化元精向外下流。若任外流，将何物而为药乎？故调此炁，返还于炁穴，久则天机自活动矣。钟离云“勒阳关”，即此也。冲虚子曰：“调到真觉，则得真炁。”觉者，乃是时至神知。故其本</p>\n<p>灵之心体不能昧，谓之觉。若能如法调药，则自有造化之机发见于外，可不劳而自知矣。《楞严经》曰：“愿立道场，先取雪山大力白牛。”道场者，修佛道之起手也。欲成佛道者，先当取雪山大力白牛。若无此牛，任汝修八万劫，终不能出《楞严》之五阴。盖雪山者，喻五阴俱空。既已空矣，则一阳生于五阴之下，元门谓之阳生，释家谓之情来，又谓之真如，又谓之那偏事，皆是喻事之生也。太初古佛云：“一阳发现，只是明心。”千百譬喻，只教人晓此一事耳！大力者，喻法象，释家谓之明心，又谓之有物，皆喻牛之征也。光明古佛云：“日天开朗，是为见性。”千万种譬喻，无非教人明此牛耳！若谓实有此牛者，即非我如来、达摩、六祖之嫡传；则是外道，非释家之子也。岂不谬哉！《涅槃经》曰：“雪山有大力白牛，食肥腻草，粪皆醍醐。”雪山喻炁之生处。白牛即是喻炁。醍醐喻炁之升降也。故六祖云：“吾有一物，上柱天，下柱地。”若独修心中之识性，不兼修性海之真性；饶你八万劫，终不能成六通，契如来之真性。《心经解》云：“谁知更有过于此者？宽则包藏法界，窄则不立纤毫，显则八荒九夷无所不至，隐则纤芥微尘无所不藏。”又云：“乃人之本源。”栖云先生曰：“人吃五谷，化为阴精。不曾锻炼，此物在里面作怪。只用丹田自然呼吸之气，吹动其中真火，水在上，火在下，水得火，自然化而为炁。其炁上腾薰蒸，传透一身之关窍，流通百脉。烧得里头，神嚎鬼哭，将阴精炼尽，阴魔消散矣。”又，觅元子曰：“阴精者，五谷饮食之精。苟非巽风坤火，猛烹极炼，此精必在身中思想淫欲，搅乱君心。务要凝神调息，使橐龠鼓风，而风吹火烹，炼阴精化而为炁。其炁混入一身之炁，此炁再合先天之炁，然后先天之炁，再从窍内发出而为药。”此二真人之明言不必赘解。朱元育曰：“晦朔中间，日月并会北方虚危之地。天入地中，月包日内。斯时日月停轮，复返混沌，自相交媾。久之渐渐凝聚，震之一阳，乃出而受符矣。”晦乃月尽无光，以比人身中阴静之时。朔乃次月初一，比人身中阳动之时。日月并会者，即神炁同宫之法。北方虚危者，炁穴也。天入地中者，比神入炁之义。月包日内，即是神摄炁也。一阳出者，乃药产之时，即是採取之候。受符者，是起周天之火符，符又是运息数之别名</p>\n<p>耳！此上数者，《金仙证论》之妙诀，风火化精之秘机，具在斯欤！而其调药之法，亦不外是矣！此总结上文风火同用之旨。调药之法，古圣所言不肯明露，故人难悟大道。余浅说解明，以晓后学；庶不入于旁门，而成正觉。世之好金丹者，果潜心此经，自修自证，即成大道，岂不乐哉！予故曰：自始还虚而待元精生，以神火而化，以息风而吹，以静而浑，以动而应，以虚而养，则调药之法得矣！以上言调药之法。以下言真种所生之真时，即药生也。</p>\n<p>不闻邵康节之言乎：“恍惚阴阳初变化，氤氲天地乍回旋。”恍惚者，浑然一团，外不见其身，内不见其心，恍恍惚惚。初变化者，即此恍惚之间，忽然不觉融融和和，如沐如浴。回旋者，真炁旋动，正是元关透露，而阴中阳生矣。尹真人曰：“俄顷痒生毫窍，肢体如绵，心觉恍惚。”此乃药产之法象，不可惊怪。一起惊疑之念，则神驰炁散矣。务须思虑顿息，以虚待之。不可妄起刻漏之武火，亦不可迷失真候，静听炁之动静，则元窍之阳自旺生矣。紫阳真人曰：“药物生元窍。”药物者，即真炁也，亦名真种子。元窍者，乃元妙之机关，即炁发之所；下通阳关，上通灵台，后通督脉，前通任脉。《六祖坛经》曰：“因地果还生。”地者，道曰丹田，释名净土，又名优陀那，又名苦海，巧喻异名，无非果生之处。果还生者，因以前能明有情来下种之机，到此方有果生。果即菩提子也，又曰舍利子。太初古佛曰：“分明动静应无相，不觉龙宫吼一声。”无相者，道曰虚无，释曰真空，此原无相，因静定而生。龙宫者，即上文因地是也。吼一声者，即上文果生也。故世尊谓见明星而悟道。能知此一声之机，则洞水可流，西江可吸，海水可灌顶矣。《元学正宗》曰：“弹指巽豁开。”弹指者，顿然而觉。然不可起太明觉，须恍惚而待之。若起明觉之念，则后天之气随念而起，包裹先天之炁。先天既被后天所裹，则其所发之炁不得融盛，亦不能採取矣。混然子曰：“时至炁化，机动籁鸣，火从脐下发。”时至者，乃药产之时也。籁鸣者，即元关之机动也。火者，炁也。脐下者，丹田也。古人云“时至神知”者，此也。学者苟不知此时之机，则当面错过矣。冲虚真人曰：“觉而不觉，</p>\n<p>复觉真元。”觉者，知也。不觉者，浑也。阳炁才萌，似有可知，故曰觉也。</p>\n<p>阳炁未旺，不宜急进火，故此言复觉真元。元者，即真炁也。又曰：“则用起火之候以採之。”此下言起火採药归炉也。起火者，后天呼吸之气。先天之炁生时，仍行熟路，故用起火之法，採炁归炉。然呼吸之火，本自有形，而用之必如无形；若着有形用之，则长邪火。果能有，有而若无、无中得有之妙，二炁用之如法，则药自归炉矣。又曰：“採药归炉。”药者，真炁也。炁之生时，则往外顺出，故用神气採之归炉。真炁既得神气之力，自然随神而归炉矣。又曰：“封固停息，以伏神炁。”此二句，言入中宫之沐浴。即是运周天子时之头；故子时有沐浴之候，即此也。封固者，温养之义。停息者，亦非闭息，是不行其鼓嘘之法；将神炁俱伏于炁穴。随后火逼金行，有行动之机者，则周天武火，自此而运起。浑然问曰：我闻《直论》言“药已归炉，未即行火，则真炁断而不续，亦不成大药。”此处既有沐浴，岂不断否？余曰：不行，非是闭塞呼吸之气，全然不行；乃是不行橐龠鼓嘘之机。盖呼吸之气，原有温柔之息在此吹嘘，何得断？行火之机虽暂伏，微妙之理，而真机无有随后不动之情。岂不闻之《合宗》乎？“採封是子时前”也。其即此矣。玉鼎真人曰：“入鼎若无刻漏，灵芽不生。”此下皆言子时起火炼药，行小周天之火。前论起火採药，是子时之前也。此乃周天子时当令之事，故达摩云“二候採牟尼”。然则药生即为药生之子时，而亦为活子时；行周天谓之行周天子时；不必认做一时。盖鼎者，炁穴也。真炁既归鼎内，必要刻漏之火以炼之。若无刻漏之火，则黄芽不生。上阳子曰：“外火虽动而行，内符闭息不应，枉费神功。”外火，即元炁也。内符，乃呼吸之气。元炁由呼吸而採归炉，亦由呼吸而炼之，则炉中之药方成变化。仙翁云：“火销金，而神炁不败。”若药已归炉，呼吸之气半途而回，不应先天之炁，则药已耗散；及再行周天之火，与前不相续，亦不能成丹也。守阳真人曰：“起火炼药。”起火，是起周天之火，行十二位也。非真有位，借火为位。又谓十二时，非真有时，借火为时。混然子曰：“火逼金行，当起火之初，受炁宜柔。”火者，呼吸之气也。金者，元炁也。盖金不能自升，必假火以逼之，使朝于乾宫。然炉中真炁，初起火之时，药物未旋，不可即行武火，须以柔温之火逼之。金有</p>\n<p>旋机，则火当长矣。若药未甚动，炁伏而缓，先起武火，则内之炁，亦不顺随大路，堕于蹊径。欲归正路，不亦难乎？故曰：宜柔也。又曰：“採时须以徘徊之意，引火逼金。”徘徊，是往来活动之意。引火者，即神呼气之法。逼者，催也。上文只言呼吸以用元炁，尚未显明用元神。人知用二炁，不知神为二炁之主帅。盖採药炼药全赖炁穴之神，权驭二炁徘徊，则金自行矣。前文云“神呼气炁归窍内，吹吾身中无孔笛”，是此也。又曰：“运动坤之火，沉潜于下。”坤者，炉也。火者，元炁也。运动坤火之时，往下而行，以通督脉而进。若别行异路，是不能上乾鼎，则药即耗散矣。浑然问曰：我闻玉蟾翁言：“神即火，炁即药，以火炼药而成丹”。今何又言炁是火？而前文又言化谷精以呼吸为火，三事俱言火，不明孰是？华阳云：此视学者得师不得师耳！真参实悟者，一见了然于心。若心下不实，焉得明乎？非是丹经惑尔，乃尔认错丹经。诵几句古言熟语，以为自己聪明，误也！凡云是起火、引火、火逼、行火、止火，皆为呼吸气之火也。凡云凝火、入火、降火、以火、移火、离火、心火，皆属神之火也。凡云运火、取火、提火、坎火、坤火、水中火、炉中火，皆先天炁之火也。凡呼吸之火能化饮食之谷精而助元精；凡神火能化元精而助元炁；凡元炁之火能化呼吸而助元神；元神之火又能化形而还虚助道。成始成终，皆承火之力，以登大罗之金仙。所谓火者，有逐节事条，岂可执一哉？混然子曰：“鼓吾之橐龠，採药之时，加武火之功，以性干运于内，以命施化于外。”古人或以内呼吸为橐龠，或以外呼吸为橐龠，内外兼说，则何是何非也？余特指其是，以示之：橐龠者，消息也。若无消息，安有橐龠？古云“一阖一闢谓之变”，知变，通无穷矣。橐龠者何？似牛车车水运行一般，同消息而不同路；若同路则不名橐龠矣。又如风箱一般，同箱而不同风；若同风则不能运转矣。以风箱之内，暗藏子箱；向炉之风，是子箱之风，非风箱之风；实从无中生出。水车之水与子箱之风，即喻先天之炁也。牛车与匠手抽动之风，即喻后天之气也。子箱者，元关也。消息者，即两搭界之滚轴也，即喻先后二炁之机。子箱之风，若无抽动之风，则亦不能自吹嘘矣。水车之车，若无牛车，则水车之水，不能自运矣。至车与箱，若无牛与匠，则水与风又无从而吹运之也。盖武火者，是药物曾已行动，故必橐龠之</p>\n<p>息火，以应刻漏之度数。若徒用文火，则药物亦不行也，而真炁竟耗散矣。内者，中宫也。炼药行符，务要性主立于中宫，而为斡运辐辏之主宰，则水火方能随外之道路而升降；又外必借命之元炁施化，则脉络方能开舒畅快；内外融通，自然命听于性，性持于命矣。邱祖师曰：“採二炁升降之际，若不以意守中宫，药物如何运得转？”二炁者，先天后天二炁也。先天之炁不得后天之气，则不能招摄转运；后天之气不得先天之炁，则亦无处施功；冲虚云：“炁则不能无先后之二用。”中宫者，炁穴也。药物者，元炁也。升降之际，中宫若无主宰，则药物不转矣；然全在中宫之真意，使真炁之动运矣。故禅师云“北斗往南看”是也。混然子曰：“内伏天罡斡运，外用斗柄推迁。”冲虚云：斗柄外移，而天心不离常处。若以内伏天罡，而外不推斗柄，则真炁不升降。若外推斗柄，而内不伏天罡，则真种不结。后《禅机赋》云：“禅主斗杓，见明星而团旋。”许旌阳老祖曰：“冲开斗牛要循环”。斗牛者，虚危穴也。斗牛既开，用升降之法以运之，冲虚子曰“行所当行”。又，白玉蟾云“起于虚危穴，以虚危宿在坎宫子位也。”盖虚危者，即任督二脉之起止处，亦名河车路。俞玉吾云：“于此时鼓之以橐龠，锻之以猛火，则真铅出坎，而河车不敢停留，运入崑崙峰顶。”是也。《金丹赋》曰：“子时河车耸驾，火销金而神炁不败。”子时是运周天之子时。驾动河车，採药上升。混然子云：“铅遇癸生之时，便当鼓动巽风，扇开炉鞲，运动坤火，沉潜于下，抽出坎中之阳，去补离中之阴，成乾之象，复还坤位。”纯阳祖师曰：“凭君子后午前看，一脉天津在脊端。”子后是阳火，午前是阳火。一脉者，即行周天之道路。凡行火时，神炁必由此路而运。萧紫虚云：“几回笑指崑山上，夹脊分明有路通。”又，俞玉吾云：“元海阳和动，寒泉炁脉通。”此子午当行之道，若神炁泛然于道外，不成路矣。或神不知其炁，或炁不能随神，空空锻炼，则金丹不成矣。守阳云“有两相知之微意”是也。又曰：“寒泉沥沥气绵绵，上透崑崙还紫府，浮沉升降入中宫。”圆通禅师云：“群阴剥尽，一阳复生。欲见天地之心，须识承阴之法。”寒者，坤也；泉者，坎水也；皆喻肾中之水。肾水果得以前所论之工法，到此自有沥沥波涛之象，乃真阳所产之时也。气绵绵者，续而不断之义。道光禅师云：“一爻看过一爻生。”崑崙即乾</p>\n<p>也，乾为首。紫府即丹田也，丹田为坤。升即上崑崙，降即下紫府。中宫即丹田也。祖师教人行火，须上至乾鼎，下至坤炉。广成子曰：“人之反覆呼吸彻于蒂，一吸则天气下降，一呼则地气上升，我之真炁相接也。”吸降呼升者，即先天后天二炁之机也。然后天气吸，则先天炁升焉；升是升于乾，而为採取也。后天气呼，则先天炁降焉；降是降于坤，而为烹炼也。若以口鼻一呼一吸为升降者，则去先天之炁远矣。觅元子曰：“乾坤阖闢，阴阳运行之机：一吸则自下而上，子升；一呼则自上而下，午降；此一息之升降也！”此皆言先天后天二炁消息之机也。乾者，首也，为天，故位居上。坤者，腹也，为地，故位居下。阖闢者，乃内外呼吸之元机。盖外面之气降，里面之炁则过我而升；外面之气升，里面之炁则过我而降；此乃周天之秘机。凡夫岂能知之！故仙翁云：“若教愚辈皆成道，天下神仙似水流。”浑然问曰：老师所言有两重之呼吸，但前文，其意要主宰中宫，以为斗柄转移之主；又见此处，其神要随先天之炁升降；又闻后天之气在意上升降；如老师言，三处都有动静知觉之意，不知其神其意重在何处？又不知其神其意如何分别用度？我闻之丹经曰：“行则神炁同行，住则神炁同住。”今此分别神意，其不相合，何也？华阳云：子之不明者，非经之不明。是子之执着偏见。云何为机也？譬如世人安消息以制物件之法，如若投机，一叩即应，无处而不动。夫但有先天之炁者，则我之经络自能通应；而又有后天之气鼓舞，安有上下中间不应之理乎？可见先天后天，上下中间，皆主乎其机也。若是无其机，焉得应之？故太初古佛云：“一片东兮一片西，两头动处几人知？出有入无真造化，神炁相交透祖机。”云譬如乡人织布，其意一发，手足头目俱以发动。发者是谁？动者其神意在何处？若能明此理，则临时而不误造化之机缄矣。故俞玉吾解《阴符经》云：“恒山之蛇，击其首，则尾应；击其尾，则首应；击其中，则首尾俱应。”又云：“其法潜神于内，驭呼吸之往来，上至泥丸，下至命门，使五行颠倒，运于其中。”此即周天内外机动而已是也。又，冲虚云：“以意在中宫，以神驭炁，其炁自尾间夹脊上崑崙，复下丹田，周流运转不绝。”又何必有疑哉？因问曰：闻江西道人王山，而亦能升降，因何以几十载，不结丹成大药？答云：此人乃后天之意气，非先天之神炁也。冲</p>\n<p>虚子曰：“当吸机之阖，我则转而至乾，以升为进。当呼机之闢，我则转而至坤，以降为退。”吸机之阖固是下，然而内里之机要上，上者自下而升至于乾，为进阳火，为採取；呼机之闢固是上，然而内里之机要下，下者自上而降至于坤，为退阴符，为烹炼；此即内外阖闢之机也。萧紫虚曰：“乾坤橐龠鼓有数”。此以下皆言周天之息数。上文说升降法，而其中卦爻之数，尚未表明。若不用其数，则丹道又不成矣。朝元子云：“劝君穷取周天数，莫使蹉跎复卦催。”盖乾坤者，乃天地之定位。橐龠者，即鼓风之消息。奈何真炁不能自返复于乾坤，惟赖橐龠之法，以吹运之？盖乾坤即橐龠之体，坎离乃橐龠之用，所以乾呼返吸至于坤，坤吸返呼至于乾。乾坤者，乃坎离之体。内呼吸者，即坎离之用。人若能明乎内呼吸，则橐龠自鼓，而乾坤自运矣。数者，乃阴阳升降之度数，假呼吸之息数，而定卦爻之揲数。薛道光禅师曰：“火候抽添思绝尘，一爻看过一爻生。”抽添即真炁上升下降之旨也。绝尘者，凡临机时，幻化顿息，则真我不离于炁。爻过爻生者，喻绵绵不断之意。守阳云：“随机默运入玄玄，呼吸分明了却仙。”陈泥丸曰：“天上分明十二辰，人间分作炼丹程。若言刻漏无凭信，不会元机药不成。”天上有十二支之辰位，炼丹亦有十二时之火候；故六阳用进，六阴用退。程者，每时有一定之度数，若言不用息数之刻漏，则是旁门外道矣，而非金丹也。纵能强制升降，亦不能结大药。既不用周天之度数，又将以何物而为周天乎？以明明之刻漏，而不悟，则是愚之甚也！钟离祖师曰：“生成有数”。有数，即乾用九而坤用六也。金谷野人曰：“周天息数微微数”。周天即往来返复之义。微微数者，不著于相，顺随而行火候。元机是周天程限之数无差也。陈泥丸曰：“乙阳复卦子时生，午后一阴生于垢，三十六又二十四。”冲虚子曰：“子至巳六时为阳。阳合乾，故用乾爻乾策。乾爻用九，而四揲之为三十六；故阳火亦用九，同于四揲。”又注云：“子丑寅以次，皆用四揲之三十六。”又云：“午至亥六时为阴。阴合坤，故用坤爻坤策。坤爻用六，而四揲之为二十四；故阴火亦用六，同于四揲。”又注云：“午未申以次，皆用四揲之二十四。”又云：“阳时乾策，二百一十六；除卯阳沐浴不用，乾用实一百八十也。阴时坤策，一百四十四；除酉阴沐浴不用，</p>\n<p>坤用实一百二十也。合之得三百数，周天之数也；闰余之数在外。”盖三百数者，实非三百数，皆譬喻辞也。守阳真人曰：“子行三十六，积得阳爻一百八十数。午行二十四，合得阴爻一百二十数。”阳爻六时用九，除卯时不用，只得一百八十。阴爻六时用六，除酉时不用，只得一百二十。冲虚子曰：“卯在六阳之中，酉在六阴之中，调息每至于六时之中，可以沐浴。”即此也。《悟真注疏》曰：“子进阳火，息火谓之沐浴。午退阴符，停符谓之沐浴。”息火停符者，停住有作而行自然之妙运；非是停住先天而不行，是停住后天之武火。故履道云：“十二时中，毋令间断。”俞玉吾云：“天道无一息不运，丹道无一息间断。”故卯酉时不行之中而默运吹嘘，则子午亦然。又，重阳云：“子午冲和连卯酉，春冬秋夏相携。”冲虚子云：“世称沐浴不行火，且道吹嘘寄向谁？要将四正融抽补，才得金丹一粒归。”又，陆子野《注悟真篇》云：“卯酉不进火，但以真炁薰蒸而为沐浴。”万古不移！曹还阳真人曰：“十二时中，时时皆有阳火阴符。凡进则曰进阳火，凡退则曰退阴符，亦以阳用者曰火，以阴用者曰符。”十二时者，即吾身中运周天之时也。子巳六阳时进阳火，午亥六阴时退阴符。进则为升也，退则为降也。故进则曰进阳火，退则曰退阴符。时时皆有阳火阴符者，不在沐浴时，而亦有沐浴。故阳用者曰火，阴用者曰符。浑然问曰：但闻六阳时中沐浴，六阴时中沐浴，此理可明。但不知六阳时中，时时有阴符；六阴时中，时时有阳火；此理深微。愿求教训？华阳云：凡行周天之时，其后天之气有回转之机，故在此回转处，内藏阴符阳火之秘机。既有六阳六阴之限数，焉得一息而运至于天哉？纵运亦不成周天之度，不合刻漏之法则矣。浑然又问曰：弟子尚愚迷，不识阳火阴符之精微，敢再求指教？华阳云：凡运火之时，后天气进，则谓之阳火。后天气退，则谓之阴符。凡阳火阴符、沐浴归根者，皆是借后天呼吸之气，以为周天度数之法则。若无其呼吸，则不成阴符阳火、沐浴归根矣。邱祖师云：“运行周回，自有径路，不得中气斡旋，则不转。”又，冲虚云：“火候谁云不可传？随机默运入元元。达观往昔千千圣，呼吸分明了却仙。”又问曰：昔日达摩言“二候採牟尼”，何为二候？云：药生而往外，以用息採归炉为一候；药既归炉封固，又名一候。又问曰：何为四候？云：升降沐浴</p>\n<p>即为四候。又问曰：何为之闰余？云：即归根还于下丹田之处，故亦有温养沐浴之位也。冲虚子曰：“凡一动则一炼而周，使机之动而复动者，则炼而复炼，周而复周。”此即言凡有炁之动者，必须炼之，则小周天之火容易止。如若不炼，则火不能速止，而大药亦不能发生矣。古云：“运罢河车君再睡，来朝依旧接天机。”古皖山合封问曰：余自学道，今已八旬，阳还自动，是何故也？答曰：阳既举是未得火炼之过耳！合封曰：余得七悟师所传，运于周身四肢，运六回阳，六回阴，左运三百六十，右运二百四十，岂不是火工？华阳曰：既是火工，八十因何阳还举？此非金丹乃小法，是七悟师当初止汝之念耳！如此空运，有何益也？合封曰：金丹之道，若何为哉？华阳曰：金丹之道，从阳生时，凝神入炁穴，鼓起橐龠之巽风，息息向炉中吹嘘，犹如铁匠手中抽动风箱一般，风生则火焰，火焰则精化，精化则炁自生矣。採此生炁，升降往还，谓之周天也。又曰：“积之不过百日，则精不漏而返炁矣。”百日是炼精之名目，但凡有二候之机来者，则百日可期。少而勤者，成之速。若中年年迈而又不勤者，未可定其日期。凡有精漏者，则未成漏尽通之道。如精不漏者，则精尽还成炁，不死长生之果得矣！太邑海会寺方丈僧龙江问曰：以此自保守，可得《楞严经》漏尽通成否？华阳云：保守只名断淫心淫身而已；知用火化，则淫根方断；漏尽通自成，则不漏矣。然淫根者，即外肾也，若有举动，即有生死矣。正阳祖师曰：“果然百日防危险。”防危险者，防时至药生，而神不及知觉，则错过矣。或不明起火之法，或昏睡而神不灵，此乃失于炁矣；或当进火而不进火，当退符而不退符，当沐浴而不沐浴，当止火而不止火，当归根而不归根，则失于造化之机；故曰防危险。萧紫虚曰：“防火候之差失，忌梦寐之昏迷。”差失者，皆因学人心不诚，而意不专。若灵台洁净，火候明白，有何失乎？古人往往走丹者，皆因理未明，而心不专，故有差失之患。梦寐昏迷者，凡学道之士，宜乎先养神，神纯自然灵觉。神若不纯，睡则生尘妄之心，故有梦寐走失之患矣。石杏林曰：“定里见丹成”。丹之所成者，是炁已曾圆满；外肾不举，丹光上涌，故有所见也。正阳祖师曰：“丹熟不须行火候，更行火候必伤丹。”丹熟是有止火之候到，故谓之熟。既知熟矣，当用採大药之法，则小周天之工法无所用矣。</p>\n<p>若再用小周天，丹不伤乎？萧紫虚曰：“切忌不须行火候，不知止足必倾危。”凡炼丹，若不知止足，必有倾危之患也。昔日白玉蟾六十四岁下工，已到止火之候，未及採药，则已倾危矣。又，邱真人到止火之候，未防其险，则夜自走失。又，曹还阳真人，曾亲遇见此止火之景，未及採取，亦以走失元阳矣。故崔公云：“受炁吉，防成凶。火候足，莫伤丹。”所以紫阳云：“未炼还丹须速炼，炼了还须知止足。若也持盈未已心，不免一朝遭殆辱。”此皆言小周天造化，火到丹熟，止火之候也。止者，不行升降也。然虽不行升降，时刻不可须臾离火，常常温火薰蒸；离则亦自走矣。冲虚真人曰：“有止火之景。”此乃止火之时，採大药之候也。须求真师口授，方能出炉。若无真传，不知採取之法，不知採取之时，故景不得矣。得真传，知採法，景到又不可不知也。若旁门认取眼光、静坐慧光、千百种光，则错之甚矣！若前此不知坎离交媾之法，丹田则无药，而外肾亦不能如马阴藏之形；纵有外光发现，此非丹田之苗也；盖属想妄而发矣。若真能成马阴藏形者，自有异常之景。故纯阳祖师云：“曲江上月华莹净。”又《翠虚篇》云：“西南路上月华明，大药还从此处生。”俞玉吾云：“西南属坤，坤为腹；药生于丹田之时，阳炁上达，丽于目而有光；故自目至脐一路皆虚白晃耀，如月华之明也。”守虚真人曰：“且待其景到之多而止，大药必得矣！”又曰：“初炼精时，得景而不知，猛吃一惊而已；乃再静而景再至，猛醒曰：‘师言当止火也。’可惜当面错过；又静又至，则知止火，用採而即得矣；是採在于三至也。今而后当如之，及后再炼不误。景初而止，失之速不待；景至四而止，失之迟；不速不迟之中而止火，得药冲关，而可点化阳神。凡有真修仙真，千辛万苦，万万般可怜，炼成金丹，岂可轻忽致令倾危哉！”自古圣真，不泄止火之真候，亦不泄採大药之真景。真候真景，独赖冲虚、守虚二真人，泄万古不泄之天机，今则尽泄矣。但后学无有不沾二真人之恩。此乃明言直论，不必重加注脚。后学因缘若至，财侣双备，速早下工，求取大药，炼炁化神。参明三至，则大药可得。神可化而仙成矣。如或不透，再觅冲虚真人之秘文，参《直论》之九章，则大周天之造化，其情无不明白矣。此以上尽属调药、炼精化炁成金丹之造化；而逐节工法之口诀，</p>\n<p>尽备于此矣。但经中所言，后天呼吸之气者，必待师传，方敢自用。非是著于口鼻，亦非闭气于丹田，著此二者，俱属于旁门，非金丹也。凡借后天之息，以为吹嘘逼运者，是炁穴之内，有生机之动者，因此而调息。既调炁穴内之真息，而后天之息，则自然而至于炁穴，相兼相连以同动矣。然古人或以单言后天之息，则先天之息无有不得其机，而借用后天；或单言先天之息，则后天之息无有不借其机，而能用先天；故先后原有兼连之消息。凡调息之时，其神专重于先天之炁内，以熔化于行住起止；不过借后天之息，以为熔化行住起止之权。先天之炁既有生机，若不得后天，则先天亦不能自熔化于行住起止矣。凡四方有学道之同志者，果知造化之机，不问先天与后天，若临时能用消息二字者，则先天后天有不待辨，而能自明矣。此以上皆言炼精化炁成金丹之元功，风火同用之妙旨，尽在斯欤！余不敢谓此集为自论之妙道；然皆荟萃先圣之真传；即后来万劫高真，用风用火之根本。使见之者即自了悟，契合仙佛之真旨，成己成人，仙佛之果证矣！</p>"}, {"id": "jx_7", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "效验说 第七", "content": "<h5>效验说 第七 尽言小药产景</h5>\n<p>华阳曰：以前六章，药物、炉鼎、火候，无不表明矣。但药产之景，尚有未全，此篇重以发明；愿有志之士，早成大道，是余所夙怀之志也！且药产之效验，非暂时可得。至真之道，在乎逐日凝神返照炁穴之工纯熟，而后有来之机缄。夫或一月元关显露，或数月丹田无音，迟早各殊，而贵乎微阳勤生；不失调药之工夫，则药产自有验矣。且炁满药灵，一静则天机发动：自然而然，周身融和，苏绵快乐，从十指渐渐至于身体；吾身自然耸直，如岩石之峙高山；吾心自然虚静，如秋月之澄碧水；瘁生毫窍，身心快乐；阳物勃然而举，丹田暖融融。忽然一吼，神炁如磁石之相翕，意息如蛰虫之相含，其中景象，难以形容。歌曰：奇哉！怪哉！元关顿变了，似妇人受胎。呼吸偶然断，身心乐容腮。神炁真浑合，万窍千脉开。盖此时不觉</p>\n<p>入于窈冥，浑浑沦沦，天地人我，莫知所之，而又非无为。窈冥之中，神自不肯舍其炁，炁自不肯离其神，自然而然纽结一团。其中造化，似施似翕，而实未见其施翕；似走似泄，而实未至于走泄；融融洽洽，其妙不可胜比。所谓一阳初动，有无穷之消息。少焉，恍恍惚惚，心已复灵，呼吸复起，元窍之炁，自下往后而行；肾管之根，毛际之间，痒生快乐，实不能禁止；所谓“炁满任督自开”，又云“运行自有径路”，此之谓也。迅时速探、烹炼、烹炼复静。动而复炼，循环不已；少年不消月余，中年不过百日，结成金丹，岂不乐哉！此一篇本不当安于此。效验原是调药后之事，理当安于调药之下；因句法多之故耳！读者当默会于调药之下。假若有此效验，不可认为怪事；即是药产之真景，当自保护真种矣。</p>"}, {"id": "jx_8", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "总说 第八", "content": "<h5>总说 第八</h5>\n<p>夫金丹之道，从静而入，至动而取。若不静则神不灵，而炁亦不真；如此妄炼，即属后天，与先天虚无金丹之道不相契也。盖静者，大道之体，造化之根；唯静则可以炼，不静则识性夹杂，终与道相违矣。故幻丹走泄，而道不成就者，皆由未静而夹于识之过也！夫静者，静其性也。性能虚静，尘念不生，则真机自动。动者非心动，是炁之动也。炁机既然发动，则当以静应之，一动一静，不失机缄，是谓调药，是谓交合。行乎造化，性命双熔，是谓真旨妙用矣。苟或专以静而不识动，或专以动而不复静，皆非正理也。次当明其药产老嫩：老则炁散不升；嫩则炁微不升；务在静候动旺始探，是谓当令；故曰：“时至神知。”以顺行之时候，即逆行之时候矣；故又曰：“药炁驰外，则外别有景。”前所谓调药用之日久者，是为虚耗之躯言之耳！若壮旺之体，只于运周天之当时调之，不用日久。若调之日久，不运周天，则阳极而精满，满则又溢矣。不知，法则活而诀则</p>\n<p>一。故童真只用大周天，不必用小周天。壮旺之体，虽不可不用小周天，亦不必调之日久，只候药产景到时，调其老嫩。凡元炁一动，伺阳之长旺，即当採封，运行周天。运而复静，动而复运，循环不已，是谓之进退行火，是谓之採取周天也。勤行不惰，道有何难哉？故曰：“丹田直至泥丸顶，自在河车已百遭。”又云：“以虚危穴起，以虚危穴止。”盖虚危穴，即任督二脉之交处。立斗杓，运河车，皆由此而起止。故冲虚曰：“起于是，止亦于是。”且运必假呼吸而吹之；若不以呼吸吹嘘，则神炁不能如法，似有似无，合乎自然相依之运行。盖行以神为之主宰，不见有炁之形迹。元炁乃无形之行，随元神之运行，听呼吸之催逼；故曰：“夹脊尾闾空寄信”。而呼吸乃採运元炁之法则：逆吹微缓，谓之文火；紧重谓之武火。数息运元炁者，为爻为时、为度为位，而周天之造化，以此为规模；非真有三百六十有余也。故曰：“每时四揲”。所以然者，使其水火不致太过不及也，是范围元炁而成其度数；为造化之总序耳！故曰：“以息数定时数”也。或又问炉鼎道路，药物火候？曰：能此虚危任督运用，即炉鼎道路；明此阳动升降，即药物火候；而道即在是也。除此皆非正理，尽属筌蹄，惑人矣！借筌蹄获鱼兔，谓筌蹄为鱼兔则误也！去筌蹄专鱼兔，朝採暮炼，自然精化炁足，丹成景至。再行向上工夫，炼炁化神，超凡入圣，出定千百亿化身，皆可由此书而上达矣！</p>"}, {"id": "jx_9", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "图 第九", "content": "<h5>图 第九</h5>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//06e1ac52-2cfd-401d-a328-89b6bd33e435/markdown_1/imgs/img_in_image_box_247_319_674_838.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A47Z%2F-1%2F%2F6c5f696c5520d24c16913465fcf5f80c77e3b373d40b37789a9ce776a22fcdff\" alt=\"原书图示\" style=\"width:90%;max-width:560px;\" loading=\"lazy\"></div>\n<p>&lt;div style=&quot;text-align: center;&quot;&gt;图说 第十 &lt;/div&gt;</p>\n<p>金丹之道，前八篇已尽之矣。尚恐学者不知窍妙，故备此图以补全书之要诀。愿有志者，一览无疑，不为旧图所惑。庶知阳生在此！调药在此！鼓巽风在此！药产在此！採取在此！归炉在此！驾河车在此！还本复位在此！金丹造化之元功，莫不在此矣！然窍本无形，自无而生有，则谓之元关、中宫、天心，其称名固不一也。夫虚无之窟，内含天然真宰，则谓之君火真火，真性元神，亦是无形。静则集氤氲而栖真养息，宰生生化化之原；动则引精华而向外</p>\n<p>发散。每活子时二候之许，其窍旋发旋无，故曰：元关难言。其炁之行，后通乎督脉，前通乎任脉，中通乎冲脉，横通乎带脉，上通乎心，下通乎阳关，上后通乎肾，上前通乎脐。散则透于周身，为百脉之总根，故谓之先天。其穴无形无影，炁发则成窍，机息则渺茫。以待成全八脉，则八脉凑成，共拱一穴，为造化之枢纽，名曰炁穴。譬如北辰居所，众星旋绕护卫，即古人所谓窍中窍也。窍即丹田。上乃金鼎，鼎稍上即黄庭，窍下即关元，古谓“上黄庭，下关元”是也。关元下即阳关，亦名命门，乃男女泄精之处；肾管之根由此而生。但黄庭、金鼎、炁穴、关元四穴，俱是无形，若执形求之，则谬矣！又谓夹脊两肾中藏元炁，则亦谬矣！此书图之所作，实发古人所不尽泄之旨，而又有以辟其诞妄也。</p>"}, {"id": "jx_11", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "顾命说 第十一", "content": "<h5>顾命说 第十一 此炼己立基之首务。</h5>\n<p>夫顾命者，乃是收视返听，凝神聚炁之法，岂有他术哉？古圣有言曰：“命由性修，性由命立。”命者，炁也。性者，神也。炁则本不离神，神则有时离炁。俞玉吾云：“心虚则神凝，神凝则炁聚。”欲其炁之常聚而不散者，总在炉火勿失温养其元，使神炁如子母之相恋。左慈云：“子午顾关元”。元即命之蒂也。若不顾守，则火冷炁散，久而命亡矣。黄帝云：“存心于内，真炁自然冲和不死。”故性命二者，不可须臾相离也；离则属于孤偏矣。崔公云：“十二时，意所到，皆可为。”混然曰：“无昼无夜，念兹在兹，常惺惺地，动念以行火，息念以温养火。”玉蟾云：“神即火，炁即药，以神驭炁而成道；即以火炼药而成丹。有药无火，则水冷而炁不生。火养锅底，则水暖而炁自腾。”古云：“火烧苦海泄天机，红炉白雪满空飞。”雪即炁也，故炁因火而升，火因风而灼。十二时中，回光返照，刻刻以无烟之火薰蒸。使性命同宫，神炁同炉，绵绵息息，似有似无，内外混合，</p>\n<p>打成一片。黄帝曰：“火者，神也。息者，风也。以风吹火，久炼形神俱妙。”人能如此，何忧命之不固也？夫命之元炁，乃月魄。神之灵光，乃日魂。以魂伏魄，则先天之炁自然发生。人多不测造化，盲修瞎炼，性命各宿，孤阴寡阳。自谓长生得道，而不知其违道甚远也！夫修炼者，方入室之时，当外除耳目，内绝思虑，真念内守，使一点元神，浑浑沦沦；随其形体荣枯，听其虚灵自然，融然乎流通，湛然乎空寂。于此常觉常悟，冥心内照，防其昏沉，昧乎正念。《参同契》云：“真人潜深渊，浮游守规中。”规中，指元关一窍也。然又不可执著，以致真阳不生。其妙总在不急不急，勿助勿忘而已。《清静经》云：“空无所空，寂无所寂，真常应物。”果如此，则神炁浑然如一，恍恍惚惚若太虚然；古云“先天一炁从太虚而来”者，即此也。夫机之未发，静以俟之；炁之既动，以神聚之；而顾命之旨，尽在斯矣！</p>\n<p>$$  风火炼  精赋 \\quad 第十二 \\quad 总言大小  周天。 $$</p>\n<p>炼者,造化之工;</p>\n<p>精者,变化之源。</p>\n<p>火因风而焰灼；</p>\n<p>精得火以熔铅。</p>\n<p>勒阳关谓之调药；</p>\n<p>伍楹 摄炁归即是还元。</p>\n<p>察其机，锻谷精而调燮；</p>\n<p>辨其候,运百脉以归源。</p>\n<p>会其源,则神炁相依;</p>\n<p>鼓其风,则真精朝元。</p>\n<p>夫精者：</p>\n<p>乃天地之源；造化之本。</p>\n<p>逢时节而旋机动,得火以磁恋;</p>\n<p>达关窍而流变泄,吹风则还壶。</p>\n<p>是故：</p>\n<p>坎宫森布，元神摄而徘徊；</p>\n<p>离中橐龠, 真炁旋而运转。</p>\n<p>炉内火逼，白虎朝于灵台；</p>\n<p>鼎中水融，青龙游于深渊。</p>\n<p>阳关禁闭；</p>\n<p>元窍门开。</p>\n<p>果然风火既同炉；</p>\n<p>久而水暖自生霞。</p>\n<p>月华吐,则汞引铅而铅引汞;</p>\n<p>造化之变迁兮！待静观动；</p>\n<p>日精射，则蛇交龟而龟交蛇。</p>\n<p>药物之老嫩兮！伺机听命。</p>\n<p>杳冥中起；</p>\n<p>恍惚中迎。</p>\n<p>自无炁而生炁；</p>\n<p>本无名而喻名。</p>\n<p>知其时者，能夺天地之真炁；</p>\n<p>顺其机者,即有升降之法程。</p>\n<p>薰之炼之，则超凡而入圣品；</p>\n<p>食之饘之，化枯骨以登太清。</p>\n<p>嗟呼！今之学者：</p>\n<p>奔山驾海，坦坦之大路偏过；</p>\n<p>劳形兀坐，赫赫之明珠抛播。</p>\n<p>利驰而名谩，德薄而垢重；</p>\n<p>识性以妄谈，去正而归左。</p>\n<p>彼夫：</p>\n<p>道本至近，情隔遥偏；</p>\n<p>理自不远，性失违天。</p>\n<p>殊不知：</p>\n<p>精者炁之融，风者息之源；</p>\n<p>火者神之灵，炼者会之坛。</p>\n<p>以风而扇火，以火而炼精，则老还少而形长存；</p>\n<p>以炁而留神，以神而运息，则情复性而神自纯。</p>\n<p>自然可如赤松彭祖之优尊。</p>\n<p>禅机赋 第十三 恐后世学禅者,不明佛之正法,反谓吾非禅道;故留此以为凭证耳!</p>\n<p>道者，化育天地；</p>\n<p>法者，返本还元。</p>\n<p>柄动静而同用；</p>\n<p>随有无而自然。</p>\n<p>体本来之正觉，威音恍惚；</p>\n<p>持无生之妙用，极乐幽元。</p>\n<p>显优昙之家风，秋水皎月；</p>\n<p>隐患能之法语，春雾藏烟。</p>\n<p>是故：</p>\n<p>浮云散而天心现；</p>\n<p>蒙雨开而壁峰存。</p>\n<p>潭水清兮澄月澈；</p>\n<p>黑铅熔兮物形明。</p>\n<p>情寒而禅心定；</p>\n<p>意灰而性朗清。</p>\n<p>若夫：</p>\n<p>黄芽白雪，当求元关之妙义；</p>\n<p>地涌天花,即凿混沌之面目。</p>\n<p>会则有,散则无;</p>\n<p>出为尘，入为默。</p>\n<p>有情下种,乃如来之妙用;</p>\n<p>无法枯禅,即道人之顽空。</p>\n<p>水清月现,达龙宫而演法;</p>\n<p>风传花信，坐竭陀而受供。</p>\n<p>朗朗兮皆拱北；</p>\n<p>荡荡兮尽归东。</p>\n<p>降蛟龙于北海兮，烈焰腾空；</p>\n<p>伏猛虎于南山兮，洪雨普济。</p>\n<p>搏虚空而作法兮，刀兵奚伤；</p>\n<p>收毫芒而藏身兮，鬼神莫测。</p>\n<p>展则包罗天地；</p>\n<p>定则入于微尘。</p>\n<p>悟之者，顿超上乘之法；</p>\n<p>迷之者,带了六道之根。</p>\n<p>禅固自参，无非一念之定静；</p>\n<p>机由师授,能吸法水之鸿滋。</p>\n<p>正法眼藏，尽隐祖师之秘旨；</p>\n<p>涅槃妙心，微露如来之浅辞。</p>\n<p>由是：</p>\n<p>能宣漏尽之法；</p>\n<p>方称马阴之师。</p>\n<p>尔乃：</p>\n<p>机来有时,非顽空而长坐;</p>\n<p>禅主斗杓，见明星而团旋。</p>\n<p>灵台极乐，通行菩提之坡；</p>\n<p>净土家乡，秘锁慧命之奥。</p>\n<p>教外有因,不明元机,苦劳累世婆娑;</p>\n<p>谩守三更，强留一宿，暗通密印关锁。</p>\n<p>突然朗见者,乃云如是如是。</p>\n<p>慧性灵而道眼开，头头尽是；</p>\n<p>识重智少者，则曰不然不然；</p>\n<p>魔王迷而法窍闭，处处皆偏。</p>\n<p>达之者，融会天机；</p>\n<p>人有迷悟；</p>\n<p>佛无后先。</p>\n<p>迷之者，执定死禅。</p>\n<p>打七跑香，即禅和夙业之债；</p>\n<p>黄花翠竹，乃高人得意之时。</p>\n<p>千里因缘若至；</p>\n<p>方晓禅外之规。</p>\n<p>偶逢决破铁牛血；</p>\n<p>笑煞禅机有两期。</p>"}, {"id": "jx_14", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "妙诀歌 第十四", "content": "<h5>妙诀歌 第十四 大小周天。</h5>\n<p>大道渊微兮，现在目前。</p>\n<p>自古上达兮，莫非师传。</p>\n<p>渺漠多喻兮，究竟都是偏。</p>\n<p>片言万卷兮，下手在先天。</p>\n<p>有名无相兮，元炁本虚然。</p>\n<p>阳来微微兮，物举外形旋。</p>\n<p>恍惚梦觉兮，神移入丹田。</p>\n<p>鼓动巽风兮，调药未採先。</p>\n<p>无中生有兮，天机现目前。</p>\n<p>虎吸龙魂兮，时至本自然。</p>\n<p>身心恍惚兮，四肢酥如绵。</p>\n<p>药产神知兮，正是候清源。</p>\n<p>火逼金行兮，橐龠凭巽旋。</p>\n<p>河车运转兮，进火提真铅。</p>\n<p>周天息数兮，四揲逢时迁。</p>\n<p>沐浴卯酉兮，子午中潜。</p>\n<p>归根复命兮，闰余周天。</p>\n<p>数足三百兮，景兆眉前。</p>\n<p>止火机来兮，光候三牵。</p>\n<p>双眸秘密兮，专视中田。</p>\n<p>大药难採兮，七日绵绵。</p>\n<p>蹊路防危兮，机关最元。</p>\n<p>深求哀哀兮，早觅真传。</p>\n<p>择人而授兮，海誓相言。</p>\n<p>过关服食兮，全仗德先。</p>\n<p>寂照十月兮，不昧觉禅。</p>\n<p>二炁休休兮，性定胎圆。</p>\n<p>阳纯阴尽兮，雪花飘迁。</p>\n<p>超出三界兮，乳哺在上田。</p>\n<p>无去无来兮，坦荡逍遥仙。</p>\n<p>夙缘偶逢兮，早修莫挨年。</p>\n<p>休待老来临头兮，枯骨无资空熬煎。</p>"}, {"id": "jx_15", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "论道德冲和 第十五", "content": "<h5>论道德冲和 第十五</h5>\n<p>道高龙虎伏，德重鬼神钦。斯言也，盖道以载德，德以植道也。夫道者德之用，德者道之体。人能明乎其德，而天性自现；体乎其道，而冲和自运；是之谓寂然不动，感而遂通也。盖人禀虚灵，原本纯静。至德体纳太和，浑然一团，天理一发，皆能中节。何劳修乎？但人被情欲之私所隔，忘本逐末，竟昧其真；故元和之正炁，纯静之天心失矣！所以圣人表虚极而养己德；论易理以明天道；则尽性致命之学，可以穷神知化矣。然学者，欲体乎道德，当寻来时之消息，而穷本然之根苗；欲探造化之机缄，须察迟促之景象，则临时有把柄，而无危险之患；然后得入道德之门，可造冲和之境矣！盖至人能权动静之消息，须用智慧；而浑然无我，故能默运化育之道，长定中正之理。活活泼泼，则随中极之冲和，而充塞乎两间，达逍遥之境，乐无何有之乡；大至默默，还乎无极，此乃至人之大德也。苟内怀私欲，外沽名誉，假善法以遮面，暗取泥水之资，非为无德，实贼德也。唯天地滋万物而无心，圣人顺万物而无为，亦何期德之洋溢乎？古圣云：“德者，性道中求之耳！”夫德非道则无著，道非德则无主。道外觅德，其德远矣。培德体道，其功切矣。故曰：天心居北极而众星拱，东海纳细流而百脉归。人若能静心养炁，何虑道德之不成哉？</p>\n<p>吾尝自内观而无心，外觅而无体。飘飘乎寻之不得，恍恍乎觉而虚灵。似鱼之随水，如雾之笼烟，一派冲和，萦卫天地。但人不能深进，故本然之道昧却矣！纵元文奥辞，无非口头三昧，又乌能</p>\n<p>尽道德之本然，明体用之精微，解冲和之奥妙哉！</p>\n<p>火候次序 第十六 尽言小周天。</p>\n<p>夫道从炼己起手，次下手调药，既了手行周天，三事非一也。己熟，或坐或卧，不觉忽然阳生，即回光返照，凝神入炁穴，息息归根；此神炁欲交未交之时，存神用息，绵绵若存，念兹在兹，此即谓之武火矣。神炁既交，阳炁已定，又当忘息忘意，用文火养之；不息而嘘，不存而照，方得药产。但忘息即不能以火薰之，但用息即是不忘。息无，不泯之谓嘘；欲嘘，不觉之谓忘。但用意即是不忘；但忘即不能以意照之；古云：“心无，不存之谓忘；欲无，不泯之谓照。”忘与照，一而二，二而一。当忘之时，其心湛然，未尝不照；当照之时，纤毫不立，未尝不忘。是谓真忘真照也。此即谓之文火矣！文火既足，夜半忽然药产神知，光透帘帷，阳物勃然而举，即当探封运行。探运之时，存神用息，逆吹炁穴，谓之武火也。封沐归根，即用上文文火之法，照顾温养之，谓之文火矣。但不在交媾与周天之时，俱是用文火之法，以时刻温养之；而炼己之工，亦是用此法，不然不能还虚。然阳生谓之活子时，而药产亦谓之活子时，两段工夫当明次序。而运周天，谓之周天之子时，用火调药炼药，谓之火之活子时也。然候者，亦非一说。不论阳生及药产，但有炁动者，即为一候；以神用炁，又为一候；此乃神炁会合之二候也！又曰：阳生为一候，而药产又为一候，此乃药炁所生之时节之二候也；故曰“二候探牟尼”者，即此也。药炁既产往外，探归炉为一候；而炉中封固，又为一候；亦谓之“二候探牟尼”。升降沐浴谓之四候，总谓之六候。此乃周天一时工法所用之六候也！候虽多，亦不必执著。不过是阳生调药，调到炁满药产时探归，运行子卯午酉，归根即是也。然其中候法，亦要明白。当用呼吸，变文武火之时候，不明白则文武不能如法。所谓火候不传者，非不传也，即</p>\n<p>此难言也。夫火是火，候是候，岂混而言之？其中文武火候，逐节工法，师所传之口诀，尽备此书。余虽为僧，自幼觅此道，励志江湖，三十余年，方得全旨。后人有缘遇之，不要三日，即明乎斯道，则不为诬徒所惑矣！华阳云：此篇重所言候者，非余之好事也。因群书所言候者，前后混杂，则令人实难悟。余前文虽表六候者，尚不能决人之疑；故添此篇，以决同志读群书候之疑病也。</p>"}, {"id": "jx_17", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "任督二脉图 第十七", "content": "<h5>任督二脉图 第十七</h5>\n<p>任督二脉图</p>\n<p>折开隱闭天仙诀，</p>\n<p>得视嗄嗄笑，</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//de6f4ee0-c56e-400c-9604-c2e50bc6c7e1/markdown_1/imgs/img_in_image_box_365_618_568_1143.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A47Z%2F-1%2F%2F907b1c31389745f700c6c0d7330e2042273ab933fa7ffe493679fe8fc7b16aa4\" alt=\"原书图示\" style=\"width:46%;max-width:560px;\" loading=\"lazy\"></div>\n<p>垂露源头佛祖机。</p>\n<p>存行步步真。</p>\n<p>伍柳</p>\n<p>天仙法脉</p>\n<p>华阳曰：此图直泄元机。实愿得药之士，不失运行之路。丹道最秘，非余之敢妄泄也。古圣虽无图，却有言存留，奈何不全之过耳！又因旧说，谓督脉在脊骨外；而任督止于上下唇；此二说皆俗医之妄指。岂知仙家说任督，实亲自在脉中所行过，以为证验！非但行一回也，金丹神炁之元妙，必要在脉中所行过数百回，方得成就。不但俗医谬妄乱指，今之修元者，亦此谬妄乱指，愈加纷纷。苟不亲自领会境遇，妄臆猜指，浅学信受，误丧励志，岂不痛哉！故余将师所授之诀，以亲自领会之熟境，画图以证其非。然而此图一出，游方之士与那假道学，则无容身之地矣。</p>"}, {"id": "jx_18", "bookId": "jinxian", "bookTitle": "金仙证论", "title": "决疑 第十八", "content": "<h5>决疑 第十八</h5>\n<h6>僧豁然 七问</h6>\n<p>问之一曰：弟子愚暗，蒙老师传授火化断淫之法，行四个月得景，海中火发，对斗明星。又蒙传授法轮常转之密语，行持五十日，淫根自断，永无生机。反照北海，犹如化银之光，其光浩荡射目，自知成舍利子矣。弟子昔在打七一门，不见成道，反人人吐血，是何故也？</p>\n<p>答曰：自如来开化，西天二十八祖、东土六代，并无此门。乃僧高峰门人，诬捏坑害后人。况高峰所习是闭息之旁门。何见得也？高峰自曰：忍气急，即杀人。吾云：吐血，因跑香忍气，伤其脏腑；坐打香板，伤其脊络；就是卢医扁鹊，莫能救之！</p>\n<p>问之二曰：参禅问话头不见成道，何也？</p>\n<p>答曰: 如来有所问试者, 是看学人性道明与未明。明则教外别传慧命, 不得慧命无所成也。</p>\n<p>问之三曰：专念经念佛，不见成道，何也？</p>\n<p>答曰：经，路径也；佛，名字也。譬喻考试求官，欲取第一名，求圣人唱四书可进否？六祖云：“东方人造孽，念佛求生西方；西方人造孽，念佛往生</p>\n<p>何万？”</p>\n<p>问之四曰：我释教参禅人，灰心长坐，不起欲念，凡有走漏，不能成坚固之体，是何故也？</p>\n<p>答曰：为人至十六岁，关窍开，既开无有不走泄之理。况且念经，伤其中气；枯坐，心肾又不能交会，走漏格外多矣。所以近代出家人，反得疟症，水枯、吐血、枯目，皆谓此也。坚固实有火化之法：譬喻铛水在上，灶火在下，水得火，自然变化为炁矣。如来云：“火化以后，收取舍利。”实有真传也！</p>\n<p>问之五曰：今之参禅人，而不问走泄之事，自言修道，可得成道否？</p>\n<p>答曰：天上未有走泄身子之佛祖。走泄一回，与凡夫交媾一回，其理一也；故无所成矣！</p>\n<p>问之六曰:佛是何法起手?</p>\n<p>答曰：佛以对斗明星起手。对，即中华返观是也。斗，即北斗丹田是也。明星，即丹田之炁发晃是也。不对斗明星，万万不能成道。释教下手一著最秘，吾今全露，尔当默思默思！</p>\n<p>问之七曰：今之释教传法，得者以为出头，自称为大和尚，可是真法否？</p>\n<p>答曰：得者，如梦得金；称者，如戏台上汉高祖、楚霸王，何曾有实也？自达摩至六祖，以口传心授，故五祖云：“密附本音”。今之所传，纸上传某僧某僧之名为传法，志者观之，嗄嗄一笑而已！</p>\n<h6>王会然 七问</h6>\n<p>问之一曰：弟子蒙老师传授下手工夫，修炼两月，得药产之景。又蒙传授周天之口诀，行运三月，外肾不举，丹田常自温暖，自知丹成矣。不知别门亦有可成之理否？</p>\n<p>答曰：不得神炁交合，产出真种，万无所成。或有行之专者，无非却病。所谓“万般差别法，总与金丹事不同”。</p>\n<p>问之二曰:有一先生自言得药产之景,能以升降,又长坐数十年,凡有走漏,不结丹,何也?</p>\n<p>答曰:虽得药产,不知火候。虽是升降,不知阖闢度数。强运,故不结</p>\n<p>也！</p>\n<p>问之三曰:有一位言:教人凝神入炁穴,阳生之时,后升前降,不结。何也?</p>\n<p>答曰：不知起手之法，无药先行升降，水火煮空铛，故此不结也！</p>\n<p>问之四曰：有一位言：阳生之时，以舌抵住齿，往上提之，吞津降下，不结。何也？</p>\n<p>答曰：此阳乃微阳，非药产之阳，升降无用。况又不知道路，乱提起邪火，必得吐血之症。吞乃有形之物，落于肠，出二便。有何益也？</p>\n<p>问之五曰：有一假道人，教人阳生时用息採之。一息採，一息封，谓之二候。左边上，右边下，一息一转，谓之一周天。不结，何也？</p>\n<p>答曰：此一非旁门，乃未得诀者，自诬造作此言，诳哄愚夫耳！真人云：凡流不知道。运行由五脏而循环，非周天也，故此不结矣！</p>\n<p>问之六曰：专凝神在炁穴，能出阴神，不结丹，何也？</p>\n<p>答曰:不知阳生用呼吸之法,故不结也!</p>\n<p>问之七曰:不打七亦吐血,得疾病,何也?</p>\n<p>答曰：误信盲师之过耳！冲虚祖师云：外道邪法行气，必至有病。何以为病？升提太迟重，则提为邪火，其病头晕、病目赤肿、翳障、病咳嗽痰火、吐血、病痈痈等症。若降下而迟重，则逼沉精气贯入肾子，为疼痛偏坠病，腹胀水蛊胀病等症。上下两病，皆致人速死。</p>\n<h6>了然 五问</h6>\n<p>问之一曰：弟子旁门外道不必问矣，愿闻正道之火候。钟离祖师云“乾用九，坤用六”，可是此理也？</p>\n<p>答曰:而名是,法不是。</p>\n<p>问之二曰：冲虚谓“子行三十六，午行二十四”，可是此理也？</p>\n<p>答曰:而名是,诀不是。</p>\n<p>问之三曰：真人谓“阳爻一百八十，阴爻一百二十”，可是此理也？</p>\n<p>答曰:而名是,事不是。</p>\n<p>问之四曰:许旌阳谓“阳用二百一十六,阴用一百四十四”,可是此理也?</p>\n<p>答曰:而名是,火不是。</p>\n<p>问之五曰:其四非也?</p>\n<p>答曰：道最重在口传。不得真传，四皆非矣！如果得真师，其四俱真！不但四真，千真万圣俱合此火之元妙；而三教成道者，亦此火之元妙。</p>\n<p>柳华阳禅师 撰并注</p>\n<p>慧</p>\n<p>命</p>\n<p>经</p>"}, {"id": "hm_xu", "bookId": "huiming", "bookTitle": "慧命经", "title": "叙·自序", "content": "<h4>叙</h4>\n<p>生可必乎？自古无不死之圣贤；生不可必乎？世尊何以云，能不死阿罗汉。《易》曰：“天地氤氲，万物化醇。男女媾精，万物化生。”又曰：“有男女，然后有夫妇。有夫妇，然后有父子君臣上下，而礼义有所错。”故古圣人，于男女之际，谨夫妇戒容止，三致意焉，所以尊生也。而况为佛氏之教者，既以清净慈悲为主，更当求不死之道，如阿罗汉矣。但其道，岂无所指授而能得哉！兹华阳和尚者，向有《金仙证论》一书。盐官吴君，既悦其言而为之序。会予以署协篆，至皖城，又以《慧命经》索弁言。阅其目，自《漏尽图》至《决疑》，凡十有四。其言曰，不识性命，则大道无所成，从古佛祖，莫不由性命为修炼。修者以破而补图，炼者以火而化物；火非风则不灼，物无所则失居；是故至人参乎大道，修乎性命，风火与物并而同用。心肾相合即是性命合一。命者根于肾，肾动则水也。性者根于心，心动则火也。以火入于水中，则慧命不致外耗。以风吹火，变化而成真种。修真种而成舍利，此其大旨也。其中真实次第之工夫：有下手时，转手时，了手时，撒手时等法。遵《楞严》之漏尽，表《华严》之奥旨，合诸经之散言，明此双修之天机，不堕旁门，一片婆心，尽在此书矣。今而后，道成寿允，安知华阳之不如佛弟子，迦叶住世七百年而遇世尊；宝掌和尚住世一千七百十二年而遇达摩也。寂无禅师而后，非华阳，其孰能以浅近喻至道，以显露泄秘理，而传后世于无穷哉！予故乐得而为之叙，且付诸梓云。</p>\n<p>时乾隆甲寅冬初，庚辰科会元，钦赐探花及第，御前侍卫，诰封通议大夫，原任浙江黄岩镇总兵官，诰封武显将军，署理安庆协副将孙廷璧叙。</p>\n<h4>自序</h4>\n<p>华阳，洪都之乡人也。幼而好佛，因入梵宇有悟，常怀方外想，见僧辄喜。一旦闻长者曰：昔五祖三更时，私授六祖道。侧听欢然，憬如梦觉。始知修炼家必赖师传，乃寻求不已。足迹遍荆楚间，迄无所遇。后乃投皖水之双莲寺落发，愈加咨访，凡三教之师，靡不参究，竟无悉慧命之旨者。因自叹曰：人身难得，遂此虚度乎？忽发一念，于每夕二鼓，五体投地，盟誓，虔叩上苍，务求必得。阅及半载，幸遇合洪、冲虚师，传余秘旨。豁然通悟。乃知慧命之道，即我所本有之灵物。嗣至匡庐，又遇壶云老师，窃聆论绪，知为非常人。勤恳听受，继以哀吁；师乃大发鸿慈，开悟微密。中边奥窍，罔不周彻！及余临行，师嘱曰：佛教双修，今已断灭，子当续其命脉，以度有缘。余隐迹江左，与二三道侣焚修切究。因碧蟾、了然、琼玉、真元，苦修已成舍利，默契师传，故纂集是书，命曰《慧命经》。画图立相，开古佛之秘密，泄师祖之元机，洵接引后学之梯筏也。余见世之求道者，多宗语录；而语录中，有实语者，有妄语者。彼下学，不知如来慧命之道，误入套语口禅，终为下愚，转受语录之害。余通阅诸经，与师传印证，有《楞严》、《华严》、《坛经》乃实语也；禅师语录、和尚语录乃妄语也。夫修炼之道，非实语不足以证真诠；非实语不足以辟虚妄。虚妄胜，则魔障生，虽有智贤，无所从入。千百年来，慧命之道，深秘单传，卒难窥觉；今以浅率之言，将佛宝秘传，和盘托出。俾世之学者，睹此《慧命经》，即若亲口相传。只须励志精勤，不必他山求助，则佛果可以立证。此余苦心求师悟道之本愿也！</p>\n<p>乾隆甲寅夏，湖口传庐柳华阳，序于皖城忠洁庵中。</p>\n<p>漏尽图 第一</p>"}, {"id": "hm_tu1", "bookId": "huiming", "bookTitle": "慧命经", "title": "漏尽图 第一", "content": "<p>漏尽图</p>\n<p>勤造烹蒸慧命根。</p>\n<p>時將真我隐藏居。</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//3f92f8a7-74ef-4cad-a88b-7488edc0250e/markdown_4/imgs/img_in_image_box_396_240_596_724.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A49Z%2F-1%2F%2F8da8b8e4898f598ffaaa7d5dfc9a7ca11e55b163a625032ee90578fdaa998986\" alt=\"原书图示\" style=\"width:44%;max-width:560px;\" loading=\"lazy\"></div>\n<p>欲成漏尽金刚体，定照莫离欢喜地，</p>\n<p>盖道之精微，莫如性命。性命之修炼，莫如归一。古圣高贤，将性命归一之旨，巧喻外物，不肯明示直论，所以世之无双修者矣。</p>\n<p>余之所续图者，非敢妄泄也；是遵《楞严》之漏尽，表《华严》之奥旨，会诸经之散言，以归正图，方知慧命是不外乎窍矣。且此图之所立者，是愿同志之士，明此双修之天机，不堕旁门；方知真种由此而怀，漏尽由此而成，舍利由此而炼，大道由此而成。</p>\n<p>且此窍也，乃是虚无之窟，无形无影。炁发则成窍，机息则渺茫；乃藏真之所，修慧命之坛，名之曰海底龙宫、曰雪山界地、曰西方、曰元关、曰极乐国、曰无极之乡；名虽众多，无非此一窍也。修士不明此窍，千生万劫，慧命则无所觅也。是窍也，大矣哉！</p>\n<p>父母未生此身，受孕之时，先生此窍，而性命实寓于其中；二物相融，合而为一，融融郁郁，似炉中之火种，一团太和天理，故曰先</p>\n<p>天有无穷之消息，故曰父母未生前。炁足胎圆，形动胞裂，犹如高山失足，因地一声，而性命到此则分为二矣。自此而往，性不能见命，命不能见性，少而壮，壮而老，老而呜呼！故如来发大慈悲，泄漏修炼之法，教人再入胞胎，重造我之性命。将我之神炁，入于此窍之内，合而为一，以成真种；如父母之精炁入于此窍之内，合而为一，以成胎孕，其理一也。</p>\n<p>夫窍内有君火，门首有相火，周身为民火。君火发，而相火承之。相火动，而民火从之。三火顺去，则成人；三火逆来，则成道。故漏尽之窍，凡圣由此而起；不修此道，而另修别务，是无所益也。所以千门万户，不知此窍内，有慧命主宰；向外寻求，费尽心机，无所成矣！</p>\n<p>法轮六候图 第二</p>"}, {"id": "hm_tu2", "bookId": "huiming", "bookTitle": "慧命经", "title": "法轮六候图 第二", "content": "<p>法轮六候图</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//4d06aba1-5beb-42af-8de1-d6e2fc21b865/markdown_0/imgs/img_in_image_box_321_792_584_1253.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A45Z%2F-1%2F%2F2de0957e00fdaecb663c24b50e514293058144038eeb6bd0fb8188631d2cc8ae\" alt=\"原书图示\" style=\"width:58%;max-width:560px;\" loading=\"lazy\"></div>\n<p>一刻会源头。五候元机莫外求。</p>\n<p>现出西方极乐城。消息呼来往地归</p>\n<p>下部</p>\n<p>慧命经</p>\n<p>且道之妙用，莫如法轮。运行不蹊，莫如道路。迟速不等，莫如规则。限数不差，莫如候法。</p>\n<p>是图也，大备法全，而西来真面目，无不在此矣。且其中之元妙行持，莫如呼吸；消息往来，莫如阖闢；不外道路，莫如真意；有所起止，莫如界地；舍己从人，备著此图，全泄天机。愚夫俗人，得之亦无不成也。</p>\n<p>苟无其德，纵有所遇，天必不附其道。何也？德之于道，如鸟之羽翰，缺一无所用也。必须忠孝仁义，五戒全净，然后有所望焉。而其中精微奥妙，尽在《慧命经》中；两相参看，无不得其真矣。</p>\n<p>任督二脉图 第三</p>"}, {"id": "hm_tu3", "bookId": "huiming", "bookTitle": "慧命经", "title": "任督二脉图 第三", "content": "<p>任督二脉图</p>\n<p>休忘白脉法轮行。检点明珠不死关。</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//4d06aba1-5beb-42af-8de1-d6e2fc21b865/markdown_1/imgs/img_in_image_box_380_637_585_1185.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A46Z%2F-1%2F%2F2bfb40e6fe469d1c93f94cf36f5323594b5126db8e7a344ae401cc319c97819e\" alt=\"原书图示\" style=\"width:46%;max-width:560px;\" loading=\"lazy\"></div>\n<p>现出元关消息路，常教火养长生窟，</p>\n<p>盖此图与前二图原是一也，所重续者，何为？是恐修道之人，不知自身有法轮之路道，故备此图，以晓同志耳！盖人能通此二脉，则百脉俱通矣。所以鹿之睡时，鼻入肛门，通其督脉；鹤龟通其任脉；三物俱有千岁之寿，何况人乎！修道之士，既转法轮，以运慧命，何患不长其寿，而成其道也。</p>\n<p>道胎图 第四</p>"}, {"id": "hm_tu4", "bookId": "huiming", "bookTitle": "慧命经", "title": "道胎图 第四", "content": "<p>道胎图</p>\n<p>忘形願里助真灵。</p>\n<p>一年沐浴温。</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//4d06aba1-5beb-42af-8de1-d6e2fc21b865/markdown_2/imgs/img_in_image_box_291_603_551_1067.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A47Z%2F-1%2F%2Fffbe9b40966a3f5fa862a061f1591d3a8cc9098c9dd60c05bb4733619b93b0d4\" alt=\"原书图示\" style=\"width:58%;max-width:560px;\" loading=\"lazy\"></div>\n<p>有法无功勤照彻，</p>\n<p>十月道胎火，</p>\n<p>且此图《楞严经》原本有之妙旨，俗僧不知道胎者，因当初未续图之过耳！今以阐扬，修士方知，如来有道胎真实之工夫在矣。盖胎者，非有形有像，而别物可以成之；实即我之神炁也！先以神入乎其炁，后炁来包乎其神，神炁相结，而意则寂然不动，所谓胎矣。</p>\n<p>且炁凝而后神灵。故《经》曰“亲奉觉胤”；二炁培养，故曰“日益增长”；炁尽胎圆，从顶而出，所谓“形成出胎，亲为佛子”者矣！</p>\n<p>出胎图 第五</p>"}, {"id": "hm_tu5", "bookId": "huiming", "bookTitle": "慧命经", "title": "出胎图 第五", "content": "<p>出胎图</p>\n<p>念灵无念即菩提。</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//4d06aba1-5beb-42af-8de1-d6e2fc21b865/markdown_3/imgs/img_in_image_box_295_381_630_903.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A48Z%2F-1%2F%2F5756bb10af5ba28f14092673891b38f5f3988df6918b3325509be7375a9c0e55\" alt=\"原书图示\" style=\"width:74%;max-width:560px;\" loading=\"lazy\"></div>\n<p>百光景耀假神凝。</p>\n<p>身外有身名佛相，</p>\n<p>千叶莲花由炁化，</p>\n<p>《楞严》咒曰“尔时世尊，从肉髻中，涌百宝光。光中涌出，千叶宝莲。有化如来，坐宝花中。顶放十道，百宝光明。皆遍示现，大众仰观。放光如来，宣说神咒。”者，即阳神之出现也；故名曰佛子。</p>\n<p>苟不得慧命之道，枯寂口禅，焉有自身之如来，坐此宝花，放光之法身出现者哉！或谓阳神小道，焉得世尊小道乎？</p>\n<p>此即泄《楞严》之秘密，晓喻后学。得此道者立超，允不落凡尘矣。</p>\n<h5>化身图 第六</h5>"}, {"id": "hm_tu6", "bookId": "huiming", "bookTitle": "慧命经", "title": "化身图 第六", "content": "<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//4d06aba1-5beb-42af-8de1-d6e2fc21b865/markdown_4/imgs/img_in_image_box_235_302_594_1142.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A48Z%2F-1%2F%2F0373d0a8f6d3bd2574f9199cc15543bd1172d56e3df077ea58d4e1f4258d241a\" alt=\"原书图示\" style=\"width:80%;max-width:560px;\" loading=\"lazy\"></div>\n<p>共灵显迹化虚无。</p>\n<p>下部</p>\n<p>慧命经</p>\n<h2>面壁图</h2>"}, {"id": "hm_tu7", "bookId": "huiming", "bookTitle": "慧命经", "title": "面壁图 第七", "content": "<p>神火化形空色相，</p>\n<p>心印悬空月影净，</p>\n<p>性光返照复元真。</p>\n<p>筏舟到岸日光融。</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//a97d77a3-a456-4ca7-9b9a-97058647a797/markdown_0/imgs/img_in_image_box_315_385_599_895.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A49Z%2F-1%2F%2F5a052f8b2d3c7c49046fc1e7c10197b9710c124f91858d11cd695b24fddaa1f6\" alt=\"原书图示\" style=\"width:64%;max-width:560px;\" loading=\"lazy\"></div>\n<p>一片光辉周法界，</p>\n<h4>虚空粉碎图</h4>"}, {"id": "hm_tu8", "bookId": "huiming", "bookTitle": "慧命经", "title": "虚空粉碎图 第八", "content": "<p>不生不灭，</p>\n<div class=\"book-image\"><img src=\"https://pplines-online.bj.bcebos.com/deploy/official/paddleocr/pp-ocr-vl-15//a97d77a3-a456-4ca7-9b9a-97058647a797/markdown_1/imgs/img_in_image_box_314_520_521_724.jpg?authorization=bce-auth-v1%2FALTAKzReLNvew3ySINYJ0fuAMN%2F2026-04-02T01%3A00%3A49Z%2F-1%2F%2Fe22ab2132766f913911208335dc67ff131aaa5b91c6f2ff43cfe854e3251cb88\" alt=\"原书图示\" style=\"width:46%;max-width:560px;\" loading=\"lazy\"></div>\n<p>无去无来。</p>\n<p>虚空朗彻天心耀，</p>\n<p>双忘寂净最灵虚。</p>\n<p>云散碧空山色净，</p>\n<p>海水澄清潭月溶。</p>\n<p>慧归禅定月轮孤。</p>"}, {"id": "hm_9", "bookId": "huiming", "bookTitle": "慧命经", "title": "集说慧命经 第九", "content": "<h5>集说慧命经 第九</h5>\n<p>华阳曰：成佛作祖是本性灵光，不得慧命漏尽，不能了道，直入于如来之太空；盖本性灵光者，其名虽二，源头则一也。在定则谓之性，定中慧照则谓之光矣。慧命者，乃如来当初所取以示人之名也，是西方之梵语；中华曰人之本源；儒谓之先天炁也。是修佛之舟梯，作祖之权柄，即孟子所谓善养浩然之气者，是也。漏尽者，即世尊以示阿难所修之名也，亦是西方之梵语；中华曰走漏；儒谓之走精；医谓之泄元炁。而漏尽，即慧命之所化，当其未动之先，本是命也。及其动，而不知其修炼，出关则化为有形之漏尽矣；故儒谓之炁化精也。当其童真之时，坚固之体，原无漏尽之名。圆陀陀、光灼灼。此时若遇真师，不用漏尽之法。只要将此圆陀陀、光灼灼之慧命，收归中宫，时时惺悟、刻刻觉照，护持十月道胎，养成佛体，即《楞严经》所谓“既游道胎，亲奉觉胤”。功勤炁尽，自然出胎。到此法身广大，即《楞严经》所谓“形成出胎，亲为佛子”。此即谓之顿法矣。若夫十六岁以后，命宝满足，足而自漏矣。从此以往，炼至无漏，故如来谓之曰漏尽矣。世之学佛者，若不虚心求师，指点火化之真诀，任尔打七参禅，长坐行持之流，万无所保。既无所保，焉有道之可成哉？故《华严》云：“不求此妙法，终不成菩提”。是以如来发大慈悲，示人下手接续添油之法；补足圆陀陀、光灼灼之慧命，再皈中宫；此乃谓之渐法矣。故光明如来云：“老僧会接无根树，能续无油海底灯。”且又当勤勤修炼，非一朝一夕能成道也。故世尊谓阿难云：“第一漏尽难成。”而漏尽又是佛所喻之别名，乃此篇修慧命之法也。若修性不修命，习气难消，纵然能到愀愀相，无非五通之鬼，不能契如来之六通。所以《大佛方等大集经》云：“修习五通，既修习已，垂得漏尽，而不取证，何以故？悯众生，故舍漏尽通，乃至行于凡夫地中。”太空者，法性圆之虚极也。故《华严》云：“性如虚空。”即邵子所谓“道通天地有形外，思入风云变态中。”是也。而慧命漏尽，不得风火炼法，不能和合凝集而成大道；风者，是助火之烈焰。火者，是化物之能功。故如来云：“微风吹动。”又云：“火化以后，收取舍利。”风火漏尽并用，自然和合凝集而成大道矣。是以佛法次第用工之真传，</p>\n<p>岂无凭证，且真实之道，则有真实次第之工夫。如或前后混杂，非如来之道也，乃旁门外道而已矣。且次第者，如下手时，有和合真种之功；如转手时，有修炼舍利之功；如了手时，有温养道胎之功；如撒手时，有出胎面壁之功等法是也。然而次第非敢妄论，是集佛祖次第用功之秘文，攒凑逐节以为凭证。每句之下添一注脚，喻晓同志，概而证之，则无所误也。妄以一言半句而为道哉？如今之禅门，自己尚未得真传，妄以化人：或曰父母未生前，或曰念佛是谁，这等婆婆妈妈等之言语，哄弄世界愚夫愚妇，东问西寻，谓之参求佛法；到头一场空劳，何足为道哉？志者观之，真谓之老婆禅、口头禅、是非禅、皮壳子禅、衣食之禅耳！且千古至今，莫不以盲引盲，坑陷无数之善信，深入九泉，竟不能出头见佛之光华矣！盖佛法，自汉明帝始入中华。前秦始皇，却有梵僧来，始皇送还不用。由汉以来，谬妄莫知其数，幸遇达摩来此土，以证其非，单传六代。自六祖至今，非上又非，谬外更谬；所以有九十六种外道，二十四观之旁门。独有打七一门，是害人之毒药，埋人之火坑；释教西方二十八祖、东土六代，原无此门，乃高峰门人诬捏。况高峰所习，乃是闭息之旁门，非如来之正道。或问曰：何见得也？答云：高峰自曰忍饥寿昌金粟是也。但看打七门人，个个吐血，不但不成大道；反得劳症，苦恼而死，岂不痛哉！是人身气血脉络尚且不知，焉得知其道乎？夫人身日间劳倦，全靠夜静安神，以待后天心肾交和，为滋养此身之根本。苟教人七七昼夜，劳倦不睡，为之大道，安有不得其症者之害也？医曰：凡人七夜不睡，则心肾不能交，必得劳症。何况七七乎？又加打其脊络，伤其脏腑。呜呼！此刑自唐帝解之后，至今不敢妄用矣。帝当初见受此刑者，十有九死。阅诸医书，谓人五脏俱有脉络，系于脊之总络，以通其气血，为运行养形之本。一打此处，即阻其气血，逆而上行，就是庐医扁鹊，莫能救之。故解其刑，以杖臀为之责也。又或以黄绻之上，续某僧某僧之名字，谓之传法，以假传假，迷惑世人，坑陷初学；又加口头禅之语录，遍满世界；纵有励志，无所觅求。以为佛祖是皆天生，亦以虚劳空死。如此，将佛之光华，竟变为黑暗矣！盖大藏之法宝，本是全旨，奈因当初学者，学有浅深，根有利钝，遇此前后混杂，实不肯成其逐节之次第也！且大藏之教，有权法；有实法；有无</p>\n<p>为法；有有为法；岂可一概论之？是在人之学与不学耳。所以然者，性命双修之道，即在其中矣。而后来诸祖所得以成者，亦不肯并泄而同论，且后来诸祖，有所得授而成者，不肯公同大众。以权法制伏俗僧，谓其悟性，免其多事，而生别念。实法有悟知者，私附密授，故为教外别传，另通消息。如世尊不传堂弟阿难，私付与迦叶为一祖。如五祖不传首座神秀，私付与侍者惠能为六祖。是以成佛作祖之大宝，岂传无志之人！必要有超乎佛祖之志气，知晓那边道理，方可付之。故佛法之秘，宜世所难闻也！是以不肯并泄而同论。或显于无为而隐于有为；无为者，是养道胎面壁后半之法；非今之俗僧以枯坐之无为也。其有为者，即凝集和合，修慧命前半之法；有凭有据，乃先天意炁之妙用，非世间之有为也。故《宝积经》云：“一切诸法，悉如幻化；是中却有一法，和合凝集，决定成就。”又《经颂》云：“大士修行解脱门，转益慈悲求佛法。知诸有为和合作，志乐决定勤行道。”又《经》云：所谓二乘，堕于无为广大深坑，不能超脱证果。古德云：“有为虽伪，弃之则功行不成；无为虽真，趋之则圣果难证。”今之禅门，闻之有为，谓之著相，弃而不取。殊不知此有为，乃定静之中妙道之有为也。譬如天地，是个无为；而天地所以生万物者，是个有为矣；则最上一乘之佛法者亦然。而人之心，能到无为之时，则内里有一物，超然而出；若不以意取之，此物岂不散于外境？即非我所有矣。如此取皈之法，故名之曰：有为法矣；即六祖所谓“往北接度”者是也。或显于无物而隐于有物；无物者，乃后半之性功也。有物者，即前半之命功也。今之假禅道，闻之有物，莫不厌之。殊不知此物者，道之根本，法之津梁，人人本有；即非思虑之物，乃元关内之物也。故六祖云：“吾有一物，无头无尾，无名无字，无背无面。”又，傅大士云：“有物先天地，无名本寂寥。能为万物主，不逐四时凋。”乃先天之物也，宰育后天。散则无形影，聚则成舍利。故圆悟云：“何物高于天？生天者是。何物厚于地？育地者是。何物宽于虚空？包虚空者是。何物超佛越祖？植佛祖者是。”乃化育之本，物我同途。故曰物我同一大父母者，即此矣。顺去生人生物，逆来成佛成祖。顺去则物我同知，逆来非师莫能晓用。故云峰禅师云“有物密救人，争奈人不知”，即先天纯阳至刚之炁也。散之乃在一身，促之即在玄关。故寒子云：“可贵天然物，独一无伴侣。觅他不可见，出入无门户。促之在方寸，延之一</p>\n<p>切处。你若不信受，相逢不相遇。”大则包藏法界，细则粟米微尘。所以云峰禅师云：“盖天地，撮来如粟米粒大。”虽然如是，先必须和合凝集，而后有物。世尊谓之菩提种子，法华会上龙女所献者，即此物也。或显于无事而隐于有事；无事者，是祖师所制伏众人之法耳，乃小乘法也。有事者，祖师隐藏密授，乃上乘法也。无根凡夫，不能信受。故世尊云：“我于五浊恶世，行此难事，得阿耨多罗三藐三菩提。为一切世间说此难信之法，是为甚难。”又云：“世尊如此之事，世所难信，而祖师若与下根之人说破，反生非言。”故《法华经》云：尔时佛告舍利佛，止不须复说。若说是事，一切世间诸天及人，皆当惊疑。又云：唯此一事实，余二则非真。且有事者，又非旁门之事也，即元关机动物产之事矣。以我之意宰之，以呼吸收之，和合真种，转运法轮，採取熏炼，总是意同呼吸用慧命矣。故名之曰有事者也。慧命即元炁之别名。元炁生时，若不收取，岂不散耶？故兴阳禅师云“进一步则迷理，退一步则失事”，即此也。或显于小乘而隐于大乘；小乘之法，乃禅师所施之权法也，曰参禅打坐，曰念佛看经，种诸善根之因果。大乘之法，即祖师受记之密语也，曰慧命寿命，曰漏尽马阴，是超凡入圣之佛果。此以上言道之大概而已！或有言之易而喻之浅者；当逐节以熟玩，不可冒视也。参悟无疑，再求印证；使徒执其偏见，取宗于妄人之口，何其诬耶！浅易之言，即性命之真方。未得诀者，难以晓悟。必须前后凑合，究竟层次，再求真师印证，免误此生之空修也。若今之丛林所传所证者，非如来之正法，乃黄绻上所传，某僧某僧之名字，谓之佛法，若认则误也。此乃六祖之后，未得真传者，妄人所捏，争方丈之计耳。哄弄后学，误了多少善信。既非佛法，乃争讼之端也。</p>\n<p>余故曰：</p>\n<p>脱俗离尘觅过知，古云：欲往山下路，且问去来人。过知者，是得诀之人，或已成，或未下手，然而其诀则一也。</p>\n<p>断淫悟道贵真师。且断淫者，即《楞严经》之首戒，成佛之津梁。苟为释子，袈裟锡杖，不断淫机，谓之修道，岂不取笑儒道之高人乎？外面虽威仪，内里与物无殊，真可耻矣！且断淫</p>\n<p>一事,若不求真师,将何法断之? 凡求师者,先问此法起首,余此俱是旁门也。</p>\n<p>与我身心难自规。今之释教，无非看经念佛、参禅打坐、打七问话头而已，余此之外，无所为也。此乃黄叶止小儿之啼，与我身心有何益乎？</p>\n<p>格外高谈非至道，今之学佛者，不得正传，开口便曰某菩萨、某佛祖。自己无能，将此婆婆妈妈等话，哄弄愚人。又曰：某僧死已得道，某和尚死已得大道。若教死已得道，天下死尸尽是得道之汉。殊不知得道者，在生能为无所不有之变化，方为至道矣。</p>\n<p>片言暗点是良医。片言乃老实之话，非文字之长篇，亦非花言巧语。故五祖所谓“师师密付本音”。暗点者，如五祖三更点与六祖，如世尊在舟点与迦叶。凡得真道者，疑病尽去，藏教之经文，无不通达，故曰良医矣。</p>\n<p>得来暂试从头看，</p>\n<p>一刻工夫果自嘻。既得真诀，且从下手修起。如果若是真道，淫根一萌，以心凝而宰之，以呼吸而吹之，不要一刻工夫，淫根自缩，意炁自合，心静身爽，果自暗笑矣。</p>\n<p>抑闻之《心经》曰：“观自在菩萨。”华阳曰：此乃如来天恩，教人起手双修性命正法之切境。奈何凡夫不得真传，便谓以念观念，谓之观自在菩萨，则错谬矣。殊不知，此念乃缘习所有，识种所结，非道之本源。故程子所谓“正道定理，果是心乎？抑非心乎？”此所示人，另悟消息之至矣。夫观与菩萨，乃如来妙喻二物双修之嫡旨，何得一物也？若此念谓之道，则逍遥矣。故《圆觉经》云：一切众生，妄认四大为自己身相，六尘缘影为自己心相。又，元·妙宗一云：“灵台智性，这个是生死根本。妄想缘气，只因前尘而有分别。”故传法如来曰：“空王殿内无踪迹。”若认为真实，则菩萨依旧埋藏九地，不得出头变化成如来之妙相，空费此生一大因缘矣。且此念，乃心中之阴</p>\n<p>炁，识神之变化，万劫千生，原是他摄裹菩萨，迷弄往投贪尘爱欲，不得解脱，所以不得证果。转劫迷失，皆因不知菩萨出处，妄认此识之误也！故景岑禅师云：“学道之人不识真，只为从前认识神。无始劫来生死本，痴人唤作本来身。”又，南泉禅师云：“心不是佛，智不是道。”马祖又云：“即心是佛，乃止儿啼也。”岂不误哉？且今之学佛者，闻之心不是佛，智不是道，岂不落空亡，茫然无主哉？问曰：何所修炼？答曰：观，乃我正念中之灵光耳。未得真传者，谓之本性。且菩萨住居净土，二物所隔八寸四分远，非观莫能相会。即下文所谓“和合凝集，决定成就。”是也。而菩萨即是慧命，实谓之佛性。自离母腹，团地一声之时，观与菩萨，两自睽隔。且菩萨隐而深密，若不求师亲指，纵有聪慧灵悟，莫能见之；所谓“道心惟微”。自此而往，昼夜谋务，聪明智慧，无不是识神用事；故祖师云：“汝无佛性。”所以如来发大慈悲，教大地众生，时时刻刻观照此菩萨。菩萨所得受此灵光之慧力，久则自然如梦觉。融融然似熏蒸，活活然如盆珠，豁然灵惺，放大光明。力足时至，忽然一涌潮上，与我识性合而为一。到此识性死而佛性灵显，灵灵当当，依旧是个主人。光周沙界，六通俱全。任他尘尘垢垢，我独安然一性，圆融太空；所谓“一切含灵，俱有佛性”。虽然如是，顺去生人生物；逆来成佛成祖；凡圣之变化，总是这个，所谓“一物一太极”。有此太极，知觉言语；无此太极，眼垂口闭。医谓之真火，实无形无影，而藏之脐后肾前稍下，空悬一穴；古谓之净土、家乡、极乐国、妙有真空。有此真火，蒸熏有形；无此真火，息断形坏。六祖所谓“心是地，性是王，王居心地上，王在身心在，王去身心坏。”然此心，又非肉团之心，乃道心也。故曰“道心居于北极而众星拱”者，即此矣。天下学佛者，不修此菩萨，而另外别有道可修乎？若有所修，尽属旁门外道而已；即非观自在菩萨之道也。《宝积经》云：“和合凝集，决定成就。”此乃世尊之密语，大藏一教之秘文；即性命双修之法宝，故曰决定成就。奈何此道，自汉明帝至今，并无一人宣讲。独有达摩、寂无二祖师密受，故肉身俱已变化，亲登太空，允证金身。达摩微露，而寂无著诸经典，阐扬此道。奈门人藏闭其书，余今解明备全。愿同志者，概而证之，免堕旁门，得疾病而夭死，早成乎大道矣！夫和者，乃心中之阴炁，去和肾中之阳炁；阴炁得此阳炁，则有安心立命之所；故曰和矣。合者，是肾中之阳炁，承受心中之阴炁；阳炁受此阴炁，则</p>\n<p>成敛收坚固之体；故曰合矣。《易经》所谓一阴一阳之谓道，偏阴偏阳之谓疾。古往佛祖，必须性命双修，不曾偏枯。且凝者，是凝神之法。集者，是集命之方。命不集聚，不成菩提。即孟子所谓“集义而生”也。此乃性命并修，养神养炁，简而易成。但人不知双修，故如来曰“和合”是也。且人自离母腹，神则不能顾其炁，炁不能顾其神。神藏于心，发于二目，而七窍共用，是逐日而上耗；炁藏于肾，发于淫根，夜静而下耗；禀受能有几何哉？耗尽呜呼。若不求师指点凝集，纵修，无非此心中一点阴神耳！殊不知此神乃纯阴，不能独立成乎至道。故世尊教人二六时中行止坐卧，以念收敛微细之神，凝入于命中。命得此神，犹如臣得君主，拱伏自定，不敢私自偏枯外耗。如此用工，再加晓悟后面探收阳生之法，少年不过月期，中年不过三五月，则命窍之中，不觉无中生有，莫知所之。忽然真机发动，其快乐之妙，不可以言语形容。到此，当自保守，速转法轮。故如来还世人一个当头，汝等若依我此和合凝集之法修炼，决定成就矣。《六祖坛经》曰：“有情来下种。”盖情者，乃修慧命下手一著之天机。若无此情，万不能成佛果。譬如农家无种，欲望收成，岂不愚乎？今之禅僧，不得成佛者，实不知此情之过耳！昔日五祖，先世为栽松道人，所求四祖之道，四祖视其形骸老而无情，乃谓曰：“汝转一转来。”道人果自立亡，转而自投周氏，再得正道。且道人既可立亡，不用父，以自投怀胎，足谓之道矣而又求个甚么？马祖云：“不是物”。又六祖曰：“淫性即是佛性”。其二老泄尽天机矣！故龙牙禅师云：“人情浓厚道情微，道用人情世岂知？空有人情无道用，人情能得几多时？”且此一情字，自汉明帝到今，注者纷纷。苟不得慧命之法，便谓此情乃世情之情；学两句套语，机锋话头，谓之得道，哄弄愚人；万世之下，明眼人见之，可取笑矣。既然是坏物，焉得五六祖当时习而哄后人乎？盖五六祖乃如来嫡传。慧命之道，闭而不传与无德者，有之。或问曰：此情是个甚么？华阳云：此情乃慧命之化育，即元关顿开之机缄。其慧命虽藏在元关，静则发生，往外附与外形而起，与我心中之意，偶有知觉焉。是以外形兴动，则谓之情也。故闭阳关法，如来曰：“不识动静，学道无益矣。”又问曰：何谓之下种？答曰：此情，乃生人成佛之顺逆，造道之端，非真意不能逆归。凡学佛之士，既晓形动之机，将我静中之真意，凝入于命宫，时来时凝，久则天机发动，不觉命宫产出菩提；故</p>\n<p>曰下种矣。又问曰：何所修炼？答曰：既知凝法，当知炼法。炼者，火也。火非风不能焰灼，亦不能化物。故世尊云：“微风吹动”。又云：“火化以后，收取舍利。”凡学之士，必当使呼吸之风，逆吹命宫之真火，即将所发生往外之慧命，以息摄回本地；凝凝然似炉中之火种，绵绵然如风箱之往来，薰之炼之，使有形化而为无形。知而修炼，不但本宫慧命不外耗，反得此动机，补助我之慧命之不足处。即儒所谓“造化生生无穷”。久则命基满足，又谓之寿命不死矣。故如来度迦叶，谓不死阿罗汉者，是也。又《摩诃般若波罗密多心经》曰：“时。”盖诸经之句法，都有双意数字，独此曰“时”，岂不怪哉？此乃如来嘱咐后人，惺悟“时”，之至切、至切矣！且时者，又非时候之时也，即禅静中萌动之时矣。古德云：“若言其时无定时，清风朗月自家知。”儒云：“月到天心处，风来水面时。”诸翁虽然妙喻，发其天机，却总不肯说出是个甚么时来，且教人将何所用乎？余不惜罪过，与诸人通一线，免堕旁门，早证道果，岂不妙哉？夫时者，即吾身中慧命自动时也。古德谓之“活子时”。其生之机，形如烈火，壮似焰风，非师传授意息，莫能制伏。别名猛虎，专吞人之性命，吸人之骨髓。任他三教英雄豪杰，不得真传者，无不被他所丧矣。古之志士高人，必先伏此猛虎，始得成其道果。然而其发动之形容，薰薰乎如浴之融暖，烈烈乎似火之将炽，一派壮旺强烈之性，薰蒸下行于淫根，威镇独立；周身之精华，无不听令于他；医家谓之外肾兴。成佛作祖之妙诀，即在此下手矣。若得真传，何必又疑惑哉？且时者，释教之秘也。至切矣！世尊曰：“于竭陀龙宫说法。”上文一节言时所用之实处，无不在其中矣。又恐世人落空，故此专言真实之所，使人下手则不落空矣。盖龙宫者，西天梵语之譬喻也。中华名曰丹田，又曰炁穴，医曰精窍。其名亦多：西天又曰净土、曰界地、曰苦海、曰海底、曰极乐国、曰优陀那，其名众多，总是和合真种之处也。所以《天台止观》云：“梵语优陀那，此土丹田是也。”故近代得道者，恐人不悟，又曰炉矣。此乃祖师慈悲示人切近之妙喻，使人知有实所。譬如铁匠欲成锋芒美器，非炉莫能成功，修炼亦复如是。盖炉何也？化形成物之所，其法易明。故《心经解》云：“收来放在丹炉内，炼得金乌一样红。”光明如来云：“炉中火发。”又云：“炉中发火泄天机，不悟西来即是迷。”是也。圆通禅</p>\n<p>师曰：“北斗里藏身。”北斗，即上文龙宫是也。藏身，即前文凝集是也。祖师教人，常将我之真念，藏于北斗，则心自空，命自固矣。故傅大士云“心空及第归”是也。寂无禅师曰：“凝神收入此窍之中，则炁随神往，自然归于此处。”且寂无得如来、达摩之全旨，慧命之嫡传，故能隐显莫测，变化无穷。雍正年间，屡在太邑化阳身数十，家家有个寂无，谈笑饮食；隐则无踪。或与人金银美女，或显虎狞水火，从学之徒，凡心欲念无不消焉！盖凝者，移也。窍者，即丹田也，亦曰炉矣。此表炁之所发，当用功之时也。盖炁之动，附于外形而出，若任其出，将何为道本哉？所以祖师示人，此时速凝神入于丹田，炁得神之翕收，则炁亦归矣。且此炁者，又非呼吸之气，乃先天之炁也。即孟子所谓浩然之炁者矣！此炁自我释教诸得道之宗师，不肯泄漏，尽是譬喻外物，使人自悟。有明白者，然后密付，故曰教外别传。炁之别名，释教曰柱杖，曰锡杖、曰禅那、曰摘芦、曰白雪、曰金莲、曰散果、曰洞水、曰海水、曰明星、曰西江水、曰曹溪水、曰水牯牛、曰海底灯、曰炉中火、曰牟尼珠、曰海底泥牛、曰海底明珠、曰海底开花、曰炉中香烟、曰事、曰物，众名纷纷，不可胜计，究其实事，无非此一炁也。故黄叶禅师参求六祖得道，修炼功圆之时，自叹惜曰：道无非炁也！此一言泄尽天机矣。又曰：“功夫不间断，息息归此，或一月二月，便能自觉窍中融融，暖炁旋动。”息者，呼吸之气也。佛喻之风矣，亦名柱杖，犹如老年傍杖而行。修慧命者，若无此息吹嘘，漏尽不化，舍利不成。故禅师云：“未到水穷山尽处，且将作伴过时光。”是也。盖人呼吸之气，原根本在丹田，但人只知出，不知进耳。得真传者，丹田之神，能以接息。故禅师云“无孔笛颠倒两头吹”，才得神炁相合，久则自暖，法轮自转。一月二月者，年老年少之分别耳。少年月内，炉中自有效验之机发；年老或数月方有浑合之信至，暖炁才有动机。净光如来曰：“金童一惺弃皇宫，不觉犀牛法海中。欲要觅他归故里，灵山塔下始知踪。”太子即世尊也。世尊思修，有天神变白马，乘太子出皇宫，腾空而至雪山，自金刀落发。先未得真传，以修旁门，所以漏尽无成，形骸尪羸。后得阿私陀，以传慧命之正道，始成佛位。故《法华经》云：仙人授佛妙法，如来因之遂致成佛。又《释家谱》云：私陀见太子形骸尪羸，谓太子曰：可食牛乳，</p>\n<p>复其本元。太子果食其乳，依然复其三十二相，道果圆满，以求燃灯佛证之。世尊初下工夫，修炼至道，不待以数月期，忽见明星；自叹曰：一切众生皆有佛性，奈何不得斯道之过耳？世尊言佛性即慧命也。牛者，炁也。海者，即丹田也。欲觅此牛，其藏处在法海，他处则无矣。故曰：北斗里藏身。灵山，心也。塔下，即丹田也。如来教人修道，先修塔下，而后有牛来归故里之效验矣。故《藏经》曰：“人人有个灵山塔，好向灵山塔下修”。知踪也者，丹田之内，忽然无中生有也。不待他论，自意念中，觉知融暖和畅，一派春景，其乐无穷。即马祖所谓“达于皮毛，畅于四肢”矣。归者，还也。故里者，心田也。始由下、中归上，化识性为佛性，煅习念成正念。识死性现，朗朗一个主人，故曰归故里者也。圆通禅师曰：“群阴剥尽，一阳复生，欲见天地之心，须识乘阴之法。”群阴剥尽者，在年十一月，在人身为北海。一阳生者，在年为冬至，在人身为阳生。天心即阳生之所，邵子所谓“冬至子之半，天心无改移。”是也。欲见此心，须求炼法而后有可见之验。见，乃真种所产之法，即世尊见明星之见也。《楞严经》云：愿立道场，先取雪山大力白牛，可取其粪，以泥其地。且喻道场者，乃修佛道之起手也。阐牛粪者，即是炼慧命之根本矣。世尊教人修道，先修慧命；若不修慧命之纯阳，起手单修心中阴神，安有不遭《楞严经》阴魔之类乎？如今禅门修性而不修命，往往颠倒，反倒得疾病死。虽然口称顿悟十地三乘，往往到头虚老。不知雪山白牛粪之美处，空以磨砖作镜，妄以集雪为粮，误了几多少年。既无立命之基，安有性道可成之理乎？是以戏台上优人自称汉高祖、楚霸王矣。盖雪乃白也。白为西方之正色，是喻人命窍之炁也。故如来教人修西方极乐也，即此矣。而良医又明指之曰：两肾之前，空悬一白圈。先天性命水火，即在其中。无形无相，空空荡荡，慧命即在其中矣。若不速自修炼，焉得久居？奔名利而耗散，逐色欲而丧真。出家之人，念诵枯坐，则离炁耗神，是油干灯灭，不到半百而亡，故曰雪山矣。且命即元炁也。炁之刚而无比，色之白而无瑕，故曰大力白牛矣。炁之隐显，包乎天地，载乎万物；广而无际，细而无核；觅而无影，修而现前；超佛越祖，无不是此炁也！即孟子所谓“至大至刚”，岂谬言哉？然而炁之变化，年壮而自拱，静极而自生，不知保守，则以耗</p>\n<p>散，故曰粪矣。耗散朝朝如是，不早筑固，命根能有几何哉？即儒所谓“用之则成路，不用则茅塞”也。盖粪乃劈魔之至宝，成佛之阶级，不取粪而修，则十炼九空。譬如世人，欲起美屋，非其基地，安能居哉？且古之志人，知此粪之出处，静时而养，动时而取，收摄还我本地，用火薰炼，筑固自己基址，则谓之泥道场矣。但既有场基，又不可少善知识，时时刻刻，将我之真意，坐居其中，一念不起，八风安能摇动？即康节所谓“一念不起，鬼神莫知。不由乎我，更由乎谁？”独独惺惺，任他千魔百怪，我在这里隐身，安然自在。故曰：和尚坐道场，则不遭魔类矣。即阿难所谓“坐于中流水面，跏趺入灭。”是也。此篇注者如作者同一鼻孔出气者矣！《楞严经》又曰：“必使淫机，身心俱断，断性亦无，于佛菩提，斯可希冀。”且自古得道者，莫不先断淫机，而后能超佛越祖。世之为释子者，身心断淫之说，无不知之矣。独有淫机一字，举世罕知。不但不知修炼之法，而所以然者，身心亦不能实使其不淫也。何以故？且淫机一发，形如烈火，壮似焰风，苟不得其法，安有不牵连身心之忧患也？且若无其机，身心安然，无所忧患矣。故世尊知其机之利害，难以自了，是教人以使之。且使之者，非空使也，而必有使之法焉在矣。故察禅师云：“祖意如空不是空，灵机争夺有为功。”且此法至简至易，非夙有善根者，立面难闻。既无所闻，淫机焉有自断者哉？若不迅早虚心求师，任尔千修万炼，难免其患。所以近来丛林多有业障善知识者，不得其法，多有私下身前身后行淫，故毕书二大人将此等僧，充军问徒。是天谴其罪矣！问：淫机何物也？答云：淫机即是世尊所谓淫根也。根之形容在外，而机在内。不知修炼，焉有不牵连身心乎？即孟子所谓“炁亦能动志”之说。问曰：有何法制伏？答曰：得诀者，其机之将发，以神主使其机之自息。即孟子所谓“志者，帅也”。以呼吸摄之，使其炁之自归，即达摩所谓採取也。神即为火，息即为风，机发虽是炁，而内实有漏尽之资。若不在此锻炼，则又牵连身心矣。以丹田至脐为炉，以阖闢为箱，以火而炼，以风而吹，以暖信为效验，以畅快为无事，久久锻炼，则机自死，淫性自断，断性亦无，身心太平。三种淫事无所集有，于佛菩提，何难冀也？此乃万圣千祖不传之秘法，余今尽泄矣。为释之子，不修三种淫事，自谓善知识者，即《楞严经》五十三种之魔矣。又或谓余之错矣，后学者，且当本文证之，世尊岂有错乎？寂无禅师曰：“其机</p>\n<p>既发，凝神入于丹田，当用武火收摄而归，以薰以炼；机之未发，以神照之丹田，当用文火，不离而守，以烹以蒸。”似此悟入，才得真种发生。且机之发者，乃丹田之炁动也。既然凝神，则此机动，受神制伏，自然两不相离，如磁石之吸铁，隔碍潜通，和合为一矣。祖师又恐临时炁之生旺，猛虎难伏，故曰用武火。此真乃泄尽天机，慈悲至已尽矣。万世之下，学佛之士，无不沾恩矣。盖武火者，乃修道之密法，成佛之秘机，佛佛心受，祖祖口传，悟且甚难。故五祖云：“师师密附本音。”世尊、达摩虽有火化、风吹，二候之言，而文武之用度，未行竹帛。故世之无双修，而亦不能信。自达摩、寂无后，无有形神俱妙之高僧矣。问曰：何谓武火摄归？答曰：武火摄归者，乃呼吸之气，摄真炁归源，而又离不得真意之为主宰矣；故曰：一意驰二炁，鼓舞摄归；总在乎意之能耳。盖炁生，易下流顺出，故以呼吸摄之。若不借呼吸消息之鼓舞，则一神而难摄，炁亦难归。二炁原有兼用，故禅师云：“你有个柱杖子，我与你一个柱杖子”；即喻此二炁同用之机也。当呼吸之机，我则从阴跻迎归炉，即达摩所谓採取也。或十迎，或数十迎，外形倒则止矣。明此二炁阖闢之消息，则元炁自归炉矣。用二炁之时，炉中之意，不著于呼吸，依于元炁；採取不过借呼吸之机，以为採取之具；即六祖所谓“往北接度”是也。且元炁既归炉，又当薰炼，以意定而为火，以息嘘而为风，熔灼一时，漏尽之资，则尽化而为炁。放心安容，此乃武火之功也。问曰：文火何也？答云：文火者，不存而守，不息而嘘，时时刻刻不昧，惺惺绵绵不断，息息归炉。即古德云：“杖往杖来无间断，舍利成全合本初。”切忌昏迷散乱，一念不起，一意不散，犹如炉中火种。如此修炼，何患真种不生，舍利不产，大道不成哉？《释家谱》世尊曰：“对斗明星而悟道。”对，即中华名曰返观是也。斗，即北斗喻丹田是也。明星者，乃丹田之炁发晃是也，正是真种所产之景。所以兴阳禅师云：“匝地红轮透，海底亦开花。”即此矣。圆通禅师曰：“北斗藏身虽有悟，出尘消息少人知。”北斗藏身者，是藏神在此。而起手若不在此而修，则不能出尘矣。凡出尘者，即转法轮之消息。当转而不转，则种子产而无归，又废前功，即兴阳所谓“退一步则失事”。故曰：出尘消息少人知。此以上尽是言和合真种之法。此上数者《慧命经》之妙法，和合</p>\n<p>真种之天机，具在斯欤！而其风火之功，亦不外是矣。此总结上文，和合真种风火之法。古圣不肯全露，故人难悟大道，尽入歧路。余浅直解明，以晓同志；庶不误入外道，早成正觉。世之有好佛者，果潜心此经，自修自证，以成大道，岂不乐哉！予故曰：自始凝神返照龙宫，浑然而定静，以双忘而待动；以意炁而同用，以神火而化，以息风而吹；以武而炼，以文而守；久久薰蒸，刻刻无间，意炁两不相离，则和合凝集之法得矣！此总序和合所生真种之法。盖龙宫者，遵如来之梵音，此土名曰丹田。丹田之内有水，故曰龙宫。水性沉重，朝朝下流；神即是火，火性轻浮，刻刻上焰；世人沉下浮上，两离分散，故不能成其道。佛祖以火凝在水中，则心自空，火不焰上；水得火煎，水不下流，化而为炁；炁则自然上升。当凝神之时，内念不出，外念不入，空空荡荡，不著不滞，回光返照。直照至忘形忘意。但用意即是不忘，但忘即不能以意照之。“心无，不存之谓忘；欲无，不泯之谓照。”忘与照一而二，二而一。当忘之时，其心湛然，未尝不照；当照之时，纤毫不立，未尝不忘。忘照纯一，浑然定静，天地人我，莫知所之。且待而候动，不觉融融和和，外形勃起；以意迎炁而归；既归本地，以神注定其中，当以呼吸吹嘘；久则文火，勿忘勿助，行住坐卧不离这里；何患真种不产哉？</p>\n<p>不闻得道古儒之言乎：“恍惚阴阳初变化，氤氲天地乍回旋。”此以下言真种所产之时。古儒，即邵康节是也。予之释教，竟有无知无识者，谓儒不知大道。自打七参禅，口头三昧，谓之得道，诚可笑矣！不但儒闻而不视，高僧亦自夹鼻恐臭矣。盖恍惚者，静定之中浑然一团，外不见其身，内不见其心，恍恍惚惚。初变化者，即此恍惚之间，忽然不觉融融和和，如沐如浴。故寂无禅师云“六合同春乍”者，即兴阳禅师云“匝地红轮透”。回旋者，真炁旋动，正是元关透露，而真种产矣；有无穷之妙乐也。《六祖坛经》曰：“因地果还生。”地者，名净土，又名苦海，又名优陀那，巧喻异名，无非果生之处也。盖果还生者，因以前能明，有情来下种，和合之机，到此方有果也。果，即菩提子也，又曰舍利子。无量光明如来曰：“分明动静应无相，不觉龙宫吼一声。”无相者，释曰威音，儒曰无极。盖此物本来无相，</p>\n<p>因静定而生。龙宫者，即上文因地是也。吼一声者，即上文果生也。儒曰“杜宇一声春晓”，乃阳炁之所生也。能知此一声之机，则洞水可流，西江可吸，海水可灌顶也。古德云：“地雷震动巽门开”。又云：“雷从地响矣”。紫摩金光如来曰：“海底泥牛露半形。”海底，即我之丹田北海也，世尊名之曰龙宫，又曰恒河；兴阳禅师亦曰海底；是藏慧命之源窟，故曰海也。泥牛者，即慧命也。世尊名之曰牟尼，即我身中神炁和合所炼成之真种也。露半形者，乃真种将产之法象也。此时必须以静而待之，不可急于收取。任牛之自露全形者，方可兴功。不然念动牛惊，依然隐而无踪。圆通禅师谓：“太早生”。故寂无禅师云：“必须元窍生物，斯可阳炉发火。固莫为之先，亦莫为之后。”若夫机未至，而先助长，则外火虽行，内符未应，适自取焚躯之凶矣。奚可哉？圆通禅师曰：“梅花未发太早生，梅花已发太迟生。”梅花者，乃阳之首，而为报春之信也；即喻我身中阳炁所发之景矣。未发者，是喻阳炁将动未动也；此时如或妄採，而炁嫩则不升，故曰太早生矣。已发者，是喻阳炁已动也，此时即当取收归源；若不归源，炁则散而无依，故曰太迟生。圆悟禅师云：“进一步则迷理，退一步则失事”。诚所谓也！又曰：“怎么则风霜都吃尽，独占普天春。”怎么者，即喻时当令也。风霜吃尽者，是喻无阴炁之谓也。春者，阳也；是喻丹田一派纯阳之炁，其中景象如沐如浴，周身融和畅快，不可胜比。内外尽是阳春，乃真种所产生之真景也。又曰：“切须盗著。”此乃祖师嘱咐后人，如或见此景至，即当兴功收取。如或不收，则是当面错过，此物又行熟路。故兴阳云：“退后则失事”。诚有言也！岂不悟哉？故曰盗著。盗者，强夺也。当此之时切须勇猛，以我之意宰之，用我之息摄之，将此真种归于丹炉，而后再用法轮之功。寂无禅师云：“至于六合同春，物物得所。”且六合者，周身也。春者，喻周身之暖信也。物者，乃释教之别名；即儒所谓元炁也。功到时至，此物当产之时，不知不觉，忽然丹田融融洽洽，周身苏绵快乐；痒生毫窍，身心无主；丹田暖融渐渐而开，阳物勃然而举。忽然一吼，呼吸顿断；心物如磁石之相翕，意息如蛰虫之相含；不觉入于恍惚，天地人我，莫知所之。浑浑沦沦，又非今之禅家，枯寂无为。恍惚之中，心自不肯舍其物，物自不肯离其心，相亲相恋，纽结一团。其中景</p>\n<p>象，似施似翕，而实未见其施翕；似泄似漏，而实未至于泄漏；其妙不可以言语形容。故《心经解》云：“一阳初动，有无穷之消息。”少焉，恍恍惚惚，心以复灵；呼吸复起；丹田之炁，自下往后而行。肾管之根，毛际之间，痒生快乐，实不能禁止。所谓炁满任督自开，此之谓也。迅时速採归源，转大法轮。不然，此物满而又溢，则前功废却矣。盖此篇全泄天机，余三十余年方得妙道。后之修士，行工到此，切记！切记！毋忽却其中景象，但得二三，即是真种所产矣。固不必规规如此，而又在禀受形体有同异之别也！达摩祖师曰：“二候採牟尼。”此言採物归炉之候也。盖二候者，前活阳生时，谓之一候；累积阳满真种产时，又谓之一候，故曰二候矣。採者，此物产时仍行熟路顺下而漏，故用呼吸採之以归炉。牟尼者，物之别名，儒谓之元炁也。又曰：“二候採牟尼，四候有妙用，六候别神功。”前所谓二候者，是生与产之二候也；此所谓二候者，兼于採封之二候也；学佛之士，须当著眼，不可一概而论之。观其法轮六候图，则明白矣。盖此二候者，真种产时，以採归炉谓之一候；而炉中封固又谓之一候；故曰二候矣。既归炉矣，即当速升降牟尼，以转法轮，成其舍利。升为一候，降为一候，沐浴为二候，共之四候；故曰：四候有妙用。採封、升降、沐浴，总共之六候；归根温养舍利，无所事也，故曰：六候别神功也。六祖曰：“往北接度。”往者，以心去也。北者，丹田也。接者，以心接物也。度者，即升降往来也。寂无禅师曰：“採取以升降，从督脉上升泥丸，从任脉降下丹田。”任督二脉者，即法轮往来之道路也。任脉者，起于丹田前弦，循环腹里，穿二喉之中，上顶也。督脉者，起于丹田后弦，并绕脊里上风府，入脑顶，与任脉会合。二脉通时，则百脉俱通矣。採取由此而行，法轮由此而转。能识此道路者，则舍利子亦由此而成矣。《易经》曰：“阖户谓之坤；闢户谓之乾；一阖一闢，谓之变；往来不穷，谓之通。”此用二炁，转法轮之消息也。且释藏修道之经文，前辈所称者，《楞严》、《华严》谓之首也。儒所修道之经文，莫不以《易》谓之首也。太邑海会寺方丈龙江问曰：西方梵语，未见有《易》之说，今载此，不合释教之道也。答曰：苟执其一，不明其二；尔所修者，旁门而已，老昙之道。未曾望见，千百世以上，千百世以下，此人此心，三教岂有二道者哉？殊不知《易》之</p>\n<p>源头，乃道之祖也。问曰：既为道书，今时儒士，以《易》为时文卜筮之书，未闻其修道，何也？答曰：时文卜筮，乃在尘之儒耳，非出尘之儒也。且古之至儒，究先天之理，参阖闢之机，格物穷源，性命在我，不由乎造物，浑然天理，出乎众外，故曰儒矣。问曰：修道何也？答曰：道用先天，借后天之爪板，转法轮也。阖户即是吸机，吸机者往下也，故曰坤矣；阖户即是呼机，呼机者往上也，故曰乾矣；此乃后天一边之理也。变者，乾坤两卦之消息也。犹如御车然，乾坤为毂，变为轴，车本不能自运，惟赖两头之轴；两头之轴，又赖两头之毂；两头之毂，又赖阖闢之吹嘘；车待轴而转动，轴又待毂而运旋，毂又待阖闢之催逼，其用方全。如或不透，再参《六候图》中，无不尽其妙也。往来不穷者，即先天后天二炁转运之消息也。通者，通达元关乾坤共运之机也。若以口鼻一呼一吸，谓之往来不穷者，则去先天大道远矣。问曰：若何为哉？答曰：以后天之息，用先天之息也。呼机为阖，为乾；吸机为阖，为坤；乾坤者，天地之定位，在人首即为乾，腹即为坤。变乃乾坤中之主宰，即我之真意；使二炁转运机耳，犹如南北斗星焉。往来不穷者，即二炁之转运，尔来我往，犹如乡人织布之梭也；尔上我下，我上尔下，故曰：往来不穷。虽然如是，而先后又不可并主同重，升降之际，意虽主斗杓，其神重在先天同行，不过借后天阖闢之机，以运先天耳。又问曰：弟子愚蒙，恳求至理，方敢自用，但只是泄漏有过于言者？答曰：世尊云“度尽众生方自度”，焉得有过乎？况且释教，今时又无此双修。答曰：此乃转法轮之秘机也。千圣不肯明言，万祖不肯指破。妙中更妙，微中又微。非凡夫俗子可闻，非夙有善根者不能见之。又曰：弟子恳求和尚垂恩。答曰：阖吸虽是下坤，而坤腹之元炁过我升之，升之者，升于乾；阖呼虽是上乾，而乾首之元炁过我降之，降之者，降于坤；总是先后二个升降。面背中三条道路，共乾坤之毂轴，通元关之消息，而主宰在乎意，运行总在乎神。一吸一升，一呼一降，不可差之毫发。循规行途。数之限步，不可不及而太过；乾九坤六四揲成章。合乎造化，同乎轮转，不偏不倚，正正相当。任尔三教，是是非非，成乎其道者，不离此方。又曰：“乾爻用九，坤爻用六。”此言转法轮爪之规则限数也。乾用九者，四九三十六，一二三规次皆用四揲之。坤用六者，四六二十四，一二三规次皆用四揲之。且古，以后一规至六规为升，升合乾，故用乾爻、乾策：乾爻用九而四揲之为</p>\n<p>三十六，故法轮升亦用九同于四操；乾策总六爻之四操二百一十有六，故升总六规亦二百一十有六；称为升也。以前一规至六规为降，降合坤，故用坤爻、坤策：坤爻用六而四操之为二十四，故法轮降亦用六同于四操；坤策总六爻之四操一百四十有四，故降总六规亦一百四十有四；称为降也。合之得三百六十。而完一转法轮度数之义；但其中犹有沐浴二规，不用九六四操，则不满三百六十之义，只有三百。前言三百六十者，而沐浴不行阖闢，无数六十在其中矣。《华严经》曰：“诸佛定能应时，转妙法轮。”此乃沐浴二规之法喻也。定能应时者，即沐浴二界地也。儒谓之卯酉二时，释亦谓之时也。若不曰时，因何有应时也？定者，谓此二时不行呼吸，神炁相抱相守，定而再转。儒谓此二时，乃生杀之方，刑德相反，不宜有事，定守无所事也。且行法轮之时，而规规有沐浴法。问曰：只闻东西为沐浴，未闻规规有沐浴。请开示？华阳云：转法轮时，呼吸之气，如车水板一般，一板一板而运上，一板一板而退下。既有规则，焉得一息而运至于天耶？纵运亦不合法轮之辐爪，不成规则之步位。若此混运则道不成矣。问曰：弟子愚蒙，难以悟入，再求开示。答曰：行法轮之时，呼吸之气，有回转之机，就在此回转处而有沐浴也。问曰：何为沐浴？答曰：呼吸退为沐浴，呼吸进亦为沐浴，在前后之分耳。此古不泄之机。《释家谱》世尊曰：“入池沐浴。”池者，乃东西地也。世尊昔见明星之后，入此二池而沐浴；此时薰蒸乐者，即喻此二方也。此法自汉至今，得者藏秘，惟有寂无始露其法也。《华严经》曰：“为践如来所行之道，不迟不速，察谛经行。”道者，路也，即任督二脉也。不迟不速者，以呼吸定其法则。察谛经行者，凡行法轮，神炁必须同行同住。若泛然于道外而行，渺渺茫茫。不由道而循行，此不得成舍利。如来曰：“不得勤，不得怠。”凡行法轮合乎自然，同乎大道。若勤则太过而风大，法轮不能转运，而焰无所制；若怠则不及而风小，不能成长旺之功而变化也。燃灯佛曰：“常转法轮。”法轮者，西方之梵语，此土曰升降、曰进退，即真种运归源也。常者，凡真种产之时，必当运行一转；如若不运，则漏尽不能止，而舍利亦不成。又不可一转而不歇，虽无大害，亦迟其产机矣。世尊曰：“当转如是妙法轮。”且妙者，不可以言语形容，故曰妙矣。若夫无言，后学又从何所</p>\n<p>悟入？此两者在得师与不得师耳。大道最秘，谁敢全泄？余见世无双修之客，特指其是以示之，使学者尽其精微。夫妙者，消息也：知之者，最简最易；不晓者，实艰实难。譬喻自鸣钟，即法轮也；天地之造化，尽归于此。乡人不得见钟，但看水碓水磨，其理一也。问曰：钟与碓磨，何比道也？答曰：钟之锤即喻呼吸；钟内轮子即元炁。水冲者，喻呼吸也；转之者，喻元炁也。但碓磨消息似同，其法又未甚全；而自鸣钟以全大道之功。何谓也？碓磨只见其进，不见其退。钟内轮子，顺转则为进，顺极则逆；而逆转者，则为退也。六祖曰：“吾有一物，上柱天，下柱地。”物者，儒曰元炁也。柱天者，即上升于顶也。下柱地，即下降于腹也。《释家谱》曰：“海水灌太子顶。”海者，丹田也。水者，元炁也。释教喻名曰曹溪水，曰洞水逆流，曰一口吸尽西江水。灌顶者，即上升也。太子，即如来也。世尊曰：“火化以后，收取舍利。”此言舍利将成之时也。火即神也。舍利全得火以成功，然而成者，必有所成之效验，非空虚而无知也。其舍利成之时，虚室生白，而丹田如汤煎，龟缩不举。即用收取之法，运过脊后三关，还之中宫，以养道胎，故曰收取也。《华严经》曰：“具丈夫形，成就如来，马阴藏相。”马阴藏者，龟如线焉，缩而不举，方为舍利有成。如或微动，不可认成，必须法轮炼之。若不锻炼，则炁嫩而力微，难以冲关。须待有冲关景，而后可移。既然有景，法轮当止。若再妄行，舍利已成而被火逼漏，依然是个凡夫。或老者病者，外肾不举，认为舍利有成，则误也。乃无漏尽之资，必加功修，有所举动，而后有可望矣。世尊曰：“能不死阿罗汉。”不死者，言其寿长也。如果外肾不举，舍利成就，故此不死。如佛弟子迦叶，住世七百年，后遇世尊传过关之法而成一祖。如宝掌和尚，住世一千七百十二年，后遇达摩，传过关之法而后超脱。此是得舍利，未明道胎，故住于世矣。此以上皆言转法轮成舍利之功，而慧命之道尽在斯欤！此总结上文成舍利之法。予曰：成舍利之道，功法甚多，曰真神、曰真炁、曰真意、曰呼吸、曰主宰、曰运行，难以备记。凡临机转法轮之际，一意驭二炁，而运行之法，又在乎神之协真炁而同途，不可起于他见。于十二规，全仗呼吸催运，以息数定其法则；自採以至于归根，不可须臾离也！离则断而不续，不成舍利矣！</p>\n<p>且成舍利之道，功法虽多，乃至简至易之法。初行似难，熟则容易。譬如乡人织布，临机之时，手足头目，上下左右，照顾接送。初学其法最难，然而熟者，临机之时，不知不觉，手足头目，上下左右，照顾接送，亦不知从何而主持，乃自然而然之消息。若有所执，则不能成乎物矣，而大道亦然。凡转法轮之际，意主丹田而为轮心，神运炁而为轮爪，呼吸催逼而为轮毂，亦出乎自然而然之消息。有何难哉？不起于他见者，转法轮之际，外除耳目，内绝思虑，一点真神，领炁循环。稍有他念，炁则散于别络，空转无益。且数者，每步四揲，升为阳，阳为乾，乾用九，四九三十六，乾策总六爻之四揲，二百一十有六。降为阴，阴为坤，坤用六，四六二十四，坤策总六爻之四揲，一百四十有四。合成三百六十数，成其法轮一转之途步。限度不差丝毫之规，则妙矣哉！至矣哉！是道也，苟不用此，万无所成！此法自汉至今，秘而不泄，佛佛密受，祖祖口传。余备全而泄尽。愿有志者，早成大道。夫三百六十数者，实非三百六十数，乃譬喻耳。且轮之爪二十四根，而以前后转一回，即成四十八，谓之一回法轮；而轮之外幡盘，即成三百六十数，实无差也；故曰三百六十数矣。</p>\n<p>不闻世尊与迦叶之言乎？曰：“正法眼藏。”此乃採舍利秘法天机，故曰正法矣。眼者，神之所栖。眼之所至，神亦至焉。又与阿难曰：“若不知心目所在，则不能得降伏尘劳。”此乃《楞严》之妙旨，取舍利之密机。若不以心目取之，舍利不能出炉。故上文所谓正法眼藏。能採之者，实有异焉！至于三五日间，丹田渐次温暖，团成牟尼，形如火珠，效验渐次而至，妙境不可胜比矣！盖採之时，专视不可须臾离也！离则火冷炁散，不成牟尼；故曰七日思惟。岂可轻易哉！夫若不用此法，而用别法，舍利万无所得；无非长生而已。《法华经》曰：我今为汝保任此事，终不虚也。汝当勤心精进，行此三昧于七日中，思惟如是事。事者，释教别名，即儒所谓真炁也。炁得以前风火之法，炼成舍利，故曰不虚也。又须昼夜无歇，念兹在兹，故曰：勤心精进。万虑尽空，一点灵光，专眸舍利，故曰：思惟如是事。七日者，乃採舍利之总诀，即儒所谓“七日复见天地之心”；又云：“七日一阳来复”。而物之採，或五日而得，或六日而得，岂有定哉？世尊曰：“六</p>\n<p>种震动。”此言舍利所产之景也。六种者，即身中六处也，非世界六处矣。眼有金光，耳有风声，鼻有气搐，脑后有鹫鸣，身有踊动，丹田有火珠驰，是为六种动矣。又曰：“眉间常放白毫光。”此乃舍利已成之时，常于暗室之中，或见白光，一二四五，俱无所得；不多不少之间，採而即得矣。佛道妙用是其时也。且舍利将出炉，自丹田至目，一路皆虚白晃耀，如月华之明。若未明前之功法，外肾不缩，如马阴藏之形；或有光者，乃属想妄而生，非舍利之光也。世尊曰：“芦芽穿膝。”芦芽者，过关之巧喻，即丹田所炼成之炁；名曰舍利，或名菩提，或名明珠，其名甚多，无非此炁也。穿者，穿过后三关也。若用意穿，属于导引旁门；而不用意，失于相随之机；此两俱不能过。不引不失之间，内有天机，必待师传；谁敢妄泄？此乃千佛万祖至秘至要之诀，自当恳切求师，而后有所望焉！达摩祖师曰：“折芦渡江。”此亦过关之妙喻。奈何凡僧未得真传，便谓祖师折芦渡江，以至熊耳山下。岂不谬乎？海不能渡，焉能渡江乎？然祖师生于南天竺国，得法欲东游。是国王以巨舟，实以重宝与之渡海。凡三周寒暑，至广州登岸。先结梁，不契。后结魏，了其大事。盖折者，採也。芦者，舍利也。渡者，运行也。江者，即通行之道路也。世尊曰：“一箭射透九重铁鼓。”箭者，真炁也。射者，神炁同行之法也。九重者，人身脊骨有三关：尾闾、夹脊、玉枕，三关左中右皆有窍，故曰九重。当过关之妙法，必由中窍而运行，若驰别路不能得道矣。又曰：“禅悦为食。”且禅悦者，快乐之境也。食者，食舍利之妙喻，非饮食也。即真炁从上顶入喉，还于中宫，故曰食也。且当未食之先，有蹊路之危险，须当防虑。舍利漏泄是以下喉窍实，蹊路鼻窍虚，实而不行，虚则泄矣。若不求师亲指，所成舍利，无得通挟鼻牵牛之法，妄驰虚窍；费尽千辛万苦才得舍利成就，以此尽废，岂不痛哉！又曰：“法喜充满。”法喜者，即真炁也。真炁既归中宫，渐渐不食，故曰充满。其间有三月不食，有四月不食。定力专者，得断食速。定力散者，得断食迟。且断者，非勉强也，炁满神定，自然而然不食矣。世尊《本行经》曰：“若至恒河水南岸，安稳住定如须弥。”水者，乃梵音之巧喻，是所炼成之舍利也。南岸者，即中宫也。舍利既归中宫，神炁犹如磁石吸铁，两不相离，一得永得，无所妄驰，安稳自在；即儒所谓“允执厥</p>\n<p>中”。而识性渐渐消磨，真性渐渐灵觉，妄念无，正念自存；即《华严经》所谓晏坐静室，恒作是念者，是也。世尊曰：“如理而来，如理而去。”上文谓得舍利之证验，此明初入道胎之修法。且来去者，即喻呼吸之气也。示人修道胎时，必依于息，而后能离尘离境，至于寂灭；故曰：如理而来，如理而去。所以禅师云：“未到水穷山尽处，且将作伴过时光。”盖为人自离母腹，呼吸之气及元炁皆发散于外，日用长行，丹田本无了胎中之息。因得神凝炁住，炼成舍利，归复于此；又必以呼吸气，亦归于此。元炁为结胎之本，呼吸为养胎之源，又当知以心主宰而定息。息未定时，以心调之。息不调则不定，不能证道。初入胎时，调息之法，岂可少哉？如理而来，如理而去，即调息之义也。所以傅大士云：“六年雪岭为何因？志定调和气与神。一百刻中都一息，方知大道显三乘。”是也。如来曰：“有余涅槃。”有者，有息也。凡初入道胎之时，心依于息，息随于心，不急不缓，听其自然；又不可随其荒荡泛滥无知。真息在内，本有息之胎，而若空空无息；非果无息，而实有也。故《金刚经解》云：“不知谁解强安排，捏聚依然又放开。莫谓如来成断灭，一声还续一声来。”即此心息相依之义也。《梵网戒经》曰：“如如一谛而行，于无生空。一切佛贤圣，皆同无生空。”如如一谛而行者，即先天炁及后天之气相兼相连，氤氲滋补胎源之机；不急不缓，如如而行也。若今之打七参禅谓谛行，不亦谬乎？故《华严经》云：“如来大仙道，微妙难可知。”当其氤氲之时，神炁浑合，如沐似醉，骨肉融和。欲色二界中间，不执不滞，空空洞洞，故曰无生空也。世尊曰之：“空不空如来藏。”上文谓无生空，又恐人堕断见矣；故此曰：空不空。所以空而不空，正是寂而常照也。不空者，又恐人堕常见矣；不空而若空，正是照而常寂也。《楞严经》曰：“行与佛同，受佛炁分。如中阴身，自求父母。阴信冥通，入如来种，名生贵住。”且行者，非行路也，亦非行事也，乃修道胎内功之行矣。舍利既归中宫，而神受此佛炁制伏不驰。神得炁定，炁得神住，相亲相恋，熔化合而为一。所谓行与佛同，受佛炁分。性即属阴，所谓阴身。佛炁即为父，呼吸即为母。到此节，又不可枯寂无为。佛炁有生活之理，呼吸有资养之机，必当以性求二炁之培补。佛炁生时，使而归源，助我胎之圆满；呼吸绵绵，使而朝此，助</p>\n<p>我胎之化育；所谓自求父母。又不可执其一而迷其二。到此，太空有一炁自明堂而来，归于中宫；我则鼓动阖闢，使入周身，逐其周身阴炁，变成纯阳之体；三百六十骨节，八万四千毛窍，无不通达，所谓阴信冥通。凡躯自忘，道胎以存，一派天真佛体；所谓如来种。虽居道胎，无形无象，定慧圆明，所谓生贵住矣。世尊曰：“于欲色天二界中间化七宝坊，如三千大千世界，说甚深佛法，令法久住。”欲色者，乃西方之梵语，中华名曰下中二丹田也。故《止观》云：“西梵优陀那，此土曰丹田。”化者，神之妙用。养道胎之法，虽在中田，必兼下田，合化成一虚境。若神之执住中田，则道胎有所滞碍，而非七宝坊矣！三千，即上中下三田也。俗僧谓过去一千，现在一千，未来一千，名之曰三千；岂不谬乎？盖炼舍利时，住于下田用功，谓之一千说法矣；然必由上中二田之循环。养道胎时，住于中田，有十月之功，故曰令法久住，亦谓之一千说法矣；然必由上下二田之路过。而后出定之时，住于上田，亦谓之一千说法矣。故曰三千也。《华严经》曰：以定伏心，究竟无余者。且定者，非兀坐枯禅，顽空强制而能定也；是有自然之定静。夫舍利归于中宫，识死性活，法喜禅悦，真安妙乐，无内无外，浑然一团。禅定，非凡僧之可比。朗朗兮，性如秋月；融融兮，命似醉薰。心目内观舍利，薰蒸其骨肉如沐浴。而心性似太空。了达无为兮，安寂六根；静照八识兮，空其五蕴。虽有循环之机，而真性安然无余矣。燃灯佛曰：“生灭灭已。”生灭灭已者，胎中之息，未甚至于静定，而屈伸之理尚有，故曰生灭。必守致于无，无其屈伸之迹，故曰灭已。只知有神，不知其有胎中之炁，谓之万法归一矣。了心之法，必依于胎而住，所谓归于法者，归此也。若无道胎、舍利真元之炁，强住心谓之灭已而证道者，则妄也。《金刚经》曰：“菩萨但应如所教住。”且菩萨修佛，心必须应如所教住，而后证佛。故《经》云：菩萨欲要修佛，应当如佛所垂教而住。教者，即道胎也。且欲得道胎之住定满足，先住其心。住心之要，又必依真息三昧而住定，则不堕于六尘而逐迷惑。如是正定而成正觉也；即《华严经》所谓“初禅念住，二禅息住”者是也。《楞严经》曰：“既游道胎，亲奉觉胤。”此言神入乎其炁，炁包乎其神，昏昏默默，浑浑沦沦，如母胎一般之景象，故曰道胎。又曰：父母未生前。自造自化，具大</p>\n<p>总持，故曰亲奉觉胤者矣。《金刚经》曰：“菩萨于法，应无所住，行于布施。”前文谓了心，必先依于胎息而住也。心既住已，不可贪着于息。若念念不捨，住于有息，则息又缚心，同于六根之缚心，是为不了之心。故此曰：于法应无所住，行于布施。法即息也，心既住已，当以施捨其息；古德云：“过河须用筏，到岸不须舟。”是也。《华严经》曰：“安住寂静，诸禅定智，入不死道。”安住寂静诸禅定者，鼻无出气，两手六脉俱住，浑然大定，绝无生灭；即《华严经》所谓“三禅脉住”。诸根既住，则常乐我静。智者，禅定中之真觉也。安住寂静禅定，成正等正觉，真入不死之道；如来实自取证者矣。世尊曰：“无余涅槃。”无余者，无出入之息也。涅槃者，非死之谓，涅槃是禅定三昧之乐也。六根灭尽，诸缘无住，一性圆融，慧光朗彻法界，是无余涅槃之妙境矣。即如来所谓“分明不受燃灯记，自有灵光耀古今”者，是也。《华严经》曰：“恒以净念，住无上觉。”净念者，不住尘妄，亦不住于法缚，乃不生不灭，禅定中之正念也；即《华严经》所谓“四禅灭尽定”是也。无上觉者，佛道圆满之正觉；慧光朗彻，无昼无夜，得大自在，俱足六通，实谓之无上觉也。且念住之时，则慧自发明。切须慧而不可用！若不守定，贪其胜心，用则着于魔境，被识神所害，废损前功矣。燃灯佛曰：“寂灭为乐。”寂灭者，非死亡之谓也，乃胎圆性彻之实证矣。故《楞严经》曰：觉道圆满，佛性景象。寂寂兮慧智朗彻，耀耀兮定觉无为。心无虚妄，性无生灭。即六祖所谓“禅心无想，禅性无生。”六脉全无，鼻息灭尽。故曰寂灭。道胎佛性，融融然如杲日，故曰为乐。又曰：真空无为。且到此时节，雪花飘空，出定景到，移念于须弥外。未到大定，无出定之景到，妄出，则入魔道；有景到而不出，谓之守尸鬼，亦无神通之智慧，又是一愚夫耳！故弥勒佛云“饶君八万劫，终是落空亡”者，是也。予故曰：舍利过关之妙法，以静而照，以柔而用。蹊路险危，防上下之驰散。待动而引，柔护而行。以文火而薰，以二炁而养，以寂照而并修，以双忘而定静，则道胎之法得矣！此重复明得舍利养道胎之法也。且静照者，即取舍利之正功。不静则不生发，不照则不出炉。取舍利静照之法，岂可少哉？故世尊曰：“心目所在”。蹊路者，阳关、大便处、鼻窍，即漏尽之所也。必先以法器制之，保护危险之</p>\n<p>患。此之三窍，若无真师授受，必在此妄驰失丧矣。非引而通，动而并行，全赖念头护持；故曰善护宝珠。当此之时，如过小桥；故曰：待动而引，柔护而行。胎因舍利之炁有，若非呼吸之化育，焉有出定之佛子？如昔在母胎时，得二炁而成形，又假呼吸化育；母呼一呼，则胎亦呼一呼；母吸一吸，则胎亦吸一吸；而道胎亦然矣。初结道胎之时，假呼吸之火薰养；及至五六月，二炁渐微；而至八九月间，二炁全定；只知有神，不知有炁。当空之时，而顽然乎空者，则堕于断见；故空而又若不空，此正是寂而常照也。当不空之时，而只知乎不空者，此堕于常见矣；故不空而又若空，此正是照而常寂也。一到大定，浑然合一，则出定之景至矣。此以上之真诀，千古不肯明言，颠倒比喻，使人难悟。余凑合逐节，以成全旨，真乃万世学佛之舟梯矣！</p>\n<p>不闻《华严经》五十卷之言乎：“世尊从白毫相中，放大光明，名如来出现。”此以下言出定之景也。上文只言养胎，而出定之时又未显然。如来恐后世不知此理，捨大慈悲，故曰从白毫光出。万世之下，方知有此为凭据矣！盖出定天机，非俗僧可得也；自汉至今，能几人知哉？此乃如来当时自所取证出定之验矣。出之时，或放白光，或放金光，本性有所见；即当求师，用收光之法。如若不收，其光则驰散矣；有形不能化至无形，性虽妙而形不妙；是未得世尊、达摩、寂无之全法。学者当急寻师，不然错过其机，再无有也。寂无禅师曰：“胎圆节至雪花飞，念动飘空上顶机。莫谓如来枯寂道，法身出寂又归依。”此乃出定之时，当出而不出，则滞于法身，为定之所缚，不能神通千百亿化身。胎圆节至者，道胎圆之极也。见雪花离凡体；而念动向太空；不知此机，是未得师也。如今之丛林枯坐摄心为道，自高自大，哄弄檀越后学，自误而又误人。不知如来白光、祖师雪花，空自为僧；赖佛藏身，食檀越之信资，忘父母之大恩。为男子身，顶天立地，不悟此道，岂不愧哉！且法身出定，离凡躯时，即速依然归于泥丸，养纯一七再出。初出之时，或见佛祖、菩萨、美异之景，切不可认他；此乃魔之变化。若认即著于魔，为魔所诱，迷失自躯无归宿矣。即此归寂，佛果未圆，难自立脚，岂不生于后世？必须修持九地，至于十地，更加持上至十一地等觉，以超出无色界上者也。盖初出之时，离身三五尺，慎勿惊恐，一切莫认。直等一金光如</p>\n<p>车轮大，以念入于光中，收摄性中，是为化形之妙本也！《楞严经》曰：“形成出胎，亲为佛子。”十月道胎，得二炁滋养，胎圆性定，谓之形成。出定智慧广大，无所不见，无所不知；出有入无，聚则成形，散则无踪；光周法界，神鬼侍护。故曰称为佛子矣。《法华经》曰：世尊放白毫相光，照见东方万八千世界，靡不周遍。下至阿鼻地狱，上至阿迦尼吒天，南西北方皆如是，照见周遍。且法身出定，久则无所不见，狞如掌心。阿迦尼吒天者，色界天顶之名，即色究竟天，是也。道胎十月得定，功行已至此天，故出定所以至此天也。四方上下无所不见；非要见也，乃自然而然耳！大觉金仙如来曰：“从肉髻中，涌百宝光。光中涌出，千叶宝莲。有化如来，坐宝花中。”此即《楞严》示人朝暮念诵之文也，而凡僧不知其所由来，空此念诵矣。盖金仙者，即《华严经》世尊之所自称也；或名大仙，或名七仙，或名众仙，岂有定哉？了然问曰：佛教今时之僧，谓仙为小道，如来又何自名此四仙也？答曰：佛原无彼此之分，所分之者，乃凡僧耳。如来自曰四仙者，正是使天下修道者，不执门户，以总归于世尊慧命之道也。又问曰：《楞严经》谓十种仙报尽还坠，何也？答曰：十种仙还坠者，而起手修之时，原非慧命之道，乃旁门小法耳。所以成者，亦小果耳，故有所坠也。若得慧命起手，则不名十种仙，而名金仙矣。且金谓西方，实即炁也。炁属阳，神属阴，阴得此阳，故成阳神。阳神者，众人有所见也，亦得取物。阴神者，众人无所见也，无能取物矣。世尊曰：“初成正觉，乃入龙宫入定七日。观菩萨树王，入定七日，至二七三七，于乳汁林，入定七七四十九日不食。”初出定时，养至一七再出，又至二七再出，至三七再出，至七七一出。乳汁者，西方之梵语也，此土谓之乳养。譬喻儿出母胎，虽具人形，不能远行言语；全得母恩朝夕乳养，而后自行言语，智通广大；而佛子出定之后亦然。朝夕之乳养，在泥垣。到此不饮不食，养培智广变化，一而化二，二而化三，化化无穷。故曰千百亿化身也。或问曰：《五灯会元》谓入定为外道，今此所言入定，岂不是外道么？答云：《会元》言入定为外道者，是言未得慧命舍利之道，空此摄心入定，乃阴神之活计耳；非阳灵也，故曰外道。此世尊言入定者，是得慧命成舍利之道胎，出胎后入定也。《会元》不分其法，则混此一言，迷误</p>\n<p>后人。况且六祖慧命之道，实秘而未传；所传者无非孤性而已；故不知世尊七七四十九日一定之道也。苟不明世尊慧命道胎，谓入定为外道，焉得世尊当初修外道乎？后世又敢称为至尊也？世尊又曰：八万劫中一定，岂又是外道乎？此文七七四十九日不食，乃世尊自所取证也。苟三日不食则呜呼，何足为道哉？学佛之士，速早求师指点慧命、舍利、道胎，而后有所望焉。不然十炼九空，甘自枯死，纵妙无非识性孤魂而已。世尊曰：“护念法令久住”。此即言归于泥丸，乳养之功也。上文言乳汁，即护念之法矣。久住者，真念当定住于泥丸，故曰大定者矣。《华严经》曰：“虽证寂灭勤修习，能超如空不动地。佛劝令从寂灭起，广修种种诸智业。”上文言久住，得生灭灭已而寂灭之。虽然寂灭，必加修而久远，寂灭如虚空等全然不动之地。佛嘱人曰：必要从此初得寂灭，勤加修习。智慧进进不已，空而又空，虚而又虚，故曰：“虚空界尽，我此修行，终无有尽。”《华严经》又曰：“恒住涅槃如虚空”。性如虚空，不著虚空相，故曰虚空。若著虚空相，即有个虚空在，而为虚空所碍，则不为虚空矣。而虚空者，乃自然而然，非有然而然者；故曰如虚空者，是也。又曰：心常正定，灭除觉观。而以一切智觉观，从此不动，入无色定。此即复言还虚空之性也。能到虚空境界，真心常定，一切智观灭除，浑然无极。或一定三载，或一定九年。一点金光真火收藏于内，日久月深，则凡躯亦化而为炁，神既妙而形亦妙矣。如世尊既灭度，母来悲啼，涌至虚空，又与母说法。如达摩在少林灭度，又只履西归，在路亲与宰相言语辞别，寄信与少林，宰相回寺，开棺视之，并无形骸，一空棺而已。如寂无在太邑，凡身变化百千，隐则无踪，或与人金银，或与人美女，或显虎龙，或一时回转万里，禅师隐于庐山还虚。此常定之心，岂可少哉？故世尊云“八万劫一定”是也。《圆觉经》曰：“如来圆觉。”圆觉者，真性还虚，虚之极至矣。无凡无圣，无昼无夜，一性太虚。即邵子所谓“道通天地有形外，思入风云变态中。”天地劫坏，这个不坏；故《弥陀经》所谓“成佛以来，至今十劫”者也。《华严经》曰：“法性如虚空，诸佛于中住。”且性既如虚空，则无所事也；而又曰“于中住”者；实有一还道理，人多不悟。殊不知此乃炼虚之妙法，真性复归中宫之秘诀。且中宫者，如来谓之毗卢性</p>\n<p>海。将此真性，住于性海，如龙养珠，一切不染，依灭尽定而寂灭之。纵有光现，敛而藏之，定而又定；久而性光化为舍利光，从性海中冲出，化万万道毫光，贯于太空，与古佛如来相会。所以大觉禅师云：“一颗舍利光华华，照尽亿万无穷劫，大千世界总归依。”又，荷泽禅师云：“本来面目是真如，舍利光中认得渠。万劫迷头今始悟，方知自性是文殊。”是也。此以上皆言舍利之过关养道胎，出定还虚之妙法。而慧命之道，尽在斯欤！余不敢谓，此集为自论之妙道，是皆荟萃先圣之真传。即后来万劫励志者，悟佛道、修慧命之根本。使见之者，即自了悟，契合佛祖之真旨，而成己又成人，则佛道之果证矣！</p>"}, {"id": "hm_10", "bookId": "huiming", "bookTitle": "慧命经", "title": "正道修炼直论 第十", "content": "<h5>正道修炼直论 第十</h5>\n<p>华阳曰：修者，以破而补囵。盖人之生也，原禀性命完全之体，及其年壮炁满而自漏。当未破时，若遇明师指点，不用补法，就此顿超，直入如来之地矣。已破之者，必当补完全体。且补之者，必借动机，将发往外之炁收回，补不足之炁。补到炁足，生机不动，便成马阴之相，谓之不死阿罗汉矣。炼者，以火而化物。且物非他物，即我之元炁也。元炁虽藏炁穴，动时向外，变为漏尽之资。今既归源，则用火转化而为炁矣。火非风则不灼，上文既言火以化物，恐人不知用风，则物难化；故此必要呼吸吹嘘，火才得灼，而物才得化而为炁。物无所则无居。居即炁穴也。物之生时，原从炁穴而出，今仍归炁穴，而用火风亦在此矣。是故至人参乎大道，修乎性命，风火物所，并而同用。以意入于炁穴，以呼吸逆吹之，岂不是同用者哉？上下万古成乎其道者，莫不以此而为要也！盖千百世以上，千百世以下，此人此心欲成乎其道者，无非性命。而性命合一者，无非风火。所谓“天下无二道，圣人无二心”也。奈何知之者稀焉？昧之者众焉？且世之学佛者，曰念经拜佛，曰受戒。方丈最高者，曰参禅打坐，说到性命二字，举世罕知矣。执性乏命，不识动静，往往到头虚老。盖今之学佛者，谓佛修性而不修命。殊不知如来大藏之教，性命双修，有无原是并用。以执死禅，不</p>\n<p>识动机：初习者，如佛无二；久则无所效验，自生退悔；一场空死，有何益哉？命动而外耗，耗尽呜呼！性何居哉？道何存哉？今之为佛门者，不得如来之真传，执性不知命宝，慧命发动，不得知其法收住，虽不变为漏尽，亦自耗散。耗尽焉有不死？既死又将何物为道哉？是以至人察乎动静之消息，合乎并修。且世之凡夫，才欲修炼，便已离别父母妻子，孤自深山穷谷，或高庵大寺，谓静可以修道，诚可笑也！苟未得真传，如此枯静，不识动机，如痴猫守空窟，有何益也？故紫磨光如来云：“不识动静，学道无益。”至人静其心，以候肾之动机，移入动处，合并而炼，心肾相合，即是性命合一。所以古云“一合相”者，即此矣。命者，根于肾，肾动则水也。命者，即元炁也。炁动即变为水矣。性者，根于心，心动则火也。性者，乃真意也。意动即变为火矣。以火入于水中，以心中之意入于肾中之炁。则慧命而不外耗；炁得意协住，则不外驰矣。以风吹火化，而成真种；盖风者，呼吸之息也；火者，意也。上文言炁得意协住，故不外驰。其中尚有漏尽之霞影未化，故此必要呼吸之息，逆吹炉中之火，化此霞影，漏尽变而为炁。不然此物作怪，搅乱心君，思想欲情，即孟子所谓“炁亦能动志”也。《楞严经》亦谓之阴魔。务要绵绵久久锻炼，将此阴魔，化为阳光，则身心自然安乐，情欲自然不能搅动。即世尊所谓“入三昧火中而降火龙”者，即此矣。此道释门之秘也！有志之士，得者如法锻炼，用之得力，欲不用除而自除，心不用静而自静，所谓“以道制心而心自道”。是道也，能用之久者，天机忽然发动，无中生有，即名真种矣。其法简易。难修难成者，尽是外道。如果有缘得此道者，至简至易，所谓八十遇正道，即成道矣。悟之者，修真种而成舍利。悟者，非无诀无传。如今之禅门，空空教人悟想，则谬矣。此即实有真功真传，教人转手采取真种，锻而成舍利矣。静时而候，机之未动，仍以静而待之。动时而取，机之既动，以意取之。同炉而炼，意炁合会一处。故曰火化。世尊谓之火化。行乎如来之道路，路者，即任督之脉络也，亦谓之法轮路矣。宿乎世尊之树下，盖树下者，即丹田净土也。昔日世尊修炼在于菩提树下入定，即此处矣。斯谓之行住矣。道一禅师云“未有行而不住，未有住而不行”，即此也。且火之行住，实随物之变化。且物之行，则</p>\n<p>意亦当行。物之住，则意亦当住矣。阴魔现时，即当以武火锻炼，免其奔驰漏尽之危险。盖阴魔者，即身中之阴气也。阴气之变现，或梦寐所见阴人；或是身体发障；或是坐静偶见阴人；或梦寐所见虎怪；俱是阴气所变化，走漏舍利之坏病。必当风火猛烹极炼，烧得里头鬼哭神嚎，将阴魔炼尽，而后则无危险之患矣。净静太平，常自柔和而温养，以为护持宝珠之坚固。身体无所怪见，以意照顾温养。且如转法轮之际，文武兼而并用，其中精微之奥妙，又在师传而自悟也。盖行法轮之功，升降为武，沐浴为文；而升降之中，亦有文亦有武；总在师之传受。而精微之处，又在自悟矣。舍利成之时，止武带文之薰聚，且舍利成时，即用文火团聚。若不知止，再用武火，所成之舍利，又被武火逼散。此处当知危险，至要至要者也！斯谓之温养，实喻为保守也。舍利成时，止其呼吸之武火，用神光返照之文火。且真意又当时刻照顾，保之防危。当其时也，时者，舍利将生之时也。明珠现而百怪灭，明珠者，舍利也。舍利已成，则显然而露象。百怪者，身中阴气夙病也。明珠一现，阴气夙病顿除，故曰灭矣。柔运漕溪之大路，漕溪者，背骨之髓路也。採舍利时，必由此路柔缓而行。若驰别路，是舍利即不能得矣。道胎立而千智生。且舍利归中宫，发白再黑，齿落重生，智慧广大，过去未来，无所而不知。切记慧而不可用也！温养允证如来定慧。且到此地位，俱是文火薰蒸，再无所失。所谓一证永证，常自定觉于中央，慧照于性海者矣。夫慧而不用，勤修禅那，盖禅者，静也；那者，性也。到此只修自己之定性，以调自己之息火，一切知觉，先后祸福，知而不可用也。愈加灵智之光辉。且慧而不用，道胎之性，愈加灵通矣。寂照常自觉悟，休随昏沉散乱之悔空。此言寂而常照也，觉者知也，言禅定之中，必要有正觉知见，而后复见性体。《华严经》所谓“恒以净念，住无上觉”。若随其昏沉，则胎无息，堕于无知，属于枯寂顽空之外道。若随其散乱，则胎无主，火冷炁竭，无所成也。持守定力，在乎空性一念之诚也！盖胎中定力，在乎一念之诚。十月之胎，必要念念在胎，念住息定而后胎圆。《华严经》所谓“安住寂静，诸禅定智，入不死道”者，是也。法性定时，雪花乱</p>\n<p>飞，静室之中，偶见雪花飞放，此乃胎圆之时也。斯谓之出定矣。见出定之景至，即当出矣。不出则滞于胎，无神通智慧之变化；虽成胎圆，又是一愚夫耳。盖大道静极之中，而又生乎动机。所谓璇玑复建于子，真物再动于静极。盖物者，至阳之物也。此物静极复自动矣，所谓阳无剥尽之理。若夫至人，造乎日月，推情合性，转而相与。所谓重造乎妙道，再立乎戒定慧。且此一段功夫，古人隐而不露；或是怕泄漏天机，或是未得者有之。凡修炼之士，既得此物来收聚于内，将所出定之法身，亦归于内，合而为一，长入乎大定矣。定定不已，至于无极而至极者也！</p>"}, {"id": "hm_11", "bookId": "huiming", "bookTitle": "慧命经", "title": "正道工夫直论 第十一", "content": "<h5>正道工夫直论 第十一</h5>\n<p>华阳曰：下功之时，处于静室，静室者，不近闲人之所，恐来搅我之静也。身如槁木，坐则忘形。心似寒灰，静则忘心。以灵光为用，回光返照。并性命而同宫，以性入于命宫。是谓道之首也。此言修性，而命即在其中，故曰首也。且静极而动者，且人能到真静之时，内有一机顿发，即非心也，亦非意也，乃丹田之焦动也；五祖曰“情来”，六祖曰“淫心即道心”。学佛之士，若不知此动机，乃无下手之处，虽修无益也。大道之根苗，佛祖知此机来，用法收回丹田，炼成舍利牟尼。超凡入圣由此而起，故曰修大道之根苗也。造物之主宰。且凡夫不知修炼，因此机动无法制之，则心亦动焉；即孟子所谓“炁亦能动志”者也。如此男女交合，则生人道矣。而万物亦因此机动，雌雄自合，亦生万物。世人因自好色，谓修道者亦是好色，实不知其法也。佛祖专候此机之才动，不等心之转念，以火炼之，以风吹之，外肾自缩，心如凉水，何好色之有乎？且焦螟虱子岂有色心乎？此乃道之化育天地之真机，自然而然，非有心也。凡圣之变化，总在此顺逆之间耳。炁旋窍开，且炁者，古人曰物、曰水、曰窥阁事，其名甚众。窍即丹田炁穴也。开即命门。医书谓两肾中间为命门，误也。此门即在脐下，女人谓之子宫门，正此也；男女泄精正在此处也。慧命之情，喜向乎其外；盖慧命乃世尊巧喻之别名，中华所谓元炁者也。人自受胎，禀造物主宰之炁，而在其内，佛性</p>\n<p>亦在焉，所谓“天命之谓性”也。通八脉与母呼吸相连，口鼻绝无气也。及其因地之时，口鼻一通，八脉不通，元炁内藏。及其年壮，元炁拱关而出。《楞严经》谓之漏尽通矣，窍即开矣。自后其机一发，无路可行，顺此熟路而出。余有俗堂弟，字道宽，法名原明。久住金山，以得金山之法，后住怀邑勇水庵为方丈。曰：禅教原不问此事，似过涵灌，只悟自性，不必究他。余曰：既有走漏，则与凡夫淫媾似也。《楞严经》云：“淫身、淫心、淫根不断，如蒸砂石，欲其成饭，经百千劫，只名熟砂，必入魔道，轮转三途，终不能出。”禅教何得不问也？世尊慧命之道，佛佛相应，祖祖相传。若能自用，则三种淫事，一炼自断，其中有深旨。摄乎其内，摄乎，以呼吸摄之。呼吸非意则无主矣。内者，丹田也。绵绵若存，念兹在兹，和合熔化而为真种之胎源，实为正道之真传矣！上文所言摄归之法，此则表时刻温养之功。且命既归源，又当时时呼吸嘘之，刻刻以意守之。似炉中之火种，意炁双熔，变为真种。实为性命双修，久则无中生有。除此之外，尽属旁门，终无所成也。古之曰火化，火者，真意也。曰和合，性命合一。曰对斗，对者，返观也。斗者，丹田也。曰跏趺，跏趺者，以真意坐于吾身北方水面入灭，为初关下手之法也。昔商那和修尊者，见阿难坐于中流水面，跏趺入灭，三至参求，后阿难付以正法眼藏，而为三祖者，是也。是阐明此道之用也。千万般之巧喻，无非性命二物而已矣。功到时至，且非一朝一夕，日集月累而后，方可望也。又在乎老少勤怠之分耳。时者，非天时之时，即吾身物产之时也。无物之中而物产焉。物产心有所知，若兀坐顽空，则当面错过矣。斯时不令其顺而逆之，物产原是下流顺出，故用意息採之。达摩谓之採取。顺出谓之漏尽通，逆回谓之採取也。物既归乎其源，源即丹田也。则有法轮之妙运：后升前降，谓之法轮。起阖闢之消息，阖闢者，内外呼吸也。外面之呼吸降，则里面之呼吸升之；外面之呼吸升，则里面之呼吸降之。徘徊上下，徘徊者，活动之意。上即顶也，下即腹也。六祖云“吾有一物，上柱天，下柱地”者，即此矣。立乎天心，天心名曰中黄，居于天之正中，一名天罡，一名斗杓；在天为天心，在人为真意；中宫若失真意，犹如臣失君主矣。凡转法</p>\n<p>轮之时，必以真意坐于中宫，而为车轴之心，使爪之运转矣。依乎任督，凡转法轮之时，意命必须依乎任督而行。或意行而命不行，或命行而意不行，则不成舍利矣。归根复命，还于本地也。故谓之四候六候者也。採封升降沐浴也。数足物灵，则有採取过关之诀在焉。夫既明前所用功之法，久久行持，窍内满足，一静则天机发动，周身融和快乐，阳物全然不举，故曰数足物灵也。且物既灵，即当采运，过后三关，归于中宫。其诀最有秘密之妙，不敢言者，而放言之矣。夫或采而不生者，不当采而采者，其物嫩之矣。或生而不取者，生而不知，则当面错过矣。是不得诀之真，故也。此皆未得师传之过矣。且欲得诀之真者，又当虚心求师，久久护持，盖世之学佛，不得其全诀者，皆因已有所知所能，轻师谩法，故不得其全诀矣。若能虚心恳切，执弟子之礼，行弟子之事，久久真心护师成道，岂有不得全道者乎？培德舍力，盖德者，道之体、性之用。欲觅师道，而不修德，焉得遇之？德和道者，如鸟之羽翰焉，缺一无所用也。力者，财也。古云：“法财两施，彼此同成正觉。”苟日称修道，分文不捨，沽名钓誉，假佛遮身，就有佛道高人，泛而不视矣。然后大道有所得也。世之学佛者，谓坐而有所得，岂不谬也？如刘志略乃坐怀而得，因结交有力，与六祖同藉其力也。盖出炉之消息，炉即丹田也。又赖意之静观，物则生焉。盖意观者，如来云：“若不知心目所在，则不能降伏尘劳。”物之出炉与不出炉，总在乎意之力也。且物又是元炁之喻名耳。如来谓之炉中火发。此即紫磨光如来之言也。火者，暖也。发者，动也。此是舍利产之景也。斯时舍利露象，上文言暖者，乃内景也。象者，外景也。不惧不惊，或者乍见此景，未得真传，认为外物，而不禁惊讶，则心动神驰，舍利亦散。欲望成道不亦远乎？动而并行，命行则意行，命住则意住，故为并行者矣。切防蹊路危险之患。蹊路者，前注于集说矣。渡过洹河之渡口，洹河者，背骨之髓路也。上下有不通之处，必要真意度过此处，故曰渡口矣。由漕溪而上鹫岭，漕溪者，即上文髓路也。鹫岭，在头之后也。达须弥而下重楼，须弥，头之顶也。重楼，气喉也。气喉有十二节，故曰重楼也。往南华花世界，且往者，慧命之来也。昔</p>\n<p>日法华会上，龙女献珠，往南方女转男身，成证佛位，即此喻也。盖南者，心窍也。心之喜动而不喜静，喜新而不喜旧，时刻迁移，进出无时，莫知其乡。自无始而至今，四生六道，无有休息，所谓“人死不知心”。今幸得慧命来相制伏，变种性为真性，炼识神为元神，犹如铅之制水银一般，则水银死，而无驰弄之性矣。若不得此慧命来入心窍，而亦不能自定。纵有所修，无非后天之识性，非先天之性也。先天之性，因地之时，落于命中，故曰“天命之谓性”。学佛者，自当惺悟先后之性，若不自惺，终无所成也！坐登佛光宝殿。宝殿者，心下一窍也。乃养道胎，长定之处也。忽然溶溶如谷云，霏霏似春雨，盘旋敛聚于中宫，斯谓之结道胎。盖舍利登中宫之时，周身如云之腾，似雨之施，百脉冲和，畅于四肢。急将心目左旋右转四九而定；右旋左转四六而定。性命盘聚于中宫，结成道胎矣。安乐太平之禅定，到此无损无失，一得永证。何得不安乐？自然禅定寂静矣。勿助勿忘而养，常寂常照而温。且初结道胎时，后天之息，本似于有，而不著于有，故曰勿助勿忘。道胎既结，则意在乎其中，寂然不动，又不可随其昏昧，心须常觉常悟，故曰常寂常照。静定之中，忽觉一轮浩月，悬于当空，且此月，从丹田升于目前。留而待之；以真意留之。一轮红日，升于月中，日月合并。收而藏之。用法收于中藏。定静之中，习乎寂灭；一念不生。有无之场，还乎浑然；真性虚无。故曰：无为者矣。空虚之至极矣。且大道无穷焉，静极而生乎动，一物上合于道胎，盖万物极则还原，而大道亦然矣。静极生乎动机，有一点纯阳之物，从涌泉自升于中宫，与道胎相亲相恋和合，合而为一者矣。而法轮之又重转矣。且此物既归道胎，则自往下，由尾闾上顶，降于中宫，是谓助胎源之至宝矣。静而又静，灭而又灭，鼻无出气，手无六脉，则大定矣。胎圆炁尽，天花乱坠，有天花坠，则知胎足。无天花坠，则胎不足矣。则佛子之定念，当移而超出三界，见此景至，即当移念出定。三界者，下丹田、中宫、顶门，谓之三界也。是谓如来之出现矣。《华严经》云“世尊从白毫相中，放大光明，名如来出现”者矣。且出定之初，防被外魔之侵挠。盖初出定时，恐有诸佛菩萨来言语，切不可答谈。</p>\n<p>只提正念，遂出遂入，不可远游矣。一轮金光，本是我所有之灵物，取而归之，为化形之妙药。且出定之初，万物不可著。只候自身中一轮金光现于空中，将法身近于光前，以法聚光，取于法身内；遂即法身入于凡身。久久乳汁，则凡身立可化为炁矣。恐不得此金光者，则凡身不能化为炁，故有留身之说者，谓此也。又在德行之故耳。此即万古不泄之天机，今则泄矣。收而养之，子又生乎其孙。且初出定时，原是一身；定久则百千亿化身矣。愿备行满之时，隐于深谷绝迹，还虚合乎妙道，功满隐入深山古洞，无人往来之所，兀然端坐，炼形化乎炁，神亦还乎虚，形亦虚矣。是谓如来末后之事也。余愿同志者，休误入于口头禅三昧之外道，认为正道，则非正道也！</p>"}, {"id": "hm_12", "bookId": "huiming", "bookTitle": "慧命经", "title": "禅机论 第十二", "content": "<h5>禅机论 第十二</h5>\n<p>华阳曰：佛道性命喻龙虎，龙虎喻动静，动静喻禅机，何喻之杂也？且人从禀受，无非性命而已，另外又有何物哉？人若成乎道者，先将保守性命。性命之藏处，别名曰龙虎。龙虎之行住，又曰动静。动则为机，静则为禅。千名万喻不出性命。除此性命两物，都是诓哄愚夫，阻之进门耳。古佛曰：“不识性命，则大道无所成。”千门万户，费尽心机，实不知性命。或修性，或修命，亦无所成。佛佛祖祖，莫不由此性命而为之修炼也。且自古成道者，未有不修性命而得证果矣。夫既曰性命，而又曰禅机者，何也？心静者，为禅也。肾动者，为机也。且人从禀受，性命原是一团，盖人受胎之时，父母二炁合成一炁，一点灵光之性，即在其中。古人所谓“三家和合有其身”，真不谬也。及其生也，分而为二者矣。且人之生时，因地一声，性分于心，命分于肾。二物所隔八寸四分，至老莫能相会矣。当其节至体旺之时，人到十五六岁，丹田之炁自动。而慧命之元宝，元者，即所受先天之炁也。即有变化，拱关向外之机者在焉。盖先天炁之隐于丹田，后天足时，则先天炁自动。动而不修，拱开阳关，则变为后天有形之漏尽精矣。不令其顺出，趁此之机，机者，在内有景。在外者，外肾动</p>\n<p>也。回光返照，凝意入于北海，则元宝亦随意之还于北海矣。寂无老师云：“凝神收入于此窍之中，则炁随神往，自然归于此窍矣。”又，世尊云：“心目所在”。故谓之和合凝集。以心合肾，谓之凝也。因其有变化之顺逆者，顺者，元精亦为漏尽。逆者，物亦为元炁也。故曰机也。机者，动也。若不曰机，则人不知慧命所动之至宝，夫命者，元炁也。炁动虽不泄漏，则亦外耗，耗尽呜呼。修炼者，不令其外耗，收藏于内，则成其道也。生人亦是此炁，故曰至宝矣。以兀坐顽空，如今之禅门，不知慧命，摄心死坐谓道。谬矣！迷却性命配合之真机，不知性命凝合，空自磨砖作镜，有何益矣？且落于枯寂，将以何者为真种哉？不知和合凝集之法，则无真种产之景矣。及其机之息也，默照浑然，故曰禅矣。且机息者，命不动，阳不起，故曰机息。机既息矣，回光静照，无事无为，故曰禅也。时至，忽然而动，又曰机矣。盖时者，非天时之时，乃真种产之时也。能知前所用之法，自有真种产之时也。急当採取，收回于本宫，不收则错过矣。圆通谓之盗著。盗者，取也。起阖闢之消息，阖闢者，内外之呼吸也。消息者，元关之机耳。运法轮之元机，此即真种通任督之道路，呼吸催逼，故曰法轮元机也。真种灵宝，当归根深藏，藏于下丹田之所矣。古人谓之返本复命也。运行又归于命之原窟矣。然取得此种来，由法轮之机如意。斯谓之舍利。舍利是命得性炼成，谓之舍利矣。去其有为之功，去其风吹运行之法。运用其无为之法，以回光返照。静默而寂照之，又曰禅矣；此乃採舍利之功，有七日之照也。斯谓之心目所在。在者，心目在于舍利之处。且舍利之珠成，团成一个。形如朱砂光似雪，里面红，放光则白矣。融似汤煎味如蜜。丹田融暖，口中如蜜。活活泼泼流通而出焉，又曰机矣。出者，出炉也。不惊不疑，以意定静。待而动取。伺候动而同行。实谓之妙法，善取之方也。除此之法，再无别法可取，所谓柔能制刚。迅此动机，动者，珠动也。徐徐穿过三三之铁关，盖徐徐者，不前不后。前则谓之导引旁门；后则谓之存想外道；故必相依而同行。三三者，脊骨之窍，左中右有孔，从中而直上矣。斯谓之超凡入圣。炼舍利在脐下，既成舍</p>\n<p>利，必要超脱离出幻境。不超终有所患也。牟尼之宝珠，既归中央，心下胥上。柔守而定照之，又曰禅矣。常以温养。禅定之中，融融无为之乐也。一团太和之天理，似醉如薰，佛曰禅定之中三昧也。且无为之中忽有为焉，又曰机矣。太空中一点甘露。夫既曰无为，而又曰机，何也？若不曰机，则人不知有此妙物，孤守于胎囊。不知大道天人有相助之机也。顺此机之妙物，收附于胎中，以意逆至于中宫。寂照而长定之，又曰禅矣，依然温养。斯谓之生灭灭已。二炁永定矣。夫寂定之中，一物超然而出，又曰机矣。从丹田而来，有华而无形，悬于太空。稍稍而待之，又曰禅矣。二三息之间。随而又出焉，又曰机矣。亦从丹田而来，有华而无形，与前物相合。收而藏之，用秘密天机法，收于胎中。寂照柔而默守，又曰禅矣。无事于无为，常寂而常觉。寂照柔默之中，二物从涌泉而出，又曰机矣。有二道纯阳之物，从涌泉直升于顶，降于中宫矣。取而静定，又曰禅矣，鼻无出气，六脉俱宁。斯谓之寂灭也。从无出入之迹。且寂灭之定久，纷纷白雪满空，又曰机矣。斯实出定之辨机，乃是真景。不令其迟阻，速以出之。（若夫滞于胎中，缺少神通之变化，）又是一愚夫矣。即当而出之，从顶而出。斯谓之超出三界。宁而待之，离凡身一二尺候之。又曰禅矣。一片金光来，悬于当空，又曰机矣。收而入之，定而又定，又曰禅矣。久久长定，形神俱化，而禅机之说，从此毕矣！上下万古禅机，从此今则尽漏泄矣。余愿学佛者，休误入于邪师外道，口头之禅机，认为真机，则非禅机矣！</p>"}, {"id": "hm_13", "bookId": "huiming", "bookTitle": "慧命经", "title": "杂类说 第十三", "content": "<h5>杂类说 第十三</h5>\n<p>华阳曰：成乎其大道者，莫不因夙缘而得。大道者，乃性命之双修，龙虎降伏之法。若孤修枯性，则非大道矣。夙缘者，累劫所修之因，今世幸遇双修。如朱涂乃童真，生于高房内室，富贵之家，不能访道，偶尔幸遇，串通消息，已得余之所指，成其道果，是其前因也。晋时有祖师，留记曰：一</p>\n<p>千四百有余之年，涂子童真扫径迎。岂不是前所修定者！即当过关出定，恐有退堕之念。会然曰：他家只有他一人，岂有不生子以接传后代？答云：太上、如来、鸠罗摩亦有子。问曰：道既已成，再生子，岂不走漏？答曰：上等仙佛以神交，或以炁交。凡夫则不能矣，欲生其子，必以形交，故有走泄，伤其元本。昔日如来往山之时，夫人曰：你去，我日后何靠？如来回头指之曰：日后你生一子。后果生子。又，鸠罗摩乃西天十九祖，中华国王请至此土说法之后，对王曰：臣僧欲生其子。王果与他宫女。众僧此时皆不悦。罗摩知其情，谓化王以针供众僧。众不敢食，罗摩独食一钵，此时说法曰：食得针，取得亲；食不得针，取不得亲。次日其针从诸毛孔而出，后果生子。此乃性命双修神通之变化。既成道矣，何忧子乎？或见或闻而入，及其成功一也。上文言累世修为有根基，此言今生初修，或见人所修而自修之，或闻人所修而自修之，一到功成行满之时，与前人所修一也。所谓“悟即众生成佛，迷则佛是众生”者也。又必在灵心决断之力也！凡学道者，必要一点灵悟，不可听他人之言，总在自己之见识。不被旁门所惑，不好小法所能，志者，见旁门小法，自然不惑不喜矣。善自虚心恭迎，高人志士，善自求人。不执门户，三教俱有隐师，遇者即当求道，休执迹矣。搜寻古之遗言，求师悟道，以此印证真伪。授受之际，必须审察，逐节可合不可合之功法。且未得诀者，先当广看三教经文，搜寻真要。遇师之时，且看与此性命双修合与不合，若前后颠倒，则非正道，纵修无所益矣！如果诀真，然后行之，可成也。诀真者，何以见得？盖真道者，下手必是双修，行一步自有一步之效验矣。不被旧习所弄，旧习者，昔日所作所为，今日不起不现，为炼心有力矣。不被魔障所侵，且学道之人，有一段工夫，则有一段魔障，或内魔，或外魔。一点真念，藏于命中，寂然不动，为炼心之纯熟矣。疑心顿脱，真心长存。夫既得真师口诀，往前勇猛而进，念念存真，为道之主持矣。未来、过去、现在浑然，未来不思，过去不存，现在不喜，三心俱忘，浑然天理。见物内醒而不迷，即六祖所谓“见物心速起”。闻声内定而不入，《心经解》云：“任他世事纷纷乱，堂上家尊镇日安。”坦坦呆日当空，十二</p>\n<p>时，一点灵光常不昧。寂寂返照朗然，定静之中，回光返照北海。八风无所摇动，眼耳鼻舌意不动，故曰八风矣。则大道有所望矣。如此炼心，然后下手行功，有所效验，则道必有可成。心若不熟，功无效验，道亦无成也。夫至道不孤行，且此道必要侣伴之护持。力微炁弱，无所成焉。盖力者，财也。有法无财，功难成就。六祖藉神会禅师之给付，二十七祖因香至国王之财，二施等无差别，同成其道。且以有积金盈匮，聚钱如山，而不信有成佛之道，甘自为鬼，何足为贵哉？须仗有德，同归知觉。且德者，最难得矣，必要有佛祖之心怀，方为道中之德。如六祖将抵韶州，路逢刘志略，遂结为友，此乃同知觉这道之德也。访侣护之真伪，须当久探彼之怀因。盖人之善恶，事久不察而自现矣。或好胜心；或图有为福德；且胜心者，谓我好则喜之，谓我丑则不悦之，此人不可学道矣。且有为者，看经拜佛、修桥补路、修庙受戒，俱是图有为福德，于道无干。六祖所谓“有福孽还在”，岂可图之哉？或执己能；世之无志者总谓己能。或谓佛祖天生；凡夫不得真传，便谓得道者，天之所生，殊不知大道人人有分矣。这等切莫露机！遇此上四等之人，一言不可发。或重财而轻义；重财之人即无仁德，不足以载道也。或有始而无终；先甜而后苦。或言善而心恶；沽名钓誉。或殷勤而诱哄；小人谦柔而进。或祖宗无德；祖上无德，子孙修炼，天必不付其道。观此深秘藏真！遇此上五等之人如痴似愚。若得其丈夫之真者，彼自究竟根源，常自悟性命。累搜佛祖之秘密。且秘密者，即性命也。自搜性命，足可受道矣。生怀忠孝仁义，生来天性，前劫即有修之根矣。慈善济物，广施仁德之心。五戒全真，尊师重法，誓立愿深，斯谓之道侣护法矣！遇此等之人，方为学道侣伴矣。而后露如来之秘密，泄祖师之元机。到此方传大道。所谓“施者受者，同成正觉”。施者，师也。受者，弟子也。弟子能护师成道，而后可传道矣。又云：“财法两施，同登彼岸。”彼施我财，以济其事；我施彼法，以成其道。故如来云“财法二施，等无差别”者矣。夫下大功之际，且大功者，即过关十月之功也。择于静地名山，静地者，不近人之往来，亦不近坟丘。坟丘阴气侵害。山要古人</p>\n<p>成道之所，则无外魔，即有正神护佑矣。房屋不宜高大，高大招是非。墙壁坚厚，以避恶虫。明暗得宜，明则伤魄，暗则伤魂。饮食最当净洁，专食素饭素菜，戒诸香五辛。香则散炁，五辛生淫精。备购诸般法器。且入室之时，床下安雄黄一斤，以辟邪气。悬古镜一面，魔来时，镜中即现原形。桃剑一把，以辟外魔。坐下必要和厚，不生烦心矣。入室之时，师徒誓立同心。修此大功，必要同心合意，方敢入室。稍有不真，下功之人，岂不损坏耶？功成道备，当以游戏人间，接引群迷。功成出头，阐扬妙法，接引后学。如六祖道成，遇风幡而出，接引后人，说法度脱。且今之林下，未成道者，先以说法，则谬妄矣！广施慈德之法雨，普济登岸之妙药，物我同途，是古佛圣贤之愿也！</p>"}, {"id": "hm_14", "bookId": "huiming", "bookTitle": "慧命经", "title": "决疑 第十四", "content": "<h5>决疑 第十四</h5>\n<p>了然 六问</p>\n<p>问之一曰：拜佛不见成道，何也？</p>\n<p>答曰：佛在太空，何须拜也？《金刚经》云：若以色见我，是人行邪道，即不能见如来。又问曰：拜无用也？答曰：拜诚意耳，与道无干。</p>\n<p>问之二曰:念经如何不见成道,何也?</p>\n<p>答曰：经是佛所造，若是念著佛听，何须听他？若是念著自己听，亦不必如此而念。《金刚经》云：若以音声求我，是人行邪道，即不能见如来。佛乃西方人之名字，孔子乃中华人之姓氏，佛何罪于尔？要尔念也。譬如考试求官，欲取第一名，唱圣人姓氏可通否？六祖云：“东方人造孽，念佛求生西方；西方人造孽，念佛往生何方？”故念与道有何益耶？</p>\n<p>问之三曰:受戒不见成道,何也?</p>\n<p>答曰：戒者，犯也。戒乃昔日如来当成道之后，以相随者众，故文殊请如来设此戒，以制伏下等人之法，免其多事之故耳！六祖云：“心好何须戒？”大道在性命之内，此戒在皮毛之外，两不相干，故无成也！</p>\n<p>问之四曰：打七一门，释教今时称为最上；不见成道，习者反人人吐血，是何也？</p>\n<p>答曰：自如来开化，西天二十八祖、东土六代并无此门，乃僧高峰门人诬设，坑害后人。高峰乃文字之学，非如来之道。况所习者，是闭息之旁门。吐血者，因跪香忍气，伤其脏腑；坐打香板，伤其脊络，就是卢医扁鹊，莫能救之。此门日后，自有至人灭之，以救无尽性命矣。</p>\n<p>问之五曰:有打七之人,自称顿悟佛性,现在吐血,反教他人习之,果是悟得佛性否?</p>\n<p>华阳嘎嘎大笑曰：凡得道者，百脉流通，一团太和之阳气，全无阴气之阻塞。吐血者，乃阴阳不和，火气盛，阴气阻塞之过耳。命且不保，焉能悟得佛性？不待计较而自明也。</p>\n<p>问之六曰：六祖闻经，既以顿悟“应无所住而生其心”，又何必求五祖？</p>\n<p>答曰：六祖所悟者，乃是性道。他自知有慧命之道，故数千里叩求师恩，以传慧命。盖慧命必要师传，空悟者，不能得矣！</p>\n<h6>介邑秀才李思白名堉，道号琼玉。六问</h6>\n<p>问之一曰：弟子昔日最不信释道。闻朱子之言，谓释道乃虚寂之说，故此去之不取。前蒙翟友所送老师之书，初不欲观；后强以视之，乃知有真实工夫在。信心无疑，行持半月，幸得真种产之景到，觉身内八脉齐开，夙有病疾，一夕而愈。今成舍利，真乃有幸矣！弟子闻，今时出家人，开口便言他自悟得性，不用修炼；言修炼有成即有坏，此言是否？</p>\n<p>答曰：此图衣食之计耳！又怕别人言他无道行，以夺却主顾，故用钩连之法，何曾有实也？若不用修炼，世尊何必在雪山六年？达摩何必在少林九载？六祖又何必隐修十五年？俱是有凭据。彼言顿悟者，哄弄世人之方耳，一朝气断呜呼矣！</p>\n<p>问之二曰：成道是一法修炼，还是二法修炼？</p>\n<p>。答曰：千万佛总是一法。未得慧命者，则有门户之说；得著慧命，总归一也。世尊所谓“余二即非真”者，是也。</p>\n<p>问之三曰：今之禅门传法，可是真法否？又曰：出家人，做到方丈，则不用求人，自就是大和尚，登佛位，代佛说法，不知是何法？</p>\n<p>答曰：自西天至东土，达摩至六祖，以口传心授。故五祖云：“师师密附本音”。今时失却真传，乃将纸上传某僧某僧之名为传法者，如优人自称汉高祖楚霸王；说者如放牛小儿唱山歌，哄弄愚夫愚妇。智者观之，真可笑矣！</p>\n<p>问之四曰:看话头参禅,可是真道否?</p>\n<p>问之五曰：打坐人凡有走漏是何故也？</p>\n<p>答曰：若释教之旁门，故曰：看话头参禅，以争己胜。若释教之正道，先须双修，行实在之工夫，不问话头。</p>\n<p>答曰：人至十五六岁，炁满自然而走泄。不得真传，则不知用火功；既不会火功，焉有自住之理乎？若要不走泄者，时刻在走泄之处，用火锻炼，使精化而成炁，炁往上升，不致走泄矣。</p>\n<p>问之六曰：今禅门人称“修道走漏不碍”，此言是否？</p>\n<p>答曰：此是第一外道。《楞严经》云：淫身、淫心、淫根不断，必落魔道。经百千万劫，永不能出。况走漏一回，与凡夫淫媾一回，其理一也。天上未有走漏身体之佛祖。其舍利子又从何来？此乃释教下等之徒，不必论他。</p>\n<h6>僧真元 十三问</h6>\n<p>问之一曰：正道从何而起手？</p>\n<p>答曰：心目所在。又云“凝集和合”，当知必有所在之妙处。古云“反观凝合，要知去处”，即在命之所也。</p>\n<p>问之二曰:何时下手?</p>\n<p>答曰：有物则下手。祖师云：“可贵天然物，独一无侣伴。”又非心非意，物之藏于海中，动时即有知觉，就在此时下手。</p>\n<p>问之三曰：古人谓降龙伏虎，何为龙虎？</p>\n<p>答曰：龙即心中之灵念也。虎即炁海中之暖信也。若要龙虎降伏：先以龙宿虎窟；后以虎归龙穴；乃自然之降伏矣。</p>\n<p>问之四曰:何为猛虎出林?</p>\n<p>答曰:即阳物动也。</p>\n<p>又问曰:何以伏之?</p>\n<p>答曰：即以龙驭之，以风吹之。</p>\n<p>问之五曰:何为真种?</p>\n<p>答曰:即龙虎合炼成一物,然后有机动者,故名曰真种矣。</p>\n<p>问之六曰:何为舍利子?</p>\n<p>答曰: 即真种所产, 以得法轮之炼法, 数足, 外肾不举, 故名之舍利子矣。</p>\n<p>问之七曰:何为牟尼珠?</p>\n<p>答曰：即舍利子所产，以得运过后三关之法，归于中宫，故名曰牟尼珠矣。古人云“前三三，后三三”，即此也。</p>\n<p>问之八曰:何为道胎?</p>\n<p>答曰: 即牟尼珠归于中宫, 与意两相合一, 意在珠中。犹如磁石吸铁一般, 故名曰道胎矣。</p>\n<p>问之九曰:何为六通?</p>\n<p>答曰：先有漏尽通成，然后有五通。若独修性不知慧命，只有五通，漏尽不得成矣。少此一通，不能成佛，只为灵鬼转劫而已！</p>\n<p>问之十曰:何为出定?</p>\n<p>答曰:即道胎中之珠,炼成一个数足,从顶门而出。</p>\n<p>问之十一曰:何为化身?</p>\n<p>答曰:即出定之身所化也。</p>\n<p>又问:何等化法?</p>\n<p>答曰：犹如手之十指动也，要一指动，或要十指动，总在念头也。</p>\n<p>问之十二曰：旁门与正道，成时有何效验？</p>\n<p>答曰：旁门言成者，由他口内胡谈，无凭无据。正道成舍利时，则外肾绝无举动；成道胎时，手无六脉，发白重黑，齿落重生；出定之时，身外有身。求师当自察之！</p>\n<p>问之十三曰:不得正道,日后若何?</p>\n<p>答曰：种瓜得瓜，种豆得豆。</p>\n<h6>太邑海会寺方丈 龙江 一问</h6>\n<p>问曰:自己以此静修,不起杂念,可得不漏而成漏尽通否?</p>\n<p>答曰：静修只断淫身、淫心而已；淫根则不能断。既不能断，则漏尽不能成。欲要漏尽成者，须用火风之功；如来曰火化，曰风吹，实有真传矣！</p>\n<p>洪都药师院方丈 石藏和尚 一问</p>\n<p>问曰：忽然顿悟，无凡无圣，一念圆融似太空；静久下身融融和和而动，以至于外肾，何故也？</p>\n<p>答曰: 此是禅机之妙处, 修慧命之下手时。能用法收回本处, 故谓之双修矣。</p>"}, {"id": "hm_wx", "bookId": "huiming", "bookTitle": "慧命经", "title": "危险说", "content": "<h5>危险说 此言下手调药</h5>\n<p>及小周天事也。</p>\n<p>华阳曰：学道者，外道纷纷，及其成功，未有一人。何也？不得性命之真传，分门立户，俱是妄为。且今之悟性者，不识先天之性，落于后天之识性；今之修命者，不识先天之命，落于后天之渣滓；是故无所成也！</p>\n<p>盖不知其中性命之修持，离中之灵曰性，坎中之炁曰命。奈何灵之进出无时，炁之生而外耗，性命不能自合矣？故祖师教人以离性去制坎命。当其际，敛收微细之灵念，入于动炁之所，用巽风吹发其中之火，锻炼此后天之性命，合而为一，则先天之性命，自然发现矣。故曰修持也。危险之防虑，防之者，防其阳生不自灵觉。归炉之后，恐精之未化，阴气来役。不会锻炼，或神光失照，或呼吸失嘘，或药产不知，或升降昏沉散乱，或丹成而不知景，或温养失宜，或不採大药等法，是也。故古人谓“百日防危险”，诚哉是言也！以错修错炼之妄为也。盖不知金丹之诀，总是妄为。所以古人云：“任他万般差别法，总与金丹事不同。”或者闻其性命之门户，夫门户者，乾坤也。乃先天之源，内含乎四象。故《参同契》云：乾坤为门户，坎离为药物。即此意也。正理不明，根源不透，正理根源，即性命也。愚昧夙根，于道无缘，惑于邪师，向外求道，皆非己之根源也。入于旁门，无数门户，总不知自己之性命。故《皇经》云“三万六千种道，以释来者之心”之谓也。执于一边，且如今之修性者，不修己之命，则淫根不断，常自下漏，与凡夫一般。真可惜矣！又有学习吞津液，以弄运后天者。不知玄关之消息，阖闢之机旋，虽苦加修持，亦可惜矣！虽曰归道，奈性命不合，神炁不交，且性命神炁一也，不会交合，则无真种子矣。纵自修为，不识性命之交合，犹自以苦身心，如隔靴搔痒，有何益乎？真元暗耗，盖阳炁生时，不知採取归炉，炁焉有不耗于外乎？终归于无所成也！到头总是空劳矣。或有夙缘相</p>\n<p>逢，言语相投，知乎调法，夫调法者，是活子时所来之际，用风火之工也。其中有文武，不知逐节，亦无所用矣。未能彻乎精微，且精微者，难言也。能自行持玄关之精炁三者，以此不相离不相执，知乎轻重转弯抹角之用法者，则妙诀得矣！炼己之生浮，心不纯熟。行功之沉睡，不自灵觉。及至阳生时，活子时来。迷而不自灵觉，当面错过。炁薰形起，玄关炁之融暖，则外肾举矣。昧却採工，因睡之过耳。炁之极动，变而外施。元炁融极之时，不採则自欲出关，变为后天矣。既无主，则无所留，主者，神也。留者，息也。採工全赖神与呼吸之能也。炁既无神息之工，安能自住哉？拱关一旦泄去，出阳关矣。安有药之可调、可炼乎？心之不诚，意之不专，反谓炁之不住，乃愚夫矣。且既知乎灵觉之调法，灵者，神也。觉者，知也。法者，以神用呼吸摄元炁，皈炉烹炼之工也。而又无所成，何也？夫丹法有文武，若以混用，则亦无所成。盖不知其中丹法之逐节、火候之次第，逐节次第，必要得真传授，方敢无疑自用。如阳未生之时，存之以神，用之以息，长教绵绵不断，息息归根，乃文火之工，即古所谓炉中火种也。及其阳生以武火採之，是用神用息而重之，即古曰勒之之谓也。且皈炉之法者，亦是神息之相守相住，文火之谓也。若夫炉中之锻炼者，即动之以意，鼓之以风，乃武火之工也，即古所谓化精成炁矣。至炼后而温养者，文火也。不得真传，则不知此中之妙也。是以盲修瞎炼；且学道之粗心人，闻师一言，便以此为自得。不虚心求于精切，及至修时，工法已错乱。不知调药者，乃起手之法也。武火採之，武火者，用息摄炁之法也。且炁之生而下行，不自逆而上行；欲逆而归乎其源者，非息之招摄，无能还乎其炉矣。故曰：降中升，升中降，即谓之阖闢之机；又曰往来不穷。所以伍祖师云“阖闢不明，不能採药皈炉”，即此之谓也。武火炼之，武火者，即上文阖闢之机也。紫霞问曰：炼法之中而又有阖闢，何谓也？答曰：阖闢者，即採药炼药及周天之秘机，乃仙佛之密言。不得此中之妙，则丹无能成矣。故古所云“大有大阖闢，小有小阖闢”，即此谓也。阖闢者，乃鼓风化精之具。故曰：鼓巽风，运坤火。又，太上云“天地之间，其犹橐龠乎？”即此之谓也。文火养之，</p>\n<p>文火者，吹嘘之养也。紫霞问曰：吹嘘岂不是阖闢乎？曰：尔所见错矣，吹嘘乃后天之气也，阖闢即先后二炁之机也。又答曰：昔朱子谓“一呼一吸谓之阖闢”，乃后天之说也；非大道精微，至妙至妙之玄机也。请问曰：至妙可得闻乎？曰：阖闢者，乃大道二炁相动相应，玄关中之消息也。有四个往来，故曰往来不穷。若以一呼一吸两个往来为阖闢者，则有穷焉；非真玄关也。又问曰：吹嘘与阖闢，何所分别用法？曰：吹嘘者，神炁不动之义也。阖闢者，神炁俱动之义也。夫阖闢之神炁，又在乎动与不动之间耳。若出乎玄关之外动者，非炼药之阖闢；神炁亦不能相交相合，孕为真种。如凡夫欲生子，雌雄在外鼓舞，岂不愚乎？忘火以待其自生之故耳！夫文火温养之后，浑然静之，使阳之再生也。且既明其逐节，晓其炼法，何以张脉偾兴？此乃以前用风火不到处，阴气阴精发生为走泄之坏景。速用武火锻炼，炼到无此景象，方保无事。无意之欲起，此亦是阴精在丹田内作怪，使心君妄动，扰乱主人之故耳。即当用阖闢之法，鼓动炉内真火，化此阴精，是谓秘密天机，救命宝法也。故虚静天师《入火镜》云：“欲心一起，速用武火锻炼。”是也。种种阴魔阴怪来扰，魔怪者，或现鬼神龙虎等类是也。或沉寐时外阳不举，竟自泄之，又何故也？此亦炼时用风火少之故耳！若勇猛之士信得已，及风火用之已到，工夫不息，则断无此事矣。此乃火候用不到处，尽是阴气变幻，不识此时用武火鼓巽风，锻去阴气之法也。如还遇有坏景之来，即再用武火炼一次，永保无事矣。且夫真修之所为者，外若痴若愚，内安然逍遥，故曰：“大智默默，无何有之乡。”最忌身之劳碌，古人云：“欲静其心，先静其身。”诚然也。心之外驰。古人云“神一出便收回”，谓炼也。苟不勤慎，则炉火断而不续，失其文火，盖文火者，存之其神，用之其息，绵绵息息，皈根之法也。平常既失此法，焉能留其炁哉？炁既无主而无所钩，主者，神也。钩者，息也。不落下而变为后天者，未
