之有也！夫炁既无神息之工，则自然变而为有形精。故凡人无欲念而亦走泄者，无此火炼之故也。此皆因当其际，不知有武火为救护命宝之法也。盖当劳碌外驰之时，凡有所劳，必当速以炼之。故曰：“忙里偷闲调外</p>\n<p>药。”即此谓也。盖其精泄去，其炁亦泄之，精炁本一也，故《阴符注》云：“真炁即在阴精之内”。安得不谓危险哉？一场空劳。夫採取明乎二炁，夫此採取者，即是调外药之採取外药也。二炁者，先后二炁也。先天之炁以得后天之气招摄，方能归炉。故守虚真人云：“先天炁不能自皈炉，以后天之气採之。”即此谓也。阴跻知乎道路，阴跻者，乃摄精之路也。正在谷道前，膀胱后，上通乎丹田，是採药之路。故张紫阳《八脉经》云：“阴跻一脉，诸圣秘之，高人藏之，乃仙佛採药之所。”又，马天君解《大洞经》云：“一阳初动之时，运一点真汞于脐下以迎之。”即此泄尽矣！学者不可不察焉。是为勒阳关之法也。夫阳关者，即上文道路之口。是也。若夫皈炉之后，不知迴风混合，盖迴风者，迴旋其呼吸之气，以逆吹之。锻炼之法者，锻炼者，即上文迴风之法也。能自迴风，则炉内神炁，亦能自混合为一者矣。故我冲虚祖师云：“神虽宰炁，未知其炁可宰否？以迴风混合之。”又，《心印经》云：“迴风混合，百日工灵。”即此谓也。其元精与阴精，元精者，即元炁也，动为元精。阴精者，饮食之精也。此精最作怪，必假神气二火合为一火，在炉内鼓动巽风，炼化此精。故栖云先生云：“用丹田自然之呼吸炼之”。苟不得此诀，则精不化。依旧藏而不化。在丹田内。阳之暂伏，顿然又生。名虽调药，实不知炉中调法。法即前文炉内鼓巽风也。然后阳之复生者，外肾举。竟将以前未化之精，拱而射之，泄矣。则其药之无所产。既无真种，则不能行周天之火也。不思己之精不返，反谓师之诀不真。自生退心。何不悟之甚也！此以上尽言调药之法也。且药产薰炉之际，真炁在丹田内，自交欢融暖鼓动矣。危险大矣哉！此处不知正念相就相翕之法，必失其交合之机也。彼愚昧，因自昏沉，不生正觉之故耳。不早自提点，夫既调药，早早提点药产之景来。贪著其乐，此乐者，与凡乐大别。若不知此处交合之法，则失其炁之交机，空费炁之欢翕。譬如凡妇之活子时来者，其炁暖融，正在无止无底之际，欲想交合，而失其丈夫，岂不叹孤伶乎？此是失其生机之故耳！内失其照，此即上文神不去交炁之意。已交将别之时，既知此处神炁之交合，是谓真种，古仙谓之天然交。又当明此</p>\n<p>处採药之候，若不知此候者，是名有候无火，丧失止在半息之间。岂不危乎？若不即生复觉者，此教人即速用灵念採之。则昧却採工矣！上文言用灵念採之，此又言採工，实有异也！盖念只能宰其炁，不能摄其炁皈炉，故以神用呼吸採其炁也。所产之真种，即真炁也。不能自皈炉。炉即下丹田是也。洋洋乎，正在恍荡之际。竟自泄去，累积之工，空无所有，岂不悲乎！一场空劳，皆因心之不专，用工时，意之不诚。此以上言药产之危险。若夫升降之机，又在乎斗杓，盖升降者，进退也。斗杓者，丹田之意也。神息之力也。夫神是挟炁同行同住之主；息是逼炁退炁之机；机不可少主，主不可少机，主机又不可少意；三物并用，方为真玄妙之修士。如缺其一，则有危险。炁之行而息不逼，有炁无息，炁不随路而行。乃导引旁门；如今运炁之外道。非阖闢之道也！盖阖闢者，乃大道最妙之天机，必得真师传之，方得其精微。息之应而度不合，有息无数，息之混行，丹不结。乃无知外道；如今运后天气之旁门。非周天之数也！周天有三百六十五度又四分度之一。苟不暗合此度，任你运行，元炁万万不能成丹。不但炁之不结，炁散于别络。亦费药之空生，可惜当面错过。则周天之危险，即藏其内矣。此以上尽言周天之危险。夫药之归炉，盖炉者，下丹田，亦谓中宫。若文火之失薰蒸，时刻之吹嘘。则阴气又存之；阴气者，因丹田火不到之过耳。诸般怪现，皆由此之故也。诸般怪现，如阴人鬼神，即当用武风吹之，以武火炼之。不然阴气胜，阳炁埋藏，则有危险之病矣。且平常无事，若失其薰蒸，时刻用息嘘之。误食香辣，丹之成时，忌香辣，乃散炁之危险。劳其身心，身心有劳，则炉火不勤，有危险之病出。昧其动静，盖动静者，非心意之动也；乃丹田之炁动。若不知动而收，静而薰，则丹有危险矣。丹则异生，不知不觉。或时迫炉而出，盖炉者，丹田也。丹之已成，全在神光之护持，呼吸之薰蒸。若一时失检点，顷刻炁从丹田纷出，或走于身前，或走于身后，诸窍皆可藏之。不得其诀者，无能复皈其炉，即谓之走丹。或问曰：以何诀收之？答曰：以静定而待之，且看丹之从何路出去，而藏于何所。已知其的处，再用微呼吸吹于丹田，用意从的处，从原路，引而皈</p>\n<p>炉。或一引，或数引，谓之收丹之法也。或时火生，火生者，因饮食有动火之物，或热水浴身，此二者引动丹火，不得其法，亦是走丹之危险。或问曰：何法能救之？答曰：存想一黑云，悬于目前，以神引入于丹田，其火则自退矣。或时见水生，或阴人现象，夫水生、阴人者，即阴气也。因呼吸之火断续，故有此景来。或问曰：用何法救之？答曰：急用呼吸之息，以武而吹之。不见此坏景，丹复光明，方为美事。若不得其法救之，丧失在顷刻之间。夫炁之满而丹成，其危险者，在当止而不止，不当止而止之诀焉！法在以前《风火经》中。若夫火之圆足，又勤勤于薰蒸，即呼吸之逆吹嘘也。相护于性命，即以神返照也。或有意放，则汞散铅冷。又是阴气来矣。丹之怪异，不又重生乎？如上阴气之变化一般。非师之诀不真，乃己之失照！然丹己成者，急于超脱，若贪著尘俗，待以年月，一时不觉丹之迢炉，汞飞铅走，哀哉！空空已乎！余愿同志者，将此危险审而察之，细而悟之，精而行之，则永保无失矣！此以前有十五段，内有三十五条，细数难以表明。看别经，方知全旨。细看熟玩，然后用工时，方免危险之病。</p>"}, {"id": "hm_hwx", "bookId": "huiming", "bookTitle": "慧命经", "title": "后危险说", "content": "<h5>后危险说</h5>\n<p>炼丹之诀，自古丹书多引而不发，欲求其全诀全火者尤难之，学者难从未由，岂不可叹哉！故予前《危险说》，补《金仙证论》及《慧命经》所不足之处；使苦志者，得下手调药，及小周天之工法也。夫篇中所谓凝神者，是凝于道心之所。道心而得人心之翕聚，则元炁聚而不散，为孕药之工，即为双修性命之苗也。夫神既凝住炁穴，而炁穴之神不又有当知乎？盖觉其呼吸之往来，是为炼精之风火也。且神又不可泛驰于外，息又不可断续无嘘，神息之相炼，动静之相依，不出乎范围，不执乎有无，是谓化精之诀也。且又当知乎神安于阳动之所，以协乎其机，莫离乎其炁，炁化之所在，即神安之所在也。篇中又曰武火者，是採药、炼药、炼阴精之妙诀，内外呼吸之秘机，故曰阖闢。其妙在乎二炁逆用之工，故谓之採外药矣。且炼之者，是化精也，即玄关之中，意鼓息吹之玄机，谓之阖闢。即所谓“鼓巽风，运坤火”。又云：“风轮激动产真铅。”因坎中之阴精难以制伏，便使风火而化之，神炁相摩而激之，如二物之相摩而生火也。悟一子云：“欲降而静之，必先激而动之。”此诚言其妙诀，是指玄关中神、炁、气三物相动相激之机欤！且炉内神炁既以相炼，不可息乎其风，不可出乎其外，不可离乎其炁，神炁之二意，同此相翕，如雌雄交合；当其际，二物周身之意，尽归于此处。如此得法调药，何患精之不化，欲之不死，而真种不产者哉？且又曰炼阴精者，谓人食五谷百味所化之精华，名曰津液，是滋养五脏之后天，皆属渣滓，昼夜滋润乎周身；而至于丹田者，则为阴精也。此精时刻作怪，搅乱心君，引动元炁之散泄。所谓炼之者，因有先觉之坏景来前，即当以后天之神火注于炉中，是为火种火引也；便使橐龠之鼓风，以风扇火，以火鼓动先天元炁之真火，二火之相摩相激，阳火胜</p>\n<p>乎阴精，融透周身；何患精之不化，怪之不灭，道之不成者哉？且又曰文火者，乃神炁相定而不动之旨也；真人云：“修之首务，潜之深渊，韬明养晦，而后可以善其用也。”夫既曰不动，而又曰文火者，何谓也？盖神炁虽曰不动，而呼吸之气又在此吹嘘绵绵不勤之旨也；古曰吹嘘，曰温养，是定而嘘之意也。且火得风之所嘘，火不息冷，药则融而温暖。故文武火者，调药之的旨也。夫药既调而自产者，莫当去其武而用其文欤？不知药产时，呼吸之文武火，俱无所用也；故曰：定息候真铅。夫既曰不用呼吸之火，而药之产岂不散欤？盖妙在乎神炁之相就、相照、相顾之旨也。且当此际，药之老嫩，铅之迟早，又必叩乎秘传相合相离之机採取。安敢妄泄哉？然採取之诀，非用武火，药焉能归炉哉？夫升降之火，兼文武而用之。故曰柔而变刚，刚而变柔，刚柔乃丹道之妙旨。及乎六阳吸机之入而升是谓武，然呼机之回而定即属文；且以六阴呼机之退而降是谓武，然吸机之进而定即属文；故曰时时有沐浴者，此也。盖卯酉者，去武全文，不息息中而暗息息者，谓养其生杀之机也。且子午妙在于升降，而又云有沐浴者，是谓一时八刻，而一日有百刻；谓此四时，即属乎沐浴之法也。且归根之文火薰蒸补助，乃养丹之的旨，为返照之工夫。而丹之成时，去武火，用文火，是谓薰蒸养丹之法也。</p>\n<p>嘉庆四年端阳前五日，华阳著于北京仁寿寺。</p>"}, {"id": "hm_zz", "bookId": "huiming", "bookTitle": "慧命经", "title": "增注说", "content": "<h5>增注说</h5>\n<p>书有可注者，谓本书藏密之未明也。而破章立说，必先得其真师之授受，事理透彻，己工有所成，然后发笔显然明白，与前书合一，则曰注矣。若事理不彻，而己工无所成，以时文套语，冒妄杜撰，经自为经，注自为注。何足为注哉？书有不必注者，谓本书。显然已注明者，何烦画蛇添足而再注也？若强生妄说，以为己之聪明，不得真师，而内丹无所成，傍解瞎摩，则反为坏书之药引，实乃害众之病根者欤！若《金仙证论》与《慧命经》之原体，本已直切，又恐学者错认门户，重加亲注，道合仙佛之真机，工用自己之效验，诚为二门登堂入室之良方者矣！非余之好事者，是违后人之妄注也。反覆诀之明白，重叠显修之真工，仙佛微细之实事，无一字一事而不尽泄于此二书之中矣。是书得保全两家，悟彻根源，则不外乎大道而同归，究竟自己之性命者矣！名虽分仙佛，而用之真工，实则一也！尊师之所集，原以愿宗从之所好，而不失性命；免落偏枯之见，立今劫以成大道。愿谢不烦欠师缺工妄注者之所增也。以此戒云：毋劳再注！</p>"}];
const chapterMap={};
CHAPTERS.forEach(c=>chapterMap[c.id]=c);
let currentBookId=null,currentChapterId=null;

function buildTabs(){
  const el=document.getElementById('bookTabs');
  BOOKS.forEach(book=>{
    const t=document.createElement('button');
    t.className='book-tab';t.dataset.bookId=book.id;
    t.innerHTML=`<span>${book.title}</span><span class="book-tab-author">${book.author} 著</span>`;
    t.onclick=()=>selectBook(book.id);el.appendChild(t);
  });
}
function buildWelcome(){
  const el=document.getElementById('welcomeBooks');
  if(!el)return;el.innerHTML='';
  BOOKS.forEach(book=>{
    const c=document.createElement('div');c.className='welcome-book-card';
    c.innerHTML=`<div class="wbc-title">${book.title}</div><div class="wbc-author">${book.author} 著</div>`;
    c.onclick=()=>selectBook(book.id);el.appendChild(c);
  });
}
function showWelcome(){
  currentBookId=currentChapterId=null;
  document.querySelectorAll('.book-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('contentInner').innerHTML=`
    <div class="welcome-screen">
      <div class="welcome-emblem">☯</div>
      <div class="welcome-title">伍柳天仙法脉</div>
      <div class="welcome-subtitle">内丹四著 · 伍冲虚 · 柳华阳</div>
      <div class="welcome-desc">伍柳派丹法力主清静修持，仙佛合宗。<br>收录伍守阳与柳华阳二真人传世内丹著作，<br>全面系统阐释天仙三成正法。</div>
      <div class="welcome-books" id="welcomeBooks"></div>
    </div>`;
  buildWelcome();
  document.getElementById('sidebarTitle').textContent='请选择一部著作';
  document.getElementById('sidebarAuthor').textContent='';
  document.getElementById('tocList').innerHTML='';
}
function selectBook(bookId){
  currentBookId=bookId;
  const book=BOOKS.find(b=>b.id===bookId);if(!book)return;
  document.querySelectorAll('.book-tab').forEach(t=>t.classList.toggle('active',t.dataset.bookId===bookId));
  document.getElementById('sidebarTitle').textContent=book.title;
  document.getElementById('sidebarAuthor').textContent=book.author+' 著';
  buildToc(book);
  if(book.chapters.length>0)loadChapter(book.chapters[0].id);
  if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open');
}
function buildToc(book,filter=''){
  const el=document.getElementById('tocList');el.innerHTML='';
  book.chapters.forEach((ch,idx)=>{
    if(filter&&!ch.title.includes(filter))return;
    const item=document.createElement('div');
    item.className='toc-item'+(ch.id===currentChapterId?' active':'');
    item.dataset.chapterId=ch.id;
    item.innerHTML=`<span class="toc-num">${String(idx+1).padStart(2,'0')}</span><span>${ch.title}</span>`;
    item.onclick=()=>loadChapter(ch.id);el.appendChild(item);
  });
}
function filterToc(val){
  if(!currentBookId)return;
  buildToc(BOOKS.find(b=>b.id===currentBookId),val);
}
function loadChapter(chapterId){
  const chapter=chapterMap[chapterId];if(!chapter)return;
  currentChapterId=chapterId;
  document.querySelectorAll('.toc-item').forEach(i=>i.classList.toggle('active',i.dataset.chapterId===chapterId));
  const active=document.querySelector('.toc-item.active');
  if(active)active.scrollIntoView({block:'nearest',behavior:'smooth'});
  const book=BOOKS.find(b=>b.id===chapter.bookId);
  const idx=book.chapters.findIndex(c=>c.id===chapterId);
  const prev=idx>0?book.chapters[idx-1]:null;
  const next=idx<book.chapters.length-1?book.chapters[idx+1]:null;
  let nav='<div class="chapter-nav">';
  nav+=prev?`<div class="chapter-nav-btn prev" onclick="loadChapter('${prev.id}')"><div class="nav-hint">◀ 上一篇</div><div class="nav-title">${prev.title}</div></div>`:'<div></div>';
  nav+=next?`<div class="chapter-nav-btn next" onclick="loadChapter('${next.id}')"><div class="nav-hint">下一篇 ▶</div><div class="nav-title">${next.title}</div></div>`:'<div></div>';
  nav+='</div>';
  document.getElementById('contentInner').innerHTML=`
    <div class="chapter-header">
      <div class="chapter-breadcrumb">${chapter.bookTitle}<span>›</span>${chapter.title}</div>
      <div class="chapter-title">${chapter.title}</div>
    </div>
    <div class="content-body">${chapter.content}</div>
    ${nav}`;
  document.getElementById('contentArea').scrollTo({top:0,behavior:'smooth'});
  document.getElementById('progressBar').style.width='0%';
}
function updateProgress(){
  const a=document.getElementById('contentArea');
  const t=a.scrollHeight-a.clientHeight;
  document.getElementById('progressBar').style.width=(t>0?a.scrollTop/t*100:0)+'%';
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
document.addEventListener('keydown',e=>{
  if(!currentChapterId||!currentBookId)return;
  const book=BOOKS.find(b=>b.id===currentBookId);
  const idx=book.chapters.findIndex(c=>c.id===currentChapterId);
  if((e.key==='ArrowRight'||e.key==='ArrowDown')&&idx<book.chapters.length-1)loadChapter(book.chapters[idx+1].id);
  else if((e.key==='ArrowLeft'||e.key==='ArrowUp')&&idx>0)loadChapter(book.chapters[idx-1].id);
});
buildTabs();buildWelcome();
</script><!-- 不蒜子访问量统计 -->
 
</body>
</html>
