<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伍柳天仙法脉 · 内丹四著</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1108; --ink-light:#3d2f1a; --ink-muted:#7a6a54;
  --paper:#f5f0e8; --paper-warm:#ede5d4; --paper-deep:#e0d5c0;
  --accent:#8b2f0a; --accent-light:#c4622d; --accent-gold:#b8892a;
  --gold:#d4a843; --border:#c8b89a; --border-light:#ddd0bb;
  --sidebar-w:280px; --nav-h:60px;
  --shadow:0 2px 12px rgba(26,17,8,.12); --shadow-deep:0 4px 24px rgba(26,17,8,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','STSong','宋体',serif;background:var(--paper);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* NAV */
.topnav{height:var(--nav-h);background:var(--ink);display:flex;align-items:stretch;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0}
.topnav-brand{display:flex;align-items:center;padding:0 24px;border-right:1px solid rgba(255,255,255,.1);cursor:pointer;background:none;border-top:none;border-bottom:none;border-left:none}
.brand-title{font-size:15px;font-weight:600;color:var(--gold);letter-spacing:2px}
.brand-sub{font-size:10px;color:rgba(212,168,67,.6);margin-top:2px;letter-spacing:3px;font-family:'Noto Sans SC',sans-serif}
.topnav-books{display:flex;align-items:stretch;flex:1;overflow-x:auto}
.book-tab{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 28px;cursor:pointer;border:none;background:none;color:rgba(245,240,232,.65);font-family:'Noto Serif SC',serif;font-size:14px;letter-spacing:2px;border-right:1px solid rgba(255,255,255,.07);position:relative;transition:all .25s;white-space:nowrap;min-width:130px}
.book-tab:hover{color:var(--gold);background:rgba(212,168,67,.06)}
.book-tab.active{color:var(--gold);background:rgba(212,168,67,.1)}
.book-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.book-tab-author{font-size:10px;color:rgba(212,168,67,.45);margin-top:3px;font-family:'Noto Sans SC',sans-serif;letter-spacing:1px}
.book-tab.active .book-tab-author{color:rgba(212,168,67,.7)}

/* LAYOUT */
.main-layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--paper-warm);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;box-shadow:2px 0 8px rgba(26,17,8,.06)}
.sidebar-header{padding:20px 20px 14px;border-bottom:1px solid var(--border-light);background:var(--paper-deep)}
.sidebar-book-title{font-size:16px;font-weight:600;color:var(--accent);letter-spacing:2px;line-height:1.4}
.sidebar-book-author{font-size:11px;color:var(--ink-muted);margin-top:4px;letter-spacing:2px;font-family:'Noto Sans SC',sans-serif}
.sidebar-search{padding:12px 16px;border-bottom:1px solid var(--border-light)}
.sidebar-search input{width:100%;padding:6px 12px;background:var(--paper);border:1px solid var(--border);border-radius:3px;font-family:'Noto Serif SC',serif;font-size:12px;color:var(--ink);outline:none;transition:border-color .2s}
.sidebar-search input:focus{border-color:var(--accent-gold)}
.sidebar-search input::placeholder{color:var(--ink-muted)}
.sidebar-toc{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-toc::-webkit-scrollbar{width:4px}
.sidebar-toc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.toc-item{display:flex;align-items:flex-start;padding:9px 20px 9px 16px;cursor:pointer;font-size:13px;color:var(--ink-light);line-height:1.5;letter-spacing:.5px;border-left:2px solid transparent;transition:all .2s}
.toc-item:hover{background:var(--paper-deep);color:var(--accent);border-left-color:var(--border)}
.toc-item.active{background:linear-gradient(90deg,rgba(139,47,10,.08),transparent);color:var(--accent);font-weight:500;border-left-color:var(--accent)}
.toc-num{font-size:10px;color:var(--ink-muted);margin-right:8px;font-family:'Noto Sans SC',sans-serif;min-width:20px;padding-top:2px}

/* CONTENT */
.content-area{flex:1;overflow-y:auto;background:var(--paper)}
.content-area::-webkit-scrollbar{width:6px}
.content-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.content-inner{max-width:780px;margin:0 auto;padding:48px 60px 80px}
.chapter-header{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border-light)}
.chapter-header::after{content:'❧';display:block;text-align:center;color:var(--accent-gold);font-size:18px;margin-top:16px}
.chapter-breadcrumb{font-size:11px;color:var(--ink-muted);letter-spacing:2px;margin-bottom:12px;font-family:'Noto Sans SC',sans-serif}
.chapter-breadcrumb span{color:var(--border);margin:0 6px}
.chapter-title{font-size:24px;font-weight:600;color:var(--ink);letter-spacing:3px;line-height:1.5}
.content-body{line-height:2;font-size:15.5px;color:var(--ink-light);letter-spacing:.5px;animation:fadeIn .3s ease}
.content-body p{margin-bottom:1.4em;text-indent:2em}
.content-body h2{font-size:20px;color:var(--accent);margin:2em 0 1em;letter-spacing:2px;text-indent:0;font-weight:600}
.content-body h3{font-size:17px;color:var(--ink);margin:1.8em 0 .8em;letter-spacing:2px;text-indent:0;font-weight:600}
.content-body h4,.content-body h5,.content-body h6{font-size:15px;color:var(--accent-light);margin:1.5em 0 .6em;letter-spacing:1px;text-indent:0;font-weight:500}
.content-body strong{color:var(--accent);font-weight:600}

/* IMAGES */
.book-image{margin:28px auto;text-align:center}
.book-image img{border:1px solid var(--border);box-shadow:var(--shadow);border-radius:2px;display:inline-block}

/* CHAPTER NAV */
.chapter-nav{display:flex;justify-content:space-between;margin-top:56px;padding-top:28px;border-top:1px solid var(--border-light)}
.chapter-nav-btn{display:flex;flex-direction:column;cursor:pointer;padding:12px 16px;border:1px solid var(--border-light);border-radius:4px;max-width:45%;background:var(--paper-warm);transition:all .2s}
.chapter-nav-btn:hover{border-color:var(--accent-gold);background:var(--paper-deep)}
.chapter-nav-btn.next{text-align:right}
.nav-hint{font-size:10px;color:var(--ink-muted);letter-spacing:2px;font-family:'Noto Sans SC',sans-serif;margin-bottom:4px}
.nav-title{font-size:13px;color:var(--ink-light);letter-spacing:1px}

/* WELCOME */
.welcome-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:40px;text-align:center}
.welcome-emblem{width:80px;height:80px;border:2px solid var(--accent-gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:28px;color:var(--accent-gold);position:relative}
.welcome-emblem::before{content:'';position:absolute;inset:4px;border:1px solid rgba(180,130,40,.3);border-radius:50%}
.welcome-title{font-size:28px;font-weight:600;color:var(--ink);letter-spacing:4px;margin-bottom:8px}
.welcome-subtitle{font-size:13px;color:var(--ink-muted);letter-spacing:3px;margin-bottom:40px;font-family:'Noto Sans SC',sans-serif}
.welcome-desc{max-width:480px;font-size:14px;line-height:2;color:var(--ink-light);letter-spacing:.5px}
.welcome-books{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:36px;max-width:500px;width:100%}
.welcome-book-card{border:1px solid var(--border);padding:16px 20px;cursor:pointer;background:var(--paper-warm);transition:all .2s;text-align:left;border-radius:2px}
.welcome-book-card:hover{border-color:var(--accent-gold);background:var(--paper-deep);transform:translateY(-1px);box-shadow:var(--shadow)}
.wbc-title{font-size:15px;font-weight:600;color:var(--accent);letter-spacing:2px;margin-bottom:4px}
.wbc-author{font-size:11px;color:var(--ink-muted);letter-spacing:2px;font-family:'Noto Sans SC',sans-serif}

/* PROGRESS */
.reading-progress{position:fixed;top:var(--nav-h);left:var(--sidebar-w);right:0;height:2px;z-index:50}
.reading-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-gold));width:0%;transition:width .1s linear}

/* MOBILE */
.sidebar-toggle{display:none;position:fixed;bottom:24px;left:16px;z-index:200;background:var(--accent);color:var(--paper);border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;box-shadow:var(--shadow-deep)}
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:var(--nav-h);bottom:0;z-index:150;transition:left .3s ease;width:min(var(--sidebar-w),85vw)}
  .sidebar.open{left:0}
  .sidebar-toggle{display:flex;align-items:center;justify-content:center}
  .content-inner{padding:28px 20px 60px}
  .book-tab{min-width:100px;padding:0 16px;font-size:13px}
  .brand-sub{display:none}
  .reading-progress{left:0}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

</div>

const CHAPTERS=[{"id": "tx_xu1", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "总序一", "content": "<h4>总序一</h4>\n<p>道本无言，有宣扬道理者以言，有授受道法者以言，则曰言在即道在也。有大根缘学者，闻言之下，顿悟得悟，言即自无。其浅根缘薄，执言而入。又次者进修，于是耳无是闻，目无是见，则不免终身缺陷，虽有弃捐六亲，徒然老死。志非不坚，竟为盲者盲引之误。故玄帝曰：正法难遇。第吾人安知所遇之正哉？惟《易》所谓穷理尽性以致于命者，正也。先大夫伯父季子，曰冲虚，余视若阿难之遇世尊也，生值旌阳龙沙之记。旌阳，晋初许真君，在贾后时，为旌阳县令也，后成道全家拔宅飞升，为上帝之左相，治世之福主也。当时留谶记云：千二百四十一年，豫章之境，五陵之内，出弟子八百，其师出于豫章同际龙沙之会，江中白沙掩过井口，是其时也。井口者，而山有小河流出，近章江二里许，河口皆白沙，其地曰沙井。与江西省城章江门隔岸也，河口不过五七丈，从来不识掩井口者何说，天启六年，亲见大江水中拥一白沙洲横当井口而掩过，此说旌阳千二百四十二年之前知也。即北真邱祖八派之传授金丹于秘闻，继玄宗于几绝者，尝谓古仙诸书以仙机襍入常语，则学者不免于泛视执常，而怨仙亦所谓难遇也，以长篇微泄数言，则学者不免于局见，自恨不究竟，亦所谓难遇也，而邪说得以横行坏人心术。由是，吾兄冲虚深为此惧，以天仙正理而直论之，吐师傅之秘，贯经见之机，警觉当来，药示有物，物示有时，探取有诀也。而论之归复有炉，封固有鼎，烹炼有候也。而论之火则周天符和四季氤氲以颠倒之妙也。而论之得丹捧圣乃论所以落黄庭，伏炁还神乃论所以证脱胎而面壁还虚，直了大觉金仙矣。是书也，贯彻始终，发明次第，药论详药，火论详火，不互言，人得证于不疑；不喻象，人不惑于不瞭。仙理之正，人人本真之本来，论理以直，万古只此冲虚一笔也。书成梓矣当是时也。及门问道者专即所答而又录之曰《天仙论语》，并论仙经之所以包括佛理，而佛释之所以借资于仙机者亦合语，而又录之曰《西方</p>\n<p>东土禅髓》，真足为注释于直论者耶，总名曰《仙佛合宗语录》。及合宗一出，则知二宗一道，尽嘱当人无劳相妒相辟，使二宗末学始知趋向，好共皈依，则汉明帝以来千五百余年谬妄之言，皆能识破，弃置无用之地也。今而后学者，岂无真志于仙佛者哉？若不从此论此录而入，终为不遇，不以此论此录为悟，终为不学。惟兹直论语录之言不可无。余又为有缘遇论录者劝也。第冲虚子不惜不世出之法宝轻泄为论为及录，度世之功虽多，泄道之过不少，余以同气之弟，为同师之弟，从来固守谨道之戒，见此论录之明夫仙佛正道于今不明道之世，而人犹且不能明夫道，余亦不得不又添注脚，以重明夫道也。因而为序。</p>\n<h6>时在</h6>\n<p>大明崇祯十二年岁己卯，旌阳许真君拔宅上升日，堂弟真阳</p>\n<p>伍守虚题于道隐斋为众告言。</p>"}, {"id": "tx_xu2", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "总序二", "content": "<h4>总序二</h4>\n<p>余初学道时侍孔圣门墙者久矣，每日读书三十常编，自谓不知何日可了此一局。尝见昔人谓孔圣后天地而生，知天地之始，我则寻其所知始者而为知，又谓先天地而殁，知天地之终，我则寻其所知终者而为知，如是知始或必了始，知终或必了终，擬捋不了者亦无多，讵知以是虚劳及惹成一虚名负荷世臣重任，又何日可得了哉？此殆狂情妄见者哉？时家大人曰：“知天地之始之终，我且尚囿于天地之中矣，以是为了可乎？况必不了乎？求其真了，只有一超出天地之先，而可造天辟地之能者在，乃为可了也。天地无而我独不无，天地有而我若不有，可为有、可为无，且在吾掌握中，能者若此而了，不犹俞于遥池哉？”余曰：“诺，是欲能之而不可得也。”大人曰：“既欲能之，可询之吾兄冲虚子者，是吾同师受学有道之兄也，吾将先声言于吾兄。”乃以秃毛头飞而报曰：“吾今当与汝一法嗣，为流法之原泉。”连报者三五而后受余是嘱，诸伯父为范，我伯师也，因而得闻其所撰《天仙正理直论》注稿也，正所谓造天辟地之能也，而生天地中之生人生仙佛者，悉备具于此论，可令人人皆能者也，能此皆可了也，余遂知昔之寻知始知终而为知者以为能，则于生育天地，运行日月，造化诸有，造化诸无，即皆得闻而能之，实有此道而为了也。诸学道者，有此为能，其真学正理直论，而得了天仙诸佛圣真之道者乎，故当余询伯师之道语时，伯师以此答语又录之，曰《仙佛合宗语录》，申明直论为之详注，以垂教至于天地之终。之后劫为仙佛圣真菩萨天人之法师而佐元始天尊妙化其度人之心，何等远大也哉！度尽世间善信仙佛圣真，皆超过天地之先后，竟不出一部《天仙正理直论》并《仙佛合宗语录》，余谓后人必当求此悟入，归精于根，复气于命，以为还神寂定于天地虚无之先而始为了尽世法尘劳，了尽生死性命之道，凡在天地之中及天地先后之知者能者，无不了</p>\n<p>了矣。故序此于论录之首，为后来欲学仙佛圣真者，重指示之云尔。</p>\n<h6>时在</h6>\n<p>崇祯十五年岁次壬午夏，嗣法弟子，徒姪太一伍达行，沐手书于伯师道隐斋中。</p>\n<p>冲虚子伍守阳 撰并注</p>\n<p>真阳子伍守虚 同注</p>\n<p>天仙正理</p>\n<p>增直</p>\n<p>注论</p>"}, {"id": "tx_qianxu", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "卷前·本序并注", "content": "<h4>卷 前</h4>\n<p>大明万历中，睿帝阁下，吉王国师，维摩大夫季子，三教逸民，南昌县辟邪里人，冲虚子伍守阳撰，并注。</p>\n<p>同祖堂弟，同师弟，真阳子伍守虚同注。</p>\n<h5>本序并注</h5>\n<p>伍冲虚子自序曰：昔曹老师语我云：“仙道简易，只神炁二者而已。”修仙者，必用精炁神三宝。此言只神炁二者，以精在炁中，精炁本是一故也。一神一炁，即是一阴一阳。予于是知：所以长生者以炁，炁者，先天炁，即肾中真阳之精也。人从此炁以得生，亦修此炁而长生，唯用修而得长其生，故称修命。陈希夷所以云：“留得阳精，决定长生。”是也。所以神通者以神。神者，元神，即元性，为炼金丹之主人。修行人能以神驭炁，及以神入炁穴，神炁不相障碍，则谓之内神通；能以神大定，纯阳而出定，变化无穷，谓之外神通；皆神之能事，故神通即驭炁之神所显。此语人人易晓。</p>\n<p>第先圣惓惓托喻显道，托喻者，以神喻姹女、喻离女、喻妇、喻妻、喻我、喻汞、喻砂也；以元炁喻婴儿、喻坎男、喻夫、喻彼、喻金、喻铅也。喻虽多，不过心肾中之二物。而世多援喻诳人，借古者，以人喻为言者，便假说以女人为彼家，以阴户为鼎器，以行淫为配合，以淫媾久战而诳人曰採取。取男媾之秽精、女媾之浊涕，而吞之曰服食，此《广胎息经》之异说也。岂可以犬马媾后，而啖遗精之事而教人乎？有借古者以外丹药喻为言者，便用砒硫胆硇盐矾硝皂杂物，烧炼炉火以诳人，而阴为提手，行其拐骗之诈谋。致道愈</p>\n<p>晦；世人贪女鼎之乐，以淫媾而失精，反称曰採补，本催死之事，反称不死之道。宁贪数年之淫乐，无证果而速死，不学百日筑基成而得长生。愈行假路，愈不识性命之真宗。又有世人贪求横财，烧炼炉火，只学点茅假银，反称为点化金丹；意图赚钱而得大利，反遭折本而倾家。愈信方士愚弄，愈不识真金丹之妙药。此所以道之不明，而曰愈晦。故先圣又转机而直言神炁矣。喻本为明道而设，言其近似。邪人执喻为道，而道反受害于喻矣。故自我邱真人以来，诸祖不得不直言神炁二者，以决言道之真。群书之作，或有详言神，则未有不略于炁者；或有详言炁，亦未有不略于神者；是亦天机之不得不秘也者。奈后世又不能究竟，无全悟何？无完修何？仙道以元神、元炁二者双修而成，故说性命双修为宜。古圣详神略炁，及后世愚人不明乎炁，只妄言后天呼吸之事，所以不能全悟完修而成道；古圣详炁略神，后世愚人不知所主者在神，只妄猜修命不修性，犯吕真人所言，如何能入圣？所以亦不能全悟完修而成道。流祸至于人人易视仙道而轻谈，僧人小视仙道为不足证。予亦正欲均详而直论之：夫既谓炁为长生之本，有命之蒂也。宁不以神受长生之果者乎？有性之根。将谓神为修长生之主，宁不以炁定长生之基者乎？一日户部郎四愚张公，名学懋，来冲虚子道隐斋中，问曰：此四句是如何说？伍子答曰：此性命双修之说也。炁为长生本者，言先天炁即真阳之精，世人耗尽此精炁则能丧命，返还得此精炁则能长生，所以古云“炁是添年药”，又云“留得阳精，决定长生”是也。我言学者要知长生之本为先天精炁，当知非容易可得者，必由神而驭之而得长住长生；则此长生之果，唯是神长住之所受用者，故说受长生之果是神。神为修长生主者，言若不以元神主乎炁，便不得真长生之元炁，经云“神行即炁行，神住即炁住”，我故说修长生之主是神。然神非得炁定基，而长凝神入于炁穴，则神堕空亡而无所长住而不能长生。必得真炁为不死，而后神随之以不死。双修之理，少一不得，少神则炁无主宰不定，少炁则神堕顽空不灵。是炁也、神也，仙道之所以为双修性命者也。《西山记》云：“虽知养性之理，不悟修行之法，则生亦不长。虽知修炼之方，不得长生之道，则修亦无验。”且谓今也以二炁为论，所以明生人、生仙佛之理也。</p>\n<p>炁曰二者，以其先天炁及后天气，分二体而二其用也。先天必因后天而采取，而烹炼，而入穴凝神，方能神炁合一。后天必因先天则有归依，有证果，还伏而寂定。唯二者当并用，故并论之。然欲明生人之理，其先后天之炁，曰生身、曰成身，皆以顺行，及住世间亦皆顺。欲明生仙佛之理，其二炁随神而返身中，皆逆用而还伏为静定，寂灭而真空。若二炁不顺行，则人不能生；二炁不逆行，则仙佛亦不生。药物为论，所以明脱死超生之功也。人生有必老病死之理，唯真精、元炁为救老病死之药物。修炼之，而服食之，除其老病苦，得不死而长生者。而火候，集古为经，所以合群圣仙机，列为次第之宜也。世人皆知“圣人传药不传火”，为见薛道光之言故也。及我博观，则见圣圣皆有传火之言。但不全言而皆略，即我所说略于炁者。我欲全言之，又不敢下口；便下口言之，而人未必信征，未必能用，与不言等耳。故集众圣之略言者，而成我欲全言之志。集过去世高真上圣度世之言，留为未来世圣真为常行不易之经，故独以经名，永灭却未来世言有候、言无候者之偏疑耳。且知众圣皆已言之，精明慎密如此，非我臆说杜撰之言也！真有切于度世矣！喻筑基，论二炁渐证于不漏；定息还精炁，谓之筑基。息定精还，谓之基成不漏。若有漏则不能为胎神之基，无漏则身可久生，而为伏炁胎神之法界也。借炼药，论二炁成一而不离；药不炼，则金木间隔。炼之者，金木合一，火药适均，即所谓“相见结婴儿”者。阐伏气，论藏之内而不驰诸外；阐者，前人皆秘而不言，此独阐扬直论之也。外驰者，炁散而神无所归依。伏者，即所谓“若欲长生，神炁相住”之说。虽反复言炁，而不见其繁，立一名，彰一义也。言后圣见名，当思所以用实义，勿作世间时文套语忽过。论炼己者，论其成始成终之在真我，真我者，是言己之本来面目，即元神本性之别号也。凡所为採药炼药，基之筑成于始者，皆由炼己，证本来面目之成于始者，即所以修性于始也。所为伏气胎息，为脱胎出神，成还虚于终者，皆由炼己证本来面目之成于终，即所以修性于终也，始终皆是本性而成仙。能复真性者，即仙也。非真性者，即非仙也。世世之愚人，不知仙即是性，与佛即是性同，所以举世谈仙而莫知所学，而亦莫有所成。但仙圣始言炼己者，以其有诸相对者，是性之用于世法世念中而逆回者</p>\n<p>言之也。终言炼神还虚者，是性之无相对者，独还于虚无寂灭而言之也。其实只是一个性真而已。世之愚人堕于邪说外道者，妄执邪见，偏于谈仙、谈佛，谓仙不是性，而佛是性，谓佛毕竟与仙不同，不信《法华经》所谓仙人授佛妙法，如来因之成佛。不信《华严经》所谓“如来大仙道，微妙难可知”。既不信佛言，何必强谈佛？予谓不但不知仙、不知佛，并亦不知自己性，而徒妄言诳语以惑世自堕。可惜于仙佛法海中不能见一浮沤，真可怜也！专言神而不见其简，操一机，贯一义也。元神本性，主宰乎性命而双修。始也，欲了命，为长生超劫之基，则以性而配命为修，固双修之一机；终也，欲了性，为长生超劫运之性，则以长生之命配性而为修，亦此双修之一机也。此正显明直捷全机，简而不简者也。鼎器之论，见神炁之互相依。此即命依性而了命，性依命而了性，炁依神则能化炁，神依炁则能化神。胎息之论，密指胎其神而息其炁。此又合神炁而归其妙、化于神而虚者也。胎息之初，炼炁以化成神，即经所谓“不出不入，自然常住”者。如佛之龙宫一定七日，菩提树下一定七日。仙曰胎圆，佛曰灭尽定。及阳神出现，仙曰出神，佛曰始成正觉、如来出现。从此皆名顿法，仙曰炼神还虚，佛曰虚空界尽，我此修行，终无有尽。此皆神而虚无之极境也，所以能超过天地劫运者。仙佛皆要如此而后可。如此语成九章，道明无极。复以曹老师昔为我浅说道原者，发明之，亦成一篇，冠之《直论》之首，先揭其大纲。曹老师昔云：古圣所言修行之事及我素所言者，皆节目，即儒家所谓人道之当然者。我今再为尔浅说其道之原，即儒家所谓天道之所以然者。若知人而不知天也，不可。何也？凡曰大修行，非止于了此一生之事而已，必要证无上之上。先要知大道所以然之真，而后修得证所以然之妙，始可信心直行到极处。不然，何所往？而何所证？岂不误大圣大真之大志哉！我今亦揭道之原，发明于篇首，以示修行之总纲。而道体之全，已尽精微于《直论》，又致广大于《浅说》；且广大之不废详，精微之不废捷。凡广大之言，皆止于大略。唯《浅说》之广大，而兼详明，无疏略处。凡精微之言，皆近于隐秘或繁琐，唯《直论》之精微而更捷要，无隐繁处。二者全备出世，而世始全仙道矣。予论说全备成书，真足为世之鉴观者。虽有奸邪棍党，欺诳世之初学</p>\n<p>浅见，谓：妙诀不载书，必要我口授方知秘法。斯言固足取信于人，以施邪计。若有志学者，必要得是书，而先观之，则求道有指示，而人不可欺以邪；已得真传仙道者，而后观之，则有印证，而可知玄妙之所以然而当然；已行真仙正道，而后观者，则所行与道合不合，其功成不成，有所考据。若所闻、所行合是书，即可信、可成，若不合是书，即必不可信，必无可成。所以孔子云：“夏殷之礼，吾能言，杞宋不足征，文不足也。”子思云：“上焉无征不信，下焉不尊不信。”而谓《直论》全书可少乎哉？故陈泥丸亦云：“若未逢师且看诗，诗中藏诀好修持。虽然未到蓬莱路，也得人间死较迟。”是也。倘有不彻诸书之简语，语简而少，必不能发明至玄妙之大道，学者何以得彻悟？抱朴子亦云：五千言虽出于老子，其中不肯全举其事，诵而不得要道，直为徒劳耳！文子、庄子、尹喜之文章，永无至言。或齐生死为无异，或以存活为劳役，殂殁为休息，其去神仙已千万亿里远矣。必当从此证会其全；古仙佛诸书，皆详一而略一。如仙书只详言炼精化炁以出欲界，曰採取、曰烹炼、曰成丹、曰服食，至于十月之炼炁，但曰守中，不尽其化神之说，此皆书之所简也。如佛书只详言禅定色界四禅之理，用之以出色界，即仙之炼炁转神入定也。至于欲界，离欲除淫，如仙之炼精化炁者；但曰不除淫，修禅定如蒸砂石，终不成饭。如来涅槃何路修证？明明言淫之当戒，而不言淫机身心何以得断？淫根何以无漏？而成漏尽通不死之阿罗汉；亦是语之所以简也。我故曰：佛言详于终，而略于始。所以无始者必无终。仙言详于始，而略于终。所以有安于成始，而忽于成终者有之。亦即此序所谓详炁略神，详神略炁者。我见诸书俱是如此，故以炼精炼炁，化炁化神而全言之。又炼神还虚，为超出无色界之所必由，皆为从前仙圣之所略言者。但曰九年面壁，我乃以大定常定之至玄至妙者，而历历全言，全之又全，愿后之人人得与仙佛齐肩，皆从此《直论》一书悟入。有不悟诸书之隐言，言隐，则拟议者难以知，隐即喻也。如《参同契》之喻乾坤、喻坎离、如喻日月、喻水火、如喻彼我、喻男女、喻夫妇、如喻龙虎、喻乌兔、喻龟蛇、如喻药物、喻铅汞、喻金木、如喻甲庚乙辛、喻丙丁壬癸、喻戊己、喻火候、喻鼎器。如此多喻，即令人能以喻悟正，犹且难知；无奈妖人，又且借喻叛正，以惑学者；人将何以参悟哉？故抱朴子云：“考</p>\n<p>览奇书，既不少矣。率多隐语，难以卒解。而意之所疑，又无可谘问。”是也。必当从此证钻其显；人身中，只有精炁神三宝为得生之本。此论所说，神与精，只用先天，忌至后天；而炁不能无先后天之二用等语，说得何等显明。《心印经》曰：“上药三品，神与炁精。”已直言之矣！百日内之理，我显言精炁神者，亦遵之也。养胎定神，只有神炁二者。《胎息经》曰：“若欲长生，神炁相住。”已直言之矣！为十月内之理，我于此显言神炁者，亦祖述之也。固不敢巧立幻言以为显，又不敢重立喻言而终成不显。熟计古昔诸书，近于有道之世，可易明易悟，虽借喻言亦无害。今之世，旁门邪说横行，遍满天下，各立门户，借喻诳人，令学者无所从由。于此不可复用喻言之世，不得不显言直论，以开正门、辟正路，接引后圣，而易悟入，我之愿也！敢不勉焉而直论之哉？读此者了然解悟，后圣得《直论》而读者，必得顿然解悟。我以四十余年究竟之力而悟，后圣不终三日，彻见而彻知，并解悟二经之法旨，不大便益耶？则其超凡入圣，端在兹乎？古人有一字之师，有一句之师，曾谓此论注，已六万言矣，不可师教未来际圣真哉？即其解悟能由于此，修证亦必由于此矣！其因果必不昧。</p>\n<p>时大明崇祯十二年己卯秋，邱真人门下第八派分符领节弟子冲虚伍守阳，序于南都灯市道隐斋中。</p>\n<p>崇祯己卯秋，论注六万余言，始成于鹊桥成渡日，即有姑苏门弟子澄川吴庭芳命梓，金陵道友齐惠吉及南昌旧门生涂之芬同赀辅之，梓成流布继往圣以闢邪说，开来学以正人心。度尽当世圣真及尽未来际劫圣真，愿此功德证仙佛自利利人之果于无极，纯阳翁所谓同志三人者，盖如此。</p>\n<p>序注终</p>"}, {"id": "tx_zengzhu", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "卷前·增注说·道原浅说篇", "content": "<h5>增注说</h5>\n<p>书有不必注者，谓已显明直捷，反覆辩论之，若有注也。书有可以注者，谓宜发明书言，以己意逆合而注之也。必后之闻见与前之闻见同，前书得后注，理愈明而犹合辙若一，斯可不诳惑于世矣！若观者不知作者意，如注《参同契》为纳甲，注《悟真篇》为房术，注《楞严》、《楞伽》、《金刚》、《法华》，以时文训诂套语，不能剖真修实义，各成门户。致有经自为经，注自为注之斥。出乖露丑，则亦何用注为？所以《天仙正理直论》，既有《仙佛合宗》为之注，犹惧后人妄注错误，害超世之圣真，吾堂弟真阳子又加注之，予又辅之，同一师之学，并四瞳之见而为之者。其《合宗》二注，又皆出予著者之手，无非杜绝众口之妄，保全度世之真；则后世不必画足于蛇，倒罹于首，令未来无极劫中，皆不失性命根宗，不迷超劫慧命，诚不谬注者之所赐也！故亦诫之曰：毋烦后注！</p>\n<p>道原浅说篇 本曹还阳老师平常言教之目，门下伍子发明为总纲。</p>\n<p>伍子道原浅说发明曰：仙家修道为仙，初证则长生不死，伍真阳注云：人人同此生，有长其生而不死者，乃仙宗有修有证之圣人也，与无修证有生死之凡夫不同。所以欲高出于人之上者，不可无修证也。修之初，炼身中之元精，不离元炁，而复还化元炁，古圣谓之炼精化炁。炼到炁足，即为初修之证。炁果足，而无漏窍，便长生不死，成漏尽神通，出欲界矣。此由筑基之果成。钟离真人《传道集》谓“是初学之小成”是也。又昔吉王太和问曰：人言长生不死，最难得者、最大之事。老师今浅明言之，但曰初证者；请再详之？冲虚子曰：初修炼肾中真阳之元精，谓之筑基。阳精炼得不漏，而返成炁，渐修渐补得元炁足，如童子之完体，方是筑基成者。基成则永无漏之果从此始，故曰初证。此由百日之得果也。后面有十月化神，九年还虚，正是大事，与天地同久，证得大果，谓之大成者是也。世人不知后证之大，只止于此，便以此为大；故吕祖云：“修命不修性，如何能入圣？”以其神不通灵，故又言“寿同天地一愚夫”是也。太和曰：今闻教，始知天仙之道为至大。极证则统理乾坤。真阳曰：由色界之修证而上，历无色界之修证而超出，永与虚空同体，证天仙矣。钟离真人谓之中成、大成是也。得到天仙即理天上之事，与天地同长久。邱真人云：“寸地尺天，皆有所辖，无空隙处。”是也。又昔吉王殿下问曰：天仙虚无之极，如何统理乾坤？冲虚子曰：初修时，主颠倒乾坤，主天地交泰，亦是统理之始。道成时，如太上三大天尊之主玉清、上清、太清者。玉帝为万天之主者。玄帝之北极镇天者。东华之帝东方者。世尊在西天救世度人者。天官管天，地官管地，水官管水者。三清有九霄、三十六洞天之理者，有二十四治之理者，如张天师管阳平治之类。尘世之下有八十一洞天之理者，有五岳之主者，唐李靖主中岳者，汉张子房主王屋山者，许旌阳为丹台宫主者，王喜先生为蓬莱上岛主者，涓子为中岛主者，陈抟为蓬莱下岛主者，钟离真人为南州讲法师者，邵坚为匡庐山主，杨太君为天台山主，三茅真君主三元罪福事。此皆出于《太清玉华仙书》之说及世人传</p>\n<p>诵者。以此观之，邱真人之言，亦先发明之者矣。王曰：是。古今人人羡慕而愿学者。世闻仙能不死，又有神通，谁不羡慕？又见紫阳云：“学仙须是学天仙，唯有金丹最的端。”谁不愿学？又《因果经》云：“佛启父王曰：‘我欲出家，为有四愿，愿不老，愿恒少壮，愿无病，愿不死。’”此见仙佛同愿。但道理精深，人人未必能晓。古圣高真借法象为喻，而法象实非真我性命，权指身心粗迹之近于己者以示人；而实悟入于未有身、未有心之上，斯所谓精深也。后世人遂以法象而执之，如铜人身上用针灸，何以愈人身之病？所隔者远也。遂冒认身心而揣摩，如将甘蔗囫囵一吞，抑何得有真滋味？此由未能晓之故也。予欲为众浅说之，以发明前圣之所未发者。前所未发者亦多，如炼神还虚之理，如炼精止火之机，如辨採药之何为真精，如剖周天之何为大、何为小，如超脱以五龙之捧，如常定喻乳哺之养儿皆是。今皆有发明精切语。夫所谓道者，道字即人所以生死，所以修证，必然由之而不可无者，不可不知者。是人所以得生之理，道之用于化生，谓之精炁神。化生而为人之身，故精炁神之化生人，即是道之化生人。而所以养生致死之由。既生有其身，由精炁神盛旺，则生得所养而全天年，由道也。精炁神衰竭，则形枯而致死，亦由道之所致。修道者，是即此得生之理，保而还初，使之长其生而不死之法。真阳曰：按昔《太上养生胎息气经》云“精全炁全；精泄炁泄；唯精与炁，须保全真”。是此义也。故此书亦直说修炼精炁神，保守真元，补还具足如初，即所谓“三真三全，必定神仙。”是也。得生之理者，一阴一阳，为一性一命，二者全而为人也。真阳曰：既性命双全，方成得一个人，亦必性命双修，方成得个仙佛。未有二者不全，而能成人、成仙佛。必以顺之成人者，以逆成仙佛，所以知为仙佛由于为人。何以谓之阴阳性命？当未有天地，未有人身之先，总属虚无，如《易》所谓无极而太极时也。真阳曰：太极是一炁之极至处，无极是一炁之极无处。无极在太极之先。太极虽有一炁，无阴阳动静，所谓鸿蒙未判之时也。无中恍惚若有一炁，正言鸿蒙未判而将判者。判言分也，未分阴阳动静也。是名道炁，亦名先天炁。以恍惚将判，言先天炁，必如此时此景象之炁，方是</p>\n<p>虚之极、静之笃者，为至清可炼金丹之药物。不如是，炁非先天。此炁久静而一，渐动而分。阳而浮为天，比如人之有性也；阴而沉为地，比如人之有命也。冲虚云：此言阴阳性命，皆在动分后说的；不兼静一说。吉王问曰：动分已与静为二矣。动后又可于动言分阴阳为二乎？冲虚云：古云“一生二，二生三”，见得是如此，便说如此。阳动极而静，阴静极而动。动静原是循环不已的。阴阳相交之炁，而遂生人。阴阳不交，则天地不能生无炁之人，必不能修无元炁之仙佛。必阴阳二炁交，而后生人、生仙佛也。则人之所得为生者，有阴阳二炁之全，有立性立命之理，故曰人身一小天地者也。此结上阴阳性命之说。以下正说修行之事。禀此阴阳二炁，顺行，随其自然之变化，则生人；逆而返还，修自然之理，则成仙成佛。是以有三次变化而人道全。人道者，生身成人之道也。一次变化，是父母初交，二炁合为一炁而成胎也。二次变化者，是胎完十月，有炁为命，有神为性，而将产也。三次变化者，是产后长大成人，精炁盛极，十六岁时也，谓之三变者。亦有三关修炼而仙道得。初关炼精化炁，中关炼炁化神，上关炼神还虚，谓之三关修炼而所以成仙者。顺行人道之三变者，言一变之关，自无炁而合为一炁也。父母二炁初合一于胞中，只是先天一炁，不名神炁。此时母胞胎中无呼吸无神。及长似形，胎之长，似有人形。微有气，似呼吸而未成呼吸，正神炁将判未判之时。及已成呼吸而随母呼吸，则神炁已判，而未圆满之时。胎之十月未满。但已判为二，即属后天。此之二，非离一而为二；是一之显然似有二之理。二尚精微而未成粗迹，从此以渐长胎之时。斯时也，始欲立心立肾，胎中渐生五脏，渐分立心肾之形。而欲立性立命矣。有心即具有性之元；有肾即具有命之元。神已固藏之于心，炁已固藏之于脐。神即性，是心中所有，固不离于心；炁即命，是肾中本有，固不离于肾。及至手足举动，翻身，而口亦有啼声者，十月足矣，则神炁在胎中已全。此二变之关，言一分为二也。出胎时，先天之炁仍在脐，后天之气在口鼻，而口鼻呼吸，亦与脐相连贯。先天之神仍在心，发而驰逐为情</p>\n<p>欲。由是炁神虽二，总同心之动静为循环。此言性有动静，命亦有动静。即前所谓一分二，二亦有动静之说。如人睡时，炁也静，性也静。及其觉时，本炁之觉，炁也动，性也动，即后所谓神炁同动者。儒亦言“炁一则动志”者似此。年至十六岁，神识全矣，精炁盛矣，到此则三变之关在焉。或有时而炁透阳关，命根元炁之动于中，未有不发散驰于外者，故到阳关，亦是常行之处，谓之熟境。则情欲之神亦到阳关，神有通天彻地之能，亦有知内知外之能，内外总摄于一神。内有动，神也知；外有动，神也知。驰于知外，世人多堕于世事。神炁相合则顺行，为生人之本，此炁化精时也。谓之三变者如此。修炼三关者，使精返为炁，即百日关中筑基之工也。《法华经》中，佛亦说百日之期。炁炼为神，即十月关中，转神入定之工也。神还为虚，九年面壁之大定也。即是从三变返到二变，从二变返到一变，从一变转到虚无之位，是为天仙矣。由此虚之而又虚，虚到无极，便是天仙升迁到极尊处。此处合用修炼之工，“三变者”以前，是说人所以得生之理，自然顺行者。自“修炼三关”以后，俱说使之长生不死者。说到此，是说人真修实悟之时至，必当用修炼之工，不可不知。正宜浅说之者。此下皆浅说性命之道，浅说修炼之工。夫炁与神，皆有动静。自此至“而已耗精者之修也”止，一大段，详言成仙佛之真宗，大修行之全旨，《直论》中之总要，《合宗语录》之秘机，提纲于此尽之矣。而静极之际，正有动机。动之机，顿然之觉，不着世事，故言机。炁动，即有神动，时至神知也。神不知，便教当面错过。即此动机，便可修仙。炁动而化精，行世法而耗尽以死者之必致。真人即于动而还静之为修以不死。机者：虽若动，而不为动用，方可逆修而为仙。缘此机为生人、生仙佛之分路，分路者，分顺逆之行也。机动时，顺此机而行，即以生人。逆转，动而还静，即成仙佛。故《道经》云：“动者静之机。”佛祖云：“若要真不动，动上有不动。”入死入生之要关。动机乃人之可生可死者，盖人之求长生者紧要的。炁机既以属动，将欲出阳关，而为后天之精者。陈泥丸曰：“子时炁到尾闾关。”《道藏》经云：“精者妙物，真人长生根。”此《太上胎息气经》语也。</p>\n<p>《黄庭经》亦云留胎止精可长生。正言此未成后天精质之先天炁，名元精者是也。先天炁即元精。夫此炁虽动，不得神宰之，而顺亦不成精；如童子辈，有真阳之炁，亦不无动静。但神无妄觉，不能宰之，何曾成精？不得神宰之，而逆亦不返炁。吕祖真人云：“龙虎不交，安得黄芽？黄芽既无，安得大药？”修仙者，于此逆修，不令其出阳关。钟离真人云：“勒阳关，则还元炼药。”即因身中之炁机，合以神机，元炁发动之机，元神妙觉之机。收藏于内，返归于元炁之根。而行身中之妙运；採取烹炼，皆此时至妙之运用。以呼吸之气，而留恋神炁，《黄庭经》云：“呼吸元炁以求仙。”方得神炁不离，则有小周天之气候。夫小周天云者，天之周围三百六十五度有零，只是一个。天无二天，何有小大之异名？以用者小其机，故名曰小。言取象于子丑寅十二时，如周一日之天也。一日天之行，周十二时之名。神炁配合时，炁之行住，亦若周十二时之候也。然炁有行住，必有起止。炁之为物，不能偏于行，不免于住；不能偏于住，不免于行。故道一禅师亦云：“未有行而不住，未有住而不行。行住而曰不离这个，是以这个行住，即不离这个。”行住犹有起止，白玉蟾云：“起于虚危穴，以虚危宿在坎宫子位也。”起于是，亦止于是，亦为一周天也。如是则行所当行，住所当住，起所当起，止所当止也。炁行有数，忌其太多。数者同于周天者。周于天，则动者已复静矣。再多则着于拘滞，徒为废时失事，于理无益。炁行有时，忌其太久。时即数之义。周天十二时候，非有时，亦不拘着于时；但取象于时，以为节制程限耳。又，陈朝元曰：“凡炼丹，随子时阳炁生而起火，则火力方全；余时起火不得，或太久，或不及，皆火力不全。”不使之似于单播弄后天气者，恐以滞其先天炁之生机故也。生机滞，则后天呼吸无所施。后天气用之不已，而先天炁不生。古云：“鼎内若无真种子，犹将水火煮空铛。”是也。此修仙之至紧至秘之工，故以周天三百六十限之。虽曰周天，实非天也。心中妙用，略有似于天之周数，为妙用之程限者。子行三十六，积得阳爻一百八十数；午行二十四，合得阴爻一百二十数；五位阳爻用九也，故共一百八十者，除卯时不同爻用。五位阴爻</p>\n<p>用六也，故共一百二十者，除酉时不同爻用。以卯酉行沐浴以养之。古圣不轻传火，故云“沐浴不行火”。今此说云“行沐浴”，非异也。不行者，不行其所有事；行者，行其所无事；学者当知其有妙用。若还持疑不决，请看钟离真人所云“一年沐浴防危险”者，已言矣。运此周天积累动炁，以完先天纯阳真炁。一次火候，运一次周天之数。已完足一周，则真精真炁归复于命根；而愈旺其发动生长之机。此只是真炁在根本处，自纯阳不失，非从外得，有所增补积累。故凡一动，则一炼而周。使机之动而复动者，则炼而复炼，周而复周。此言凡遇有一动之炁，即要炼之，以完一周天。若一天不周，则真炁不长旺而速于神化。又不可一周完而不歇。虽无大害，亦迟其动机，为无益也。积之不过百日，则精不漏而返炁矣，古云“百日筑基，炼精化炁”，是大概之言也。或以七八十日得炁足，或五六十日得炁足。功勤不差者易得，年少者亦易得。此三关返二之理。已返到扑地声离胎，七窍未开，神识未动，真炁在脐之境也。此四句言人初出母胎时，是如此。及今逆修时，用完百日小周天之工，方得真炁足，似如此。所以庐江李虚庵真人曰：“阳关一闭，个个长生。”言得长生之基也。真阳曰：阳精元炁，总为一身发生之根，皆有耗折之理，独淫欲耗折之多，而致死之速，由败于阳关。阳关者，阳精出入之关也。出之则耗而死，入之则精自满，而得长其生。始也，我主宰，闭之不令出，及满足，则关自闭矣。凡有精，则求出路，无精以通，路固自闭。如儒家所谓“用之而成路，不用则茅塞之矣”之说似。故吾师祖李真人云：“修到一闭，即得长生。人人得闭，人人长生。无有异者。”吾兄冲虚云：“从此得长其生为始，便永得长生，与天地齐其寿量之基也。”李师祖及我弟兄三人皆浅直切言之：凡长生必由于一闭。得一闭如此，便得真长生；不能闭，便不得长生；求长生者，当于此勉之、求之。昔石杏林真人，求师后云：“得师诀来，便知此身可不死。”知此，丹必可成。精既返而成炁，则无复有精矣。无精是炁因静定之久，不复动而化精，淫根缩如小童子，所谓返老还为童体者是如此。故佛家《华严经》亦云“成就如来，马阴藏相”是也。如有精，则未及证于尽返炁也。真阳曰：有精即是有漏之躯。全无一点精，方是无漏之躯。世有一等人，虽未行淫事而不泄</p>\n<p>精，只名节欲，不名无漏。今之出家僻处，持五戒以禁淫者是也。犹有可漏精者在，如玉通禅师，住虎丘四十年，持戒禁淫，竟败精于红莲妓者之千拜。此正无实果之案也。观其死即随之，又不能了生死之案也。又，吉王问曰：真无漏者如何验知？冲虚云：真无漏则阴缩如小童子，绝无举动，绝无生精之理，焉有漏？始得成有修有证之漏尽通也。若人老而阴缩者，是阳炁残而痿矣。无精者，是精已枯竭矣。从生身来禀赋得阳炁微弱所致，不可误认为修证。若人到衰老时求修证，必要补精到能泄精地位，而后始有可长生之机，切不可误至于老来铅汞少者也。则亦无复有此一窍矣，如有窍则未及证于真无漏也。此一窍是精所出之处也。精尽化炁，不须用出路，故无窍。若有一窍在，犹可漏精，则炁未得足者，可知矣。昔长沙王星垣殿下问曰：何以知精满尽化成炁而不漏？冲虚云：真实修炼之人，精已炼成炁者，便有止火之候自到，此是无精之灵应也，则无窍矣。此无窍无漏方真。真炁亦不得死守于脐矣，若只守于脐而不超脱过关，此时始有真炁过三关。得真炁者，名得金丹大药；过三关者，名曰服食；逆上三关，名曰飞昇。不过暂有少得长其生之初基，而为人仙也，未能永劫长生。吉王太和殿下曾问曰：得长生，皆曰一得永得，何故今言暂得、永得之不同？冲虚子曰：一得而能决烈向上，则有上之所证，而永劫长生，形神俱妙，顿超劫运矣！若言我已得到此果，更又何为？止于此，不过少得初基而已。又必烦于守护，方是人仙不死。若更行淫欲，漏却一点阳精，犹是有漏凡夫，生死不能逃者，可不勉而究之哉！故有迁移之法，古人所谓移炉换鼎之喻者是也。施祖、施肩吾真人，亦吕祖之师。钟离、正阳真人，吕纯阳真人之度师。吕祖纯阳真人。《三仙传道集》所谓三迁者，此当用其一迁矣。吉王太和殿下问三迁之说，冲虚子云：按钟离答纯阳论还丹云“还者，往而有所归。丹者，丹田也。丹田有三，炁在中丹，神在上丹，精在下丹。自下田迁至中田，中田迁至上田，上田迁出天门，是为三迁。功成，既自下而上，不复更有还矣”。吾见钟离此语矣，闻吾师之说同。即以七日口授天机，探其大药，七日者，是採大药七日之功也。吉王太和殿下问曰：初关百日採取烹炼，于今日，却以七日採，又曰採大药，从古至今不见于书，全未闻此语。请问何以</p>\n<p>药称大？採之日数久暂，何以异？冲虚云：此万古不泄之仙机也！百日之初，虽曰採真阳之精，精绝无形；又名真阳之炁，炁本无相；古圣只云虚无之炁。其所发生，生则无形之形附于有形，遍内外皆此炁之流行。所曰採，採则无採之採，借火为採。不见有药形迹，唯知有火而已。昔还阳老师引古语为我云：“夹脊尾闾空寄信。”诚然！是也。此言前之採也，精炁生动也是杳冥；还返于静也是杳冥。火气薰蒸百日之久，故真炁因之忽然似有可见，故止后天气之火，唯单採先天炁之药；故另用七日之工，採于七日之内；火异于周天，故曰七日口诀。何故用火之异？採之异？因此时真炁尽归于命根矣，虽有动，犹不离于动处，只在内而不驰于外，用则无火之火，无候之候也。此为异也。其所用以化神还虚之大事始此，所证以长生超劫，神通无极之大果始此，故名大药。即前所採虚无之炁，所得所证之实相也。採取得下田先天真炁，名曰金丹。邱长春真人云：“炼精为丹，而后纯阳炁足；炼炁成神，而后真灵神化；超凡入圣，弃壳升仙，而曰超脱。万世神仙不易之法也！”此曰金丹，即所谓大药。用以服食飞昇拔宅者，皆此耳。吉王太和殿下问曰：我闻砂铅炉火中所成者，曰金丹；世人共知，皆贪学而求服食者。今仙道修炼身中自有之炁神，亦曰金丹，曰服食，由何故？冲虚曰：坎肾属水，精出于肾，亦属水也。水由炁化，精亦由炁化。金能生水，故生精之炁喻金。炁化精时，则有炁在精中。故曰母藏子腹。如金在水中，精覆于炁，故曰水中金。当修炼之初，如从根发出苗，生而为药，乃虚无之炁耳！实无形相而虚无，恍然採取，不见有所採取者，故不曰服食。採取之久，火候之足，精还补炁之盛，谓之外丹成。其炁之发生，始有法成之妙相，而纯阳之炁根始动，以其是金炁也，故曰金丹。即是外丹。初时阳炁发生，出于身外为精。既返精于炁，不生于外，而唯实生于内。得此炁生，转而逆上三关，度鹊桥，而下重楼，经喉吻中如食，故曰服食。然“服食”二字，《本草》言药之可食，如心服之“服”义同。世人因此曰金丹、外丹，遂冒称砂铅之丹，为即此之外丹。因此曰服食，遂冒称砂铅之丹可服食。所以自求者，皆误认；为人谋者，皆诳语；后学宜辨之。吉王曰：今而后始知，世炼砂铅求服食者，为至愚；贪求不已者，犹为下愚不移者；可不明辨而改图哉！待到尾闾界地，真阳曰：尾闾者，</p>\n<p>二十四椎脊骨下尽处。界地者，三岔之路，上通丹田，下之前通外肾窍，下之后通尾闾。昔曹老师先上蒲团，先得大药，用七日之工。到五日之间，忽丹田如火珠，直驰上心，即回下驰向外肾边，无穷可出，即转驰向尾闾冲关。此皆真炁自家妙用，非由人力所致。但到关边，必用口授天机，方才过得关去。乘其真炁，自然冲关向上之机，太和曰：何以得自然冲关向上？冲虚曰：平日指引之力多故也。加以五龙捧圣之秘，按玄帝修于武当山，于舍身崖下，舍其凡身，以五龙捧其圣体，升于万仞崖上。当知此为超凡入圣一大妙喻也！盖玄言北方之色，言坎肾也。借帝喻我之婴儿，言水中之灵宝也。五龙者，工法中之秘机。五龙捧玄帝上升，即是以秘法捧真阳大药上三关转顶之喻。转尾闾、夹脊、玉枕三关，吉王太和问曰：前云三关，是初、中、上，此云是尾、脊、枕为三，请示曰转者以何为？冲虚曰：前云三关，虚拟其出三界之次第；此云三关，实指所必由之路。《华严经》云“践如来所行之道，不迟不速，审谛经行”者，即此也。其道在背脊二十四椎间之两头及中也。关者，紧要当行之路，而又为难行之喻，故名之。尾闾者，闾即关之义，尾为脊骨下尽处。脊有中、左、右三窍，髓实不通，呼吸之行乃尽于尾。尾之下，则窍虚，而气液皆通。虚实原以不相同，故名下鹊桥。用秘法天机以通之，令炁得转运。夹脊者，腰与脊之异名处。玉枕者，椎骨之上尽处也。转之者，古云：“一孔玄关窍，三关要路头。忽然轻运动，神水自然流。”萧紫虚真人云：“河车搬运上昆山，不动纤毫到玉关。妙在八门牢闭锁，阴阳一炁自循环。”此即转义也。已通九窍，真阳曰：每一关有中、左、右三窍。左右者，古云两条白脉，又云黄赤二道，为日月并行之道也。三关则有九窍，故邱祖门下徐复阳真人云“铁鼓三三，全凭一箭机”，佛宗人亦云“九重铁鼓”，又云九曲黄河、曹溪、西江洞水者皆是。直灌顶门；按诸佛、诸菩萨，初修皆有水灌顶，即此妙喻。夹鼻牵牛过鹊桥，牛性主于鼻，防牛之妄走，故牵鼻使由于当行之道。鹊桥者，鼻上路不相通之处。即崔公《入药镜》所谓“上鹊桥”也。何为不相通？盖鼻上之路实，炁不常行者；鼻下之路虚，乃炁所常行者。虚实不相同，故有妙法秘机以通，喻曰鹊桥。亦有大危险在也！详在后《语录》中矣。下重楼，喉之十二重楼也。而入中丹田神室之中，而亦通彻于下田，若</p>\n<p>合中下为一者；堂侄太一问：入中田宜如何用工？冲虚曰：昔曹老师云“下重楼而服食之”，是得坎实点化离阴，名乾坤交媾也，正是中丹田事，所行大周天之火候。火原是在下之物，却合下田而行者；虽合下而用，时时充满虚空，此便见合中下成一个虚空大境界。即有升降时，而真我不动之元性，犹在于合下之内。故世尊坐于菩提树下，而上升须弥顶，升忉利天，升兜率陀天说法，而亦不离于菩提本座者，与此同。此《华严经》之说也。又《大集经》云“佛成正觉，于欲色天二界中间，化七宝坊，如大千世界，十方佛刹，为诸菩萨显说甚深佛法，令法久住”者，皆同此意。世有人因古言“心下肾上处，肝西肺左中”，遂拟议着在脐之上有一穴，如此则无根可归，殆非也！以行大周天之气候。此以后火候，名大周天，与百日小周天者不同。故古人云：“自后仍吹无孔笛，从今别鼓没弦琴。”大周天者如一日，实周一天也。一符如是，十百千万符皆如是；一时如是，三千六百时亦皆如是；以周十月之天也。吉王殿下太和问曰：何为有大小周天之异名？冲虚曰：天固一也，而所用之工，有大小之异也。小者有间，大周则无间矣；小者有时，大周则无时矣；小者有数，大周则无数矣。何为有间、有时、有数、无间、无时、无数？答曰：古云“运罢河车君再睡，来朝依旧接天机”，言有间也。古云“子午工，是火候，卯时沐浴酉时同”，言有时也。古云“二百一十六，用在阳时，一百四十四，行于阴候”，言有数也。古云“工夫常不间，定息号灵胎”，言无间也。古云“昼夜晨昏看火候”，言无时也。古云“不在吹嘘并数息，天然”，言无数也。此炼炁化神必然之候，为大周天之妙用也。初时一瞬一息为周一天，至一刻为一瞬息周一天，至一时为一瞬息周一天，至一日、十日、一月、十月为一瞬息周一天。元炁随呼吸气而俱住俱无，不似小周天之一时三十六、二十四周于天者之可易行也。非大而何？怀胎炼炁、化神入定者之候如此。其中有三月定力而能不食世味者；有四月、五月而或多月，始能不食者。三月之久即能不食，是入定之功勤者；四五月、多月之久始能不食，功夫少者得证果迟。唯绝食之证速，则得定出定亦速；食为阴。有一分阴在，则用一分食。分阴未尽，则不仙。分食未绝，亦不成仙。</p>\n<p>绝食迟者，则得定出定亦迟；所以然者，由定而太和元炁充于中，则</p>\n<p>不见有饥，何用食？又必定心坚确，故得定易，而有七月者，有八月、十月而得定者；若定心散乱，故得定难，而有十月之外者，及不可计数之月而始得定者，即歇气多时，火冷丹力迟之说也。今以十月得大定者言之，其中又有神胎将完，第八九个月十个月之时，外景颇多。外景者，乘阴为魔也。此时或有一二分阴未消得尽，若有一分阴在，即有一分魔来。或见奇异；世俗中，平日所无者，而今始有一见之，谓之奇异，乃见之魔。眼可见而见者，曰外魔、曰邪魔、曰天魔；眼不可见而心见者，曰阴魔。见而喜悦，贪见则着魔矣！见而不见，则不着魔矣！或闻奇异；此闻魔也，不见不闻为定，闻为魔，则乱定者。喜其异闻而贪闻之，则着魔。闻而不闻，则不着魔。或有可喜事物；世法中，平日所有者，或已遇过之熟境，已扫去而复偶有，故曰可喜、可惧、可信。如此下三者可喜者：声色富贵、玩好、受用皆是，皆勿贪喜。或有可惧事物；可惧亦非一，水火、刀兵、劫杀、打骂，一切惊恐皆是，皆不可妄生惧心。或有可信事物；平常或有愿望而欲求者，或欲求而未得者，今若遂愿，若应求为理之可信。如山东张先生，在圜中见天魔，而误信为身外有身之类者。余仿此。或有心生妄念；上五者是外来之魔。此一句言心之妄，无故而妄想所生。佛宗人谓之阴魔，又谓之阴盖。或有奉上帝高真众圣法旨，而来试道行；《四十九章经》云：“诸天仙人来试，或试以所欲，或试以所不欲，或试以所难，或试以所畏。试之过者，诸天保举，是谓得道。”或张妖邪魔力而来盗真炁，如狐精化美女，淫侵夺炁等事皆是。凡此一切，不论心妄见魔，若心中生一妄，则急提正念，而妄自无。若眼前见一魔，亦急提正念，不应魔，而魔自退去矣。果邪果试，一切不着，俱以正念扫去。《四十九章经》云：“不与群魔竞，来者自返戈。”丁灵阳云：“静中抑按功深，或见有仙佛鬼神，楼台光彩，一切境界见前，不得起心憎爱。”俞玉吾云：“任他千变万化，一心不动，万邪自退。”如钟离真人试吕纯阳以十魔，吕真人皆无着。又如壶公以朽索悬大石于费长房座上之梁，有大蛇啮索将断，令石压，费不为之惧，而正念长存。此真降魔之明案也！只用正念，以炼炁化神，自然得至呼吸绝，而无魔矣。</p>\n<p>真阳曰：有呼吸未尽之定，即是阴未绝尽，而阳未纯，故魔可来到。呼吸绝，而阴尽纯阳，则神全大定。不用见闻知觉于外，则魔不能干犯。我不用见，魔亦不见于我；我不用闻，魔亦不闻于我。故呼吸绝者，自无魔矣。昔邱长春老祖师，扫去魔后，曾云：“魔过一次，长福力一次；魔过十分，长福力十分；每当过一番魔，心上愈明一番，性愈灵一遍。”此七句是我本宗老祖师邱真人之言也，冲虚子引证降魔之案。又按：邱祖每只为福小，不能心定，当过二番死魔，二次飞石，打折三根肋骨又险死，扑折三番臂膊。恁般魔障，皆不动心，越生苦志。又，冲虚子昔于谢家住七十八日，被火灾所魔，以所卖家产千余金，并九转之力，备以入山住静，供护众居食之资者，尽为所毁。当此急用之需，慨然尽弃而不救，亦为当过此魔而已。有友云：何不救？虽少得亦可。答曰：有邱祖案在。修行岸头，原不动心与魔应。弃物同于弃家，千余金何足重？此修士所以不可不知者。既得呼吸无，则气不漏，而同炁返纯神，则无复有炁与气矣。如有炁，则呼吸虽智似无漏，未为真绝也；呼吸少定而未绝，则神随之，亦只少定而未大定，此时正宜绵密工夫，直入大定而纯神。若有出入间断，即同走丹。必至无炁而后已。真炁大药服食已尽，是炁已大定矣，则神全而亦大定，炼炁化神之事，始毕矣。此第二关返一之理如此，正已返到如父母初交入胎之境矣。但父母初交时，只虚无之炁，神未分于炁中也。此则炁返合于神，只存一虚无之神在焉。此直说分剖人胎、神胎之所以然。神已纯全，胎已满足，必不可久留于胎。昔蓝养素于南岳山，养胎既成而不能出，刘海蟾以李玉谿十咏寄之，指示脱胎出神，养素抚掌大笑而出。此见胎之必不可久留，亦见暗中有圣贤提携者。又，冲虚曰：胎者，形也。久留在胎，局于形中，而不超脱者，其炁之灭尽定者，犹可离定而为动，动则同于尸解之果而已。神之定者，亦离定而动，胎脱则神离形，在虚空之境矣。神还虚空而极虚空，则虚空安有坏耶？夫自其脱精成炁，为入胎之始；脱炁而成神，为成胎之终。炁不入于胎，犹可复为精也，以未超脱其精之境也；神不出于虚空，犹可动其定而驰逐其炁也，以未超脱其炁之境也。故李曹二真人曰：“不超不脱神不来”。言必出神而后得神仙，以向天仙也。如子胎十</p>\n<p>月，形全则生；神胎十月，神全则出；理势之必至也。此则再用迁法，以神之本长着于中下而离着，自中下而迁于上丹田。前之初关、中关，皆是三田反覆。化炁于下，亦由上而中而下。及化神，转上而居中，中原是虚境，无所拘着，而若不远于炁根。故云：合中下皆在虚境之内。即世尊宝塔从地涌出，在虚空中之说也。上丹田者，顶门边之泥丸宫也。既成纯神，则谓之见性。神之静体，谓之性；性之大用，及通而无障碍处，谓之神。古云“性在泥丸，命在脐”也。以加三年乳哺，九年大定，炼神而还虚也。乳哺者，养出胎之子也，为养神之喻也。仙以得定成神；虽得定，乃初有所得，未能久定；乳哺以加养，使神能大定而久也。还虚者，炁久定而绝无，神不必用乳哺之时。盖由炼炁之初，神为主令而定其炁，知有神也，故曰化神；炁大定，神亦大定，神不用使令而若无神，故曰虚，正无法无佛者之谓也。当此迁上之时，非只拘神在躯壳之上，犹似寿同天地之愚夫者，在躯壳则非虚。还虚者，不着于躯壳。古云入金石无碍者。有躯壳则有碍，出躯壳之神至虚，故无碍。愚夫者，性不灵而无神通之谓也。须用出神之理，调神出壳，而为身外之身。调神出壳是一至要之机，有大危险之际。初调其出而即入，不令出久，亦不令见闻于远境。调之久，其出可渐久而后入，亦可渐见闻乎远境而后入。用调者，恐骤出外驰，而迷失本性。凡初出者必调。依师度法出神，有当出之景及所出之理。自上田出念于身外，自身外收念于上田。一出一收，渐出渐熟，渐哺渐足，如是谓之乳哺。三年而神圆，可以千变万化，可以达地通天，可以超海移山，可以救水救旱，济世安民，诛邪除害。任其所为，皆一神所运，神变神化，所以谓之神仙。抱朴子云：“欲少留，则且止而佐时；欲升腾，则凌霄而轻举。”又，昔曹老师云：“修仙至于出神，永无生死矣！灾与魔皆不相干。”初出神，若一步而即入，若二步而即入。古亦云：“十步百步，切宜照顾。”是也。如此而后乳哺养神，至于老成，必三年而后可。此时若欲在世，护国安民也可，救水救旱也可。举念者无不是神通灵应，便十百千万亿年劫，如是也可。若不欲在世如此，即用面壁之理，九年大定，而后可与最上上乘仙佛齐肩矣。从仙而还虚，则又三迁，至于天仙之虚境矣。此正无极之至极处。此</p>\n<p>皆十六岁以后，至八八六十四岁，已化精而已耗精者之修也。精既耗则消折者多，必用工补满，而后能生真炁，转运河车，点化识神，住胎入定，如上所说。又有童男未化精之修焉，从来未行淫事，精窍未通，精未泄，炁未耗者。如《集仙传》所云“周从者，泗州人也。幼得道，徐神翁曰，我少而婚，彼幼而得道，其神全，吾不及也。”又，世尊为太子，在宫中娶三妃，十年不行一淫媾，昼夜只修禅观者，此皆谓之童真。又，韦驮天尊，经称为十九世童真。此三者皆同。皆世所不知，而亦欲浅说之者。夫人自未生之前，谓之胎；既生之后，谓之童；胎出即为童，顺而行之易。童返修即是胎，逆返修亦易。仙道中最难得者是童体。童体精炁完全，不唯修之易，其法力甚大，有非修补精炁者之所能及。历年至于十六岁，炁足极矣，炁已纯阳，精犹未漏，是为全体之童。乃其本体之自全，而非用力修补凑合之所为。古人云返老还童者，还成如此不漏之全体而已。修仙者多是已漏之精，若以此为修，必不成仙，必有死、有生而轮迴者。故用初关筑基工夫，基成，始与此童身相等，而法力犹有所不及。且童必至十六岁，阳炁极而精将通。末劫之世，人人习为淫欲之风，未至十四五六则有交媾之败。炁不旺而精不壮，夭而不寿者多矣。此是世间愚人俗子辈，不知所以为修行者。若举斯世，设有一人，举一世或有一人者，极言无仙材之人也。逾十六而未漏者，必为愚痴不知淫欲之事，不足以行道者也。淫欲之事，丧精耗炁而害道，皆仙佛之所禁戒，以修行大道。不知淫欲之乐者，必不知淫欲之害。世间亦未有不知淫事者，况十六岁之成人而犹不知乎？此时而不行淫，真为愚痴之甚而不知。又或有一人能至十六，炁极足而未漏，此最易化神而成仙者也。阳精之炁自足者，免得用筑基补精补炁之工。以固有之炁，炼之以化神，即成神仙而了道。故曰易。若有能得成仙者，名曰童真。以童子之全体而成真。若缘分浅薄，不遇圣师点化，昔抱朴子曰：“按仙经云，宝秘仙术虽有，已在弟子中者，尤择其至精，弥久而后告之以要诀，况世人何能强以语之耶？”又不自知参究，採此真炁而炼为神，亦不足以行道者也。前生无积修功行，故此生不遇圣师。</p>\n<p>今生无修仙修佛之志，何能参究天机？为凡俗混世虫耳！故不足以行道。百千万年，或有一人，既足十六阳极之炁，又有仙师密旨。昔抱朴子曰：“按仙经云，诸得道者，在胎之中已含信道之性，及生而有识，心好其事，必遇明师而得法。”因其未漏之炁，不用炼精之工，遂以七日天机秘法。七日者，炼精化炁筑基成功之后，探大药之法。童子从此起，以后皆同于大人之法。探得真炁，百日之工曰探真炁，乃微阳耳！此无百日之工，而炁自满足。于此探实足之真炁，即所生之大药。探此真炁而得，即得长生。探不得此真炁，则不长生。捧过三关九窍，以行炼炁化神之工。所以无炼精之工者，正以炁未化精，而探之即得。炁未化精而未泄漏，则精炁本自满足，不待炼而亦可探，探而必得。所以世尊自修之工，不用炼精，只用色界四禅定为始。由本自满足之炁独盛旺，胜于诸佛诸仙者皆以此。故炁未化精者，修之有四易：易于时，易于工，易于财，易于侣也。易于时者，不用百日之工，百日工者，炼精以化炁之工也。炁既化精而顺行泄漏者，必用炼精还而为炁。既未化精，则无用还炁之百日。从七日而十月、三年，七日者，探大药真炁之期也；十月者，行大周天火之期也；三年者，出神后而乳哺阳神之期也。此止言成神仙之期，未说天仙也。可计之程也；易于工者，不用小周天探补薰蒸，此即说不用百日之工。从探大药服食，即七日之工。而胎神、即十月之工。乳哺，即三年之工。可必之果也；程可计，果可必者，言此逐节工夫，自粗而精，自渐而顿，可必其必至者，如所谓“果生枝上终期熟”之说也。易于财者，自七日而十月、三年，可数之费也；养胎者一人，护法者二人或三人。计每人一日费银二分，三人则六，四人则八，最易数。易于侣者，护法之伴侣也，即二人三人辈。因童真之神清而明，清明者，情欲之窦未开，声色乐佚之念未启。炁完而足，筋骨坚强不衰败，无昏惰之气。用其护力而扶持，颠危昏聩者少也；纯阳真人云：“免颠危，要人叫。”斯谓之四易。其炁已败于化精者，此又详言十六岁以后，壮年、老年败精者之修。则必用炼精之工。故有四难：难于时、工、财、侣也。难于时者，精已虚耗，无大药之生，必探炼精以补</p>\n<p>精，返炁而补炁，则真炁大药始有所生，多百日之关。如有年之愈老，则不能以百日而返足炁，亦不能以百日而止工也。或二百日，或三百日未可知。难于工者，工曰百日，有期内、期外之不同。期内者，五、六十日而得炁足者，如曹老师五十日而得是也；有七、八十日而得炁足者，如我以两月半而足炁，然其初尚有一月调习。期外者，过百日之外炁始足。是以年之渐老，则用工渐多。如神已昏聩，必先养其清明；精炁已耗竭，必先养其充实。岂朝夕之力而能然哉！昔钟离真人引《道要》云：“晚年奉道，根源不固，自觉虚损而炁不足。十年之损，只用一年功补之，名曰採补还丹；补之数足，日渐以增，名曰水火既济，曰人仙。”是也。古人教人得之者早修，“莫待老来铅汞少”者，铅少者，元阳真炁之耗竭，遂致有精干者，有阴痿者，有气喘者，有腰脊痛折者，有筋拘而膝不屈坐者，或坐不能久耸直者皆是。汞少者，元神本性之昏沉，或採取不能张主而精专，或烹炼不能进退而终始，皆迷惑错误者多，而成真火全候者少。如此，何以能百日而止工？皆为此也。铅汞既少之时，而奋志精修，犹可望成还丹，而证道有准。经云：“八十尚还丹。”又曰：“百二十岁犹可还。”若不决烈精进，则堕有死之类而已。故戒之曰：“莫待老。”昔马自然曰：“此身不向今生度，更向何生度此身？”难于财者，以行道之期久，或百日，或二百、三百日。日费之积多，百日只用百日之费，或至二百日则多矣。不可以数限也。不可限以百日之费，而为二百、三百日之给。难于侣者，用工日多，则给使令之久，扶颠危之专，遂致护道未终；或以日久功迟，而疑生厌心；有疑其功不知成否，有疑不知何日成功。或以身魔家难，身魔者，护法之身有病魔，或有灾异。家难者，护法人之父母、妻子，有大变故等事。而变轻道念；因有魔难，遂变易护道之念。此往往有之者矣。抱朴子昔云：“为道者病于方成，而志不遂。”又观古人所谓“同志三人护相守”。又曰：“择侣择财求福地。”老君言，诸小小山者，皆不可于其中作金液神丹，皆无正神为主。多是木石之精，千岁老物，血食之鬼。此皆邪气，不令人作福，但能作祸。又，福地者，抱朴子曰：“按仙经云，可修行居者，有华山、泰山、太白、太白</p>\n<p>山、霍山、恒山、嵩山、少室山、长山、太白山、终南山、女几山、地肺山、王屋山、抱犊山、安丘山、潜山、青城山、峨眉山、绥山、云台山、罗浮山、阳驾山、黄金山、鳖祖山、大小天台山、四望山、盖竹山、栝苍山，皆正神在其中。若有道者登居之，则山神助福。”而福地者，不过不逢兵戈之乱，不为豪强之侵，不近往来之冲，昔抱朴子曰：“按仙经云，得道者，与世人异路而行，异处而止，言不与交，身不与杂。”又，《太上胎息气经》云：“凡修行，切勿令人知。人知名至，则祸来不安。”不致盗贼之扰，房舍华丽，衣服鲜美，饮食丰盛，财物盈余，库藏充满，家具器用奇巧，皆招盗贼之由。略近城市，易为饮食之需；城市太远，买办奔走烦难，恐护法要人多，方有侍者。必远树林，绝其鸟风之聒。昔许由以瓢挂于树，风击之鸣，由则弃瓢，亦其一验案也。屋不逾丈，丈室不能容众，仅足三五人居，为修行所。若大，恐盗贼可据为穴。故曰仅取蔽隔风雨为止。墙必重垣，内外完固，遮护恶虫、恶兽之患，为得其宜也。明暗适宜，可令人护关者，得以舒畅，不生疾病。床座厚褥。褥厚者，和软而坐不生厌。加以洁精芽茶、淡饭，禁戒甘脂荤腥，专持素食。宜遵《四十九章经》元始天尊法旨所云“斋戒者，道之根本，法之津梁。子欲学道，清斋全戒，众生舍清净，耽荤膻，而以触法，譬之饿鬼啖食死尸。”五味随时，五味者，咸酸甘淡、油盐酱醋之属。随时者，安其所遇，随有随无，不烦于搜索。调养口腹，饮食不宜过中，有过则有伤害。安静气体。安居丈室，而行住坐卧，不为世务尘劳。凡真实修行者，静定其心，先静定其身。亦易易事耳，然亦古人之长虑也。古人每有入室之事遗嘱，我今亦详说入室事宜，修士当预为计划，免有违缺。又有极口称为“财不难兮，侣却难”者，是何也？求财助道者，或以自己家资变易而得，或以外护出财助道而得，何难？盖为学道本皆智士，而每人品不同。或以德胜，而行道之心不专；或以志欲为仙，而德不足；或以始虽勤，而终则怠；《玉皇经忏文》云：“求道未勤，岂能成道？”或喜于谈笑，而问道若勤，其力行实悟全无有；天尊言：“知吾道者，复不能行，行吾道者，复不能久，难至于道。”或初一遇，待师家以杯茶，便问如何成黄芽。黄芽若教如此</p>\n<p>易闻易得，遍大地田土中，尽长黄芽，胜于稻芽、麦芽。饮师家以杯酒，便问如何到了手；若教了手，以杯酒可换而得知了，各酒店中，人人皆是了手神仙。故抱朴子云：“世间浅近之事，犹不可坐待而知，况神仙大事乎？”轻视如俚言之笑谈，即持谈笑之闻，认为得理；钟离真人度纯阳时，纯阳正为九江府德化县令，弃官而随钟离。尚有一词云：“上告师尊，弟子相随七八年。肩头压得皮开绽，足下生疮五七番，并未蒙师一句言。”此词在《物外清音》书中久矣！既能弃官，便见有盖世志行。犹执弟子之礼多年，而后得闻道、成道。未有初遇便传、便闻之理，如父教子之栽稻锄麦者乎？刘海蟾为燕国宰相时，钟吕二真人造府而度，刘弃相而随，六十四岁也。至六十九岁而闻道，而后得成。抑岂有轻易得传者乎？世有光棍，一见便传者，别有一故。为方士者，诈设之假言，及治一病之小工耳，欲谋一日之饮食者，欲缠绵取年月间之供给者，欲诳取长久之衣食者。非若此易言，以速投其所好，遂其愚见，何以得心腹相投哉？而谓天仙、神仙大道，亦可如是闻问为哉！或以好胜务奇，而欲闻独异于人，称独胜于人，徒务知道而不行道；此一等人，欲自夸得秘闻秘法胜于人者。或有徒务博闻而唯自夸为能士。如遇一宾友曰能这件，则亦曰这我也能。遇一宾友曰能那件，则亦曰那个我也能。不论邪正是非，一概俱闻，实无学道、行道之志；此一等人，浮慕称博，绝非专学。任旁门邪说，不黜之为非；虽正理真言，亦不求彻悟；所以不能学道者。高明真师，当慎言于此人。又或有狡诈医士，谈学道而涉猎却病旁门坐功，遇富贵者，用药无功，又恐他人夺其主顾，故传以坐功而却病，为钩连擒拿之法耳，何有于学道之心？此一等人，我遇之甚多，所见皆是如此。或本志不真学道，但借学道为芳名，而阴行不道之事；不道者，悖道之事也。凡有口称学仙道求长生不死，遂遍语人曰：我能仙道长生不死。愚人遂信之。及谈之，乃说用女人作彼家。不知其心，实为诱骗人家女子，行奸淫之计耳！又有口称能炼丹，服食不死，能点金银如山岳之多；哄骗愚人出本烧炼，遂拐其本银而逃。皆不道也。或以口称学道、知道、行道，而心实不学、不知、不行者；此不见张紫阳真人所谓“今生若不学修真，未必来生甚胎里”。马自然真人云：“此身</p>\n<p>不向今生度，更向何生度此身？”此等人当以二真人之言自醒。或以父母妻子恩爱太重，而道念亦重，欲割然修仙，则恩爱不能尽舍，《玉皇经忏文》云：“求度虽专，尚多宿累。”又《皇经集注》云：“根念未固，不能进修。”又《太上灵宝大乘妙法莲华真经》云：“今迷诸世网，虽有真心，固不为笃。抱道不行，而自望其头不白者，亦稀闻也。”欲系恋恩爱，又恐无常速到，失却千万亿劫难逢之道。此谓两持之心，而亦两失之心也！心两持则惑而无决，必无成功，而至于两俱失，必然之理。无常速到，道果得乎？恩爱在乎？所以行道、护道三人，须要决地立志修德、修道。修德者，即戒律中不杀、不盗、不淫、不酒、不妄语、不绮语等皆是。凡匡君护国、救世安人、救水救火、救灾救旱，及以慈悲心救人患难、疾苦、贫穷、饥寒等皆是。于此前列假心学道数事，辨得分明，全无所犯，不妨道行，而后可称同志。自“学道本皆智士”句以来，至后“一晤一言知择耶”止一大段，皆言有道之士，访外护同志之难，及正道明师访同志弟子之难者。同志者，能苦心修德，诚心向道者，方为真同志。但侣之难于同志者，于前十一款之外，更有甚不可知之处。又有难于择者也，以同志者，未必出于一家一乡，而为两相素知。若师先已得道出神者，则眼见耳闻，上可过色欲二十四天之上，同佛见闻色欲二界者，普天之下，以及诸地狱中，皆可见闻。凡有学道而愿为门下者，皆不越所见闻之中。若师家只得于遇仙传道，犹为访友、访弟子护道之谋者，则难择人也。又出于一家者，如曹还阳度亲兄曹复阳，如冲虚子传堂弟太初、堂侄太一是也。出于一乡者，如还阳真人度三里许之冲虚、真阳二人，如真阳度一里许之徒太和是也。其根基性德，素有相闻。如一身之德行不臧者，暂遇之不识也；不臧者，即儒家所言不善也。人之善恶，必久相处而后知。言可用诈，多闻其言，善恶自露；德可虚称，久稽所行之迹，则善恶难掩。如一心之邪慝深邃者，面交之难察也；此辈人，心中全是邪恶之念，所行全是邪恶之事，意图神通及点化服食，欲得势力强大胜人，假作尊师敬友，殷勤问道，此面交假局，明师亦当明此。如祖父辈之基恶种祸者，远见之不及也。祖与父以大恶为基，则孙与子未必肯为善。</p>\n<p>且前人之恶，报身不尽，必报及孙与子。唯居近者，而后知世积。若生各异方，长各异地，斯亦不能远见也。此皆上苍之必不付道者也！天将恶报，而师家传以大道，是谓妄传非人。如何而能以一晤一言知择耶？此前十四等人，皆选择贤弟子外护之难知者。一晤者，两人对面一会也；一言者，一相会之谈也。总言相交之浅。假令即有全德坚志之士，假令，是全无之中而或有，不可必有之言也。全德者，在世法中，能全五伦之德；于道法中，又能全五戒。此是君子圣贤人品，便是修仙修佛之根器。坚志者，非上所说十四等不同品之假志，真实有心亲师问学，具弟子之威仪，执弟子之职事，不违师言，不犯道律，不犯王法，时时切问近思，一有所闻，便求实悟，不肯虚度光阴，不敢虚负圣教，此便是真实坚志者。必于学道修仙，于师家之逢，邂逅难于相信。邂逅者，偶然之相遇也。师固不能辨弟子之善恶诚伪，如上十四等者。学道弟子，亦不能辨师家之邪正圣狂。不能辨即不能信，虽有相遇者，为徒遇耳。所以难于相信者，又系认道不真。平素操慕道之心，每被方士哄惑。用女人交媾为採补接命，可得长生不死。见其说有一端道理，遂不识此事是假。及见真正仙道清净，亦有一端道理，却不与淫污者同快活，心中冷落持疑，不信何者为是，不能认正为真，即不能学道。虽有坚志，亦不成其为坚矣。不素识其道德有无，不素识者，不曾平日相交接也。故不见不闻师家之有道德、无道德。但暂时一遇，相谈妙理，而学者乃犹疑为口头言。回想前所闻者之无所证，疑此亦未必有证。不知邪说、假说、诳人者，必无证；不知仙道实悟真修者，必有所证。皆由未亲近师家，未见实历有证也。果邪果正，而不敢轻于信也。可惜虽遇正道，而亦不得实闻正道。缘师家知其不能破疑而改邪归正，便是匪才无用之人。譬如无目之人，粪秽臭处，也将鼻一闻，沈檀脑麝香处，也将鼻一闻，终不能弃臭而久留于香故也。此尤见侣之所以难也。此前“假令”起至此一段，皆言学者遇师之难也。又，昔吕真人云“弟子寻师易，师寻弟子难”者，是慨叹学者未有知识时，略起一念，云仙有神通变化，无所不能，无所不知，我当学之。起初遇一人，不问其知道否，便拜之，即是一师也。遇三人、五人、十人俱拜之，即是三师、五师、十师。闻一句鄙陋非道之言，也为一言之师。闻十句粗浅之说，也</p>\n<p>为十句之师。何其易遇易得？随其真伪邪正，总是无选择故也。若有道之师寻弟子，要弟子及祖宗历代积德循道，谓之有根基；灭却恶念，绝无恶事，远邪归正，精勤实悟，谓之同志；此等人最难得者。若祖宗及身无德而轻道者，不传；有恶念恶事者，不传；口空谈而心不实悟者，不传；执却病坐工而欲学之以求成仙者，不传；视仙道同于房术，以女人为鼎，取淫媾为可成仙者，不传；始勤而终怠者，不传；世情急而道情缓者，不传；不能护道而无益于道者，不传；此皆选择弟子之必当如是也。故曰“师寻弟子难”。古人云：“可喜唐朝吕洞宾，至今犹在寻人度。”萧真人亦云：“朝朝海上寻同志，寻遍东吴不见人。”是也。彼世人，遇区区奔走者于一倾盖间，而曰得遇仙，曰得遇侣，果何所得哉？胶住于一方者，与奔走游历四方者，相去甚远，不得常相问学。倾盖者，收束伞盖之说也。张雨伞以行，于途相逢，立谈则收伞，故曰倾盖。古之子华、子程本是有道之士，孔夫子相遇于途，倾盖而语，夫子曰：“目击而道存。”此唯圣能知圣也。今言倾盖，极言偶然一见，相谈不久，何能得仙传道？何能得侣护道？以不得而曰得，果何所信心而为所相得哉！觅师侣者，尤当以此为鉴戒。古仙从来无一相遇之初，而即传于后学者，亦无一遇之初而即得护道于贤侣者。凡后学觅师，及有道者觅侣，皆当以此说轻遇之不得人为鉴，亦以轻信于一遇为戒。但后来修士，必于人道中，先修纯德，人道中者，即五伦之事也。君当忠而忠，亲当孝而孝，兄长当顺而顺，朋友当信而信，谓之纯德。高真上圣皆言传得其人身有功者，当传于有德之人也。传失其人，九祖受冥拷；又云：“妄传，九祖受冥拷。”皆言妄传于无德恶人也。有仙道者，安敢妄传非人哉？凡轻易传人者，邪说诳语耳！意图诱哄人财物，故意易其言，以为相投遇合之机者，抑可轻信者耶？又能信奉真师，昔葛稚川《神仙传》云：“刘政求长生之术，不远千里，苟有胜己，虽奴客必师事之。”今人若能如此，自有真仙踵门。慎择贤友，即此前所谓择侣之说。精心修炼。于此浅说中语，即修德之款，修道之款。一一勘得透彻，则长生不死、神仙、天仙、佛世尊，可计日而皆得矣。予又愿同志者共勉之！</p>\n<p>天仙正理直论增注卷前终。</p>\n<h4>卷后</h4>\n<p>大明万历中，睿帝阁下，吉王国师，维摩大夫季子，三教逸民，南昌县辟邪里人，冲虚子伍守阳撰，并注。</p>\n<p>同祖堂弟，同师弟，真阳子伍守虚同注。</p>\n<h6>直论九章</h6>"}, {"id": "tx_zh1", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "先天后天二炁直论 第一", "content": "<h5>先天后天二炁直论 第一</h5>\n<p>冲虚子曰：昔读《玉皇心印经》云：“上药三品，神与炁精。”固然矣！本注云：人以精炁神三者以生此身，亦以精炁神而养此身于世间。凡从人胎生者皆如此。仙与佛同是人胎中有此身心而来者，故亦同修此三者而成果，学仙佛者当知。然其间有秘密而当直论者，正有说焉。秘密者，先天后天之说也。上古未说之秘，中古圣真亦说之特未详；故后世人有遇传者，有不遇传者，有知者少，不知者甚多。唯是神与精也，只用先天，忌至后天。先天是元神、元精，是有变化、有神通之物也。后天者，思虑之神、交感之精，无神通变化之物也。而炁则不能无先后天之二用，以为长生超劫运之本者；真阳曰：二炁者，先天是元炁，后天是呼吸之气，亦谓之母气与子气也。超劫之本乃元炁，不自能超，必用呼吸以成其能。故曰有元炁不得呼吸，无以探取烹炼而为本；有呼吸不得元炁，无以成实地长生、转</p>\n<p>神入定之功；必兼二炁，方是长生超劫运之本也。所以吕祖得先天炁、后天气之旨，而成天仙也。纯阳真人初闻道而未甚精明，及见《入药镜》云“先天炁，后天气，得之者，常似醉”之说，而后深悟成道。故真人自诗云：“因看崔公《入药镜》，令人心地转分明。”是也。然所谓先天炁者，谓先于天而有无形之炁。能生有形之天，是天地之先天也；即是能生有形之我者，生我之先天也；天从元炁所生，我亦从元炁所生。故亦曰先天。修士用此先天始炁，以为金丹之祖。未漏者，即採之，以安神入定；未漏童真之体，即用童真修法。已漏者，採之以补足，如有生之初；完此先天者也。凡在欲界精已漏者，遇此先天炁将动，而欲趋欲界，则採取烹炼，还补为离欲之炁，而先天依旧完足，即是金丹。服此金丹，则超出欲界之上，而成神仙天仙矣！夫用此炁者，由何以知先天之真也？当静虚至极时，即“致虚极，守静笃”之说。无一毫念虑，念虑原是妄想心。亦未涉一念觉知，此在不判不动之时，尚在将判之先者。此正真先天之真境界也。佛宗所谓“不思善，不思恶，正恁么时”，与此同。如遇混沌初分，即鸿蒙一判。即有真性始觉，真炁始呈，是谓真先天之炁也。真阳曰：先天之炁藏炁穴，虽有动时，犹是无形依附有形而为用者，始呈而即始觉，尚未堕于形体之用，故曰：炁之真。若依形体而用，则旁门邪说之所谓气者。修士于此下手，须要知採取真时，真阳曰：真时者，药生之时易知，而辨所以可用不可用之真时，则难知。非由真仙真传者不可得。此非邪说之所谓时者。知配合真法，即以神驭炁之说。知修炼真机，而后可称真仙道。真机者，总上二者皆是。鼎器要真，不真则真炁堕于空亡。火候要真，不真则明明进退之阳火而不阳火，暗合进退之阴符而不阴符者，不可。故修炼之机，要知之真，而后可行，可成。知不真则不可行，不可成。所谓后天气者，后于天而有，言有天形以后之物，若风气之类，曰巽风者。即同我有身以后有形者也。若呼吸气之类，亦喻巽风者。当阴阳分，而动静相乘之时，此言阴阳，是言太极一中分阴阳为二，神炁是也。阴阳俱有动静，故相乘，如二分四之说。今人若不信阴阳同有动静者，如睡浓时，炁固静，神亦</p>\n<p>静；睡醒时，炁亦属动，神亦属动；即如世法俗语便见道理，自然循环，是如此者。有往来不穷者，为呼吸之气；何故说往来不穷？以呼吸在睡时也有，在梦时也有，在觉时也有，在饮食时、未饮食时皆有，故曰不穷。若神炁归于元位，似不见有，则曰元神元炁，不与睡中呼吸显然同相。及其神炁同动，判然灵觉，有照有应，显然不无，唯圣真有修者，而后有证。以凡夫之呼吸者，运至真人呼吸处。以凡夫之呼吸穷而死者，修成真人之呼吸穷而长生不死，以超劫也。有生生不已者，为交感之精；故曰后天。自呼吸之息而论，此言凡夫呼吸自然之理。人之呼出，则气枢外转而闢；吸入，则气枢内转而阖；是气之常度也。自交感之精而论，由先天之炁，动而为先天无形之精；真阳曰：先天炁精，俱是无形之称。在虚极静笃时，则曰先天元炁，及鸿蒙将判而已有判机，即名先天元精，其实本一也。触色流形，变而为后天有形之精；若人不遇色欲邪淫，必不成后天有形之精，此乃人生日用而不知者。是精之常理也。皆人道，若此而已，人道者，言顺则为人时之道也。此书篇篇皆先言顺，而后言逆修，见其即自家所有，以修自家。如释迦所谓“众生即佛”之意。后天而奉天者也。修士于此，须不令先天元精变为后天；又必令先天之精，仍返还为始炁；即是归于原根，复还命蒂之所。始炁者，即虚之极，静之笃也。是以后天气之呼吸，得真机而致者。故于动静先后之际，即所谓如亥之末，如子时之初便是。用后天之真呼吸，寻真人呼吸处，李云：“只就真人呼吸处，故教姹女往来飞。”又即张紫阳真人所谓“一孔玄关窍，乾坤共合成”。又云“橐天龠地徐停息”者皆是。一意归中，即以神驭炁，凝神入炁穴之理。随后天气轴而逆转阖闢。元炁固要逆修，而呼吸之气亦要逆转。不逆转则与凡夫口鼻咽喉浩浩者何异？所以言真呼吸者以此。当吸机之阖，我则转而至乾，以升为进也；当呼机之闢，我则转而至坤，以降为退也；乾天在上，自下而上，机似于吸入，故曰阖、曰升，亦似古之言进；升于乾，本为採取之旨。坤地在下，自上而下，机似于呼出，故曰昇、曰降，亦似古之言退；降于坤，本为烹炼之旨。然现在之烹炼，又为未来採取之先机。此道隐斋特言之</p>\n<p>密旨也！又，周南余庠友初至道隐斋，问曰：何为进退？冲虚子言：进退者，亦虚喻耳！其实不见有似进退，何也？古云：“子已六阳时，进阳火三十六；午亥六阴时，退阴符二十四。”此言阳时所行，则曰阳火；阴时所行，则曰阴符；皆言火也。以九阳六阴多少之数，言进退亦一定之数也，故不似进退。非渐加渐减之为进退；而亦非外进内、多退少为进退。我故曰：不似进退，而虚喻进退也。又，按古云：阴符者，暗合也。其周天中暗合者，亦有只曰沐浴之不行火候，而暗合于有火候者。但不在六阴时，而俱可言暗合。后世人执进退二字，要说进，妄以自外而进于内，自少而进于多；又要退，妄以有而退于无，如天道所谓戌灭亥休之说；吾故曰：皆说得不似。此说只以升为进，降为退。谓候中只有升降，必要似子进阳火，午退阴符，从此喻说而已。修炼先天之精，合为一炁，以复先天者也。真阳曰：此一段即言小周天所当用之机，火候所不传之秘在是。修炼金丹之士，只要阖闢明得透彻，则金液可还而为丹。若阖闢不明，则药不能生，而亦不能採取烹炼，大药无成，枉费言修。世人乃不知先天为至清至静之称。所以变而为后天有形之呼吸者，此先天也；动而为先天无形之精者，亦此先天也；化而为后天有形之精者，亦此先天也。此顺行之理也！元炁为生身之本，凡一身之所有者，皆由元炁所生化。至于逆修，不使化为后天有形之精者，固此先天也；不使动为先天无形之精者，定此先天也；不使判为后天有形之呼吸者，伏此先天也。证到先天，始名一炁；是一而为三，三而复一，有数种之名，即一生二，二生三，三生万物之说。即有数种之用。故不知先后清浊之辨，不可以採取真炁。真炁者，即先天元精，清者也；后天交感之精，浊者也，则不真。不知真动真静之机，亦不可以得真炁。虚之极，静之笃，则曰真静。未到极笃，无知觉时，不为真静。从无知觉时，而恍惚有妙觉，是为真动。未到无知觉时，而于妄想中强生妄觉，则非真动。动既不真，则无真炁者。不知次第之用，次第者，如药生之真时，採药、归鼎、封固、进阳火、退阴符，周天毕，有分余象闰等用。採取之工，由升降之机得理，则能採取得炁。不然不得真炁，纵用火符，亦似“水火煮空铛”而已。又何以言伏炁也哉？古人有言药物者，单以先天炁而言者</p>\n<p>也；有言为火候者，单以后天气而言者也；不全露之意也。有言“药即是火，火即是药”，虽兼先后二炁而言，盖言其有同用之机，药生则火亦生，用药则亦用火，故曰：即是亦不显露之意也！后来者何由得以明悟耶？修天仙者不可以不明二炁之真。</p>\n<p>药物直论 第二 前先天后天已兼火气论矣，</p>\n<p>此则单论药之先天。</p>\n<p>冲虚子曰：天仙大道喻金丹，金丹根本喻药物。果以何物喻药也？炼外丹者，以黑铅中所取真铅白金，炼成金丹；故内以肾水中所取真炁，同于金，炼成内丹，亦名曰金丹。外以白金为药，以丹砂为主；内以真炁同于金者为药，以元神本性为主，故同名金丹，同喻药物。太上云：“恍恍惚惚，其中有物。”恍惚者，是本性元神不着于知觉思虑，似知觉之妙处。其中便有物。即吾身中一点真阳之精炁，号曰“先天祖炁”者是也。夫既名曰“祖炁”，则必在内为生炁之根者，而又曰“外药”者，何也？盖古云“金丹内药自外来”，以祖炁从生身时，虽隐藏于丹田，却有向外发生之时；如生视、生听、生言、生动、生淫欲，皆此一炁化生。如思外之色、声、香、味、触、法，皆由炁载思以致之。即取此发生于外者，复返还于内；是以虽从内生，却从外来，故谓之外药。炼成还丹，斯谓之内药，又谓大药。古云：“铅汞相交，而产黄芽。”即此大药便是黄芽。实止此一炁而已。今且详言外药、内药之理，而所以名外药、内药之由。圣真学者究此一段，则邪说淫风一笔扫尽矣。既曰药本一炁也，非有外内之异，而何有外内之名者，以初之发生，总出于身外，而遂曰“外药”。若不曰外，则人不知採之于外而还于内，将何以还丹？及精补精全，炁补炁足，神炁俱得定机。真阳曰：定机者，将用大周天之先机也。若小周天则不定之候，故小周天有止火之候者，以其不定，能伤将定之药。张真人所言若持盈未已，不免遭危殆之说便是。于此时发生大药者，</p>\n<p>真阳曰：大药不自发生，必採之而后发生。不似微阳初动，为自发生也。然必求何以知採大药之时，知前止火之候，则知即採此大药之时。全不着于外，只动于发生之地，因其不离于内，故曰“内药”。昔人每注，只说“炁是外药，神是内药”者，不是。若不曰内，则人一概混求于外，则外无药，无所得，而阻于小果空亡，此言只可长寿而非不死可超劫运者。将何以化神？所以先圣不得已，而详言外内也。张真人云：“内药须同外药”。俱与此同。既有外内之生，所以採之者亦异。盖外药生而后採者也；纯阳真人云“一阳初动，中宵漏永”，紫阳真人云“牵将白虎归家养”者是也。内药则採而后生者也；自邱真人传于张、李、曹三真人，以及伍冲虚子，所谓“七日口授天机，以採大药”者是也。张紫阳亦谓“不定而阳不生。”此亦往圣之不轻言直论者。我今再详言之，以继世尊所为重宣偈者云。此炁在人未有此身，即此炁以生其身；此炁不足者，则不能生子之身。少者、老者皆具此形，少者炁足能生子，老者炁不足故不生子。观此明知，形不能变化生生，而炁能生生。既有此身，则乘此炁运行以自生。故曰：修士亦惟聚炼此炁，而求长生也。惟能炼则能聚，炼聚久之而大药生，为能起死回生之真仙药也。但其变化，虽在逆转一炁，而其为逆转主宰则在神。即“神返身中炁自回”之说。若念动神驰，引此炁驰于欲界，则元神散、元炁耗，变为后天有形之精。此精必倾。有形者终有坏也。不可复留，亦不可复返，终于世道中之物而已，乃无益于丹道之物也。若人认此交媾之精为药，即为邪见。丹道以无形元炁为药，既已有形则不能复为无形之药。既已淫媾，则炁已耗尽；且千人千败，万人万败，何曾见有一人不败。淫精而能採来补精、得长生不死者乎？是以修金丹者，不用淫媾之精者，以其炁不足，不能长生故也。如遇至静至虚，不属思索，不属见闻觉知，总是虚之极，静之笃者。而真阳之炁自动。虚静之极自动，方是循环自然妙处。非觉而动，实动而觉；觉而不觉，复觉真玄；觉而动者，先觉后动也；动而觉者，先动后觉也。即是先天宜用之药物。此时即有生化之机，可以凡，可以圣。而将发生于外者</p>\n<p>在。如天地之炁，过冬至阳动，必及春而生物者然也。冬至阳初动谓之微阳，孔子于复卦之大象云“至日闭关”，安静以养微阳。阳微故不能生物，亦不能为药。故顺而去之，即能生人；逆而返之，则能生仙、生佛；修士最宜辨此一着。以先天无念元神为主，返照内观，凝神入于炁穴，则先天真药，亦自虚无中而返归于鼎内之炁根，即炁之穴也。为炼丹之本。古云“自外来”者如此。此外药之论也！将此药之在鼎者，以行小周天之火而烹炼之，俞玉吾云：“若知有药，而不得火候之秘以炼之，唯能暖其下元，非还丹也。”谓之炼外丹。此正“三家相见”之谓，亦“回风混合，百日功灵”之说。外丹火足药成，方是至足纯阳之炁，炁不化阴精，便是纯阳之真炁也。方可谓之坎中满者。曹还阳真人口授以探大药之景，及探大药之法者，正为此用也。还阳真人云：“有可探大药之景到，便知药成，而有大药可探。景不先到，药未成也。”夫探之而大药生而来，斯固谓之得内药矣。或有探之而大药不生者，有三故焉：一者，或外丹已成，从初阳之微，而修补至于真炁纯阳，谓之外丹成。而探此药之真工不明，而不知所以探之，故不得；此由学者志不大，心不坚，前修功行少，今修福力薄，仙师只传以补精筑基之功，特小成其长生之果者。二者，或小周天之火，传之真而行之不真，而外丹不成，虽知探之，而无药可探，故不得；此即马真人门下弟子问：“我行道三年，尚道眼不明，是何故？”真人曰：“行之不精。”三者，火传之真，行之真，而候不足，老师昔云：“火有止候到，方是火足药成；候不足，止景不到，必不可止火。”而药炁不至于纯阳，虽知探之，而药不为之探，故亦不得。药之不可得，则不得曰内药也！此三者总言探药之不得，即是道之不成。示此以为学者自勉，可不知所惧哉！探得此药以服食，而点化元神；张紫阳谓之“取坎填离”，正阳真人谓之“抽铅添汞”，只皆言得此内药也。欲将此炁炼而化神，必将此炁合神为炼。古云“炼炁化神”，后人不知如何言化。神炁，人所自有者，炁因淫媾而消耗，神因淫欲而迷乱，故皆不足，而渐趋于死。真人修炼，先以神助炁，炼得炁纯阳而可定；后以可定之炁而助</p>\n<p>神，神炁俱定；炁至无，而神至纯阳，独定独觉，即谓炁之化神也可。炼作纯阳之神，则有大周天之火候在焉。仙家称为怀胎为胎息。言如在胎时，自有息而至无息，佛谓之四禅定。《华严经》云：“初禅念住，二禅息住，三禅脉住，四禅灭尽定。”是也。当是时也，火自有火，而至于无火；药自有药，而至于无药。自纯阳炁之无漏，以成纯阳神之无漏；而一神寂照，则仙道从此实得矣。皆药之二生之真，两採之真，两炼之真，以所证者。辨药者，为仙家之至要秘密天机，学者可不知辨哉！然古人但言药物，而不言辨法，不言用法，又不言採时、採法，一药之虚名在于耳目之外，故后人无以认真。我且喻言之，如一草一木之为药，佛有药草之喻者。有生苗之时，有华实之时，自一根而渐至成用者如此。真阳之药，自微至著，採而用为修炼者亦如此。即初九潜龙勿用，及九二见龙利用之说。我所以直言此论者，正以申明古人所谓“药生有时”，令人人知辨，而知用也。世人见此论，而信不及者，则将何处得真阳？将指何者为真药物哉？吾愿直与同志者共究之，慎毋信邪说，淫精不真之药物为误也！</p>"}, {"id": "tx_zh3", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "鼎器直论 第三", "content": "<h5>鼎器直论 第三</h5>\n<p>冲虚子曰：修仙与炼金丹之理同。圣圣真真，无不借金丹以喻，明夫仙道。仙道以神炁二者而归复于丹田之中以成真；金丹以铅汞二者而烹炼于炉鼎之内以成宝；故神炁有铅汞之喻，而丹田有鼎器之喻也。是鼎器也，古圣真本为炼精、炼炁、炼神所归依本根之地而言也。世之愚人，遂专于炼铅炼汞而堕坏其万劫不可得之人身；愚人不知身中先炼者为外丹服食；执鼎器之说，只信炼铅汞金石外药为服食不死；至失人身而不能救。此鼎器之说，误人亦甚矣！妖人淫贼遂妄指女人为鼎，指淫媾为炼药，取男淫精、女淫水败血为服食；诳人自诳，补身接命，游方之士及一切居家愚人，以女人为鼎器，以淫媾为炼接</p>\n<p>命之药。取男泄之淫精，阴户出之淫水，经后之败血，从《广胎息经》之说，皆服食之，为接命不死。夫世法中犹慎于淫媾，淫媾伤多者，有房劳之病，而死随之矣！正损身丧命之事，反诬曰“补身接命”。且食有形之物，同饮食入脾肚，出二便。即令淫精淫水食之，亦入脾肚，出二便。饮食不能无死，精与水亦不能无死。假使食精与水可无死，食尿尿为自己所出者亦可无死乎？故钟离云：“若教异物堪轻举，细酒羊羔亦上升。”是也。此皆由鼎器之说不悟者。而误弃其性命本自有之真宗；性即元神，命即元炁，是我生身本来之所自有者。神外驰为淫想，炁外驰行淫事，皆所以速死者。真人以神驭炁，同归于炁穴根本处，禁之令久住于中，而不可出；以此禁固之义，亦曰鼎器。尽由鼎器之说误之也！一鼎器之名，而迷者与悟者判途，敢不明辨而救之哉！夫是鼎器也，为仙机首尾归复变化之至要者也！首尾者，炼精化炁，炼炁化神也。既用火候为烹炼，必有鼎器为封固；既以神炁归于丹田之根，则丹田便是鼎器，方有妙用。若无此为归复之所，而持疑无定向，则神何以凝精炁归穴耶？然鼎器犹是古来一名目也，凡有一虚名者，必有一实义。故世尊所说，欲明佛法，每借权显实。仙家每有言，皆欲显实。故真仙真喻者固多，而邪说混入邪喻者更甚。不知身中所本有者。有乾坤炉鼎之喻，乾为上田，亦天在上；坤为下田，亦地在下。故《中和集》所说亦有“天地为炉鼎”者，曰“鼎鼎原无鼎”者。亦有内鼎、外鼎之称者。有称金鼎、银鼎者，铅鼎、汞鼎者，水火鼎、朱砂鼎者。言外鼎者，指丹田之形言也；佛喻曰法界，修行佛法之界也。言内鼎者，指丹田中之炁言也。佛喻曰华藏，曰寂光国土。以形言者，言炼形为炼精化炁之用，故古云“前对脐轮后对肾，中间有个真金鼎”者是也。仙道神驭炁之必归于此，安止于此，禁之不令外动，故鼎器关炼铅汞者似之。以炁言者，言炼炁为炼炁化神之用。故古云：“先取白金为鼎器”；此旌阳真君之说也。古以黑铅喻肾，肾中发生真炁，取之，而喻曰取白金。有此白金之元炁，是得长生超劫运之本，方安得元神住，亦以长生超劫运；故曰先取为鼎器以还神也。又曰：“分明内鼎是黄金”；白金内有戊土之黄色，故亦称</p>\n<p>曰黄金。与上喻同。言白言黄，皆言所还之炁是也。兹再扩而论之，无不可喻鼎器者。当其始也，即初关炼精化炁时。欲还先天真炁，惟神可得；则以元神领炁，并归向于下丹田，而后天呼吸，皆随神以复真炁，即借言“神名内鼎”者也可。若无是神，则不能摄是炁。而所止之下田为外鼎者，又炁所藏之本位，即所谓“有个真金鼎”之处。此言丹田既为外鼎，则神亦可为内鼎也。必凝神入此炁穴，而“神返身中炁自回”；真炁阳精发生时，必驰于外者。故欲其返回，神知炁之在外，则神亦驰在外，亦欲返回者。当其炁之在外，而神亦随之在外；及神返身中，炁亦随之返于身中；故曰“神返身中炁自回”也。炁所以归根者，由此也。及其既也，欲养胎而伏至灵元神，即中关炼炁化神时。惟炁斯可；人生在世间，惟是炁载神；修仙出世间，亦用炁载神。则以先天元炁相定于中田，《参同契》云：“太阳流珠，常欲去人。卒得金华，转而相因。”又，佛家六祖惠能云，心是地，性是王，王居心地上。性在王在，性去王无。之说皆是。似为关锁；而神即能久伏、久定于中，太上云：“转神入定。”即如前言，炁名内鼎者也可。若无是炁，即堕孤阴之说，则不能留是神。神无所依着，则出入无时，驰为视听言动之妄；若依炁为念，则无向外妄念矣。而所守之中田为外鼎者，又神所居之本位，故神即静定而寂照者，如此也。初炼精化炁，固以神为炁之归依。及炼炁化神，又以炁为神之归依。神炁互相依而互相守，紧紧不得相离，真可喻鼎器之严密一般。尽皆颠倒立名，以阐明此道耳！故吕仙翁又曰：“真炉鼎，真橐龠。知之真者，而后用之真；用之真者，而后证果得其真。”岂有还丹鼎器之所当明者，而可不实究之耶？此又结言自身有还丹鼎器之当究。又岂有取诸身外，而可别求为鼎器者耶？此又结言泥土金铁鼎器，及女人假称为鼎器者，俱不可信。信之则必误丧性命。昔有言：“总在炁圣性灵而得”者，斯言亦得之矣。白玉蟾云：“只将戊己作丹炉，炼得红丸作玉酥。”盖戊为肾中炁，名白金者曰戊，己即心中之本性曰己。戊己原属土，故曰土釜，即鼎器之别喻也。张紫阳曰“送归土釜牢封固”是也。夫还神摄炁，妙在虚</p>\n<p>无，虚无者，乃真先天神炁之相也。神无思虑，炁无淫媾。必先有归依，神依炁，炁依神，神炁相依，而又依中下之外鼎。方成胜定。胜定者，最上乘至虚至无之大定也。古云：“心息相依，久成胜定。”此鼎器之辨，不可忽也！</p>"}, {"id": "tx_zh4", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "火候经 第四", "content": "<h5>火候经 第四</h5>\n<p>冲虚子集说《火候经》。诸篇皆“论”，此独名曰“经”者，皆古高真上圣传于永劫，真常不易之经语也！曰：天仙是本性元神，仙由修命而证性，故初关是修命，中关是证性。不得金丹，不能复至性地而为证；金丹是真阳元炁，不得火候，不能採取烹炼而为丹，故曰：全凭火候成功。吉王太和重问火候，冲虚子集圣真诸言而为此经。意曰：古先圣真皆不传火，虽有《火记》六百篇，篇篇相似採真铅。《玉皇心印经》曰：“三品一理，妙不可听。”观此言虽曰不传，似亦传之矣；虽曰传之，又似不传矣。我每亦遵之，不敢传火。及见见在世，人人惑于妖妄邪淫，个个不知仙道正门；乃惧未来圣真无所趋向，故又不敢不言。言之简，而人亦不彻悟，犹之夫旧事也；言之详，又嫌于违天诫。因世人于古云“火有候、有作为”，此言若先入心，便责彼言“无候无作为”者为非；于古云“火无候、无作为”，此言若先入心，便责言“有候有为”者为非。竟不知当有候有为，我亦当有；当无候无为，我亦当无。所以紫阳真人叹云：“始于有作无人见，及至无为众始知。但信无为为要妙，孰知有作是根基！”昔禅宗人亦云：“你有一个拄杖子，我与你一个拄杖子。你无一个拄杖子，我夺却你一个拄杖子。”即此说也。我故全集众仙真秘诀，而次第之，说破逐节当有当无，直指世之愚迷。遇师时，当以此为参究。昔我李祖虚庵真人云：“饶得真阳决志行，若无真火道难成。周天炼法须仙授，世人说者有谁真？”此言仙道必要仙传，而后可修成仙。俗谚云：“要知山下路，须问去来人。”若世人所传者，只是世法，甚非仙道。古仙云：“若教愚辈皆知道，天下神仙似水流。”彼自己尚无学处，将何以教人？前七句是必用真火候之断，此四句是必用真火候引证之案，以断案破其题。且</p>\n<p>谓上古圣真，不立文字，恐人徒见，而信受不及。今世人亦不信书，以书正不作巧言，故不足取信于人。唯邪人能造巧言，故能取信于人。中古圣人，借名火候，而略言之，而世又不解知。及见薛道光言“圣人不传火”，遂委于不参究。虽有略言者，亦不用，竟取信于妖人之口而已。我故曰：“火候谁云不可传？既不可传，何故有《火记》六百篇？随机默运入玄玄。达观往昔千千圣，呼吸分明了却仙。”此直言说出火候只是呼吸二字。岂不见陈虚白曰：“火候口诀之要，当于真息中求之。”《灵源大道歌》云：“千经万论讲玄微，命蒂由来在真息。”此又直说出火候只是真息。真息者，乃真人之呼吸，而非口鼻之呼吸。陈致虚曰：“火候最秘，其妙非可一概而论，中有逐节事条。”即我张、李、曹三真人相传以来，所云採药之候，封固之候，起小周天之候，进退颠倒之候，沐浴之候，火足止火之候，採大药之候，得大药服食之候，大周天之候，神全之候，出神之候等皆是。可不明辨之乎？张紫阳曰：“始于有作无人见，及至无为众始知。但信无为为要妙，孰知有作是根基。”有作者，小周天也；无为者，大周天也。盖火候行于真人呼吸处，此处本无呼吸，自无呼吸而权用为有呼吸，以交合神炁。久炼而成大药者，必用有为也。不如是，则道不真。无人见者，秘传之天机，而密行之。古先圣真诚人曰“知之不用向人夸”是也。所谓“圣人不传火”者，不轻传此也。世人邪法皆用有为，仙家之有为则不同。邪说之有为皆着相，仙家之有为不着相，此尤为无人见者。此以前皆从无人有也，以后皆从有入无也。然呼吸本一身之所有也，先自外而归于内，则内为有。故大周天必欲至于无；然无者，非不用火而言无，乃是火候行之妙于无者。此火危险甚大！因有为之火易行，无为之火难行也。不能无之是危险；能无之而或少有一毫杂于有，亦是危险；无之而或间断不行，亦是危险；故紫阳亦嘱之。世之愚人俗子，但见无为，便猜为不用火，遂其所好，安心放旷者有之；或猜为始终只用一无为而已，不求所以当有为于始者有之；故曰：“但信无为，孰知有作。”此紫阳甚言当有无双用之旨也。纯阳真人曰：“一阳初动，中宵漏永。”此下一段皆言活子时之火候。魏伯阳真人曰：“晦至朔旦，震来受符。”此以一月为喻也。晦者，</p>\n<p>月终之夜无光，喻身中阴静之时。晦而至于次月朔旦者，初一也。震来者，震一阳动于下爻，以喻身中真阳精炁之生。盖药生即火当生，震阳既动而来，则当受火符，以採取烹炼之也。上节纯阳之说，以一日为喻者。中宵为夜之半，即子时之义。漏永者，火符之刻漏筹数也。古人或以日喻，或以月喻，或以一年喻，无所不喻；不过借易见者，以发明火之不可言者。学者皆不可以喻认真，但恍惚喻似身中之理，而犹非实似也。陈朝元曰：即《玉芝书》。“凡炼丹，随子时阳炁生而起火，则火力方全。余时起火不得，无药故也。”有药方能造化生，故起火炼药，无药时不必用火，故起火不得。若强用火，便是“水火煮空铛”。铛是炊饭器。陈泥丸曰：“十二时辰须认子。”丹道一周天之用，须用真活子时而起火。天道一日十二时本有子，夜半之时也。丹道虽喻子，而非可执按其子者。于此十二时中，皆可有阳生火生之子，故称曰真活子时；为其不拘夜半之死子也。修丹者，当于喻天时中，认取丹道当生火之活子时。若不知活，则谓之当面错过。白玉蟾曰：“月圆口诀明明语，时子心传果不讹。”月圆则阳光盛满，喻阳炁发生之盛，可採取，炼之而可成金丹。仙机採有时者即此。若不及圆，则阳不旺，採之亦不成丹，亦不能长生不死，故千叮万嘱要知“时”。时子者，身中阳生之子时，必得仙师心传口授，而后得其时之真。彭鹤林曰：“火药元来一处居，看时似有觅时无。”药是先天元炁，本无形，若以无形而致疑曰：不知有所得，无所得，是终于不得成。我则信其无之至真，亦以无之妙用，而採取烹炼，便是真虚无之仙道也！火本呼吸之有形，若即以有形用之，则长邪火。以有而用之似无，火药一处居，俱于无中得有之妙，所以谓之似有似无。予老祖师李虚庵真人曰：“一阳动处初行火，卯酉封炉一样温。”一阳动同纯阳之说，但曰採取。封固曰沐浴温养；总要无有双忘，同于太虚。此皆言药生即是火生，以明採药起火之候也！此是冲虚子总结上一大段之说者。採药者，子时火之前也；起火者，子时火之事也。二者必要分明，所以达摩云：“二候採牟尼，四候有妙用。”是也。正阳真人曰：“结丹火候有时刻。”此下皆言从起火于子，行十二时小周天火候，正烹炼金丹之候，故</p>\n<p>曰“结丹有时刻”。萧紫虚曰：“乾坤橐龠鼓有数，橐龠者，鼓风吹火之具，喻往来呼吸之息；即乾呼而坤，坤吸而乾之义。有数者，即乾用九，坤用六之数也。离坎刀圭探有时。”离心中之神曰己土，坎肾中之炁曰戊土。上下二土成“圭”字，戊己合一者称刀圭；以喻神炁合一者，亦称刀圭。然刀圭，由得二土合炼而成。又必先知採取二土之时，方能成二土之圭。不知採时，必不成二土之圭也！玉鼎真人曰：“入鼎若无刻漏，灵芽不生。”时候不正，有何定其斤两升降哉？真阳曰：入鼎者，真阳之精炁既还于炁穴，必要刻漏之火候炼之，则黄芽大药方生。有刻漏则知一时已完，当用二时；六阳用进，六阴用退，方合正理。又能令神气二者，皆半斤八两。又如用一时之刻漏，当升当降者；不当升降者；方有定理。《玄学正宗》曰：“刻漏者，出入息也。”此直言刻漏是出入息之别号。刻漏者，是昼夜十二时各有刻数，每有几点漏滴之声，以应一刻，再至多漏以应一时。今言此，以喻呼吸之息也。以漏数定刻数，即如丹道中以真息数定时数也。广成子曰：“人之反覆呼吸彻于蒂，一吸则天气下降，一呼则地气上升，我之真炁相接也。”黄帝于崆峒山石中，得《阴符经》，请问文义于天真皇人及广成子，记其言曰《三皇玉诀》。云反覆者，上中下三田旋转之义。呼吸者，真人之呼吸，非凡夫之呼吸。彻于蒂者，通于炁穴之处。吸降呼升者，似于反说。大抵丹书，反说者甚多；我以理及事详究之，皆吸升呼降合于自然，方得可有可无之妙。予师曹还阳真人曰：“子卯午酉定真机，颠倒阴阳三百息。”子卯午酉者，《入药镜》所谓“看四正”者，即此四时也。《入药镜》所言“在脱胎”，大周天之后也；此言乃小周天也；小大事不同而用同。何也？《心印经》云“三品一理”是也。我北真孙不二所言“无内藏真有，有里却如无”，即此真机也。颠倒阴阳者，六阳时用乾之用而进；至六阴时则用坤之用，颠倒之而退。阳时乾策二百一十六，除卯阳沐浴不用，乾用实一百八十也；阴时坤策一百四十四，除酉阴沐浴不用，坤用实一百二十也；合之得三百息周天之数也。闰余之数在外。张紫阳曰：“刻刻调和，真炁凝结。”刻刻，言三百六十息数，皆要调和合自然，一刻不调，则不能入定凝炁而成胎基。薛道光曰：“火候抽添思绝尘，一爻看(音刊)过一爻生。”抽添，即进退。绝尘</p>\n<p>者，念不着于尘妄幻魔。爻过爻生者，即绵绵无间也。陈泥丸曰：“天上分明十二辰，人间分作炼丹程。若言刻漏无凭信，不会玄机药不成。”天上明明有十二支之辰位，真人效此为十二时之火候。程者，一周天节制之限数也。若愚人，不知始用有作，言刻漏不必用，便是不会悟玄妙天机之人。既不用火炼药，则药不成，无以证道升仙也。又曰：“百刻之中，切忌昏迷。”一日十二时中有百刻，以足周天者。昏迷者，或昏睡或散乱，皆错失真候，故曰“切忌”。陈希夷曰：“子午工，是火候，两时活取无昏昼。子午皆活用比喻，的非若天时之昼午、夜子。一阳复卦子时生，午后一阴生于姤。三十六乾用九，故四九三十六也。又二十四，坤用六，故四六二十四也。周天度数同相似。天上度数之周天，与炼丹火候之周天皆相似，同此九六之数。卯时沐浴酉时同，二时同用沐浴。火候足时休恣意。”崔公云：“火候足，莫伤丹。”言不宜恣意行火，而不知止也。许旌阳曰：“二百一十六，即乾用九之积数。用在阳时。从子至巳，六阳之时也。六阳时虚拟之曰二百一十六；此大约言者，有卯沐浴无数之候在中，本无此数。一百四十四，行于阴候。”即坤用六之积数，用于阴者。从午至亥六阴之时也，每四六计之，总六阴而虚拟一百四十四也。非真实用此数，但言有如此之理；学者当因此粗迹，而求悟精义之妙。金谷野人曰：“周天息数微微数，玉漏寒声滴滴符。”微微数者，精妙不着于相，非强制也！滴滴符者，周天之数无差。《直议真诠》曰：“火候本只寓一气进退之节，非有他也。真火之妙在人。若用意紧则火燥，用意缓则火寒。勿忘勿助，非有定则，尤最怕意散。不升不降，不结大丹。”此是明时初学者之说。虽未明大道之人，其言亦可示学者为教诫者。王果斋曰：“口不呼兮鼻不吸，橐天龠地徐停息。巽风离火鼎中烹，直使身安命方立。”口鼻不呼吸，则循真人呼吸之法而呼吸之。橐龠者，即往来呼吸之义。橐天龠地，即广成子“呼地升、吸天降”之说。停息者，不呼吸之义也。邪正皆言停息，採战者曰：“切须先学停其息”，《胎息广义》妖书亦论停息，实无所用处，特借此以擒拿愚人，令尊己归依己耳。况停又为强闭强忍之邪法，实非停</p>\n<p>也！仙家之停息，乃自然静定而寂灭也！唯仙佛同！鼎中烹，呼吸在真金鼎之处，不出入于口鼻，则内有真宝，丹成于此！本性元神安立于此！谓之筑基成者。陈泥丸曰：“行坐寝食总如如，唯恐火冷丹力迟。”行坐者，坐而行工也，非行路。有寝有食，尚未脱凡夫，只是百日内事；若十月胎神之工，则不寝不食矣。如如者，入定之妙，似有而不着相，不空而空；似无而不着空，空而不空，谓之真如。真如如，则火合玄妙。火不冷，丹力不迟矣。纯阳老祖曰：“安排鼎灶炼玄根，进退须明卯酉门。”鼎灶者，即炁穴；玄根者，即元阳精炁归于根而炼之。鼎灶、玄根，皆言用火候之处。须明者，叮咛之意：言人不可只用阳进火、阴退符；而不用卯酉之沐浴，则亦堕空亡；而不得药，不能成药。盖沐浴是成仙成佛，最紧要、最玄妙之工；故世尊有入池沐浴之喻。沐浴乃是炼丹之正工；而进火退符不过只是调和、助沐浴之工而已。调和进退而不沐浴，则进退成虚幻；沐浴而不能进退，则沐浴不得冲和；故曰“须明”。禅家马祖曰：“未有常行而不住，未有常住而不行”，亦喻此也。正阳老祖师曰：“旦暮寅申知火候。”本卯酉二时以行沐浴，纯阳翁已直言之矣。其师正阳翁曰：“寅申者，寅之下即卯，申之下即酉。戒修士至寅申之候，不可忘失卯酉之沐浴也。”又曰：“沐浴脱胎分卯酉。”沐浴之工固行于卯酉之候，及脱胎亦同于卯酉。《入药镜》谓“终脱胎，看四正”，即此语。脱胎之沐浴曰“分”者，前似有而后似无也。人人不泄炼炁化神之工，唯正阳翁于此泄万古之秘。又曰：“沐浴潜藏总是空。”沐浴而真空，名曰仙机。不能真空，则堕旁门强制外道，而亦成大病。《悟真篇注疏》曰：“子进阳火，息火谓之沐浴；午退阴符，停符亦谓之沐浴。”“停符”二字亦可发明。正阳老祖曰：“果然百日防危险。”小周天有进退之火，有不进不退之火。若进退不合进退之数，不合进退之机，不由进退所当行之道，不合进退之所当起止，已合已由、不知火足之当止，皆危险所当防者。萧紫虚曰：“防火候之差失，忌梦寐之昏迷。”火候差失，则真炁不能补足，而大药不能成。梦寐昏迷者，或睡中迷于梦，则尘妄心生，而不能生正觉；或行火迷于昏睡，无周天之候，皆所当防当忌者。《天尊得道了身经》曰：“调息绵绵，似有如无，莫教间断。”息不绵绵则不谓之调；无不似有、有不如无，则</p>\n<p>亦不谓之调；有间断，则亦不谓之调。张紫阳曰：“谩守药炉看火候，但安神息任天然。”神息任天然，似大周天之火，其实，上句药炉，则是言小周天矣。但炼药炉中之火，虽属有为，毕竟要合天然自在为妙。不如是，则非仙家真火真候，乃外道邪说之火矣。石杏林曰：“定里见丹成。”石之师紫阳云：“惟定可以炼丹，不定而丹不结。”此甚至要之语！因是总言，故不入此正文大字。紫阳曰：“火候不用时，冬至不在子。及其沐浴时，卯酉时虚比。”“虚比”二字总贯串四句。不用时者，不用历书一日十二之时，而用心中默运十二时而虚比也。冬至者，是人自身中阳生时候，虚比曰冬至。故身中阳生时，必要起子时之火，即阳生之时为子，不在天时仲冬子月之子也。于一日十二时中，遇阳生皆可言子。在沐浴当行之时，虚比于卯酉。卯在六阳时之中，酉在六阴时之中，调息每至于六时之中，可以沐浴矣；故古圣遂称之曰卯酉。岂可误执天时之卯酉哉！又曰：“不刻时中分子午，无爻卦内定乾坤。”一日每时有八刻。不刻之时，是心中默运火符之时，虚分子午，不用有刻之时也。每卦有六爻，易也；身中借乾坤虚比鼎炉，故言无爻。此皆言炼药行火，小周天之候也。此一句是冲虚子之言，总结上文众圣真所言，百日所用之火也。又，吉王太和问曰：古来言火候者多，何以分别此名小周天，为百日炼精化炁之用？伍子答曰：小周天者，有进退，有沐浴，有颠倒，有周天度数。凡言炼药、炼丹、守炉、看鼎、药熟、丹成，皆百日小周天之事。我据此法，而分别言小。后之圣真善学者，凡见大藏中所未见者，皆当以此法分辨；要知前圣必不以无用之言而徒言之。《心印经》曰：“回风混合，百日工灵。”回风者，回旋其呼吸气之喻也。混合者，因元神在心，元炁在肾，本相隔远，及炁生而驰外，神虽有知而不能用者，无混合之法也。故此经示人用呼吸之气，而回旋之，方得神炁归根复命；而混合之，方得神宰于炁而合一。倘无回风之妙用，则神虽在宰炁，亦未知炁曾受宰否，此为炼金丹至秘之至要者。若用至于百日之工，则灵验已显，炁已足而可定；神已习定，久而可定；故小周天火、回风法之所当止也。自此以下皆言小周天火足当止。正阳老祖曰：“丹熟不须行火候，更行火候必伤丹。”火足而丹熟，不用火矣，故有止火之候。遇止火之候一到，即不须行火矣，若</p>\n<p>再行火，亦无益。伤丹者，丹熟则必可出鼎而换入别鼎；若不取入别鼎，则出无所归，不伤丹乎？精化炁于炁穴，炁化神于神室，故曰别鼎。崔公曰：“受炁足，防危凶。火候足，莫伤丹。”炁足，受补法而炁足，亦宜防满而溢之危险。防者，见止火之候而即止之，则不伤丹而得防之功。何为满而溢？我亦不至有此。老师曾嘱曰：当不用火，必勿用；你若用火不已，丹之成者，更无所加；疑而怠慢，但已满之元精，防其易溢！而非真有溢也，以其尚未超脱，离此可溢之界耳。此正可凡可圣之分路头也！紫阳曰：“未炼还丹须速炼，炼了还须知止足。若也持盈未已心，不免一朝遭殆辱。”未炼还丹之时，一遇丹药，即当速炼，用一周天之火。药生即採炼，勿虚负药生，曰速炼。採得药归而炼，火候明白不差，诚心勇心行之，亦曰速炼。如此药也真，火也真，速炼必速成。丹成火足，必要知止而止。若任丹成至足之炁，持此盈满，未知止火而止，终限于小成，尚未脱生死轮迴之欲界。知止火，採得大药金丹而超脱之，则行向上转神入定，斯免生死之始。萧了真曰：“切忌不须行火候，不知止足必倾危。”真阳曰：老师曹还阳真人自云，“曾亲见此事来，故深为我弟兄二人详嘱之。”同问师：前炼丹时，也知止火，採得大药，冲关，特未过耳。今复为之，熟路旧事不异，何得有此倾危？老师曰：“当初李真人传我时，言：‘药火之最秘最要者，尽与你明之矣，即可修而成矣！但关之前有五龙捧圣之法，是至秘天机，非天仙不能传，非天仙不得知，非天下之可有，非凡夫之敢闻。待你百日工成，止火採大药时，方与你言之。’及师回师家，我居我室，相去日远。我猛心奋勇，决烈为之，那怕仙不能成，天不能上！行之五十日而丹成，止火採大药而得。药自知转上冲关而不透。乃思採战房术，我所知甚多，皆言过关；若得一法，试而透过，也省得待师来。遂将前邪门旁法所闻，一一试用，绝无可透；始知邪门之法，尽是欺人妄语，而无实用者。及年终师来，我详细诉于师。师曰：‘真好决烈仙佛种子！真到此地。你今所说见的，内有此一景，我未曾与你说得。（同上李老师所言。）你今真到，即能言也。可近来听受捧圣之法。’我闻已，亦即行之。行不数日，止火景到，恨不即得之为快；即採之，大药不来，火尚未甚足也；如邱真人所谓金精不飞者是也。再採，再炼，而止火之景又到，疑之曰：初得景到而</p>\n<p>止火，採之而不得大药；且待其景到之多而止，大药必得矣。至四，而遇倾危之患。我想尹清和真人云：&#x27;老师邱真人当止火时，而长安都统设斋，受食已，而未及止火，至晚走失三番，谓之走丹。前工废矣，须从新再炼。乃泣曰：我自福小，敢不勉哉！奋勇为之，后即成天仙。&#x27;今我既在其辙，敢不继芳踪乎？亦奋勇为之。又思我初炼精时，得景而不知，猛吃一惊而已；及再静而景再至，猛醒曰，师言当止火也，可惜当面错过；又静又至，则知止火用採而即得矣；是採在于三至也。”今而后当如之，及后再炼者不误。景初而止，失之速不待；景至四而止，失之迟；不速不迟之中而止火得药、冲关，而点化识神。凡真修圣真，千辛万苦，万万般可怜，炼成金丹，岂可轻忽令致倾危哉！凡圣关头第一大事！吾弟兄垂泪而详述邱、曹二真人之案，为七真派下后来圣真劝诫，即此便是止火之候，大有危险之所当知者。学者不可以为闲言而忽之，是你自己福力。此皆言丹成止火之候也！此一句是冲虚子之言，总结上文，此一段止火之说也。从来世人学道者，并不知有止火之候；虽有前圣多言，皆忽之而不究，故今特列类而详言之。故陈致虚亦有云：“火候者，候其时之来，候其火之至，看其火之可发，此火候也！慎其火之时到，此火候也！察其火之无过不及，此火候也！明其火之老嫩温微，此火候也！若丹已成，急去其火，此亦火候也！”陈致虚前已言其妙，非可一概而论，中有逐节事条，可不明辨之乎？此又详列其条，以明申前旨，学者最当参究。天仙九还丹火之秘候宜此。若此数者，炼精化炁之候备矣。此又是冲虚子总结前採取、烹炼、止火等旨，百日关内事止此，令学者知参究前圣说。此以下“予故曰”起，“之舍也”句止，又冲虚子自言，百日关内之火候等秘机而总言之者。予故曰：自知药生而採取封固，运火周天。其中进退颠倒、沐浴呼嘘、行住起止，工法虽殊，此节同致虚逐节事件之说。真机至妙，在乎一气贯真炁而不失于二绪，一神驭二炁而不少离于他见。三百周天数，犹有分余象闰数。一候玄妙机，同于三百候。方得炁归一炁，神定一神，精住炁凝，候足火止，以为入药之基，存神之舍也！此一段又冲虚子列言，百日炼精，用火细微条目，而精言实悟之旨也。盖小周天是炼精时火候之一总名也，其</p>\n<p>中事理固多，前圣固有各言。其採药是一候，而封固又一候。达摩亦只言“二候採药”者，并採封二者而混言也；又言“四候别有妙用”者，乃小周天三百六十内之候也。我今遵仙翁而二言之。及周天时言进退候者，若不似进退，而亦虚拟之为进退。铅汞丹法言进退者，进则用火入炉，退则不用火而离炉，此实可据而易言；或以加多为进，减少为退，亦可据而易言；炼精者，则不似此说。我今亦只勉强而虚比，不似以为似：意谓六阳时，以乾用九，数之多为进；六阴时，以坤用六，数减少为退；既在周天之内进阳火，退阴符，非多少为言则不可。若以用不用为言，则远甚矣！颠倒者，除药物配合颠倒不必言，但言火候中之颠倒。吕仙翁云：“大关节，在颠倒。”初老师言：“六阳火专于进升，而退后随之而已；六阴符专于退降，而进又后随之而已。”曰专者，专以进升，主于採取；专以退降，主于烹炼也。曰后随者，顺带之义，以其往来之不可无，亦不可与专主并重用也。此圣真秘机之颠倒也！沐浴者：子丑十二支次第之位，凡世法有五行，故内丹有五行之喻。五行各有长生之位，寅申巳亥是也。火生于寅，水生于申，金生于巳，木生于亥。卯酉子午之位，是沐浴之位；故丹法活子时之火，历丑寅至卯，所当行之火，借沐浴之位而称火工曰沐浴。酉亦如之。举世愚人邪棍，尚不知沐浴何以得名，何由以知沐浴之义之用哉！今此只略言捷要耳，更详于《仙佛合宗语录》中。观此者，可自查《语录》，以考其全机。行住起止者，行则仙佛二宗之○喻也；住则仙佛二宗之·喻也；起则採封二候之后，小周天候之所起也；止则小周候足而止火也。一气者，呼吸之气贯串真炁，自採至止不相离，离则间断，复贯则二头绪矣。此由昏沉散乱之心所致，甚则二三四绪，皆无成之火矣。戒之！戒之！固然以息气串真炁，必主宰用一神驭之而不离；若内起一他见则离；若外着一他见则离；离则无候无火矣。焉能炁足炁生！三百六十度，故曰周一天，犹曰五度四分度之一。所谓天度之分余为闰位者，何耶？知有闰，则知天之实周矣。能实周，则炁易足，丹易成，而初生之药亦易生矣。玄机者，不传之秘机也，火候一一皆要用此。若不用此，则火必不能如法；呼吸则滞于真息，而近凡夫之口鼻，重浊而为病；不用此，则神亦不能驭二炁，而使之行住得其自然。一息如是，三百息亦皆如是，方可得天然真火候之玄功。此古圣真皆隐然微露，而不敢明言者，亦不敢全言者。不如是，虽曰已周天，近于邪说之</p>\n<p>周天，亦无用矣。所以“玄妙机”三字，又百日关炼精火候之枢纽也，採、封、炼、止等候，俱不可少者：于一炁之外驰欲界为淫媾之精，为视听言动成淫媾之助者，皆能复归于一炁，能真不动同于无情不动；一神之动为淫媾之神，着视听言动为淫媾之助者，不驰外而复归一神，能真入大定；所得候足火止而基成如此。永为入药之基址，为存神入定之宅舍。此正所谓“先取白金为鼎器”者是也。而道光薛真人乃有“定息採真铅”之旨。既得真铅大药服食，正阳谓之抽铅。大药者，即阳精化炁之金丹也。果从何求而得？亦从丹田炁穴中生出。当未化炁之先，所生也出丹田；但无形之炁微，附外体为形。曹老师因后有大药之名，便称此为小药之名，以其炁小故也。及炼成金丹，既化炁之后，所生也出丹田，曰大药，实有形之真炁如火珠，亦是从无而入有也。黄帝曰赤水玄珠，一曰真一之水、曰真一之精、曰真一之炁、曰华池莲华、曰地涌金莲、曰天女献花、曰龙女献珠、曰地涌宝塔，又曰刀圭、曰黄芽、曰真铅、如是等仙佛所说异名，不过只一丹田中所生之真炁。既成自有之形，所以不附外形，而唯生于内，用于内，亦我神觉之可知可见者。及渡二桥，过三关，皆可知可见。此所以为脱生死之果，从此便得其有真验矣。即行火候炼神，谓之添汞。此火候是大周天也。添汞者，心中之元神，名曰汞。凡人之神，半动于昼而阳明，半静于夜而阴昏昧；阳如生，阴如死。修士必以昏昧而阴者渐消去之。故消一分阴，令阳添一分；去二分、三分、四分、五分阴，则添二分、三分、四分、五分阳；渐渐逐分挣到消尽十分阴，添足十分阳，谓之纯阳。纯阳则无阴睡，谓之胎全神全。所以古人云：“分阳未尽则不死，分阴未尽则不仙。”此皆添汞之说也。然所谓添者，必由于行大周天之火，有火则能使元炁培养元神，元神便不能离二炁，而皆空皆定，直至神阳果满。若不添汞行火，以神驭火，神不阳明，如何行得火？添得神三分、五分阳明，方行得三分、五分火，故曰添汞行火。唯神明则得二炁而培养元神，助成长觉。则真炁断而不生；正是不定而药不生之说，此时乃实证长生不死之初果矣。若不炼神，则阳神不就；终于尸解而已。炼神者，炼去神之阴而至纯阳，全无阴睡。火定炁定，而神俱定俱空，方是阳神成就。炼神之法，全由二炁静定，同之入灭。但二炁少有些儿不如法，则神不炼，阳不纯，</p>\n<p>不成就，不能出神。但在十月之内，不曾出定者，俱是尸解之果。何故？但有凡夫之呼吸，即有凡夫之生死。人之生，只有口鼻之气以为生，最怕水火刀兵：水入鼻而至内，则无呼吸之窍，身虽坏，而神或不坏，亦分解形神为二；火烧身，则神无依住，亦分解形神为二；刀兵截其颈，呼吸断，神乃去形，而分解为二；形既无则神不独立，亦不能久立，再去投胎转劫。所谓尸解者，有死生之道也；不行大周天之过也，二炁及神皆不入定之故也。丹既成，神既长，安肯不入一大定哉！后学圣真勉之。故《九转琼丹论》云：“又恐歇气多时，即滞神丹变化。”此三句是冲虚子引足上五句之意。又，自“而道光”至“变化”止十三句；又，冲虚子于此承上起下，分判圣凡至要天机。又，歇气者，歇周天火候之气。或得坎实来而点离中之阴，勤勤点化离阴为纯阳。若既得坎实而点离阴矣，不即行大周天，则坎实亦不勤生以点离；或行大周天，而不合其中玄妙天机，犹之不行也，亦不能勤生坎实以点离阴；便迟滞离阴之神为纯阳之变化。神丹者，即坎实曰金丹，既点离则二炁渐化神，二炁尽无，独有神之灵觉在，故亦曰炼炁化神。纯阳真人云：“从今别鼓没弦琴。”别鼓者，另行大周天也。明说与前小周天不同。没弦琴者，无形声之义。然大小固不同，行火者，必先晓得清白，而后可以言行火。紫阳曰：“大凡火候，只此大周天一场，大有危险者，切不可以平日火候例视之也！”上面只说周天，未分大小。紫阳言此大周天，不可以平日者一例看；则平日的，便隐然言是小的。平日者，平常已行过的口气。不可一例看，便是候不同。言平日，即是言百日事。故仙翁又言“始有作”，小周也；“后无为”，大周也。广成子曰：“丹灶河车休矻矻（音恰），鹤胎龟息自绵绵。”言不必用河车者，是百日之事已过，故不必用。今当十月之工，只用鹤胎龟息绵绵然之火也。《上清玉真胎息诀》云：“吾以神为车，以气为马，终日御之而不倦。”前百日以阳精转运，称河车。此胎息时，则转神入定，以神为车，以气为马，以御神车，是喻炼炁以化神。后圣亦须分辨着。白玉蟾曰：“心入虚无行火候。”入虚无，是神炁入定而不着相，邱真人所说“真空”是也。虽行大周天，不见有大周天之相，便得虚无之妙。范德昭曰：“内炁不出，外气不入，非闭气也。”世人言闭气者，强制也。强忍之不令出入，邪法旁术</p>\n<p>皆是如此。故仙道别有天机，不与世同：虽内不出，外不入，非强忍也；有真息合自然之妙运者，所以入定。白玉蟾又曰：“上品丹法无卦爻。”世人见此说，上品丹无卦爻，便一概贬有卦爻者为非；不想自己不遇圣真传道，不知有爻无爻将何所用。盖小周天者化炁，是有卦爻小成之火；大周天者化神，是无卦爻大成之火。以其化神，故曰上品。彭鹤林曰：“若到丹成须沐浴。”丹成是前金丹之成。沐浴是大周天之喻，言丹成不必用小周既入十月之首，必须用大周。正阳老祖真人曰：“一年沐浴防危险。”伍真阳曰：沐浴在小周天固为喻；今言于大周天，亦为喻。在小周曰二时；二月之喻此大周，言一年之喻。在小周可以小喻，在大周可大喻也。防危险者，防一定必有之危险也。若仙机有出入，则不定其沐浴；若佛法不久住，亦不定其沐浴。沐浴最贵有定心，防危险正防其心不定，防其沐浴不如法。又曰：“不须行火候，炉里自温温。”此言十月不必用有候之火，当用温温然无候之火。不寒不燥，不有不无，方是温温的真景象。王重阳真人老祖曰：“圣胎既凝，养以文火。安神定息，任其自然。”圣胎成于真精阳炁，起初炼精採取烹炼，非武不能。及圣胎既凝金精而成，武则无用矣，只用文火养之。神息定而任自然，正是养文火之功用。道光曰：“一年沐浴更防危，十月调和须谨节。”沐浴者，无候之火，即大周天也。一年者，大概而言之辞，即十月之说。凡说十月、一年者，入定到此时，亦可得大定而出定，故言之。谨节者，谨守沐浴之理也。防危者，防其离沐浴而外驰不定也。若一年而得定之后，必时时在定，年年劫劫俱在定，又非止一年、十月之说而已。陈虚白曰：“火须有候不须时，些子机关我自知。”有候者，大周天之火，无候之候也，乃似有似无之妙。不须时者，不用十二时为候，故可入无为。些子机关，是似沐浴而非沐浴，常定而神常觉，故曰“我自知”。若不知，则昏沉火冷，而丹力迟矣！紫虚曰：“定意如如行火候。”如如者，如有不有，如无不无。定意于如有如无之候中，方得大周天之真候，方是真行。又曰：“看时似有觅时无。”大周入定，本入于虚无，若徒然着无，则落空矣，故曰“似有”。有而非有，不空而空，却“似无”，方是真空真定。又曰：“不</p>\n<p>在呼嘘并数息，天然。”有呼嘘数息，是言有为者之事。今既入定，故曰：不在有为。专任天然，以证无为。又曰：“守真一，则息不往来。”真一者，在前炼精时，炼而所得真精，曰真一。此炼炁时，乃真精之炁得真神，用真息之气守之，三者合还神，曰真一。俱定不动，则是息已无息，焉有往来？古云：“《火记》六百篇，篇篇相似採真铅。”昔《参同契》亦云：《火记》六百篇，篇篇相似。却未说出採真铅之妙旨。此言似採真铅，则玄中又玄者，尽于是矣！採真铅者，薛道光所谓“定息採真铅”是也。篇篇相似，总归一大定。马丹阳曰：“工夫常不间，定息号灵胎。”定息于室，神即守息而为胎神。定无间断，神亦常觉无间断，而胎神始灵。石杏林曰：“不须行火候，又恐损婴儿。”初入十月之关，必用火候炼炁成胎而化婴儿之神，婴儿喻神之微也。及胎成，婴儿亦成，将出现于外之时，则无用火矣。若再用火，是婴儿未完成之事，岂不有损于婴儿乎？《中和集》曰：“守之即妄，纵又成非。非守非忘，不收不纵。勘这存存存的谁？”大周入定化神，似有似无。似有即神炁之定；似无是神炁在定而不见在定之相。若曰守，便着于有；着有，即起有之妄念。纵之而不照，则神炁离，而非定之理，但微有似存。若二炁存，则神亦存；神存而二炁亦存；俱存在定，便俱虚无；无上之妙境在是矣。鹤林曰：“及至打熬成一块，试问时人会不会？不增不减何抽添？无去无来何进退？”神炁合一，俱定入一块，则无火矣，不似百日火之有增减。不增不减，安有抽添？息无去来，何用进退？此归一而渐归无之说也。我祖师张静虚真人曰：“真候全非九六爻，也非颠倒非进退。机同沐浴又还非，定空久定神通慧。”真候者，火候定而空矣。不用小周之九六，不同其颠倒、进退、沐浴等，而唯定空。久定久空，神通慧照，朗然独耀；同于世尊之入涅槃而灭尽定矣。邱长春真人曰：“息有一毫之不定，命非己有。”有息则有生死，无息则生死尽矣！必定息至无，则命方为我所自有、自主张，天地、阴阳、阎君则不能使我生死，由我得无死之道也。若一些息不尽定，则命在息而不为我有，由我自己不能主张，犹有可死之道也。此皆言炼炁化神，十月养胎，大周天之火候也！此又冲虚子总结上文</p>\n<p>众圣真所言大周天火一段而言之也。予亦曰：大周天之火不计爻象，固非有作；温温相续，又非顽无；初似不着有无，终则全归大定。切不可执火为无，以为自了，则落小解之果；又不可住火于有，以为常行，则失大定之归；将有还无，一到真定，则超脱出神，飞升冲举之道尽之矣！此“予亦曰”起，“尽之矣”止，又冲虚子自言大周天之旨，又兼叮咛劝诫者。不算计爻象，乃无为之异于小周。有温温非全无，是大周初之似有似无之实理也。大周之初，正是一二三月之时。曰似有者，尚有有；曰似无者，未真无，所以犹有些子凡火食性在，由有些子息故也。及至全归大定，息无而食性亦无。所以《金碧龙虎上经》云：“自然之要，先存后忘。”俞玉吾又注之曰：“先存神于炁穴，而后与之相忘，神自凝，息自定。”是也。然又当知：火本欲归于无，若不知先似有之妙，而遽执曰本无，何必用似于有；则必堕在全无，而不能至真无；落于尸解之小果矣。又当知：此火起于似有，而求必归于无。若不知有非了手，而遽住于有，常行于有而不无；则亦堕在全有，何以得大定之归；饶经万劫而不死，终止于守尸鬼子，亦为尸解之类，归生死之途。想当初炼精补炁，费多少万苦千辛，始得修证千万劫不传之秘而得传，以至于小成；于此又安可惰忽其大成，而不求必成哉！我又嘱之曰：将有还无，一到真大定，而能常定于虚无之妙境，则超脱出神、飞升冲举之道尽之矣。此大周天之火，所以为成仙成佛了道之总要也！我又以化炁化神而总言之。前百日炼精化炁，必用有为之工，是从无而入有，即佛法中之所言“万法归一”之义也。后十月炼炁化神，必从有息至无息，是从有而入无；即佛入四禅灭尽定也，“一归于无”之说也。此仙佛二宗不易之秘法，不可少之要机也！冲虚子今为后来圣真重宣明之，以接引后圣，印证仙传；并免后学执有候、执无候之争立门户而妄疑之者。若此天机，自此句直至结尾句止，又皆冲虚子总结火候全经之言。再指炼神以后向上之秘机，以为后圣证。群仙直语，以前群仙皆有直言在世间，而人不能悟。固非全露。从古至今，言火候者甚众，并未全言，或一句二句而已。既不全，后人如何用？如何拟议？所以世之凡夫妄猜。唯有仙分者，自有仙人来度耳！然散之则各言其略，集之则序言其详。我见散见于群书之言，或略言採取烹炼之名，而</p>\n<p>不言其理；或略言採，而不言封固；或略言小周天，而不言大；或略言大周天，而不言小；或略言火候之名之理，而不分言小大所当用之时；其意若曰火候原属不轻传之秘，且说一件，令参得此一件，任他自己凑合成全去。咦！曾见几人能凑合得成全耶？而前劫后劫，或圣或凡种子，或真或伪学人，总难致一拟议。世逮于予，藉父清廉盛德之所庇，田园房店之可卖，受尽万苦千辛，逐日奔求师家，昼夜护师行道，历十九年而得全旨。追思前劫，或无所庇，或无可卖，未遇真师，受万苦，故不免又生于今劫。又悯后圣，或有出于贫穷，无父庇，无产卖，不能受万苦，焉能苦心奋志而求全？有奋志于窘迫中者，而志亦不能锐。所以予不可少此一集，详而次序之，留俟奋志后圣，而助其锐志耳。亦诉予苦志勤求者，以励后圣，当苦志勤求。后圣其自勉诸！完全火候，不必尽出予之齿颊。出于我口齿者，固是我之言；我既集而序之，即同是我言之出我口者。而此集出世，则为来劫万真火经根本，后来见者，自能从斯了悟，不复疑堕旁门。旁门者，有相之火。忍气着相，称为行火。知此仙火自然之定，则不复为强制之邪火。而胎神自就，阳神自出，劫运自超矣！习定、入定、定成，皆为胎神、出神、超劫之所必用，而必证果者；故于此历言所证。但于出神之后，炼神还虚，九年之妙，虽非敢言；而《中和集》曰：“九载三年常一定，便是神仙。”亦且言之矣。出阳神是初成神仙时，即母腹中初生的孩子一般，虽具人形，尚未至具足之人形，故喻神曰“婴儿幼小未成人”。“须藉爷娘养育恩”，乃喻为乳哺三年。古人所言“成就只一二年”是也。乳哺者，神炁已定，而又加定之意。加至于常常在定，而不必于出；便似乳而又乳，至于成大人一般。神既老成，若即行炼神还虚九年之工，则此即为九年内之炼数。若有救世之愿未完，且不炼九年，而权住世以救世。及欲超世而上升虚无，则必从九年炼神而还虚矣。实非世学所能轻悟轻用者，必俟了道之士，以虚无实相而用之。了道之士，是出定之神仙。唯得定，是得虚无之初基，而后可至虚无之极致处，方能悟此用此。第不可以一乘既得，遂妄称了当；不行末后还虚，此言或有小根小器之人，自以少得为足，不求还虚，而终不能还于虚矣。则于神通境界，毕竟住脚不得。神通在化神时，神也通灵而无碍，在还虚</p>\n<p>时，神更通灵而无碍。此言神通，是言初得之神通，尚未老成，故曰“住脚不得”。若住脚则止于神仙，犹有还虚而至天仙者。后来者共勉之！</p>\n<p>豫章三教逸民，邱长春真人门下第八派，邱真人门下宗派曰：“道德通玄静，真常守太清。一阳来复本，合教永圆明。”此二十字为派者，乃真人在镐京西龙门山掌教时所立之派，后人称为龙门派者便是。分符领节，遵上帝法旨，所受之符节，同佛祖之衣钵、宗主之帕。受道弟子冲虚子伍守阳，书于旌阳谶记、千二百四十二年之明时，万历乙卯春日云。集此答吉王太和之问，最初发笔作此起。</p>"}, {"id": "tx_zh5", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "炼己直论 第五", "content": "<h5>炼己直论 第五</h5>\n<p>冲虚子曰：诸圣真皆言，最要先炼己。谓炼者，即古所谓：苦行其当行之事，曰炼；凡证道所当行之事，或曰事易而生轻忽心，或曰事难而生厌畏心，如是不决烈则不能成金丹神丹。必当勤苦心力，密密行之，方曰苦炼。熟行其当行之事，曰炼；当行之事，如採取、烹炼、周天等，炼精、炼炁等。或行一时，而歇一时二时；或炼一日，而间一日二日；工夫间断，则生疏错乱，如何得熟？工夫必纯熟，愈觉易行而无错。必时时日日皆如初起一时，密密行之，方为熟炼。绝禁其不当为之事，亦曰炼；不当为者，即非道法而深有害于道法者。如炼精时，失于不当为之思虑；道以思虑为之障，而不可望成。炼炁时，息神不定而驰外向熟境，亦障道而忘进悟深入。当禁绝之，而纯心以为炼。精进励志而求其必成，亦曰炼；道成于志坚而进修不已。不精进则怠惰，不励志则虚谈。然志者，是人自己心所之向处。心欲长生，则必炼精，向长生之路而行，求必至长生而后已。心欲成神通，则必炼炁化神，向神通路上而行，求必得神通而后已。此正所以为炼也！割绝贪爱而不留余爱，亦曰炼；凡一切贪爱富贵、名利、妻子、珍宝异物、田宅，割舍尽绝，不留丝毫，方名万缘不挂。若有一件挂心，便入此一件，不入于道；故必割而又割，绝而又绝，事与念割绝尽，而后可称真炼。禁止旧习而不染习，亦曰炼。凡世间一切事之已学者、已知者、已能者、已行者，皆曰</p>\n<p>旧习。唯此习气在心，故能阻塞道气，必须顿然禁止，不许丝毫染污道心；所以古人云“把旧习般般打破”，如此而后，可称真炼。己者，即我静中之真性，动中之真意，为元神之别名也。己与性、意、元神，名虽四者，实只心中之一灵性也。其灵无极，而机用亦无极。出入无时，生灭不歇。或有时出，令眼、耳、鼻、舌、身、意，耽入于色、声、香、味、触、法之场而不知返；或有时出，而自起一色、声、香、味、触、法之境，牵连眼、耳、鼻、舌、身、意而苦劳其形。邱真人西游雪山，而作《西游记》，以明心曰心猿，按其最有神通。禅宗旨“猕猴跳六窗”，状其轮转不住，其劣性难驯，惟炼可制。而后来圣真当以上文六种炼法，总要先致诚意而炼之。然必先炼己者，李清庵云：“于平常一一境界打得破，不为物炫，不被缘牵，则末后境诱不得，情缘牵他不得。”《元始得道了身经》云：“声色不绝，精炁不全。万缘不绝，神不安宁。”以吾心之真性，本以主宰乎精炁者。宰之顺以生人，由此性；宰之逆以成圣，亦由此性。若不先为勤炼，熟境难忘，昔钟离云：“易动者片心，难伏者一意。”熟境者，心意所常行之事也。如淫事、淫色、淫声、淫念等。正与炼精者相反相害，一旦顿然要除，未必即能净尽。或可暂忘而不能久，或可少忘而不能全，焉能炼得精、炼得炁？必要先炼己者，为此故也。焉能超脱习染，而复炁胎神哉！习染之念未除，则习染之事必不能顿无。必要以习染之念与事俱脱净尽，而后遇境不生烟火；己方纯，炁可复归，神可静定，而成胎矣。当未炼之先，未炼己之先也。每出万般变幻，而为日用之神，平日淫、杀、盗、妄心、贪心、善心、恶心、欺心等，皆是变幻。犹且任精任炁外驰不住。任炁动而化精，任精动而淫媾，而不摄之令归根复命，由己不炼而不摄也。古云“未炼还丹先炼性，未修大药先修心”，盖为此而言也。昔马自然真人云：“炼药先须学炼心，对境无心是大还。”《中和集》云：“念虑绝则阴消，幻缘空则魔灭。”张虚靖真人云：“欲得身中神不出，莫向灵台留一物。”皆同此。能炼之者，因耳逐声而用听，则炼之于不闻；目逐色而用观，则炼之于不见；神逐感而用交，则炼之于不思；此三者，皆真实炼法，正释上文割绝其所爱之说。平常日用，必须如是先炼，</p>\n<p>则己念伏降，而性真纯静。谭长真《水云集》云：“丝头莫向灵台挂，内结灵丹管得仙。”重阳真人《全真集》云：“湛然不动，昏昏默默，无丝毫念想，此定心由降而得。”及至炼炁炼神，则不被境物颠倒所诱。已有定力，不从外境所诱。採药而药即得，筑基而基即成，结胎而胎必脱。方名复性之初，而炼己之功得矣！有不得其先炼者，当药生之时，不辨其为时；百日之初，炼精时，贵有药生。药生者，元精之生也。辨元精生时，而用採法。若淫精犯于淫念，则邪法不可採者。淫念未炼净者，何以能辨元精？炼药之候，不终其为候；炼药有周天之候，或惊恐、或闻、或思、或昏沉，以致火候不终者有之。药将得，或以己念而复失；元精还补，元精将满，亦或有淫念未炼净，乃复失为淫精者有之，故古人有走丹之喻者，即此。神将出，或以己念而复堕。心逐见闻觉知于外驰，则是尚未得大定而有出入。背却《胎息经》所谓“不出不入，自然常住”之旨。出驰着境，同儒之“物交物”，亦同禅人之说“猕猴跳六窗”，内猴与外猴相见者。如是如何能入定以完胎？欲其炁之清真，己不纯，必不得其清真；採取先天炁之时，唯炼己纯者，能辨清真，则不失其清真。若炼己不纯，一着思虑习气，则失清真矣。欲其神之静定，己未炼，必不得其静定。神能入定，则得静；入得三分五分定，便得三分五分静；十分定，则得十分静；常定，则常静；神静定，则炁亦皆静定；炁归神为一矣，即是炁化神，而成胎仙矣。不炼己者，必不能到此。或遇可喜而即喜；或遇可惧而即惧；或遇可疑而即疑；或遇可信而即信；皆未炼己之纯也。此四者，皆外来之天魔也。遇而信之，则着其所魔矣。虽由此前，未预为炼己之过；倘于此遇时即炼己，遇如不有所遇，魔即不如我何。邱真人所以“当过一番魔，长福力一番。”是也。倘于初一遇，便当不过，及道愈高，魔愈多，如何当得过？吉王太和曾问：魔有种种之多，却如何知得当过？冲虚子曰：最易，不怕他有万样奇怪，惟我将神炁俱入定中，任他多种魔来，绝不能与我相遇矣！又有内本无而妄起一想念，谓之内魔障。或有生此而不知灭，不能即灭者；或有灭其所生，而复生复灭者，皆障道。耽迟大周天之候也。必炼己者，而后能</p>\n<p>生灭灭已。生而即灭，灭而至于无可灭。又有外本无，而偶有一见一闻，谓之不宜有之外魔障。上文喜、惧、疑、信四种，俱属此见闻之内。或用见用闻，与之应对，而不即远离者，亦障道。一有应对，则着魔，为魔所转矣；故障道。必先炼己者，而后能无见无闻。能炼己者，即具不睹不闻之本体，即有不睹不闻之实效。此己之所以不可不先炼也。昔有一人，即山东姓张者。坐中，见承尘板上一人跳下，立于前，没入于地；坐中者，在圜中坐时也。见者，心不定于神室而外驰，偶有此一见也。若心在定，则亦何以见此？复从地涌出，立于前；见其神通变化，而认为身外身，误信常人之言曰：神仙出了阳神，便身外有身。然本性与虚空同体，本无形身。若起一念要显有身，便能有身；不可以见外为我身。不识为身外之天魔，吉王太和问：彼既不识，今老师及昔二真是何法识得？冲虚子曰：我本性在定，得到定力足，而后有可出定之景到，由我自性升迁于天门；念起而出，犹是虚空无体，乃六通为用，无所障碍。若非我念所出，而有见者，便是外来之天魔、邪魔。若出神之景未到，则神通未足，不能变化，虽欲显身而不能有身；岂可以无我念之身，而认为我哉！神通足者，世尊谓之四神足。即为魔所诱动。出圜而远叩邱祖，祖曰：“见者不可认。”不宜出而妄出，虽有妄见，斩退犹恐不速，何敢认为我？不宜出者，未成定之先，求其入定而不可得，又何敢妄出而终于不入不成耶？此所以不可认也。乃不知信。由于无仙师真传，故不能以信法语。又谒郝祖，郝与邱本同师度，则同道、同知识矣。既不信邱，何必见郝？祖曰：“邱哥说者便是。”惜乎犹不知信，不复更居圜中，而废前功矣。此亦己未炼纯之证也！昔邱祖坐于崖下，崖石坠压折肋，知是天魔，祖不为之动。如是当过五番，不动一念，直证阳神出现。见山河大地，如在掌中。昔世尊坐于菩提树下，魔王波旬领百万魔众，以兵戈恐佛而不动，以魔女淫事诱佛而不动，坐至金刚牢固，自言我终不起离于此座。昔费长房师事壶公，随壶公入山修道，壶公以朽索悬大石于座之上，又令巨蛇啮索将断，而费全不惊不动者皆是。此得炼己性定之显案也！并书以励同志。</p>"}, {"id": "tx_zh6", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "筑基直论 第六", "content": "<h5>筑基直论 第六</h5>\n<p>冲虚子曰：修仙而始曰筑基。筑者，渐渐积累增益之义。基者，修炼阳神之本根，安神定息之处所也。基必先筑者，盖谓阳神，即元神之所成就纯全而显灵者，常依精炁而为用。神原属阴，精炁原属阳。依真阳精炁，则为阳神，成就纯阳；不依精炁，则不能成阳神，止为阴神而已。精炁旺，则神亦旺，而法力大；精炁耗，则神亦耗而弱。此理之所以如是也。欲得元神长住而长灵觉，亦必精炁长住而长为有基也。自基未筑之先，元神逐境外驰，如见色境在外，则必起淫念。则元炁散、元精败，基愈坏矣，所以不足为基。且精之逐于交感，年深岁久，恋恋爱根，一旦欲令不漏，而且还炁，得乎？此无基也。炁之散于呼吸，息出息入，勤勤无已，一旦欲令不息，而且化神，得乎？此无基也。神之扰于思虑，时递刻迁，茫茫接物，一旦欲令长定，而且还虚，得乎？此无基也。此三段是申明上文基已坏者，而不足以为基之说。古人皆言“以精炼精、以炁炼炁、以神炼神”者，正欲为此用也。是以必用精炁神三宝合炼，精补其精，炁补其炁，神补其神，筑而成基。唯能合一，则成基；不能合一，则精炁神不能长旺，而基即不可成。及基筑成，精则固矣，炁则还矣，永为坚固不坏之基，而长生不死。《玄网论》云：“道能自无而生有，岂不能使有同于无乎？有同于无，则有不灭矣。”证地仙之果矣！为出欲界升色界之基者，以此；为十月神定之基者，以此。而九十月不昏睡者，有此基也；十月不饮食不寒暑者，有此基也；十月神不外驰而得入大定者，有此基也。所以炼炁而炁即定，历百千万亿劫而绝无呼吸一息；炼神而神即虚，历百千万亿劫而不昏迷一睡，亦不散乱一驰。与天地同其寿量者，基此；与圣真齐其神通灵应者，基此。此所谓阳神之有基者。基成，由于阳精无漏而名漏尽通。不然，无基者即无漏尽通矣；虽</p>\n<p>证入神通，不过阴灵之性，五通之果，五通者，是阴神之神通也。若阳神，则有六通，多漏尽通也。六通者：天眼通、天耳通、神境通、宿命通、他心通、漏尽通。此一通为阳神之所多，余五通阴神同。宅舍难固。阳精无漏，则身长生不死，为金刚坚固宅舍，可永劫不坏。若有漏之躯，有必死之道，身不坚固也。不免死于此，而生于彼。若有秘授，躲横生而择竖形者，犹且易姓改名，虚负今生矣；阴神何益哉？阳神之基，可不亟筑之哉？可不急究之哉？世有以淫媾败基者，反诳人曰“採补筑基”，欺骗愚夫，共为淫乐。一遇淫媾，而精无不损者，炁无不耗者，神无不荡者，基愈灭矣。直误至于死，而后知彼淫邪术，假之悖正道，可不戒之哉？此篇正文重重自相申解已详，不必再生注意。</p>"}, {"id": "tx_zh7", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "炼药直论 第七", "content": "<h5>炼药直论 第七</h5>\n<p>冲虚子曰：仙道以精炁神三元为正药。元精、元炁、元神曰三元，皆先天也。以炼三合一，喻名炼药。昔谷神子云：“道以至神为本，以至精为药，以冲和为用，以无为为治，长生久视之道成矣！”若不如此，即非金液大还丹之法。其理最精微，其法最秘密。昔钟离曾十试于吕祖；邱祖受百难于重阳；我伍子切问二十载于曹还阳，逢师于万历癸巳年三月，受全道于壬子年三月间。以癸、壬计之，二十年也。我当初每自恨福力之薄，不蒙师一速度；今而后始知侍教久者入道精，不然何以能高出万世耶？予又按：白玉蟾云“十年侍真驭。”白又云“说刀圭于癸酉七月之夕，尽吐露于乙亥春雨之天。”又当知天机非邂逅可谈。方才有得。是以世之茫然学道者，及偶然漫谈者，皆不知何者是真药，而何法为真炼，徒然空说向自己身心中而求，实不知有至静之真时真机也！夫至静之真时者，是此身心静极，即所喻亥之末、子之初也。阴静极必有阳动，静属阴，动属阳，阳极则阴静，阴极则阳动。则炁固有循环真机，自然复动。此正先天无形元炁，将动而为先天无形之元精时也。即此先天无形之精，便名药物。既有药炁生机，必有先天得药之觉。即“时</p>\n<p>至神知”之说，亦即我“神炁同动”之说也。即以觉灵为炼药之主，以冲和为炼药之用，觉灵者，妙觉灵心也。冲和者，烹炼薰蒸之和炁也。此正三家之初相见也，亦三华之所聚者。则用起火之候以採之。因有药生而起火，即活用子时起火，曰活子时。药生与火生同时，故以火之活子时，而称药亦曰活子时。达摩云“二候採牟尼”，言採药用二候也。“四候有妙用”，言升、降、沐浴用四候也。同此。须辨药之老嫩。採之嫩则炁微而不灵，不结丹也。人人都说药生要辨老嫩，若嫩则炁微，配合之，则无半斤八两之炁，何以成一斤？故不灵。採之老则炁散而不灵，亦不结丹也。老者，只是过于当採之时。当採而未採，则炁以久而虚散，皆由心生怠惰而致此。炁既散，则力亦微，配合不均，不能成丹，故亦曰不灵。得药之真，不老不嫩，如“九二利见”者，曰药真。非初九之“勿用”，亦非上九之“有悔”。既採归炉，则用行火之候以炼之。行小周天之火也。药未归炉而先行火，昔吕真人戒之云：“无药而先行胎息，强留在腹，或积冷气而成病。”又，顾与弢庠友问：既知採药，何故又不归炉？冲虚曰：传正道，知真採，故可必得归炉。又要行“火合于候”之妙，方得药归炉。若火生早了，是名火小不及，不名冲和。冲和者，和而冲也。古人有喻者曰“如浴之方起”，而暖气融融然。火既小而不及，邱真人已言曰“则金精不飞”是也，焉能得药归炉？悟道真修者，必先从我此答，精思之则知。直至末后，皆是如此。药竟外耗而非为我有，药尚未入鼎中而妄行火，即所谓“鼎内若无真种子，犹将水火煮空铛”之说。不成大药；药已归炉，而未即行火，则真炁断而不续，亦不成大药。药在外，由火以採之而归炉，亦由火烹炼之，方在炉中成变化。已得药归炉，火断而不行，则真炁亦断而不住。及再行火，虽周一天，终与前不续，药亦不续，如何能成大药？即《参同契注》所云“外火虽动而行，内符不应，则天魂地魄不相交接。”是也。若肫肫然加意于火，则偏着执于火，而药消耗。执着用心于火，则着有相而急躁，近于外道之存想有为，非自然之天机妙用。若悠悠然不知有火，则迷散，行火之时，若心不诚，则不灵。或昏迷十二之时；或迷失刻漏之数；或忘沐浴之候；或不知以何数周于天；或</p>\n<p>周已而犹不止，皆是。失于火，而药亦消。火不能留药，焉得不消？即神不留炁之喻。皆不成大药。以上皆言孤阴寡阳，偏有偏无之危险也。若火间断，而工不常，虽药将成而复坏。火所以炼药，古云：“火药一处居。”行火之法，愈久而愈密，愈密而愈精，斯则必成大药，必得服食。或有时神逐见闻淫念驰于外而着魔，则神离火，火离药，工不常矣，药如何得成？虽将成，犹有退散之危险。若久执行火，而不知止足，虽药已成而亦坏。火足矣，即成大药，因药成而言足也。药既成，则不必用火，安得不止？药已成者，成之而生为服食之大药。于此即採，而药不复坏为后天有形之精。不止火不採，则大药必随生机而将妄行：欲归之圣路，无奈不止火不採，而无由以受；欲归之凡路，竟趋为后天有形之精不难矣。后圣当知此为至要至秘，所当防之危险也！皆不得服食。必火足而药始成；药已成，而必知止候；方有大药可採，方可服食；不然必不得药成服食。后世圣真修此，必使神气相均相合，火药适宜；以呼吸之气，即火也。乘真炁为动静；即药也。以真炁之动静，定真息之根基；真炁归静于根，则真息亦定于根。二炁合一于根，以为胎神之基也。则火药既不着于一偏，又无强执纵失之患；如此而炼，方得小周天之妙理，方成长生之大药，始名外金丹成也。马丹阳云：“因烧丹药火炎下，故使黄河水逆流。”《玉芝书》云：“玄黄若也无交媾，怎得阳从坎下飞？”是也。祖祖真真服食飞昇之至宝，乃最上上之玄机，最宜参悟而精修者也。此论备陈炼药时之危险，令后圣知防虑于此，不致当面错过而不知也。神仙所言“金丹服食”者，是肾中所得金液之炁，配元神合炼所成；服食之，则能神通变化。若方外之士言服食者，不过妄以金石草木诳人曰炼服食；断不可为，以误大志。纵服食之，或有疾宜于金石药者，而偶致愈；或无疾而中毒成大患；必不能超出三界而显神通也。得此真药服食，自可进修行大周天之火候，以炼炁化神。炼炁而息定，化神而胎圆，阳神升迁于天门而出现，神仙之事得矣！中关十月之事完矣！其后面壁还虚，九年一定，以神仙而顿悟性于无极，形神俱妙，总炼成一个不坏清虚圣身；皆由炼药合仙机，而得成丹</p>\n<p>成神者之所至也。故凡大修，行上关大成事，必如此则毕矣。于此毕法中，始于百日炼药而成服食者，无量寿之地仙也；地仙者，地上所行之仙，身形重浊未离，故不能离于地而升虚无之天也。人仙虽长生，亦同于地仙，重形尚在，故亦不能离人与地也。中而十月炼成脱胎出阳神之果者，超出阴阳之神仙也；神仙者，离重浊之形，以无形之神变化。或有或无，皆由一神之妙用，故曰神仙。终而九年面壁，炼成还虚之果者，超出尽天地劫运之天仙也！初得神仙，乃得大定而出定者。但得定由于守中，而出定则居泥丸。故世尊已入灭而亦入于泥洹是也。至此后还虚，则又入定于泥丸。古人云“性在泥丸，命在脐”，盖言：了修命之事在脐，了修性之事在泥丸也。泥丸之定，则非从前者比：九年一定者，特以始入之时而略之，或百年千年万年，一劫百千万劫，皆可入为一定；此正天仙、佛之超劫运者。有仙缘者，遇此《天仙正理直论》，其宜斋心以识之。</p>"}, {"id": "tx_zh8", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "伏气直论 第八", "content": "<h5>伏气直论 第八</h5>\n<p>冲虚子曰：人之生死大关，只一气也，有气则生，无气则死。此首以人之所共知者言，令人易明生死。圣凡之分，只一伏气也。气能伏定则圣，不能伏定则凡。此首以人之皆能者言，令人易学于入圣超凡也。而是伏义，而者，转文助语。乃为藏伏而亦为降伏。藏伏者，深藏归伏于元炁之根。降伏者，管摄严密不许驰于外。此二者亦有防危虑险之意。唯能伏气，则精可返，而复还为先天之炁；神可凝，而复还为先天之神。所以炼精者，欲以调此气而伏也。炼精小周天，调其息而伏，为其不能顿伏，故用渐法调而伏，达摩祖师《显宗论》亦言似此意。所以炼神者，欲以息此气而伏也。炼神大周天，胎息其息而伏，为其不能顿息于无，故亦用渐法。胎息其息，似有而无，乃至于无有无无，而伏于寂静。始终向上之工，只为伏此一口气耳！所以必伏而始终皆伏者，是何故？盖当未生此身之时，就二炁初结之基在丹田，隐然藏伏为炁根。久伏于静，</p>\n<p>则动而生呼吸，是知由静伏而后生呼吸之气以成人道者，曰顺生也。而是逆修曰成仙者，当必由呼吸之气而返还藏伏为静，此气伏、伏气之逆顺理也。及呼吸出于口鼻，而专为口鼻之用；呼吸至于口鼻，则落生死之途矣。离口鼻则离生死。真炁发散于外，遂至滞损此气，则为病；耗竭此气，则为死。盖不知伏为所以复之故，伏者，欲将呼吸还复归于炁穴，而为不呼不吸之故也。必此气伏于炁穴，而后元炁能归，元神能凝，三者皆伏于炁穴也。而亦不知行其所以伏，行所以伏者，言有至妙至秘之天机。呼吸合于天然者为真，元炁得合当生当採之时者为真，元神合虚极静笃者为真。三者皆真，而后得所伏之理，行之而必成，不然则亦世之外道而已。安保其能久生，而超生死于浩浩劫之外耶？三者不真，则非所以伏之理，故不能超过浩浩劫之运。有等妄言伏气者，而不知伏气真机，真机者，有元炁元神，而呼吸正合天然自在，方为真。终日把息调，而口鼻之呼吸尤甚；调息者，调其内用之玄机，如“橐天龠地徐停息”之说。世之愚人，不闻天机，只把口鼻数调，如隔靴搔痒，焉能调得到无息？痴心执闭息，而腹中之逼塞难容。闭息者，《灵宝毕法》书亦言之，是言不通其息出入之门也。虽无门，却有安顿自然之妙理，非强制之为闭也。强制则不真，故无成。真禅家与真仙道略同；若痴禅人之假禅，亦与痴道人之假道同；学者不可不察。禅宗人有一等假禅者，曰吞声忍气，曰气急杀人，皆言忍住气而不出人，此是病，非禅也。强制则念是动的，不是静，何以为禅？“禅”字解作“静”字。若是自然真静，方为真禅。哀哉！此妄人之为也，安见其气之伏而静定也？昔邱祖云：“息有一毫之不定，命非己有。”息得呼吸绝，则生死之路绝。息有呼吸不定，故不免生死。而伏气之要，正修士实用，所以证道之工也。但此天机之妙，绝与世法不同。古人托名调息者，世人之息，一呼一吸均平，无用调矣。仙道托名调息者，非世法之用，乃调其有而至无，无而至有。为其以神驭炁，行之必住，住之必行，在乎行住之间而调之也。随顺往来之理，而不执滞往来之形，欲合乎似无之呼吸也；当有往来，不强使之无，而唯随顺之，似“心息相依”之</p>\n<p>说。亦不强执，害其自然，而为勉强。托名闭息者，世之言闭，是勉强，不合自然。仙家言闭，只托言闭之名，而非用彼强闭之实，故范德昭曰：“内不出，外不入，非闭气也。”我故曰托名者，略似闭气而实非闭气也。而内则空空，如太虚无物，空如太虚，是真虚无，则真息便可归于真无。真禅理亦似之。若上文所言，内不空而逼塞者，是强闭者，外道邪法旁门之类皆然。欲合于无极中之静伏也；无极者，无一炁之始。及后，太极则有一炁之始，一判则为天地。今言无极，乃言天地及一炁俱未有之先，即为父母尚未有之先，正是虚极静笃景象。妙悟必至如此，为真静伏。总之，为化炁化神之秘机。古人云“长生须伏气”，故自周天而历时、日、年、劫，惟伏此气。言有一小周天之所伏，有一大周天之所伏，一日之所伏，一年一劫之所伏。或暂或久，而能成其一伏者，真有道之士也。此气大定，则不见其从何而伏始，亦不见其从何而伏终。无始无终，亘万古而无一息，与神俱虚俱静，斯谓之形神俱妙之境也！世尊能以一法说八千劫而后已，能以一定坐八万四千劫而后出定，是其形神俱妙，与仙同者。唯闻天仙正道者，方能识得此理；唯有三宝全功者，三宝者，元神、元炁、元精。若一宝非元，则不为宝。属于后天者无用，亦不得为全功。方能行及此工。此工者，即上“内如太虚，证入无极静定”者言。若三宝会合，炼成化炁，而后可行大定常定工夫。若未化炁，则亦无用此为。有大志圣真，请究之，而实悟之。</p>"}, {"id": "tx_zh9", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "胎息直论 第九", "content": "<h5>胎息直论 第九</h5>\n<p>冲虚子曰：古《胎息经》云：“胎从伏气中结，炁从有胎中息。”斯言为过去未来诸神仙天仙之要法也。男子身中本无胎，而欲结一胎，必要有因，则因伏气于丹田炁穴中而结胎；是“胎从伏气中而结”也。元炁静而必动，欲得元炁不动，必要有藏伏。因有胎即藏伏之所，乃息而不动；是“炁从有胎中而息”也。胎因愈伏气而愈长，气因愈长胎而愈伏，共修成一个圆满胎神，斯所以为神仙天仙之要法。非此，抑将何以成之？然胎息与伏气</p>\n<p>本是一事，何分两论？只为怀胎养神，必用胎息而后成胎，而神住胎；古人皆以胎息言之，今亦详言于炼炁化神时也。伏气之说，为伏气而得精还化炁，炼药以得大药。古人只言伏气，今亦从之言伏气。虽两言之，中则互明其理，令人知两言之妙，而不妄疑妄执其为两。予愿再详释而直论之。夫人身初时，只二炁合一，为虚空中之炁而已，无胎也，亦无息也。此言无胎无息，起下文返还成仙之所证。因母呼吸而长为胎，因胎而长为息。修仙者，亦必因呼吸而长为胎，因胎而长为胎息。及至胎全，妙在随母呼吸而为呼吸，所以终日呼吸而不逼闷。此缘不由口鼻呼吸，只脐相通，故能似无气息一般。此正真胎息景也！古人谓“内炁不出，外气不入，非闭气也”之说，正言由脐相通者。离胎而息即断，在胎中，则我之息由母脐中所生，故我息亦在脐而口鼻不可呼吸，离胎则口鼻开窍，可以呼吸，顺而易矣！当此时，且不知胎息，安得复能胎息？无母脐与子脐相通，不得不向自身口鼻起呼吸；即与胎中呼吸同，而暂异其窍耳。逆修返还之理，安得不以我今呼吸之息，而返还为胎中息耶？凡返还呼吸时，以口鼻呼吸之气，而复归于胎息之所。即丹田之所。许旌阳云：“脐间元炁结成丹，谷神不死因胎息，长生门户要绵绵。”《元始得道了身经》云：“中宫胎息为黄婆。”抱朴子曰：“得胎息者，能不以鼻口呼吸，如在胞胎之中，则道成矣！以鸿毛着鼻口上，而毛不动为候也。”如处胎息之时，渐渐炼至胎息亦真无。真无者，灭息尽之义也。谓胎中之息，亦真无之。此正禅宗人所谓“万法归一，一归无”之说。方是未生时，而返还于未有息、未有胎以前之境界，不落生死之途者矣。凡人有呼吸，则有生死；无了呼吸，即无生死。所以得如此者，亦非蓦然无所凭依配合，便以呼吸归中而可胎息者。呼吸之气最难制伏，必有元炁相依，方可相定而成胎息。然胎息何以知其成也？以呼吸归于胎息，则口鼻无呼吸而成胎息，及其真成也，终不复至口鼻为呼吸。真禅定者，亦似此。若凡夫外道，不知元炁者为何，单以呼吸归于中，而妄曰“入定胎息”。其息不能定住于胎所，虽忍气而气无所容，乃曰“气急杀人”；而终不能强忍，口鼻之气更呼</p>\n<p>吸浩浩；皆由悖却世尊所谓“无生法忍”者之所为也。世之假道人、假禅人皆如此。此亦后学圣真之所当辨，而自防危险者也！所谓孤阴不成者，此亦其一也。呼吸之气，乃后天有形之阴物，故亦如此言之。必要有先天炁机发动之时，又有元灵独觉，及呼吸相依、三宝会合、已先炼成大药者；而转归黄庭结胎之所；于此之时，此时者，是当此结胎之时。因文上句皆言先所化炁，而至此始言胎息之意也。此正申明必要炼精化炁，以炁助胎，以神主胎，以呼吸结胎，方成真胎息。而后以胎息养胎神，得神炁乘胎息之气，在中一定；神炁与胎息相乘，方是有配合的修真胎息之工；所以能成真胎息，得真定。若无真炁，便不是金刚不坏之身；坐中只是昏沉瞌睡，如何能长觉长明，以长驭气入大定成胎乎？有间断，即非胎息。即是结胎之始，正《入药镜》所谓“初结胎，看本命”而得者。本命者，二炁也。元炁为生身命之本，呼吸气为生身命之具。而结胎之初，必要本命二炁，随神之号令，同凝于中，而为真胎者也。虽似有微微呼吸，若在脐轮；而若不在脐轮，在虚空：正《度人经》所谓“元始悬一粒宝珠，去地五丈”，如世尊之前，“地涌之宝塔在虚空中”等语，皆是也。皆用运旋真息，以渐至成胎，顿然绝离口鼻，不存呼吸，灭却有作，恰然处胎相似。而胎中之息，始虽似有，而终绝无；即是真胎息，所以成阳神者。若无大药真炁服食，若非三家相见，必不能胎真息，而神真纯阳者也。如是而久久无间断，绵绵密密，无时无刻，而不是在胎中无息之景。直证阳神大定，绝无动静起灭，即是胎圆；乃返还到如母胎初结，一炁未成我，而未分精炁与神之时，正《入药镜》所谓“终脱胎，看四正”而得者。看四正者，验四正工夫之有无也。有，则胎尚未圆，以其有，乃养胎之工也。无，则曰灭尽定，而阳神成就矣。胎息还神，固曰毕矣，胎事毕，灭尽定。佛亦灭尽定，入涅槃；故其《经》云：若于佛事不周，不入涅槃。佛事周讫，方入涅槃。毕其十月中关之事，神仙之证也！犹有向上田炼神还虚，而证天仙者，在所必当知！故迁神于上田，而出天门以阳神之显见者，倏出而倏入。何也？当前之十月之内，而或有出</p>\n<p>者，是不宜出之出也；由六根之为魔而妄出。阳纯则无魔，阴尽则无魔，阴将尽而未尽，甚为魔者，要除阴尽，是要除魔尽也。妄出则神走而着魔境，而息亦走，着于口鼻；必急入，则依于息而归胎。此一段，又再详指示人，以十月内之所当防此危险者。此时之出，是当出而出也，昔蓝养素胎成，当出而不知出，故刘海蟾寄书与之，指示所出之法。故起一出念，而出阳神于天门。天门者，《钟吕传道集》所言，指顶门也。古人于此赞之曰“身外有身”是也。若出之久，恐神迷失而错念；古云：“十步百步，切宜照顾。”故即入上田，而依于虚无之定所。以神既出胎，喻同人生之幼小，须三年乳哺者，以定为乳哺也。又言“九载三年一定”者，言出定之初，时而入定，以完成还虚之天仙也。证到至虚至无，即证天仙矣。然是定也，入定时多，而出定时少，又宜出之勤而入之速也！我故曰：出定之初，即为入定之始也。虽天仙已证，亦无不定之时也。故世尊亦曰：“虚空界尽，我此修行，终无有尽。”正如此也！至于终天地之后，超过劫运，亦无不定之时也。此犹仙佛以上，无仙无佛之妙境，而天仙佛之至者也！后来圣真，共知之，共证之。</p>\n<p>此书稿成于天启壬戌岁，实欲藏之为门下学者便心目，不意被人盗去。但儒者窃取仙书，爱慕之心胜，可怪又可惜也！由骆友而失，骆故想象而梓，不无疏略。今崇祯己卯秋，查旧稿，加注。贤道友复梓之，以广度人，流行于天地之终，皆所愿也！故附识之。</p>\n<h6>直论毕</h6>"}, {"id": "tx_qiyou", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "直论起由", "content": "<h5>直论起由</h5>\n<p>予作《天仙正理直论》，仅仅九章，完全画出一个天仙样子，令有缘有志者见为顿悟。有志者，不遇此书亦是无缘于道；遇此而不参悟，亦是无缘于道。又，或有遇之而无真学之心，唯图诈伪欺世者，亦当改恶从善，而归正道。非敢曰轻泄天机，妄拟无罪，只为度尽众生，为自度计</p>\n<p>者。于是冒干天谴而直论。亦缘我老祖师张静虚真人得道后曰：“今日四大部洲，全无半个人儿知道，今当广开教门。”奉此仙旨故也！张真人法派名静虚，常携虎皮为座，故当时皆称虎皮张。初与三友寻访仙道，夜半见白毫光于西而冲天，次日西行，夜宿又见，日又趋之。三友去，而独行，独见得光处在蜀之碧阳洞也。入见仙师，而求度甚切。师遂授之道，命之修数年成而始命出。曰：“今日四大部洲，绝无半个人儿知道，你与我广开教门。”张翁遂行。（按：四大部洲者，东胜神洲、西牛贺洲、南赡部洲、北衢庐洲。佛经所说者是也。）张仙翁遂出西域，转北夷，还中国，见二大洲已无人矣。实起度人之念，止度得李虚庵一人而已。历十五年间，再传而递言于予。十五年间者，张真人于万历己卯年度李虚庵。至壬午复至李家，助李银为行道之资。李真人于万历丁亥，受曹还阳请，至其家。曹与三友各具贽六金助道，不足。戊子，曹三友又助师三十金，而修成证果矣！曹真人于万历癸巳，与伍子遇。甲午年夏五月，度伍子。计之己卯至癸巳，十五年也。至壬子又十九年，曹复度伍子仙佛合宗全旨，以出三界之上者。并传以助道之方，嘱之曰：“此《元史》所载邱真人助国之方也，唯默记之。倘护道要用则用之，否则闲置之可也，勿为世间作孽，取大罪也！”予之十九年中，苦志苦行，或亦少仿佛于长春祖之苦志者。得全大道，敢不如命戒之哉？予初若为骇闻，骇世之学道者多，岂真无半个人儿知道？而久之，真见同世斯人，不同闻斯道。得师度之后，遍考仙圣之书，圣圣同此一道也！同此修成正果也！差毫发尚曰不成，岂可有不同者乎？每考问于全真侣，不过只知御女採战，及却一病小工，为诡求衣食之计者，与仙道之保精、保炁、胎神之理者不同闻；考问于禅宗人，不过曰当下便空，以降魔转劫，仅为死后生人道之说，与佛法空而不空之真空，超劫之妙法不同闻；又考在家俗士之学道者，求假做黄白成富贵，求房术久战遂淫乐，并无学道之实而志不同；又考在家俗士之学佛者，妄自尊而诳人曰，曾参学“手抱非仞利，身触悖天王”，口称着当下就了，只就了得一席淫媾，何曾闻佛法可了，而闻实不同；世界劫坏如此，安容得不直论而一救之耶？又安容不直论留为后世圣真作正知见耶？故作此以指引后来。凡我邱祖门下符节正传弟子，得师口诀：凡药</p>\n<p>生内景，时至则神知为内景，药炁驰外，则外别有景。採药真工，即达摩祖师所谓“二候採牟尼”者。行火工，小周天之候，即达摩祖所谓“四候有妙用”。止火景，详后《仙佛合宗语录》中。採大药工，自古圣真所不轻传。此以前得百日炼精化炁之真法，行得全功，只成精满炁足之凡夫。知此而用，得大药方得长生。此先圣所以必俟百日功成者而后言之。得大药景，有六种震动之景也：丹田火炽、两肾汤煎、眼吐金光、耳后风生、脑后鹫鸣、身涌鼻搐。六根因其灭识，皆有景验。三关工，即名“五龙捧圣”者，从此超凡以入圣，乃圣圣不轻传之秘法天机。世间之所不知不闻者，必俟百日功成者而后言之。服食工，度过鹊桥而下重楼，喻曰服食。非如饮食样之食。守中理，即大周天之初。古云：“守似有，却如无。”不有不无，故喻之曰守中。又闻胎息本在脐，而若不着于脐；养神本养中田之神，又若不离于下田；总若合二田成一虚空境界，故亦喻之曰守中。正秘密天机有不得显言者。出神景，出神收神法，炼神还虚理，此守、出、收、炼、还等五者，皆详后《仙佛合宗语录》中。历历秘授。历授者，次第尽传。上文十二句之秘法，乃正传之所必有。而后圣真修之所当必受者。闻人世所不知，闻者，言后圣得遇圣师而有所闻者。人世者，彼后圣同世之人也；彼人所知，皆世法中之旁邪小术。唯圣所闻，皆彼不知。正与《直论》中十二句秘法同。见凡书所不载。见凡世前书已载者，皆古圣大略之言也。不载者，精切秘密天机。旧不载于书，而今得闻于圣师，正与《直论》十二句皆同；则师言可笃信奉行，《直论》可凭稽考。要知非遇仙者，无真闻见；非遇仙者，不能措一言为直论。当下工修炼时，更以《直论》相印师言。古圣之书，每言一句，又秘却二句三句，何以得全印证？欲求全证，又要搜索多书，此贫者之愈难。唯此《直论》兼注，又后有《仙佛合宗语录》及门仁贤问答之要，以详《直论》注脚，尽露全旨；则后圣得此一书，足以全印，可无余恨矣！得了然无疑无碍，直证天仙，唯我作书助道之一愿也！后来圣真，未及得正传者，尤当从斯入悟。究其逐节工景违合，凡有所闻，即征诸此书，合则正，违则邪。作人天眼目者，唯此书耳。心则不为妖人邪说所惑矣！凡一切邪说旁门，皆与</p>\n<p>此书相违悖。如有真志精修，不参此论，是自绝于仙佛正道者也！窃谈此论而行邪行以诳世者，如昔一光棍，专以房术欺骗人者，乃借言曰“铅汞不在身中取”，已明明说破。愚按：棍贼此言，谓铅汞不在自身，是女人身上取的。铅汞者，喻阴阳。岂有“阴阳二者俱在女身取”之言，而可惑人取信乎？犹且言之。咦！天津王章共诛之！此书本代天仙救世，代佛破邪，尽是表明天上梵德至道之言，有天目共视，天耳共听，天律共护。若有邪人假借正言，行彼邪说，天有霹雳，伐其性命，王有典刑，灭其身形。并揭禁誓书末，以为诵书者知诫。</p>"}, {"id": "tx_baba", "bookId": "tianxian", "bookTitle": "天仙正理直论", "title": "后跋", "content": "<h5>后 跋</h5>\n<p>冲虚子跋云：道为天仙之秘机，天仙之道，唯天仙知之行之，凡夫去天之远，何以得遇？唯不可遇，虽曰不秘，而亦是秘。若有得遇，知其道者，必要体天仙之心，行天仙之德，而后可成天仙之道。凡夫之罕见。为今之凡夫者，前虽有善而或有小功，不足以得道，故难遇。若能从今起念学道时，全具善心，力行善事，绝其从前间有不善者，则道之罕见者，犹可望见也。或百劫百年一传于世，如唐开元时之纯阳翁，始度王重阳于宋徽、钦时；如六祖惠能止衣钵不传，而后竟无传法之七祖者。或片言数语密度于人。如钟吕二仙，度燕国宰相刘海蟾，以卵垒为山，而不崩堕，刘曰：“危哉！”钟吕曰：“汝宰相之位更危于此！”刘弃相从之而仙去。如虎皮座张真人，以嘉靖帝强请之不起，罪邳。州守请，屡及三年而后至京，延及徂落，而不复命。还至六安州，召庐江县李虚庵而度之。令三诵三背其言，三日而别，李竟成真，县及邻封皆称肉身菩萨。然张祖不肯见帝而度，乃召李而度之，此亦张祖密度之案也。如佛欲度迦叶，分恒河水为两断，而佛行其中之无水处，叶以舟救佛，佛从舟底穿入，而舟底无孔。叶犹曰：“幻也。”佛曰：“汝未成不生死阿罗汉，何能如此贡高我慢？”叶惊服，自不知所以不死，而归依之是也。三口不谈，六耳不闻，三人则三口六耳也。其中或愿学小成于人仙者，或愿学中成于神仙者，或愿学大成于天仙者。所愿者则重之而喜闻，所不愿者则轻之</p>\n<p>而厌听。或德止足以授小，而分不宜闻中、大二成，故不同谈、不同闻也。如许旌阳、吴猛二人，许为旌阳县令，吴为分宁县令也，同谒丹阳之谌母元君。母独传许以道法，谓吴德行尚未充，后当拜于许授。如世尊单传迦叶为初祖，而以堂弟阿难未能离欲，令转拜叶，传为二祖。俱是旧案也。不经纸笔，仙道乃天上人之所有，亦天上人之所用。正上仙口不谈之秘，鬼神觑不破之机。所以不载笔于纸。何敢浅其说、直其论，而谆谆然数万言为镌哉？此大罪也。大道本不敢轻一言于非人之前，何敢浅说其精深，直论其秘密，令善恶贤否、正人非人，一概混见之耶？但视世间无不可救化之人，倘有不从正而改邪者，是必从地狱、饿鬼、畜生三恶道出，而初世为人，而恶心犹在故也。虽直论之，彼只见如不见而已矣！何嫌其混见？曾见世人截然向道，而竟无觅处。截然者，截断世法尘劳，决志学道。满目是万法千门，竟不见何者为仙道，不知向何处觅仙道，此甚可怜！举世多人谈道，而悉堕旁门。遍世界谈道，所闻所知，全在淫邪窠臼中。初学不能辨邪正，遇之焉不堕入？此又甚可耻！谓道不在世，而人必误陷于邪者也有。仙道原只蕴藏于仙胸中，世何得有？一切诸人，不遇仙度，皆只在世而学，焉能外世见而求世外之见？毕竟误陷于邪矣！谓人心自邪，不求闻道而规正者也有。心邪之人，唯邪法是喜。口称是学仙之党者，只愿学房术御女，谓淫媾有如是快乐，是我所学之有证。而仙道高远，或者即此所致，我何必舍此快乐而别求仙乐为哉！故不求闻也；自称是学佛之党者，造断见之邪说而惑人，不知已为佛之所斥。自谓有了此一口高谈捷语，足取衣食名誉，何必效佛所修，而六年禅坐以自苦？故不求闻也。予在金陵，所以绝不屑与人谈仙佛。见彼诸俗人谈仙者，皆志于房术御女及却病小工，而即指为仙道；不务修德修道，故不必与为谋也。见彼众生谈佛法者，皆妄将佛说为行教无用之虚言，将己谈断见作佛法；不求如何如佛八千劫说一会《法华经》方已；不求如何得佛八万四千劫坐一定方起；必执断常邪见，直趋死亡。为了生死，或学躲一轮迴为自足，而且不能得；又不能承当正法。竟如石马，虽打不走；全似木牛，拽鼻不回。谓之下愚不移，何足救化！何足与言！所以只尊仙佛正法，为我自悟师传而已矣。我又为有相知者悯，而浅说劝之。佛昔云：“人</p>\n<p>相竖，畜相横。”世之俗夫，每以横相妄谈佛法。语人曰：“我知佛，我是佛。”此亦妄人也已矣！甘为横相，又何难焉？今而后谈佛者，请先改汝横相为竖相，且遵佛说，别作商量。庶免空劳妄谈，虚度一世。借令百劫百年，生一圣真，将何入悟？言此论若不出世，倘有真修者，不知如何修仙，不知如何修佛，故无趋向处。亦不知学何者为学，行何者为行。所以得圣真于学者，必由此论。及有此《直论》并《仙佛合宗语录》出世，若有一人精究此论及录，便见得此人是有志于此者。与论合志，即为学此道之圣真。不究者，则其志不学此，终于凡夫轮转而已。得圣真于师者，亦必由此论。诵诗读书而尚论古人者固有人；诵此论，而寻觅论此之人者亦有人；未诵此论，而寻觅已诵此论者亦必有人。能觅此人，岂不得遇此人而得遇此道？故曰：求师必由于明此论！所以张紫阳真人作《悟真篇》以访友，果得石杏林为之徒。其胜于奔走四大部洲访师友者，不万万分便益哉？故钟离云：“吾之求人，甚于人之求我！”古云：“弟子寻师易，师寻弟子难。”盖弟子以初学之无知，故不知所遇之人有道无道而拜之，故易。师之有道者，严奉天诫，必选择同德同志，祖父善门，一不全，不足为弟子，故寻之难。昔钟离往九江府德化县度县宰吕纯阳；又，钟吕往甘河镇度宋徽、钦时领兵校尉王重阳；又，钟吕往燕国度丞相刘海蟾；又，虎皮座张真人，行至六安州马神庙，召庐江县之李虚庵而度之；又，昔世尊往榆罗厥叉国度迦叶者；皆是师急于求人之案。人不及于求我，我不及于求人，世界如许大，学者相隔如许远。谁知我而求？抑谁知我而能求？由我非方外之士游遍四方者；亦非如所谓“唐朝吕洞宾，至今犹在寻人度”者；亦非如世尊自谓“行化时至，乃行而化之，至度一万八千九十四国人”者。不过隐处一小小道隐斋而已！不及求人，所以亦不得为圣真学者之所遇。乃以一笔救天下后世迷。唯成书，可以代面命。虽遍天下、尽后世，凡有见者，皆可救其迷惑。然而迷自轩辕氏御女保生之术一倡，轩辕者，君天下者。忌嗣子之少，故用后宫之多，淫媾之多，必不可不节欲。后世学者，岂可以节欲之人事，而遂误指为长生不死神通之仙道乎？而真伪争途，四千余年矣！仙道是出世间法，真也；御女术是在世间法，而非仙，伪也。本不同者。凡学仙圣真，既有大志、有圣德，必不可学御</p>\n<p>女以招天诛。凡学御女者，轻纵淫乐，坏女子之身，丧女子之耻，志极卑污，败仙佛根基种子。天律严密，又岂容于谈道？真者，幸有天降真传而作仙佛。汉之张道陵、葛玄仙翁、寇谦之、于吉，皆太上降下而传；北汉时之钟离正阳，乃东华帝君之降传；唐之纯阳吕翁，乃钟离之降传；宋之王重阳、燕之刘海蟾，乃钟吕二真之降传；世尊佛，乃阿私陀仙之降传。故《法华经》佛云：昔者仙人授佛妙法，如来因之遂致成佛是也。所以伍子言：“非仙不能度仙，非佛不能度佛。”此亦破迷之一说也！伪者，自愈炽说，遍天下而迷人。炽说者，建立各种门户，曰三峰採战者、曰小採补者、大採补者、曰童男童女开关补气者、曰对炉者、曰入炉者、不入炉者。千种淫秽无耻；以之为世事用，尚甚可耻，又安可妄诳人曰道乎？所以道隐斋评之曰：常见大猿与阴者聚，则抚弄其二物，岂可以衣冠人物、有礼义廉耻者而如之乎？又评之曰：蠢动如蚊、蛾、虱类，人共见其不学而能相媾；岂有不蠢如人，反不如之，而学人为邪媾乎？以速死丧命之事，而愚弄人曰“接命不死”。其迷于自愚，又迷于邪说之诳如此！予请诸人破迷改过，且自安生，保见在之福。以此大迷之世，而论说之宜直、宜浅，其可少乎哉？泄论说之功，岂不大哉！泄万古圣真密旨天机，书之，遍与凡夫言，固有罪矣；但后来圣真，得明道于论说之所泄，岂不是此莫大之功乎？然泄道未必无干于天罪，敢望曰天不之罪，而故意冒干之耶？即此一点破家学道、慈心救世之为功，抑可赎罪哉？得悟于天下后世劫，独超出大迷，而为圣、为真者，又可无此泄道功之报哉！后来圣真得明正道于论说，不被邪说坑陷，而竟成圣成真，亦当报今泄道之功。见此者，幸毋谓我一见是书，已尽见其道。见之固易，而生易见之心，靡不亦自轻易视其性命。书成道之初迹耳！道之精真者曰理，道之实行者曰事。理可以书求，事未可尽以书行，必要真诚参师学道。凡未得师者，以此书考寻正门为引进，即此以为引进师也。已得师传者，以此书印证是否，而为信受奉行，此即是印证师也。若不求真师救度，专向书文上诵章句；偶见一斑，妄称全豹；愚谓只可言悟书，不可言悟性悟道。由怀易见之心，不识为难遇难闻之天宝，则其轻易视性命而丧失者，将必不免矣！毋谓我一见书，便见此道实可易行。正遂我畏</p>\n<p>难之心，即此易行而易行之；自执善悟，不求师而按图索骥；焉能了悟到至玄至妙之真实处，而修证性命？书固载道，正欲使人明道，而浅直之。古云：“得诀归来好看书”。若先得真师真诀，则见书真可尽见道，真知易行。若谓不必求师，道已了然，尽见易行；古云“差毫发，不成丹”，恐难悟透，亦不免依然失性命也。古云“性由自悟，或可因书。命要师传，必经口耳。”则信之真，而行之勇。此我今所望于后圣后真也！故又诫之曰：毋轻忽为易！尤毋谓盗此为说，言可应世，理可惊人，足以师任之于己，以徒视乎其人。有此诳人之心，为障为碍，耻于低头实学，竟不自悟、自修、自证，而亦不免于失性命。有等人不真实参师学道，唯见此书一遍，念几句，诳人曰：我尽得传某人道矣。我今足为诸人之师，诸人只可为我之徒。言至于此，即《楞严经》所云“未得谓得，是为入魔。”故必害己德，而堕为魔民。昨有一人即如此诫之说，见此未注旧稿，遍语人曰：“我全得某人所传仙道之妙。”斯言也，非赞扬，实贬词也。一则以忽仙道之为易，一则以增己学之为博；不谓染指吞海，曰海尽吞矣，而可乎？以芥壳量海，曰海尽量矣，而可乎？作是言者，可谓无正心，无大志。又一人在金陵，淫恶无度，冒称为我虎皮张真人门下人。不知张门先戒绝淫事淫念为初功。彼何必自投清净门，讨个摈斥为哉？于是三者能不肯犯，即上三条诫词也。诚心参悟，即《直论》以究仙理，征《直论》以印师传，真修实悟，证圣证真，斯不负我染笔时一字一泣，当论时，欲不直，奈何今世正道已尽绝，恐无益于救正，不得不为仙佛宣明正法。欲直论，天则有谴，而不敢言；终必直之而冒谴，故一泣。我自癸巳至壬子，二十年参师护师，卖田舍，破家计，苦心苦行而得悟；后之参师者，未必能得年之久，未必有可卖可破之家而可得；故一泣。人以一见论而即知，我以多年苦而轻泄；我以自苦代人之苦；我以所卖所破，代人之以卖以破；故一泣。又或有人，或有可费之资，而不学真仙道者，徒费耳！虽费而不求明如何修命、得命之证，如何修性、得性之证，泛然无着者，徒费耳！虽费而不苦心志，苦功行，以求必悟必成者，徒费耳！故一泣。我又为众言此，以劝诫之。为终天地劫运之圣真直而论，泣而论者，既为参难泄易而割舍天机，又为世界既绝仙佛正道，愈传愈假。我独得悟，</p>\n<p>又焉敢不为仙佛正道留一线之真耶？令世世圣真，得所考据，而为师资矣！将流行于天地之终，而度尽仙佛种子为圣为真、成仙成佛之心也欤！今世皆好房术淫欲，而仙佛正道则绝尽淫欲。心反正道，虽见之亦不能救正。间或有从救而不足。必成书流行以终天地，则尽未来之仙佛，皆得普度。是我继诸仙翁救世度人，立三千功行，为自修而已矣！即纯阳翁所谓“度尽众生”，世尊佛及地藏菩萨亦谓“度尽众生”，言自利利人之果，唯如是，而后圆满。</p>\n<p>天仙正理直论增注卷后终</p>\n<p>冲虚子伍守阳</p>\n<p>撰</p>"}, {"id": "xf_dd0", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "丹道九篇·缘起·序言", "content": "<h2>丹道九篇</h2>\n<h5>缘 起</h5>\n<p>冲虚子于万历乙卯，初传吉王太和殿下百日炼精口诀。越七载，至天启壬戌，再传以採大药口诀。又六年，至崇祯戊辰，三传之以五龙捧圣口诀。复求传仙佛合宗全旨，未允。越四载，至壬申，始允度之。遂将仙佛合宗玄妙全旨，尽泄于示谕之间。更将邱祖门下正传符节，亦传付之。因其问之审而答之详，集成九章，乃嘱之曰：此实宣扬皇天之至宝，必遇同德、同志及祖父仁贤之辈，方可度之，慎勿妄传匪人也！</p>\n<p>时大明崇祯十三年庚辰春，邱祖门下第八派分符领节弟子，冲虚伍守阳识。</p>\n<h5>序言</h5>\n<p>冲虚子自序曰：仙宗果位，了证长生。佛宗果位，了证无生。然而了证无生，必以了证长生为实诣；了证长生尤必以了证无生为始终，所谓性命双修者也。今我述斯录，阐发仙宗，而以佛宗为印证，故名《合宗》。无非使天下后世同志圣真，知性命双修为要也！向作《天仙正理直论》九章，敷陈仙理，次第详明。兹复述《仙佛合</p>\n<p>宗语录》九章，一以阐明《直论》未宣之秘法，一以罄口传未泄之天机。有是录传，而玄中之玄，妙中之妙，炳若日星矣。得斯録者，精进修持，成仙成佛，庶不负我度人之苦心也欤？！</p>\n<p>大明万历中睿帝阁下、吉王国师、维摩大夫季子、三教逸民，南昌县辟邪里，冲虚子伍守阳撰。</p>"}, {"id": "xf_dd1", "bookId": "xianfo", "bookTitle": "仙佛合宗语录", "title": "最初还虚 第一", "content": "<h5>最初还虚 第一</h5>\n<p>太和问曰：《直论》中言：炼己先务，有当禁止杜绝之端。又言：不炼己，有难成玄功之弊。可谓详言炼己之要矣！昨又蒙老师言
